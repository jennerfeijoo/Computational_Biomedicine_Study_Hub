name: Diagnose module 13 mypy

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-module13-mypy.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Capture mypy output
        shell: bash
        run: |
          mypy > .github/module13_mypy_diagnostic.txt 2>&1 || true
          rm -f .github/workflows/diagnose-module13-mypy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture DM857 module 13 mypy diagnostic"
          git push origin HEAD:feat/dm857-modules-13-15
