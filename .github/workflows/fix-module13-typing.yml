name: Persist and diagnose module 13 typing

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/fix-module13-typing.yml"

permissions:
  contents: write

jobs:
  persist:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Correct accepted-answer structure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path(
              'src/computational_biomedicine_study_hub/content/dm857/'
              'module_13_scientific_libraries.py'
          )
          lines = path.read_text(encoding='utf-8').splitlines()
          marker_index = next(
              index
              for index, line in enumerate(lines)
              if 'dm857.m13.assessment.007' in line
          )
          answer_start = next(
              index
              for index in range(marker_index, len(lines))
              if lines[index].strip() == '"def validate_matrix(x):\\n"'
          )
          if lines[answer_start - 1] != '            (':
              raise SystemExit('Unexpected accepted-answer opening structure.')
          lines.insert(answer_start, '                (')

          answer_end = next(
              index
              for index in range(answer_start + 1, len(lines))
              if lines[index].strip() == '"    return x",'
              and sum(
                  candidate.strip() == '"    return x",'
                  for candidate in lines[answer_start + 1 : index + 1]
              )
              == 3
          )
          if lines[answer_end + 1] != '            ),':
              raise SystemExit('Unexpected accepted-answer closing structure.')
          lines[answer_end + 1 : answer_end + 2] = [
              '                ),',
              '            ),',
          ]
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Capture validation results
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          ruff check --fix .
          ruff format .
          set +e
          mypy > .github/module13_validation_diagnostic.txt 2>&1
          mypy_status=$?
          printf '\nMYPY_EXIT=%s\n' "$mypy_status" >> .github/module13_validation_diagnostic.txt
          pytest tests/test_dm857_module_13_content.py tests/test_dm857_module_13_registration.py tests/test_module_bundles.py >> .github/module13_validation_diagnostic.txt 2>&1
          pytest_status=$?
          printf '\nPYTEST_EXIT=%s\n' "$pytest_status" >> .github/module13_validation_diagnostic.txt
          exit 0

      - name: Persist patch and diagnostics
        shell: bash
        run: |
          rm -f .github/module13_mypy_diagnostic.txt
          rm -f .github/workflows/fix-module13-typing.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Persist DM857 module 13 typing fix and diagnostics"
          git push origin HEAD:feat/dm857-modules-13-15
