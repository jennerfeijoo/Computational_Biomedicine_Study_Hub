name: Fix module 13 lint

on:
  pull_request:
    branches: [main]
    paths:
      - "tests/test_dm857_module_13_registration.py"
      - ".github/workflows/fix-module13-lint.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Apply Ruff fixes and formatting
        shell: bash
        run: |
          python -m pip install ruff
          ruff check --fix .
          ruff format .

      - name: Remove workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/fix-module13-lint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply DM857 module 13 lint fixes"
          git push origin HEAD:feat/dm857-modules-13-15
