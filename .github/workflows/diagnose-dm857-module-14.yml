name: Diagnose DM857 module 14

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project quietly
        run: python -m pip install -q -e ".[dev]"

      - name: Capture focused test output
        shell: bash
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          set +e
          pytest tests/test_dm857_module_14_content.py tests/test_dm857_module_14_registration.py tests/test_dm857_module_catalog.py tests/test_module_bundles.py -q --tb=long -x > dm857-module-14-diagnostic.log 2>&1
          echo $? > dm857-module-14-exit-code.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: dm857-module-14-diagnostic
          path: |
            dm857-module-14-diagnostic.log
            dm857-module-14-exit-code.txt
