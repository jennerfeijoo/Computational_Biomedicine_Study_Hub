name: Assemble DM857 localization

on:
  push:
    branches:
      - feat/dm857-m01-trilingual-content
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'feat/dm857-m01-trilingual-content' || github.ref_name == 'feat/dm857-m01-trilingual-content'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-m01-trilingual-content

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assemble generated sources
        run: |
          cat \
            .generation/module_01_localized.part00 \
            .generation/module_01_localized.part01 \
            .generation/module_01_localized.part02 \
            .generation/module_01_localized.part03 \
            > src/computational_biomedicine_study_hub/content/dm857/module_01_localized.py
          cat \
            .generation/module_01_bank.part00 \
            .generation/module_01_bank.part01 \
            > src/computational_biomedicine_study_hub/content/dm857/module_01_objective_bank_localized.py

      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Format generated sources
        run: |
          ruff check \
            src/computational_biomedicine_study_hub/content/dm857/module_01_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/module_01_objective_bank_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/__init__.py \
            tests/test_dm857_module_01_localization.py \
            --fix
          ruff format \
            src/computational_biomedicine_study_hub/content/dm857/module_01_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/module_01_objective_bank_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/__init__.py \
            tests/test_dm857_module_01_localization.py

      - name: Validate generated sources
        run: |
          mypy
          pytest

      - name: Commit generated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .generation .github/workflows/assemble_dm857_localization.yml
          git add \
            src/computational_biomedicine_study_hub/content/dm857/module_01_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/module_01_objective_bank_localized.py \
            src/computational_biomedicine_study_hub/content/dm857/__init__.py \
            tests/test_dm857_module_01_localization.py
          git commit -m "add complete trilingual DM857 module 1 content"
          git push origin HEAD:feat/dm857-m01-trilingual-content
