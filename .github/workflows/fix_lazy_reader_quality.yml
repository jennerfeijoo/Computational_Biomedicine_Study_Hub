name: Fix lazy reader quality

on:
  push:
    branches:
      - feat/dm857-lazy-module-readers

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-lazy-module-readers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Fix and format changed files
        run: |
          ruff check --fix src/computational_biomedicine_study_hub/courses/dm857.py tests/test_dm857_lazy_loading.py
          ruff format src/computational_biomedicine_study_hub/courses/dm857.py tests/test_dm857_lazy_loading.py

      - name: Commit fixes and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix_lazy_reader_quality.yml
          git add .
          git commit -m "format lazy DM857 module reader changes"
          git push origin HEAD:feat/dm857-lazy-module-readers
