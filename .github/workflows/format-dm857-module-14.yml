name: Format DM857 module 14

on:
  push:
    branches:
      - agent/complete-dm857-module-14

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/complete-dm857-module-14

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools and project
        run: |
          python -m pip install "ruff>=0.5,<1"
          python -m pip install -e ".[dev]"

      - name: Format module 14 files
        run: |
          ruff check src/computational_biomedicine_study_hub/content/dm857/__init__.py src/computational_biomedicine_study_hub/content/dm857/module_14_testing_debugging_quality.py tests/test_dm857_module_14_content.py tests/test_dm857_module_14_registration.py tests/test_dm857_module_catalog.py tests/test_module_bundles.py --fix
          ruff format src/computational_biomedicine_study_hub/content/dm857/__init__.py src/computational_biomedicine_study_hub/content/dm857/module_14_testing_debugging_quality.py tests/test_dm857_module_14_content.py tests/test_dm857_module_14_registration.py tests/test_dm857_module_catalog.py tests/test_module_bundles.py

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/computational_biomedicine_study_hub/content/dm857/__init__.py src/computational_biomedicine_study_hub/content/dm857/module_14_testing_debugging_quality.py tests/test_dm857_module_14_content.py tests/test_dm857_module_14_registration.py tests/test_dm857_module_catalog.py tests/test_module_bundles.py
          git commit -m "Format DM857 module 14"
          git push origin HEAD:agent/complete-dm857-module-14

      - name: Capture targeted pytest diagnostics
        continue-on-error: true
        run: |
          pytest tests/test_dm857_module_14_content.py tests/test_dm857_module_14_registration.py tests/test_dm857_module_catalog.py tests/test_module_bundles.py -vv > module14-pytest.log 2>&1

      - name: Upload targeted diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dm857-module-14-pytest
          path: module14-pytest.log
