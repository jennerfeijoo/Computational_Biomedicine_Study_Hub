name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-module-03-iteration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format repository
        run: ruff format .

      - name: Restore permanent workflows and commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git rm -f .github/workflows/format_dm857_module3.yml
          git add .
          git commit -m "format DM857 module 3"
          git push origin HEAD:feat/dm857-module-03-iteration
