name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Generate formatted source snapshot
        if: matrix.python-version == '3.11'
        run: |
          ruff format .
          mkdir -p formatted-source
          cp -R src tests formatted-source/

      - name: Upload formatted source snapshot
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: formatted-source
          path: formatted-source

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: mypy

      - name: Test
        run: pytest
