name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-and-validate:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-module-03-iteration

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Format and validate
        run: |
          ruff format .
          ruff check .
          ruff format --check .
          mypy
          pytest

      - name: Restore permanent workflows and commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git rm -f .github/workflows/format_dm857_module3.yml
          git add .
          git commit -m "format and validate DM857 module 3"
          git push origin HEAD:feat/dm857-module-03-iteration
