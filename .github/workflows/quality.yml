name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-10-12

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture final pytest diagnostics
        shell: bash
        run: |
          set +e
          python -m pytest -vv --maxfail=20 > raw_dm857_final.txt 2>&1
          status=$?
          tail -n 350 raw_dm857_final.txt > ci_dm857_m10_m12_final.txt
          echo "exit_code=$status" >> ci_dm857_m10_m12_final.txt
          rm raw_dm857_final.txt
          exit 0

      - name: Restore permanent workflow and commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git add .github/workflows/quality.yml ci_dm857_m10_m12_final.txt
          git commit -m "capture final pytest diagnostics for DM857 modules 10 to 12"
          git push origin HEAD:feat/dm857-modules-10-12
