name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-10-12

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capture Ruff diagnostics
        run: |
          python -m pip install "ruff>=0.5,<1"
          ruff check . > ci_dm857_m10_m12_ruff.txt 2>&1 || true

      - name: Restore permanent workflow and commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git add .github/workflows/quality.yml ci_dm857_m10_m12_ruff.txt
          git commit -m "capture Ruff diagnostics for DM857 modules 10 to 12"
          git push origin HEAD:feat/dm857-modules-10-12
