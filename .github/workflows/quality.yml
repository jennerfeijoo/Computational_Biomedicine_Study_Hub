name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  isolate-tests:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-10-12

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run each test file independently
        shell: bash
        run: |
          : > ci_dm857_test_file_status.txt
          for file in tests/test_*.py; do
            set +e
            python -m pytest -q "$file" > /dev/null 2>&1
            status=$?
            set -e
            echo "$status $file" >> ci_dm857_test_file_status.txt
          done

      - name: Restore permanent workflow and commit status report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git add .github/workflows/quality.yml ci_dm857_test_file_status.txt
          git commit -m "isolate remaining DM857 test failures"
          git push origin HEAD:feat/dm857-modules-10-12
