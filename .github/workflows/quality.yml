name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Capture type-check diagnostics
        run: |
          mypy > mypy.log 2>&1 || true
          cat mypy.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f mypy.log
          if ! git diff --cached --quiet; then
            git commit -m "save mypy output"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Type check
        run: mypy

      - name: Test
        run: pytest
