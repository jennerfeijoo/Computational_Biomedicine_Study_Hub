name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-module-03-iteration

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture focused test diagnostics
        run: pytest tests/test_dm857_module_03_content.py tests/test_dm857_module_reader.py -vv > ci_dm857_m03_diagnostics.txt 2>&1 || true

      - name: Restore permanent workflow and commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git add .github/workflows/quality.yml ci_dm857_m03_diagnostics.txt
          git commit -m "capture DM857 module 3 diagnostics"
          git push origin HEAD:feat/dm857-module-03-iteration
