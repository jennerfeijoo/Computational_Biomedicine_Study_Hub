name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  strengthen-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-10-12

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Expand canonical tutor explanations
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "src/computational_biomedicine_study_hub/content/dm857/module_10_trees.py": {
                  "Los ejemplos biomédicos son ejercicios de programación y no representan protocolos.": "Los ejemplos biomédicos son ejercicios de programación y no representan protocolos. Para razonar sobre la corrección de un algoritmo de árboles se especifica primero la representación y sus invariantes, después se demuestra que el caso vacío es correcto y que cada paso procesa exactamente el nodo o subárbol previsto. El orden de los hijos forma parte del resultado cuando el contrato lo declara. El análisis debe distinguir número total de nodos, altura y anchura máxima, porque determinan costes diferentes. Una implementación robusta valida referencias, detecta ciclos y padres múltiples antes de exponer la jerarquía, y prueba árboles vacíos, hojas, cadenas sesgadas, ramas desiguales y estructuras equilibradas.",
                  "Biomedical examples are programming exercises, not protocols.": "Biomedical examples are programming exercises, not protocols. To reason about correctness, first specify the tree representation and its invariants, then show that the empty case is correct and that each step processes exactly the intended node or subtree. Child order is part of the result when the contract declares it. Analysis must distinguish total node count, height, and maximum width because they determine different costs. A robust implementation validates references, detects cycles and multiple parents before exposing the hierarchy, and tests empty trees, leaves, skewed chains, unequal branches, and balanced structures.",
                  "Biomedicinske eksempler er programmeringsøvelser og ikke protokoller.": "Biomedicinske eksempler er programmeringsøvelser og ikke protokoller. For at begrunde korrekthed angives først trærepræsentationen og dens invarianter, hvorefter det vises, at det tomme tilfælde er korrekt, og at hvert trin behandler præcis den tilsigtede node eller det tilsigtede deltræ. Børnenes rækkefølge er en del af resultatet, når kontrakten siger det. Analysen skal skelne mellem samlet antal noder, højde og maksimal bredde, fordi de giver forskellige omkostninger. En robust implementering validerer referencer, finder cykler og flere forældre før hierarkiet eksponeres og tester tomme træer, blade, skæve kæder, ulige grene og balancerede strukturer.",
              },
              "src/computational_biomedicine_study_hub/content/dm857/module_11_adts.py": {
                  "Los escenarios biomédicos son ejemplos de programación y no protocolos.": "Los escenarios biomédicos son ejemplos de programación y no protocolos. La corrección de un ADT se evalúa mediante secuencias observables: construcción, consultas, mutaciones, errores y conservación del orden. Cada operación pública debe comprobar sus precondiciones, modificar el estado de forma controlada y restablecer la invariante antes de devolver el control. La elección de representación debe justificarse por las operaciones dominantes y por la complejidad prometida. Las pruebas no deben fijar atributos privados, sino demostrar propiedades como LIFO, FIFO, prioridad estable, aislamiento entre instancias y comportamiento definido en estados vacíos o llenos. Así una implementación puede cambiar sin alterar al cliente.",
                  "Biomedical scenarios are programming examples, not protocols.": "Biomedical scenarios are programming examples, not protocols. ADT correctness is evaluated through observable sequences: construction, queries, mutations, errors, and order preservation. Every public operation should check its preconditions, change state in a controlled way, and restore the invariant before returning control. The representation choice should be justified by dominant operations and promised complexity. Tests should not freeze private attributes; they should demonstrate properties such as LIFO, FIFO, stable priority, instance isolation, and defined behavior in empty or full states. This permits an implementation to change without altering client code.",
                  "Biomedicinske scenarier er programmeringseksempler og ikke protokoller.": "Biomedicinske scenarier er programmeringseksempler og ikke protokoller. Korrektheden af en ADT vurderes gennem observerbare sekvenser: konstruktion, forespørgsler, mutationer, fejl og bevarelse af rækkefølge. Hver offentlig operation bør kontrollere sine forudsætninger, ændre tilstanden kontrolleret og gendanne invarianten før retur. Valget af repræsentation bør begrundes med de dominerende operationer og den lovede kompleksitet. Test bør ikke fastlåse private attributter, men demonstrere egenskaber som LIFO, FIFO, stabil prioritet, isolation mellem instanser og defineret adfærd i tomme eller fulde tilstande. Dermed kan implementeringen ændres uden at ændre klientkoden.",
              },
              "src/computational_biomedicine_study_hub/content/dm857/module_12_oop.py": {
                  "Los ejemplos biomédicos son modelos didácticos y no decisiones clínicas.": "Los ejemplos biomédicos son modelos didácticos y no decisiones clínicas. Un diseño orientado a objetos correcto comienza delimitando responsabilidades, estado válido y comportamiento observable. La construcción debe validar antes de publicar estado; las mutaciones deben ser atómicas respecto a las invariantes; y dos instancias deben permanecer independientes salvo que el contrato declare explícitamente recursos compartidos. La igualdad lógica, la identidad física y la representación textual se prueban por separado. La composición se prefiere cuando un objeto contiene o delega componentes, mientras la herencia sólo es adecuada cuando la subclase puede sustituir a la base sin debilitar precondiciones ni poscondiciones. Las pruebas se apoyan en métodos públicos y transiciones de estado.",
                  "Biomedical examples are teaching models, not clinical decisions.": "Biomedical examples are teaching models, not clinical decisions. Correct object-oriented design begins by delimiting responsibilities, valid state, and observable behavior. Construction should validate before publishing state; mutations should be atomic with respect to invariants; and two instances should remain independent unless the contract explicitly declares shared resources. Logical equality, physical identity, and textual representation are tested separately. Composition is preferred when an object contains or delegates to components, while inheritance is appropriate only when the subclass can substitute for the base without weakening preconditions or postconditions. Tests rely on public methods and state transitions.",
                  "Biomedicinske eksempler er undervisningsmodeller og ikke kliniske beslutninger.": "Biomedicinske eksempler er undervisningsmodeller og ikke kliniske beslutninger. Korrekt objektorienteret design begynder med at afgrænse ansvar, gyldig tilstand og observerbar adfærd. Konstruktionen bør validere før tilstand eksponeres; mutationer bør være atomiske i forhold til invarianter; og to instanser bør forblive uafhængige, medmindre kontrakten eksplicit angiver delte ressourcer. Logisk lighed, fysisk identitet og tekstrepræsentation testes separat. Komposition foretrækkes, når et objekt indeholder eller delegerer komponenter, mens arv kun er passende, når underklassen kan erstatte basen uden at svække forudsætninger eller efterbetingelser. Test bygger på offentlige metoder og tilstandsovergange.",
              },
          }

          for filename, changes in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in changes.items():
                  count = text.count(old)
                  if count != 1:
                      raise RuntimeError(f"Expected one occurrence in {filename}: {old!r}; found {count}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Format changed files
        run: |
          python -m pip install "ruff>=0.5,<1"
          ruff format \
            src/computational_biomedicine_study_hub/content/dm857/module_10_trees.py \
            src/computational_biomedicine_study_hub/content/dm857/module_11_adts.py \
            src/computational_biomedicine_study_hub/content/dm857/module_12_oop.py \
            tests/test_dm857_module_reader.py \
            tests/test_dm857_modules_10_12_content.py

      - name: Restore workflow, remove diagnostics, and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git rm -f ci_dm857_m10_m12_diagnostics.txt ci_dm857_m10_m12_focused.txt || true
          git add .
          git commit -m "strengthen DM857 modules 10 to 12 tutor support"
          git push origin HEAD:feat/dm857-modules-10-12
