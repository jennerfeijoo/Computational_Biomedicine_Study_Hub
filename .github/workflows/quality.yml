name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-10-12

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply Ruff fixes
        run: |
          python -m pip install "ruff>=0.5,<1"
          ruff check --fix tests/test_dm857_module_reader.py
          ruff format tests/test_dm857_module_reader.py

      - name: Restore workflow, remove diagnostics, and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          git rm -f ci_dm857_m10_m12_ruff.txt || true
          git add .
          git commit -m "apply final Ruff fix for DM857 modules 10 to 12"
          git push origin HEAD:feat/dm857-modules-10-12
