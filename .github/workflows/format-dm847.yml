name: Format DM847 module

on:
  push:
    branches:
      - agent/add-dm847-module-1

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/add-dm847-module-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format DM847 files
        run: |
          ruff check src/computational_biomedicine_study_hub/content/dm847 tests/test_dm847_module_01_content.py --fix
          ruff format src/computational_biomedicine_study_hub/content/dm847 tests/test_dm847_module_01_content.py

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/computational_biomedicine_study_hub/content/dm847 tests/test_dm847_module_01_content.py
          git commit -m "Format DM847 module 1"
          git push origin HEAD:agent/add-dm847-module-1
