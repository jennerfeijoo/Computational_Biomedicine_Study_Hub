name: Diagnose module 13 lint

on:
  pull_request:
    branches: [main]
    paths:
      - "tests/test_dm857_module_13_registration.py"
      - ".github/workflows/diagnose-module13-lint.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Capture Ruff output
        shell: bash
        run: |
          python -m pip install ruff
          ruff check . > .github/module13_ruff_diagnostic.txt 2>&1 || true
          rm -f .github/workflows/diagnose-module13-lint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture DM857 module 13 lint diagnostic"
          git push origin HEAD:feat/dm857-modules-13-15
