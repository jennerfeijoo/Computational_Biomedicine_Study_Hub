name: Ruff i18n diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Fix imports and format files
        run: |
          ruff check src/computational_biomedicine_study_hub/i18n tests/test_i18n_core.py --fix
          ruff format src/computational_biomedicine_study_hub/i18n tests/test_i18n_core.py

      - name: Upload fixed files
        uses: actions/upload-artifact@v4
        with:
          name: fixed-i18n-files
          path: |
            src/computational_biomedicine_study_hub/i18n
            tests/test_i18n_core.py
