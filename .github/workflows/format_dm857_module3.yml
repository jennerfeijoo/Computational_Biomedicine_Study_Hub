name: Format DM857 module 3

on:
  push:
    branches:
      - feat/dm857-module-03-iteration

permissions:
  contents: write

jobs:
  format-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-module-03-iteration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development tools
        run: python -m pip install -e ".[dev]"

      - name: Format changed Python files
        run: |
          ruff format src/computational_biomedicine_study_hub/content/dm857/module_03_iteration.py
          ruff format src/computational_biomedicine_study_hub/content/dm857/module_03_objective_bank.py
          ruff format src/computational_biomedicine_study_hub/content/dm857/__init__.py
          ruff format tests/test_dm857_module_03_content.py
          ruff format tests/test_dm857_module_reader.py

      - name: Validate repository
        run: |
          ruff check .
          ruff format --check .
          mypy
          pytest

      - name: Commit formatting and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/format_dm857_module3.yml
          git add src/computational_biomedicine_study_hub/content/dm857/module_03_iteration.py
          git add src/computational_biomedicine_study_hub/content/dm857/module_03_objective_bank.py
          git add src/computational_biomedicine_study_hub/content/dm857/__init__.py
          git add tests/test_dm857_module_03_content.py
          git add tests/test_dm857_module_reader.py
          git commit -m "format and validate DM857 module 3"
          git push origin HEAD:feat/dm857-module-03-iteration
