name: Diagnose lazy reader mypy

on:
  push:
    branches:
      - feat/dm857-lazy-module-readers

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-lazy-module-readers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture mypy diagnostics
        run: mypy > ci_lazy_reader_mypy.txt 2>&1 || true

      - name: Commit diagnostics and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/diagnose_lazy_reader_mypy.yml
          git add ci_lazy_reader_mypy.txt
          git commit -m "capture lazy reader mypy diagnostics"
          git push origin HEAD:feat/dm857-lazy-module-readers
