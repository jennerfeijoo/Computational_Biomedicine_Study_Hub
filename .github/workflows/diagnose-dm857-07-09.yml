name: Diagnose DM857 Modules 7-9

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-07-09

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture full test diagnostics
        run: pytest -vv > ci_dm857_07_09_diagnostics.txt 2>&1 || true

      - name: Remove workflow and commit diagnostics
        run: |
          rm .github/workflows/diagnose-dm857-07-09.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "capture DM857 modules 7 to 9 diagnostics"
          git push origin HEAD:feat/dm857-modules-07-09
