name: Diagnose DM847 course

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install --yes libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project quietly
        run: python -m pip install -q -e ".[dev]"

      - name: Capture first full-suite failure
        shell: bash
        run: |
          set +e
          pytest -q --tb=long -x > dm847-diagnostic.log 2>&1
          echo $? > dm847-exit-code.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: dm847-diagnostic
          path: |
            dm847-diagnostic.log
            dm847-exit-code.txt
