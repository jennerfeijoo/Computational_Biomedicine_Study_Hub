name: Format localized content

on:
  push:
    branches:
      - feat/localized-academic-models

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/localized-academic-models

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format files
        run: |
          ruff check src/computational_biomedicine_study_hub/content/localized_models.py src/computational_biomedicine_study_hub/content/__init__.py tests/test_localized_academic_models.py --fix
          ruff format src/computational_biomedicine_study_hub/content/localized_models.py src/computational_biomedicine_study_hub/content/__init__.py tests/test_localized_academic_models.py

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/computational_biomedicine_study_hub/content/localized_models.py src/computational_biomedicine_study_hub/content/__init__.py tests/test_localized_academic_models.py
          git commit -m "format localized academic models"
          git push origin HEAD:feat/localized-academic-models
