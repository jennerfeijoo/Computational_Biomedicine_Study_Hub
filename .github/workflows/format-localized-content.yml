name: Format localized content

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format files
        run: |
          ruff check src/computational_biomedicine_study_hub/content/localized_models.py src/computational_biomedicine_study_hub/content/__init__.py tests/test_localized_academic_models.py --fix
          ruff format src/computational_biomedicine_study_hub/content/localized_models.py src/computational_biomedicine_study_hub/content/__init__.py tests/test_localized_academic_models.py

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-localized-content
          path: |
            src/computational_biomedicine_study_hub/content/localized_models.py
            src/computational_biomedicine_study_hub/content/__init__.py
            tests/test_localized_academic_models.py
