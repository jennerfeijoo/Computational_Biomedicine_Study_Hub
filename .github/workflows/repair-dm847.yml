name: Repair DM847 tutor density

on:
  push:
    branches:
      - agent/dm847-core-modules-01-06

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/dm847-core-modules-01-06

      - name: Extend module 6 canonical explanations
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/computational_biomedicine_study_hub/content/dm847/module_06_suffix_arrays_bwt_mapping.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "Repeticiones, orientación, calidad y variantes crean ambigüedad que debe conservarse y validarse.": "Repeticiones, orientación, calidad y variantes crean ambigüedad que debe conservarse y validarse. La auditoría confirma que count, locate y coordenadas proceden de la misma versión del índice.",
              "Repeats, orientation, quality, and variants create ambiguity that should be retained and validated.": "Repeats, orientation, quality, and variants create ambiguity that should be retained and validated. Auditing confirms that count, locate, and coordinates come from the same index version.",
              "Gentagelser, orientering, kvalitet og varianter skaber tvetydighed, som bør bevares og valideres.": "Gentagelser, orientering, kvalitet og varianter skaber tvetydighed, som bør bevares og valideres. Audit bekræfter, at count, locate og koordinater kommer fra samme indeksversion.",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing expected text: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit repair
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/computational_biomedicine_study_hub/content/dm847/module_06_suffix_arrays_bwt_mapping.py
          git commit -m "Strengthen DM847 module 6 tutor context"
          git push origin HEAD:agent/dm847-core-modules-01-06
