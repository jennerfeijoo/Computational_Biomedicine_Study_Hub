name: Format DM857 Modules 7-9

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-07-09

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatter
        run: python -m pip install ruff

      - name: Apply lint fixes and formatting
        run: |
          ruff check . --fix
          ruff format .

      - name: Remove temporary workflow and commit formatted files
        run: |
          rm .github/workflows/format-dm857-07-09.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "format DM857 modules 7 to 9"
          git push origin HEAD:feat/dm857-modules-07-09
