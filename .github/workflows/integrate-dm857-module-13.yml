name: Integrate DM857 module 13

on:
  pull_request:
    branches: [main]
    paths:
      - "src/computational_biomedicine_study_hub/content/dm857/module_13_scientific_libraries.py"
      - "tests/test_dm857_module_13_content.py"
      - ".github/workflows/integrate-dm857-module-13.yml"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Register module and update catalog tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/computational_biomedicine_study_hub/content/dm857/__init__.py')
          text = path.read_text(encoding='utf-8')

          replacements = (
              (
                  "from .module_12_oop import (\n"
                  "    LOCALIZED_MODULE_12_OOP,\n"
                  "    LOCALIZED_OBJECTIVE_QUESTION_BANK_12,\n"
                  "    materialize_module_12_question_bank,\n"
                  ")\n",
                  "from .module_12_oop import (\n"
                  "    LOCALIZED_MODULE_12_OOP,\n"
                  "    LOCALIZED_OBJECTIVE_QUESTION_BANK_12,\n"
                  "    materialize_module_12_question_bank,\n"
                  ")\n"
                  "from .module_13_scientific_libraries import (\n"
                  "    LOCALIZED_MODULE_13_SCIENTIFIC_LIBRARIES,\n"
                  "    LOCALIZED_OBJECTIVE_QUESTION_BANK_13,\n"
                  "    materialize_module_13_question_bank,\n"
                  ")\n",
              ),
              (
                  "    LocalizedModuleBundle(\n"
                  "        localized_module=LOCALIZED_MODULE_12_OOP,\n"
                  "        localized_objective_question_bank=LOCALIZED_OBJECTIVE_QUESTION_BANK_12,\n"
                  "        content_version=\"1.0.0\",\n"
                  "    ),\n",
                  "    LocalizedModuleBundle(\n"
                  "        localized_module=LOCALIZED_MODULE_12_OOP,\n"
                  "        localized_objective_question_bank=LOCALIZED_OBJECTIVE_QUESTION_BANK_12,\n"
                  "        content_version=\"1.0.0\",\n"
                  "    ),\n"
                  "    LocalizedModuleBundle(\n"
                  "        localized_module=LOCALIZED_MODULE_13_SCIENTIFIC_LIBRARIES,\n"
                  "        localized_objective_question_bank=LOCALIZED_OBJECTIVE_QUESTION_BANK_13,\n"
                  "        content_version=\"1.0.0\",\n"
                  "    ),\n",
              ),
              (
                  "MODULE_12_OOP = BUNDLES[11].module\n",
                  "MODULE_12_OOP = BUNDLES[11].module\n"
                  "MODULE_13_SCIENTIFIC_LIBRARIES = BUNDLES[12].module\n",
              ),
              (
                  "OBJECTIVE_QUESTION_BANK_12 = BUNDLES[11].objective_question_bank\n",
                  "OBJECTIVE_QUESTION_BANK_12 = BUNDLES[11].objective_question_bank\n"
                  "OBJECTIVE_QUESTION_BANK_13 = BUNDLES[12].objective_question_bank\n",
              ),
              (
                  '    "LOCALIZED_MODULE_12_OOP",\n',
                  '    "LOCALIZED_MODULE_12_OOP",\n'
                  '    "LOCALIZED_MODULE_13_SCIENTIFIC_LIBRARIES",\n',
              ),
              (
                  '    "LOCALIZED_OBJECTIVE_QUESTION_BANK_12",\n',
                  '    "LOCALIZED_OBJECTIVE_QUESTION_BANK_12",\n'
                  '    "LOCALIZED_OBJECTIVE_QUESTION_BANK_13",\n',
              ),
              (
                  '    "MODULE_12_OOP",\n',
                  '    "MODULE_12_OOP",\n'
                  '    "MODULE_13_SCIENTIFIC_LIBRARIES",\n',
              ),
              (
                  '    "OBJECTIVE_QUESTION_BANK_12",\n',
                  '    "OBJECTIVE_QUESTION_BANK_12",\n'
                  '    "OBJECTIVE_QUESTION_BANK_13",\n',
              ),
              (
                  '    "materialize_module_12_question_bank",\n',
                  '    "materialize_module_12_question_bank",\n'
                  '    "materialize_module_13_question_bank",\n',
              ),
          )

          for old, new in replacements:
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f'Expected registration marker not found: {old[:80]!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_module_bundles.py')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace('expected_count = 12', 'expected_count = 13')
          tests = tests.replace('module.module_id == "dm857.m12"', 'module.module_id == "dm857.m13"')
          tests = tests.replace('module.title.startswith("Klasser")', 'module.title.startswith("Biblioteker")')
          test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Format and lint changed code
        shell: bash
        run: |
          python -m pip install ruff
          ruff check --fix src/computational_biomedicine_study_hub/content/dm857 tests
          ruff format src/computational_biomedicine_study_hub/content/dm857 tests

      - name: Remove workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/integrate-dm857-module-13.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Register and validate DM857 module 13"
          git push origin HEAD:feat/dm857-modules-13-15
