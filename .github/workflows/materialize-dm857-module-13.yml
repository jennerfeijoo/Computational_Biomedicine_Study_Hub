name: Materialize DM857 module 13

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/dm857_source/**"
      - ".github/workflows/materialize-dm857-module-13.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Reconstruct and verify module
        shell: bash
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          source_dir = Path('.github/dm857_source')
          names = [
              'm13_01.part',
              'm13_02.part',
              'm13_03_1.part',
              'm13_03_2.part',
              'm13_04_1.part',
              'm13_04_2.part',
          ]
          pieces = [(source_dir / name).read_text(encoding='utf-8') for name in names]
          # Preserve the split line between the fifth and sixth transfer fragments.
          if not pieces[4].endswith('\n'):
              pieces[4] += '\n'

          source = ''.join(pieces)
          target = Path(
              'src/computational_biomedicine_study_hub/content/dm857/'
              'module_13_scientific_libraries.py'
          )
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(source, encoding='utf-8')

          tree = ast.parse(source, filename=str(target))
          assigned_names = {
              target_name.id
              for node in tree.body
              if isinstance(node, (ast.Assign, ast.AnnAssign))
              for target_name in (
                  node.targets if isinstance(node, ast.Assign) else [node.target]
              )
              if isinstance(target_name, ast.Name)
          }
          required = {
              'LOCALIZED_MODULE_13_SCIENTIFIC_LIBRARIES',
              'LOCALIZED_OBJECTIVE_QUESTION_BANK_13',
              'MODULE_13_SCIENTIFIC_LIBRARIES',
              'OBJECTIVE_QUESTION_BANK_13',
          }
          missing = required - assigned_names
          if missing:
              raise SystemExit(f'Missing required module symbols: {sorted(missing)}')
          compile(source, str(target), 'exec')
          PY

      - name: Remove transfer material and commit
        shell: bash
        run: |
          rm -rf .github/dm857_source .github/dm857_payload
          rm -f .github/dm857_source_hashes.txt
          rm -f .github/workflows/materialize-dm857-module-13.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add DM857 module 13 scientific libraries"
          git push origin HEAD:feat/dm857-modules-13-15
