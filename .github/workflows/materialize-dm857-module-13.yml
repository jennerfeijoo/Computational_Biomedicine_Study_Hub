name: Materialize DM857 module 13

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/dm857_source/**"
      - ".github/workflows/materialize-dm857-module-13.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Diagnose source parts
        shell: bash
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          expected = {
              'm13_01.part': '456b11390079b3d7dfd4eebee928d13db6ea5b989ecea9a828f2603df8dbe0f4',
              'm13_02.part': '5780311791df1a0a7ec1b7fcbbeac17554a5777c47a0ee43c6e50f6b9d59f291',
              'm13_03_1.part': '968e735d172a9e2f3ccf464ae0e12975d4af884d8a61e7c8618d53d2f433c7d5',
              'm13_03_2.part': '44e247e14fa405576d5137f71ccb1777349a792c4895d73d035395527d0fd0d3',
              'm13_04_1.part': '36a148dec058a1e4a799073aa294954a898aa00dac536367a58ae24a76448941',
              'm13_04_2.part': 'b42bf8461211825fb57379a8aee650d4ac6e0e18e5113cc61a020acbdaac079f',
          }
          source_dir = Path('.github/dm857_source')
          lines = []
          for name, wanted in expected.items():
              path = source_dir / name
              actual = sha256(path.read_bytes()).hexdigest() if path.exists() else 'MISSING'
              lines.append(f'{name} expected={wanted} actual={actual} match={actual == wanted}')
          Path('.github/dm857_source_hashes.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/dm857_source_hashes.txt
          git commit -m "Record DM857 module 13 source diagnostics"
          git push origin HEAD:feat/dm857-modules-13-15
