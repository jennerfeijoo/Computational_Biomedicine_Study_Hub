name: Materialize DM857 module 13

on:
  push:
    branches: [feat/dm857-modules-13-15]
    paths:
      - ".github/dm857_source/**"
      - ".github/workflows/materialize-dm857-module-13.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/dm857-modules-13-15

      - name: Reconstruct and verify module
        shell: bash
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          source_dir = Path('.github/dm857_source')
          parts = sorted(source_dir.glob('m13_*.part'))
          if not parts:
              raise SystemExit('No module 13 source parts found.')

          content = ''.join(part.read_text(encoding='utf-8') for part in parts)
          target = Path('src/computational_biomedicine_study_hub/content/dm857/module_13_scientific_libraries.py')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(content, encoding='utf-8')

          digest = sha256(target.read_bytes()).hexdigest()
          expected = '5608dd3033cca4a19b40955a623dc942240c86df264d8fa12fe0f8f1510e9e04'
          if digest != expected:
              raise SystemExit(f'Unexpected module hash: {digest}')
          compile(target.read_text(encoding='utf-8'), str(target), 'exec')
          PY

      - name: Remove transfer material and commit
        shell: bash
        run: |
          rm -rf .github/dm857_source .github/dm857_payload
          rm -f .github/workflows/materialize-dm857-module-13.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add DM857 module 13 scientific libraries"
          git push origin HEAD:feat/dm857-modules-13-15
