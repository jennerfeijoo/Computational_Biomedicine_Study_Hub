name: Format assessment identity changes

on:
  push:
    branches:
      - feat/assessment-identity-module-bundles

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/assessment-identity-module-bundles

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format changed Python files
        run: |
          ruff format src/computational_biomedicine_study_hub/content/models.py
          ruff format src/computational_biomedicine_study_hub/content/localized_models.py
          ruff format src/computational_biomedicine_study_hub/content/bundles.py
          ruff format src/computational_biomedicine_study_hub/content/__init__.py
          ruff format src/computational_biomedicine_study_hub/content/dm857/__init__.py
          ruff format src/computational_biomedicine_study_hub/courses/dm857.py
          ruff format src/computational_biomedicine_study_hub/learning/objective_assessment.py
          ruff format src/computational_biomedicine_study_hub/ui/widgets/objective_assessment_widget.py
          ruff format src/computational_biomedicine_study_hub/ui/pages/module_reader_page.py
          ruff format tests/test_objective_assessment.py
          ruff format tests/test_dm857_module_reader.py
          ruff format tests/test_module_bundles.py

      - name: Commit formatting and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/format_assessment_identity.yml
          git add .
          git commit -m "format assessment identity and module bundle changes"
          git push origin HEAD:feat/assessment-identity-module-bundles
