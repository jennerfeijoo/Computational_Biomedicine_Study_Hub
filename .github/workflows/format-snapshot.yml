name: Format Snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.5,<1"

      - name: Format repository
        run: ruff format .

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-guided-practice
          path: |
            src/computational_biomedicine_study_hub/learning/guided_practice.py
            src/computational_biomedicine_study_hub/ui/pages/module_reader_page.py
            src/computational_biomedicine_study_hub/ui/widgets/__init__.py
            src/computational_biomedicine_study_hub/ui/widgets/guided_practice_styles.py
            src/computational_biomedicine_study_hub/ui/widgets/guided_practice_widget.py
            tests/test_dm857_module_reader.py
            tests/test_guided_practice.py
