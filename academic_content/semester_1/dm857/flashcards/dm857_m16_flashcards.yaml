schema_version: 1.0.0
course_code: DM857
module_id: dm857.m16
content_version: 1.0.0
status: academically_reviewed_draft
card_count: 30

cards:
  - {id: dm857.m16.f01, mode: conceptual, card_type: definition, difficulty: foundational, front: {es: ¿Qué es el alcance de un proyecto?, en: What is project scope?, da: Hvad er projektets afgrænsning?}, back: {es: La definición explícita de usuarios, problema, capacidades incluidas, exclusiones, datos, restricciones y condiciones de éxito., en: The explicit definition of users, problem, included capabilities, exclusions, data, constraints, and success conditions., da: Den eksplicitte definition af brugere, problem, inkluderede funktioner, eksklusioner, data, begrænsninger og succes.}, linked_objectives: [m16.o1]}
  - {id: dm857.m16.f02, mode: conceptual, card_type: comparison, difficulty: foundational, front: {es: Requisito funcional frente a no funcional., en: Functional versus non-functional requirement., da: Funktionelt versus ikke-funktionelt krav.}, back: {es: El funcional describe una conducta del sistema; el no funcional una restricción o cualidad como reproducibilidad, rendimiento, seguridad o portabilidad., en: A functional requirement describes system behavior; a non-functional one describes a constraint or quality such as reproducibility, performance, security, or portability., da: Et funktionelt krav beskriver adfærd; et ikke-funktionelt krav en kvalitet eller begrænsning som reproducerbarhed eller ydelse.}, linked_objectives: [m16.o1]}
  - {id: dm857.m16.f03, mode: practical, card_type: requirement_quality, difficulty: intermediate, front: {es: ¿Por qué “debe ser rápido” es un requisito débil?, en: Why is “must be fast” a weak requirement?, da: Hvorfor er “skal være hurtigt” et svagt krav?}, back: {es: No define carga, tamaño, métrica, entorno ni umbral. No puede aceptarse o rechazarse objetivamente., en: It defines no workload, size, metric, environment, or threshold, so it cannot be objectively accepted or rejected., da: Det definerer ikke belastning, størrelse, metrik, miljø eller tærskel og kan derfor ikke vurderes objektivt.}, linked_objectives: [m16.o1]}
  - {id: dm857.m16.f04, mode: conceptual, card_type: acceptance, difficulty: foundational, front: {es: ¿Qué es un criterio de aceptación?, en: What is an acceptance criterion?, da: Hvad er et acceptkriterium?}, back: {es: Una condición observable y verificable que determina si un requisito se cumple., en: An observable, verifiable condition determining whether a requirement is met., da: En observerbar og verificerbar betingelse for om et krav er opfyldt.}, linked_objectives: [m16.o1]}
  - {id: dm857.m16.f05, mode: conceptual, card_type: traceability, difficulty: intermediate, front: {es: ¿Qué conecta la trazabilidad?, en: What does traceability connect?, da: Hvad forbinder sporbarhed?}, back: {es: Requisitos con componentes, decisiones, pruebas, resultados, riesgos y afirmaciones del informe., en: Requirements with components, decisions, tests, results, risks, and report claims., da: Krav med komponenter, beslutninger, test, resultater, risici og rapportpåstande.}, linked_objectives: [m16.o1, m16.o6, m16.o7]}
  - {id: dm857.m16.f06, mode: practical, card_type: traceability_audit, difficulty: advanced, front: {es: ¿Qué revela un requisito sin prueba asociada?, en: What does a requirement without an associated test reveal?, da: Hvad afslører et krav uden tilknyttet test?}, back: {es: Una brecha de validación: el proyecto afirma una conducta sin evidencia ejecutable suficiente., en: A validation gap: the project claims behavior without sufficient executable evidence., da: Et valideringshul: projektet hævder en adfærd uden tilstrækkelig eksekverbar evidens.}, linked_objectives: [m16.o6, m16.o8]}
  - {id: dm857.m16.f07, mode: conceptual, card_type: architecture, difficulty: intermediate, front: {es: ¿Qué hace modular a una arquitectura?, en: What makes an architecture modular?, da: Hvad gør en arkitektur modulær?}, back: {es: Responsabilidades cohesionadas, contratos claros, dependencias controladas, componentes sustituibles y posibilidad de probarlos aisladamente; no simplemente muchos archivos., en: Cohesive responsibilities, clear contracts, controlled dependencies, substitutable components, and isolated testability; not merely many files., da: Sammenhængende ansvar, klare kontrakter, kontrollerede afhængigheder, udskiftelige komponenter og isoleret testbarhed; ikke blot mange filer.}, linked_objectives: [m16.o2]}
  - {id: dm857.m16.f08, mode: practical, card_type: architecture_boundary, difficulty: advanced, front: {es: ¿Qué debe definir una frontera entre componentes?, en: What should a component boundary define?, da: Hvad bør en komponentgrænse definere?}, back: {es: Tipos/formato de entrada, resultado, errores, efectos secundarios, invariantes, propiedad del estado y dependencias permitidas., en: Input types/formats, result, errors, side effects, invariants, state ownership, and allowed dependencies., da: Inputtyper/formater, resultat, fejl, sideeffekter, invarianter, tilstandsejerskab og tilladte afhængigheder.}, linked_objectives: [m16.o2]}
  - {id: dm857.m16.f09, mode: conceptual, card_type: dependency_direction, difficulty: advanced, front: {es: ¿Por qué el núcleo no debería depender de la interfaz gráfica?, en: Why should core logic not depend on the UI?, da: Hvorfor bør kernen ikke afhænge af UI?}, back: {es: Acopla cálculo a presentación, dificulta pruebas y sustitución, y propaga detalles de eventos o widgets al dominio. La UI debe adaptar el núcleo, no definirlo., en: It couples computation to presentation, hinders testing and substitution, and leaks UI details into the domain. The UI should adapt the core., da: Det kobler beregning til præsentation, hæmmer test og lader UI-detaljer lække ind i domænet.}, linked_objectives: [m16.o2]}
  - {id: dm857.m16.f10, mode: conceptual, card_type: data_contract, difficulty: intermediate, front: {es: Componentes de un contrato de datos., en: Components of a data contract., da: Komponenter i en datakontrakt.}, back: {es: Esquema, tipos, unidades, dominios, identificadores, cardinalidad, ausentes, duplicados, encoding, versión y política de rechazo., en: Schema, types, units, domains, identifiers, cardinality, missingness, duplicates, encoding, version, and rejection policy., da: Skema, typer, enheder, domæner, identifikatorer, kardinalitet, manglende data, dubletter, encoding, version og afvisningspolitik.}, linked_objectives: [m16.o3]}
  - {id: dm857.m16.f11, mode: conceptual, card_type: provenance, difficulty: intermediate, front: {es: ¿Qué debe registrar la procedencia de datos?, en: What should data provenance record?, da: Hvad bør dataproveniens registrere?}, back: {es: Origen, responsable/publicador, versión, fecha, licencia, método de obtención, transformaciones y checksum o identificador estable., en: Source, publisher/owner, version, date, license, acquisition method, transformations, and checksum or stable identifier., da: Kilde, udgiver/ejer, version, dato, licens, hentningsmetode, transformationer og checksum eller stabil identifikator.}, linked_objectives: [m16.o3, m16.o5]}
  - {id: dm857.m16.f12, mode: conceptual, card_type: privacy, difficulty: advanced, front: {es: Riesgos de subir datos sensibles o logs completos al repositorio., en: Risks of committing sensitive data or full logs., da: Risici ved at committe følsomme data eller fulde logs.}, back: {es: Exposición persistente en historial, acceso no autorizado, incumplimiento de consentimiento/política y dificultad de borrado real. Deben minimizarse, excluirse y revisarse secretos., en: Persistent history exposure, unauthorized access, consent/policy violations, and difficult deletion. Minimize, exclude, and scan for secrets., da: Vedvarende eksponering i historik, uautoriseret adgang, policybrud og vanskelig sletning. Data skal minimeres og hemmeligheder scannes.}, linked_objectives: [m16.o3, m16.o8]}
  - {id: dm857.m16.f13, mode: conceptual, card_type: synthetic_data, difficulty: intermediate, front: {es: ¿Cómo deben presentarse datos sintéticos?, en: How should synthetic data be presented?, da: Hvordan bør syntetiske data præsenteres?}, back: {es: Identificados explícitamente, con método de generación, limitaciones y prohibición de interpretar sus patrones como evidencia clínica real., en: Explicitly labeled, with generation method and limitations, and without interpreting patterns as real clinical evidence., da: Eksplicit mærket med genereringsmetode og begrænsninger uden klinisk fortolkning.}, linked_objectives: [m16.o3]}
  - {id: dm857.m16.f14, mode: conceptual, card_type: collaboration, difficulty: intermediate, front: {es: ¿Qué es un entregable vertical?, en: What is a vertical deliverable?, da: Hvad er en vertikal leverance?}, back: {es: Una porción pequeña pero completa que atraviesa las capas necesarias y puede ejecutarse, probarse y revisarse de extremo a extremo., en: A small complete slice crossing necessary layers that can be run, tested, and reviewed end to end., da: En lille komplet del der krydser nødvendige lag og kan køres, testes og reviewes end-to-end.}, linked_objectives: [m16.o4]}
  - {id: dm857.m16.f15, mode: practical, card_type: version_control, difficulty: intermediate, front: {es: Características de un commit útil., en: Characteristics of a useful commit., da: Kendetegn ved et nyttigt commit.}, back: {es: Cambio coherente y limitado, mensaje que explica intención, estado ejecutable o justificadamente intermedio y sin archivos accidentales o secretos., en: Coherent limited change, intention-revealing message, executable or justified intermediate state, and no accidental files or secrets., da: Sammenhængende begrænset ændring, forklarende besked, kørbar eller begrundet mellemtilstand og ingen utilsigtede filer eller hemmeligheder.}, linked_objectives: [m16.o4]}
  - {id: dm857.m16.f16, mode: practical, card_type: integration, difficulty: advanced, front: {es: ¿Por qué integrar frecuentemente?, en: Why integrate frequently?, da: Hvorfor integrere hyppigt?}, back: {es: Reduce divergencia, detecta incompatibilidades temprano, mantiene feedback compartido y evita una integración final extensa e incierta., en: It reduces divergence, detects incompatibilities early, shares feedback, and avoids a large uncertain final integration., da: Det reducerer divergens, opdager inkompatibilitet tidligt og undgår stor usikker slutintegration.}, linked_objectives: [m16.o4]}
  - {id: dm857.m16.f17, mode: conceptual, card_type: reproducibility, difficulty: intermediate, front: {es: ¿Qué significa reproducción limpia?, en: What is clean reproduction?, da: Hvad er ren reproduktion?}, back: {es: Reconstruir y ejecutar el proyecto desde un entorno nuevo usando sólo las instrucciones y artefactos registrados., en: Rebuilding and running the project from a fresh environment using only recorded instructions and artifacts., da: At genopbygge og køre projektet fra et nyt miljø kun med registrerede instruktioner og artefakter.}, linked_objectives: [m16.o5]}
  - {id: dm857.m16.f18, mode: practical, card_type: reproducibility_failure, difficulty: advanced, front: {es: Señales de dependencias implícitas., en: Signs of implicit dependencies., da: Tegn på implicitte afhængigheder.}, back: {es: Rutas absolutas, archivos no versionados, variables globales, orden manual de notebook, paquetes instalados pero no declarados y configuración local oculta., en: Absolute paths, unversioned files, globals, manual notebook order, undeclared installed packages, and hidden local configuration., da: Absolutte stier, ikke-versionerede filer, global tilstand, manuel notebookrækkefølge, ikke-deklarerede pakker og skjult lokal konfiguration.}, linked_objectives: [m16.o5, m16.o8]}
  - {id: dm857.m16.f19, mode: conceptual, card_type: evidence_hierarchy, difficulty: advanced, front: {es: Evidencia adecuada para corrección, integración, reproducibilidad y rendimiento., en: Suitable evidence for correctness, integration, reproducibility, and performance., da: Passende evidens for korrekthed, integration, reproducerbarhed og ydelse.}, back: {es: Pruebas unitarias/referencia; pruebas de integración; ejecución desde clon limpio; benchmark reproducible. Cada claim requiere el método correspondiente., en: Unit/reference tests; integration tests; clean-clone execution; reproducible benchmark. Each claim needs matching evidence., da: Unit-/referencetest, integrationstest, ren klon-kørsel og reproducerbart benchmark. Hver påstand kræver passende evidens.}, linked_objectives: [m16.o6]}
  - {id: dm857.m16.f20, mode: conceptual, card_type: validation, difficulty: advanced, front: {es: ¿Por qué una demostración exitosa es evidencia débil?, en: Why is one successful demonstration weak evidence?, da: Hvorfor er én succesfuld demonstration svag evidens?}, back: {es: Cubre una ruta seleccionada, puede depender de estado oculto y no prueba límites, errores, generalidad ni reproducibilidad., en: It covers one selected path, may rely on hidden state, and does not test boundaries, errors, generality, or reproducibility., da: Den dækker én valgt vej, kan afhænge af skjult tilstand og tester ikke grænser, fejl, generalitet eller reproducerbarhed.}, linked_objectives: [m16.o6, m16.o8]}
  - {id: dm857.m16.f21, mode: conceptual, card_type: report_argument, difficulty: intermediate, front: {es: ¿Qué estructura argumental debe seguir el informe?, en: What argumentative structure should the report follow?, da: Hvilken argumentstruktur bør rapporten følge?}, back: {es: Problema y requisitos → diseño → implementación relevante → validación → resultados → discusión/limitaciones → conclusión., en: Problem and requirements → design → relevant implementation → validation → results → discussion/limitations → conclusion., da: Problem og krav → design → relevant implementering → validering → resultater → diskussion/begrænsninger → konklusion.}, linked_objectives: [m16.o7]}
  - {id: dm857.m16.f22, mode: practical, card_type: page_budget, difficulty: intermediate, front: {es: ¿Por qué asignar presupuesto de páginas temprano?, en: Why allocate a page budget early?, da: Hvorfor fordele sidebudget tidligt?}, back: {es: Para garantizar espacio a validación, resultados y discusión y evitar que introducción o descripción de código consuman el límite., en: To protect space for validation, results, and discussion from an oversized introduction or code description., da: For at sikre plads til validering, resultater og diskussion og undgå at introduktion eller kodebeskrivelse bruger hele grænsen.}, linked_objectives: [m16.o7]}
  - {id: dm857.m16.f23, mode: conceptual, card_type: report_code, difficulty: intermediate, front: {es: ¿Cuánto código debe contener el informe?, en: How much code should the report contain?, da: Hvor meget kode bør rapporten indeholde?}, back: {es: Sólo fragmentos mínimos o pseudocódigo necesarios para explicar una decisión. La implementación completa se referencia en el repositorio., en: Only minimal excerpts or pseudocode needed to explain a decision. Full implementation is referenced in the repository., da: Kun minimale uddrag eller pseudokode til at forklare en beslutning; fuld implementering findes i repository.}, linked_objectives: [m16.o7]}
  - {id: dm857.m16.f24, mode: conceptual, card_type: results_discussion, difficulty: intermediate, front: {es: Resultados frente a discusión., en: Results versus discussion., da: Resultater versus diskussion.}, back: {es: Resultados presenta evidencia; discusión interpreta, compara alternativas, explica implicaciones y analiza amenazas a validez., en: Results present evidence; discussion interprets, compares alternatives, explains implications, and analyzes validity threats., da: Resultater viser evidens; diskussion fortolker, sammenligner alternativer og analyserer validitetstrusler.}, linked_objectives: [m16.o7]}
  - {id: dm857.m16.f25, mode: conceptual, card_type: limitation, difficulty: advanced, front: {es: Características de una limitación útil., en: Characteristics of a useful limitation., da: Kendetegn ved en nyttig begrænsning.}, back: {es: Es específica, explica impacto sobre interpretación/generalización y, cuando es posible, indica mitigación o trabajo futuro realista., en: It is specific, explains impact on interpretation/generalization, and where possible identifies mitigation or realistic future work., da: Den er specifik, forklarer effekt på fortolkning/generalisation og angiver mulig afhjælpning eller realistisk fremtidigt arbejde.}, linked_objectives: [m16.o7, m16.o8]}
  - {id: dm857.m16.f26, mode: practical, card_type: claim_editing, difficulty: advanced, front: {es: Mejora la afirmación “el sistema funciona perfectamente”., en: Improve the claim “the system works perfectly”., da: Forbedr påstanden “systemet virker perfekt”.}, back: {es: “Bajo los archivos válidos y casos inválidos definidos, la versión evaluada produjo los resultados de referencia y errores esperados en el entorno registrado; no se evaluaron otras escalas o formatos”., en: “For the defined valid and invalid cases, the evaluated version matched reference outputs and expected errors in the recorded environment; other scales and formats were not evaluated.”, da: “For de definerede gyldige og ugyldige cases matchede den evaluerede version referenceoutput og forventede fejl i det registrerede miljø; andre skalaer og formater blev ikke evalueret.”}, linked_objectives: [m16.o7, m16.o8]}
  - {id: dm857.m16.f27, mode: conceptual, card_type: risk_register, difficulty: advanced, front: {es: Campos de un registro de riesgos., en: Fields in a risk register., da: Felter i et risikoregister.}, back: {es: Riesgo/evento, probabilidad, impacto, señal temprana, mitigación, contingencia, responsable y estado., en: Risk/event, probability, impact, early signal, mitigation, contingency, owner, and status., da: Risiko/hændelse, sandsynlighed, effekt, tidligt signal, afhjælpning, beredskab, ansvarlig og status.}, linked_objectives: [m16.o4, m16.o8]}
  - {id: dm857.m16.f28, mode: conceptual, card_type: technical_debt, difficulty: advanced, front: {es: ¿Cómo registrar deuda técnica responsablemente?, en: How should technical debt be recorded responsibly?, da: Hvordan registreres teknisk gæld ansvarligt?}, back: {es: Describir el compromiso, razón, consecuencias, áreas afectadas, riesgo, criterio para resolverlo y plan/prioridad; no ocultarlo como “trabajo futuro” vago., en: Describe compromise, reason, consequences, affected areas, risk, resolution criterion, and plan/priority; do not hide it as vague future work., da: Beskriv kompromis, årsag, konsekvenser, berørte områder, risiko, løsningskriterium og plan/prioritet.}, linked_objectives: [m16.o8]}
  - {id: dm857.m16.f29, mode: integrative, card_type: oral_defense, difficulty: advanced, front: {es: ¿Cómo defender la arquitectura del proyecto?, en: How should project architecture be defended?, da: Hvordan forsvares projektarkitekturen?}, back: {es: Relacionar cada componente con requisitos, explicar contratos y dependencias, mostrar alternativas consideradas, evidencia de pruebas y consecuencias conocidas., en: Link each component to requirements, explain contracts and dependencies, show considered alternatives, test evidence, and known consequences., da: Forbind hver komponent med krav, forklar kontrakter og afhængigheder, vis alternativer, testevidens og kendte konsekvenser.}, linked_objectives: [m16.o2, m16.o6, m16.o8]}
  - {id: dm857.m16.f30, mode: integrative, card_type: synthesis, difficulty: advanced, front: {es: Lista de control de cierre del proyecto., en: Project closure checklist., da: Tjekliste til projektafslutning.}, back: {es: Alcance congelado; requisitos trazados; datos/licencias auditados; secretos ausentes; pruebas y benchmark ejecutados; clon limpio reproducido; informe consistente; claims limitados; riesgos y errores conocidos declarados; presentación alineada., en: Frozen scope; traced requirements; audited data/licenses; no secrets; tests and benchmarks run; clean clone reproduced; consistent report; bounded claims; known risks/errors declared; aligned presentation., da: Fastlagt afgrænsning, sporbare krav, data/licenser audit, ingen hemmeligheder, kørte test/benchmarks, ren reproduktion, konsistent rapport, begrænsede claims og erklærede risici.}, linked_objectives: [m16.o1, m16.o2, m16.o3, m16.o4, m16.o5, m16.o6, m16.o7, m16.o8]}
