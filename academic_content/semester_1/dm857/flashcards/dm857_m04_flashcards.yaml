  - id: dm857.m04.f22
    mode: practical
    card_type: debugging
    difficulty: advanced
    front:
      es: Una función modifica una variable global. ¿Cuál es el problema y cómo se rediseña?
      en: A function modifies a global variable. What is the problem and how should it be redesigned?
      da: En funktion ændrer en global variabel. Hvad er problemet og hvordan redesignes den?
    back:
      es: >-
        Introduce dependencia y efecto ocultos: el resultado depende del historial y las pruebas se contaminan.
        Preferentemente, pasa el estado como argumento y retorna el estado nuevo. Si el estado compartido es realmente
        necesario, encapsúlalo y documenta explícitamente su ciclo de vida.
      en: >-
        It introduces hidden dependency and effect: results depend on history and tests contaminate one another.
        Prefer passing state as an argument and returning new state. If shared state is necessary, encapsulate and document it.
      da: >-
        Det skaber skjult afhængighed og effekt. Send helst tilstanden som argument og returnér ny tilstand. Nødvendig
        delt tilstand bør indkapsles og dokumenteres.
    linked_objectives: [m04.o4, m04.o5, m04.o6]
    linked_concepts: [local-scope-lifetime, pure-functions-side-effects]
    tags: [global_state, refactoring, dependency]
    reverse_allowed: false

  - id: dm857.m04.f23
    mode: integrative
    card_type: oral_defense
    difficulty: advanced
    front:
      es: Defiende por qué separar cálculo de entrada/salida mejora un programa científico.
      en: Defend why separating computation from I/O improves a scientific program.
      da: Forsvar hvorfor adskillelse af beregning og I/O forbedrer et videnskabeligt program.
    back:
      es: >-
        Permite probar el cálculo con datos controlados, reutilizarlo en archivo, interfaz o notebook, reducir dependencias
        ambientales y aislar fallos. También hace explícita la procedencia: una función obtiene datos, otra transforma y
        otra presenta. La limitación es que la separación debe seguir responsabilidades reales, no crear capas vacías.
      en: >-
        It enables controlled testing, reuse across files, interfaces, or notebooks, reduced environmental dependency,
        and isolated failures. It also makes provenance and data flow explicit. Separation should reflect real responsibilities.
      da: >-
        Det muliggør kontrolleret test, genbrug, færre miljøafhængigheder og isolerede fejl. Dataflow og proveniens bliver
        tydeligere, men opdelingen skal følge reelle ansvar.
    linked_objectives: [m04.o5, m04.o6, m04.o7]
    linked_concepts: [pure-functions-side-effects, decomposition-composition]
    tags: [scientific_programming, I/O, defense]
    reverse_allowed: false

  - id: dm857.m04.f24
    mode: integrative
    card_type: design_review
    difficulty: advanced
    front:
      es: ¿Qué revisarías antes de aprobar una función para uso en un pipeline reproducible?
      en: What would you review before approving a function for a reproducible pipeline?
      da: Hvad ville du gennemgå før en funktion godkendes til en reproducerbar pipeline?
    back:
      es: >-
        Responsabilidad y nombre; contrato y unidades; tipos conceptuales; política de entrada vacía y errores;
        ausencia o documentación de efectos; flujo explícito de argumentos y retornos; rutas de retorno completas;
        pruebas normales, límite e inválidas; ejemplos reproducibles; y documentación de limitaciones.
      en: >-
        Responsibility and name; contract and units; conceptual types; empty-input and error policy; absence or
        documentation of effects; explicit arguments and returns; complete return paths; normal, boundary, and invalid
        tests; reproducible examples; and documented limitations.
      da: >-
        Ansvar og navn; kontrakt og enheder; konceptuelle typer; fejlpolitik; effekter; eksplicit dataflow; komplette
        returveje; normale, grænse- og ugyldige test; reproducerbare eksempler og begrænsninger.
    linked_objectives: [m04.o1, m04.o5, m04.o6, m04.o7, m04.o8]
    linked_concepts: [definition-call-interface, contracts-docstrings-errors, decomposition-composition]
    tags: [review, reproducibility, quality]
    reverse_allowed: false
