card_count: 24

cards:
  - id: dm857.m03.f01
    mode: conceptual
    card_type: definition
    difficulty: foundational
    front:
      es: "¿Qué es una iteración?"
      en: "What is an iteration?"
      da: "Hvad er en iteration?"
    back:
      es: >-
        Una iteración es una ejecución del cuerpo de un bucle. Durante ella, el programa parte de un
        estado, evalúa o ya ha evaluado una regla de continuación, realiza trabajo y produce un estado
        nuevo. El número total de iteraciones depende de la condición y de cómo cambie el estado.
      en: >-
        An iteration is one execution of a loop body. During it, the program starts from a state,
        evaluates or has already evaluated a continuation rule, performs work, and produces a new state.
      da: >-
        En iteration er én udførelse af en løkkekrop, der omdanner én programtilstand til en ny.
    linked_objectives: [m03.o1]
    linked_concepts: [iteration-as-state-transition]
    tags: [iteration, state]

  - id: dm857.m03.f02
    mode: conceptual
    card_type: mechanism
    difficulty: foundational
    front:
      es: "¿Cuáles son los cuatro componentes esenciales de un bucle `while` bien diseñado?"
      en: "What are the four essential components of a well-designed `while` loop?"
      da: "Hvad er de fire væsentlige dele af en veldesignet `while`-løkke?"
    back:
      es: >-
        Inicialización, condición de continuación, cuerpo de trabajo y actualización. La inicialización
        establece un estado válido; la condición decide si se repite; el cuerpo realiza el trabajo; la
        actualización modifica el estado y debe contribuir a la terminación.
      en: >-
        Initialization, continuation condition, work body, and update. Initialization establishes valid
        state; the condition decides repetition; the body performs work; the update changes state toward termination.
      da: >-
        Initialisering, fortsættelsesbetingelse, løkkekrop og opdatering. Opdateringen skal føre mod afslutning.
    linked_objectives: [m03.o2]
    linked_concepts: [while-loop-anatomy]
    tags: [while, initialization, update]

  - id: dm857.m03.f03
    mode: conceptual
    card_type: misconception_correction
    difficulty: foundational
    front:
      es: "Corrige: “El cuerpo de un `while` se ejecuta al menos una vez”."
      en: "Correct: “A `while` body executes at least once.”"
      da: "Ret: “En `while`-krop udføres mindst én gang.”"
    back:
      es: >-
        `while` comprueba su condición antes de ejecutar el cuerpo. Si la condición es falsa desde el
        inicio, se ejecutan cero iteraciones. Ese caso puede ser correcto y debe incluirse en las pruebas.
      en: >-
        `while` checks its condition before executing the body. If the condition is initially false,
        zero iterations execute. This may be correct and should be tested.
      da: >-
        `while` kontrollerer betingelsen før kroppen. Hvis den er falsk fra starten, udføres nul iterationer.
    linked_objectives: [m03.o2, m03.o8]
    linked_concepts: [while-loop-anatomy]
    tags: [zero-iterations, misconception]

  - id: dm857.m03.f04
    mode: conceptual
    card_type: definition
    difficulty: intermediate
    front:
      es: "¿Qué es una medida de progreso en un bucle?"
      en: "What is a loop progress measure?"
      da: "Hvad er et fremdriftsmål i en løkke?"
    back:
      es: >-
        Es una cantidad acotada que cambia de manera predecible en cada iteración y se acerca a una
        condición de salida. Por ejemplo, en `while i < n` con `i += 1`, `n - i` disminuye hasta cero.
        Una medida de progreso ayuda a argumentar que el bucle termina.
      en: >-
        It is a bounded quantity that changes predictably each iteration and approaches an exit condition.
        In `while i < n` with `i += 1`, `n - i` decreases toward zero.
      da: >-
        Et fremdriftsmål er en afgrænset størrelse, der ændres forudsigeligt mod en udgangsbetingelse.
    linked_objectives: [m03.o2]
    linked_concepts: [termination-progress-and-invariants]
    tags: [termination, progress]

  - id: dm857.m03.f05
    mode: conceptual
    card_type: definition
    difficulty: intermediate
    front:
      es: "¿Qué es un invariante de bucle?"
      en: "What is a loop invariant?"
      da: "Hvad er en løkkeinvariant?"
    back:
      es: >-
        Es una propiedad que debe ser verdadera antes de la primera iteración y conservarse después de
        cada iteración. Describe el significado del estado parcial. Ejemplo: tras procesar `k` valores,
        `total` contiene la suma de esos `k` valores.
      en: >-
        It is a property that holds before the first iteration and remains true after every iteration.
        It describes the meaning of partial state. Example: after processing `k` values, `total` contains their sum.
      da: >-
        En invariant er en egenskab, der gælder før første iteration og efter hver iteration.
    linked_objectives: [m03.o1, m03.o4, m03.o5]
    linked_concepts: [termination-progress-and-invariants]
    tags: [invariant, correctness]

  - id: dm857.m03.f06
    mode: conceptual
    card_type: comparison
    difficulty: intermediate
    front:
      es: "¿En qué se diferencian terminación y corrección parcial?"
      en: "How do termination and partial correctness differ?"
      da: "Hvordan adskiller afslutning og delvis korrekthed sig?"
    back:
      es: >-
        La terminación demuestra que el bucle finalmente se detiene. La corrección parcial demuestra que,
        si se detiene, el estado final satisface la especificación. Un bucle correcto requiere ambas:
        detenerse y producir el resultado adecuado.
      en: >-
        Termination shows that the loop eventually stops. Partial correctness shows that, if it stops,
        the final state satisfies the specification. Full correctness requires both.
      da: >-
        Afslutning viser, at løkken stopper. Delvis korrekthed viser, at sluttilstanden er korrekt, hvis den stopper.
    linked_objectives: [m03.o1, m03.o2]
    linked_concepts: [termination-progress-and-invariants]
    tags: [termination, partial-correctness]

  - id: dm857.m03.f07
    mode: conceptual
    card_type: code_pattern
    difficulty: foundational
    front:
      es: "¿Qué valores produce `range(5)`?"
      en: "What values does `range(5)` produce?"
      da: "Hvilke værdier producerer `range(5)`?"
    back:
      es: >-
        Produce `0, 1, 2, 3, 4`. El límite final 5 se excluye, por lo que hay exactamente cinco valores.
      en: >-
        It produces `0, 1, 2, 3, 4`. The stop value 5 is excluded, so there are exactly five values.
      da: >-
        Den producerer `0, 1, 2, 3, 4`. Stopværdien 5 er ekskluderet.
    linked_objectives: [m03.o3]
    linked_concepts: [for-loop-and-range]
    tags: [range, stop-exclusive]

  - id: dm857.m03.f08
    mode: conceptual
    card_type: formula
    difficulty: foundational
    front:
      es: "¿Qué incluyen y excluyen `start` y `stop` en `range(start, stop, step)`?"
      en: "What do `start` and `stop` include or exclude in `range(start, stop, step)`?"
      da: "Hvad inkluderes og ekskluderes af `start` og `stop` i `range(start, stop, step)`?"
    back:
      es: >-
        `start` se incluye y `stop` se excluye. `step` determina el cambio entre valores y no puede ser cero.
        Para predecir el resultado conviene escribir los primeros valores y comprobar cuándo el siguiente
        alcanzaría o atravesaría `stop`.
      en: >-
        `start` is included and `stop` is excluded. `step` determines the change and cannot be zero.
      da: >-
        `start` inkluderes, `stop` ekskluderes, og `step` må ikke være nul.
    linked_objectives: [m03.o3]
    linked_concepts: [for-loop-and-range]
    tags: [range, step, boundary]

  - id: dm857.m03.f09
    mode: conceptual
    card_type: misconception_correction
    difficulty: intermediate
    front:
      es: "Corrige: “`range(2, 10, 2)` produce también 10”."
      en: "Correct: “`range(2, 10, 2)` also produces 10.”"
      da: "Ret: “`range(2, 10, 2)` producerer også 10.”"
    back:
      es: >-
        Produce `2, 4, 6, 8`. El valor `stop` es exclusivo. Para incluir 10 con paso 2 podría usarse
        `range(2, 12, 2)`.
      en: >-
        It produces `2, 4, 6, 8`. The stop is exclusive. To include 10 with step 2, use `range(2, 12, 2)`.
      da: >-
        Den producerer `2, 4, 6, 8`. For at inkludere 10 kan `range(2, 12, 2)` bruges.
    linked_objectives: [m03.o3]
    linked_concepts: [for-loop-and-range]
    tags: [off-by-one, range]

  - id: dm857.m03.f10
    mode: conceptual
    card_type: definition
    difficulty: foundational
    front:
      es: "¿Qué es un contador?"
      en: "What is a counter?"
      da: "Hvad er en tæller?"
    back:
      es: >-
        Es una variable que registra cuántas veces ocurrió un evento. Suele inicializarse en cero y
        aumentar en uno cuando el evento ocurre. Su invariante debe indicar qué eventos se han contado.
      en: >-
        A counter records how many times an event occurred. It usually starts at zero and increments
        when the event occurs. Its invariant should state exactly what has been counted.
      da: >-
        En tæller registrerer, hvor mange gange en hændelse forekom, og starter normalt ved nul.
    linked_objectives: [m03.o4]
    linked_concepts: [counters-accumulators-flags-and-extrema]
    tags: [counter, state]

  - id: dm857.m03.f11
    mode: conceptual
    card_type: definition
    difficulty: foundational
    front:
      es: "¿Qué es un acumulador?"
      en: "What is an accumulator?"
      da: "Hvad er en akkumulator?"
    back:
      es: >-
        Es una variable que combina los valores procesados hasta el momento, por ejemplo mediante suma
        o producto. Debe inicializarse con un elemento neutro apropiado: cero para suma y uno para producto.
      en: >-
        An accumulator combines values processed so far, for example by sum or product. It should be
        initialized with the appropriate identity: zero for addition and one for multiplication.
      da: >-
        En akkumulator kombinerer hidtil behandlede værdier og initialiseres med et passende neutralt element.
    linked_objectives: [m03.o4]
    linked_concepts: [counters-accumulators-flags-and-extrema]
    tags: [accumulator, identity]

  - id: dm857.m03.f12
    mode: conceptual
    card_type: comparison
    difficulty: intermediate
    front:
      es: "Distingue contador, acumulador, indicador y variable de mejor valor."
      en: "Distinguish counter, accumulator, flag, and best-value variable."
      da: "Skeln mellem tæller, akkumulator, flag og bedste-værdi-variabel."
    back:
      es: >-
        El contador registra cantidad de eventos. El acumulador combina valores. El indicador booleano
        registra si una condición ocurrió. La variable de mejor valor conserva el máximo o mínimo observado.
        Cada patrón necesita inicialización y actualización coherentes con su significado.
      en: >-
        A counter records event count. An accumulator combines values. A Boolean flag records whether a
        condition occurred. A best-value variable retains the observed maximum or minimum.
      da: >-
        Tælleren registrerer antal, akkumulatoren kombinerer værdier, flaget registrerer en hændelse,
        og ekstremvariablen bevarer maksimum eller minimum.
    linked_objectives: [m03.o4]
    linked_concepts: [counters-accumulators-flags-and-extrema]
    tags: [counter, accumulator, flag, maximum]

  - id: dm857.m03.f13
    mode: practical
    card_type: output_interpretation
    difficulty: intermediate
    front:
      es: "Traza `i = 0; total = 0; while i < 3: total += i; i += 1`."
      en: "Trace `i = 0; total = 0; while i < 3: total += i; i += 1`."
      da: "Gennemgå `i = 0; total = 0; while i < 3: total += i; i += 1`."
    back:
      es: >-
        Después de cada iteración: "`(i=1, total=0)`, `(i=2, total=1)`, `(i=3, total=3)`. Entonces"
        `i < 3` es falso y el bucle termina. El total final es `0 + 1 + 2 = 3`.
      en: >-
        After each iteration: "`(i=1, total=0)`, `(i=2, total=1)`, `(i=3, total=3)`. Then `i < 3`"
        is false. Final total is `0 + 1 + 2 = 3`.
      da: >-
        Tilstandene er `(1,0)`, `(2,1)`, `(3,3)`, hvorefter løkken stopper.
    linked_objectives: [m03.o2, m03.o5]
    linked_concepts: [while-loop-anatomy, counters-accumulators-flags-and-extrema]
    tags: [trace, while, accumulator]

  - id: dm857.m03.f14
    mode: practical
    card_type: debugging
    difficulty: foundational
    front:
      es: "¿Por qué `i = 0; while i < 5: print(i)` es infinito?"
      en: "Why is `i = 0; while i < 5: print(i)` infinite?"
      da: "Hvorfor er `i = 0; while i < 5: print(i)` uendelig?"
    back:
      es: >-
        La condición depende de `i`, pero el cuerpo nunca modifica `i`. Por tanto, `i` permanece en cero
        y `i < 5` sigue siendo verdadero. Debe añadirse una actualización como `i += 1` o una salida válida.
      en: >-
        The condition depends on `i`, but the body never changes `i`. Therefore `i` remains zero and
        the condition stays true. Add an update such as `i += 1` or another valid exit.
      da: >-
        Betingelsen afhænger af `i`, men kroppen ændrer ikke `i`, så betingelsen forbliver sand.
    linked_objectives: [m03.o2, m03.o8]
    linked_concepts: [termination-progress-and-invariants]
    tags: [infinite-loop, debugging]

  - id: dm857.m03.f15
    mode: conceptual
    card_type: definition
    difficulty: foundational
    front:
      es: "¿Qué es un valor centinela?"
      en: "What is a sentinel value?"
      da: "Hvad er en stopværdi?"
    back:
      es: >-
        Es un valor reservado que indica el final de una secuencia de entrada cuando no se conoce su
        longitud de antemano. Debe distinguirse de los datos válidos y comprobarse antes de actualizar
        contadores o acumuladores.
      en: >-
        A sentinel is a reserved value marking the end of input when its length is not known in advance.
        It must be distinguishable from valid data and checked before updating state.
      da: >-
        En stopværdi er en reserveret værdi, der markerer afslutningen på input og kontrolleres før tilstandsopdatering.
    linked_objectives: [m03.o6]
    linked_concepts: [sentinels-break-and-continue]
    tags: [sentinel, input]

  - id: dm857.m03.f16
    mode: conceptual
    card_type: comparison
    difficulty: foundational
    front:
      es: "¿Cuál es la diferencia entre `break` y `continue`?"
      en: "What is the difference between `break` and `continue`?"
      da: "Hvad er forskellen mellem `break` og `continue`?"
    back:
      es: >-
        `break` termina inmediatamente el bucle más cercano. `continue` omite el resto de la iteración
        actual y pasa a la siguiente comprobación o valor. Ninguno debe usarse para ocultar una condición
        de salida que podría expresarse con claridad.
      en: >-
        `break` immediately exits the nearest loop. `continue` skips the rest of the current iteration
        and moves to the next condition check or value.
      da: >-
        `break` afslutter den nærmeste løkke; `continue` springer resten af den aktuelle iteration over.
    linked_objectives: [m03.o6]
    linked_concepts: [sentinels-break-and-continue]
    tags: [break, continue]

  - id: dm857.m03.f17
    mode: practical
    card_type: workflow_step
    difficulty: intermediate
    front:
      es: "¿En qué orden debe procesarse un centinela para evitar contaminar la suma?"
      en: "In what order should a sentinel be handled to avoid contaminating a sum?"
      da: "I hvilken rækkefølge skal en stopværdi håndteres for ikke at forurene en sum?"
    back:
      es: >-
        Leer el valor, comprobar inmediatamente si es el centinela y salir si corresponde. Solo después
        se actualizan suma, contador u otros estados. Así el centinela nunca forma parte de los datos procesados.
      en: >-
        Read the value, immediately check whether it is the sentinel, and exit if so. Only then update sum,
        count, or other state. The sentinel never becomes part of the processed data.
      da: >-
        Læs værdien, kontrollér straks stopværdien og opdatér først derefter sum og tæller.
    linked_objectives: [m03.o4, m03.o6]
    linked_concepts: [sentinels-break-and-continue]
    tags: [sentinel, accumulator, order]

  - id: dm857.m03.f18
    mode: conceptual
    card_type: formula
    difficulty: intermediate
    front:
      es: "Dos bucles anidados recorren `n` y `m` valores. ¿Cuántas veces se ejecuta el cuerpo interior?"
      en: "Two nested loops traverse `n` and `m` values. How many times does the inner body execute?"
      da: "To indlejrede løkker gennemløber `n` og `m` værdier. Hvor mange gange udføres den indre krop?"
    back:
      es: >-
        Si los límites son independientes, el cuerpo interior se ejecuta `n·m` veces. Cada una de las
        `n` iteraciones exteriores ejecuta las `m` interiores. El coste total puede ser mayor si el cuerpo
        interior realiza más de una operación significativa.
      en: >-
        With independent bounds, the inner body executes `n·m` times. Each of `n` outer iterations runs
        all `m` inner iterations. Total cost may be higher if the body itself is expensive.
      da: >-
        Ved uafhængige grænser udføres den indre krop `n·m` gange.
    linked_objectives: [m03.o7]
    linked_concepts: [nested-loops-and-operation-counts]
    tags: [nested-loops, operation-count]

  - id: dm857.m03.f19
    mode: conceptual
    card_type: misconception_correction
    difficulty: advanced
    front:
      es: "Corrige: “Dos bucles anidados siempre realizan `n²` iteraciones”."
      en: "Correct: “Two nested loops always perform `n²` iterations.”"
      da: "Ret: “To indlejrede løkker udfører altid `n²` iterationer.”"
    back:
      es: >-
        Solo ocurre cuando ambos límites son independientes y tienen tamaño `n`. Si los tamaños son `n`
        y `m`, el producto es `n·m`. Si el límite interior depende de `i`, como `range(i)`, se necesita
        sumar las longitudes interiores y puede aparecer una suma triangular.
      en: >-
        This only holds when both independent bounds have size `n`. Sizes `n` and `m` yield `n·m`.
        Dependent bounds such as `range(i)` require summing inner lengths.
      da: >-
        Det gælder kun ved to uafhængige grænser af størrelse `n`. Afhængige grænser kræver summering.
    linked_objectives: [m03.o7]
    linked_concepts: [nested-loops-and-operation-counts]
    tags: [complexity, misconception]

  - id: dm857.m03.f20
    mode: practical
    card_type: method_selection
    difficulty: intermediate
    front:
      es: "¿Cuándo elegir `for` y cuándo `while`?"
      en: "When should you choose `for` and when `while`?"
      da: "Hvornår bør du vælge `for`, og hvornår `while`?"
    back:
      es: >-
        `for` es preferible cuando se recorre una colección o un número acotado de valores. `while` es
        preferible cuando la repetición depende de una condición dinámica, como un centinela o convergencia.
        En ambos casos deben ser explícitos el criterio de terminación y las pruebas de límite.
      en: >-
        Prefer `for` for traversing a collection or bounded set of values. Prefer `while` when repetition
        depends on a dynamic condition such as a sentinel or convergence.
      da: >-
        Brug `for` til afgrænsede gennemløb og `while` til dynamiske afslutningsbetingelser.
    linked_objectives: [m03.o2, m03.o3, m03.o6]
    linked_concepts: [while-loop-anatomy, for-loop-and-range]
    tags: [method-selection, for, while]

  - id: dm857.m03.f21
    mode: practical
    card_type: test_design
    difficulty: intermediate
    front:
      es: "¿Qué casos mínimos deben probarse en un bucle acotado?"
      en: "What minimum cases should be tested for a bounded loop?"
      da: "Hvilke minimumstilfælde bør testes for en afgrænset løkke?"
    back:
      es: >-
        Un caso de cero iteraciones, uno de una iteración, un caso normal con varias iteraciones, el valor
        exacto del límite y una entrada inválida si el dominio la permite. Cada prueba necesita un resultado
        esperado y debe observar también la terminación.
      en: >-
        Test zero iterations, one iteration, a normal multi-iteration case, the exact boundary, and an
        invalid input when relevant. Each test needs an expected result and should observe termination.
      da: >-
        Test nul iterationer, én iteration, et normalt tilfælde, den præcise grænse og ugyldigt input.
    linked_objectives: [m03.o8]
    linked_concepts: [while-loop-anatomy, termination-progress-and-invariants]
    tags: [testing, boundary, termination]

  - id: dm857.m03.f22
    mode: practical
    card_type: debugging
    difficulty: intermediate
    front:
      es: "¿Qué error hay en sumar de 1 a `n` con la condición `while i < n` si `n` debe incluirse?"
      en: "What is wrong with summing 1 through `n` using `while i < n` when `n` must be included?"
      da: "Hvad er fejlen ved at summere 1 til `n` med `while i < n`, når `n` skal inkluderes?"
    back:
      es: >-
        Es un error lógico de uno en uno: el bucle se detiene antes de procesar `n`. Debe utilizarse
        `i <= n` o un `for` equivalente. La prueba `n=1` es especialmente reveladora porque el resultado
        incorrecto suele ser cero en lugar de uno.
      en: >-
        It is an off-by-one logic error: the loop stops before processing `n`. Use `i <= n` or an equivalent
        `for`. Test `n=1` is revealing because the incorrect result is often zero instead of one.
      da: >-
        Det er en grænsefejl: "`n` behandles ikke. Brug `i <= n` eller en tilsvarende `for`-løkke."
    linked_objectives: [m03.o2, m03.o3, m03.o8]
    linked_concepts: [for-loop-and-range, termination-progress-and-invariants]
    tags: [off-by-one, debugging]

  - id: dm857.m03.f23
    mode: integrative
    card_type: oral_or_report_defense
    difficulty: advanced
    front:
      es: "¿Cómo defenderías que un bucle termina?"
      en: "How would you defend that a loop terminates?"
      da: "Hvordan ville du forsvare, at en løkke afslutter?"
    back:
      es: >-
        Identificaría una medida de progreso, demostraría que cambia en cada iteración en la dirección
        correcta, que está acotada y que al alcanzar el límite la condición se vuelve falsa o se activa una
        salida explícita. También mostraría pruebas de cero, uno y varios pasos, pero distinguiría estas
        pruebas de una demostración general.
      en: >-
        I would identify a progress measure, show that it changes in the correct direction every iteration,
        is bounded, and eventually makes the condition false or triggers an explicit exit. Tests support but
        do not replace the general argument.
      da: >-
        Jeg ville identificere et fremdriftsmål, vise at det ændres mod en grænse og til sidst gør betingelsen falsk.
    linked_objectives: [m03.o2, m03.o5, m03.o8]
    linked_concepts: [termination-progress-and-invariants]
    tags: [oral-defense, termination, evidence]

  - id: dm857.m03.f24
    mode: integrative
    card_type: oral_or_report_defense
    difficulty: advanced
    front:
      es: "¿Cómo defenderías la corrección de un acumulador dentro de un bucle?"
      en: "How would you defend the correctness of an accumulator in a loop?"
      da: "Hvordan ville du forsvare korrektheden af en akkumulator i en løkke?"
    back:
      es: >-
        Declararía un invariante preciso, por ejemplo: después de procesar los primeros `k` elementos,
        `total` es su suma. Verificaría que es verdadero antes del bucle, que una iteración lo conserva y
        que, al terminar, `k` coincide con todos los elementos requeridos. Después aportaría pruebas con
        entrada vacía, un elemento y varios valores conocidos.
      en: >-
        I would state a precise invariant, such as: after the first `k` elements, `total` is their sum.
        I would show it holds initially, is preserved by one iteration, and implies the required result at termination.
      da: >-
        Jeg ville formulere en præcis invariant, vise at den gælder først, bevares af en iteration og giver slutresultatet.
    linked_objectives: [m03.o1, m03.o4, m03.o5, m03.o8]
    linked_concepts: [termination-progress-and-invariants, counters-accumulators-flags-and-extrema]
    tags: [invariant, accumulator, proof, testing]
