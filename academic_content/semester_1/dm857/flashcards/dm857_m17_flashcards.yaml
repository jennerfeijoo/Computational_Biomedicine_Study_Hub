schema_version: 1.0.0
course_code: DM857
module_id: dm857.m17
content_version: 1.0.0
status: academically_reviewed_draft
card_count: 30

cards:
  - {id: dm857.m17.f01, mode: conceptual, card_type: presentation_thesis, difficulty: foundational, front: {"es": "¿Qué es la tesis de una presentación técnica?", "en": "What is the thesis of a technical presentation?", "da": "Hvad er tesen i en teknisk præsentation?"}, back: {"es": "La afirmación central que conecta problema, enfoque, decisiones, evidencia y conclusión.", "en": "The central claim connecting problem, approach, decisions, evidence, and conclusion.", "da": "Den centrale påstand der forbinder problem, tilgang, beslutninger, evidens og konklusion."}, linked_objectives: [m17.o1]}
  - {id: dm857.m17.f02, mode: conceptual, card_type: narrative, difficulty: intermediate, front: {"es": "Secuencia mínima de una presentación de proyecto.", "en": "Minimal sequence for a project presentation.", "da": "Minimal rækkefølge for en projektpræsentation."}, back: {"es": "Problema/tesis, requisitos y datos, arquitectura, decisión técnica, validación, resultados, limitaciones y conclusión.", "en": "Problem/thesis, requirements and data, architecture, technical decision, validation, results, limitations, and conclusion.", "da": "Problem/tese, krav og data, arkitektur, teknisk beslutning, validering, resultater, begrænsninger og konklusion."}, linked_objectives: [m17.o1]}
  - {id: dm857.m17.f03, mode: practical, card_type: transition, difficulty: intermediate, front: {"es": "Función de una transición entre integrantes.", "en": "Purpose of a transition between speakers.", "da": "Formålet med en overgang mellem talere."}, back: {"es": "Explicar por qué el siguiente bloque se deriva del anterior y mantener una única narrativa, no sólo anunciar un nombre.", "en": "Explain why the next block follows from the previous one and preserve one narrative, not merely announce a name.", "da": "Forklar hvorfor næste blok følger af den forrige og bevar én fortælling, ikke blot annoncér et navn."}, linked_objectives: [m17.o1]}
  - {id: dm857.m17.f04, mode: conceptual, card_type: evidence_selection, difficulty: intermediate, front: {"es": "¿Cuándo merece una figura entrar en la presentación?", "en": "When should a figure be included in the presentation?", "da": "Hvornår bør en figur medtages i præsentationen?"}, back: {"es": "Cuando responde una pregunta relevante y sostiene una afirmación necesaria mejor que una explicación verbal o tabla.", "en": "When it answers a relevant question and supports a necessary claim better than prose or a table.", "da": "Når den besvarer et relevant spørgsmål og støtter en nødvendig påstand bedre end tekst eller tabel."}, linked_objectives: [m17.o2]}
  - {id: dm857.m17.f05, mode: practical, card_type: code_display, difficulty: intermediate, front: {"es": "¿Cómo mostrar código en una diapositiva?", "en": "How should code be shown on a slide?", "da": "Hvordan bør kode vises på et slide?"}, back: {"es": "Sólo un fragmento corto y legible, con la línea decisiva destacada, contexto mínimo y explicación de la decisión o invariante.", "en": "Only a short readable excerpt, with the decisive line highlighted, minimal context, and explanation of the decision or invariant.", "da": "Kun et kort læsbart uddrag med den afgørende linje fremhævet, minimal kontekst og forklaring af beslutning eller invariant."}, linked_objectives: [m17.o2]}
  - {id: dm857.m17.f06, mode: conceptual, card_type: visual_integrity, difficulty: advanced, front: {"es": "Información mínima de una gráfica presentada oralmente.", "en": "Minimum information for an orally presented graph.", "da": "Minimumsinformation for en graf i en mundtlig præsentation."}, back: {"es": "Variables, unidades, escala, grupos, n, transformación, resumen/intervalo, fuente y limitación principal.", "en": "Variables, units, scale, groups, n, transformation, summary/interval, source, and main limitation.", "da": "Variable, enheder, skala, grupper, n, transformation, resumé/interval, kilde og hovedbegrænsning."}, linked_objectives: [m17.o2, m17.o6]}
  - {id: dm857.m17.f07, mode: conceptual, card_type: demonstration, difficulty: intermediate, front: {"es": "Componentes de una demostración controlada.", "en": "Components of a controlled demonstration.", "da": "Komponenter i en kontrolleret demonstration."}, back: {"es": "Objetivo, entrada conocida, salida esperada, entorno ensayado, duración, contingencia y vínculo con evidencia ya validada.", "en": "Purpose, known input, expected output, rehearsed environment, duration, fallback, and link to already validated evidence.", "da": "Formål, kendt input, forventet output, øvet miljø, varighed, fallback og forbindelse til valideret evidens."}, linked_objectives: [m17.o2, m17.o6]}
  - {id: dm857.m17.f08, mode: conceptual, card_type: misconception, difficulty: intermediate, front: {"es": "¿Una demo prueba que el sistema es correcto?", "en": "Does a demo prove the system is correct?", "da": "Beviser en demo at systemet er korrekt?"}, back: {"es": "No. Ilustra una ruta seleccionada. La corrección requiere pruebas y evidencia sistemática sobre contratos, errores y límites.", "en": "No. It illustrates one selected path. Correctness needs systematic evidence on contracts, errors, and boundaries.", "da": "Nej. Den illustrerer én valgt vej. Korrekthed kræver systematisk evidens om kontrakter, fejl og grænser."}, linked_objectives: [m17.o6]}
  - {id: dm857.m17.f09, mode: practical, card_type: contingency, difficulty: intermediate, front: {"es": "Buen plan B para una demo que depende de red.", "en": "Good fallback for a network-dependent demo.", "da": "God fallback til en netværksafhængig demo."}, back: {"es": "Datos locales versionados y una salida reproducible previamente generada o video breve, claramente identificados como contingencia.", "en": "Versioned local data and a previously generated reproducible output or short video, clearly identified as fallback.", "da": "Versionerede lokale data og et tidligere genereret reproducerbart output eller kort video, tydeligt mærket som fallback."}, linked_objectives: [m17.o2]}
  - {id: dm857.m17.f10, mode: conceptual, card_type: architecture_defense, difficulty: advanced, front: {"es": "Elementos de una defensa de arquitectura.", "en": "Elements of an architecture defense.", "da": "Elementer i et arkitekturforsvar."}, back: {"es": "Requisitos, responsabilidades, contratos, flujo de datos, dependencia, errores, alternativas, trade-offs y evidencia de pruebas.", "en": "Requirements, responsibilities, contracts, data flow, dependency direction, errors, alternatives, trade-offs, and test evidence.", "da": "Krav, ansvar, kontrakter, dataflow, afhængigheder, fejl, alternativer, kompromiser og testevidens."}, linked_objectives: [m17.o3]}
  - {id: dm857.m17.f11, mode: practical, card_type: diagram_walkthrough, difficulty: advanced, front: {"es": "¿Cómo explicar un diagrama arquitectónico?", "en": "How should an architecture diagram be explained?", "da": "Hvordan forklares et arkitekturdiagram?"}, back: {"es": "Recorrer una entrada concreta desde origen hasta resultado, nombrando transformación, validación, estado, errores y contrato en cada frontera.", "en": "Walk one concrete input from source to result, naming transformation, validation, state, errors, and contract at each boundary.", "da": "Følg ét konkret input fra kilde til resultat og forklar transformation, validering, tilstand, fejl og kontrakt ved hver grænse."}, linked_objectives: [m17.o3]}
  - {id: dm857.m17.f12, mode: conceptual, card_type: answer_structure, difficulty: foundational, front: {"es": "Estructura recomendada de una respuesta oral.", "en": "Recommended structure for an oral answer.", "da": "Anbefalet struktur for et mundtligt svar."}, back: {"es": "Conclusión directa, mecanismo o evidencia, y límite, alternativa o implicación.", "en": "Direct conclusion, mechanism or evidence, and limitation, alternative, or implication.", "da": "Direkte konklusion, mekanisme eller evidens og begrænsning, alternativ eller implikation."}, linked_objectives: [m17.o8]}
  - {id: dm857.m17.f13, mode: practical, card_type: ambiguity, difficulty: intermediate, front: {"es": "¿Qué hacer ante una pregunta ambigua?", "en": "What should be done with an ambiguous question?", "da": "Hvad bør gøres ved et tvetydigt spørgsmål?"}, back: {"es": "Declarar la interpretación o pedir una aclaración breve antes de responder; no asumir silenciosamente un significado crítico.", "en": "State the interpretation or ask a brief clarification before answering; do not silently assume a critical meaning.", "da": "Angiv fortolkningen eller bed kort om afklaring før svar; antag ikke lydløst en kritisk betydning."}, linked_objectives: [m17.o8]}
  - {id: dm857.m17.f14, mode: practical, card_type: uncertainty, difficulty: advanced, front: {"es": "¿Cómo responder si no recuerdas una API exacta?", "en": "How should you answer if an exact API is not recalled?", "da": "Hvordan svarer man hvis en præcis API ikke huskes?"}, back: {"es": "Admitir el detalle incierto, explicar el principio y comportamiento requerido, razonar la solución y describir cómo verificar firma y caso mínimo.", "en": "Admit the uncertain detail, explain the principle and required behavior, reason through the solution, and state how to verify the signature and minimal case.", "da": "Indrøm den usikre detalje, forklar princippet og nødvendig adfærd, ræsonnér og angiv hvordan signatur og minimalt eksempel verificeres."}, linked_objectives: [m17.o8]}
  - {id: dm857.m17.f15, mode: conceptual, card_type: self_correction, difficulty: intermediate, front: {"es": "¿Por qué autocorregirse es mejor que defender un error?", "en": "Why is self-correction better than defending an error?", "da": "Hvorfor er selvkorrektion bedre end at forsvare en fejl?"}, back: {"es": "Demuestra supervisión del propio razonamiento, protege la exactitud y permite reconstruir la respuesta desde un principio correcto.", "en": "It demonstrates monitoring of reasoning, protects accuracy, and allows rebuilding the answer from a correct principle.", "da": "Det viser overvågning af egen ræsonnering, beskytter korrekthed og gør det muligt at genopbygge svaret fra et korrekt princip."}, linked_objectives: [m17.o8]}
  - {id: dm857.m17.f16, mode: practical, card_type: code_trace, difficulty: intermediate, front: {"es": "Pasos para trazar código oralmente.", "en": "Steps for tracing code orally.", "da": "Trin til mundtlig kodegennemgang."}, back: {"es": "Identificar contrato y entradas; anotar estado inicial; seguir control; actualizar variables; registrar llamadas/mutaciones/retornos; comprobar salida y casos frontera.", "en": "Identify contract and inputs; record initial state; follow control; update variables; record calls/mutations/returns; check output and boundaries.", "da": "Identificér kontrakt og input, registrér starttilstand, følg kontrol, opdatér variable, registrér kald/mutationer/returneringer og kontrollér output."}, linked_objectives: [m17.o4]}
  - {id: dm857.m17.f17, mode: practical, card_type: debugging, difficulty: advanced, front: {"es": "Estructura de una explicación de bug.", "en": "Structure of a bug explanation.", "da": "Struktur for en bugforklaring."}, back: {"es": "Síntoma, contrato esperado, primera divergencia, causa raíz, caso mínimo, corrección que restaura el contrato y prueba de regresión.", "en": "Symptom, expected contract, first divergence, root cause, minimal case, contract-restoring fix, and regression test.", "da": "Symptom, forventet kontrakt, første afvigelse, grundårsag, minimalt tilfælde, kontraktgenoprettende rettelse og regressionstest."}, linked_objectives: [m17.o4, m17.o6]}
  - {id: dm857.m17.f18, mode: practical, card_type: requirement_change, difficulty: advanced, front: {"es": "¿Qué analizar antes de modificar código en vivo?", "en": "What should be analyzed before modifying code live?", "da": "Hvad bør analyseres før live-kodeændring?"}, back: {"es": "Nuevo requisito, contrato afectado, casos frontera, estado/mutación, errores, complejidad, compatibilidad y pruebas que deben cambiar.", "en": "New requirement, affected contract, boundaries, state/mutation, errors, complexity, compatibility, and tests requiring change.", "da": "Nyt krav, berørt kontrakt, grænser, tilstand/mutation, fejl, kompleksitet, kompatibilitet og ændrede test."}, linked_objectives: [m17.o4, m17.o5]}
  - {id: dm857.m17.f19, mode: conceptual, card_type: data_structure_defense, difficulty: advanced, front: {"es": "Orden para defender una estructura de datos.", "en": "Order for defending a data structure.", "da": "Rækkefølge for forsvar af en datastruktur."}, back: {"es": "Operaciones y semántica requeridas; información preservada/perdida; complejidad; memoria; alternativa; política de errores; evidencia de pruebas.", "en": "Required operations and semantics; preserved/lost information; complexity; memory; alternative; error policy; test evidence.", "da": "Krævede operationer og semantik, bevaret/tabt information, kompleksitet, hukommelse, alternativ, fejlpolitik og testevidens."}, linked_objectives: [m17.o5]}
  - {id: dm857.m17.f20, mode: conceptual, card_type: algorithm_defense, difficulty: advanced, front: {"es": "Elementos para defender un algoritmo.", "en": "Elements for defending an algorithm.", "da": "Elementer i et algoritmeforsvar."}, back: {"es": "Modelo, precondiciones, invariante, terminación, corrección, complejidad temporal/espacial, casos adversos, alternativa y pruebas.", "en": "Model, preconditions, invariant, termination, correctness, time/space complexity, adversarial cases, alternative, and tests.", "da": "Model, forudsætninger, invariant, terminering, korrekthed, tids-/pladskompleksitet, adversarielle cases, alternativ og test."}, linked_objectives: [m17.o5]}
  - {id: dm857.m17.f21, mode: conceptual, card_type: library_defense, difficulty: advanced, front: {"es": "¿Cómo justificar una biblioteca?", "en": "How should a library be justified?", "da": "Hvordan begrundes et bibliotek?"}, back: {"es": "Por funcionalidad y contrato requeridos, API pública usada, madurez, licencia, compatibilidad, versión, reducción de riesgo y validación propia.", "en": "By required functionality and contract, used public API, maturity, license, compatibility, version, risk reduction, and independent validation.", "da": "Med nødvendig funktionalitet og kontrakt, brugt offentlig API, modenhed, licens, kompatibilitet, version, risikoreduktion og egen validering."}, linked_objectives: [m17.o5, m17.o6]}
  - {id: dm857.m17.f22, mode: conceptual, card_type: evidence_mapping, difficulty: advanced, front: {"es": "Relaciona claim con evidencia: corrección local, integración, reproducibilidad y rendimiento.", "en": "Map claims to evidence: local correctness, integration, reproducibility, and performance.", "da": "Knyt claims til evidens: lokal korrekthed, integration, reproducerbarhed og ydelse."}, back: {"es": "Unit/reference tests; integration tests; clean-clone run; benchmark under defined workload.", "en": "Unit/reference tests; integration tests; clean-clone run; benchmark under a defined workload.", "da": "Unit-/referencetest; integrationstest; ren klon-kørsel; benchmark under defineret belastning."}, linked_objectives: [m17.o6]}
  - {id: dm857.m17.f23, mode: conceptual, card_type: bounded_claim, difficulty: advanced, front: {"es": "¿Qué es una afirmación delimitada?", "en": "What is a bounded claim?", "da": "Hvad er en afgrænset påstand?"}, back: {"es": "Una conclusión restringida a las entradas, entorno, escala, pruebas y supuestos realmente evaluados.", "en": "A conclusion restricted to the inputs, environment, scale, tests, and assumptions actually evaluated.", "da": "En konklusion begrænset til de input, miljø, skala, test og antagelser der faktisk er evalueret."}, linked_objectives: [m17.o6, m17.o8]}
  - {id: dm857.m17.f24, mode: practical, card_type: limitation_answer, difficulty: advanced, front: {"es": "Estructura de una respuesta sobre limitaciones.", "en": "Structure of an answer about limitations.", "da": "Struktur for et svar om begrænsninger."}, back: {"es": "Nombrar la limitación, explicar por qué existe, qué claim afecta, su impacto, evidencia disponible y mitigación o prueba futura concreta.", "en": "Name the limitation, explain why it exists, which claim it affects, its impact, available evidence, and concrete mitigation or future test.", "da": "Navngiv begrænsningen, forklar årsag, berørt claim, effekt, evidens og konkret afhjælpning eller fremtidig test."}, linked_objectives: [m17.o6, m17.o8]}
  - {id: dm857.m17.f25, mode: conceptual, card_type: contribution, difficulty: intermediate, front: {"es": "¿Cómo describir una contribución individual?", "en": "How should individual contribution be described?", "da": "Hvordan beskrives individuelt bidrag?"}, back: {"es": "Med artefactos y decisiones verificables: requisitos, componentes, pruebas, reviews, experimentos, documentación y aprendizaje derivado.", "en": "Through verifiable artifacts and decisions: requirements, components, tests, reviews, experiments, documentation, and resulting learning.", "da": "Gennem verificerbare artefakter og beslutninger: krav, komponenter, test, reviews, eksperimenter, dokumentation og læring."}, linked_objectives: [m17.o7]}
  - {id: dm857.m17.f26, mode: conceptual, card_type: team_accountability, difficulty: advanced, front: {"es": "¿Por qué debes comprender partes que no implementaste?", "en": "Why must you understand parts you did not implement?", "da": "Hvorfor skal du forstå dele du ikke implementerede?"}, back: {"es": "El resultado es grupal, las interfaces interactúan y la defensa evalúa comprensión del sistema, decisiones y consecuencias, no sólo autoría de líneas.", "en": "The result is collective, interfaces interact, and the defense assesses system understanding, decisions, and consequences, not line authorship alone.", "da": "Resultatet er fælles, interfaces interagerer, og forsvaret vurderer systemforståelse, beslutninger og konsekvenser, ikke kun linjeforfatterskab."}, linked_objectives: [m17.o7]}
  - {id: dm857.m17.f27, mode: practical, card_type: disagreement, difficulty: advanced, front: {"es": "¿Cómo explicar un desacuerdo técnico sin culpar?", "en": "How should a technical disagreement be explained without blame?", "da": "Hvordan forklares en teknisk uenighed uden skyld?"}, back: {"es": "Presentar alternativas, criterios, evidencia, decisión, trade-off y aprendizaje, distinguiendo el proceso de las personas.", "en": "Present alternatives, criteria, evidence, decision, trade-off, and learning, separating process from people.", "da": "Præsenter alternativer, kriterier, evidens, beslutning, kompromis og læring og adskil proces fra personer."}, linked_objectives: [m17.o7]}
  - {id: dm857.m17.f28, mode: practical, card_type: mock_defense, difficulty: advanced, front: {"es": "¿Qué debe medir un simulacro?", "en": "What should a mock defense measure?", "da": "Hvad bør et prøveforsvar måle?"}, back: {"es": "Exactitud, profundidad, estructura, evidencia, límites, tiempo, claridad, trazado, capacidad de seguimiento y autocorrección.", "en": "Accuracy, depth, structure, evidence, limitations, timing, clarity, tracing, follow-up ability, and self-correction.", "da": "Korrekthed, dybde, struktur, evidens, begrænsninger, tid, klarhed, gennemgang, opfølgning og selvkorrektion."}, linked_objectives: [m17.o1, m17.o4, m17.o8]}
  - {id: dm857.m17.f29, mode: integrative, card_type: question_response, difficulty: advanced, front: {"es": "¿Cómo responder “¿qué cambiarías con dos semanas más?”?", "en": "How should “what would you change with two more weeks?” be answered?", "da": "Hvordan besvares “hvad ville du ændre med to uger mere?”?"}, back: {"es": "Priorizar una limitación evidenciada, explicar impacto, propuesta concreta, criterio de éxito, coste/riesgo y por qué supera otras mejoras.", "en": "Prioritize an evidenced limitation, explain impact, concrete proposal, success criterion, cost/risk, and why it outranks alternatives.", "da": "Prioritér en evidensbaseret begrænsning, forklar effekt, konkret forslag, succeskriterium, pris/risiko og prioritering."}, linked_objectives: [m17.o6, m17.o8]}
  - {id: dm857.m17.f30, mode: integrative, card_type: synthesis, difficulty: advanced, front: {"es": "Lista de control para la defensa individual.", "en": "Individual defense checklist.", "da": "Tjekliste til individuelt forsvar."}, back: {"es": "Comprender pregunta y requisitos; arquitectura y flujo; una función trazable; estructuras y complejidad; pruebas/errores; datos/procedencia; entorno/reproducibilidad; rendimiento; contribución; limitaciones; alternativas; responder conclusión-evidencia-límite y no inventar.", "en": "Understand question and requirements; architecture and flow; traceable function; structures and complexity; tests/errors; data/provenance; environment/reproducibility; performance; contribution; limitations; alternatives; answer conclusion-evidence-limit and never invent.", "da": "Forstå spørgsmål og krav, arkitektur og flow, kodegennemgang, strukturer og kompleksitet, test/fejl, data/proveniens, miljø/reproducerbarhed, ydelse, bidrag, begrænsninger og alternativer; opfind ikke."}, linked_objectives: [m17.o1, m17.o2, m17.o3, m17.o4, m17.o5, m17.o6, m17.o7, m17.o8]}
