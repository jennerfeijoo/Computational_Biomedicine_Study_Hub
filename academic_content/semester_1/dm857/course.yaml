schema_version: 1.0.0
course_code: DM857
content_version: 1.0.0
status: academically_reviewed_draft

identity:
  title:
    es: "Introducción a la programación"
    en: "Introduction to Programming"
    da: "Introduktion til programmering"
  ects: 10
  semester: 1
  teaching_language: English or Danish according to the official course arrangement
  implementation_language: Python

course_purpose:
  es: >-
    Desarrollar la capacidad de transformar problemas concretos en modelos computacionales,
    diseñar algoritmos verificables e implementarlos en Python con estructuras de control,
    funciones, estructuras de datos, recursión, tipos abstractos, árboles, bibliotecas y
    procedimientos sistemáticos de prueba. El curso también prepara al estudiante para
    documentar, presentar y defender un proyecto de programación reproducible.
  en: >-
    Develop the ability to transform concrete problems into computational models, design
    verifiable algorithms, and implement them in Python using control structures, functions,
    data structures, recursion, abstract data types, trees, libraries, and systematic testing.
    The course also prepares the learner to document, present, and defend a reproducible
    programming project.
  da: >-
    Udvikle evnen til at omsætte konkrete problemer til beregningsmodeller, designe
    efterprøvelige algoritmer og implementere dem i Python med kontrolstrukturer, funktioner,
    datastrukturer, rekursion, abstrakte datatyper, træer, biblioteker og systematisk test.
    Kurset forbereder også den studerende på at dokumentere, præsentere og forsvare et
    reproducerbart programmeringsprojekt.

