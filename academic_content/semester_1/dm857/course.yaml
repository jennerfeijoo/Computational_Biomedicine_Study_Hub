quality_requirements:
  - All learner-visible content has equivalent Spanish, English, and Danish versions.
  - Every objective is taught, practised, and assessed.
  - Code examples state expected output and validation evidence.
  - Practical tasks distinguish syntax, runtime, logic, and specification failures.
  - Objective distractors represent plausible misconceptions.
  - Open responses use explicit rubrics and are not graded by exact-string matching.
  - Memory cards include conceptual and practical retrieval.
  - Hidden support never exposes answer keys during active assessment.
  - No copyrighted exercise or passage is reproduced.
  - No synthetic biomedical example is presented as a validated protocol.
