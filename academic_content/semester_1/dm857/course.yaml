constructive_alignment:
  module_minimums:
    concepts: 5
    worked_examples: 2
    guided_practice: 5
    objective_questions: 8
    open_assessment_items: 2
    flashcards: 24
    glossary_entries: 8
    hidden_support_fragments: 8
  integrative_module_minimums:
    concepts: 6
    worked_examples: 3
    guided_practice: 6
    objective_questions: 10
    open_assessment_items: 4
    flashcards: 30
    glossary_entries: 10
    hidden_support_fragments: 10

assessment_strategy:
  formative:
    - retrieval practice through memory cards
    - code tracing and output prediction
    - debugging and test design
    - short implementation exercises
    - explanation of assumptions and invariants
  module_assessment:
    - randomized objective questions
    - constructed-response tasks with rubrics
    - practical code or design tasks
  cumulative_assessment:
    - integrated group project
    - reproducible repository and environment record
    - report limited to ten pages
    - group presentation
    - individual oral defense
  grading_principles:
    - correctness is evaluated against the problem specification
    - code execution alone is not evidence of general correctness
    - tests must include normal, boundary, and invalid cases
    - design decisions must be explained, not merely shown
    - biomedical examples remain educational and non-clinical

cross_course_bridges:
  - target_course: DM847
    competencies:
      - sequence manipulation
      - algorithm design
      - recursion and trees
      - testing bioinformatics implementations
  - target_course: BMB830
    competencies:
      - reproducible scripts
      - data validation
      - tabular data handling
      - interpretation of computational output
  - target_course: BMB831
    competencies:
      - modular analytical workflows
      - package and environment management
      - testing and provenance
      - scalable reasoning about data structures

