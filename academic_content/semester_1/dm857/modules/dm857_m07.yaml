metadata:
  title:
    es: "Diccionarios, conjuntos, agregación y selección de estructuras"
    en: "Dictionaries, sets, aggregation, and structure selection"
    da: "Ordbøger, mængder, aggregering og valg af datastruktur"
  summary:
    es: >-
      Uso razonado de diccionarios y conjuntos para representar asociaciones, indexar por identidad,
      contar, agrupar, eliminar duplicados y comparar colecciones. Incluye acceso seguro, claves
      hashables, recorridos, estructuras anidadas, operaciones de conjuntos, contratos de ausencia,
      selección entre lista, tupla, diccionario y conjunto, y pruebas de invariantes.
    en: >-
      Reasoned use of dictionaries and sets to represent associations, index by identity, count,
      group, deduplicate, and compare collections. It includes safe access, hashable keys,
      traversal, nested structures, set operations, absence contracts, selection among lists,
      tuples, dictionaries, and sets, and invariant testing.
    da: >-
      Begrundet brug af ordbøger og mængder til relationer, opslag efter identitet, optælling,
      gruppering, deduplikering og sammenligning af samlinger. Modulet omfatter sikker adgang,
      hashbare nøgler, gennemløb, indlejrede strukturer, mængdeoperationer, fraværskontrakter,
      valg mellem liste, tuple, ordbog og mængde samt test af invarianter.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03, dm857.m04, dm857.m05, dm857.m06]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05, dm857.lo07]
  estimated_study_hours: 18
  difficulty: intermediate

