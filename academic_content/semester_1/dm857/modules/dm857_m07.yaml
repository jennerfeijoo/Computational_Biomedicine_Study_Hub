glossary:
  - id: term.dictionary
    term: {"es": "diccionario", "en": "dictionary", "da": "ordbog"}
    definition: {"es": "Colección mutable de asociaciones clave-valor.", "en": "Mutable collection of key-value mappings.", "da": "Muterbar samling af nøgle-værdi-relationer."}
  - id: term.key
    term: {"es": "clave", "en": "key", "da": "nøgle"}
    definition: {"es": "Objeto hashable que identifica una entrada.", "en": "Hashable object identifying an entry.", "da": "Hashbart objekt der identificerer en post."}
  - id: term.hashable
    term: {"es": "hashable", "en": "hashable", "da": "hashbar"}
    definition: {"es": "Objeto con hash estable apto para claves o miembros de conjuntos.", "en": "Object with a stable hash suitable for keys or set members.", "da": "Objekt med stabil hash egnet som nøgle eller mængdemedlem."}
  - id: term.mapping
    term: {"es": "mapeo", "en": "mapping", "da": "mapping"}
    definition: {"es": "Relación que asocia claves con valores.", "en": "Relation associating keys with values.", "da": "Relation der knytter nøgler til værdier."}
  - id: term.sentinel
    term: {"es": "centinela", "en": "sentinel", "da": "sentinel"}
    definition: {"es": "Objeto único usado para representar un estado especial sin ambigüedad.", "en": "Unique object representing a special state without ambiguity.", "da": "Unikt objekt der repræsenterer en særlig tilstand entydigt."}
  - id: term.frequency_table
    term: {"es": "tabla de frecuencias", "en": "frequency table", "da": "frekvenstabel"}
    definition: {"es": "Asociación entre categorías y conteos.", "en": "Mapping from categories to counts.", "da": "Mapping fra kategorier til antal."}
  - id: term.grouping
    term: {"es": "agrupación", "en": "grouping", "da": "gruppering"}
    definition: {"es": "Organización de elementos bajo una clave compartida.", "en": "Organization of elements under a shared key.", "da": "Organisering af elementer under en fælles nøgle."}
  - id: term.set
    term: {"es": "conjunto", "en": "set", "da": "mængde"}
    definition: {"es": "Colección mutable de elementos únicos y hashables.", "en": "Mutable collection of unique hashable elements.", "da": "Muterbar samling af unikke hashbare elementer."}
  - id: term.intersection
    term: {"es": "intersección", "en": "intersection", "da": "snit"}
    definition: {"es": "Elementos presentes en ambos conjuntos.", "en": "Elements present in both sets.", "da": "Elementer der findes i begge mængder."}
  - id: term.symmetric_difference
    term: {"es": "diferencia simétrica", "en": "symmetric difference", "da": "symmetrisk differens"}
    definition: {"es": "Elementos presentes en exactamente uno de dos conjuntos.", "en": "Elements present in exactly one of two sets.", "da": "Elementer der findes i præcis én af to mængder."}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El núcleo del módulo es representar explícitamente la relación entre la pregunta y la estructura.
      Los diccionarios resuelven identidad y asociación; los conjuntos resuelven unicidad y pertenencia.
      La corrección requiere definir ausencia, normalización, multiplicidad y orden antes de programar.
      Las invariantes de conteo, cobertura y disjunción proporcionan evidencia verificable.
    en: >-
      The core idea is to connect problem requirements to structure. Dictionaries solve identity and
      association; sets solve uniqueness and membership. Correctness requires defining absence,
      normalization, multiplicity, and order before programming. Count, coverage, and disjointness
      invariants provide verifiable evidence.
    da: >-
      Modulets kerne er koblingen mellem problemkrav og datastruktur. Ordbøger løser identitet og relation,
      mens mængder løser entydighed og medlemskab. Fravær, normalisering, multiplicitet og rækkefølge skal
      defineres før implementering.
  misconceptions:
    - id: m07.mc01
      incorrect: "A dictionary key can be any Python object."
      correction: "Keys must be hashable; mutable lists and dictionaries are not valid keys."
    - id: m07.mc02
      incorrect: "get inserts the default when a key is absent."
      correction: "get returns the default without mutating the dictionary."
    - id: m07.mc03
      incorrect: "A set is simply a faster list."
      correction: "A set changes semantics by discarding order and multiplicity."
    - id: m07.mc04
      incorrect: "A - B and B - A are interchangeable."
      correction: "Set difference is directional."
    - id: m07.mc05
      incorrect: "Insertion order should be treated as the scientific meaning of a dictionary."
      correction: "Order must be made explicit when it matters to output or interpretation."
  socratic_questions:
    - What information identifies one record independently of position?
    - Is absence an error, an expected case, or a valid stored value?
    - Does the problem preserve duplicate counts or only membership?
    - Which invariant would reveal lost or duplicated observations?
    - What information is lost when converting the current structure?
  grading_criteria:
    - Correctness of keys, values, and absence contract.
    - Preservation of required order and multiplicity.
    - Correct interpretation of set operations.
    - Explicit validation of nested record shape.
    - Tests covering empty, missing, duplicate, and overlapping cases.
  response_constraints:
    - Do not recommend a set when duplicate counts or chronological order are required.
    - Do not treat `None` as unambiguous absence without checking the contract.
    - Require normalization rules to be justified by the data semantics.
    - Distinguish insertion/update from access and deletion.
    - Ask for invariants when reviewing frequency or grouping code.
  retrieval_fragments:
    - id: m07.r01
      topic: dictionary_access
      content: "Use strict access when absence is an error; use tolerant access only with an explicit, non-ambiguous absence contract."
    - id: m07.r02
      topic: frequency_invariant
      content: "For accepted observations, the sum of category counts must equal the number of accepted input records."
    - id: m07.r03
      topic: set_information_loss
      content: "Converting to a set removes duplicates and should not be used when multiplicity or original order is evidence."
    - id: m07.r04
      topic: structure_selection
      content: "Choose structure from requirements for order, identity, multiplicity, mutation, and membership—not from habit."

