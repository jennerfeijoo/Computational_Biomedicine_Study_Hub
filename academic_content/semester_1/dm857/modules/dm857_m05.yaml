metadata:
  title:
    es: "Cadenas, parsing y validación textual"
    en: "Strings, parsing, and text validation"
    da: "Strenge, parsing og tekstvalidering"
  summary:
    es: >-
      Estudio de cadenas como secuencias inmutables de caracteres: índices, slicing, recorridos,
      búsqueda, conteo, normalización, métodos, separación y unión, formato, validación, Unicode,
      parsing defensivo y diseño de pequeñas funciones para pipelines textuales reproducibles.
    en: >-
      Study of strings as immutable character sequences: indexing, slicing, traversal, search,
      counting, normalization, methods, splitting and joining, formatting, validation, Unicode,
      defensive parsing, and small functions for reproducible text pipelines.
    da: >-
      Studie af strenge som uforanderlige tegnsekvenser: indeksering, slicing, gennemløb,
      søgning, optælling, normalisering, metoder, opdeling og sammenføjning, formatering,
      validering, Unicode, defensiv parsing og små funktioner til reproducerbare tekstpipelines.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03, dm857.m04]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05]
  estimated_study_hours: 16
  difficulty: foundational_to_intermediate

