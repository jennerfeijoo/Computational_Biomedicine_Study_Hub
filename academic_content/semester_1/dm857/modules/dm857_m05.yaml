hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El módulo enseña que procesar texto no consiste en aplicar métodos de forma mecánica. Cada transformación
      define una equivalencia y puede destruir información. Un parser robusto valida estructura antes de desempaquetar,
      distingue ausencia de campo y campo vacío, explicita conversiones y prueba entradas adversas. La inmutabilidad
      obliga a conservar los resultados de las transformaciones.
    en: >-
      The module teaches that text processing is not mechanical method application. Every transformation defines an
      equivalence and may destroy information. A robust parser validates structure before unpacking, distinguishes
      missing from empty fields, makes conversion explicit, and tests adversarial input. Immutability requires retaining
      transformation results.
    da: >-
      Modulet viser at tekstbehandling ikke er mekanisk brug af metoder. Hver transformation definerer ækvivalens og
      kan ødelægge information. En robust parser validerer struktur, skelner manglende og tomme felter og tester
      udfordrende input. Resultater af transformationer skal gemmes på grund af uforanderlighed.
  misconceptions:
    - id: m05.mc01
      claim: string methods mutate the original string
      correction: they return new strings
    - id: m05.mc02
      claim: slices and individual indices fail in the same way outside bounds
      correction: individual indices raise IndexError while slices are clipped
    - id: m05.mc03
      claim: lowercasing is always safe normalization
      correction: it is safe only when case is irrelevant by contract
    - id: m05.mc04
      claim: split guarantees the expected number of fields
      correction: field count and required content must be validated
    - id: m05.mc05
      claim: visually identical Unicode text is always equal
      correction: distinct code-point sequences may render similarly
  socratic_prompts:
    - Which differences should the application treat as equivalent?
    - Which transformation could destroy meaningful information?
    - What happens when the input is empty?
    - How does the parser distinguish an absent delimiter from an empty field?
    - Does the counting method include overlaps?
    - Which Unicode examples challenge the current rule?
  grading_criteria:
    - correct reasoning about immutability and slices
    - purpose-aligned normalization
    - explicit parser structure and error policy
    - correct distinction between overlapping and non-overlapping search
    - comprehensive text and Unicode tests
  response_constraints:
    - never state that a string method mutates its input
    - distinguish `find` from `index`
    - do not claim `str.count` includes overlaps
    - do not normalize identifiers without a documented rule
    - distinguish case folding from Unicode normalization
  retrieval_fragments:
    - id: m05.rf01
      topic: immutability
      canonical_answer: String transformations return new strings; the original object is unchanged.
    - id: m05.rf02
      topic: slicing
      canonical_answer: A slice includes start, excludes stop, and clips out-of-range bounds.
    - id: m05.rf03
      topic: parsing
      canonical_answer: Validate delimiter and field structure before unpacking or converting fields.
    - id: m05.rf04
      topic: normalization
      canonical_answer: Normalization is correct only relative to an explicit purpose-specific equivalence rule.
    - id: m05.rf05
      topic: unicode
      canonical_answer: Visual similarity does not guarantee identical Unicode sequences.

