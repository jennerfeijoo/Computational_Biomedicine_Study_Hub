concepts:
  - id: string-sequence-immutability
    title:
      es: "Secuencia, longitud e inmutabilidad"
      en: "Sequence, length, and immutability"
      da: "Sekvens, længde og uforanderlighed"
    body:
      es: >-
        Una cadena es una secuencia ordenada de caracteres. `len` devuelve su longitud y cada posición puede
        leerse mediante un índice. Las cadenas son inmutables: no puede reemplazarse un carácter en una posición
        existente. Operaciones como `lower`, `replace` o slicing crean una cadena nueva; si el resultado no se
        almacena o retorna, la transformación se pierde.
      en: >-
        A string is an ordered character sequence. `len` returns its length and each position can be read by index.
        Strings are immutable: an existing character cannot be replaced in place. Operations such as `lower`,
        `replace`, or slicing create a new string; if that result is not stored or returned, it is lost.
      da: >-
        En streng er en ordnet tegnsekvens. `len` returnerer længden, og positioner læses med indeks. Strenge er
        uforanderlige; metoder og slicing skaber nye strenge, som skal gemmes eller returneres.
    linked_objectives: [m05.o1, m05.o4]

  - id: indices-slices-boundaries
    title:
      es: "Índices, slicing y fronteras"
      en: "Indices, slicing, and boundaries"
      da: "Indeks, slicing og grænser"
    body:
      es: >-
        El primer índice válido es 0 y el último positivo es `len(text)-1`; `-1` representa el último carácter.
        Un slice `text[start:stop:step]` incluye `start` y excluye `stop`. Un índice individual fuera de rango
        genera `IndexError`, mientras que un slice se recorta y puede producir una cadena vacía sin error. El paso
        cero es inválido y `text[::-1]` construye una cadena invertida.
      en: >-
        The first valid index is 0 and the last positive index is `len(text)-1`; `-1` denotes the last character.
        A slice `text[start:stop:step]` includes `start` and excludes `stop`. An out-of-range index raises
        `IndexError`, while a slice is clipped and may produce an empty string. A zero step is invalid and
        `text[::-1]` creates a reversed string.
      da: >-
        Første gyldige indeks er 0 og sidste positive er `len(text)-1`; `-1` er sidste tegn. Et slice inkluderer
        start og udelukker stop. Ugyldigt enkeltindeks giver `IndexError`, mens slices beskæres sikkert.
    linked_objectives: [m05.o2, m05.o8]

  - id: traversal-search-count
    title:
      es: "Recorrido, búsqueda y conteo"
      en: "Traversal, search, and counting"
      da: "Gennemløb, søgning og optælling"
    body:
      es: >-
        Un `for` recorre caracteres directamente; `enumerate` añade posiciones cuando son necesarias. `in` comprueba
        pertenencia de una subcadena, `find` retorna la primera posición o `-1`, e `index` genera `ValueError` si no
        hay coincidencia. `count` cuenta ocurrencias no solapadas; para solapamientos se necesita una estrategia de
        búsqueda explícita que avance una posición cada vez.
      en: >-
        A `for` loop traverses characters directly; `enumerate` adds positions when needed. `in` checks substring
        membership, `find` returns the first position or `-1`, and `index` raises `ValueError` if absent. `count`
        counts non-overlapping occurrences; overlapping matches require an explicit search strategy advancing one
        position at a time.
      da: >-
        En `for`-løkke gennemløber tegn direkte; `enumerate` tilføjer positioner. `find` returnerer første position
        eller `-1`, mens `index` rejser `ValueError`. `count` tæller ikke-overlappende forekomster.
    linked_objectives: [m05.o3]

  - id: normalization-purpose
    title:
      es: "Normalización dirigida por el propósito"
      en: "Purpose-driven normalization"
      da: "Formålsstyret normalisering"
    body:
      es: >-
        Normalizar significa transformar representaciones que deben considerarse equivalentes según una regla
        explícita. `strip` elimina caracteres de los extremos; `lower` y `casefold` reducen diferencias de caja;
        `replace` cambia patrones. Ninguna normalización es universal: convertir a minúsculas puede ser correcto para
        etiquetas administrativas e incorrecto cuando la capitalización forma parte del identificador.
      en: >-
        Normalization transforms representations that should be considered equivalent under an explicit rule.
        `strip` removes characters at the ends; `lower` and `casefold` reduce case differences; `replace` changes
        patterns. No normalization is universal: lowercasing may be valid for administrative labels but invalid when
        capitalization belongs to an identifier.
      da: >-
        Normalisering transformerer repræsentationer, der skal anses som ækvivalente efter en eksplicit regel.
        `strip`, `lower`, `casefold` og `replace` har forskellige formål. Ingen normalisering er universel.
    linked_objectives: [m05.o4, m05.o5, m05.o7]

  - id: split-join-partition-parsing
    title:
      es: "`split`, `join`, `partition` y parsing defensivo"
      en: "`split`, `join`, `partition`, and defensive parsing"
      da: "`split`, `join`, `partition` og defensiv parsing"
    body:
      es: >-
        `split` divide una cadena en campos y puede producir campos vacíos. `separator.join(parts)` inserta el
        separador entre elementos que deben ser cadenas. `partition` siempre retorna tres partes y permite distinguir
        la ausencia de un único separador. Antes de desempaquetar, deben validarse cantidad de campos, estructura,
        campos obligatorios y contenido; una estructura ausente no equivale a un campo vacío.
      en: >-
        `split` divides a string into fields and may produce empty fields. `separator.join(parts)` inserts the separator
        between string elements. `partition` always returns three parts and helps detect absence of one separator.
        Before unpacking, validate field count, structure, required fields, and content; missing structure is not the
        same as an empty field.
      da: >-
        `split` opdeler en streng og kan skabe tomme felter. `join` indsætter separator mellem strenge. `partition`
        returnerer altid tre dele. Validér struktur og feltantal før udpakning.
    linked_objectives: [m05.o6, m05.o8]

  - id: textual-validation-predicates
    title:
      es: "Predicados de validación textual"
      en: "Text validation predicates"
      da: "Prædikater til tekstvalidering"
    body:
      es: >-
        Métodos como `isalpha`, `isdigit`, `isalnum` e `isspace` expresan propiedades de todos los caracteres y
        suelen retornar `False` para la cadena vacía. Una regla real combina longitud, prefijos, separadores y conjuntos
        permitidos. Validar debe producir un booleano o resultado estructurado; mezclar validación con impresión hace
        difícil reutilizarla y probarla.
      en: >-
        Methods such as `isalpha`, `isdigit`, `isalnum`, and `isspace` express properties over all characters and
        usually return `False` for the empty string. Real rules combine length, prefixes, separators, and allowed sets.
        Validation should return a Boolean or structured result rather than mix logic with printing.
      da: >-
        Metoder som `isalpha`, `isdigit`, `isalnum` og `isspace` beskriver egenskaber for alle tegn og returnerer
        normalt `False` for tom streng. Reelle regler kombinerer længde, præfikser, separatorer og tilladte tegn.
    linked_objectives: [m05.o5, m05.o8]

  - id: unicode-equivalence
    title:
      es: "Unicode, apariencia y equivalencia"
      en: "Unicode, appearance, and equivalence"
      da: "Unicode, udseende og ækvivalens"
    body:
      es: >-
        Dos textos visualmente similares pueden contener secuencias Unicode diferentes, y un carácter visible puede
        representarse mediante un punto de código o una combinación. `casefold` mejora comparaciones sin sensibilidad
        a caja, pero no resuelve toda equivalencia. Cuando la equivalencia Unicode es relevante se debe documentar una
        forma de normalización, por ejemplo NFC, y probar ejemplos no ASCII. `len` cuenta puntos de código de Python,
        no necesariamente unidades visuales percibidas por el usuario.
      en: >-
        Visually similar text may contain different Unicode sequences, and one visible character may use one code
        point or a combination. `casefold` improves caseless comparison but does not solve every equivalence issue.
        When Unicode equivalence matters, document a normalization form such as NFC and test non-ASCII examples.
        Python `len` counts code points, not necessarily user-perceived graphemes.
      da: >-
        Visuelt ens tekst kan bestå af forskellige Unicode-sekvenser. `casefold` forbedrer sammenligning uden hensyn
        til store/små bogstaver, men løser ikke al ækvivalens. Dokumentér eksempelvis NFC og test ikke-ASCII tekst.
    linked_objectives: [m05.o1, m05.o5, m05.o7, m05.o8]

  - id: formatting-and-round-trip
    title:
      es: "Formato, representación y round-trip"
      en: "Formatting, representation, and round trip"
      da: "Formatering, repræsentation og round-trip"
    body:
      es: >-
        Las f-strings producen representaciones legibles y permiten controlar precisión, alineación y etiquetas. Formatear
        no cambia el valor numérico original, solo su representación. Cuando un texto debe volver a analizarse, el formato
        debe ser no ambiguo y conservar la información necesaria. Una representación para humanos no siempre es adecuada
        como formato de intercambio estable.
      en: >-
        F-strings produce readable representations and control precision, alignment, and labels. Formatting does not
        change the original numeric value, only its representation. If text must be parsed again, the format should be
        unambiguous and preserve required information. Human-readable output is not always a stable interchange format.
      da: >-
        F-strenge skaber læsbare repræsentationer og styrer præcision og etiketter. Formatering ændrer ikke den numeriske
        værdi. Tekst der skal parses igen bør bruge et entydigt og informationsbevarende format.
    linked_objectives: [m05.o6]

worked_examples:
  - id: dm857.m05.e01
    title:
      es: "Normalizar una etiqueta administrativa sintética"
      en: "Normalize a synthetic administrative label"
      da: "Normalisér en syntetisk administrativ etiket"
    problem:
      es: "Convertir etiquetas con espacios y diferencias de caja a una forma comparable con guiones bajos."
      en: "Convert labels with surrounding whitespace and case differences into an underscore-separated comparable form."
      da: "Konvertér etiketter med mellemrum og forskelle i store/små bogstaver til en sammenlignelig form med understregninger."
    assumptions:
      - case carries no meaning for this synthetic label
      - internal runs of whitespace are equivalent
      - punctuation other than whitespace is preserved
    reasoning:
      es:
        - Eliminar espacios en extremos.
        - Separar por cualquier secuencia de espacios mediante `split()`.
        - Unir con `_` y aplicar `casefold`.
      en:
        - Remove surrounding whitespace.
        - Split on any whitespace run using `split()`.
        - Join with `_` and apply `casefold`.
      da:
        - Fjern mellemrum i enderne.
        - Opdel efter mellemrum med `split()`.
        - Sammenføj med `_` og brug `casefold`.
    code: |-
      def normalize_label(text):
          """Return a case-insensitive underscore-separated administrative label."""
          words = text.strip().split()
          return "_".join(words).casefold()

      print(normalize_label("  Case   Control  "))
    expected_output: case_control
    validation:
      - leading and trailing whitespace disappear
      - multiple internal spaces collapse to one separator
      - empty or whitespace-only input returns the empty string
      - non-ASCII case examples are tested separately
    explanation:
      es: "La regla es válida porque el propósito declara irrelevantes la caja y la cantidad de espacios."
      en: "The rule is valid because the purpose declares case and whitespace runs irrelevant."
      da: "Reglen er gyldig fordi formålet erklærer store/små bogstaver og antal mellemrum irrelevante."
    limitations:
      - it must not be used for case-sensitive scientific identifiers
    linked_objectives: [m05.o4, m05.o5, m05.o7, m05.o8]

  - id: dm857.m05.e02
    title:
      es: "Analizar un identificador compuesto de forma defensiva"
      en: "Parse a compound identifier defensively"
      da: "Parse en sammensat identifikator defensivt"
    problem:
      es: "Analizar `cohort:sample` y rechazar separador ausente, campos vacíos o separadores adicionales."
      en: "Parse `cohort:sample` and reject an absent delimiter, empty fields, or additional delimiters."
      da: "Parse `cohort:sample` og afvis manglende separator, tomme felter eller ekstra separatorer."
    assumptions:
      - exactly one colon is required
      - both fields contain non-whitespace text
      - no automatic case normalization is permitted
    reasoning:
      es:
        - Comprobar que exista exactamente un separador.
        - Separar una sola vez.
        - Limpiar extremos de cada campo sin cambiar contenido interno.
        - Retornar un resultado estructurado o generar un error explícito.
      en:
        - Require exactly one separator.
        - Split once.
        - Strip each field without changing internal content.
        - Return a structured result or raise an explicit error.
      da:
        - Kræv præcis én separator.
        - Opdel én gang.
        - Fjern mellemrum i feltender uden at ændre indhold.
        - Returnér struktur eller rejs eksplicit fejl.
    code: |-
      def parse_identifier(text):
          """Return `(cohort, sample)` for exactly one non-empty `cohort:sample` pair."""
          if text.count(":") != 1:
              raise ValueError("identifier must contain exactly one ':'")
          cohort, sample = (part.strip() for part in text.split(":", maxsplit=1))
          if not cohort or not sample:
              raise ValueError("identifier fields must be non-empty")
          return cohort, sample

      print(parse_identifier("A01 : S004"))
    expected_output: "('A01', 'S004')"
    validation:
      - "`A:S` succeeds"
      - "`AS`, `:S`, `A:`, and `A:S:X` fail"
      - case is preserved
    explanation:
      es: "Se distingue estructura ausente de campos vacíos y se evita desempaquetar antes de validar."
      en: "Missing structure is distinguished from empty fields, and unpacking occurs only after validation."
      da: "Manglende struktur skelnes fra tomme felter, og udpakning sker først efter validering."
    limitations:
      - allowed character sets are not constrained in this introductory example
    linked_objectives: [m05.o5, m05.o6, m05.o8]

  - id: dm857.m05.e03
    title:
      es: "Contar coincidencias solapadas"
      en: "Count overlapping matches"
      da: "Tæl overlappende match"
    problem:
      es: "Contar cuántas veces aparece `ANA` en `BANANA`, incluyendo solapamientos."
      en: "Count how many times `ANA` occurs in `BANANA`, including overlaps."
      da: "Tæl hvor mange gange `ANA` forekommer i `BANANA`, inklusive overlap."
    assumptions:
      - comparison is case-sensitive
      - an empty pattern is rejected
    reasoning:
      es:
        - Examinar cada posición inicial posible.
        - Comparar un slice de longitud igual al patrón.
        - Avanzar una sola posición para permitir solapamiento.
      en:
        - Examine every possible starting position.
        - Compare a slice with pattern length.
        - Advance one position to permit overlap.
      da:
        - Undersøg hver mulig startposition.
        - Sammenlign et slice med mønsterets længde.
        - Flyt én position for at tillade overlap.
    code: |-
      def count_overlapping(text, pattern):
          """Return the number of overlapping pattern occurrences."""
          if pattern == "":
              raise ValueError("pattern must be non-empty")
          width = len(pattern)
          return sum(text[i:i + width] == pattern for i in range(len(text) - width + 1))

      print(count_overlapping("BANANA", "ANA"))
    expected_output: "2"
    validation:
      - "`BANANA`, `ANA` gives 2"
      - pattern longer than text gives 0
      - empty pattern raises ValueError
    explanation:
      es: "`str.count` produciría 1 porque cuenta coincidencias no solapadas."
      en: "`str.count` would produce 1 because it counts non-overlapping matches."
      da: "`str.count` ville give 1, fordi den tæller ikke-overlappende match."
    limitations:
      - repeated slicing is sufficient for teaching but not optimized for massive text
    linked_objectives: [m05.o2, m05.o3, m05.o8]

practice_exercises:
  - id: dm857.m05.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: "Para `text='ABCDE'`, predice `text[-1]`, `text[1:4]`, `text[:2]` y `text[::-1]`."
      en: "For `text='ABCDE'`, predict `text[-1]`, `text[1:4]`, `text[:2]`, and `text[::-1]`."
      da: "For `text='ABCDE'`, forudsig `text[-1]`, `text[1:4]`, `text[:2]` og `text[::-1]`."
    reference_solution: {"es": "\"`E`, `BCD`, `AB`, `EDCBA`.\"", "en": "\"`E`, `BCD`, `AB`, `EDCBA`.\"", "da": "\"`E`, `BCD`, `AB`, `EDCBA`.\""}
    linked_objectives: [m05.o2]

  - id: dm857.m05.p02
    activity_type: debugging
    difficulty: foundational
    prompt:
      es: "Corrige `text[0] = text[0].upper()` respetando la inmutabilidad."
      en: "Correct `text[0] = text[0].upper()` while respecting immutability."
      da: "Ret `text[0] = text[0].upper()` med respekt for uforanderlighed."
    reference_solution: {"es": "\"`text = text[:1].upper() + text[1:]` o una transformación equivalente.\"", "en": "\"`text = text[:1].upper() + text[1:]` or an equivalent transformation.\"", "da": "\"`text = text[:1].upper() + text[1:]` eller tilsvarende.\""}
    linked_objectives: [m05.o1, m05.o4]

  - id: dm857.m05.p03
    activity_type: comparison
    difficulty: intermediate
    prompt:
      es: "Compara `find`, `index` e `in` cuando un patrón está ausente."
      en: "Compare `find`, `index`, and `in` when a pattern is absent."
      da: "Sammenlign `find`, `index` og `in`, når et mønster mangler."
    reference_solution:
      es: "`find` retorna `-1`, `index` genera `ValueError` e `in` retorna `False`; la elección depende del contrato."
      en: "`find` returns `-1`, `index` raises `ValueError`, and `in` returns `False`; choice depends on the contract."
      da: "`find` returnerer `-1`, `index` rejser `ValueError`, og `in` returnerer `False`; valget afhænger af kontrakten."
    linked_objectives: [m05.o3]

  - id: dm857.m05.p04
    activity_type: parser_design
    difficulty: intermediate
    prompt:
      es: "Diseña un parser para líneas `key=value` que distinga separador ausente, clave vacía y valor vacío permitido."
      en: "Design a parser for `key=value` lines that distinguishes an absent separator, an empty key, and an allowed empty value."
      da: "Design en parser til `key=value`-linjer der skelner mellem manglende separator, tom nøgle og tilladt tom værdi."
    accepted_answer_elements:
      - explicit policy for exactly one first separator or partition-based parsing
      - empty key rejected after stripping
      - empty value accepted and represented distinctly from missing separator
      - tests for `a=1`, `a=`, `=1`, and `a`
    linked_objectives: [m05.o5, m05.o6, m05.o8]

  - id: dm857.m05.p05
    activity_type: test_design
    difficulty: intermediate
    prompt:
      es: "Diseña pruebas para `normalize_label` incluyendo texto vacío, solo espacios, espacios internos y un ejemplo Unicode."
      en: "Design tests for `normalize_label`, including empty text, whitespace-only text, internal whitespace, and a Unicode example."
      da: "Design test for `normalize_label` inklusive tom tekst, kun mellemrum, interne mellemrum og et Unicode-eksempel."
    accepted_answer_elements:
      - empty string
      - whitespace-only string
      - multiple internal whitespace runs
      - mixed case
      - at least one non-ASCII case-folding example
      - expected outputs justified by the documented rule
    linked_objectives: [m05.o5, m05.o7, m05.o8]

  - id: dm857.m05.p06
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: "Explica por qué dos cadenas visualmente iguales pueden no ser iguales y qué política debe definir un sistema."
      en: "Explain why two visually identical strings may not be equal and what policy a system should define."
      da: "Forklar hvorfor to visuelt identiske strenge kan være ulige, og hvilken politik et system bør definere."
    accepted_answer_elements:
      - Unicode can encode visually similar text differently
      - casefold and normalization address different issues
      - normalization form must be purpose-specific and documented
      - identifiers may require exact preservation rather than normalization
    linked_objectives: [m05.o7, m05.o8]

objective_bank:
  - id: dm857.m05.q01
    activity_type: true_false
    difficulty: foundational
    prompt: {"es": "Las cadenas de Python pueden modificarse carácter por carácter en el mismo objeto.", "en": "Python strings can be modified character by character in the same object.", "da": "Python-strenge kan ændres tegn for tegn i samme objekt."}
    correct_answer: false
    explanation: {"es": "Las cadenas son inmutables; las transformaciones crean otra cadena.", "en": "Strings are immutable; transformations create another string.", "da": "Strenge er uforanderlige; transformationer skaber en ny streng."}
    linked_objectives: [m05.o1, m05.o4]

  - id: dm857.m05.q02
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {"es": "¿Qué carácter retorna `text[-1]`?", "en": "Which character does `text[-1]` return?", "da": "Hvilket tegn returnerer `text[-1]`?"}
    options:
      - {id: last, text: {"es": "El último.", "en": "The last one.", "da": "Det sidste."}}
      - {id: first, text: {"es": "El primero.", "en": "The first one.", "da": "Det første."}}
      - {id: error, text: {"es": "Siempre genera error.", "en": "It always raises an error.", "da": "Det giver altid fejl."}}
    correct_option_ids: [last]
    explanation: {"es": "Los índices negativos cuentan desde el final.", "en": "Negative indices count from the end.", "da": "Negative indeks tæller fra slutningen."}
    linked_objectives: [m05.o2]

  - id: dm857.m05.q03
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {"es": "¿Incluye `text[2:5]` la posición 5?", "en": "Does `text[2:5]` include position 5?", "da": "Inkluderer `text[2:5]` position 5?"}
    options:
      - {id: no, text: {"es": "No, `stop` es exclusivo.", "en": "No, `stop` is exclusive.", "da": "Nej, `stop` er eksklusiv."}}
      - {id: yes, text: {"es": "Sí, ambos límites son inclusivos.", "en": "Yes, both bounds are inclusive.", "da": "Ja, begge grænser er inklusive."}}
    correct_option_ids: [no]
    explanation: {"es": "El slice contiene índices 2, 3 y 4.", "en": "The slice contains indices 2, 3, and 4.", "da": "Slicet indeholder indeks 2, 3 og 4."}
    linked_objectives: [m05.o2]

  - id: dm857.m05.q04
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Qué ocurre cuando `find` no encuentra una subcadena?", "en": "What happens when `find` does not find a substring?", "da": "Hvad sker der når `find` ikke finder en delstreng?"}
    options:
      - {id: minus_one, text: {"es": "Retorna `-1`.", "en": "It returns `-1`.", "da": "Den returnerer `-1`."}}
      - {id: value_error, text: {"es": "Genera `ValueError`.", "en": "It raises `ValueError`.", "da": "Den rejser `ValueError`."}}
      - {id: none, text: {"es": "Retorna `None`.", "en": "It returns `None`.", "da": "Den returnerer `None`."}}
    correct_option_ids: [minus_one]
    explanation: {"es": "`index` es el método que genera `ValueError` al fallar.", "en": "`index` is the method that raises `ValueError` when absent.", "da": "`index` rejser `ValueError` ved fravær."}
    linked_objectives: [m05.o3]

  - id: dm857.m05.q05
    activity_type: true_false
    difficulty: intermediate
    prompt: {"es": "`str.count` cuenta coincidencias solapadas.", "en": "`str.count` counts overlapping matches.", "da": "`str.count` tæller overlappende match."}
    correct_answer: false
    explanation: {"es": "Cuenta coincidencias no solapadas.", "en": "It counts non-overlapping matches.", "da": "Den tæller ikke-overlappende match."}
    linked_objectives: [m05.o3]

  - id: dm857.m05.q06
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Cuál es la mejor interpretación de `strip()`?", "en": "What is the best interpretation of `strip()`?", "da": "Hvad er den bedste fortolkning af `strip()`?"}
    options:
      - {id: ends, text: {"es": "Elimina caracteres especificados de los extremos.", "en": "It removes specified characters from the ends.", "da": "Den fjerner angivne tegn fra enderne."}}
      - {id: all, text: {"es": "Elimina todos los espacios internos.", "en": "It removes all internal spaces.", "da": "Den fjerner alle interne mellemrum."}}
      - {id: mutate, text: {"es": "Modifica la cadena original.", "en": "It mutates the original string.", "da": "Den muterer den oprindelige streng."}}
    correct_option_ids: [ends]
    explanation: {"es": "`strip` no elimina espacios internos y retorna una cadena nueva.", "en": "`strip` does not remove internal whitespace and returns a new string.", "da": "`strip` fjerner ikke interne mellemrum og returnerer en ny streng."}
    linked_objectives: [m05.o4, m05.o5]

  - id: dm857.m05.q07
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Por qué validar el número de campos antes de desempaquetar?", "en": "Why validate field count before unpacking?", "da": "Hvorfor validere feltantal før udpakning?"}
    options:
      - {id: explicit, text: {"es": "Para distinguir estructura inválida y producir un error claro.", "en": "To distinguish invalid structure and produce a clear error.", "da": "For at skelne ugyldig struktur og give en klar fejl."}}
      - {id: faster, text: {"es": "Solo para acelerar el programa.", "en": "Only to make the program faster.", "da": "Kun for at gøre programmet hurtigere."}}
      - {id: mutate, text: {"es": "Para que `split` pueda modificar el texto.", "en": "So `split` can mutate the text.", "da": "Så `split` kan mutere teksten."}}
    correct_option_ids: [explicit]
    explanation: {"es": "El parser debe expresar su contrato y no depender de un `ValueError` ambiguo.", "en": "The parser should express its contract rather than rely on an ambiguous `ValueError`.", "da": "Parseren bør udtrykke sin kontrakt frem for at stole på en tvetydig `ValueError`."}
    linked_objectives: [m05.o6, m05.o8]

  - id: dm857.m05.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Qué hace `separator.join(parts)`?", "en": "What does `separator.join(parts)` do?", "da": "Hvad gør `separator.join(parts)`?"}
    options:
      - {id: between, text: {"es": "Coloca el separador entre las cadenas de `parts`.", "en": "It places the separator between the strings in `parts`.", "da": "Den placerer separatoren mellem strengene i `parts`."}}
      - {id: split, text: {"es": "Divide `separator` usando `parts`.", "en": "It splits `separator` using `parts`.", "da": "Den opdeler `separator` med `parts`."}}
      - {id: append, text: {"es": "Añade el separador solo al final.", "en": "It appends the separator only at the end.", "da": "Den tilføjer kun separatoren til sidst."}}
    correct_option_ids: [between]
    explanation: {"es": "Todos los elementos deben ser cadenas.", "en": "All elements must be strings.", "da": "Alle elementer skal være strenge."}
    linked_objectives: [m05.o6]

  - id: dm857.m05.q09
    activity_type: true_false
    difficulty: advanced
    prompt: {"es": "`casefold` y normalización Unicode NFC resuelven exactamente el mismo problema.", "en": "`casefold` and Unicode NFC normalization solve exactly the same problem.", "da": "`casefold` og Unicode NFC-normalisering løser præcis samme problem."}
    correct_answer: false
    explanation: {"es": "`casefold` trata diferencias de caja; NFC trata formas de composición Unicode.", "en": "`casefold` addresses case; NFC addresses Unicode composition forms.", "da": "`casefold` behandler store/små bogstaver; NFC behandler Unicode-komposition."}
    linked_objectives: [m05.o7]

  - id: dm857.m05.q10
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {"es": "¿Cuál es el mejor criterio para una normalización textual?", "en": "What is the best criterion for text normalization?", "da": "Hvad er det bedste kriterium for tekstnormalisering?"}
    options:
      - {id: purpose, text: {"es": "La equivalencia requerida por el propósito y el contrato.", "en": "The equivalence required by purpose and contract.", "da": "Den ækvivalens som formål og kontrakt kræver."}}
      - {id: lowercase_all, text: {"es": "Convertir siempre todo a minúsculas.", "en": "Always lowercase everything.", "da": "Altid at konvertere alt til små bogstaver."}}
      - {id: shortest, text: {"es": "Elegir siempre la cadena más corta.", "en": "Always choose the shortest string.", "da": "Altid at vælge den korteste streng."}}
    correct_option_ids: [purpose]
    explanation: {"es": "La normalización solo es correcta respecto a una equivalencia documentada.", "en": "Normalization is correct only relative to a documented equivalence rule.", "da": "Normalisering er kun korrekt i forhold til en dokumenteret ækvivalensregel."}
    linked_objectives: [m05.o5, m05.o7]

assessment_items:
  - id: dm857.m05.a01
    activity_type: parser_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña una función que analice líneas sintéticas `sample_id|group|value`. Debe exigir exactamente tres
        campos, rechazar identificador o grupo vacíos, convertir `value` a `float`, conservar caja y documentar errores.
      en: >-
        Design a function parsing synthetic `sample_id|group|value` lines. It must require exactly three fields,
        reject empty identifier or group, convert `value` to float, preserve case, and document errors.
      da: >-
        Design en funktion der parser syntetiske linjer `sample_id|group|value`. Den skal kræve præcis tre felter,
        afvise tom identifikator eller gruppe, konvertere `value` til `float`, bevare store/små bogstaver og dokumentere fejl.
    accepted_answer_elements:
      - field count validated before unpacking
      - required fields stripped and checked
      - numeric conversion error handled or documented
      - case preserved
      - tests cover valid, missing field, extra field, empty field, and invalid number
    rubric:
      - {criterion: contract_and_structure, points: 3}
      - {criterion: correct_parsing_and_conversion, points: 3}
      - {criterion: error_policy, points: 2}
      - {criterion: tests, points: 2}
    linked_objectives: [m05.o5, m05.o6, m05.o8]

  - id: dm857.m05.a02
    activity_type: debugging
    difficulty: advanced
    prompt:
      es: >-
        Un programa ejecuta `label.strip().lower()` pero continúa usando `label`; después usa `parts = line.split(':')`
        y desempaqueta sin validar. Diagnostica ambos defectos, corrígelos y diseña pruebas reveladoras.
      en: >-
        A program executes `label.strip().lower()` but continues using `label`; then uses `parts = line.split(':')`
        and unpacks without validation. Diagnose both defects, correct them, and design revealing tests.
      da: >-
        Et program udfører `label.strip().lower()` men fortsætter med `label`; derefter bruges `line.split(':')`
        og udpakning uden validering. Diagnostisér, ret og design afslørende test.
    accepted_answer_elements:
      - transformed string must be assigned or returned
      - strings are immutable
      - separator count or field count validated before unpacking
      - tests include surrounding whitespace, missing separator, extra separator, and empty field
    rubric:
      - {criterion: immutability_diagnosis, points: 3}
      - {criterion: parser_diagnosis, points: 3}
      - {criterion: correction, points: 2}
      - {criterion: tests, points: 2}
    linked_objectives: [m05.o1, m05.o4, m05.o6, m05.o8]

  - id: dm857.m05.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: "Explica y defiende una política de equivalencia textual para etiquetas humanas y otra para identificadores científicos."
      en: "Explain and defend one text-equivalence policy for human labels and another for scientific identifiers."
      da: "Forklar og forsvar én tekstlig ækvivalenspolitik for menneskelige etiketter og en anden for videnskabelige identifikatorer."
    accepted_answer_elements:
      - human labels may allow whitespace normalization and case folding
      - scientific identifiers may require exact case and punctuation preservation
      - Unicode normalization decision is explicit
      - examples and counterexamples
      - limitations and collision risk acknowledged
    rubric:
      - {criterion: purpose_alignment, points: 3}
      - {criterion: technical_accuracy, points: 3}
      - {criterion: examples_and_counterexamples, points: 2}
      - {criterion: limitations, points: 2}
    linked_objectives: [m05.o5, m05.o7, m05.o8]

