content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title: {es: Presentación del proyecto y defensa oral individual, en: Project presentation and individual oral defense, da: Projektpræsentation og individuelt mundtligt forsvar}
  summary:
    es: >-
      Preparación de una presentación grupal coherente y una defensa oral individual basada en razonamiento.
      Incluye argumento, selección de evidencia, diseño visual, demostración controlada, explicación de
      arquitectura y código, respuesta estructurada, trazado y depuración oral, defensa de algoritmos,
      estructuras, bibliotecas, pruebas, rendimiento, reproducibilidad, contribución individual, límites,
      manejo honesto de incertidumbre y simulacros con rúbrica.
    en: >-
      Preparation of a coherent group presentation and reasoning-based individual oral defense. Covers
      argument, evidence selection, visual design, controlled demonstration, architecture and code explanation,
      structured answers, oral tracing and debugging, defense of algorithms, structures, libraries, testing,
      performance, reproducibility, individual contribution, limitations, honest uncertainty, and rubric-based rehearsal.
    da: >-
      Forberedelse af en sammenhængende gruppepræsentation og et ræsonneringsbaseret individuelt mundtligt
      forsvar. Modulet dækker argument, evidens, visuelt design, kontrolleret demonstration, forklaring af
      arkitektur og kode, strukturerede svar, mundtlig gennemgang og fejlsøgning, test, ydelse,
      reproducerbarhed, individuelt bidrag, begrænsninger og rubric-baserede prøveforsvar.
  prerequisites: [dm857.m16]
  official_learning_outcomes: [dm857.lo01, dm857.lo02, dm857.lo03, dm857.lo04, dm857.lo05, dm857.lo06, dm857.lo07, dm857.lo08]
  estimated_study_hours: 18
  difficulty: integrative

