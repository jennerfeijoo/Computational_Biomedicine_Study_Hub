  - {id: m17.o1, bloom_level: create, statement: {es: Construir una presentación grupal con tesis, evidencia y transición coherente entre integrantes., en: Build a group presentation with a thesis, evidence, and coherent transitions among members., da: Opbygge en gruppepræsentation med tese, evidens og sammenhængende overgange mellem medlemmer.}, evidence: group_presentation}
  - {id: m17.o2, bloom_level: evaluate, statement: {es: Seleccionar figuras, tablas, código y demostraciones que sostengan el argumento sin saturar., en: Select figures, tables, code, and demonstrations that support the argument without overload., da: Vælge figurer, tabeller, kode og demonstrationer der støtter argumentet uden overbelastning.}, evidence: evidence_selection}
  - {id: m17.o3, bloom_level: create, statement: {es: Explicar arquitectura, flujo y decisiones de implementación a partir de contratos y alternativas., en: Explain architecture, flow, and implementation decisions through contracts and alternatives., da: Forklare arkitektur, flow og implementeringsbeslutninger gennem kontrakter og alternativer.}, evidence: architecture_defense}
  - {id: m17.o4, bloom_level: analyze, statement: {es: Trazar, depurar y modificar fragmentos de código verbalmente y por escrito bajo preguntas., en: Trace, debug, and modify code verbally and in writing under questioning., da: Gennemgå, fejlsøge og ændre kode mundtligt og skriftligt under spørgsmål.}, evidence: live_reasoning}
  - {id: m17.o5, bloom_level: evaluate, statement: {es: Defender algoritmos, estructuras y bibliotecas mediante requisitos, complejidad, pruebas y limitaciones., en: Defend algorithms, structures, and libraries using requirements, complexity, tests, and limitations., da: Forsvare algoritmer, strukturer og biblioteker med krav, kompleksitet, test og begrænsninger.}, evidence: technical_defense}
  - {id: m17.o6, bloom_level: evaluate, statement: {es: Explicar qué evidencia demuestra corrección, reproducibilidad y rendimiento y qué no demuestra., en: Explain what evidence demonstrates correctness, reproducibility, and performance and what it does not demonstrate., da: Forklare hvilken evidens der viser korrekthed, reproducerbarhed og ydelse, og hvad den ikke viser.}, evidence: evidence_defense}
  - {id: m17.o7, bloom_level: evaluate, statement: {es: Describir contribución individual, decisiones propias, desacuerdos y aprendizaje sin atribuciones ambiguas., en: Describe individual contribution, personal decisions, disagreements, and learning without ambiguous attribution., da: Beskrive individuelt bidrag, egne beslutninger, uenigheder og læring uden tvetydig attribution.}, evidence: contribution_account}
  - {id: m17.o8, bloom_level: create, statement: {es: Responder con precisión, reconocer incertidumbre y razonar una solución cuando no se recuerda un detalle., en: Answer precisely, acknowledge uncertainty, and reason toward a solution when a detail is not recalled., da: Svare præcist, anerkende usikkerhed og ræsonnere mod en løsning når en detalje ikke huskes.}, evidence: oral_response_quality}

concepts:
  - id: presentation-as-argument
    title: {es: Presentación como argumento, en: Presentation as an argument, da: Præsentation som argument}
    body:
      es: >-
        La presentación no resume cada sección del informe con el mismo peso. Formula una tesis: qué problema
        se resolvió, cómo se modeló, qué decisiones fueron determinantes y qué evidencia sostiene el resultado.
        Una secuencia efectiva establece contexto, requisitos, arquitectura, demostración/evidencia, resultados,
        limitaciones y conclusión. Cada diapositiva debe cumplir una función argumental. El grupo comparte una
        narrativa y vocabulario; las transiciones explican por qué el siguiente bloque es necesario.
      en: >-
        A presentation does not equally summarize every report section. It advances a thesis: problem, model,
        decisive choices, and supporting evidence. An effective sequence covers context, requirements,
        architecture, demonstration/evidence, results, limitations, and conclusion. Every slide has an argumentative role.
      da: >-
        En præsentation opsummerer ikke alle rapportafsnit lige. Den fremfører en tese om problem, model,
        beslutninger og evidens. Hvert slide har en argumentativ funktion.
    linked_objectives: [m17.o1, m17.o2]
  - id: evidence-and-visual-selection
    title: {es: Selección de evidencia y diseño visual, en: Evidence selection and visual design, da: Valg af evidens og visuelt design}
    body:
      es: >-
        Una figura o tabla se incluye porque responde una pregunta, no porque exista. El título expresa la
        conclusión local; ejes, unidades, n y condiciones son legibles. El código se muestra sólo cuando una
        decisión depende de él, en fragmentos pequeños anotados. Una tabla puede comparar requisitos, alternativas
        o resultados con mayor densidad que una lista. La audiencia debe poder distinguir dato, interpretación y
        limitación. Decoración, texto diminuto y capturas completas de IDE reducen evidencia comunicable.
      en: >-
        Figures and tables answer questions. Titles state local conclusions; axes, units, n, and conditions remain
        readable. Show only code needed to explain a decision, in small annotated excerpts. The audience must
        distinguish data, interpretation, and limitation. Tiny text and full IDE screenshots weaken communication.
      da: >-
        Figurer og tabeller besvarer spørgsmål. Titler, akser, enheder, n og betingelser skal være læsbare.
        Vis kun små kodeuddrag der forklarer en beslutning.
    linked_objectives: [m17.o1, m17.o2]
  - id: controlled-demonstration
    title: {es: Demostración controlada y plan de contingencia, en: Controlled demonstration and contingency plan, da: Kontrolleret demonstration og beredskabsplan}
    body:
      es: >-
        Una demostración prueba una ruta concreta y debe tener objetivo, entrada conocida, salida esperada y duración.
        Se ensaya desde el mismo entorno y se evita depender de red o datos cambiantes. Debe existir una alternativa
        estática reproducible: captura, salida guardada o video breve, claramente identificada. La demostración no
        sustituye la validación; ilustra una capacidad ya respaldada por pruebas. Los fallos se explican sin ocultar
        estado y se vuelve al argumento principal.
      en: >-
        A demonstration has a purpose, known input, expected output, and duration. Rehearse in the same environment
        and avoid unstable network/data dependencies. Keep a clearly identified reproducible fallback. A demo
        illustrates a capability already supported by tests; it does not replace validation.
      da: >-
        En demonstration har formål, kendt input, forventet output og varighed. Undgå ustabile afhængigheder og hav
        en tydeligt identificeret reproducerbar fallback. Demo erstatter ikke validering.
    linked_objectives: [m17.o2, m17.o6]
  - id: architecture-and-decision-defense
    title: {es: Defensa de arquitectura y decisiones, en: Architecture and decision defense, da: Forsvar af arkitektur og beslutninger}
    body:
      es: >-
        Defender una arquitectura significa relacionar componentes con requisitos y contratos, explicar dirección
        de dependencias, flujo de datos, errores e invariantes y comparar alternativas consideradas. “Porque era más
        fácil” es incompleto; debe explicarse qué criterio se priorizó y qué coste se aceptó. Un diagrama se recorre
        con una entrada concreta. La respuesta distingue decisión inicial, evidencia posterior y posibles mejoras.
      en: >-
        Defending architecture links components to requirements and contracts, explains dependency direction, data
        flow, errors, and invariants, and compares alternatives. State prioritized criteria and accepted costs. Walk
        the diagram using a concrete input and distinguish initial decision, later evidence, and possible improvement.
      da: >-
        Arkitekturforsvar forbinder komponenter med krav og kontrakter, forklarer afhængigheder, dataflow, fejl og
        invarianter og sammenligner alternativer og kompromiser.
    linked_objectives: [m17.o3, m17.o5]
  - id: oral-code-tracing-and-debugging
    title: {es: Trazado y depuración oral de código, en: Oral code tracing and debugging, da: Mundtlig kodegennemgang og fejlsøgning}
    body:
      es: >-
        Ante un fragmento se identifica contrato, entradas, estado inicial y ruta de control antes de predecir salida.
        Se actualiza una tabla de variables y se verbalizan llamadas, mutaciones y retornos. Para depurar se separa
        síntoma de causa, se localiza la primera divergencia respecto al invariante y se propone una prueba mínima.
        Si se pide una modificación, primero se reformula el nuevo requisito y se analizan efectos sobre casos frontera,
        complejidad y pruebas. Ejecutar mentalmente no significa adivinar.
      en: >-
        For a code excerpt, identify contract, inputs, initial state, and control path before predicting output. Track
        variables, calls, mutations, and returns. Debug by locating the first invariant divergence and proposing a
        minimal test. For modifications, restate the new requirement and assess boundaries, complexity, and tests.
      da: >-
        Ved kode identificeres kontrakt, input, starttilstand og kontrolvej før output. Spor variable, kald, mutationer
        og returneringer; find første invariantafvigelse og foreslå en minimal test.
    linked_objectives: [m17.o4]
  - id: algorithm-and-data-structure-defense
    title: {es: Defensa de algoritmos y estructuras, en: Algorithm and data-structure defense, da: Forsvar af algoritmer og datastrukturer}
    body:
      es: >-
        Una defensa técnica comienza por las operaciones requeridas y la información que debe preservarse. Después
        explica algoritmo, invariante, terminación, complejidad temporal/espacial y casos adversos. Una estructura se
        justifica por identidad, orden, multiplicidad, mutabilidad y coste. Deben poder compararse alternativas: lista
        frente a conjunto, recorrido frente a índice, DFS frente a BFS, iteración frente a recursión. La respuesta
        reconoce supuestos que sostienen garantías promedio o logarítmicas.
      en: >-
        Technical defense begins with required operations and preserved information, then algorithm, invariant,
        termination, time/space complexity, and adversarial cases. Structure choice follows identity, order,
        multiplicity, mutability, and cost. Compare alternatives and state assumptions behind average/logarithmic guarantees.
      da: >-
        Teknisk forsvar starter med operationer og bevaret information, derefter algoritme, invariant, terminering,
        tids-/pladskompleksitet og adversarielle cases. Strukturvalg skal sammenlignes med alternativer.
    linked_objectives: [m17.o5]
  - id: library-and-environment-defense
    title: {es: Defensa de bibliotecas y entorno, en: Library and environment defense, da: Forsvar af biblioteker og miljø}
    body:
      es: >-
        Una biblioteca se justifica por contrato, funcionalidad, madurez, licencia, compatibilidad y reducción de riesgo,
        no sólo popularidad. Debe conocerse qué parte de la API se usa, shapes/tipos, errores y versión. El entorno se
        defiende mostrando dependencias declaradas, reproducción limpia y límites de plataforma. Ante “¿por qué no
        implementarlo ustedes?”, se compara coste, calidad, aprendizaje y alcance sin asumir que una biblioteca elimina
        la necesidad de validación.
      en: >-
        Libraries are justified by contract, functionality, maturity, license, compatibility, and risk reduction, not
        popularity alone. Know the used API, shapes/types, errors, and version. Defend the environment with declared
        dependencies and clean reproduction. Library use does not remove validation responsibility.
      da: >-
        Biblioteker begrundes med kontrakt, funktionalitet, modenhed, licens, kompatibilitet og risiko, ikke kun popularitet.
        Miljøet forsvares med deklarerede afhængigheder og ren reproduktion.
    linked_objectives: [m17.o5, m17.o6]
  - id: evidence-correctness-reproducibility-performance
    title: {es: Qué demuestra cada evidencia, en: What each evidence type demonstrates, da: Hvad hver evidenstype viser}
    body:
      es: >-
        Pruebas unitarias respaldan conductas locales; integración, contratos entre componentes; referencias y propiedades,
        algoritmos e invariantes; reproducción limpia, reconstrucción del resultado; benchmark, rendimiento bajo una carga.
        Cobertura sólo informa ejecución. Una presentación honesta distingue observación de inferencia y no convierte una
        prueba limitada en claim universal. Debe poder explicarse una prueba que falló y qué se aprendió de ella.
      en: >-
        Unit tests support local behavior; integration tests component contracts; references and properties algorithms and
        invariants; clean reproduction rebuildability; benchmarks performance under a workload. Coverage only indicates
        execution. Honest presentation distinguishes observation from inference and limited evidence from universal claims.
      da: >-
        Unit-test støtter lokal adfærd, integrationstest komponentkontrakter, reference/egenskaber algoritmer, ren reproduktion
        genopbygning og benchmark ydelse under en belastning. Dækning viser kun udførelse.
    linked_objectives: [m17.o6]
  - id: contribution-and-team-accountability
    title: {es: Contribución individual y responsabilidad grupal, en: Individual contribution and group accountability, da: Individuelt bidrag og gruppeansvar}
    body:
      es: >-
        La contribución individual se describe con artefactos y decisiones: requisitos redactados, componentes implementados,
        pruebas, revisiones, experimentos y documentación. También debe comprenderse el sistema completo, no sólo “mi archivo”.
        Se distinguen autoría, colaboración y revisión. Los desacuerdos se explican mediante alternativas, criterios y resolución,
        sin culpar. La respuesta reconoce ayuda recibida y muestra qué conocimiento se adquirió al integrar trabajo ajeno.
      en: >-
        Individual contribution is described through artifacts and decisions: requirements, components, tests, reviews,
        experiments, and documentation. Each member must understand the whole system. Distinguish authorship, collaboration,
        and review; explain disagreements through alternatives and criteria without blame.
      da: >-
        Individuelt bidrag beskrives gennem artefakter og beslutninger, men hvert medlem skal forstå hele systemet.
        Skeln mellem forfatterskab, samarbejde og review og forklar uenigheder uden skyld.
    linked_objectives: [m17.o7]
  - id: structured-answer-and-uncertainty
    title: {es: Respuesta estructurada e incertidumbre honesta, en: Structured answers and honest uncertainty, da: Strukturerede svar og ærlig usikkerhed}
    body:
      es: >-
        Una respuesta sólida comienza con una conclusión breve, sigue con mecanismo o evidencia y termina con límite o
        implicación. Si la pregunta es ambigua, se aclara la interpretación. Si no se recuerda una API exacta, se dice qué
        principio se conoce, cómo se verificaría y se razona sin inventar. “No sé” puede ampliarse con una estrategia de
        comprobación. Corregirse explícitamente es preferible a defender una afirmación falsa. El silencio breve para pensar
        mejora precisión; llenar tiempo con generalidades la reduce.
      en: >-
        A strong answer starts with a concise conclusion, follows with mechanism or evidence, and ends with limitation or
        implication. Clarify ambiguity. When exact API detail is unknown, state the known principle, verification strategy,
        and reason without invention. Explicit correction is preferable to defending a false claim.
      da: >-
        Et stærkt svar starter med konklusion, fortsætter med mekanisme/evidens og slutter med begrænsning eller implikation.
        Ved usikkerhed angives kendt princip og verifikationsstrategi uden opfindelse.
    linked_objectives: [m17.o8]
  - id: rehearsal-feedback-and-rubric
    title: {es: Simulacro, retroalimentación y rúbrica, en: Rehearsal, feedback, and rubric, da: Prøveforsvar, feedback og rubric}
    body:
      es: >-
        Los simulacros deben variar: preguntas previsibles, código nuevo, contradicciones, límites y seguimiento. Se graban
        tiempo, claridad, exactitud, evidencia, profundidad y capacidad de corregirse. La retroalimentación cita una respuesta
        concreta y propone una conducta observable, no “habla mejor”. Cada integrante practica todo el sistema y responde sin
        diapositivas. La última fase reduce muletillas y longitud, pero no memoriza un guion rígido que impida razonar.
      en: >-
        Rehearsals vary predictable questions, new code, contradictions, limitations, and follow-ups. Score timing, clarity,
        accuracy, evidence, depth, and self-correction. Feedback cites a concrete answer and an observable improvement. Every
        member practices the whole system without slides; avoid rigid scripts that block reasoning.
      da: >-
        Prøveforsvar varierer spørgsmål, ny kode, modsigelser, begrænsninger og opfølgning. Vurder tid, klarhed, korrekthed,
        evidens, dybde og selvkorrektion. Undgå et stift manuskript der blokerer ræsonnering.
    linked_objectives: [m17.o1, m17.o4, m17.o8]

worked_examples:
  - id: dm857.m17.e01
    title: {es: Convertir una respuesta débil en una defensa técnica, en: Turn a weak answer into a technical defense, da: Omsæt et svagt svar til et teknisk forsvar}
    problem: {es: Mejorar “usamos un diccionario porque era más fácil” ante una pregunta sobre estructura., en: Improve “we used a dictionary because it was easier” when asked about structure choice., da: Forbedr “vi brugte en ordbog fordi det var lettere” ved spørgsmål om strukturvalg.}
    assumptions: [unique identifiers, repeated lookup, duplicates rejected]
    reasoning:
      es: [Comenzar por operaciones y semántica., Explicar complejidad y memoria., Declarar política de duplicados., Comparar alternativa.]
      en: [Start from operations and semantics., Explain complexity and memory., State duplicate policy., Compare an alternative.]
      da: [Start med operationer og semantik., Forklar kompleksitet og hukommelse., Angiv dubletpolitik., Sammenlign alternativ.]
    expected_output: >-
      “Elegimos un diccionario porque cada registro tiene un identificador único y el flujo realiza muchas
      consultas por id. Tras construir el índice en O(n), la consulta es O(1) promedio, frente a O(n) por
      recorrido de lista. El coste es memoria O(n) y la necesidad de rechazar ids duplicados antes de insertar.
      Las pruebas cubren duplicados, ausentes y conservación del orden solicitado.”
    validation: [requirement, tradeoff, assumption, alternative, and evidence are all present]
    explanation: {es: La respuesta se convierte de preferencia personal en una decisión defendida por contrato y evidencia., en: The answer changes from personal preference to a contract- and evidence-based decision., da: Svaret ændres fra personlig præference til en kontrakt- og evidensbaseret beslutning.}
    linked_objectives: [m17.o5, m17.o8]
  - id: dm857.m17.e02
    title: {es: Razonar un bug en vivo, en: Reason through a bug live, da: Ræsonnér gennem en bug live}
    problem: {es: Una función elimina elementos de una lista mientras la recorre y omite valores consecutivos., en: A function removes list items while traversing and skips consecutive values., da: En funktion fjerner elementer fra en liste under gennemløb og springer på hinanden følgende værdier over.}
    assumptions: [the intended contract filters values without mutating input]
    reasoning:
      es: [Trazar índices y desplazamiento., Identificar divergencia del contrato., Proponer construcción de salida nueva., Diseñar regresión.]
      en: [Trace indices and shifting., Identify contract divergence., Build a new output., Design regression.]
      da: [Spor indeks og forskydning., Find kontraktbrud., Byg nyt output., Design regression.]
    expected_output: explanation that mutation shifts the next item into an already-passed index; use a comprehension or separate output and test adjacent removals
    validation: [adjacent matches, no matches, all matches, input unchanged]
    explanation: {es: La defensa muestra trazado, causa, solución y prueba; no sólo propone una línea distinta., en: The defense demonstrates trace, cause, solution, and test rather than merely offering a different line., da: Forsvaret viser spor, årsag, løsning og test, ikke blot en anden linje.}
    linked_objectives: [m17.o4, m17.o6]
  - id: dm857.m17.e03
    title: {es: Responder cuando no se recuerda una firma exacta, en: Answer when an exact signature is not remembered, da: Svar når en præcis signatur ikke huskes}
    problem: {es: Explicar cómo responder si no se recuerda el parámetro exacto de una función de biblioteca., en: Explain how to answer when an exact library-function parameter is not recalled., da: Forklar hvordan man svarer når en præcis biblioteksparameter ikke huskes.}
    assumptions: [documentation would be available outside the oral setting]
    reasoning:
      es: [No inventar el nombre., Explicar el comportamiento requerido., Indicar cómo verificar la API., Razonar la alternativa manual.]
      en: [Do not invent the name., Explain required behavior., State how to verify the API., Reason about a manual alternative.]
      da: [Opfind ikke navnet., Forklar nødvendig adfærd., Angiv API-verifikation., Ræsonnér manuel alternativ.]
    expected_output: >-
      “No recuerdo con certeza el nombre del parámetro. El comportamiento que necesitamos es reducir por
      columnas, es decir sobre las muestras. Verificaría la firma y la convención de axis en la documentación;
      en nuestra matriz muestras × variables corresponde a axis 0. También lo confirmaría con un caso 2×2.”
    validation: [uncertainty is explicit, principle is correct, verification and minimal check are given]
    explanation: {es: La honestidad no impide demostrar comprensión; evita sustituir conocimiento por una API inventada., en: Honesty still demonstrates understanding and avoids replacing knowledge with an invented API., da: Ærlighed kan stadig demonstrere forståelse og undgår en opfundet API.}
    linked_objectives: [m17.o5, m17.o8]

practice_exercises:
  - {id: dm857.m17.p01, activity_type: presentation_outline, difficulty: intermediate, prompt: {es: Diseña una presentación de ocho minutos con máximo siete diapositivas y asigna una función argumental a cada una., en: Design an eight-minute presentation with at most seven slides and assign an argumentative role to each., da: Design en otte-minutters præsentation med højst syv slides og giv hvert slide en argumentativ rolle.}, reference_solution: {es: Problema/tesis; requisitos/datos; arquitectura; decisión técnica; validación; resultados/limitaciones; conclusión. Ajustar a evidencia real y transiciones., en: Problem/thesis; requirements/data; architecture; technical choice; validation; results/limitations; conclusion. Adapt to actual evidence and transitions., da: Problem/tese, krav/data, arkitektur, teknisk beslutning, validering, resultater/begrænsninger og konklusion.}, linked_objectives: [m17.o1, m17.o2]}
  - {id: dm857.m17.p02, activity_type: visual_critique, difficulty: intermediate, prompt: {es: Reemplaza una captura completa de IDE por un recurso visual que explique una decisión de parsing., en: Replace a full IDE screenshot with a visual explaining a parsing decision., da: Erstat et fuldt IDE-screenshot med en visualisering af en parsingbeslutning.}, reference_solution: {es: Mostrar flujo entrada→validación→registro/error, un fragmento de 5–8 líneas y una tabla de casos válidos/inválidos con resultados., en: Show input→validation→record/error flow, a 5–8 line excerpt, and a valid/invalid case table., da: Vis input→validering→post/fejl-flow, et kort kodeuddrag og en casetabel.}, linked_objectives: [m17.o2, m17.o3]}
  - {id: dm857.m17.p03, activity_type: oral_code_tracing, difficulty: advanced, prompt: {es: Traza una función recursiva pequeña, indica pila, caso base, retorno y complejidad., en: Trace a small recursive function, stating stack, base case, return, and complexity., da: Gennemgå en lille rekursiv funktion med stak, basiscase, retur og kompleksitet.}, reference_solution: {es: Registrar cada llamada y argumento, detener en base, reconstruir retornos y contar llamadas/profundidad; separar tiempo y espacio., en: Record calls and arguments, stop at base, reconstruct returns, count calls/depth, and separate time from space., da: Registrér kald og argumenter, stop ved base, rekonstruér returneringer, tæl kald/dybde og adskil tid og plads.}, linked_objectives: [m17.o4, m17.o5]}
  - {id: dm857.m17.p04, activity_type: alternative_defense, difficulty: advanced, prompt: {es: Compara recursión e iteración para un recorrido de árbol y formula cuándo cambiarías la elección., en: Compare recursion and iteration for tree traversal and state when you would change the choice., da: Sammenlign rekursion og iteration til trægennemløb og angiv hvornår valget ændres.}, reference_solution: {es: Recursión refleja estructura y es legible; usa pila O(h) y puede alcanzar límite. Iteración usa pila explícita y mayor control. Cambiar con árboles muy profundos o requisitos de control/pausa., en: Recursion mirrors structure and is readable but uses O(h) call stack and may hit limits. Iteration uses explicit state and more control. Change for deep trees or pause/control requirements., da: Rekursion afspejler strukturen men bruger O(h) kaldestak; iteration giver eksplicit kontrol og er bedre ved dybe træer.}, linked_objectives: [m17.o5]}
  - {id: dm857.m17.p05, activity_type: evidence_defense, difficulty: advanced, prompt: {es: Responde “¿cómo saben que el proyecto es reproducible?” con evidencia concreta y límites., en: Answer “how do you know the project is reproducible?” with concrete evidence and limits., da: Besvar “hvordan ved I at projektet er reproducerbart?” med konkret evidens og grænser.}, reference_solution: {es: Citar clon limpio, entorno/versiones, checksum de datos, comandos, tests y outputs comparados; limitar a plataformas probadas y declarar no determinismo restante., en: Cite clean clone, environment/versions, data checksums, commands, tests, and compared outputs; limit to tested platforms and state remaining nondeterminism., da: Henvis til ren klon, miljø/versioner, datachecksums, kommandoer, test og output; begræns til testede platforme.}, linked_objectives: [m17.o6]}
  - {id: dm857.m17.p06, activity_type: mock_oral, difficulty: integrative, prompt: {es: Realiza un simulacro de diez preguntas con seguimiento sobre requisitos, arquitectura, código, pruebas, complejidad, datos, contribución y limitaciones., en: Conduct a ten-question mock oral with follow-ups on requirements, architecture, code, tests, complexity, data, contribution, and limitations., da: Gennemfør et prøveforsvar med ti spørgsmål og opfølgning om krav, arkitektur, kode, test, kompleksitet, data, bidrag og begrænsninger.}, reference_solution: {es: Evaluar cada respuesta por conclusión, mecanismo/evidencia, límite, exactitud, tiempo y capacidad de corregirse; repetir las dos áreas más débiles con código nuevo., en: Score each answer for conclusion, mechanism/evidence, limitation, accuracy, timing, and self-correction; repeat the two weakest areas with new code., da: Vurder konklusion, mekanisme/evidens, begrænsning, korrekthed, tid og selvkorrektion og gentag svage områder med ny kode.}, linked_objectives: [m17.o1, m17.o4, m17.o5, m17.o6, m17.o7, m17.o8]}

objective_bank:
  - {id: dm857.m17.q01, activity_type: multiple_choice, prompt: {es: ¿Qué debe expresar el título de una figura?, en: What should a figure title express?, da: Hvad bør en figurtitel udtrykke?}, options: [{id: conclusion, text: {es: La conclusión local o pregunta respondida., en: The local conclusion or answered question., da: Den lokale konklusion eller besvarede spørgsmål.}}, {id: figure1, text: {es: Sólo “Figura 1”., en: Only “Figure 1”., da: Kun “Figur 1”.}}, {id: decoration, text: {es: Una frase decorativa., en: A decorative phrase., da: En dekorativ sætning.}}], correct_option_ids: [conclusion]}
  - {id: dm857.m17.q02, activity_type: true_false, prompt: {es: Una demostración exitosa sustituye las pruebas., en: A successful demonstration replaces tests., da: En succesfuld demonstration erstatter test.}, correct_answer: false}
  - {id: dm857.m17.q03, activity_type: multiple_choice, prompt: {es: ¿Qué inicia una respuesta técnica sólida?, en: What begins a strong technical answer?, da: Hvad indleder et stærkt teknisk svar?}, options: [{id: conclusion, text: {es: Una conclusión directa., en: A direct conclusion., da: En direkte konklusion.}}, {id: history, text: {es: Toda la historia del proyecto., en: The whole project history., da: Hele projektets historie.}}, {id: filler, text: {es: Generalidades., en: Generalities., da: Generelle vendinger.}}], correct_option_ids: [conclusion]}
  - {id: dm857.m17.q04, activity_type: true_false, prompt: {es: Admitir que no se recuerda una firma exacta impide demostrar comprensión., en: Admitting an exact signature is not recalled prevents demonstrating understanding., da: At indrømme at en præcis signatur ikke huskes forhindrer forståelsesdemonstration.}, correct_answer: false}
  - {id: dm857.m17.q05, activity_type: multiple_choice, prompt: {es: ¿Qué debe seguir a una elección de estructura?, en: What should follow a data-structure choice?, da: Hvad bør følge et strukturvalg?}, options: [{id: tradeoff, text: {es: Requisitos, alternativa, complejidad, coste y evidencia., en: Requirements, alternative, complexity, cost, and evidence., da: Krav, alternativ, kompleksitet, pris og evidens.}}, {id: popularity, text: {es: Popularidad únicamente., en: Popularity only., da: Kun popularitet.}}, {id: preference, text: {es: Preferencia personal., en: Personal preference., da: Personlig præference.}}], correct_option_ids: [tradeoff]}
  - {id: dm857.m17.q06, activity_type: true_false, prompt: {es: Cada integrante sólo necesita comprender su archivo., en: Each member only needs to understand their own file., da: Hvert medlem behøver kun forstå sin egen fil.}, correct_answer: false}
  - {id: dm857.m17.q07, activity_type: multiple_choice, prompt: {es: ¿Qué demuestra un benchmark?, en: What does a benchmark demonstrate?, da: Hvad demonstrerer et benchmark?}, options: [{id: workload, text: {es: Rendimiento bajo carga, entorno y protocolo definidos., en: Performance under a defined workload, environment, and protocol., da: Ydelse under defineret belastning, miljø og protokol.}}, {id: universal, text: {es: Superioridad universal., en: Universal superiority., da: Universel overlegenhed.}}, {id: correctness, text: {es: Corrección de todos los casos., en: Correctness for every case., da: Korrekthed for alle cases.}}], correct_option_ids: [workload]}
  - {id: dm857.m17.q08, activity_type: true_false, prompt: {es: Una respuesta puede corregirse explícitamente durante la defensa., en: An answer may be explicitly corrected during the defense., da: Et svar kan korrigeres eksplicit under forsvaret.}, correct_answer: true}
  - {id: dm857.m17.q09, activity_type: multiple_choice, prompt: {es: ¿Qué pertenece a una buena respuesta sobre limitaciones?, en: What belongs in a good answer about limitations?, da: Hvad hører til et godt svar om begrænsninger?}, options: [{id: impact, text: {es: Alcance, impacto y posible mitigación., en: Scope, impact, and possible mitigation., da: Omfang, effekt og mulig afhjælpning.}}, {id: denial, text: {es: Negar toda limitación., en: Deny all limitations., da: Benægt alle begrænsninger.}}, {id: future, text: {es: Decir sólo “trabajo futuro”., en: Say only “future work”., da: Sig kun “fremtidigt arbejde”.}}], correct_option_ids: [impact]}
  - {id: dm857.m17.q10, activity_type: true_false, prompt: {es: Memorizar un guion rígido es la mejor preparación para preguntas nuevas., en: Memorizing a rigid script is the best preparation for new questions., da: Et stift memoriseret manuskript er den bedste forberedelse til nye spørgsmål.}, correct_answer: false}

assessment_items:
  - id: dm857.m17.a01
    activity_type: presentation_design
    difficulty: integrative
    prompt: {es: Produce la estructura completa de la presentación grupal con tiempo, responsable, propósito, evidencia, transición y plan de contingencia por diapositiva., en: Produce the complete group-presentation structure with time, speaker, purpose, evidence, transition, and contingency plan per slide., da: Udarbejd hele gruppepræsentationen med tid, taler, formål, evidens, overgang og beredskab pr. slide.}
    accepted_answer_elements: [single thesis, timing budget, balanced contribution, evidence-centered visuals, rehearsed transitions, demo fallback, limitations]
    rubric: [{criterion: argument_and_timing, points: 3}, {criterion: evidence_and_visuals, points: 3}, {criterion: team_coherence, points: 2}, {criterion: contingency_and_limits, points: 2}]
  - id: dm857.m17.a02
    activity_type: technical_oral_defense
    difficulty: integrative
    prompt: {es: Responde oralmente una secuencia adaptativa de preguntas sobre arquitectura, una función, una estructura de datos, complejidad y una prueba. Cada respuesta debe incluir conclusión, evidencia y límite., en: Answer an adaptive oral sequence on architecture, one function, one data structure, complexity, and one test. Each answer includes conclusion, evidence, and limitation., da: Besvar en adaptiv mundtlig sekvens om arkitektur, funktion, struktur, kompleksitet og test med konklusion, evidens og begrænsning.}
    accepted_answer_elements: [precise terminology, traceable reasoning, correct assumptions, alternatives, tests, honest uncertainty]
    rubric: [{criterion: correctness, points: 4}, {criterion: reasoning_and_evidence, points: 3}, {criterion: assumptions_and_limits, points: 2}, {criterion: communication, points: 1}]
  - id: dm857.m17.a03
    activity_type: live_code_reasoning
    difficulty: integrative
    prompt: {es: Analiza un fragmento no ensayado relacionado con el proyecto: predice salida, identifica un defecto, propone corrección, prueba y complejidad., en: Analyze an unrehearsed project-related excerpt: predict output, identify a defect, propose a fix, test, and complexity., da: Analysér et ikke-øvet projektrelateret kodeuddrag: forudsig output, find fejl, foreslå rettelse, test og kompleksitet.}
    accepted_answer_elements: [state trace, root cause, contract-restoring fix, regression test, time/space analysis]
    rubric: [{criterion: trace, points: 2}, {criterion: diagnosis, points: 3}, {criterion: correction_and_test, points: 3}, {criterion: complexity, points: 2}]
  - id: dm857.m17.a04
    activity_type: contribution_and_reflection
    difficulty: integrative
    prompt: {es: Presenta una reflexión individual con contribuciones verificables, una decisión defendida, una revisión de trabajo ajeno, un desacuerdo resuelto, un error propio y el aprendizaje técnico derivado., en: Present an individual reflection with verifiable contributions, one defended decision, review of another member's work, a resolved disagreement, a personal error, and resulting technical learning., da: Præsenter en individuel refleksion med verificerbare bidrag, en forsvaret beslutning, review af andres arbejde, løst uenighed, egen fejl og teknisk læring.}
    accepted_answer_elements: [artifact-based contribution, whole-system understanding, decision criteria, accountable error analysis, specific learning]
    rubric: [{criterion: contribution_evidence, points: 3}, {criterion: system_understanding, points: 3}, {criterion: reflection_and_accountability, points: 2}, {criterion: clarity, points: 2}]

flashcards: {source_file: ../flashcards/dm857_m17_flashcards.yaml, expected_count: 30}

glossary:
  - {id: term.presentation_thesis, term: {es: tesis de presentación, en: presentation thesis, da: præsentationstese}, definition: {es: Afirmación central que organiza el argumento oral., en: Central claim organizing the oral argument., da: Central påstand der organiserer det mundtlige argument.}}
  - {id: term.transition, term: {es: transición, en: transition, da: overgang}, definition: {es: Enlace verbal que explica la relación entre dos partes del argumento., en: Verbal link explaining the relation between argument sections., da: Verbal forbindelse der forklarer relationen mellem argumentdele.}}
  - {id: term.contingency_plan, term: {es: plan de contingencia, en: contingency plan, da: beredskabsplan}, definition: {es: Alternativa preparada ante un fallo previsible de la demostración., en: Prepared alternative for a foreseeable demonstration failure., da: Forberedt alternativ ved en forudsigelig demonstrationsfejl.}}
  - {id: term.code_trace, term: {es: trazado de código, en: code trace, da: kodegennemgang}, definition: {es: Registro ordenado de estado, control, llamadas y salidas durante ejecución., en: Ordered record of state, control, calls, and outputs during execution., da: Ordnet registrering af tilstand, kontrol, kald og output under udførelse.}}
  - {id: term.technical_defense, term: {es: defensa técnica, en: technical defense, da: teknisk forsvar}, definition: {es: Justificación de una decisión mediante requisitos, alternativas, evidencia y límites., en: Justification of a decision through requirements, alternatives, evidence, and limits., da: Begrundelse af en beslutning gennem krav, alternativer, evidens og grænser.}}
  - {id: term.follow_up_question, term: {es: pregunta de seguimiento, en: follow-up question, da: opfølgende spørgsmål}, definition: {es: Pregunta que examina profundidad, coherencia o consecuencias de una respuesta previa., en: Question probing depth, coherence, or consequences of a prior answer., da: Spørgsmål der undersøger dybde, sammenhæng eller konsekvenser af et tidligere svar.}}
  - {id: term.bounded_claim, term: {es: afirmación delimitada, en: bounded claim, da: afgrænset påstand}, definition: {es: Claim restringido a datos, condiciones y evidencia realmente evaluados., en: Claim restricted to actually evaluated data, conditions, and evidence., da: Påstand begrænset til faktisk evaluerede data, betingelser og evidens.}}
  - {id: term.individual_contribution, term: {es: contribución individual, en: individual contribution, da: individuelt bidrag}, definition: {es: Artefactos, decisiones y revisiones atribuibles y verificables de una persona., en: Verifiable artifacts, decisions, and reviews attributable to one person., da: Verificerbare artefakter, beslutninger og reviews der kan tilskrives én person.}}
  - {id: term.self_correction, term: {es: autocorrección, en: self-correction, da: selvkorrektion}, definition: {es: Reconocimiento y reparación explícita de una afirmación incorrecta durante el razonamiento., en: Explicit recognition and repair of an incorrect claim during reasoning., da: Eksplicit genkendelse og rettelse af en forkert påstand under ræsonnering.}}
  - {id: term.mock_defense, term: {es: simulacro de defensa, en: mock defense, da: prøveforsvar}, definition: {es: Ensayo evaluado de preguntas técnicas y respuestas sin guion rígido., en: Assessed rehearsal of technical questions and unscripted answers., da: Vurderet øvelse af tekniske spørgsmål og ikke-scriptede svar.}}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El tutor debe formular preguntas que obliguen a conectar requisito, código, evidencia y límite. No debe
      entregar respuestas memorizables ni permitir que el estudiante se refugie en frases generales. Debe pedir
      trazado, contraejemplo, alternativa o prueba. Cuando el estudiante duda, debe valorar si reconoce el límite,
      conserva principios correctos y propone verificación. La retroalimentación debe identificar una frase o paso
      concreto y ofrecer una conducta observable para el siguiente simulacro.
    en: >-
      Ask questions that connect requirement, code, evidence, and limitation. Do not provide memorized scripts or
      accept generalities. Require a trace, counterexample, alternative, or test. Under uncertainty, assess whether
      the learner acknowledges limits, preserves correct principles, and proposes verification. Feedback cites a
      concrete statement and an observable next behavior.
    da: >-
      Stil spørgsmål der forbinder krav, kode, evidens og begrænsning. Accepter ikke generaliteter; kræv spor,
      modeksempel, alternativ eller test. Vurder ærlig usikkerhed og verifikationsstrategi.
  misconceptions:
    - {id: m17.mc01, claim: {es: La mejor defensa memoriza respuestas exactas., en: The best defense memorizes exact answers., da: Det bedste forsvar memorerer præcise svar.}, correction: {es: Debe practicar estructuras de razonamiento y aplicar principios a preguntas nuevas., en: It should practice reasoning structures and apply principles to new questions., da: Den bør øve ræsonneringsstrukturer og anvende principper på nye spørgsmål.}}
    - {id: m17.mc02, claim: {es: Admitir incertidumbre siempre reduce la nota., en: Admitting uncertainty always lowers the grade., da: At indrømme usikkerhed sænker altid karakteren.}, correction: {es: Inventar es peor; una incertidumbre delimitada con razonamiento y verificación demuestra criterio., en: Invention is worse; bounded uncertainty with reasoning and verification demonstrates judgment., da: Opfindelse er værre; afgrænset usikkerhed med ræsonnering og verifikation viser dømmekraft.}}
    - {id: m17.mc03, claim: {es: La presentación debe mostrar todo el proyecto., en: The presentation should show the entire project., da: Præsentationen bør vise hele projektet.}, correction: {es: Debe seleccionar la evidencia mínima suficiente para sostener el argumento., en: It should select the minimum sufficient evidence supporting the argument., da: Den bør vælge den mindst tilstrækkelige evidens til argumentet.}}
  socratic_questions:
    - ¿Qué requisito y evidencia sostienen esa decisión?
    - ¿Qué cambiaría si el tamaño de entrada creciera diez veces?
    - ¿Qué prueba fallaría si tu explicación fuera incorrecta?
    - ¿Cuál es la alternativa más razonable y qué coste tiene?
    - ¿Qué parte de esta respuesta sabes, cuál infieres y cómo la verificarías?
  grading_guidance:
    do_not_accept: [memorized claims without mechanism, demos as sole validation, complexity without assumptions, vague personal contribution, invented API details]
    strong_answer_features: [direct conclusion, traceable reasoning, concrete evidence, alternatives and tradeoffs, bounded claims, honest self-correction, whole-project understanding]
  retrieval_fragments:
    - {id: m17.r01, topics: [oral answer, structure], text: {es: Responde conclusión → mecanismo/evidencia → límite o implicación; aclara la interpretación antes de razonar., en: Answer conclusion → mechanism/evidence → limitation or implication; clarify interpretation before reasoning., da: Svar konklusion → mekanisme/evidens → begrænsning eller implikation og afklar fortolkning først.}}
    - {id: m17.r02, topics: [uncertainty, verification], text: {es: Si no recuerdas un detalle, no lo inventes: declara el principio conocido, razona y explica cómo verificarías la API o resultado., en: If a detail is not recalled, do not invent it: state the known principle, reason, and explain how the API or result would be verified., da: Hvis en detalje ikke huskes, opfind den ikke; angiv kendt princip, ræsonnér og forklar verifikation.}}

sources:
  - {id: source.official_dm857, role: assessment_alignment, note: Group presentation followed by a short individual oral examination.}
  - {id: source.dm857_modules, role: technical_question_basis, note: All prior course modules provide material for tracing, design, testing, complexity, and limitations.}
  - {id: source.project_report, role: evidence_basis, note: The submitted project, repository, tests, report, and reproducibility record are the primary defense evidence.}

limitations:
  - Exact presentation duration, examination sequence, and permitted materials must be checked against active instructions.
  - Mock questions cannot predict the exact examination and should train transfer rather than scripts.
  - Communication coaching does not replace technical mastery of the implemented project.
