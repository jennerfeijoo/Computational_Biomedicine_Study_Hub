metadata:
  title: {es: Estructuras jerárquicas, árboles y recorridos, en: Hierarchical structures, trees, and traversals, da: Hierarkiske strukturer, træer og gennemløb}
  summary:
    es: >-
      Formalización de jerarquías mediante árboles: vocabulario estructural, representaciones,
      árboles generales y binarios, recorridos preorden, inorden, postorden y por niveles,
      búsqueda, métricas, complejidad, invariantes y pruebas sobre árboles vacíos y no vacíos.
    en: >-
      Formalization of hierarchies through trees: structural vocabulary, representations,
      general and binary trees, preorder, inorder, postorder, and level-order traversals,
      search, metrics, complexity, invariants, and tests for empty and non-empty trees.
    da: >-
      Formalisering af hierarkier med træer: strukturelt ordforråd, repræsentationer, generelle
      og binære træer, preorder-, inorder-, postorder- og niveaugennemløb, søgning, mål,
      kompleksitet, invarianter og test.
  prerequisites: [dm857.m04, dm857.m06, dm857.m07, dm857.m09]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05, dm857.lo06, dm857.lo08]
  estimated_study_hours: 20
  difficulty: intermediate_to_advanced

objectives:
  - {id: m10.o1, bloom_level: understand, statement: {es: Describir árboles con terminología estructural precisa., en: Describe trees using precise structural terminology., da: Beskrive træer med præcis strukturel terminologi.}, evidence: structural_description}
  - {id: m10.o2, bloom_level: create, statement: {es: Representar jerarquías mediante estructuras anidadas y objetos., en: Represent hierarchies using nested structures and objects., da: Repræsentere hierarkier med indlejrede strukturer og objekter.}, evidence: representation_design}
  - {id: m10.o3, bloom_level: apply, statement: {es: Implementar recorridos preorden, inorden y postorden., en: Implement preorder, inorder, and postorder traversals., da: Implementere preorder-, inorder- og postorder-gennemløb.}, evidence: depth_first_traversal}
  - {id: m10.o4, bloom_level: apply, statement: {es: Implementar búsqueda en profundidad y por niveles., en: Implement depth-first and level-order search., da: Implementere dybdeførst og niveauvis søgning.}, evidence: search_implementation}
  - {id: m10.o5, bloom_level: analyze, statement: {es: Calcular tamaño, altura, profundidad y número de hojas con definiciones coherentes., en: Compute size, height, depth, and leaf count using coherent definitions., da: Beregne størrelse, højde, dybde og antal blade med konsistente definitioner.}, evidence: tree_metric_analysis}
  - {id: m10.o6, bloom_level: evaluate, statement: {es: Distinguir árboles generales, binarios y binarios de búsqueda., en: Distinguish general, binary, and binary-search trees., da: Skelne mellem generelle, binære og binære søgetræer.}, evidence: property_comparison}
  - {id: m10.o7, bloom_level: analyze, statement: {es: Analizar tiempo y espacio de recorridos según forma y representación., en: Analyze traversal time and space according to shape and representation., da: Analysere tids- og pladsforbrug efter form og repræsentation.}, evidence: complexity_argument}
  - {id: m10.o8, bloom_level: create, statement: {es: Diseñar invariantes y pruebas para árboles vacíos, degenerados, equilibrados y con etiquetas repetidas., en: Design invariants and tests for empty, degenerate, balanced, and duplicate-label trees., da: Designe invarianter og test for tomme, degenererede, balancerede træer og gentagne etiketter.}, evidence: tree_test_suite}

concepts:
  - id: tree-vocabulary-and-invariants
    title: {es: Vocabulario e invariantes estructurales, en: Vocabulary and structural invariants, da: Ordforråd og strukturelle invarianter}
    body:
      es: >-
        Un árbol organiza nodos mediante relaciones padre-hijo. La raíz no tiene padre; una hoja no
        tiene hijos; un nodo interno tiene al menos uno. La profundidad cuenta aristas desde la raíz
        y la altura cuenta la mayor distancia hasta una hoja. En un árbol conectado con n nodos hay
        n-1 aristas y cada nodo no raíz tiene un único padre. Estas propiedades deben preservarse al
        construir o modificar la estructura. Una etiqueta repetida no implica que dos nodos sean el mismo.
      en: >-
        A tree organizes nodes through parent-child relations. The root has no parent; a leaf has no
        children; an internal node has at least one. Depth counts edges from the root and height the
        greatest distance to a leaf. A connected tree with n nodes has n-1 edges, and each non-root node
        has one parent. Duplicate labels do not imply identical nodes.
      da: >-
        Et træ organiserer noder gennem forælder-barn-relationer. Roden har ingen forælder, et blad
        ingen børn, og hver ikke-rod-node har én forælder. Gentagne etiketter betyder ikke samme node.
    linked_objectives: [m10.o1, m10.o8]
  - id: representations-and-validation
    title: {es: Representación, identidad y validación, en: Representation, identity, and validation, da: Repræsentation, identitet og validering}
    body:
      es: >-
        Una jerarquía puede representarse mediante diccionarios anidados, listas de hijos, tablas
        padre-hijo o instancias de una clase Node. La representación determina cómo se valida identidad,
        ciclos, padres múltiples y navegación. Una tabla es adecuada para almacenamiento, pero suele
        necesitar índices auxiliares. Una clase expresa con claridad identidad, hijos e invariantes.
        La estructura debe rechazar ciclos y referencias a nodos inexistentes cuando pretende ser árbol.
      en: >-
        A hierarchy may use nested dictionaries, child lists, parent-child tables, or Node objects.
        Representation determines how identity, cycles, multiple parents, and navigation are validated.
        Tables suit storage but often require indexes; classes express identity and invariants clearly.
      da: >-
        Et hierarki kan repræsenteres med indlejrede ordbøger, børnelister, tabeller eller Node-objekter.
        Repræsentationen bestemmer validering og navigation.
    linked_objectives: [m10.o2, m10.o8]
  - id: general-binary-and-search-trees
    title: {es: Árbol general, binario y binario de búsqueda, en: General, binary, and binary-search trees, da: Generelle, binære og binære søgetræer}
    body:
      es: >-
        Un árbol general permite un número variable de hijos. Un árbol binario permite como máximo un
        hijo izquierdo y uno derecho; sus posiciones tienen significado. Ser binario no implica estar
        completo, equilibrado ni ordenado. Un árbol binario de búsqueda añade una relación de orden
        entre claves de subárboles. La política para claves repetidas debe especificarse. Una forma
        degenerada puede convertir búsquedas que parecen logarítmicas en recorridos lineales.
      en: >-
        A general tree allows a variable number of children. A binary tree has at most one left and one
        right child, whose positions matter. Binary does not imply complete, balanced, or ordered. A
        binary-search tree adds an ordering invariant and needs a duplicate-key policy. Degenerate shape
        may turn apparently logarithmic search into linear traversal.
      da: >-
        Et generelt træ har variabelt antal børn. Et binært træ har højst ét venstre og ét højre barn.
        Et binært søgetræ tilføjer en ordensinvariant og kræver en politik for dubletter.
    linked_objectives: [m10.o1, m10.o6, m10.o7]
  - id: depth-first-traversals
    title: {es: Recorridos en profundidad, en: Depth-first traversals, da: Dybdeførst gennemløb}
    body:
      es: >-
        En un árbol binario, preorden procesa nodo-izquierda-derecha; inorden procesa
        izquierda-nodo-derecha; postorden procesa izquierda-derecha-nodo. La diferencia es el momento
        en que se procesa el nodo actual. La versión recursiva usa la pila de llamadas; la iterativa usa
        una pila explícita y debe introducir hijos en el orden adecuado. Inorden tiene significado natural
        para árboles binarios, no para una lista arbitraria de hijos.
      en: >-
        In a binary tree, preorder is node-left-right, inorder is left-node-right, and postorder is
        left-right-node. Recursive versions use the call stack; iterative versions use an explicit stack
        and must push children in the correct order. Inorder is naturally defined for binary trees.
      da: >-
        I et binært træ er preorder node-venstre-højre, inorder venstre-node-højre og postorder
        venstre-højre-node. Iterative versioner kræver korrekt stakrækkefølge.
    linked_objectives: [m10.o3, m10.o7]
  - id: breadth-first-traversal
    title: {es: Recorrido por niveles y cola FIFO, en: Level-order traversal and FIFO queue, da: Niveaugennemløb og FIFO-kø}
    body:
      es: >-
        El recorrido por niveles procesa nodos según su distancia a la raíz. Utiliza una cola FIFO:
        se retira el nodo más antiguo y se añaden sus hijos al final. Es apropiado para producir niveles,
        hallar una coincidencia más cercana a la raíz o calcular distancias en árboles no ponderados.
        `collections.deque` evita el desplazamiento lineal asociado a `list.pop(0)`.
      en: >-
        Level-order traversal processes nodes by distance from the root using a FIFO queue. It suits
        level production, closest-to-root matching, and distances in unweighted trees. `deque` avoids
        the shifting cost of `list.pop(0)`.
      da: >-
        Niveaugennemløb behandler noder efter afstand fra roden med en FIFO-kø. `deque` undgår lineær
        flytning ved fjernelse forrest.
    linked_objectives: [m10.o4, m10.o7]
  - id: tree-metrics
    title: {es: Tamaño, hojas, profundidad y altura, en: Size, leaves, depth, and height, da: Størrelse, blade, dybde og højde}
    body:
      es: >-
        El tamaño es el número de nodos. Una hoja carece de hijos. La profundidad es relativa a una raíz
        y suele definirse como número de aristas. La altura de una hoja es cero bajo esa convención; la
        altura del árbol vacío debe definirse explícitamente, por ejemplo -1 o 0 según el contrato. Mezclar
        nodos y aristas genera errores de una unidad. Las métricas recursivas combinan resultados de subárboles.
      en: >-
        Size is node count. A leaf has no children. Depth is relative to a root and commonly counts edges.
        A leaf then has height zero. Empty-tree height must be explicitly defined. Mixing node and edge
        conventions creates off-by-one errors.
      da: >-
        Størrelse er antal noder. Dybde og højde bør defineres med arister eller noder konsekvent.
        Højden af det tomme træ skal fremgå af kontrakten.
    linked_objectives: [m10.o5, m10.o8]
  - id: search-and-identity
    title: {es: Búsqueda, identidad y resultados, en: Search, identity, and results, da: Søgning, identitet og resultater}
    body:
      es: >-
        Una búsqueda debe especificar si retorna un nodo, una ruta, una profundidad, todos los nodos
        coincidentes o sólo el primero según un recorrido. Buscar por etiqueta puede ser ambiguo si hay
        repeticiones. DFS y BFS pueden encontrar coincidencias distintas porque imponen órdenes diferentes.
        Un resultado `None` debe distinguirse de un nodo cuyo valor sea None. El contrato define también
        qué ocurre en el árbol vacío.
      en: >-
        Search must specify whether it returns a node, path, depth, every match, or the first match under
        a traversal order. Duplicate labels make label search ambiguous. DFS and BFS may return different
        matches. `None` as absence must not be confused with a node whose stored value is None.
      da: >-
        En søgning skal angive resultattypen og rækkefølgen. Gentagne etiketter gør første match afhængigt
        af DFS eller BFS.
    linked_objectives: [m10.o4, m10.o8]
  - id: complexity-and-shape
    title: {es: Complejidad, forma y uso de memoria, en: Complexity, shape, and memory use, da: Kompleksitet, form og hukommelse}
    body:
      es: >-
        Un recorrido completo visita cada nodo una vez y suele costar O(n). El espacio auxiliar depende
        de la forma: DFS recursivo usa una pila proporcional a la altura h; BFS puede almacenar un nivel
        ancho. En un árbol equilibrado h puede ser logarítmica, pero en uno degenerado puede ser n. El
        análisis debe separar coste de visitar nodos, coste de la representación y coste de crear copias.
      en: >-
        A full traversal visits each node once and usually costs O(n). Auxiliary space depends on shape:
        recursive DFS uses O(h) stack space, while BFS may store a wide level. Balanced height may be
        logarithmic, whereas degenerate height may be n.
      da: >-
        Et fuldt gennemløb koster normalt O(n). DFS bruger plads efter højden h, mens BFS kan gemme et
        bredt niveau. Formen er afgørende.
    linked_objectives: [m10.o7]

worked_examples:
  - id: dm857.m10.e01
    title: {es: Calcular tamaño y altura de un árbol general, en: Compute size and height of a general tree, da: Beregn størrelse og højde af et generelt træ}
    problem: {es: Implementar tamaño y altura para nodos con una lista `children`, usando altura -1 para árbol vacío., en: Implement size and height for nodes with a `children` list, using height -1 for an empty tree., da: Implementér størrelse og højde for noder med `children`, med højde -1 for tomt træ.}
    assumptions: [the structure is acyclic, every child is a node, leaf height is zero]
    reasoning:
      es: [El vacío fija la convención., El tamaño suma uno y los tamaños de hijos., La altura suma uno al máximo de alturas de hijos.]
      en: [The empty case fixes the convention., Size adds one plus child sizes., Height adds one to the maximum child height.]
      da: [Det tomme tilfælde fastlægger konventionen., Størrelse summerer noder., Højde bruger maksimal børnehøjde.]
    code: |-
      def tree_size(node):
          if node is None:
              return 0
          return 1 + sum(tree_size(child) for child in node.children)

      def tree_height(node):
          if node is None:
              return -1
          if not node.children:
              return 0
          return 1 + max(tree_height(child) for child in node.children)
    expected_output: a leaf has size 1 and height 0
    validation: [empty tree, one-node tree, chain, branching tree]
    explanation: {es: Las definiciones se mantienen consistentes al contar aristas para altura., en: The definitions remain consistent by counting edges for height., da: Definitionerne er konsistente ved at tælle arister for højde.}
    linked_objectives: [m10.o5, m10.o8]
  - id: dm857.m10.e02
    title: {es: Recorridos de un árbol binario, en: Traverse a binary tree, da: Gennemløb et binært træ}
    problem: {es: Producir preorden, inorden y postorden sin modificar el árbol., en: Produce preorder, inorder, and postorder without mutating the tree., da: Producer preorder, inorder og postorder uden mutation.}
    assumptions: [None denotes an empty subtree]
    reasoning:
      es: [Definir el vacío como lista vacía., Cambiar únicamente el momento en que se añade el valor actual., Concatenar resultados de subárboles.]
      en: [Define an empty subtree as an empty list., Change only when the current value is appended., Combine subtree results.]
      da: [Definér tomt deltræ som tom liste., Skift kun tidspunktet for den aktuelle værdi., Kombinér deltræsresultater.]
    code: |-
      def preorder(node):
          return [] if node is None else [node.value] + preorder(node.left) + preorder(node.right)

      def inorder(node):
          return [] if node is None else inorder(node.left) + [node.value] + inorder(node.right)

      def postorder(node):
          return [] if node is None else postorder(node.left) + postorder(node.right) + [node.value]
    expected_output: traversal order depends on node processing position
    validation: [empty tree, one node, left-only, right-only, complete tree]
    explanation: {es: Las tres funciones comparten estructura recursiva y difieren sólo en la combinación., en: The functions share recursive structure and differ only in combination order., da: Funktionerne deler rekursiv struktur og adskiller sig kun i kombinationsrækkefølge.}
    linked_objectives: [m10.o3]
  - id: dm857.m10.e03
    title: {es: Encontrar la coincidencia más cercana a la raíz, en: Find the match closest to the root, da: Find nærmeste match til roden}
    problem: {es: Buscar por niveles y retornar el primer nodo cuyo predicado sea verdadero., en: Search level by level and return the first node satisfying a predicate., da: Søg niveauvis og returnér første node, der opfylder et prædikat.}
    assumptions: [the tree is finite and acyclic]
    reasoning:
      es: [Usar una cola FIFO., Evaluar al retirar el nodo., Añadir hijos después para conservar niveles.]
      en: [Use a FIFO queue., Evaluate when dequeuing., Add children afterward to preserve levels.]
      da: [Brug en FIFO-kø., Evaluér ved udtagning., Tilføj børn bagefter.]
    code: |-
      from collections import deque

      def find_bfs(root, predicate):
          if root is None:
              return None
          queue = deque([root])
          while queue:
              node = queue.popleft()
              if predicate(node):
                  return node
              queue.extend(node.children)
          return None
    expected_output: the shallowest matching node under child order
    validation: [empty tree, root match, repeated labels at different depths, no match]
    explanation: {es: BFS impone prioridad por profundidad; el orden entre nodos del mismo nivel sigue el orden de hijos., en: BFS prioritizes depth; ties within a level follow child order., da: BFS prioriterer dybde; rækkefølge på samme niveau følger børnenes orden.}
    linked_objectives: [m10.o4, m10.o8]

practice_exercises:
  - {id: dm857.m10.p01, activity_type: terminology_mapping, difficulty: foundational, prompt: {es: Para un árbol dado, identifica raíz, hojas, nodos internos, ancestros y descendientes., en: For a given tree, identify root, leaves, internal nodes, ancestors, and descendants., da: Identificér rod, blade, interne noder, forfædre og efterkommere.}, reference_solution: {es: La respuesta debe usar relaciones estructurales, no el valor de las etiquetas., en: The answer must use structural relations rather than label values., da: Svaret skal bruge strukturelle relationer, ikke etiketværdier.}, linked_objectives: [m10.o1]}
  - {id: dm857.m10.p02, activity_type: code_tracing, difficulty: intermediate, prompt: {es: Traza preorden, inorden y postorden para raíz A, hijo izquierdo B e hijo derecho C., en: Trace preorder, inorder, and postorder for root A with left B and right C., da: Gennemgå preorder, inorder og postorder for rod A med venstre B og højre C.}, reference_solution: {es: Preorden A B C; inorden B A C; postorden B C A., en: Preorder A B C; inorder B A C; postorder B C A., da: Preorder A B C; inorder B A C; postorder B C A.}, linked_objectives: [m10.o3]}
  - {id: dm857.m10.p03, activity_type: debugging, difficulty: intermediate, prompt: {es: Corrige un BFS implementado con una pila y explica el cambio semántico., en: Correct a BFS implemented with a stack and explain the semantic change., da: Ret en BFS implementeret med en stak og forklar den semantiske ændring.}, reference_solution: {es: Sustituir LIFO por una cola FIFO; una pila produce profundidad, no niveles., en: Replace LIFO with a FIFO queue; a stack produces depth-first behavior, not levels., da: Erstat LIFO med FIFO; en stak giver dybdeførst adfærd.}, linked_objectives: [m10.o4]}
  - {id: dm857.m10.p04, activity_type: boundary_analysis, difficulty: intermediate, prompt: {es: Compara las convenciones de altura del árbol vacío -1 y 0 y muestra su efecto en una hoja., en: Compare empty-tree height conventions -1 and 0 and show their effect on a leaf., da: Sammenlign konventionerne -1 og 0 for tomt træs højde og vis effekten på et blad.}, reference_solution: {es: Con vacío -1, una hoja tiene 0 al contar aristas; con vacío 0, una hoja suele tener 1 al contar nodos., en: With empty -1, a leaf has height 0 when counting edges; with empty 0, a leaf commonly has height 1 when counting nodes., da: Med tomt træ -1 har et blad højde 0 ved kanttælling; med 0 ofte højde 1 ved nodetælling.}, linked_objectives: [m10.o5]}
  - {id: dm857.m10.p05, activity_type: complexity_analysis, difficulty: advanced, prompt: {es: Compara memoria auxiliar de DFS y BFS en una cadena y en un árbol muy ancho., en: Compare auxiliary memory for DFS and BFS in a chain and in a very wide tree., da: Sammenlign ekstra hukommelse for DFS og BFS i en kæde og et meget bredt træ.}, reference_solution: {es: DFS usa O(h); en una cadena h=n. BFS usa O(w); en un árbol ancho w puede ser grande aunque la altura sea pequeña., en: DFS uses O(h), which is O(n) for a chain. BFS uses O(w), which may be large for a wide shallow tree., da: DFS bruger O(h), BFS O(w); kæder og brede træer fremhæver forskellige risici.}, linked_objectives: [m10.o7]}
  - {id: dm857.m10.p06, activity_type: test_design, difficulty: advanced, prompt: {es: Diseña una suite para una función que busca por etiqueta cuando puede haber etiquetas repetidas., en: Design a test suite for label search when labels may repeat., da: Design en testsuite til etiketsøgning med gentagne etiketter.}, reference_solution: {es: Probar vacío, raíz, ausencia, repeticiones a igual y distinta profundidad, y documentar si retorna primer DFS, primer BFS o todos., en: Test empty, root, absence, duplicates at equal and different depths, and document whether the function returns first DFS, first BFS, or all matches., da: Test tomt træ, rod, fravær og dubletter og dokumentér søgeordenen.}, linked_objectives: [m10.o4, m10.o8]}

