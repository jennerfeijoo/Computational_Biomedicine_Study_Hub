  - {id: dm857.m10.q06, activity_type: multiple_choice, prompt: {es: ¿Cuál es el coste típico de visitar todos los n nodos una vez?, en: What is the typical cost of visiting all n nodes once?, da: Hvad er den typiske omkostning ved at besøge alle n noder én gang?}, options: [{id: linear, text: {es: O(n), en: O(n), da: O(n)}}, {id: constant, text: {es: O(1), en: O(1), da: O(1)}}, {id: quadratic, text: {es: Siempre O(n²), en: Always O(n²), da: Altid O(n²)}}], correct_option_ids: [linear]}
  - {id: dm857.m10.q07, activity_type: true_false, prompt: {es: En un árbol degenerado la altura puede ser proporcional a n., en: In a degenerate tree, height may be proportional to n., da: I et degenereret træ kan højden være proportional med n.}, correct_answer: true}
  - {id: dm857.m10.q08, activity_type: multiple_choice, prompt: {es: ¿Qué recorrido encuentra primero una coincidencia de menor profundidad?, en: Which traversal first finds a shallowest match?, da: Hvilket gennemløb finder først et match med mindst dybde?}, options: [{id: bfs, text: {es: BFS, en: BFS, da: BFS}}, {id: postorder, text: {es: Postorden, en: Postorder, da: Postorder}}, {id: arbitrary, text: {es: Cualquier DFS siempre, en: Any DFS always, da: Enhver DFS altid}}], correct_option_ids: [bfs]}
  - {id: dm857.m10.q09, activity_type: multiple_choice, prompt: {es: ¿Qué representa None en una representación binaria común?, en: What does None commonly represent in a binary-tree representation?, da: Hvad repræsenterer None ofte i et binært træ?}, options: [{id: empty_subtree, text: {es: Subárbol vacío, en: Empty subtree, da: Tomt deltræ}}, {id: duplicate, text: {es: Clave duplicada, en: Duplicate key, da: Dubletnøgle}}, {id: root, text: {es: Raíz obligatoria, en: Required root, da: Obligatorisk rod}}], correct_option_ids: [empty_subtree]}
  - {id: dm857.m10.q10, activity_type: true_false, prompt: {es: `list.pop(0)` es la mejor representación general de una cola eficiente., en: `list.pop(0)` is the generally preferred efficient queue representation., da: `list.pop(0)` er generelt den foretrukne effektive køimplementering.}, correct_answer: false}

assessment_items:
  - id: dm857.m10.a01
    activity_type: algorithm_design
    difficulty: advanced
    prompt: {es: Diseña una API para un árbol general que permita insertar, buscar, calcular métricas y recorrer sin exponer la lista interna de hijos. Incluye invariantes y errores., en: Design an API for a general tree supporting insertion, search, metrics, and traversal without exposing the internal child list. Include invariants and errors., da: Design et API til et generelt træ med indsættelse, søgning, mål og gennemløb uden at eksponere den interne børneliste.}
    accepted_answer_elements: [node identity policy, cycle prevention, parent uniqueness, empty-tree contract, traversal result contract, defensive tests]
    rubric: [{criterion: interface_and_contract, points: 3}, {criterion: invariants, points: 3}, {criterion: algorithms, points: 2}, {criterion: tests_and_errors, points: 2}]
  - id: dm857.m10.a02
    activity_type: data_interpretation
    difficulty: advanced
    prompt: {es: Dado un árbol con etiquetas repetidas y dos resultados de búsqueda distintos, determina cuál proviene de DFS y cuál de BFS y justifica usando el orden de exploración., en: Given a tree with repeated labels and two different search results, determine which comes from DFS and which from BFS and justify using exploration order., da: Givet et træ med gentagne etiketter og to søgeresultater, afgør hvilket der kommer fra DFS og BFS og begrund.}
    accepted_answer_elements: [explicit traversal order, depth comparison, tie policy, recognition of label ambiguity]
    rubric: [{criterion: traversal_reasoning, points: 4}, {criterion: ambiguity_analysis, points: 2}, {criterion: correct_conclusion, points: 2}, {criterion: clarity, points: 2}]
  - id: dm857.m10.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt: {es: Explica por qué decir que una búsqueda en un árbol es O(log n) puede ser incorrecto sin especificar tipo, propiedad y forma del árbol., en: Explain why saying tree search is O(log n) may be wrong without specifying tree type, property, and shape., da: Forklar hvorfor træ-søgning ikke uden videre kan kaldes O(log n).}
    accepted_answer_elements: [general versus search tree, balance assumption, degenerate counterexample, distinction between worst and average case]
    rubric: [{criterion: assumptions, points: 4}, {criterion: counterexample, points: 2}, {criterion: complexity_precision, points: 2}, {criterion: communication, points: 2}]

