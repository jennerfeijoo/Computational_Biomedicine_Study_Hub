glossary:
  - {id: term.tree, term: {es: árbol, en: tree, da: træ}, definition: {es: Estructura jerárquica acíclica de nodos conectados., en: Acyclic hierarchical structure of connected nodes., da: Acyklisk hierarkisk struktur af forbundne noder.}}
  - {id: term.root, term: {es: raíz, en: root, da: rod}, definition: {es: Nodo sin padre., en: Node with no parent., da: Node uden forælder.}}
  - {id: term.leaf, term: {es: hoja, en: leaf, da: blad}, definition: {es: Nodo sin hijos., en: Node with no children., da: Node uden børn.}}
  - {id: term.depth, term: {es: profundidad, en: depth, da: dybde}, definition: {es: Distancia desde la raíz bajo una convención definida., en: Distance from the root under a stated convention., da: Afstand fra roden under en angivet konvention.}}
  - {id: term.height, term: {es: altura, en: height, da: højde}, definition: {es: Máxima distancia desde un nodo hasta una hoja., en: Maximum distance from a node to a leaf., da: Maksimal afstand fra en node til et blad.}}
  - {id: term.preorder, term: {es: preorden, en: preorder, da: preorder}, definition: {es: Recorrido que procesa el nodo antes de sus subárboles., en: Traversal processing the node before its subtrees., da: Gennemløb der behandler noden før deltræerne.}}
  - {id: term.postorder, term: {es: postorden, en: postorder, da: postorder}, definition: {es: Recorrido que procesa el nodo después de sus subárboles., en: Traversal processing the node after its subtrees., da: Gennemløb der behandler noden efter deltræerne.}}
  - {id: term.bfs, term: {es: búsqueda en anchura, en: breadth-first search, da: breddeførst søgning}, definition: {es: Exploración por niveles mediante cola FIFO., en: Level-wise exploration using a FIFO queue., da: Niveauvis udforskning med FIFO-kø.}}
  - {id: term.dfs, term: {es: búsqueda en profundidad, en: depth-first search, da: dybdeførst søgning}, definition: {es: Exploración que completa un subárbol antes del siguiente., en: Exploration completing one subtree before the next., da: Udforskning der afslutter ét deltræ før det næste.}}
  - {id: term.degenerate_tree, term: {es: árbol degenerado, en: degenerate tree, da: degenereret træ}, definition: {es: Árbol cuya forma se aproxima a una cadena., en: Tree whose shape approaches a chain., da: Træ hvis form nærmer sig en kæde.}}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El razonamiento sobre árboles debe comenzar con la representación y las definiciones. El tutor
      no debe asumir que altura cuenta aristas, que las etiquetas son únicas ni que un árbol binario
      está ordenado. Debe pedir una invariante, un caso vacío, un ejemplo degenerado y un trazado antes
      de aceptar una afirmación de corrección o complejidad.
    en: >-
      Tree reasoning begins with representation and definitions. Do not assume edge-based height,
      unique labels, or ordering in a binary tree. Require an invariant, empty case, degenerate example,
      and trace before accepting correctness or complexity claims.
    da: >-
      Ræsonnering om træer starter med repræsentation og definitioner. Kræv invariant, tomt tilfælde,
      degenereret eksempel og gennemgang før påstande om korrekthed eller kompleksitet.
  misconceptions:
    - {id: m10.mc01, claim: {es: Todo árbol binario es un árbol de búsqueda., en: Every binary tree is a search tree., da: Ethvert binært træ er et søgetræ.}, correction: {es: Un árbol de búsqueda necesita una invariante de orden adicional., en: A search tree needs an additional ordering invariant., da: Et søgetræ kræver en ekstra ordensinvariant.}}
    - {id: m10.mc02, claim: {es: La altura siempre es el número de nodos., en: Height always counts nodes., da: Højde tæller altid noder.}, correction: {es: La convención debe declararse; con frecuencia se cuentan aristas., en: The convention must be stated; edges are commonly counted., da: Konventionen skal angives; ofte tælles kanter.}}
    - {id: m10.mc03, claim: {es: DFS y BFS siempre encuentran el mismo primer nodo., en: DFS and BFS always find the same first node., da: DFS og BFS finder altid samme første node.}, correction: {es: Sus órdenes de exploración difieren, especialmente con coincidencias repetidas., en: Their exploration orders differ, especially with repeated matches., da: Deres rækkefølger er forskellige, især ved gentagne match.}}
  socratic_questions:
    - ¿Qué representa exactamente un nodo y cómo se distingue su identidad de su etiqueta?
    - ¿Cuál es la convención para altura del árbol vacío y de una hoja?
    - ¿Qué orden de recorrido exige el resultado esperado?
    - ¿Qué forma del árbol maximiza el uso de pila o cola?
    - ¿Qué prueba detectaría un ciclo o un segundo padre?
  grading_guidance:
    do_not_accept: [undefined height convention, claims of O(log n) without balance/order assumptions, search by duplicate label without result policy, tests omitting empty tree]
    strong_answer_features: [explicit representation, invariant preservation, traversal trace, empty and degenerate cases, time and auxiliary-space analysis]
  retrieval_fragments:
    - {id: m10.r01, topics: [tree, height, convention], text: {es: La altura sólo es interpretable después de declarar si se cuentan aristas o nodos y cómo se trata el vacío., en: Height is interpretable only after stating whether edges or nodes are counted and how emptiness is handled., da: Højde kræver en erklæret konvention for kanter eller noder og tomt træ.}}
    - {id: m10.r02, topics: [dfs, bfs, search], text: {es: DFS prioriza profundidad; BFS prioriza distancia a la raíz. Con etiquetas repetidas pueden retornar nodos distintos., en: DFS prioritizes depth; BFS prioritizes distance from the root. Duplicate labels may yield different nodes., da: DFS prioriterer dybde; BFS afstand fra roden.}}

