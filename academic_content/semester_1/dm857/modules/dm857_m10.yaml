limitations:
  - Biomedical hierarchies are synthetic teaching examples and not clinical taxonomies.
  - Balanced-tree algorithms and self-balancing rotations are outside this module.
  - Graphs with cycles or multiple parents require graph-specific algorithms and visited-state handling.
