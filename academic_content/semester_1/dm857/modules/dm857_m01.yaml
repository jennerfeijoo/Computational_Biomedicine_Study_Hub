metadata:
  title:
    es: "Resolución de problemas, valores, tipos y estado del programa"
    en: "Problem solving, values, types, and program state"
    da: "Problemløsning, værdier, typer og programtilstand"
  summary:
    es: >-
      Introducción al razonamiento computacional y a los elementos mínimos de un programa
      Python: problema, modelo, algoritmo, expresiones, valores, tipos, variables, asignación,
      conversión, entrada, salida, trazado y clasificación de errores.
    en: >-
      Introduction to computational reasoning and the minimal elements of a Python program:
      problem, model, algorithm, expressions, values, types, variables, assignment, conversion,
      input, output, tracing, and error classification.
    da: >-
      Introduktion til beregningsmæssig tænkning og de grundlæggende elementer i et
      Python-program: problem, model, algoritme, udtryk, værdier, typer, variable, tildeling,
      konvertering, input, output, gennemgang og klassifikation af fejl.
  prerequisites: []
  official_learning_outcomes: [dm857.lo01, dm857.lo02, dm857.lo03]
  estimated_study_hours: 14
  difficulty: foundational

