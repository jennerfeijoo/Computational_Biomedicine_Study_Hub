      es: "Separar una situación concreta en entradas, transformaciones, restricciones y salidas observables."
      en: "Separate a concrete situation into inputs, transformations, constraints, and observable outputs."
      da: "Opdele en konkret situation i input, transformationer, begrænsninger og observerbare output."
    evidence: explanation_and_problem_model
  - id: m01.o2
    bloom_level: understand
    statement:
      es: "Distinguir expresión, valor, tipo, variable, asignación y sentencia."
      en: "Distinguish expression, value, type, variable, assignment, and statement."
      da: "Skelne mellem udtryk, værdi, type, variabel, tildeling og sætning."
    evidence: terminology_comparison
  - id: m01.o3
    bloom_level: apply
    statement:
      es: "Predecir el valor y el tipo de expresiones aritméticas y de texto antes de ejecutarlas."
      en: "Predict the value and type of arithmetic and text expressions before execution."
      da: "Forudsige værdien og typen af aritmetiske udtryk og tekstudtryk før udførelse."
    evidence: expression_tracing
  - id: m01.o4
    bloom_level: apply
    statement:
      es: "Representar el estado de un programa mediante una tabla de trazado."
      en: "Represent program state using a trace table."
      da: "Repræsentere programtilstand med en gennemgangstabel."
    evidence: state_trace
  - id: m01.o5
    bloom_level: apply
    statement:
      es: "Aplicar conversiones explícitas entre int, float y str cuando el significado del dato lo requiera."
      en: "Apply explicit conversions between int, float, and str when required by data meaning."
      da: "Anvende eksplicitte konverteringer mellem int, float og str, når dataenes betydning kræver det."
    evidence: executable_code
  - id: m01.o6
    bloom_level: analyze
    statement:
      es: "Diferenciar errores de sintaxis, ejecución, lógica y especificación, y proponer una prueba mínima para detectarlos."
      en: "Differentiate syntax, runtime, logic, and specification errors and propose a minimal test to detect them."
      da: "Skelne mellem syntaks-, kørsels-, logik- og specifikationsfejl og foreslå en minimal test."
    evidence: debugging_and_test_design

concepts:
  - id: problem-model-algorithm-program
    title:
      es: "Del problema al programa"
      en: "From problem to program"
      da: "Fra problem til program"
    body:
      es: >-
        Programar comienza construyendo una representación operativa del problema. La situación real
        contiene detalles relevantes y accidentales; el modelo conserva únicamente las variables,
        relaciones y restricciones necesarias para producir una respuesta verificable. El algoritmo
        es una secuencia finita y no ambigua de pasos que resuelve el modelo. El programa es la
        implementación concreta del algoritmo. Separar estas capas permite localizar errores: un
        resultado puede fallar porque el modelo omite una condición, porque el algoritmo no resuelve
        el modelo o porque el código implementa incorrectamente el algoritmo.
      en: >-
        Programming begins by constructing an operational representation of the problem. A real
        situation contains relevant and incidental details; the model retains only the variables,
        relationships, and constraints needed to produce a verifiable answer. An algorithm is a
        finite, unambiguous sequence of steps that solves the model. A program is a concrete
        implementation of the algorithm. Separating these layers helps localize failure: the model
        may omit a condition, the algorithm may not solve the model, or the code may implement the
        algorithm incorrectly.
      da: >-
        Programmering begynder med at opbygge en operationel repræsentation af problemet. En virkelig
        situation indeholder relevante og tilfældige detaljer; modellen bevarer kun de variable,
        relationer og begrænsninger, der er nødvendige for et efterprøveligt svar. En algoritme er en
        endelig og entydig række trin, der løser modellen. Et program er en konkret implementering af
        algoritmen. Ved at adskille lagene kan fejl lokaliseres i model, algoritme eller kode.
    key_points:
      - es: Problema, modelo, algoritmo y programa no son sinónimos.
        en: "Problem, model, algorithm, and program are not synonyms."
        da: "Problem, model, algoritme og program er ikke synonymer."
      - es: Las entradas y salidas deben definirse antes de escribir código.
        en: "Inputs and outputs should be defined before writing code."
        da: "Input og output bør defineres før koden skrives."
      - es: La corrección se evalúa respecto a una especificación explícita.
        en: "Correctness is evaluated against an explicit specification."
        da: "Korrekthed vurderes i forhold til en eksplicit specifikation."
    linked_objectives: [m01.o1, m01.o6]

  - id: expressions-values-types
    title:
      es: "Expresiones, valores y tipos"
      en: "Expressions, values, and types"
      da: "Udtryk, værdier og typer"
    body:
      es: >-
        Una expresión combina literales, variables, operadores y llamadas que Python evalúa para
        obtener un valor. El tipo clasifica ese valor y determina qué operaciones son válidas y cómo
        se interpretan. `3 + 4` produce el entero `7`, mientras que `'3' + '4'` produce la cadena
        `'34'`. Python es dinámicamente tipado: una variable puede referirse a valores de distintos
        tipos a lo largo del tiempo, pero cada valor posee siempre un tipo concreto.
      en: >-
        An expression combines literals, variables, operators, and calls that Python evaluates to
        obtain a value. A type classifies that value and determines which operations are valid and
        how they are interpreted. `3 + 4` produces integer `7`, whereas `'3' + '4'` produces string
        `'34'`. Python is dynamically typed: a variable may refer to values of different types over
        time, but every value always has a concrete type.
      da: >-
        Et udtryk kombinerer literaler, variable, operatorer og kald, som Python evaluerer for at
        opnå en værdi. Typen klassificerer værdien og bestemmer gyldige operationer og deres betydning.
        `3 + 4` giver heltallet `7`, mens `'3' + '4'` giver tekststrengen `'34'`. Python er dynamisk
        typet, men hver værdi har altid en konkret type.
    assumptions:
      - Operations are interpreted according to operand types.
      - Conversion is possible only when the source value has a valid representation.
    failure_modes:
      - confusing numeric addition with string concatenation
      - assuming variables have permanent types
      - assuming `/` returns an integer when division is exact
    linked_objectives: [m01.o2, m01.o3, m01.o5]

  - id: variables-assignment-state
    title:
      es: "Variables, asignación y estado"
      en: "Variables, assignment, and state"
      da: "Variable, tildeling og tilstand"
    body:
      es: >-
        Una variable es un nombre asociado a un valor. La asignación evalúa primero la expresión de
        la derecha y después vincula el nombre de la izquierda con el resultado. Por eso `x = x + 1`
        representa una actualización de estado y no una igualdad matemática. El estado del programa
        es el conjunto de asociaciones nombre-valor existentes en un instante. Una tabla de trazado
        registra cada sentencia, los valores modificados y la salida producida.
      en: >-
        A variable is a name associated with a value. Assignment first evaluates the expression on
        the right and then binds the name on the left to the result. Therefore `x = x + 1` is a state
        update rather than mathematical equality. Program state is the set of name-value associations
        at a particular time. A trace table records each statement, modified values, and produced output.
      da: >-
        En variabel er et navn knyttet til en værdi. Tildeling evaluerer først udtrykket til højre og
        knytter derefter navnet til venstre til resultatet. Derfor er `x = x + 1` en tilstandsopdatering
        og ikke matematisk lighed. Programtilstanden er mængden af navn-værdi-forbindelser på et givet
        tidspunkt. En gennemgangstabel registrerer sætninger, ændrede værdier og output.
    linked_objectives: [m01.o2, m01.o4]

  - id: operators-precedence-conversion
    title:
      es: "Operadores, precedencia y conversión"
      en: "Operators, precedence, and conversion"
      da: "Operatorer, præcedens og konvertering"
    body:
      es: >-
        Los operadores aritméticos básicos son `+`, `-`, `*`, `/`, `//`, `%` y `**`. Python aplica
        precedencia: paréntesis, exponenciación, multiplicación y divisiones, y finalmente suma y
        resta. Los paréntesis también documentan intención. `int()`, `float()` y `str()` crean un
        valor de otro tipo cuando la conversión es válida. Convertir puede perder información:
        `int(4.9)` produce `4`, no redondea al entero más cercano.
      en: >-
        Basic arithmetic operators are `+`, `-`, `*`, `/`, `//`, `%`, and `**`. Python applies
        precedence: parentheses, exponentiation, multiplication and division operations, then
        addition and subtraction. Parentheses also document intent. `int()`, `float()`, and `str()`
        create a value of another type when conversion is valid. Conversion may lose information:
        `int(4.9)` produces `4`; it does not round to the nearest integer.
      da: >-
        De grundlæggende aritmetiske operatorer er `+`, `-`, `*`, `/`, `//`, `%` og `**`. Python
        anvender præcedens: parenteser, potens, multiplikation og division og til sidst addition og
        subtraktion. Parenteser dokumenterer også hensigten. `int()`, `float()` og `str()` opretter
        en værdi af en anden type, når konverteringen er gyldig. Konvertering kan miste information.
    linked_objectives: [m01.o3, m01.o5]

  - id: input-output-and-errors
    title:
      es: "Entrada, salida, trazado y errores"
      en: "Input, output, tracing, and errors"
      da: "Input, output, gennemgang og fejl"
    body:
      es: >-
        `input()` devuelve siempre `str`, incluso cuando el usuario escribe dígitos. Si el problema
        requiere una cantidad numérica, la conversión debe ser explícita y validada. `print()` hace
        visible un valor, pero mostrar no equivale a devolver un resultado desde una función. Un error
        de sintaxis impide interpretar el código; un error de ejecución aparece durante una operación;
        un error lógico permite finalizar con un resultado incorrecto; un error de especificación
        resuelve el problema equivocado. La ausencia de excepciones no demuestra corrección.
      en: >-
        `input()` always returns `str`, even when the user enters digits. When the problem requires a
        numeric quantity, conversion must be explicit and validated. `print()` makes a value visible,
        but displaying is not the same as returning a result from a function. A syntax error prevents
        parsing; a runtime error occurs during an operation; a logic error finishes with an incorrect
        result; a specification error solves the wrong problem. Absence of exceptions does not prove correctness.
      da: >-
        `input()` returnerer altid `str`, også når brugeren skriver cifre. Når problemet kræver en
        numerisk størrelse, skal konverteringen være eksplicit og valideret. `print()` gør en værdi
        synlig, men visning er ikke det samme som at returnere et resultat. Syntaksfejl forhindrer
        fortolkning, kørselsfejl opstår under en operation, logikfejl giver et forkert resultat, og
        specifikationsfejl løser det forkerte problem.
    linked_objectives: [m01.o4, m01.o5, m01.o6]

worked_examples:
  - id: dm857.m01.e01
    title:
      es: "Calcular el rendimiento útil de una corrida de secuenciación"
      en: "Calculate the usable yield of a sequencing run"
      da: "Beregn det anvendelige udbytte fra en sekventeringskørsel"
    problem:
      es: >-
        Una corrida produce 48_000_000 lecturas y el 92.5 % supera un filtro didáctico de calidad.
        Calcular el número esperado de lecturas utilizables y mostrarlo como entero. El ejemplo es
        sintético y no define un protocolo real de control de calidad.
      en: >-
        A run produces 48_000_000 reads and 92.5% pass a teaching quality filter. Calculate the
        expected number of usable reads and display it as an integer. The example is synthetic and
        does not define a real quality-control protocol.
      da: >-
        En kørsel producerer 48_000_000 reads, og 92,5 % består et undervisningsfilter. Beregn det
        forventede antal anvendelige reads og vis det som et heltal. Eksemplet er syntetisk.
    assumptions:
      - the percentage is represented as 0.925
      - the expected count is converted to an integer only at the final step
    reasoning:
      es:
        - Representar el total como `int` y la fracción como `float`.
        - Multiplicar el total por la fracción.
        - Convertir al final porque el resultado representa un conteo.
        - Verificar que el resultado no exceda el total ni sea negativo.
      en:
        - Represent the total as `int` and the fraction as `float`.
        - Multiply the total by the fraction.
        - Convert at the end because the result represents a count.
        - Verify that the result is neither negative nor greater than the total.
      da:
        - Repræsentér totalen som `int` og andelen som `float`.
        - Gang totalen med andelen.
        - Konvertér til sidst, fordi resultatet er et antal.
        - Kontrollér at resultatet ikke er negativt eller større end totalen.
    code: |-
      total_reads = 48_000_000
      passing_fraction = 92.5 / 100
      usable_reads = int(total_reads * passing_fraction)
      print(usable_reads)
    expected_output: "44400000"
    validation:
      - usable_reads == 44_400_000
      - 0 <= usable_reads <= total_reads
    explanation:
      es: >-
        La división produce `0.925` de tipo `float`. El producto es numérico y la conversión final se
        justifica por el significado del resultado. En otros problemas debe decidirse explícitamente
        si corresponde truncar, redondear o conservar decimales.
      en: >-
        Division produces `0.925` as a `float`. The product is numeric and the final conversion is
        justified by the meaning of the result. Other problems may require an explicit choice between
        truncation, rounding, or retaining decimals.
      da: >-
        Divisionen giver `0.925` som `float`. Den afsluttende konvertering begrundes af resultatets
        betydning. Andre problemer kan kræve et eksplicit valg mellem afkortning, afrunding eller decimaler.
    limitations:
      - expected yield is not the same as an observed laboratory count
      - no uncertainty model is included
    linked_objectives: [m01.o1, m01.o3, m01.o5, m01.o6]

  - id: dm857.m01.e02
    title:
      es: "Convertir el volumen total entre microlitros y mililitros"
      en: "Convert total volume between microlitres and millilitres"
      da: "Konvertér samlet volumen mellem mikroliter og milliliter"
    problem:
      es: "Veinticuatro muestras requieren 35 microlitros cada una. Calcular el volumen total en microlitros y mililitros."
      en: "Twenty-four samples require 35 microlitres each. Calculate the total volume in microlitres and millilitres."
      da: "Fireogtyve prøver kræver 35 mikroliter hver. Beregn den samlede volumen i mikroliter og milliliter."
    assumptions:
      - each sample uses the same volume
      - 1000 microlitres equal 1 millilitre
    reasoning:
      es:
        - Multiplicar el número de muestras por el volumen por muestra.
        - Conservar la unidad en los nombres de variables.
        - Dividir entre 1000 para convertir a mililitros.
      en:
        - Multiply sample count by volume per sample.
        - Preserve units in variable names.
        - Divide by 1000 to convert to millilitres.
      da:
        - Gang antal prøver med volumen pr. prøve.
        - Bevar enheder i variabelnavne.
        - Divider med 1000 for at konvertere til milliliter.
    code: |-
      sample_count = 24
      volume_per_sample_ul = 35
      total_volume_ul = sample_count * volume_per_sample_ul
      total_volume_ml = total_volume_ul / 1000
      print(total_volume_ul)
      print(total_volume_ml)
    expected_output: |-
      840
      0.84
    validation:
      - total_volume_ul == 840
      - total_volume_ml == 0.84
    explanation:
      es: "Los sufijos `_ul` y `_ml` reducen el riesgo de mezclar unidades y hacen visible el modelo del problema."
      en: "The suffixes `_ul` and `_ml` reduce the risk of mixing units and make the problem model visible."
      da: "Endelserne `_ul` og `_ml` reducerer risikoen for at blande enheder og synliggør problemmodellen."
    limitations:
      - no pipetting loss or excess preparation volume is modeled
    linked_objectives: [m01.o1, m01.o3, m01.o4, m01.o5]

practice_exercises:
  - id: dm857.m01.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: "Traza `x = 4; y = x + 3; x = y * 2`. Registra el estado después de cada sentencia."
      en: "Trace `x = 4; y = x + 3; x = y * 2`. Record state after each statement."
      da: "Gennemgå `x = 4; y = x + 3; x = y * 2`. Registrér tilstanden efter hver sætning."
    hints:
      es: [Evalúa siempre la derecha antes de actualizar la izquierda.]
      en: [Always evaluate the right-hand side before updating the left-hand side.]
      da: [Evaluér altid højresiden før venstresiden opdateres.]
    reference_solution:
      es: "Después de la primera sentencia: x=4. Después de la segunda: x=4, y=7. Después de la tercera: x=14, y=7."
      en: "After the first statement: x=4. After the second: x=4, y=7. After the third: x=14, y=7."
      da: "Efter første sætning: x=4. Efter anden: x=4, y=7. Efter tredje: x=14, y=7."
    explanation:
      es: "La reasignación de `x` no modifica el valor ya almacenado en `y`."
      en: "Reassigning `x` does not modify the value already stored in `y`."
      da: "Gentildeling af `x` ændrer ikke den værdi, der allerede er gemt i `y`."
    linked_objectives: [m01.o4]

  - id: dm857.m01.p02
    activity_type: fill_in_the_blank
    difficulty: foundational
    prompt:
      es: "Completa las conversiones para leer una edad entera y una concentración decimal desde `input()`."
      en: "Complete the conversions needed to read an integer age and a decimal concentration from `input()`."
      da: "Fuldfør konverteringerne for at læse en heltalsalder og en decimalkoncentration fra `input()`."
    starter_code: |-
      age = ____(input("Age: "))
      concentration = ____(input("Concentration: "))
    accepted_answer_elements: [int, float]
    reference_solution: |-
      age = int(input("Age: "))
      concentration = float(input("Concentration: "))
    explanation:
      es: "`input()` devuelve texto; la conversión debe corresponder al significado esperado."
      en: "`input()` returns text; conversion must correspond to the intended meaning."
      da: "`input()` returnerer tekst; konverteringen skal svare til den tilsigtede betydning."
    linked_objectives: [m01.o5]

  - id: dm857.m01.p03
    activity_type: debugging
    difficulty: intermediate
    prompt:
      es: "Diagnostica por qué `total = \"12\" + 3` falla y propone una corrección coherente con una suma numérica."
      en: "Diagnose why `total = \"12\" + 3` fails and propose a correction consistent with numeric addition."
      da: "Forklar hvorfor `total = \"12\" + 3` fejler, og foreslå en rettelse til numerisk addition."
    hints:
      es: [Compara los tipos de ambos operandos.]
      en: [Compare the types of both operands.]
      da: [Sammenlign typerne for begge operander.]
    reference_solution: "total = int('12') + 3"
    explanation:
      es: "El fallo es de ejecución por operandos incompatibles para `+`; la intención numérica exige convertir la cadena."
      en: "The runtime failure results from incompatible operands for `+`; numeric intent requires converting the string."
      da: "Kørselsfejlen skyldes inkompatible operander til `+`; numerisk hensigt kræver konvertering af tekststrengen."
    linked_objectives: [m01.o2, m01.o5, m01.o6]

  - id: dm857.m01.p04
    activity_type: method_selection
    difficulty: intermediate
    prompt:
      es: "Decide si un resultado de 4.8 debe convertirse con `int`, `round` o conservarse como `float` cuando representa: a) número de tubos, b) masa estimada, c) media de réplicas."
      en: "Decide whether 4.8 should use `int`, `round`, or remain `float` when representing: a) number of tubes, b) estimated mass, c) replicate mean."
      da: "Vælg om 4.8 skal bruge `int`, `round` eller forblive `float` for: a) antal rør, b) estimeret masse, c) middelværdi af replikater."
    reference_solution:
      es: >-
        a) La política debe definirse; normalmente no puede prepararse 4.8 tubos, por lo que `int` sin justificación sería peligroso y podría requerirse redondeo hacia arriba. b) Conservar `float` con unidad. c) Conservar `float` y reportar precisión adecuada.
      en: >-
        a) Policy must be specified; 4.8 tubes is impossible, so bare `int` is unsafe and ceiling may be required. b) Retain `float` with units. c) Retain `float` and report appropriate precision.
      da: >-
        a) Politikken skal specificeres; 4,8 rør er umuligt, så rå `int` er usikkert, og oprunding kan være nødvendig. b) Bevar `float` med enhed. c) Bevar `float` med passende præcision.
    explanation:
      es: "La conversión depende del significado del dato y de la regla del problema, no de una preferencia sintáctica."
      en: "Conversion depends on data meaning and the problem rule, not on syntactic preference."
      da: "Konvertering afhænger af dataenes betydning og problemets regel, ikke af syntaktisk præference."
    linked_objectives: [m01.o1, m01.o5, m01.o6]

  - id: dm857.m01.p05
    activity_type: test_design
    difficulty: intermediate
    prompt:
      es: "Diseña tres pruebas para un cálculo `usable = int(total * fraction)` que detecten fracción negativa, fracción mayor que uno y un caso normal."
      en: "Design three tests for `usable = int(total * fraction)` that detect a negative fraction, a fraction greater than one, and a normal case."
      da: "Design tre test for `usable = int(total * fraction)`, der dækker negativ andel, andel over én og et normalt tilfælde."
    reference_solution:
      es: >-
        Caso normal: total=100, fraction=0.8, esperado=80. Inválido bajo: total=100, fraction=-0.1, debe rechazarse. Inválido alto: total=100, fraction=1.2, debe rechazarse. Las dos últimas pruebas revelan que el cálculo necesita validación previa.
      en: >-
        Normal: total=100, fraction=0.8, expected=80. Invalid low: total=100, fraction=-0.1, reject. Invalid high: total=100, fraction=1.2, reject. The last two show that validation is required before calculation.
      da: >-
        Normal: total=100, fraction=0.8, forventet=80. Ugyldig lav: fraction=-0.1, afvis. Ugyldig høj: fraction=1.2, afvis. De sidste to viser behovet for validering.
    linked_objectives: [m01.o1, m01.o6]

objective_question_bank:
  - id: dm857.m01.q01
    activity_type: multiple_choice
    difficulty: foundational
    prompt:
      es: "¿Cuál afirmación describe correctamente una expresión?"
      en: "Which statement correctly describes an expression?"
      da: "Hvilket udsagn beskriver et udtryk korrekt?"
    options:
      - id: evaluates_to_value
        text:
          es: "Código que Python puede evaluar para producir un valor."
          en: "Code Python can evaluate to produce a value."
          da: "Kode som Python kan evaluere for at producere en værdi."
      - id: permanent_storage
        text:
          es: "Un espacio permanente de almacenamiento con tipo fijo."
          en: "A permanent storage location with a fixed type."
          da: "Et permanent lagersted med fast type."
      - id: visible_output
        text:
          es: "Cualquier texto mostrado por `print()`."
          en: "Any text displayed by `print()`."
          da: "Enhver tekst vist af `print()`."
    correct_option_ids: [evaluates_to_value]
    explanation:
      es: "Una expresión se evalúa y produce un valor; no es sinónimo de variable ni de salida visible."
      en: "An expression is evaluated and produces a value; it is not synonymous with a variable or visible output."
      da: "Et udtryk evalueres og producerer en værdi; det er ikke det samme som en variabel eller synligt output."
    linked_objectives: [m01.o2]

  - id: dm857.m01.q02
    activity_type: multiple_choice
    difficulty: foundational
    prompt:
      es: "¿Qué tipo tiene el resultado de `8 / 4` en Python?"
      en: "What is the type of `8 / 4` in Python?"
      da: "Hvilken type har resultatet af `8 / 4` i Python?"
    options:
      - id: int
        text: {"es": "int", "en": "int", "da": "int"}
      - id: float
        text: {"es": "float", "en": "float", "da": "float"}
      - id: str
        text: {"es": "str", "en": "str", "da": "str"}
    correct_option_ids: [float]
    explanation:
      es: "El operador `/` produce `float`, incluso cuando la división es exacta."
      en: "The `/` operator produces `float`, even when division is exact."
      da: "Operatoren `/` producerer `float`, også når divisionen går op."
    linked_objectives: [m01.o3]

  - id: dm857.m01.q03
    activity_type: multiple_choice
    difficulty: foundational
    prompt:
      es: "Después de `x = 5; y = x; x = 9`, ¿cuál es el valor de `y`?"
      en: "After `x = 5; y = x; x = 9`, what is the value of `y`?"
      da: "Efter `x = 5; y = x; x = 9`, hvad er værdien af `y`?"
    options:
      - id: five
        text: {"es": "\"5\"", "en": "\"5\"", "da": "\"5\""}
      - id: nine
        text: {"es": "\"9\"", "en": "\"9\"", "da": "\"9\""}
      - id: undefined
        text: {"es": "No definido", "en": "Undefined", "da": "Ikke defineret"}
    correct_option_ids: [five]
    explanation:
      es: "`y` recibió el valor de `x` antes de la reasignación posterior."
      en: "`y` received the value of `x` before the later reassignment."
      da: "`y` modtog værdien af `x` før den senere gentildeling."
    linked_objectives: [m01.o4]

  - id: dm857.m01.q04
    activity_type: true_false
    difficulty: foundational
    prompt:
      es: "`input()` devuelve automáticamente un número cuando el usuario escribe dígitos."
      en: "`input()` automatically returns a number when the user types digits."
      da: "`input()` returnerer automatisk et tal, når brugeren skriver cifre."
    options:
      - id: true
        text: {"es": "Verdadero", "en": "True", "da": "Sandt"}
      - id: false
        text: {"es": "Falso", "en": "False", "da": "Falsk"}
    correct_option_ids: [false]
    explanation:
      es: "`input()` devuelve siempre `str`; la conversión numérica debe ser explícita."
      en: "`input()` always returns `str`; numeric conversion must be explicit."
      da: "`input()` returnerer altid `str`; numerisk konvertering skal være eksplicit."
    linked_objectives: [m01.o5]

  - id: dm857.m01.q05
    activity_type: multiple_choice
    difficulty: intermediate
    prompt:
      es: "¿Qué error describe un programa que finaliza sin excepción pero calcula el porcentaje usando `92.5` en lugar de `0.925`?"
      en: "Which error describes a program that finishes without exception but uses `92.5` instead of `0.925` for a percentage?"
      da: "Hvilken fejl beskriver et program, der afslutter uden undtagelse, men bruger `92.5` i stedet for `0.925`?"
    options:
      - id: syntax
        text: {"es": "Error de sintaxis", "en": "Syntax error", "da": "Syntaksfejl"}
      - id: runtime
        text: {"es": "Error de ejecución", "en": "Runtime error", "da": "Kørselsfejl"}
      - id: logic
        text: {"es": "Error lógico", "en": "Logic error", "da": "Logikfejl"}
    correct_option_ids: [logic]
    explanation:
      es: "El código es válido y se ejecuta, pero el modelo numérico implementado es incorrecto."
      en: "The code is valid and executes, but the implemented numeric model is incorrect."
      da: "Koden er gyldig og kører, men den implementerede numeriske model er forkert."
    linked_objectives: [m01.o6]

  - id: dm857.m01.q06
    activity_type: multiple_select
    difficulty: intermediate
    prompt:
      es: "¿Qué elementos necesita una prueba útil? Selecciona todos los correctos."
      en: "What does a useful test require? Select all correct elements."
      da: "Hvad kræver en nyttig test? Vælg alle korrekte elementer."
    options:
      - id: input
        text: {"es": "Entrada concreta", "en": "Concrete input", "da": "Konkret input"}
      - id: expected
        text: {"es": "Resultado esperado", "en": "Expected result", "da": "Forventet resultat"}
      - id: comparison
        text: {"es": "Criterio de comparación", "en": "Comparison criterion", "da": "Sammenligningskriterium"}
      - id: no_specification
        text: {"es": "Ausencia de especificación", "en": "Absence of specification", "da": "Fravær af specifikation"}
    correct_option_ids: [input, expected, comparison]
    explanation:
      es: "Una prueba necesita entrada, expectativa y un criterio que determine si el resultado observado coincide."
      en: "A test needs input, expectation, and a criterion that determines whether observed and expected results agree."
      da: "En test kræver input, forventning og et kriterium for overensstemmelse."
    linked_objectives: [m01.o6]

  - id: dm857.m01.q07
    activity_type: cloze_choice
    difficulty: foundational
    template:
      es: "La asignación evalúa primero el lado [[blank01]] y luego actualiza el nombre del lado [[blank02]]."
      en: "Assignment evaluates the [[blank01]] side first and then updates the name on the [[blank02]] side."
      da: "Tildeling evaluerer først [[blank01]] side og opdaterer derefter navnet på [[blank02]] side."
    blanks:
      - id: blank01
        options:
          - id: right
            text: {"es": "derecho", "en": "right", "da": "højre"}
          - id: left
            text: {"es": "izquierdo", "en": "left", "da": "venstre"}
        correct_option_id: right
      - id: blank02
        options:
          - id: left
            text: {"es": "izquierdo", "en": "left", "da": "venstre"}
          - id: right
            text: {"es": "derecho", "en": "right", "da": "højre"}
        correct_option_id: left
    explanation:
      es: "Esta secuencia explica por qué la reasignación puede utilizar el valor anterior de una variable."
      en: "This sequence explains why reassignment can use the previous value of a variable."
      da: "Denne rækkefølge forklarer, hvorfor gentildeling kan bruge en variabels tidligere værdi."
    linked_objectives: [m01.o4]

  - id: dm857.m01.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt:
      es: "¿Cuál nombre comunica mejor una cantidad y su unidad?"
      en: "Which name best communicates a quantity and its unit?"
      da: "Hvilket navn kommunikerer bedst en størrelse og dens enhed?"
    options:
      - id: x
        text: {"es": "x", "en": "x", "da": "x"}
      - id: value
        text: {"es": "value", "en": "value", "da": "value"}
      - id: total_volume_ml
        text: {"es": "total_volume_ml", "en": "total_volume_ml", "da": "total_volume_ml"}
    correct_option_ids: [total_volume_ml]
    explanation:
      es: "El nombre indica significado y unidad, lo que reduce errores de interpretación."
      en: "The name communicates meaning and unit, reducing interpretation errors."
      da: "Navnet angiver betydning og enhed og reducerer fortolkningsfejl."
    linked_objectives: [m01.o1, m01.o4]

assessment_items:
  - id: dm857.m01.a01
    activity_type: code_tracing
    difficulty: intermediate
    prompt:
      es: >-
        Traza el programa `a = 10; b = a / 4; a = int(b); c = str(a) + "2"`. Entrega una tabla con el estado después de cada sentencia y explica el tipo final de `c`.
      en: >-
        Trace `a = 10; b = a / 4; a = int(b); c = str(a) + "2"`. Submit a state table after every statement and explain the final type of `c`.
      da: >-
        Gennemgå `a = 10; b = a / 4; a = int(b); c = str(a) + "2"`. Indsend en tilstandstabel efter hver sætning og forklar den endelige type af `c`.
    accepted_answer_elements:
      - a becomes 10 then 2
      - b equals 2.5 and has type float
      - c equals "22" and has type str
      - explanation distinguishes conversion from arithmetic
    rubric:
      - criterion: correct_state_sequence
        points: 4
      - criterion: correct_types
        points: 3
      - criterion: explanation_of_conversion_and_concatenation
        points: 3
    explanation:
      es: "La actividad evalúa trazado, división, conversión y concatenación, no solo el resultado final."
      en: "The task evaluates tracing, division, conversion, and concatenation, not only the final result."
      da: "Opgaven vurderer gennemgang, division, konvertering og sammenkædning, ikke kun slutresultatet."
    linked_objectives: [m01.o2, m01.o3, m01.o4, m01.o5]

  - id: dm857.m01.a02
    activity_type: problem_modeling
    difficulty: intermediate
    prompt:
      es: >-
        Modela un cálculo del volumen total necesario para `n` muestras con un volumen por muestra y un porcentaje adicional de reserva. Define entradas, transformaciones, restricciones, salidas y dos pruebas. No se exige interfaz de usuario.
      en: >-
        Model a calculation for total volume required for `n` samples, volume per sample, and an additional reserve percentage. Define inputs, transformations, constraints, outputs, and two tests. No user interface is required.
      da: >-
        Modellér beregningen af samlet volumen til `n` prøver, volumen pr. prøve og en ekstra reserveprocent. Definér input, transformationer, begrænsninger, output og to test.
    accepted_answer_elements:
      - n is a non-negative integer
      - volume per sample is non-negative and unit is explicit
      - reserve percentage is converted to a fraction
      - formula preserves units
      - normal and boundary test cases are provided
    rubric:
      - criterion: explicit_problem_model
        points: 4
      - criterion: correct_calculation
        points: 3
      - criterion: constraints_and_units
        points: 2
      - criterion: tests
        points: 1
    explanation:
      es: "El objetivo principal es separar el modelo del código y hacer visibles las restricciones."
      en: "The main objective is to separate the model from the code and make constraints visible."
      da: "Hovedformålet er at adskille modellen fra koden og synliggøre begrænsningerne."
    linked_objectives: [m01.o1, m01.o5, m01.o6]

flashcards:
  source_file: ../flashcards/dm857_m01_flashcards.yaml
  expected_count: 24

glossary:
  - id: term.expression
    term: {"es": "expresión", "en": "expression", "da": "udtryk"}
    definition:
      es: "Código evaluable que produce un valor."
      en: "Evaluable code that produces a value."
      da: "Kode der kan evalueres og producerer en værdi."
    related_terms: [term.value, term.type]
  - id: term.value
    term: {"es": "valor", "en": "value", "da": "værdi"}
    definition:
      es: "Resultado concreto de evaluar una expresión."
      en: "Concrete result of evaluating an expression."
      da: "Konkret resultat af evalueringen af et udtryk."
    related_terms: [term.expression, term.type]
  - id: term.type
    term: {"es": "tipo", "en": "type", "da": "type"}
    definition:
      es: "Clasificación que determina la representación y las operaciones válidas de un valor."
      en: "Classification that determines a value's representation and valid operations."
      da: "Klassifikation der bestemmer en værdis repræsentation og gyldige operationer."
    related_terms: [term.value, term.conversion]
  - id: term.variable
    term: {"es": "variable", "en": "variable", "da": "variabel"}
    definition:
      es: "Nombre asociado a un valor en el estado actual del programa."
      en: "Name associated with a value in the current program state."
      da: "Navn knyttet til en værdi i programmets aktuelle tilstand."
    related_terms: [term.assignment, term.state]
  - id: term.assignment
    term: {"es": "asignación", "en": "assignment", "da": "tildeling"}
    definition:
      es: "Sentencia que evalúa una expresión y vincula un nombre con el resultado."
      en: "Statement that evaluates an expression and binds a name to the result."
      da: "Sætning der evaluerer et udtryk og knytter et navn til resultatet."
    related_terms: [term.variable, term.state]
  - id: term.state
    term: {"es": "estado del programa", "en": "program state", "da": "programtilstand"}
    definition:
      es: "Conjunto de asociaciones nombre-valor existentes en un momento de la ejecución."
      en: "Set of name-value associations at a point during execution."
      da: "Mængden af navn-værdi-forbindelser på et tidspunkt under udførelsen."
    related_terms: [term.variable, term.trace]
  - id: term.conversion
    term: {"es": "conversión de tipo", "en": "type conversion", "da": "typekonvertering"}
    definition:
      es: "Creación de un valor de otro tipo a partir de una representación compatible."
      en: "Creation of a value of another type from a compatible representation."
      da: "Oprettelse af en værdi af en anden type fra en kompatibel repræsentation."
    related_terms: [term.type]
  - id: term.logic_error
    term: {"es": "error lógico", "en": "logic error", "da": "logikfejl"}
    definition:
      es: "Fallo que permite ejecutar el programa pero produce un resultado incorrecto respecto a la especificación."
      en: "Failure that allows execution but produces a result inconsistent with the specification."
      da: "Fejl der tillader udførelse, men giver et resultat i strid med specifikationen."
    related_terms: [term.specification, term.test]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El núcleo del módulo es distinguir representación, evaluación y significado. El estudiante debe
      pasar de una situación verbal a un modelo explícito, identificar tipos y unidades, predecir el
      estado paso a paso y justificar conversiones. Ejecutar el código es una comprobación posterior,
      no un sustituto del razonamiento.
    en: >-
      The module centers on separating representation, evaluation, and meaning. The learner should
      move from a verbal situation to an explicit model, identify types and units, predict state step
      by step, and justify conversions. Executing code is a later check, not a substitute for reasoning.
    da: >-
      Modulet fokuserer på at adskille repræsentation, evaluering og betydning. Den studerende skal
      gå fra en verbal situation til en eksplicit model, identificere typer og enheder, forudsige
      tilstanden trin for trin og begrunde konverteringer. Kørsel af kode er en efterfølgende kontrol.
  knowledge_fragments:
    - id: dm857.m01.t01
      topic: model_layers
      content: Problem, model, algorithm, and implementation should be checked independently.
    - id: dm857.m01.t02
      topic: evaluation_order
      content: Assignment evaluates the right-hand expression before rebinding the left-hand name.
    - id: dm857.m01.t03
      topic: division
      content: In Python, `/` returns float; `//` performs floor division.
    - id: dm857.m01.t04
      topic: input
      content: "`input()` returns str and does not validate semantic meaning."
    - id: dm857.m01.t05
      topic: conversion
      content: Conversion must be justified by the quantity represented and may lose information.
    - id: dm857.m01.t06
      topic: testing
      content: A test combines concrete input, expected result, and comparison criterion.
    - id: dm857.m01.t07
      topic: errors
      content: Syntax, runtime, logic, and specification failures require different diagnoses.
    - id: dm857.m01.t08
      topic: units
      content: Units belong to the problem model and should be visible in names, documentation, or types.
  common_misconceptions:
    - misconception: A variable permanently owns a value and a type.
      correction: A variable name can be rebound; each current value has a type.
    - misconception: If code runs without an exception, it is correct.
      correction: Logic and specification errors may produce plausible but wrong output.
    - misconception: "`int()` rounds a decimal value."
      correction: "`int()` truncates toward zero for finite floats."
    - misconception: "`print()` and `return` are equivalent."
      correction: Printing produces visible output; returning passes a value to the caller.
    - misconception: Units are only comments and do not affect correctness.
      correction: Mixing units changes the modeled quantity and can invalidate results.
  socratic_questions:
    - What are the inputs, outputs, constraints, and transformations in this problem?
    - What value and type does each subexpression produce before execution?
    - Which statement changes program state?
    - What evidence would distinguish a logic error from a runtime error?
    - Why is this conversion justified by the meaning of the quantity?
    - Which boundary or invalid input could reveal a hidden assumption?
  grading_criteria:
    - terminology is used precisely
    - state traces follow actual execution order
    - units and types are explicit
    - conversions are justified
    - tests include expected results
    - explanations distinguish evidence from assumption
  response_constraints:
    - Give a hint before a full solution during ungraded practice.
    - Do not reveal objective answer keys during active assessment.
    - Ask the learner to predict before suggesting execution.
    - Distinguish Python behavior from the biomedical interpretation of a synthetic example.
    - Do not infer clinical validity from programming examples.
  escalation_rules:
    - If the learner repeatedly confuses assignment and equality, return to a two-line trace table.
    - If type errors persist, ask for the type of every operand before discussing the operator.
    - If the model is unclear, require inputs, outputs, units, and constraints before code.
    - If the question requires later concepts such as functions or exceptions, answer minimally and link to the relevant module.
  source_anchors: [sdu.dm857.official.2025, guttag.python.3e, downey.think_python.3e, repository.dm857.existing]

source_map:
  - target_ids: [m01.o1, problem-model-algorithm-program]
    source_id: sdu.dm857.official.2025
    use: official_outcome_alignment
  - target_ids: [expressions-values-types, variables-assignment-state, operators-precedence-conversion]
    source_id: guttag.python.3e
    use: factual_foundation
  - target_ids: [input-output-and-errors, dm857.m01.p03, dm857.m01.p05]
    source_id: downey.think_python.3e
    use: pedagogical_sequence
  - target_ids: [dm857.m01.e01, dm857.m01.e02]
    source_id: original.synthetic.dm857.m01
    use: pedagogical_sequence

limitations:
  - The module introduces basic scalar values and does not yet cover collections or functions.
  - Floating-point representation error is acknowledged but treated in detail later.
  - Input conversion examples do not yet implement exception handling.
  - Biomedical scenarios are synthetic and support programming instruction only.
