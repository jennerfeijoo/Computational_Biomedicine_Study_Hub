glossary:
  - id: term.recursion
    term: {es: recursión, en: recursion, da: rekursion}
    definition: {es: Resolución de un problema mediante instancias más pequeñas de la misma forma., en: Solving a problem through smaller instances of the same form., da: Løsning af et problem gennem mindre instanser af samme form.}
  - id: term.base_case
    term: {es: caso base, en: base case, da: basistilfælde}
    definition: {es: Instancia resuelta directamente sin nueva llamada recursiva., en: Instance solved directly without another recursive call., da: Instans løst direkte uden nyt rekursivt kald.}
  - id: term.progress_measure
    term: {es: medida de progreso, en: progress measure, da: fremskridtsmål}
    definition: {es: Cantidad bien fundada que disminuye hacia un caso base., en: Well-founded quantity decreasing toward a base case., da: Velfunderet størrelse der falder mod et basistilfælde.}
  - id: term.call_frame
    term: {es: marco de llamada, en: call frame, da: call frame}
    definition: {es: Estado local de una llamada activa., en: Local state of an active function call., da: Lokal tilstand for et aktivt funktionskald.}
  - id: term.call_stack
    term: {es: pila de llamadas, en: call stack, da: kaldstak}
    definition: {es: Estructura LIFO de marcos activos., en: LIFO structure of active call frames., da: LIFO-struktur af aktive call frames.}
  - id: term.unwinding
    term: {es: desenrollado, en: unwinding, da: afvikling}
    definition: {es: Retorno de marcos en orden inverso tras alcanzar un caso base., en: Return of frames in reverse order after a base case., da: Retur af frames i omvendt rækkefølge efter basistilfældet.}
  - id: term.recursion_depth
    term: {es: profundidad de recursión, en: recursion depth, da: rekursionsdybde}
    definition: {es: Número de marcos recursivos activos simultáneamente., en: Number of simultaneously active recursive frames., da: Antal samtidige aktive rekursive frames.}
  - id: term.call_tree
    term: {es: árbol de llamadas, en: call tree, da: kaldstræ}
    definition: {es: Representación de llamadas y subproblemas generados., en: Representation of generated calls and subproblems., da: Repræsentation af genererede kald og delproblemer.}
  - id: term.memoization
    term: {es: memoización, en: memoization, da: memoization}
    definition: {es: Almacenamiento de resultados para reutilizar subproblemas idénticos., en: Caching results for reuse of identical subproblems., da: Lagring af resultater til genbrug af identiske delproblemer.}
  - id: term.tail_recursion
    term: {es: recursión de cola, en: tail recursion, da: tail recursion}
    definition: {es: Forma en la que la llamada recursiva es la última operación lógica., en: Form where the recursive call is the final logical operation., da: Form hvor det rekursive kald er den sidste logiske operation.}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      Una solución recursiva correcta necesita cuatro piezas inseparables: contrato, caso base, reducción y combinación.
      El contrato define entradas y salida; el caso base resuelve la frontera; la reducción produce un subproblema
      estrictamente menor; la combinación reconstruye la solución actual. La terminación se demuestra con una medida
      bien fundada y el coste se estudia mediante el árbol de llamadas y las copias realizadas.
    en: >-
      A correct recursive solution needs four inseparable pieces: contract, base case, reduction, and combination.
      The contract defines input and output; the base case solves the boundary; reduction produces a strictly smaller
      subproblem; combination reconstructs the current solution. Termination follows from a well-founded measure,
      and cost is analyzed through the call tree and allocations.
    da: >-
      En korrekt rekursiv løsning kræver kontrakt, basistilfælde, reduktion og kombination. Terminering begrundes med
      et velfunderet mål, og omkostningen analyseres gennem kaldstræ og allokeringer.
  misconceptions:
    - id: m09.mc01
      incorrect: "Any self-call is meaningful recursion."
      correction: "The call must solve a structurally related, strictly smaller subproblem."
    - id: m09.mc02
      incorrect: "Having a base case guarantees termination."
      correction: "Every recursive branch must progress toward a reachable base case."
    - id: m09.mc03
      incorrect: "Recursive calls share one set of local variables."
      correction: "Each call owns an independent frame."
    - id: m09.mc04
      incorrect: "A linear number of calls always means linear total cost."
      correction: "Slicing or other per-call copying may increase total cost."
    - id: m09.mc05
      incorrect: "Memoization always improves any recursive function."
      correction: "It helps repeated deterministic subproblems and adds memory and cache-management cost."
  socratic_questions:
    - What is the exact recursive contract?
    - Which instances need no further decomposition?
    - What measure becomes strictly smaller in every branch?
    - What work occurs before the call and after return?
    - Is the same subproblem solved more than once?
    - Could the maximum valid depth exceed Python's practical recursion limit?
  grading_criteria:
    - Complete base cases matching the return contract.
    - Explicit and valid progress measure for every branch.
    - Correct stack and return reasoning.
    - No unnecessary repeated calls or slicing.
    - Clear comparison with an iterative alternative.
    - Tests for empty, invalid, asymmetric, and deep inputs.
  response_constraints:
    - Do not approve a recursive function without a termination argument.
    - Do not infer correctness from a few successful examples.
    - Distinguish number of calls from allocation and slicing cost.
    - Treat strings and cyclic structures according to an explicit contract.
    - Mention Python recursion depth when input depth is unbounded or data-dependent.
  retrieval_fragments:
    - id: m09.r01
      topic: recursive_design
      content: "A recursive solution requires a contract, reachable base case, strictly smaller subproblem, and a combination step."
    - id: m09.r02
      topic: termination
      content: "Termination requires a well-founded progress measure reduced by every recursive branch."
    - id: m09.r03
      topic: stack_trace
      content: "Calls descend by creating independent frames and return in LIFO order during unwinding."
    - id: m09.r04
      topic: memoization
      content: "Memoization helps when identical deterministic subproblems repeat; it trades memory for avoided recomputation."

