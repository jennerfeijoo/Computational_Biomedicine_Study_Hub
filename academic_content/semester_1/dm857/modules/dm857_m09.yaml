concepts:
  - id: recursive-contract
    title:
      es: Contrato recursivo y estructura del subproblema
      en: Recursive contract and subproblem structure
      da: Rekursiv kontrakt og delproblemstruktur
    body:
      es: >-
        Una función recursiva se llama directa o indirectamente para resolver una instancia de la misma
        forma, pero más pequeña según una medida explícita. El contrato define el dominio válido, el tipo
        de retorno y las propiedades esperadas. Al diseñar el cuerpo puede asumirse que la llamada recursiva
        cumple el contrato para el subproblema; la responsabilidad actual es combinar ese resultado con el
        trabajo de la instancia presente.
      en: >-
        A recursive function calls itself directly or indirectly to solve an instance of the same form that
        is smaller under an explicit measure. The contract defines valid domain, return type, and expected
        properties. The current frame may assume the recursive call satisfies the contract for the subproblem
        and must combine that result with current work.
      da: >-
        En rekursiv funktion løser en mindre instans af samme form. Kontrakten definerer domæne, returtype
        og egenskaber, og den aktuelle frame kombinerer delproblemets resultat med aktuelt arbejde.
    linked_objectives: [m09.o1, m09.o5]

  - id: base-cases-and-domain-boundaries
    title:
      es: Casos base y fronteras del dominio
      en: Base cases and domain boundaries
      da: Basistilfælde og domænegrænser
    body:
      es: >-
        Un caso base resuelve directamente una instancia que no necesita más descomposición. Debe ser
        alcanzable desde todas las ramas recursivas y retornar un valor compatible con la combinación posterior.
        Un caso base ausente causa llamadas sin fin; uno incorrecto contamina todos los retornos. La entrada vacía,
        cero, uno o una hoja suelen ser fronteras, pero el caso exacto depende del contrato y puede haber varios.
      en: >-
        A base case directly solves an instance requiring no further decomposition. It must be reachable from every
        recursive branch and return a value compatible with later combination. Missing base cases prevent termination;
        incorrect ones contaminate every return. Empty input, zero, one, or a leaf are common but contract-dependent.
      da: >-
        Et basistilfælde løser en minimal instans direkte. Det skal kunne nås fra alle rekursive grene og returnere
        en værdi, der passer til den senere kombination.
    linked_objectives: [m09.o2, m09.o3]

  - id: progress-measure-and-termination
    title:
      es: Medida de progreso y terminación
      en: Progress measure and termination
      da: Fremskridtsmål og terminering
    body:
      es: >-
        Cada llamada recursiva debe reducir una medida bien fundada: un entero no negativo, la longitud restante,
        el tamaño del intervalo o la profundidad estructural. La medida no puede decrecer indefinidamente y debe
        aproximarse a un caso base. Pasar la misma entrada, aumentar `n` o reducir solo algunas ramas rompe el argumento.
        Probar varios ejemplos no demuestra terminación; debe explicarse la medida para todas las entradas válidas.
      en: >-
        Every recursive call must reduce a well-founded measure such as a non-negative integer, remaining length,
        interval size, or structural depth. The measure cannot decrease indefinitely and must approach a base case.
        Passing unchanged input or reducing only some branches breaks the argument. Examples do not prove termination.
      da: >-
        Hvert rekursivt kald skal reducere et velfunderet mål som heltal, restlængde, intervalstørrelse eller dybde.
        Målet skal nærme sig et basistilfælde i alle rekursive grene.
    linked_objectives: [m09.o3]

  - id: call-stack-descent-and-unwinding
    title:
      es: Pila de llamadas, descenso y desenrollado
      en: Call stack, descent, and unwinding
      da: Kaldstak, nedstigning og afvikling
    body:
      es: >-
        Cada llamada crea un marco con parámetros, variables locales y punto de retorno. Los marcos se apilan durante
        el descenso hasta alcanzar un caso base. Después se desenrollan en orden LIFO y cada marco recibe un valor y
        completa su combinación. El trabajo antes de la llamada ocurre al descender; el trabajo después ocurre al
        regresar. Un trazado correcto distingue ambos órdenes y no comparte variables locales entre marcos.
      en: >-
        Each call creates a frame with parameters, locals, and a return point. Frames accumulate during descent until
        a base case, then unwind in LIFO order. Work before the recursive call occurs on descent; work after it occurs
        on return. A correct trace distinguishes these orders and independent local frames.
      da: >-
        Hvert kald opretter en frame. Frames stables under nedstigning og afvikles i LIFO-rækkefølge efter basistilfældet.
    linked_objectives: [m09.o4]

  - id: recursion-over-sequences
    title:
      es: Recursión sobre números y secuencias
      en: Recursion over numbers and sequences
      da: Rekursion over tal og sekvenser
    body:
      es: >-
        Un problema numérico suele reducir `n`; una secuencia puede descomponerse en cabeza y resto, índice actual o
        mitades. El slicing crea objetos nuevos y puede convertir una solución aparentemente lineal en una de mayor coste.
        Pasar un índice evita copias. La combinación debe usar una vez el retorno recursivo y no volver a invocar el mismo
        subproblema sin necesidad.
      en: >-
        Numeric recursion often reduces `n`; sequence recursion may use head and rest, a current index, or halves.
        Slicing creates new objects and may increase cost. Passing an index avoids copies. Combination should reuse the
        recursive return rather than invoke the same subproblem again.
      da: >-
        Numerisk rekursion reducerer ofte `n`; sekvenser kan deles i hoved og rest, indeks eller halvdele. Slicing kan
        tilføje kopieringsomkostning, så et indeks kan være bedre.
    linked_objectives: [m09.o5, m09.o8]

  - id: nested-structures-and-type-boundaries
    title:
      es: Estructuras anidadas y fronteras de tipo
      en: Nested structures and type boundaries
      da: Indlejrede strukturer og typegrænser
    body:
      es: >-
        Las estructuras de profundidad variable no siempre pueden procesarse con un número fijo de bucles. Una función
        recursiva distingue un elemento simple de un contenedor: procesa directamente el primero y recorre recursivamente
        el segundo. El contrato debe definir qué tipos cuentan como contenedores; tratar cadenas como secuencias genéricas
        puede descomponerlas carácter por carácter de forma accidental.
      en: >-
        Variable-depth structures do not always fit a fixed number of loops. A recursive function distinguishes atomic
        elements from containers: process atoms directly and recurse into containers. The contract must define container
        types; treating strings as generic containers may cause unintended character recursion.
      da: >-
        Strukturer med variabel dybde kræver ofte rekursiv skelnen mellem atomare elementer og containere. Kontrakten
        skal definere typerne og undgå utilsigtet rekursion i strenge.
    linked_objectives: [m09.o6]

  - id: recursion-versus-iteration
    title:
      es: Recursión frente a iteración
      en: Recursion versus iteration
      da: Rekursion versus iteration
    body:
      es: >-
        Recursión e iteración pueden expresar muchas de las mismas repeticiones. La recursión suele reflejar con claridad
        árboles, divide y vencerás y estructuras anidadas; la iteración evita marcos de llamada y límites de profundidad.
        En Python, la recursión profunda no se optimiza automáticamente como tail recursion. La elección debe considerar
        claridad, profundidad máxima, coste de memoria y facilidad de prueba.
      en: >-
        Recursion and iteration can express many of the same repetitions. Recursion often mirrors trees, divide-and-conquer,
        and nested structures; iteration avoids call frames and recursion-depth limits. Python does not automatically optimize
        deep tail recursion. Choose by clarity, maximum depth, memory cost, and testability.
      da: >-
        Rekursion spejler ofte træer og indlejrede strukturer, mens iteration undgår call frames og dybdegrænser. Python
        optimerer ikke automatisk dyb tail recursion.
    linked_objectives: [m09.o7]

  - id: cost-repeated-subproblems-and-memoization
    title:
      es: Coste, subproblemas repetidos y memoización
      en: Cost, repeated subproblems, and memoization
      da: Omkostning, gentagne delproblemer og memoization
    body:
      es: >-
        El árbol de llamadas revela cuántas veces se resuelve cada subproblema. Si distintas ramas vuelven a calcular la
        misma entrada, el coste puede crecer exponencialmente. La memoización almacena resultados por clave y permite
        reutilizarlos, intercambiando memoria por tiempo. Solo es segura cuando el resultado depende exclusivamente de la
        entrada usada como clave y no de estado externo mutable.
      en: >-
        The call tree reveals how often each subproblem is solved. Recomputing the same input across branches may produce
        exponential growth. Memoization stores results by key and trades memory for time. It is safe only when the result
        depends solely on the keyed input and not on mutable external state.
      da: >-
        Kaldstræet viser gentagne delproblemer. Memoization gemmer resultater efter nøgle og bytter hukommelse for tid,
        men kræver at resultatet kun afhænger af den cachede input.
    linked_objectives: [m09.o8]

worked_examples:
  - id: dm857.m09.e01
    title:
      es: Sumar una secuencia mediante índice recursivo
      en: Sum a sequence using a recursive index
      da: Summér en sekvens med rekursivt indeks
    problem:
      es: Implementar una suma recursiva sin crear slices en cada llamada.
      en: Implement a recursive sum without creating slices at every call.
      da: Implementér en rekursiv sum uden at oprette slices ved hvert kald.
    assumptions:
      - values is a finite sequence of numbers
      - index starts within 0 through len(values)
    reasoning:
      es:
        - Usar `index == len(values)` como caso base.
        - Reducir la longitud restante incrementando el índice.
        - Combinar el elemento actual con el retorno del resto.
      en:
        - Use `index == len(values)` as the base case.
        - Reduce remaining length by increasing the index.
        - Combine the current element with the return from the rest.
      da:
        - Brug `index == len(values)` som basistilfælde.
        - Reducér restlængden ved at øge indekset.
        - Kombinér aktuelt element med returværdien fra resten.
    code: |-
      def recursive_sum(values: list[float], index: int = 0) -> float:
          if index == len(values):
              return 0.0
          return values[index] + recursive_sum(values, index + 1)

      print(recursive_sum([1.5, 2.0, 3.5]))
    expected_output: "7.0"
    validation:
      - empty input returns 0.0
      - one element returns that element
      - positive and negative values combine correctly
      - the progress measure len(values) - index decreases by one
    explanation:
      es: El índice evita copias y el valor neutro 0.0 hace compatible el caso vacío con la suma.
      en: The index avoids copies, and neutral value 0.0 makes the empty case compatible with addition.
      da: Indekset undgår kopier, og den neutrale værdi 0.0 passer til summen.
    limitations:
      - very long inputs may exceed Python's recursion limit
    linked_objectives: [m09.o2, m09.o3, m09.o4, m09.o5]

  - id: dm857.m09.e02
    title:
      es: Aplanar listas anidadas de números
      en: Flatten nested lists of numbers
      da: Udflad indlejrede lister af tal
    problem:
      es: Convertir una estructura sintética de profundidad variable en una lista plana sin descomponer cadenas.
      en: Convert a synthetic variable-depth structure into a flat list without decomposing strings.
      da: Konvertér en syntetisk struktur med variabel dybde til en flad liste uden at dekomponere strenge.
    assumptions:
      - valid containers are lists only
      - valid atomic elements are int or float
    code: |-
      def flatten_numbers(value: object) -> list[float]:
          if isinstance(value, (int, float)) and not isinstance(value, bool):
              return [float(value)]
          if isinstance(value, list):
              result = []
              for item in value:
                  result.extend(flatten_numbers(item))
              return result
          raise TypeError(f"unsupported element: {type(value).__name__}")

      print(flatten_numbers([1, [2.5, [3]], 4]))
    expected_output: "[1.0, 2.5, 3.0, 4.0]"
    validation:
      - empty nested lists contribute no elements
      - nesting depth does not alter left-to-right order
      - strings and unsupported objects raise TypeError
      - input is not mutated
    explanation:
      es: El contrato define con precisión qué es átomo y qué es contenedor; cada lista se descompone en elementos más pequeños.
      en: The contract precisely defines atoms and containers; each list decomposes into smaller elements.
      da: Kontrakten definerer atom og container præcist; hver liste dekomponeres i mindre elementer.
    limitations:
      - cyclic lists are outside the contract and would not terminate
    linked_objectives: [m09.o1, m09.o2, m09.o3, m09.o6]

  - id: dm857.m09.e03
    title:
      es: Detectar y eliminar subproblemas repetidos
      en: Detect and eliminate repeated subproblems
      da: Identificér og fjern gentagne delproblemer
    problem:
      es: Comparar Fibonacci ingenuo y memoizado para explicar el árbol de llamadas.
      en: Compare naive and memoized Fibonacci to explain the call tree.
      da: Sammenlign naiv og memoized Fibonacci for at forklare kaldstræet.
    code: |-
      def fib(n: int) -> int:
          if n < 0:
              raise ValueError("n must be non-negative")
          if n < 2:
              return n
          return fib(n - 1) + fib(n - 2)

      def fib_memo(n: int, cache: dict[int, int] | None = None) -> int:
          if n < 0:
              raise ValueError("n must be non-negative")
          if cache is None:
              cache = {0: 0, 1: 1}
          if n not in cache:
              cache[n] = fib_memo(n - 1, cache) + fib_memo(n - 2, cache)
          return cache[n]
    expected_output: Both functions return the same Fibonacci number for valid n.
    validation:
      - n 0 and 1 use base cases
      - negative n is rejected before recursion
      - memoized results equal naive results for small n
      - each n is computed at most once in the memoized version
    explanation:
      es: La memoización colapsa un árbol con subproblemas repetidos en un conjunto lineal de estados distintos.
      en: Memoization collapses a repeated-subproblem call tree into a linear set of distinct states.
      da: Memoization reducerer et kaldstræ med gentagelser til et lineært sæt af forskellige tilstande.
    limitations:
      - iterative Fibonacci remains simpler and avoids recursion depth for this one-dimensional problem
    linked_objectives: [m09.o2, m09.o3, m09.o7, m09.o8]

practice_exercises:
  - id: dm857.m09.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: Traza `countdown(3)` si imprime `n` antes de llamar a `countdown(n-1)` y el caso base es `n == 0`.
      en: Trace `countdown(3)` when it prints `n` before calling `countdown(n-1)` and the base case is `n == 0`.
      da: Gennemgå `countdown(3)`, når `n` udskrives før `countdown(n-1)`, og basistilfældet er `n == 0`.
    reference_solution:
      es: Se imprime `3, 2, 1`; el caso 0 detiene el descenso.
      en: It prints `3, 2, 1`; case 0 stops descent.
      da: Den udskriver `3, 2, 1`; tilfældet 0 stopper nedstigningen.
    linked_objectives: [m09.o2, m09.o4]

  - id: dm857.m09.p02
    activity_type: code_tracing
    difficulty: intermediate
    prompt:
      es: ¿Qué orden imprime la misma función si imprime después de la llamada recursiva?
      en: What order does the same function print when printing after the recursive call?
      da: Hvilken rækkefølge udskrives, hvis udskriften sker efter det rekursive kald?
    reference_solution:
      es: `1, 2, 3`, durante el desenrollado.
      en: `1, 2, 3`, during unwinding.
      da: `1, 2, 3` under afviklingen.
    linked_objectives: [m09.o4]

  - id: dm857.m09.p03
    activity_type: debugging
    difficulty: intermediate
    prompt:
      es: Diagnostica `return f(n + 1)` para un dominio de enteros no negativos cuyo caso base es `n == 0`.
      en: Diagnose `return f(n + 1)` for non-negative integers with base case `n == 0`.
      da: Diagnostisér `return f(n + 1)` for ikke-negative heltal med basistilfældet `n == 0`.
    reference_solution:
      es: La medida `n` aumenta y se aleja del caso base; debe reducirse mediante `n - 1` o redefinirse el contrato.
      en: Measure `n` increases away from the base case; use `n - 1` or redefine the contract.
      da: Målet `n` vokser væk fra basistilfældet; brug `n - 1` eller redefinér kontrakten.
    linked_objectives: [m09.o3]

  - id: dm857.m09.p04
    activity_type: refactoring
    difficulty: intermediate
    prompt:
      es: Reescribe una suma recursiva basada en `values[1:]` para usar un índice y explica el cambio de coste.
      en: Rewrite a recursive sum based on `values[1:]` to use an index and explain the cost change.
      da: Omskriv en rekursiv sum med `values[1:]` til et indeks og forklar omkostningsændringen.
    accepted_answer_elements:
      - index parameter
      - base case at len(values)
      - no slice allocation per call
      - same linear number of calls with reduced copying
    linked_objectives: [m09.o5, m09.o8]

  - id: dm857.m09.p05
    activity_type: method_selection
    difficulty: advanced
    prompt:
      es: Elige recursión o iteración para factorial, recorrer un árbol, procesar una lista plana enorme y aplanar una estructura de profundidad variable. Justifica.
      en: Choose recursion or iteration for factorial, tree traversal, a huge flat list, and flattening variable-depth structure. Justify.
      da: Vælg rekursion eller iteration til fakultet, trægennemløb, en meget stor flad liste og udfladning af variabel dybde. Begrund.
    accepted_answer_elements:
      - either paradigm can express factorial, iteration avoids depth
      - recursion naturally mirrors tree traversal
      - iteration is safer for a huge flat list
      - recursion naturally handles variable nesting if cycles are excluded
    linked_objectives: [m09.o6, m09.o7]

  - id: dm857.m09.p06
    activity_type: test_design
    difficulty: advanced
    prompt:
      es: Diseña pruebas para una función recursiva que calcula la profundidad máxima de listas anidadas.
      en: Design tests for a recursive function computing maximum nested-list depth.
      da: Design test til en rekursiv funktion, der beregner maksimal dybde af indlejrede lister.
    accepted_answer_elements:
      - atomic value according to contract
      - empty list
      - flat list
      - asymmetric nesting
      - unsupported type
      - very deep input near the recursion limit
      - no mutation
      - explicit depth convention
    linked_objectives: [m09.o2, m09.o3, m09.o6, m09.o7]

