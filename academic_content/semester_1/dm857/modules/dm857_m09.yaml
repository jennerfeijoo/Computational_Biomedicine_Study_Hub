metadata:
  title:
    es: Recursión, pila de llamadas, terminación y coste
    en: Recursion, call stack, termination, and cost
    da: Rekursion, kaldstak, terminering og omkostning
  summary:
    es: >-
      Diseño y análisis de soluciones recursivas mediante contrato, casos base, medida de progreso,
      pila de llamadas, descenso y desenrollado, recursión sobre números y secuencias, estructuras
      anidadas, comparación con iteración, complejidad, subproblemas repetidos, memoización
      introductoria, límites de profundidad y pruebas de terminación y corrección.
    en: >-
      Design and analysis of recursive solutions using contracts, base cases, progress measures,
      the call stack, descent and unwinding, recursion over numbers and sequences, nested structures,
      comparison with iteration, complexity, repeated subproblems, introductory memoization,
      recursion-depth limits, and tests for termination and correctness.
    da: >-
      Design og analyse af rekursive løsninger med kontrakter, basistilfælde, fremskridtsmål,
      kaldstak, nedstigning og afvikling, rekursion over tal og sekvenser, indlejrede strukturer,
      sammenligning med iteration, kompleksitet, gentagne delproblemer, introducerende memoization,
      dybdegrænser og test af terminering og korrekthed.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03, dm857.m04, dm857.m05, dm857.m06]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05, dm857.lo06]
  estimated_study_hours: 20
  difficulty: intermediate_to_advanced

