    difficulty: foundational
    prompt: {es: ¿Qué demuestra una medida de progreso decreciente y acotada?, en: What does a decreasing bounded progress measure support?, da: Hvad understøtter et faldende afgrænset fremskridtsmål?}
    options:
      - id: termination
        text: {es: Terminación., en: Termination., da: Terminering.}
      - id: syntax
        text: {es: Corrección sintáctica., en: Syntactic correctness., da: Syntaktisk korrekthed.}
      - id: output_format
        text: {es: Formato de salida., en: Output format., da: Outputformat.}
    correct_option_ids: [termination]
    explanation: {es: La medida no puede reducirse indefinidamente., en: The measure cannot decrease indefinitely., da: Målet kan ikke falde uendeligt.}
  - id: dm857.m09.q04
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿En qué orden se desenrolla la pila?, en: In what order does the stack unwind?, da: I hvilken rækkefølge afvikles stakken?}
    options:
      - id: lifo
        text: {es: Último en entrar, primero en salir., en: Last in, first out., da: Sidst ind, først ud.}
      - id: fifo
        text: {es: Primero en entrar, primero en salir., en: First in, first out., da: Først ind, først ud.}
      - id: random
        text: {es: Aleatorio., en: Random., da: Tilfældigt.}
    correct_option_ids: [lifo]
    explanation: {es: El marco más reciente retorna primero., en: The most recent frame returns first., da: Den seneste frame returnerer først.}
  - id: dm857.m09.q05
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Usar slicing en cada llamada puede añadir coste de copia., en: Slicing at every call may add copying cost., da: Slicing ved hvert kald kan tilføje kopieringsomkostning.}
    correct_answer: true
    explanation: {es: Cada slice crea una secuencia nueva., en: Each slice creates a new sequence., da: Hvert slice opretter en ny sekvens.}
  - id: dm857.m09.q06
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Cuál es un riesgo de tratar cadenas como contenedores recursivos genéricos?, en: What is a risk of treating strings as generic recursive containers?, da: Hvad er en risiko ved at behandle strenge som generiske rekursive containere?}
    options:
      - id: character_recursion
        text: {es: Descomponerlas carácter por carácter sin intención., en: Unintentionally recurse character by character., da: Utilsigtet rekursion tegn for tegn.}
      - id: no_iteration
        text: {es: Las cadenas no son iterables., en: Strings are not iterable., da: Strenge er ikke iterable.}
      - id: automatic_cache
        text: {es: Se memorizan automáticamente., en: They are automatically memoized., da: De memoizes automatisk.}
    correct_option_ids: [character_recursion]
    explanation: {es: El contrato debe definir tipos atómicos y contenedores., en: The contract must define atomic and container types., da: Kontrakten skal definere atom- og containertyper.}
  - id: dm857.m09.q07
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Python elimina automáticamente el coste de una recursión de cola profunda., en: Python automatically eliminates the cost of deep tail recursion., da: Python eliminerer automatisk omkostningen ved dyb tail recursion.}
    correct_answer: false
    explanation: {es: Python conserva marcos y tiene un límite de recursión., en: Python retains frames and has a recursion limit., da: Python bevarer frames og har en rekursionsgrænse.}
  - id: dm857.m09.q08
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {es: ¿Qué indica un árbol de llamadas con las mismas entradas repetidas?, en: What does a call tree with repeated identical inputs indicate?, da: Hvad indikerer et kaldstræ med gentagne identiske input?}
    options:
      - id: memoization_candidate
        text: {es: Posible beneficio de memoización., en: Potential benefit from memoization., da: Mulig gevinst ved memoization.}
      - id: guaranteed_constant
        text: {es: Coste constante garantizado., en: Guaranteed constant cost., da: Garanteret konstant omkostning.}
      - id: syntax_error
        text: {es: Error sintáctico., en: Syntax error., da: Syntaksfejl.}
    correct_option_ids: [memoization_candidate]
    explanation: {es: Los resultados pueden reutilizarse por entrada., en: Results may be reused by input., da: Resultater kan genbruges efter input.}
  - id: dm857.m09.q09
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {es: ¿Cuándo es segura la memoización?, en: When is memoization safe?, da: Hvornår er memoization sikker?}
    options:
      - id: deterministic_by_key
        text: {es: Cuando el resultado depende solo de la clave almacenada., en: When the result depends only on the cached key., da: Når resultatet kun afhænger af den cachede nøgle.}
      - id: mutable_global
        text: {es: Cuando depende de estado global mutable no incluido., en: When it depends on omitted mutable global state., da: Når det afhænger af udeladt muterbar global tilstand.}
      - id: random_each_call
        text: {es: Cuando debe cambiar aleatoriamente en cada llamada., en: When it must change randomly each call., da: Når det skal ændre sig tilfældigt ved hvert kald.}
    correct_option_ids: [deterministic_by_key]
    explanation: {es: La caché presupone igual entrada, igual resultado., en: The cache assumes equal input gives equal output., da: Cachen antager samme input giver samme output.}
  - id: dm857.m09.q10
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {es: ¿Qué prueba es esencial además de ejemplos correctos?, en: What test is essential beyond correct examples?, da: Hvilken test er essentiel ud over korrekte eksempler?}
    options:
      - id: boundary_and_depth
        text: {es: Casos base, dominio inválido y profundidad extrema., en: Base cases, invalid domain, and extreme depth., da: Basistilfælde, ugyldigt domæne og ekstrem dybde.}
      - id: only_typical
        text: {es: Solo una entrada típica., en: Only one typical input., da: Kun ét typisk input.}
      - id: print_trace
        text: {es: Solo imprimir el trazado., en: Only print the trace., da: Kun udskrivning af trace.}
    correct_option_ids: [boundary_and_depth]
    explanation: {es: La recursión falla especialmente en fronteras y profundidad., en: Recursion often fails at boundaries and depth., da: Rekursion fejler ofte ved grænser og dybde.}

assessment_items:
  - id: dm857.m09.a01
    activity_type: recursive_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña una función recursiva que cuente elementos numéricos en listas anidadas de profundidad variable.
        Define tipos válidos, casos base, medida de progreso, tratamiento de cadenas y pruebas de no mutación.
      en: >-
        Design a recursive function counting numeric elements in variable-depth nested lists. Define valid types,
        base cases, progress measure, string handling, and non-mutation tests.
      da: >-
        Design en rekursiv funktion der tæller numeriske elementer i indlejrede lister med variabel dybde.
        Definér typer, basistilfælde, fremskridtsmål, strenghåndtering og test af ikke-mutation.
    accepted_answer_elements:
      - atomic numeric base case
      - list container case including empty list
      - explicit rejection or policy for unsupported types and strings
      - recursive traversal of each child
      - structural size or finite-tree argument for termination
      - input remains unchanged
    rubric:
      - {criterion: contract_and_base_cases, points: 3}
      - {criterion: recursive_decomposition, points: 3}
      - {criterion: termination_argument, points: 2}
      - {criterion: tests_and_limits, points: 2}
    linked_objectives: [m09.o1, m09.o2, m09.o3, m09.o6]

  - id: dm857.m09.a02
    activity_type: debugging
    difficulty: advanced
    prompt:
      es: >-
        Una función de búsqueda recursiva llama dos veces al mismo subproblema y usa `values[1:]` en cada llamada.
        Diagnostica el coste, corrige la recomputación, elimina copias innecesarias y diseña una prueba de equivalencia.
      en: >-
        A recursive search calls the same subproblem twice and uses `values[1:]` at every call. Diagnose cost,
        remove recomputation and unnecessary copies, and design an equivalence test.
      da: >-
        En rekursiv søgning kalder samme delproblem to gange og bruger `values[1:]` ved hvert kald.
        Diagnostisér omkostningen, fjern genberegning og kopier, og design en ækvivalenstest.
    accepted_answer_elements:
      - repeated call tree identified
      - recursive result stored once per frame
      - index or bounds replace slicing
      - same result as trusted iterative reference across boundaries
      - complexity discussion distinguishes calls from copying
    rubric:
      - {criterion: call_tree_diagnosis, points: 3}
      - {criterion: corrected_implementation_design, points: 3}
      - {criterion: cost_analysis, points: 2}
      - {criterion: equivalence_tests, points: 2}
    linked_objectives: [m09.o4, m09.o5, m09.o7, m09.o8]

  - id: dm857.m09.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: >-
        Explica por qué una función recursiva puede producir el resultado correcto para entradas pequeñas y aun ser
        incorrecta como solución general. Incluye terminación, profundidad, coste, dominio y casos base.
      en: >-
        Explain why a recursive function may produce correct results for small inputs yet still be incorrect as a
        general solution. Include termination, depth, cost, domain, and base cases.
      da: >-
        Forklar hvorfor en rekursiv funktion kan give korrekte resultater for små input og stadig være forkert som
        generel løsning. Medtag terminering, dybde, omkostning, domæne og basistilfælde.
    accepted_answer_elements:
      - finite examples do not prove termination for all valid input
      - missing domain checks can move away from the base case
      - recursion limit may reject otherwise finite deep inputs
      - repeated subproblems may make cost impractical
      - incomplete base cases may fail at empty or alternate shapes
    rubric:
      - {criterion: termination_reasoning, points: 3}
      - {criterion: domain_and_base_case_analysis, points: 2}
      - {criterion: depth_and_cost_analysis, points: 3}
      - {criterion: evidence_and_clarity, points: 2}
    linked_objectives: [m09.o2, m09.o3, m09.o7, m09.o8]

