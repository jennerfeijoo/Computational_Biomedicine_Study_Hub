  - {id: dm857.m13.q02, activity_type: true_false, prompt: {es: Una semilla garantiza determinismo en cualquier plataforma y biblioteca., en: A seed guarantees determinism across every platform and library., da: Et seed garanterer determinisme på alle platforme og biblioteker.}, correct_answer: false}
  - {id: dm857.m13.q03, activity_type: multiple_choice, prompt: {es: ¿Qué atributo describe dimensiones de un ndarray?, en: Which attribute describes ndarray dimensions?, da: Hvilken attribut beskriver dimensionerne i et ndarray?}, options: [{id: shape, text: {es: shape, en: shape, da: shape}}, {id: dtype, text: {es: dtype, en: dtype, da: dtype}}, {id: size, text: {es: size solamente, en: size only, da: kun size}}], correct_option_ids: [shape]}
  - {id: dm857.m13.q04, activity_type: true_false, prompt: {es: `reshape` puede cambiar libremente el número total de elementos., en: `reshape` may freely change total element count., da: `reshape` kan frit ændre det samlede antal elementer.}, correct_answer: false}
  - {id: dm857.m13.q05, activity_type: multiple_choice, prompt: {es: ¿Desde qué lado alinea dimensiones broadcasting?, en: From which side does broadcasting align dimensions?, da: Fra hvilken side justerer broadcasting dimensioner?}, options: [{id: right, text: {es: Derecha, en: Right, da: Højre}}, {id: left, text: {es: Izquierda, en: Left, da: Venstre}}, {id: random, text: {es: Aleatoriamente, en: Randomly, da: Tilfældigt}}], correct_option_ids: [right]}
  - {id: dm857.m13.q06, activity_type: true_false, prompt: {es: Que dos shapes sean compatibles garantiza que la operación tenga sentido científico., en: Compatible shapes guarantee scientific meaning., da: Kompatible shapes garanterer videnskabelig mening.}, correct_answer: false}
  - {id: dm857.m13.q07, activity_type: multiple_choice, prompt: {es: ¿Qué selecciona `loc`?, en: What does `loc` select by?, da: Hvad vælger `loc` efter?}, options: [{id: labels, text: {es: Etiquetas, en: Labels, da: Etiketter}}, {id: positions, text: {es: Sólo posiciones, en: Positions only, da: Kun positioner}}, {id: dtype, text: {es: dtype, en: dtype, da: dtype}}], correct_option_ids: [labels]}
  - {id: dm857.m13.q08, activity_type: true_false, prompt: {es: Asignar una Series a un DataFrame puede alinear por índice e introducir ausentes., en: Assigning a Series to a DataFrame may align by index and introduce missing values., da: Tildeling af en Series til et DataFrame kan alignere efter indeks og indføre manglende værdier.}, correct_answer: true}
  - {id: dm857.m13.q09, activity_type: multiple_choice, prompt: {es: ¿Qué comparación es habitual para floats calculados?, en: Which comparison is common for computed floating-point values?, da: Hvilken sammenligning bruges ofte til beregnede floats?}, options: [{id: allclose, text: {es: `allclose` con tolerancia justificada, en: `allclose` with justified tolerance, da: `allclose` med begrundet tolerance}}, {id: identity, text: {es: `is`, en: `is`, da: `is`}}, {id: strings, text: {es: Convertir a texto, en: Convert to text, da: Konvertér til tekst}}], correct_option_ids: [allclose]}
  - {id: dm857.m13.q10, activity_type: true_false, prompt: {es: Una visualización puede ser sintácticamente correcta y aun distorsionar la interpretación., en: A visualization can be syntactically correct yet distort interpretation., da: En visualisering kan være syntaktisk korrekt og stadig forvrænge fortolkningen.}, correct_answer: true}

assessment_items:
  - id: dm857.m13.a01
    activity_type: scientific_pipeline_design
    difficulty: advanced
    prompt: {es: Diseña un pipeline reproducible que lea una tabla, valide esquema, transforme valores, calcule un resumen NumPy/pandas, produzca una figura y escriba un manifiesto. Incluye controles antes y después de cada etapa., en: Design a reproducible pipeline reading a table, validating schema, transforming values, computing a NumPy/pandas summary, producing a figure, and writing a manifest. Include checks before and after every stage., da: Design en reproducerbar pipeline med tabelindlæsning, validering, transformation, beregning, figur og manifest samt kontroller ved hver fase.}
    accepted_answer_elements: [environment declaration, input identity, schema and missing policy, shape/unit checks, deterministic parameters, output validation, manifest]
    rubric: [{criterion: reproducibility, points: 2}, {criterion: data_contract, points: 3}, {criterion: computational_validation, points: 3}, {criterion: output_and_manifest, points: 2}]
  - id: dm857.m13.a02
    activity_type: debugging
    difficulty: advanced
    prompt: {es: Un cálculo retorna shape `(100,100)` cuando se esperaba `(100,)`. Diagnostica un posible broadcasting accidental, diseña un caso mínimo y corrige sin usar reshape arbitrario., en: A calculation returns `(100,100)` instead of `(100,)`. Diagnose accidental broadcasting, design a minimal case, and correct it without arbitrary reshape., da: En beregning returnerer `(100,100)` i stedet for `(100,)`; diagnosticér broadcasting, lav et minimalt eksempel og ret uden vilkårlig reshape.}
    accepted_answer_elements: [inspect operand shapes, right-alignment explanation, `(n,1)` versus `(n,)` counterexample, semantic correction, shape assertion]
    rubric: [{criterion: diagnosis, points: 3}, {criterion: minimal_reproduction, points: 2}, {criterion: semantic_correction, points: 3}, {criterion: validation, points: 2}]
  - id: dm857.m13.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt: {es: Explica por qué un notebook que corre en tu equipo no constituye por sí solo un resultado reproducible., en: Explain why a notebook that runs on your machine is not by itself a reproducible result., da: Forklar hvorfor en notebook der kører på din maskine ikke alene er et reproducerbart resultat.}
    accepted_answer_elements: [environment, data identity, execution order, hidden state, parameters/seeds, clean rerun, output validation]
    rubric: [{criterion: reproducibility_components, points: 4}, {criterion: hidden_state_analysis, points: 2}, {criterion: clean_reproduction_strategy, points: 2}, {criterion: clarity, points: 2}]

