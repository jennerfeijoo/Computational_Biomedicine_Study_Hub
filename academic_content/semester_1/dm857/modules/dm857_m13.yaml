glossary:
  - {id: term.module, term: {es: módulo, en: module, da: modul}, definition: {es: Unidad Python importable con su propio espacio de nombres., en: Importable Python unit with its own namespace., da: Importérbar Python-enhed med eget namespace.}}
  - {id: term.package, term: {es: paquete, en: package, da: pakke}, definition: {es: Organización de módulos bajo un espacio de nombres., en: Organization of modules under a namespace., da: Organisering af moduler under et namespace.}}
  - {id: term.virtual_environment, term: {es: entorno virtual, en: virtual environment, da: virtuelt miljø}, definition: {es: Contexto aislado de intérprete y dependencias para un proyecto., en: Isolated interpreter and dependency context for a project., da: Isoleret fortolker- og afhængighedskontekst for et projekt.}}
  - {id: term.ndarray, term: {es: ndarray, en: ndarray, da: ndarray}, definition: {es: Array n-dimensional homogéneo de NumPy., en: Homogeneous n-dimensional NumPy array., da: Homogent n-dimensionalt NumPy-array.}}
  - {id: term.dtype, term: {es: dtype, en: dtype, da: dtype}, definition: {es: Representación del tipo de elementos de un array o columna., en: Representation of element type in an array or column., da: Repræsentation af elementtypen i array eller kolonne.}}
  - {id: term.broadcasting, term: {es: broadcasting, en: broadcasting, da: broadcasting}, definition: {es: Reglas para operar arrays de shapes compatibles mediante expansión implícita., en: Rules for operating on compatible shapes via implicit expansion., da: Regler for operationer på kompatible shapes via implicit udvidelse.}}
  - {id: term.dataframe, term: {es: DataFrame, en: DataFrame, da: DataFrame}, definition: {es: Estructura tabular etiquetada con columnas potencialmente heterogéneas., en: Labeled tabular structure with potentially heterogeneous columns., da: Etiketteret tabelstruktur med potentielt heterogene kolonner.}}
  - {id: term.index_alignment, term: {es: alineación por índice, en: index alignment, da: indeksalignment}, definition: {es: Asociación de valores por etiquetas de índice durante operaciones., en: Matching values by index labels during operations., da: Matchning af værdier efter indeksetiketter under operationer.}}
  - {id: term.reproducibility_manifest, term: {es: manifiesto de reproducibilidad, en: reproducibility manifest, da: reproducerbarhedsmanifest}, definition: {es: Registro de código, entorno, datos, parámetros, ejecución y validaciones., en: Record of code, environment, data, parameters, execution, and validations., da: Registrering af kode, miljø, data, parametre, kørsel og kontroller.}}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El tutor debe exigir que el estudiante nombre shape, dtype, eje, unidad, índice y política de
      ausentes antes de interpretar una operación científica. Debe separar que una biblioteca acepte
      una entrada de que la operación represente la pregunta correcta. Toda optimización vectorizada
      necesita una referencia pequeña y controles semánticos.
    en: >-
      Require shape, dtype, axis, unit, index, and missing-data policy before interpreting scientific
      operations. Separate library acceptance from scientific correctness. Every vectorized optimization
      needs a small reference and semantic checks.
    da: >-
      Kræv shape, dtype, axis, enhed, indeks og manglende-politik før fortolkning. Bibliotekets accept
      er ikke det samme som videnskabelig korrekthed.
  misconceptions:
    - {id: m13.mc01, claim: {es: Si NumPy no produce error, el cálculo es correcto., en: If NumPy raises no error, the calculation is correct., da: Hvis NumPy ikke giver fejl, er beregningen korrekt.}, correction: {es: Broadcasting puede producir shapes válidos pero semánticamente equivocados., en: Broadcasting may produce valid but semantically wrong shapes., da: Broadcasting kan give gyldige men semantisk forkerte shapes.}}
    - {id: m13.mc02, claim: {es: Una semilla garantiza reproducibilidad total., en: A seed guarantees total reproducibility., da: Et seed garanterer fuld reproducerbarhed.}, correction: {es: También importan algoritmos, versiones, hardware y fuentes de no determinismo., en: Algorithms, versions, hardware, and nondeterminism sources also matter., da: Algoritmer, versioner, hardware og ikke-determinisme betyder også noget.}}
    - {id: m13.mc03, claim: {es: `loc` e `iloc` son equivalentes., en: `loc` and `iloc` are equivalent., da: `loc` og `iloc` er ækvivalente.}, correction: {es: `loc` usa etiquetas; `iloc` posiciones., en: `loc` uses labels; `iloc` positions., da: `loc` bruger etiketter; `iloc` positioner.}}
  socratic_questions:
    - ¿Cuál es el shape y qué representa cada eje?
    - ¿El dtype conserva la precisión y semántica esperadas?
    - ¿La operación alinea por posición, etiqueta o broadcasting?
    - ¿Qué política de ausentes y unidades se aplicó?
    - ¿Qué caso pequeño o identidad puede verificar el resultado?
  grading_guidance:
    do_not_accept: [results without shape/unit interpretation, wildcard imports, reproducibility claims without environment/data identity, missing-data deletion without justification]
    strong_answer_features: [explicit contracts, clean environment, small reference calculation, shape/dtype assertions, index/cardinality checks, non-distorting visualization]
  retrieval_fragments:
    - {id: m13.r01, topics: [numpy, broadcasting, shape], text: {es: Broadcasting alinea desde la derecha; compatibilidad de shape no prueba corrección semántica., en: Broadcasting aligns from the right; shape compatibility does not prove semantic correctness., da: Broadcasting justerer fra højre; shape-kompatibilitet beviser ikke semantisk korrekthed.}}
    - {id: m13.r02, topics: [pandas, index, alignment], text: {es: pandas alinea por etiquetas; índices duplicados o desajustados pueden cambiar cardinalidad e introducir ausentes., en: pandas aligns by labels; duplicate or mismatched indexes may change cardinality and introduce missing values., da: pandas alignerer efter etiketter; dubletter eller mismatch kan ændre kardinalitet og indføre manglende værdier.}}

