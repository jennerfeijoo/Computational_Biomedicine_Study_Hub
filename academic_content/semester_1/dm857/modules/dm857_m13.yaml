metadata:
  title: {es: Bibliotecas, entornos y computación científica, en: Libraries, environments, and scientific computing, da: Biblioteker, miljøer og videnskabelig databehandling}
  summary:
    es: >-
      Uso verificable de módulos, paquetes y documentación; creación de entornos reproducibles;
      arrays NumPy, shape, dtype, vistas, copias, vectorización y broadcasting; Series y DataFrames
      de pandas, índices, selección, tipos y valores ausentes; visualización básica y validación de
      resultados científicos mediante controles de forma, rango, unidades y equivalencia.
    en: >-
      Verifiable use of modules, packages, and documentation; reproducible environments; NumPy arrays,
      shape, dtype, views, copies, vectorization, and broadcasting; pandas Series and DataFrames,
      indexes, selection, types, and missing values; basic visualization and validation through shape,
      range, unit, and equivalence checks.
    da: >-
      Verificerbar brug af moduler, pakker og dokumentation; reproducerbare miljøer; NumPy-arrays,
      shape, dtype, views, kopier, vektorisering og broadcasting; pandas Series og DataFrames,
      indeks, selektion, typer og manglende værdier; visualisering og validering.
  prerequisites: [dm857.m04, dm857.m05, dm857.m06, dm857.m08, dm857.m12]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo04, dm857.lo05]
  estimated_study_hours: 22
  difficulty: intermediate_to_advanced

objectives:
  - {id: m13.o1, bloom_level: understand, statement: {es: Explicar resolución de imports, módulos, paquetes y espacios de nombres., en: Explain import resolution, modules, packages, and namespaces., da: Forklare importopløsning, moduler, pakker og namespaces.}, evidence: import_explanation}
  - {id: m13.o2, bloom_level: create, statement: {es: Crear un entorno reproducible y registrar versiones, semillas y datos relevantes., en: Create a reproducible environment and record relevant versions, seeds, and data., da: Oprette et reproducerbart miljø og registrere versioner, seeds og data.}, evidence: reproducibility_manifest}
  - {id: m13.o3, bloom_level: apply, statement: {es: Construir e inspeccionar arrays NumPy con shape y dtype explícitos., en: Construct and inspect NumPy arrays with explicit shape and dtype., da: Konstruere og undersøge NumPy-arrays med eksplicit shape og dtype.}, evidence: ndarray_analysis}
  - {id: m13.o4, bloom_level: analyze, statement: {es: Aplicar vectorización y broadcasting verificando orientación y semántica dimensional., en: Apply vectorization and broadcasting while verifying orientation and dimensional semantics., da: Anvende vektorisering og broadcasting med kontrol af orientering og dimensionel semantik.}, evidence: broadcasting_reasoning}
  - {id: m13.o5, bloom_level: apply, statement: {es: Crear, seleccionar y transformar DataFrames de pandas de manera explícita., en: Create, select, and transform pandas DataFrames explicitly., da: Oprette, vælge og transformere pandas-DataFrames eksplicit.}, evidence: dataframe_pipeline}
  - {id: m13.o6, bloom_level: evaluate, statement: {es: Tratar índices, tipos de columna y valores ausentes según un contrato de datos., en: Handle indexes, column types, and missing values according to a data contract., da: Håndtere indeks, kolonnetyper og manglende værdier efter en datakontrakt.}, evidence: tabular_validation}
  - {id: m13.o7, bloom_level: create, statement: {es: Construir visualizaciones con codificaciones, escalas y etiquetas no distorsionantes., en: Build visualizations with non-distorting encodings, scales, and labels., da: Bygge visualiseringer med ikke-forvrængende kodninger, skalaer og etiketter.}, evidence: visualization_design}
  - {id: m13.o8, bloom_level: create, statement: {es: Validar resultados mediante controles de forma, rango, unidades, identidad y equivalencia con una referencia., en: Validate results using shape, range, unit, identity, and reference-equivalence checks., da: Validere resultater gennem shape-, interval-, enheds-, identitets- og referencekontrol.}, evidence: scientific_validation_suite}

concepts:
  - id: imports-modules-packages-namespaces
    title: {es: Imports, módulos, paquetes y espacios de nombres, en: Imports, modules, packages, and namespaces, da: Imports, moduler, pakker og namespaces}
    body:
      es: >-
        Un módulo es una unidad Python importable; un paquete organiza módulos bajo un espacio de nombres.
        `import name` vincula el módulo y conserva procedencia; `from name import object` vincula un nombre
        concreto. Los alias deben ser convencionales y legibles. La resolución depende del entorno activo
        y de `sys.path`. Los comodines ocultan procedencia y aumentan colisiones. El código debe depender
        de API pública documentada, no de símbolos internos que pueden cambiar sin aviso.
      en: >-
        A module is an importable Python unit; a package organizes modules under a namespace. `import name`
        binds the module and preserves provenance; `from name import object` binds one object. Resolution
        depends on the active environment and `sys.path`. Wildcards obscure provenance and increase collisions.
      da: >-
        Et modul er en importérbar Python-enhed; en pakke organiserer moduler under et namespace.
        Imports bør være eksplicitte og afhænge af dokumenteret offentlig API.
    linked_objectives: [m13.o1]
  - id: documentation-and-api-contracts
    title: {es: Documentación y contratos de API, en: Documentation and API contracts, da: Dokumentation og API-kontrakter}
    body:
      es: >-
        Usar una biblioteca exige comprobar firma, tipos aceptados, shape de entrada y retorno, errores,
        mutación, unidades y convenciones. La documentación oficial y `help` permiten formular una hipótesis
        de uso; un ejemplo mínimo la prueba localmente. Copiar una línea sin verificar versión y contrato
        puede producir resultados válidos sintácticamente pero incorrectos. Las funciones públicas se
        prefieren a detalles internos y se registran versiones cuando los resultados dependen de ellas.
      en: >-
        Library use requires checking signature, accepted types, input and return shape, errors, mutation,
        units, and conventions. Official documentation and `help` support a usage hypothesis; a minimal
        example tests it locally. Record versions when results depend on them.
      da: >-
        Biblioteksbrug kræver kontrol af signatur, typer, shape, fejl, mutation, enheder og konventioner.
        Offentlig dokumenteret API foretrækkes.
    linked_objectives: [m13.o1, m13.o2, m13.o8]
  - id: environments-and-reproducibility
    title: {es: Entornos y reproducibilidad computacional, en: Environments and computational reproducibility, da: Miljøer og beregningsmæssig reproducerbarhed}
    body:
      es: >-
        Un entorno virtual aísla dependencias por proyecto. La reproducibilidad requiere declarar versión
        de Python, paquetes, restricciones, sistema relevante, semillas, datos de entrada y comandos.
        Un archivo de bloqueo conserva una resolución exacta; restricciones flexibles facilitan mantenimiento.
        Reproducir en un entorno limpio detecta dependencias implícitas. Una semilla controla ciertas fuentes
        pseudoaleatorias, pero no garantiza determinismo en todas las bibliotecas o plataformas.
      en: >-
        A virtual environment isolates project dependencies. Reproducibility records Python, packages,
        constraints, relevant platform, seeds, inputs, and commands. Lock files preserve exact resolution;
        clean-environment reproduction exposes implicit dependencies. A seed does not guarantee universal determinism.
      da: >-
        Et virtuelt miljø isolerer afhængigheder. Reproducerbarhed kræver Python- og pakkeversioner,
        platform, seeds, inputdata og kommandoer. Et seed garanterer ikke altid fuld determinisme.
    linked_objectives: [m13.o2]
  - id: numpy-array-model
    title: {es: Modelo de arrays NumPy, en: NumPy array model, da: NumPy-arraymodellen}
    body:
      es: >-
        `ndarray` almacena datos homogéneos en n dimensiones. `shape` describe dimensiones, `ndim` su
        número, `size` el total de elementos y `dtype` la representación. Datos mixtos pueden promover
        dtype y alterar precisión o semántica. `reshape` conserva size. El parámetro `axis` indica la
        dimensión reducida y debe interpretarse respecto a filas, columnas, muestras y variables. Una vista
        puede compartir memoria con el original; una copia es independiente.
      en: >-
        `ndarray` stores homogeneous data in n dimensions. `shape`, `ndim`, `size`, and `dtype` describe
        structure and representation. Mixed data may promote dtype. `reshape` preserves size. `axis`
        identifies the reduced dimension. Views may share memory; copies are independent.
      da: >-
        `ndarray` lagrer homogene data i n dimensioner. `shape`, `ndim`, `size` og `dtype` beskriver
        strukturen. `reshape` bevarer size, og views kan dele hukommelse.
    linked_objectives: [m13.o3, m13.o8]
  - id: vectorization-and-broadcasting
    title: {es: Vectorización y broadcasting, en: Vectorization and broadcasting, da: Vektorisering og broadcasting}
    body:
      es: >-
        Vectorizar expresa operaciones sobre arrays completos y evita bucles Python explícitos. Broadcasting
        alinea dimensiones desde la derecha; cada par debe coincidir o contener una dimensión de tamaño uno.
        Compatibilidad mecánica no garantiza significado correcto: una columna `(n,1)` y un vector `(n,)`
        pueden producir una matriz `(n,n)` inesperada. Antes de calcular se documentan orientación, unidades,
        shape esperado y eje de reducción. Los resultados se comparan con un caso pequeño manual.
      en: >-
        Vectorization operates on whole arrays. Broadcasting aligns dimensions from the right; each pair
        must match or have size one. Mechanical compatibility does not ensure semantic correctness: `(n,1)`
        with `(n,)` may create an unintended `(n,n)` result. Document orientation, units, expected shape,
        and reduction axis, then compare with a small manual case.
      da: >-
        Broadcasting justerer dimensioner fra højre. Mekanisk kompatibilitet garanterer ikke korrekt
        semantik; dokumentér orientering, enheder, forventet shape og axis.
    linked_objectives: [m13.o4, m13.o8]
  - id: pandas-series-dataframe-index
    title: {es: Series, DataFrame e índice, en: Series, DataFrame, and index, da: Series, DataFrame og indeks}
    body:
      es: >-
        Una Series combina valores con índice; un DataFrame organiza columnas potencialmente heterogéneas
        bajo un índice compartido. `loc` selecciona por etiquetas y `iloc` por posiciones. El índice puede
        representar identidad, pero duplicados cambian la semántica de selección y joins. La asignación alinea
        por índice, lo que puede introducir ausentes si las etiquetas no coinciden. Conviene validar unicidad,
        orden, tipos y cardinalidad antes de combinar tablas.
      en: >-
        A Series combines values with an index; a DataFrame organizes heterogeneous columns under a shared
        index. `loc` selects labels and `iloc` positions. Duplicate indexes change selection and join semantics.
        Assignment aligns by index and may introduce missing values when labels differ.
      da: >-
        Series kombinerer værdier og indeks; DataFrame organiserer kolonner. `loc` bruger etiketter og
        `iloc` positioner. Indeksalignment kan indføre manglende værdier.
    linked_objectives: [m13.o5, m13.o6]
  - id: tabular-types-missingness-and-transformation
    title: {es: Tipos, valores ausentes y transformación tabular, en: Types, missingness, and tabular transformation, da: Typer, manglende værdier og tabeltransformation}
    body:
      es: >-
        Importar una tabla no garantiza tipos correctos. Una columna numérica con texto puede convertirse en
        `object`; fechas y categorías requieren parsing explícito. `isna` detecta ausentes, pero la política
        depende del mecanismo y del objetivo: eliminar, imputar, conservar indicador o rechazar son decisiones
        diferentes. Las transformaciones deben evitar asignación encadenada ambigua, conservar unidades y
        registrar cuántas filas se filtran o cambian.
      en: >-
        Table import does not guarantee correct types. Numeric columns containing text may become `object`;
        dates and categories require explicit parsing. Missing-data policy depends on mechanism and purpose.
        Transformations should avoid ambiguous chained assignment, preserve units, and record changed rows.
      da: >-
        Import garanterer ikke korrekte typer. Manglende data kræver en eksplicit politik, og transformationer
        bør registrere filtrerede eller ændrede rækker.
    linked_objectives: [m13.o5, m13.o6, m13.o8]
  - id: visualization-contract
    title: {es: Visualización como contrato de representación, en: Visualization as a representation contract, da: Visualisering som repræsentationskontrakt}
    body:
      es: >-
        Una figura codifica variables mediante posición, longitud, color, forma o tamaño. La elección debe
        corresponder al tipo de variable y a la pregunta. Ejes, unidades, escalas y transformaciones deben ser
        visibles. Truncar un eje puede exagerar diferencias; sobreponer demasiados puntos puede ocultar densidad.
        La figura debe permitir verificar cardinalidad, grupos y valores atípicos y acompañarse de una descripción
        de datos y procesamiento, no sustituir el análisis cuantitativo.
      en: >-
        A figure encodes variables through position, length, color, shape, or size. Encodings must match variable
        type and question. Axes, units, scales, and transformations remain visible. Truncated axes and overplotting
        may distort interpretation. Figures complement rather than replace quantitative analysis.
      da: >-
        En figur koder variable gennem position, længde, farve, form eller størrelse. Akser, enheder, skalaer
        og transformationer skal være tydelige og ikke forvrænge fortolkningen.
    linked_objectives: [m13.o7]
  - id: scientific-validation
    title: {es: Validación de resultados científicos, en: Scientific result validation, da: Validering af videnskabelige resultater}
    body:
      es: >-
        La validación combina controles estructurales y semánticos: shape, dtype, cardinalidad, rango,
        finitud, unidades, conservación de totales, identidades algebraicas y comparación con una implementación
        de referencia en casos pequeños. `allclose` compara floats con tolerancias justificadas; igualdad exacta
        se reserva para valores discretos o cálculos exactos. Un resultado plausible no es evidencia suficiente.
      en: >-
        Validation combines structural and semantic checks: shape, dtype, cardinality, range, finiteness,
        units, conserved totals, algebraic identities, and comparison with a small reference implementation.
        `allclose` uses justified tolerances for floating point; exact equality suits discrete or exact results.
      da: >-
        Validering kombinerer shape, dtype, kardinalitet, interval, endelighed, enheder, bevarede totaler,
        identiteter og sammenligning med en lille referenceimplementering.
    linked_objectives: [m13.o8]

worked_examples:
  - id: dm857.m13.e01
    title: {es: Estandarizar columnas sin broadcasting accidental, en: Standardize columns without accidental broadcasting, da: Standardisér kolonner uden utilsigtet broadcasting}
    problem: {es: Estandarizar cada variable de una matriz muestras × variables y verificar shape, medias y desviaciones., en: Standardize each variable in a samples-by-variables matrix and verify shape, means, and deviations., da: Standardisér hver variabel i en matrix prøver × variable og verificér shape, middelværdi og spredning.}
    assumptions: [rows are samples, columns are variables, no constant columns, no missing values]
    reasoning:
      es: [Calcular medias y desviaciones por axis 0., Conservar dimensión con shapes compatibles., Validar resultado con allclose.]
      en: [Compute means and deviations on axis 0., Preserve compatible shapes., Validate using allclose.]
      da: [Beregn middel og spredning over axis 0., Bevar kompatible shapes., Validér med allclose.]
    code: |-
      import numpy as np

      x = np.asarray([[1., 10.], [2., 20.], [3., 30.]])
      mean = x.mean(axis=0)
      std = x.std(axis=0, ddof=0)
      if np.any(std == 0):
          raise ValueError("constant column")
      z = (x - mean) / std
      assert z.shape == x.shape
      assert np.allclose(z.mean(axis=0), 0.0)
      assert np.allclose(z.std(axis=0, ddof=0), 1.0)
    expected_output: same shape with approximately zero column means and unit column deviations
    validation: [constant column, one row, wrong orientation, nonfinite values]
    explanation: {es: El eje expresa la semántica muestras-variables; las comprobaciones detectan una orientación equivocada., en: The axis expresses sample-variable semantics; checks expose wrong orientation., da: Axis udtrykker prøve-variabel-semantik, og kontroller opdager forkert orientering.}
    linked_objectives: [m13.o3, m13.o4, m13.o8]
  - id: dm857.m13.e02
    title: {es: Validar una tabla antes de resumir, en: Validate a table before summarizing, da: Validér en tabel før opsummering}
    problem: {es: Comprobar columnas, id único, grupos permitidos, valores numéricos y ausentes antes de calcular medias por grupo., en: Check columns, unique ids, allowed groups, numeric values, and missingness before group means., da: Kontrollér kolonner, unikke id'er, grupper, numeriske værdier og manglende data før gruppemiddel.}
    assumptions: [required columns are sample_id, group, value]
    reasoning:
      es: [Validar esquema., Convertir con error explícito., Decidir política de ausentes., Agrupar sólo después.]
      en: [Validate schema., Convert with explicit errors., Decide missing policy., Group only afterward.]
      da: [Validér skema., Konvertér med eksplicitte fejl., Beslut manglende-politik., Gruppér bagefter.]
    code: |-
      import pandas as pd

      required = {"sample_id", "group", "value"}
      missing = required - set(df.columns)
      if missing:
          raise ValueError(f"missing columns: {sorted(missing)}")
      if df["sample_id"].duplicated().any():
          raise ValueError("duplicate sample_id")
      if not df["group"].isin(["control", "case"]).all():
          raise ValueError("unknown group")
      values = pd.to_numeric(df["value"], errors="raise")
      if values.isna().any():
          raise ValueError("missing value")
      result = df.assign(value=values).groupby("group", observed=True)["value"].mean()
    expected_output: one mean per observed valid group
    validation: [missing column, duplicate id, unknown group, text value, missing value]
    explanation: {es: La agregación es el último paso; antes se establece el contrato de la tabla., en: Aggregation is the final step after establishing the table contract., da: Aggregering sker først efter etablering af tabelkontrakten.}
    linked_objectives: [m13.o5, m13.o6, m13.o8]
  - id: dm857.m13.e03
    title: {es: Registrar un manifiesto reproducible, en: Record a reproducibility manifest, da: Registrér et reproducerbarhedsmanifest}
    problem: {es: Definir la información mínima que acompaña una ejecución científica., en: Define the minimum information accompanying a scientific run., da: Definér minimumsinformation for en videnskabelig kørsel.}
    assumptions: [the project has declared dependencies and versioned input data]
    reasoning:
      es: [Registrar código y entorno., Identificar datos y parámetros., Capturar semilla y comando., Conservar resultados y validaciones.]
      en: [Record code and environment., Identify data and parameters., Capture seed and command., Preserve results and checks.]
      da: [Registrér kode og miljø., Identificér data og parametre., Gem seed, kommando, resultater og kontroller.]
    expected_output: manifest containing commit, Python and package versions, input checksums, parameters, seed, command, timestamp, and validation summary
    validation: [reproduction in clean environment, input checksum match, explicit nondeterminism note]
    explanation: {es: Reproducibilidad no equivale a guardar sólo un notebook; requiere reconstruir dependencias, datos, parámetros y ejecución., en: Reproducibility is more than saving a notebook; dependencies, data, parameters, and execution must be reconstructable., da: Reproducerbarhed er mere end en notebook; afhængigheder, data, parametre og kørsel skal kunne rekonstrueres.}
    linked_objectives: [m13.o2, m13.o8]

practice_exercises:
  - {id: dm857.m13.p01, activity_type: api_reading, difficulty: foundational, prompt: {es: A partir de una firma y docstring, identifica tipos de entrada, retorno, errores, mutación y versión., en: From a signature and docstring, identify input types, return, errors, mutation, and version., da: Identificér inputtyper, retur, fejl, mutation og version fra signatur og docstring.}, reference_solution: {es: La respuesta debe separar lo documentado de lo inferido y proponer un ejemplo mínimo de verificación., en: Separate documented facts from inference and propose a minimal verification example., da: Adskil dokumentation fra antagelser og foreslå et minimalt verifikationseksempel.}, linked_objectives: [m13.o1]}
  - {id: dm857.m13.p02, activity_type: shape_tracing, difficulty: intermediate, prompt: {es: Predice el shape de `(n,1) + (n,)` y explica por qué puede ser indeseado., en: Predict the shape of `(n,1) + (n,)` and explain why it may be unintended., da: Forudsig shape for `(n,1) + (n,)` og forklar hvorfor det kan være utilsigtet.}, reference_solution: {es: Produce `(n,n)` por broadcasting; si se esperaba sumar elemento a elemento, ambos operandos deben tener shape compatible como `(n,)` o `(n,1)`., en: It produces `(n,n)` through broadcasting; elementwise pairing requires matching intended shapes., da: Det producerer `(n,n)` via broadcasting; elementvis parring kræver tilsigtede matchende shapes.}, linked_objectives: [m13.o4]}
  - {id: dm857.m13.p03, activity_type: debugging, difficulty: intermediate, prompt: {es: Explica por qué modificar un slice de NumPy puede cambiar el array original y muestra cómo independizarlo., en: Explain why modifying a NumPy slice may change the original array and show how to separate it., da: Forklar hvorfor ændring af et NumPy-slice kan ændre originalen og hvordan det adskilles.}, reference_solution: {es: Muchos slices son vistas que comparten memoria; usar `.copy()` crea un array independiente., en: Many slices are views sharing memory; `.copy()` creates an independent array., da: Mange slices er views med delt hukommelse; `.copy()` skaber et uafhængigt array.}, linked_objectives: [m13.o3]}
  - {id: dm857.m13.p04, activity_type: data_validation, difficulty: advanced, prompt: {es: Diseña un contrato de DataFrame para datos de muestras y una secuencia de validación antes de un join., en: Design a DataFrame contract for sample data and a validation sequence before a join., da: Design en DataFrame-kontrakt for prøvedata og validering før join.}, reference_solution: {es: Columnas, tipos, ids únicos, dominios, ausentes, cardinalidad esperada, unidades y validación posterior del join., en: Columns, types, unique ids, domains, missingness, expected cardinality, units, and post-join validation., da: Kolonner, typer, unikke id'er, domæner, manglende data, kardinalitet, enheder og kontrol efter join.}, linked_objectives: [m13.o5, m13.o6, m13.o8]}
  - {id: dm857.m13.p05, activity_type: visualization_critique, difficulty: advanced, prompt: {es: Critica una barra con eje truncado, unidades ausentes y tamaño de muestra oculto., en: Critique a bar chart with a truncated axis, missing units, and hidden sample size., da: Kritiser et søjlediagram med afkortet akse, manglende enheder og skjult stikprøvestørrelse.}, reference_solution: {es: Puede exagerar diferencias, impide interpretación dimensional y oculta variabilidad/cardinalidad. Proponer escala justificada, unidades, puntos o intervalos y n por grupo., en: It may exaggerate differences, blocks dimensional interpretation, and hides variability/cardinality. Add justified scale, units, points or intervals, and group n., da: Det kan overdrive forskelle og skjule enheder, variation og n.}, linked_objectives: [m13.o7]}
  - {id: dm857.m13.p06, activity_type: reproducibility_review, difficulty: advanced, prompt: {es: Evalúa un proyecto que sólo guarda `requirements.txt` sin datos, seed, comando ni versión de Python., en: Evaluate a project storing only `requirements.txt` without data, seed, command, or Python version., da: Evaluér et projekt med kun `requirements.txt` uden data, seed, kommando eller Python-version.}, reference_solution: {es: Las dependencias son necesarias pero insuficientes; faltan identificación de datos, parámetros, ejecución, entorno, aleatoriedad y validaciones., en: Dependencies are necessary but insufficient; data identity, parameters, execution, environment, randomness, and validations are missing., da: Afhængigheder er nødvendige men utilstrækkelige; data, parametre, kørsel, miljø, tilfældighed og kontroller mangler.}, linked_objectives: [m13.o2, m13.o8]}

objective_bank:
