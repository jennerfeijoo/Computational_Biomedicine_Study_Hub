glossary:
  - {id: term.class, term: {"es": "clase", "en": "class", "da": "klasse"}, definition: {"es": "Definición de una familia de objetos y su comportamiento.", "en": "Definition of an object family and its behavior.", "da": "Definition af en objektfamilie og dens adfærd."}}
  - {id: term.instance, term: {"es": "instancia", "en": "instance", "da": "instans"}, definition: {"es": "Objeto concreto creado a partir de una clase.", "en": "Concrete object created from a class.", "da": "Konkret objekt oprettet fra en klasse."}}
  - {id: term.bound_method, term: {"es": "método enlazado", "en": "bound method", "da": "bundet metode"}, definition: {"es": "Método asociado a una instancia receptora.", "en": "Method associated with a receiving instance.", "da": "Metode knyttet til en modtagende instans."}}
  - {id: term.identity, term: {"es": "identidad", "en": "identity", "da": "identitet"}, definition: {"es": "Propiedad de ser exactamente el mismo objeto.", "en": "Property of being the exact same object.", "da": "Egenskab ved at være præcis samme objekt."}}
  - {id: term.property, term: {"es": "propiedad", "en": "property", "da": "property"}, definition: {"es": "Descriptor que presenta acceso de atributo con lógica controlada.", "en": "Descriptor presenting attribute access with controlled logic.", "da": "Descriptor der giver attributadgang med kontrolleret logik."}}
  - {id: term.dataclass, term: {"es": "dataclass", "en": "dataclass", "da": "dataclass"}, definition: {"es": "Clase con métodos generados desde campos declarados.", "en": "Class with methods generated from declared fields.", "da": "Klasse med metoder genereret fra deklarerede felter."}}
  - {id: term.composition, term: {"es": "composición", "en": "composition", "da": "komposition"}, definition: {"es": "Diseño en el que un objeto contiene o usa otros objetos.", "en": "Design in which one object contains or uses others.", "da": "Design hvor et objekt indeholder eller bruger andre objekter."}}
  - {id: term.inheritance, term: {"es": "herencia", "en": "inheritance", "da": "arv"}, definition: {"es": "Mecanismo por el que una subclase extiende o especializa una base.", "en": "Mechanism by which a subclass extends or specializes a base.", "da": "Mekanisme hvor en underklasse udvider eller specialiserer en base."}}
  - {id: term.polymorphism, term: {"es": "polimorfismo", "en": "polymorphism", "da": "polymorfi"}, definition: {"es": "Uso uniforme de objetos que satisfacen un protocolo común.", "en": "Uniform use of objects satisfying a common protocol.", "da": "Ensartet brug af objekter med en fælles protokol."}}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El tutor debe evaluar primero si una clase protege un concepto y sus invariantes o sólo agrupa
      variables. Debe exigir construcción válida, operaciones atómicas, independencia entre instancias,
      distinción entre identidad e igualdad y una justificación explícita de composición o herencia.
      La sintaxis orientada a objetos no sustituye el diseño del contrato.
    en: >-
      First assess whether a class protects a concept and its invariants or merely groups variables.
      Require valid construction, atomic operations, instance independence, identity/equality distinction,
      and explicit composition or inheritance justification. OOP syntax does not replace contract design.
    da: >-
      Vurder først om klassen beskytter et koncept og dets invarianter. Kræv gyldig konstruktion,
      atomiske operationer, instansuafhængighed og begrundet komposition eller arv.
  misconceptions:
    - {id: m12.mc01, claim: {"es": "`self` es una palabra reservada especial.", "en": "`self` is a special reserved word.", "da": "`self` er et særligt reserveret ord."}, correction: {"es": "Es una convención de nombre para el primer parámetro de un método de instancia.", "en": "It is a naming convention for the first instance-method parameter.", "da": "Det er en navnekonvention for første parameter i en instansmetode."}}
    - {id: m12.mc02, claim: {"es": "`is` y `==` son intercambiables.", "en": "`is` and `==` are interchangeable.", "da": "`is` og `==` kan ombyttes."}, correction: {"es": "`is` compara identidad; `==` igualdad lógica.", "en": "`is` compares identity; `==` logical equality.", "da": "`is` sammenligner identitet; `==` logisk lighed."}}
    - {id: m12.mc03, claim: {"es": "Heredar siempre es mejor que componer.", "en": "Inheritance is always better than composition.", "da": "Arv er altid bedre end komposition."}, correction: {"es": "Herencia exige una relación es-un y sustituibilidad; composición suele ser más flexible.", "en": "Inheritance requires an is-a relation and substitutability; composition is often more flexible.", "da": "Arv kræver en er-en-relation og substituerbarhed; komposition er ofte mere fleksibel."}}
  socratic_questions:
    - ¿Qué invariante protege la clase que una estructura libre no protegería?
    - ¿Qué estado debe existir inmediatamente después de `__init__`?
    - ¿La igualdad representa identidad lógica o sólo coincidencia parcial de campos?
    - ¿Una operación inválida deja el objeto exactamente como estaba?
    - ¿La relación entre clases es realmente es-un o sólo tiene-un?
  grading_guidance:
    do_not_accept: [mutable class attributes used as per-instance state, setters mutating before validation, inheritance justified only by reuse, equality without hash/mutability reasoning]
    strong_answer_features: [valid construction, invariant-preserving methods, instance independence, coherent protocols, composition-first reasoning, adversarial tests]
  retrieval_fragments:
    - {id: m12.r01, topics: [identity, equality], text: {"es": "`is` pregunta si es el mismo objeto; `==` pregunta si los objetos son iguales según el contrato.", "en": "`is` asks whether it is the same object; `==` asks whether objects are equal under the contract.", "da": "`is` spørger om samme objekt; `==` om lighed under kontrakten."}}
    - {id: m12.r02, topics: [composition, inheritance], text: {"es": "Composición modela tiene-un; herencia modela es-un y requiere sustituibilidad.", "en": "Composition models has-a; inheritance models is-a and requires substitutability.", "da": "Komposition modellerer har-en; arv modellerer er-en og kræver substituerbarhed."}}

