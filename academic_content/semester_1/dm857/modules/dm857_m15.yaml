limitations:
  - Big-O classifications abstract hardware and constants and do not replace measurement.
  - Microarchitectural profiling, parallel scaling, GPU optimization, and compiler internals are outside scope.
  - Performance results are workload- and environment-specific and must not be generalized without evidence.
