metadata:
  title:
    es: Funciones, contratos, ámbito y descomposición
    en: Functions, contracts, scope, and decomposition
    da: Funktioner, kontrakter, scope og dekomponering
  summary:
    es: >-
      Diseño de funciones pequeñas, comprobables y reutilizables mediante parámetros, argumentos,
      valores predeterminados, retorno, ámbito local, contratos, docstrings, composición, pureza,
      efectos secundarios, descomposición y pruebas unitarias.
    en: >-
      Design of small, testable, reusable functions using parameters, arguments, default values,
      return values, local scope, contracts, docstrings, composition, purity, side effects,
      decomposition, and unit testing.
    da: >-
      Design af små, testbare og genanvendelige funktioner med parametre, argumenter,
      standardværdier, returværdier, lokalt scope, kontrakter, docstrings, komposition,
      renhed, sideeffekter, dekomponering og enhedstest.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03]
  official_learning_outcomes: [dm857.lo01, dm857.lo02, dm857.lo03, dm857.lo05]
  estimated_study_hours: 16
  difficulty: foundational_to_intermediate

objectives:
  - id: m04.o1
    bloom_level: apply
    statement:
      es: Definir y llamar funciones con nombres, parámetros y responsabilidades precisas.
      en: Define and call functions with precise names, parameters, and responsibilities.
      da: Definere og kalde funktioner med præcise navne, parametre og ansvarsområder.
    evidence: function_definition_and_call
  - id: m04.o2
    bloom_level: analyze
    statement:
      es: Distinguir parámetros de argumentos y razonar sobre llamadas posicionales, nombradas y predeterminadas.
      en: Distinguish parameters from arguments and reason about positional, keyword, and default calls.
      da: Skelne mellem parametre og argumenter og ræsonnere om positionelle, navngivne og standardkald.
    evidence: call_binding_trace
  - id: m04.o3
    bloom_level: apply
    statement:
      es: Utilizar `return` y explicar por qué retornar no equivale a imprimir.
      en: Use `return` and explain why returning is not equivalent to printing.
      da: Bruge `return` og forklare hvorfor returnering ikke svarer til udskrivning.
    evidence: return_value_use
  - id: m04.o4
    bloom_level: analyze
    statement:
      es: Razonar sobre variables locales, resolución de nombres y tiempo de vida durante una llamada.
      en: Reason about local variables, name resolution, and lifetime during a call.
      da: Ræsonnere om lokale variable, navneopslag og levetid under et kald.
    evidence: scope_trace
  - id: m04.o5
    bloom_level: evaluate
    statement:
      es: Distinguir cálculo puro de efectos secundarios y justificar dónde deben concentrarse los efectos.
      en: Distinguish pure computation from side effects and justify where effects should be concentrated.
      da: Skelne mellem ren beregning og sideeffekter og begrunde hvor effekter bør samles.
    evidence: purity_analysis
  - id: m04.o6
    bloom_level: create
    statement:
      es: Descomponer un problema en funciones cohesionadas conectadas por interfaces explícitas.
      en: Decompose a problem into cohesive functions connected through explicit interfaces.
      da: Dekomponere et problem i sammenhængende funktioner forbundet gennem eksplicitte grænseflader.
    evidence: decomposition_design
  - id: m04.o7
    bloom_level: create
    statement:
      es: Especificar precondiciones, poscondiciones, errores y ejemplos verificables en un contrato.
      en: Specify preconditions, postconditions, errors, and verifiable examples in a contract.
      da: Specificere forudsætninger, efterbetingelser, fejl og verificerbare eksempler i en kontrakt.
    evidence: function_contract
  - id: m04.o8
    bloom_level: create
    statement:
      es: Diseñar pruebas unitarias que cubran casos normales, límites, inválidos y rutas de retorno.
      en: Design unit tests covering normal, boundary, invalid, and return-path cases.
      da: Designe enhedstest der dækker normale, grænse-, ugyldige og returvejstilfælde.
    evidence: unit_test_set

concepts:
  - id: definition-call-interface
    title:
      es: Definición, llamada e interfaz
      en: Definition, call, and interface
      da: Definition, kald og grænseflade
    body:
      es: >-
        Una función asigna un nombre a una operación. La definición declara nombre, parámetros y cuerpo;
        una llamada aporta argumentos y crea una nueva ejecución. La interfaz debe permitir entender qué
        recibe, qué produce y qué exige sin leer todos los detalles internos. Una función cohesionada tiene
        una responsabilidad principal y un nombre que expresa esa responsabilidad.
      en: >-
        A function gives a name to an operation. Its definition declares a name, parameters, and body;
        a call supplies arguments and creates a new execution. The interface should reveal inputs,
        outputs, and assumptions without requiring the entire implementation. A cohesive function has
        one primary responsibility and a name that expresses it.
      da: >-
        En funktion giver et navn til en operation. Definitionen angiver navn, parametre og krop; et kald
        leverer argumenter og skaber en ny udførelse. Grænsefladen bør vise input, output og antagelser
        uden at kræve hele implementeringen. En sammenhængende funktion har ét primært ansvar.
    linked_objectives: [m04.o1, m04.o6]

  - id: parameters-arguments-defaults
    title:
      es: Parámetros, argumentos y valores predeterminados
      en: Parameters, arguments, and default values
      da: Parametre, argumenter og standardværdier
    body:
      es: >-
        Los parámetros son nombres locales declarados en la definición; los argumentos son los valores
        proporcionados en una llamada. Los argumentos posicionales se enlazan por orden y los nombrados
        por nombre. Un valor predeterminado debe representar un caso frecuente y seguro. Debe evitarse
        usar objetos mutables como valores predeterminados porque el mismo objeto se reutiliza entre llamadas.
      en: >-
        Parameters are local names declared by the definition; arguments are values supplied by a call.
        Positional arguments bind by order and keyword arguments by name. A default should represent a
        common, safe case. Mutable objects should not be used as defaults because the same object is reused
        across calls.
      da: >-
        Parametre er lokale navne i definitionen; argumenter er værdier i et kald. Positionelle argumenter
        bindes efter rækkefølge og navngivne efter navn. En standardværdi bør være almindelig og sikker.
        Muterbare objekter bør ikke bruges som standarder, fordi samme objekt genbruges mellem kald.
    linked_objectives: [m04.o2, m04.o7]

  - id: return-versus-print
    title:
      es: Retornar no es imprimir
      en: Returning is not printing
      da: Returnering er ikke udskrivning
    body:
      es: >-
        `return` finaliza la llamada y entrega un valor al código que llamó a la función. `print` produce
        una representación visible y retorna `None`. Un valor retornado puede almacenarse, combinarse,
        probarse o pasarse a otra función. Si ninguna ruta ejecuta un `return` explícito, Python retorna
        `None`, lo que con frecuencia revela una ruta incompleta.
      en: >-
        `return` ends the call and gives a value to the caller. `print` produces visible output and returns
        `None`. A returned value can be stored, combined, tested, or passed to another function. If no path
        executes an explicit `return`, Python returns `None`, often exposing an incomplete path.
      da: >-
        `return` afslutter kaldet og giver en værdi til den kaldende kode. `print` producerer synligt output
        og returnerer `None`. En returværdi kan gemmes, kombineres, testes eller sendes videre. Uden en
        udført eksplicit `return` returnerer Python `None`.
    linked_objectives: [m04.o3, m04.o8]

  - id: local-scope-lifetime
    title:
      es: Ámbito local, resolución de nombres y tiempo de vida
      en: Local scope, name resolution, and lifetime
      da: Lokalt scope, navneopslag og levetid
    body:
      es: >-
        Cada llamada crea un espacio local con sus parámetros y variables. Una variable local no está
        disponible fuera de la función y dos llamadas pueden utilizar el mismo nombre sin compartir estado.
        La resolución de nombres busca primero en el ámbito local y después en ámbitos exteriores. Leer o
        modificar estado global crea dependencias ocultas y dificulta pruebas y reutilización.
      en: >-
        Each call creates a local space containing its parameters and variables. A local variable is not
        available outside the function, and separate calls can use the same name without sharing state.
        Name resolution searches local scope before outer scopes. Reading or modifying global state creates
        hidden dependencies and makes testing and reuse harder.
      da: >-
        Hvert kald opretter et lokalt rum med parametre og variable. En lokal variabel er ikke tilgængelig
        uden for funktionen, og separate kald kan bruge samme navn uden at dele tilstand. Globale værdier
        skaber skjulte afhængigheder og gør test vanskeligere.
    linked_objectives: [m04.o4, m04.o5]

  - id: pure-functions-side-effects
    title:
      es: Funciones puras y efectos secundarios
      en: Pure functions and side effects
      da: Rene funktioner og sideeffekter
    body:
      es: >-
        Una función pura determina su resultado únicamente a partir de sus argumentos y no modifica estado
        externo. Imprimir, escribir archivos, modificar una colección recibida o cambiar una variable global
        son efectos secundarios. Los efectos no son intrínsecamente incorrectos, pero conviene aislarlos en
        funciones claramente nombradas y mantener separado el cálculo central.
      en: >-
        A pure function determines its result only from its arguments and does not modify external state.
        Printing, writing files, mutating an input collection, or changing a global variable are side effects.
        Effects are not inherently wrong, but they should be isolated in clearly named functions while core
        computation remains separate.
      da: >-
        En ren funktion bestemmer resultatet ud fra argumenterne og ændrer ikke ekstern tilstand. Udskrivning,
        filskrivning, mutation af input eller ændring af globale variable er sideeffekter. Effekter bør isoleres
        i tydeligt navngivne funktioner.
    linked_objectives: [m04.o5, m04.o6, m04.o8]

  - id: contracts-docstrings-errors
    title:
      es: Contratos, docstrings y política de errores
      en: Contracts, docstrings, and error policy
      da: Kontrakter, docstrings og fejlpolitik
    body:
      es: >-
        Un contrato especifica entradas, precondiciones, resultado, poscondiciones y errores esperados. Una
        docstring útil describe semántica, no repite la sintaxis. Debe aclarar unidades, tipos conceptuales,
        tratamiento de entrada vacía y si la función retorna un valor especial o genera una excepción. Un
        contrato verificable permite diseñar pruebas antes de implementar.
      en: >-
        A contract specifies inputs, preconditions, result, postconditions, and expected errors. A useful
        docstring describes semantics rather than restating syntax. It should clarify units, conceptual types,
        empty-input behavior, and whether the function returns a sentinel or raises an exception. A verifiable
        contract supports test design before implementation.
      da: >-
        En kontrakt specificerer input, forudsætninger, resultat, efterbetingelser og forventede fejl. En nyttig
        docstring beskriver semantik frem for syntaks og bør afklare enheder, tomt input og fejlpolitik.
    linked_objectives: [m04.o7, m04.o8]

  - id: decomposition-composition
    title:
      es: Descomposición, composición y flujo de datos
      en: Decomposition, composition, and data flow
      da: Dekomponering, komposition og dataflow
    body:
      es: >-
        Descomponer consiste en separar responsabilidades que puedan explicarse y probarse de forma independiente.
        Las funciones se componen cuando la salida de una satisface el contrato de entrada de otra. Una buena
        descomposición evita funciones gigantes, pero también evita fragmentar operaciones inseparables. El flujo
        de datos entre funciones debe ser explícito mediante argumentos y retornos.
      en: >-
        Decomposition separates responsibilities that can be explained and tested independently. Functions compose
        when one output satisfies another function's input contract. Good decomposition avoids both giant functions
        and artificial fragmentation. Data flow between functions should be explicit through arguments and returns.
      da: >-
        Dekomponering adskiller ansvar, der kan forklares og testes uafhængigt. Funktioner komponeres, når ét output
        opfylder en anden funktions inputkontrakt. Dataflow bør være eksplicit gennem argumenter og returværdier.
    linked_objectives: [m04.o1, m04.o6, m04.o7]

worked_examples:
  - id: dm857.m04.e01
    title:
      es: Separar cálculo y presentación de un resumen
      en: Separate calculation from presentation in a summary
      da: Adskil beregning og præsentation i et resumé
    problem:
      es: Calcular la media de mediciones sintéticas y producir un mensaje sin mezclar cálculo y salida.
      en: Compute the mean of synthetic measurements and produce a message without mixing computation and output.
      da: Beregn middelværdien af syntetiske målinger og producer en besked uden at blande beregning og output.
    assumptions:
      - values is a non-empty sequence of numeric measurements
      - units are consistent
      - data are synthetic teaching values
    reasoning:
      es:
        - Definir una función pura que calcule y retorne la media.
        - Definir otra función que transforme el resultado en texto.
        - Mantener `print` en el borde del programa.
      en:
        - Define a pure function that computes and returns the mean.
        - Define another function that formats the result as text.
        - Keep `print` at the program boundary.
      da:
        - Definér en ren funktion der beregner og returnerer middelværdien.
        - Definér en anden funktion der formaterer resultatet som tekst.
        - Behold `print` ved programmets grænse.
    code: |-
      def mean(values):
          """Return the arithmetic mean of a non-empty numeric sequence."""
          return sum(values) / len(values)

      def format_mean(value, unit="a.u."):
          """Return a human-readable representation of a mean."""
          return f"mean={value:.2f} {unit}"

      measurements = [2.0, 4.0, 6.0]
      result = mean(measurements)
      print(format_mean(result))
    expected_output: "mean=4.00 a.u."
    validation:
      - mean of [2.0, 4.0, 6.0] is 4.0
      - `mean` has no visible output
      - `format_mean` returns a string
    explanation:
      es: El cálculo puro puede probarse sin capturar salida, mientras que la presentación queda aislada.
      en: Pure computation can be tested without capturing output, while presentation remains isolated.
      da: Ren beregning kan testes uden at indfange output, mens præsentationen er isoleret.
    limitations:
      - the empty-input policy is intentionally delegated to the contract
      - no uncertainty estimate is computed
    linked_objectives: [m04.o1, m04.o3, m04.o5, m04.o6, m04.o7]

  - id: dm857.m04.e02
    title:
      es: Evitar un valor predeterminado mutable
      en: Avoid a mutable default value
      da: Undgå en muterbar standardværdi
    problem:
      es: Diseñar una función que añada una etiqueta a una colección sin compartir una lista entre llamadas.
      en: Design a function that adds a label to a collection without sharing one list across calls.
      da: Design en funktion der tilføjer en etiket uden at dele én liste mellem kald.
    assumptions:
      - labels are strings
      - omitted collection means create a new collection
    reasoning:
      es:
        - Usar `None` como valor predeterminado estable.
        - Crear una lista dentro de la llamada cuando no se proporciona colección.
        - Decidir y documentar si la colección recibida debe mutarse.
      en:
        - Use `None` as a stable default.
        - Create a list inside the call when no collection is supplied.
        - Decide and document whether a supplied collection should be mutated.
      da:
        - Brug `None` som stabil standard.
        - Opret en liste inde i kaldet når ingen samling leveres.
        - Beslut og dokumentér om en leveret samling må muteres.
    code: |-
      def add_label(label, labels=None):
          """Return a new list containing existing labels and the new label."""
          if labels is None:
              labels = []
          result = list(labels)
          result.append(label)
          return result

      first = add_label("control")
      second = add_label("case")
      print(first, second)
    expected_output: "['control'] ['case']"
    validation:
      - two calls without a collection do not share state
      - a supplied list is not mutated
      - the return value always has type list
    explanation:
      es: `None` evita reutilizar una lista creada al definir la función; la copia evita mutar la entrada.
      en: `None` avoids reusing a list created at definition time; copying avoids mutating the input.
      da: `None` undgår genbrug af en liste fra definitionstidspunktet; kopien undgår mutation af input.
    limitations:
      - the copy is shallow
    linked_objectives: [m04.o2, m04.o5, m04.o7, m04.o8]

  - id: dm857.m04.e03
    title:
      es: Diseñar una función de validación con contrato explícito
      en: Design a validation function with an explicit contract
      da: Design en valideringsfunktion med eksplicit kontrakt
    problem:
      es: Validar un porcentaje sintético que debe ser numérico y estar entre 0 y 100 incluidos.
      en: Validate a synthetic percentage that must be numeric and lie between 0 and 100 inclusive.
      da: Validér en syntetisk procentværdi der skal være numerisk og ligge mellem 0 og 100 inklusive.
    assumptions:
      - booleans are rejected despite being subclasses of int
      - no string conversion is performed
    reasoning:
      es:
        - Comprobar primero el tipo conceptual permitido.
        - Separar la validación del mensaje al usuario.
        - Retornar un booleano verificable.
      en:
        - Check the allowed conceptual type first.
        - Separate validation from user messaging.
        - Return a testable Boolean.
      da:
        - Kontrollér først den tilladte konceptuelle type.
        - Adskil validering fra brugerbeskeder.
        - Returnér en testbar boolesk værdi.
    code: |-
      def is_valid_percentage(value):
          """Return True for non-Boolean int/float values in the closed interval [0, 100]."""
          is_numeric = isinstance(value, (int, float)) and not isinstance(value, bool)
          return is_numeric and 0 <= value <= 100

      print(is_valid_percentage(100), is_valid_percentage(True))
    expected_output: "True False"
    validation:
      - 0 and 100 are accepted
      - -0.01 and 100.01 are rejected
      - True and False are rejected
      - numeric strings are rejected
    explanation:
      es: El contrato define el dominio conceptual, no solo aquello que Python puede comparar.
      en: The contract defines the conceptual domain, not merely what Python can compare.
      da: Kontrakten definerer det konceptuelle domæne, ikke blot hvad Python kan sammenligne.
    limitations:
      - NaN handling is not included and would require an additional rule
    linked_objectives: [m04.o1, m04.o5, m04.o7, m04.o8]

practice_exercises:
  - id: dm857.m04.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: Predice el resultado y explica cada enlace de argumentos en `f(2, c=5)` para `def f(a, b=3, c=4): return a + b * c`.
      en: Predict the result and explain each argument binding in `f(2, c=5)` for `def f(a, b=3, c=4): return a + b * c`.
      da: Forudsig resultatet og forklar argumentbindingen i `f(2, c=5)` for `def f(a, b=3, c=4): return a + b * c`.
    reference_solution:
      es: `a=2`, `b=3`, `c=5`; el resultado es `17`.
      en: `a=2`, `b=3`, `c=5`; the result is `17`.
      da: `a=2`, `b=3`, `c=5`; resultatet er `17`.
    linked_objectives: [m04.o2]

  - id: dm857.m04.p02
    activity_type: debugging
    difficulty: foundational
    prompt:
      es: Corrige una función que imprime la suma cuando el programa necesita reutilizarla en otra expresión.
      en: Correct a function that prints a sum when the program needs to reuse it in another expression.
      da: Ret en funktion der udskriver en sum, når programmet skal genbruge den i et andet udtryk.
    starter_code: |-
      def add(a, b):
          print(a + b)

      doubled = add(2, 3) * 2
    reference_solution: |-
      def add(a, b):
          return a + b
    explanation:
      es: `print` retorna `None`; el llamador necesita el valor numérico.
      en: `print` returns `None`; the caller needs the numeric value.
      da: `print` returnerer `None`; den kaldende kode behøver den numeriske værdi.
    linked_objectives: [m04.o3]

  - id: dm857.m04.p03
    activity_type: refactoring
    difficulty: intermediate
    prompt:
      es: Divide una función que lee datos, limpia valores, calcula una media y escribe un mensaje en funciones cohesionadas.
      en: Split a function that reads data, cleans values, computes a mean, and writes a message into cohesive functions.
      da: Opdel en funktion der læser data, renser værdier, beregner middelværdi og skriver en besked i sammenhængende funktioner.
    accepted_answer_elements:
      - separate input boundary from pure cleaning and calculation
      - explicit arguments and returns
      - one clear responsibility per function
      - error policy for empty cleaned data
    linked_objectives: [m04.o5, m04.o6, m04.o7]

  - id: dm857.m04.p04
    activity_type: contract_design
    difficulty: intermediate
    prompt:
      es: Escribe el contrato de `safe_ratio(numerator, denominator)` incluyendo dominio, retorno y división por cero.
      en: Write the contract for `safe_ratio(numerator, denominator)`, including domain, return, and division by zero.
      da: Skriv kontrakten for `safe_ratio(numerator, denominator)` inklusive domæne, retur og division med nul.
    reference_solution:
      es: >-
        Acepta dos números reales no booleanos. Retorna `numerator / denominator` como `float` cuando el
        denominador no es cero. Para cero debe documentarse una política única: generar `ValueError` o
        retornar un sentinel explícito; no debe quedar implícita.
      en: >-
        Accept two non-Boolean real numbers. Return `numerator / denominator` as a float when the denominator
        is nonzero. For zero, document one policy: raise `ValueError` or return an explicit sentinel.
      da: >-
        Accepter to ikke-booleske reelle tal. Returnér kvotienten når nævneren ikke er nul. Dokumentér én
        eksplicit politik for nul, eksempelvis `ValueError` eller en sentinel.
    linked_objectives: [m04.o7]

  - id: dm857.m04.p05
    activity_type: test_design
    difficulty: intermediate
    prompt:
      es: Diseña pruebas para una función con tres rutas de retorno: inválido, vacío y resultado calculado.
      en: Design tests for a function with three return paths: invalid, empty, and computed result.
      da: Design test til en funktion med tre returveje: ugyldig, tom og beregnet resultat.
    accepted_answer_elements:
      - at least one test reaches each return path
      - boundary values are tested separately from branch coverage
      - assertions inspect returned values and types
      - no test depends on printed output unless printing is part of the contract
    linked_objectives: [m04.o3, m04.o8]

  - id: dm857.m04.p06
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: Explica por qué una función pura suele ser más fácil de probar y cuándo un efecto secundario sigue siendo necesario.
      en: Explain why a pure function is usually easier to test and when a side effect remains necessary.
      da: Forklar hvorfor en ren funktion normalt er lettere at teste, og hvornår en sideeffekt stadig er nødvendig.
    accepted_answer_elements:
      - deterministic relationship between arguments and result
      - absence of hidden mutable state
      - examples of necessary I/O effects
      - recommendation to isolate effects from computation
    linked_objectives: [m04.o5, m04.o6]

objective_bank:
  - id: dm857.m04.q01
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Cuál es la diferencia correcta entre parámetro y argumento?, en: What correctly distinguishes a parameter from an argument?, da: Hvad skelner korrekt en parameter fra et argument?}
    options:
      - id: correct
        text: {es: El parámetro aparece en la definición y el argumento en la llamada., en: The parameter appears in the definition and the argument in the call., da: Parameteren står i definitionen og argumentet i kaldet.}
      - id: reverse
        text: {es: El argumento aparece en la definición y el parámetro en la llamada., en: The argument appears in the definition and the parameter in the call., da: Argumentet står i definitionen og parameteren i kaldet.}
      - id: same
        text: {es: Son términos idénticos sin diferencia contextual., en: They are identical terms with no contextual difference., da: De er identiske uden kontekstuel forskel.}
    correct_option_ids: [correct]
    explanation: {es: Parámetro pertenece a la interfaz definida; argumento es el valor suministrado., en: A parameter belongs to the defined interface; an argument is the supplied value., da: En parameter hører til grænsefladen; et argument er den leverede værdi.}
    linked_objectives: [m04.o2]

  - id: dm857.m04.q02
    activity_type: true_false
    difficulty: foundational
    prompt: {es: Una función que solo usa `print` retorna automáticamente el texto impreso., en: A function using only `print` automatically returns the printed text., da: En funktion der kun bruger `print` returnerer automatisk den udskrevne tekst.}
    correct_answer: false
    explanation: {es: `print` retorna `None`., en: `print` returns `None`., da: `print` returnerer `None`.}
    linked_objectives: [m04.o3]

  - id: dm857.m04.q03
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué problema presenta `def collect(x, items=[]): ...`?, en: What problem can `def collect(x, items=[]): ...` cause?, da: Hvilket problem kan `def collect(x, items=[]): ...` skabe?}
    options:
      - id: reused
        text: {es: La misma lista predeterminada puede reutilizarse entre llamadas., en: The same default list may be reused across calls., da: Den samme standardliste kan genbruges mellem kald.}
      - id: syntax
        text: {es: La sintaxis de listas está prohibida en parámetros., en: List syntax is forbidden in parameters., da: Listesyntaks er forbudt i parametre.}
      - id: immutable
        text: {es: La lista se vuelve inmutable., en: The list becomes immutable., da: Listen bliver uforanderlig.}
    correct_option_ids: [reused]
    explanation: {es: Los valores predeterminados se evalúan al definir la función., en: Default values are evaluated when the function is defined., da: Standardværdier evalueres ved funktionsdefinitionen.}
    linked_objectives: [m04.o2, m04.o8]

  - id: dm857.m04.q04
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Cuál es el ámbito habitual de un parámetro?, en: What is the usual scope of a parameter?, da: Hvad er en parameters normale scope?}
    options:
      - id: local
        text: {es: Local a la llamada de la función., en: Local to the function call., da: Lokalt for funktionskaldet.}
      - id: global
        text: {es: Global para todo el programa., en: Global to the entire program., da: Globalt for hele programmet.}
      - id: file
        text: {es: Limitado al archivo pero no a la función., en: Limited to the file but not the function., da: Begrænset til filen men ikke funktionen.}
    correct_option_ids: [local]
    explanation: {es: Los parámetros son variables locales inicializadas por la llamada., en: Parameters are local variables initialized by the call., da: Parametre er lokale variable initialiseret af kaldet.}
    linked_objectives: [m04.o4]

  - id: dm857.m04.q05
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Cuál de las siguientes acciones es un efecto secundario?, en: Which action is a side effect?, da: Hvilken handling er en sideeffekt?}
    options:
      - id: write_file
        text: {es: Escribir en un archivo., en: Writing to a file., da: At skrive til en fil.}
      - id: add_numbers
        text: {es: Retornar la suma de dos argumentos., en: Returning the sum of two arguments., da: At returnere summen af to argumenter.}
      - id: compare
        text: {es: Comparar dos valores y retornar un booleano., en: Comparing two values and returning a Boolean., da: At sammenligne to værdier og returnere en boolesk værdi.}
    correct_option_ids: [write_file]
    explanation: {es: Escribir modifica estado externo observable., en: Writing modifies observable external state., da: Skrivning ændrer observerbar ekstern tilstand.}
    linked_objectives: [m04.o5]

  - id: dm857.m04.q06
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Dos llamadas independientes comparten automáticamente sus variables locales., en: Two independent calls automatically share local variables., da: To uafhængige kald deler automatisk lokale variable.}
    correct_answer: false
    explanation: {es: Cada llamada crea su propio marco local., en: Each call creates its own local frame., da: Hvert kald skaber sin egen lokale ramme.}
    linked_objectives: [m04.o4]

  - id: dm857.m04.q07
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué debe priorizar una buena descomposición?, en: What should good decomposition prioritize?, da: Hvad bør god dekomponering prioritere?}
    options:
      - id: cohesion
        text: {es: Responsabilidades cohesionadas e interfaces explícitas., en: Cohesive responsibilities and explicit interfaces., da: Sammenhængende ansvar og eksplicitte grænseflader.}
      - id: maximum_count
        text: {es: El máximo número posible de funciones., en: The maximum possible number of functions., da: Det størst mulige antal funktioner.}
      - id: globals
        text: {es: Compartir variables globales para evitar argumentos., en: Sharing globals to avoid arguments., da: At dele globale variable for at undgå argumenter.}
    correct_option_ids: [cohesion]
    explanation: {es: La división debe seguir responsabilidades verificables, no un conteo arbitrario., en: Division should follow testable responsibilities rather than an arbitrary count., da: Opdeling bør følge testbare ansvar frem for et vilkårligt antal.}
    linked_objectives: [m04.o6]

  - id: dm857.m04.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué elemento pertenece a una poscondición?, en: Which element belongs to a postcondition?, da: Hvilket element hører til en efterbetingelse?}
    options:
      - id: result_property
        text: {es: Una propiedad que debe cumplir el resultado tras una llamada válida., en: A property the result must satisfy after a valid call., da: En egenskab resultatet skal opfylde efter et gyldigt kald.}
      - id: input_requirement
        text: {es: Un requisito que debe cumplir el argumento antes de llamar., en: A requirement the argument must satisfy before calling., da: Et krav argumentet skal opfylde før kaldet.}
      - id: implementation
        text: {es: El orden exacto de las líneas internas., en: The exact order of internal lines., da: Den præcise rækkefølge af interne linjer.}
    correct_option_ids: [result_property]
    explanation: {es: Las precondiciones describen entradas; las poscondiciones describen garantías posteriores., en: Preconditions describe inputs; postconditions describe guarantees after execution., da: Forudsætninger beskriver input; efterbetingelser beskriver garantier efter udførelse.}
    linked_objectives: [m04.o7]

  - id: dm857.m04.q09
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué prueba detecta una ruta sin `return`?, en: Which test exposes a path without `return`?, da: Hvilken test afslører en vej uden `return`?}
    options:
      - id: trigger_path
        text: {es: Una entrada que active esa ruta y una aserción sobre el valor retornado., en: An input that activates the path and an assertion on the returned value., da: Et input der aktiverer vejen og en assertion på returværdien.}
      - id: syntax_only
        text: {es: Revisar únicamente que el archivo compile., en: Only checking that the file compiles., da: Kun at kontrollere at filen kompilerer.}
      - id: print
        text: {es: Añadir más impresiones sin comprobar el retorno., en: Adding more prints without checking the return., da: At tilføje flere udskrifter uden at kontrollere retur.}
    correct_option_ids: [trigger_path]
    explanation: {es: La ruta debe ejecutarse y el test debe observar `None` o el valor incorrecto., en: The path must execute and the test must observe `None` or the incorrect value., da: Vejen skal udføres og testen skal observere `None` eller forkert værdi.}
    linked_objectives: [m04.o3, m04.o8]

  - id: dm857.m04.q10
    activity_type: true_false
    difficulty: advanced
    prompt: {es: Una función pura nunca puede llamar a otra función., en: A pure function can never call another function., da: En ren funktion kan aldrig kalde en anden funktion.}
    correct_answer: false
    explanation: {es: Puede llamar a otras funciones puras; lo decisivo es la ausencia de efectos y dependencias ocultas., en: It may call other pure functions; absence of effects and hidden dependencies is decisive., da: Den kan kalde andre rene funktioner; fravær af effekter og skjulte afhængigheder er afgørende.}
    linked_objectives: [m04.o5, m04.o6]

assessment_items:
  - id: dm857.m04.a01
    activity_type: function_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña `summarize_values(values)` para una secuencia numérica no vacía. Debe retornar un registro
        con cantidad, mínimo, máximo y media, no imprimir ni modificar la entrada. Incluye contrato y pruebas.
      en: >-
        Design `summarize_values(values)` for a non-empty numeric sequence. It must return a record containing
        count, minimum, maximum, and mean, without printing or mutating the input. Include a contract and tests.
      da: >-
        Design `summarize_values(values)` for en ikke-tom numerisk sekvens. Den skal returnere antal, minimum,
        maksimum og middelværdi uden udskrivning eller mutation. Medtag kontrakt og test.
    accepted_answer_elements:
      - explicit non-empty numeric precondition or documented error policy
      - returned structured result
      - no mutation and no printing
      - tests for one element, several values, negatives, and invalid empty input
    rubric:
      - {criterion: contract_and_interface, points: 3}
      - {criterion: correct_computation, points: 3}
      - {criterion: purity_and_no_mutation, points: 2}
      - {criterion: tests, points: 2}
    linked_objectives: [m04.o1, m04.o3, m04.o5, m04.o7, m04.o8]

  - id: dm857.m04.a02
    activity_type: debugging
    difficulty: advanced
    prompt:
      es: >-
        Una función utiliza una lista predeterminada mutable, modifica una variable global e imprime en lugar
        de retornar. Diagnostica los tres defectos, propón una corrección y explica cómo probarla.
      en: >-
        A function uses a mutable default list, modifies a global variable, and prints instead of returning.
        Diagnose all three defects, propose a correction, and explain how to test it.
      da: >-
        En funktion bruger en muterbar standardliste, ændrer en global variabel og udskriver i stedet for at
        returnere. Diagnostisér alle tre fejl, foreslå en rettelse og forklar hvordan den testes.
    accepted_answer_elements:
      - mutable default is replaced with None or an immutable design
      - global dependency is replaced with explicit input/output
      - print is replaced with return where reuse is required
      - repeated-call test proves absence of shared state
    rubric:
      - {criterion: complete_diagnosis, points: 4}
      - {criterion: corrected_design, points: 3}
      - {criterion: revealing_tests, points: 2}
      - {criterion: explanation, points: 1}
    linked_objectives: [m04.o2, m04.o3, m04.o4, m04.o5, m04.o8]

  - id: dm857.m04.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: Explica y defiende una descomposición funcional para un pequeño pipeline de limpieza, validación, cálculo y presentación.
      en: Explain and defend a functional decomposition for a small cleaning, validation, calculation, and presentation pipeline.
      da: Forklar og forsvar en funktionel dekomponering af en lille pipeline til rensning, validering, beregning og præsentation.
    accepted_answer_elements:
      - clear stage responsibilities
      - explicit contracts between stages
      - pure core separated from I/O
      - error policy and test strategy
      - recognition that excessive fragmentation is also undesirable
    rubric:
      - {criterion: decomposition_quality, points: 3}
      - {criterion: interfaces_and_contracts, points: 3}
      - {criterion: purity_and_effect_boundaries, points: 2}
      - {criterion: limitations_and_tests, points: 2}
    linked_objectives: [m04.o5, m04.o6, m04.o7, m04.o8]

