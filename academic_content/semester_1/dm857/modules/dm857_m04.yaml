glossary:
  - id: term.function
    term: {es: función, en: function, da: funktion}
    definition: {es: Bloque reutilizable con nombre, interfaz y comportamiento definido., en: Named reusable block with a defined interface and behavior., da: Navngivet genanvendelig blok med defineret grænseflade og adfærd.}
    related_terms: [term.parameter, term.return_value]
  - id: term.parameter
    term: {es: parámetro, en: parameter, da: parameter}
    definition: {es: Nombre local declarado en la definición de una función., en: Local name declared in a function definition., da: Lokalt navn deklareret i en funktionsdefinition.}
    related_terms: [term.argument]
  - id: term.argument
    term: {es: argumento, en: argument, da: argument}
    definition: {es: Valor suministrado a un parámetro durante una llamada., en: Value supplied to a parameter during a call., da: Værdi leveret til en parameter under et kald.}
    related_terms: [term.parameter]
  - id: term.return_value
    term: {es: valor de retorno, en: return value, da: returværdi}
    definition: {es: Valor entregado por una función al código llamador., en: Value delivered by a function to its caller., da: Værdi leveret af en funktion til den kaldende kode.}
    related_terms: [term.function]
  - id: term.scope
    term: {es: ámbito, en: scope, da: scope}
    definition: {es: Región del programa en la que un nombre puede resolverse., en: Region of a program in which a name can be resolved., da: Område i et program hvor et navn kan opløses.}
    related_terms: [term.local_variable]
  - id: term.local_variable
    term: {es: variable local, en: local variable, da: lokal variabel}
    definition: {es: Variable perteneciente al marco local de una llamada., en: Variable belonging to a call's local frame., da: Variabel der tilhører et kalds lokale ramme.}
    related_terms: [term.scope]
  - id: term.pure_function
    term: {es: función pura, en: pure function, da: ren funktion}
    definition: {es: Función cuyo resultado depende de sus argumentos y que no modifica estado externo., en: Function whose result depends on its arguments and that does not modify external state., da: Funktion hvis resultat afhænger af argumenterne og ikke ændrer ekstern tilstand.}
    related_terms: [term.side_effect]
  - id: term.side_effect
    term: {es: efecto secundario, en: side effect, da: sideeffekt}
    definition: {es: Cambio observable fuera del valor retornado., en: Observable change beyond the returned value., da: Observerbar ændring ud over returværdien.}
    related_terms: [term.pure_function]
  - id: term.precondition
    term: {es: precondición, en: precondition, da: forudsætning}
    definition: {es: Requisito que debe cumplir una entrada antes de una llamada válida., en: Requirement an input must satisfy before a valid call., da: Krav et input skal opfylde før et gyldigt kald.}
    related_terms: [term.postcondition]
  - id: term.postcondition
    term: {es: poscondición, en: postcondition, da: efterbetingelse}
    definition: {es: Garantía que debe cumplir el resultado después de una llamada válida., en: Guarantee the result must satisfy after a valid call., da: Garanti resultatet skal opfylde efter et gyldigt kald.}
    related_terms: [term.precondition]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El módulo trata una función como una frontera contractual. El estudiante debe separar definición y llamada,
      parámetros y argumentos, retorno y salida visible, ámbito local y estado externo. La calidad no se demuestra
      por cantidad de funciones, sino por responsabilidades cohesionadas, interfaces explícitas, ausencia de
      dependencias ocultas y pruebas derivadas del contrato.
    en: >-
      The module treats a function as a contractual boundary. The learner must separate definition from call,
      parameters from arguments, return values from visible output, and local scope from external state. Quality is
      demonstrated by cohesive responsibilities, explicit interfaces, absence of hidden dependencies, and tests
      derived from the contract rather than by function count.
    da: >-
      Modulet behandler en funktion som en kontraktlig grænse. Den studerende skal adskille definition fra kald,
      parametre fra argumenter, returværdi fra synligt output og lokalt scope fra ekstern tilstand. Kvalitet vises
      gennem sammenhængende ansvar, eksplicitte grænseflader og kontraktbaserede test.
  misconceptions:
    - id: m04.mc01
      claim: print and return are interchangeable
      correction: print creates an observable effect and returns None; return communicates data to the caller
    - id: m04.mc02
      claim: default values are recreated for every call
      correction: defaults are evaluated when the function is defined
    - id: m04.mc03
      claim: any large function improves when split into the maximum possible number of functions
      correction: decomposition follows cohesive responsibilities and meaningful interfaces
    - id: m04.mc04
      claim: local variables persist and are shared automatically
      correction: each call has its own local frame unless shared external state is introduced explicitly
    - id: m04.mc05
      claim: side effects are always forbidden
      correction: effects are necessary at system boundaries but should be isolated and explicit
  socratic_prompts:
    - What must a caller know to use this function correctly?
    - Which facts are preconditions and which are postconditions?
    - Does the caller need a returned value or merely visible output?
    - Which state changes can another part of the program observe?
    - Can each responsibility be tested independently?
    - Which input reaches every return path?
  grading_criteria:
    - correctness of argument binding and return reasoning
    - clarity and completeness of contracts
    - cohesive decomposition and explicit data flow
    - appropriate isolation of side effects
    - unit tests derived from boundaries and return paths
  response_constraints:
    - never describe printed output as a return value
    - state mutable-default behavior accurately
    - do not invent validation rules absent from the contract
    - distinguish Python type compatibility from conceptual domain validity
    - label all biomedical examples as synthetic teaching examples
  retrieval_fragments:
    - id: m04.rf01
      topic: parameter_argument
      canonical_answer: A parameter is a local name in the definition; an argument is the value supplied in a call.
    - id: m04.rf02
      topic: return_print
      canonical_answer: return transfers a value to the caller; print writes a representation and returns None.
    - id: m04.rf03
      topic: mutable_default
      canonical_answer: Mutable defaults are created once at definition time and may retain changes across calls.
    - id: m04.rf04
      topic: purity
      canonical_answer: A pure function depends on explicit arguments and does not change externally observable state.
    - id: m04.rf05
      topic: decomposition
      canonical_answer: Decompose by cohesive responsibility and connect stages through explicit contracts.

