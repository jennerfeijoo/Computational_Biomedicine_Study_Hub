limitations:
  - Truthiness of non-Boolean objects is not treated as a replacement for explicit predicates.
  - Structural pattern matching is outside the scope of this introductory module.
  - Floating-point boundary tolerance is introduced later where numerical error is addressed.
  - Synthetic thresholds and categories do not define biomedical or academic policies.
