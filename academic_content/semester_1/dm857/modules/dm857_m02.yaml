metadata:
  title:
    es: "Lógica booleana, comparaciones y estructuras condicionales"
    en: "Boolean logic, comparisons, and conditional statements"
    da: "Boolesk logik, sammenligninger og betingede sætninger"
  summary:
    es: >-
      Desarrollo de decisiones verificables mediante valores booleanos, operadores de comparación,
      lógica compuesta, evaluación en cortocircuito, estructuras `if`, `elif` y `else`, validación
      de entradas, análisis de límites y diseño de pruebas para ramas de ejecución.
    en: >-
      Development of verifiable decisions using Boolean values, comparison operators, compound
      logic, short-circuit evaluation, `if`, `elif`, and `else`, input validation, boundary analysis,
      and tests for execution branches.
    da: >-
      Udvikling af efterprøvelige beslutninger med booleske værdier, sammenligningsoperatorer,
      sammensat logik, kortslutningsevaluering, `if`, `elif` og `else`, inputvalidering,
      grænseanalyse og test af programgrene.
  prerequisites: [dm857.m01]
  official_learning_outcomes: [dm857.lo01, dm857.lo02, dm857.lo03, dm857.lo05]
  estimated_study_hours: 14
  difficulty: foundational

