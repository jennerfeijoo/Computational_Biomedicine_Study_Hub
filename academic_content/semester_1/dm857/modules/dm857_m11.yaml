limitations:
  - Concurrency, blocking queues, and thread safety are outside this module.
  - Heap decrease-key and indexed priority queues are treated conceptually rather than fully implemented.
  - Complexity guarantees refer to standard Python implementations and must not be generalized without assumptions.
