  - {id: dm857.m11.q06, activity_type: multiple_choice, prompt: {es: ¿Por qué se añade un contador a una entrada de heap?, en: Why add a counter to a heap entry?, da: Hvorfor tilføjes en tæller til en heap-post?}, options: [{id: ties, text: {es: Para desempate estable y evitar comparar objetos., en: For stable tie-breaking and avoiding item comparison., da: Til stabil afgørelse og undgåelse af elementsammenligning.}}, {id: capacity, text: {es: Para limitar capacidad., en: To limit capacity., da: Til at begrænse kapacitet.}}, {id: sorting, text: {es: Para ordenar todo el heap., en: To fully sort the heap., da: Til at sortere hele heapen.}}], correct_option_ids: [ties]}
  - {id: dm857.m11.q07, activity_type: true_false, prompt: {es: Una invariante sólo debe cumplirse al construir el objeto., en: An invariant only needs to hold at construction., da: En invariant behøver kun gælde ved konstruktion.}, correct_answer: false}
  - {id: dm857.m11.q08, activity_type: multiple_choice, prompt: {es: ¿Qué prueba depende menos de la representación?, en: Which test depends least on representation?, da: Hvilken test afhænger mindst af repræsentationen?}, options: [{id: behavior, text: {es: Verificar orden de salidas tras operaciones públicas., en: Verify output order after public operations., da: Kontrollér outputrækkefølge efter offentlige operationer.}}, {id: private_list, text: {es: Inspeccionar el nombre de la lista privada., en: Inspect the private list name., da: Inspicér navnet på den private liste.}}, {id: memory_address, text: {es: Comparar direcciones internas., en: Compare internal addresses., da: Sammenlign interne adresser.}}], correct_option_ids: [behavior]}
  - {id: dm857.m11.q09, activity_type: true_false, prompt: {es: Retornar directamente la lista interna puede permitir que el cliente rompa invariantes., en: Returning the internal list directly may let clients break invariants., da: Direkte returnering af den interne liste kan lade klienten bryde invarianter.}, correct_answer: true}
  - {id: dm857.m11.q10, activity_type: multiple_choice, prompt: {es: ¿Qué abstracción requiere extracción por urgencia?, en: Which abstraction supports removal by urgency?, da: Hvilken abstraktion understøtter fjernelse efter hast?}, options: [{id: priority_queue, text: {es: Cola de prioridad, en: Priority queue, da: Prioritetskø}}, {id: plain_stack, text: {es: Pila simple, en: Plain stack, da: Simpel stak}}, {id: tuple, text: {es: Tupla aislada, en: Isolated tuple, da: Isoleret tuple}}], correct_option_ids: [priority_queue]}

assessment_items:
  - id: dm857.m11.a01
    activity_type: adt_design
    difficulty: advanced
    prompt: {es: Diseña un ADT BufferAcotado con capacidad fija, inserción, extracción, consulta de tamaño y política explícita al llenarse y vaciarse. Incluye invariantes y pruebas., en: Design a fixed-capacity BoundedBuffer ADT with insertion, removal, size, and explicit full/empty policies. Include invariants and tests., da: Design et ADT for en begrænset buffer med kapacitet, indsættelse, fjernelse, størrelse og eksplicit fuld/tom-politik.}
    accepted_answer_elements: [public interface, full and empty behavior, capacity invariant, ordering policy, no internal exposure, boundary tests]
    rubric: [{criterion: contract, points: 3}, {criterion: invariants, points: 3}, {criterion: representation_independence, points: 2}, {criterion: tests, points: 2}]
  - id: dm857.m11.a02
    activity_type: implementation_review
    difficulty: advanced
    prompt: {es: Revisa una cola basada en lista con pop(0), una basada en dos pilas y una basada en deque. Compara contrato, complejidad y riesgo de errores sin asumir que una única representación es siempre mejor., en: Review queues based on list pop(0), two stacks, and deque. Compare contract, complexity, and error risk without assuming one representation is always best., da: Gennemgå køer baseret på list pop(0), to stakke og deque og sammenlign kontrakt, kompleksitet og fejlrisiko.}
    accepted_answer_elements: [same FIFO semantics, complexity per operation, amortized reasoning for two stacks, simplicity tradeoff, suitable tests]
    rubric: [{criterion: semantic_equivalence, points: 2}, {criterion: complexity_analysis, points: 4}, {criterion: tradeoff_reasoning, points: 2}, {criterion: tests, points: 2}]
  - id: dm857.m11.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt: {es: Explica por qué probar atributos privados puede hacer frágil una suite incluso cuando la implementación sigue siendo correcta., en: Explain why testing private attributes may make a suite fragile even when implementation remains correct., da: Forklar hvorfor test af private attributter kan gøre en suite skrøbelig, selv når implementeringen er korrekt.}
    accepted_answer_elements: [contract versus representation, legitimate internal replacement, observable behavior, examples of stable tests]
    rubric: [{criterion: abstraction_reasoning, points: 4}, {criterion: example, points: 2}, {criterion: alternative_testing_strategy, points: 2}, {criterion: clarity, points: 2}]

