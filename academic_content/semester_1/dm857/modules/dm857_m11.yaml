glossary:
  - {id: term.adt, term: {es: tipo abstracto de datos, en: abstract data type, da: abstrakt datatype}, definition: {es: Modelo definido por valores y operaciones observables., en: Model defined by valid values and observable operations., da: Model defineret af gyldige værdier og observerbare operationer.}}
  - {id: term.interface, term: {es: interfaz, en: interface, da: interface}, definition: {es: Conjunto de operaciones disponibles para el cliente., en: Set of operations available to clients., da: Mængde operationer tilgængelige for klienten.}}
  - {id: term.representation_invariant, term: {es: invariante de representación, en: representation invariant, da: repræsentationsinvariant}, definition: {es: Propiedad que el estado interno debe preservar., en: Property internal state must preserve., da: Egenskab som intern tilstand skal bevare.}}
  - {id: term.stack, term: {es: pila, en: stack, da: stak}, definition: {es: ADT con política LIFO., en: ADT with LIFO policy., da: ADT med LIFO-politik.}}
  - {id: term.queue, term: {es: cola, en: queue, da: kø}, definition: {es: ADT con política FIFO., en: ADT with FIFO policy., da: ADT med FIFO-politik.}}
  - {id: term.priority_queue, term: {es: cola de prioridad, en: priority queue, da: prioritetskø}, definition: {es: ADT que extrae según prioridad., en: ADT removing items according to priority., da: ADT der fjerner elementer efter prioritet.}}
  - {id: term.heap, term: {es: montículo, en: heap, da: heap}, definition: {es: Estructura que mantiene una propiedad parcial de prioridad., en: Structure maintaining a partial priority property., da: Struktur der bevarer en delvis prioritetsegenskab.}}
  - {id: term.encapsulation, term: {es: encapsulación, en: encapsulation, da: indkapsling}, definition: {es: Restricción del acceso directo al estado interno., en: Restriction of direct access to internal state., da: Begrænsning af direkte adgang til intern tilstand.}}
  - {id: term.substitutability, term: {es: sustituibilidad, en: substitutability, da: udskiftelighed}, definition: {es: Capacidad de reemplazar una implementación sin cambiar comportamiento cliente válido., en: Ability to replace an implementation without changing valid client behavior., da: Evne til at erstatte en implementering uden at ændre gyldig klientadfærd.}}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El tutor debe separar siempre qué promete la abstracción de cómo está implementada. Antes de
      discutir código debe pedir operaciones, política de errores, invariantes y complejidad relevante.
      Una solución no es correcta sólo porque produce algunos valores; debe conservar comportamiento
      bajo secuencias de operaciones y permitir sustitución sin que el cliente conozca la representación.
    en: >-
      Always separate what the abstraction promises from how it is implemented. Before code, require
      operations, error policy, invariants, and relevant complexity. Correctness must hold across operation
      sequences and allow substitution without exposing representation.
    da: >-
      Adskil altid abstraktionens løfter fra implementeringen. Kræv operationer, fejlpolitik, invarianter
      og relevant kompleksitet før kode.
  misconceptions:
    - {id: m11.mc01, claim: {es: Un ADT es una clase concreta., en: An ADT is one concrete class., da: Et ADT er én konkret klasse.}, correction: {es: Es una especificación abstracta que puede tener varias implementaciones., en: It is an abstract specification with potentially many implementations., da: Det er en abstrakt specifikation med mulige flere implementeringer.}}
    - {id: m11.mc02, claim: {es: Un heap está completamente ordenado., en: A heap is fully sorted., da: En heap er fuldt sorteret.}, correction: {es: Sólo mantiene una propiedad parcial suficiente para acceder al extremo de prioridad., en: It maintains only a partial property sufficient for priority access., da: Den bevarer kun en delvis egenskab for prioritetsadgang.}}
    - {id: m11.mc03, claim: {es: Probar atributos privados garantiza más calidad., en: Testing private attributes always improves quality., da: Test af private attributter forbedrer altid kvalitet.}, correction: {es: Puede acoplar las pruebas a detalles reemplazables y bloquear refactorizaciones correctas., en: It may couple tests to replaceable details and block correct refactoring., da: Det kan koble test til udskiftelige detaljer og blokere korrekt refaktorering.}}
  socratic_questions:
    - ¿Qué comportamiento debe observar el cliente y qué detalles deben permanecer ocultos?
    - ¿Qué estados son válidos después de cada operación pública?
    - ¿Qué política de extracción requiere el problema: LIFO, FIFO o prioridad?
    - ¿Qué ocurre exactamente al operar sobre vacío o capacidad completa?
    - ¿Cómo probarías dos implementaciones sin inspeccionar su representación?
  grading_guidance:
    do_not_accept: [interface without error policy, exposed mutable internals, claims based only on one happy-path sequence, complexity claims disconnected from representation]
    strong_answer_features: [observable contract, checkable invariants, boundary behavior, substitutability tests, time and space tradeoffs]
  retrieval_fragments:
    - {id: m11.r01, topics: [adt, contract, representation], text: {es: Un ADT describe comportamiento; la representación es una decisión interna reemplazable., en: An ADT describes behavior; representation is an internal replaceable decision., da: Et ADT beskriver adfærd; repræsentationen er en intern udskiftelig beslutning.}}
    - {id: m11.r02, topics: [stack, queue, priority], text: {es: Pila extrae lo más reciente, cola lo más antiguo y cola de prioridad el elemento extremo según una política explícita., en: A stack removes the newest, a queue the oldest, and a priority queue the extreme item under an explicit policy., da: En stak fjerner nyeste, en kø ældste og en prioritetskø efter eksplicit prioritet.}}

