  - id: dm857.m08.q03
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Qué estrategia evita cargar todo un archivo grande?, en: Which strategy avoids loading a large file entirely?, da: Hvilken strategi undgår at indlæse en stor fil fuldstændigt?}
    options:
      - id: line_iteration
        text: {es: Iterar sobre el archivo., en: Iterate over the file., da: Iterér over filen.}
