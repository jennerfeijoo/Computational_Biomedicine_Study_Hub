        text: {es: Usar `read()`., en: Use `read()`., da: Brug `read()`.}
      - id: list_read
        text: {es: Convertir todas las líneas en lista primero., en: Convert all lines to a list first., da: Konvertér alle linjer til en liste først.}
    correct_option_ids: [line_iteration]
