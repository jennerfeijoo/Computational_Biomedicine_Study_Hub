metadata:
  title:
    es: Archivos, fronteras de datos, validación y excepciones
    en: Files, data boundaries, validation, and exceptions
    da: Filer, datagrænser, validering og undtagelser
  summary:
    es: >-
      Manejo reproducible de rutas y archivos de texto mediante `pathlib`, modos de apertura, codificación,
      gestores de contexto, lectura incremental, escritura explícita, CSV, separación entre entrada/salida
      y cálculo, validación estructural y semántica, excepciones específicas, propagación, encadenamiento,
      limpieza de recursos y pruebas de fallos.
    en: >-
      Reproducible handling of paths and text files using `pathlib`, file modes, encodings, context managers,
      incremental reading, explicit writing, CSV, separation of input/output from computation, structural and
      semantic validation, specific exceptions, propagation, chaining, resource cleanup, and failure testing.
    da: >-
      Reproducerbar håndtering af stier og tekstfiler med `pathlib`, filtilstande, kodning, context managers,
      inkrementel læsning, eksplicit skrivning, CSV, adskillelse af input/output og beregning, strukturel og
      semantisk validering, specifikke undtagelser, propagation, chaining, ressourceoprydning og fejltest.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03, dm857.m04, dm857.m05, dm857.m06, dm857.m07]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05]
  estimated_study_hours: 18
  difficulty: intermediate

