glossary:
  - id: term.path
    term: {es: ruta, en: path, da: sti}
    definition: {es: Representación de una ubicación en el sistema de archivos., en: Representation of a filesystem location., da: Repræsentation af en placering i filsystemet.}
  - id: term.working_directory
    term: {es: directorio de trabajo, en: working directory, da: arbejdsmappe}
    definition: {es: Base usada para interpretar rutas relativas., en: Base used to interpret relative paths., da: Basis for fortolkning af relative stier.}
  - id: term.encoding
    term: {es: codificación, en: encoding, da: kodning}
    definition: {es: Regla que relaciona bytes con caracteres., en: Rule mapping bytes to characters., da: Regel der forbinder bytes med tegn.}
  - id: term.context_manager
    term: {es: gestor de contexto, en: context manager, da: context manager}
    definition: {es: Objeto que administra entrada, salida y limpieza de un recurso., en: Object managing setup, exit, and cleanup of a resource., da: Objekt der styrer etablering, afslutning og oprydning af en ressource.}
  - id: term.csv_dialect
    term: {es: dialecto CSV, en: CSV dialect, da: CSV-dialect}
    definition: {es: Convenciones de delimitador, comillas, escape y nueva línea., en: Delimiter, quoting, escaping, and newline conventions., da: Konventioner for separator, citation, escaping og linjeskift.}
  - id: term.structural_validation
    term: {es: validación estructural, en: structural validation, da: strukturel validering}
    definition: {es: Comprobación de forma, columnas y presencia., en: Checking shape, columns, and presence., da: Kontrol af form, kolonner og tilstedeværelse.}
  - id: term.semantic_validation
    term: {es: validación semántica, en: semantic validation, da: semantisk validering}
    definition: {es: Comprobación del significado y dominio de valores., en: Checking value meaning and domain., da: Kontrol af værdiernes betydning og domæne.}
  - id: term.exception
    term: {es: excepción, en: exception, da: undtagelse}
    definition: {es: Objeto que representa una interrupción del flujo normal., en: Object representing interruption of normal control flow., da: Objekt der repræsenterer afbrydelse af normal kontrolstrøm.}
  - id: term.propagation
    term: {es: propagación, en: propagation, da: propagation}
    definition: {es: Búsqueda ascendente de un manejador compatible., en: Upward search for a compatible handler., da: Søgning op gennem kald for en kompatibel handler.}
  - id: term.exception_chaining
    term: {es: encadenamiento de excepciones, en: exception chaining, da: exception chaining}
    definition: {es: Conservación explícita de la causa original al traducir un error., en: Explicit preservation of the original cause while translating an error., da: Eksplicit bevarelse af oprindelig årsag ved oversættelse af en fejl.}

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      Una frontera de datos confiable convierte una ubicación externa en datos internos validados mediante una
      secuencia explícita: resolver ruta, abrir con modo y codificación, leer con una estrategia adecuada, analizar
      el formato, convertir tipos, validar semántica y entregar estructuras internas. Las excepciones deben conservar
      causa y localización. La lógica científica no debe depender directamente del sistema de archivos.
    en: >-
      A trustworthy data boundary converts an external location into validated internal data through explicit steps:
      resolve path, open with mode and encoding, choose a reading strategy, parse format, convert types, validate
      semantics, and return internal structures. Exceptions preserve cause and location. Scientific logic should not
      depend directly on the filesystem.
    da: >-
      En pålidelig datagrænse transformerer en ekstern placering til validerede interne data gennem eksplicitte trin.
      Undtagelser skal bevare årsag og lokation, og analyselogik bør ikke afhænge direkte af filsystemet.
  misconceptions:
    - id: m08.mc01
      incorrect: "A relative path always starts from the script directory."
      correction: "It is normally interpreted from the current working directory unless an explicit base is used."
    - id: m08.mc02
      incorrect: "Mode w safely updates an existing file."
      correction: "Mode w truncates the existing file before writing."
    - id: m08.mc03
      incorrect: "CSV can always be parsed with split(',')."
      correction: "Quoted delimiters and multiline fields require a CSV parser."
    - id: m08.mc04
      incorrect: "Catching every exception makes software robust."
      correction: "Broad catches hide unexpected defects and destroy diagnostic evidence."
    - id: m08.mc05
      incorrect: "Successful type conversion means the value is valid."
      correction: "Semantic validation remains necessary after conversion."
  socratic_questions:
    - From which base is this relative path interpreted?
    - Can the selected mode destroy or silently append to previous data?
    - Is the format parser aware of quoting and escaping rules?
    - Which validation layer should reject this example?
    - Can this handler genuinely recover, or should the error propagate?
    - What evidence shows that no partial output remains after failure?
  grading_criteria:
    - Explicit path, mode, encoding, and overwrite policy.
    - Appropriate streaming or CSV strategy.
    - Separation of structure, conversion, and semantics.
    - Specific exception handling with contextual diagnostics.
    - Isolation of computation from I/O effects.
    - Tests covering success, empty input, malformed input, and I/O failure.
  response_constraints:
    - Do not recommend naive comma splitting for general CSV.
    - Do not place unrelated computation inside a broad `try` block.
    - Do not treat a converted number as semantically valid without domain checks.
    - Require row, line, field, or path context in user-facing import errors.
    - Distinguish an empty valid result from a failed read.
  retrieval_fragments:
    - id: m08.r01
      topic: data_boundary
      content: "A data boundary should resolve location, decode bytes, parse structure, convert types, validate meaning, and return internal data."
    - id: m08.r02
      topic: exception_specificity
      content: "Catch only exceptions that can be handled, translated, or enriched; unexpected defects should preserve their traceback."
    - id: m08.r03
      topic: csv
      content: "General CSV requires a CSV parser because delimiters may occur inside quoted fields."
    - id: m08.r04
      topic: testing_failures
      content: "Failure tests should verify diagnostics, resource cleanup, and absence or integrity of partial outputs."

