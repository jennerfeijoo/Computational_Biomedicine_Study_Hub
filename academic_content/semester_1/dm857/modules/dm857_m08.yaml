        text: {es: La cadena causal con la excepción original., en: The causal chain with the original exception., da: Den kausale kæde med den oprindelige undtagelse.}
      - id: file_contents
        text: {es: El contenido del archivo., en: File contents., da: Filens indhold.}
      - id: suppressed_error
        text: {es: La eliminación completa del error original., en: Complete removal of the original error., da: Fuld fjernelse af den oprindelige fejl.}
    correct_option_ids: [causal_chain]
    explanation: {es: El encadenamiento conserva el contexto de bajo nivel., en: Chaining retains low-level context., da: Chaining bevarer kontekst på lavt niveau.}
  - id: dm857.m08.q10
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {es: ¿Qué evidencia demuestra que un escritor no dejó una salida parcial?, en: What evidence shows that a writer did not leave partial output?, da: Hvilken evidens viser at en skriver ikke efterlod delvist output?}
    options:
      - id: failure_test
        text: {es: Una prueba que induce fallo y verifica ausencia o integridad del destino., en: A test inducing failure and checking destination absence or integrity., da: En test der fremkalder fejl og kontrollerer destinationens fravær eller integritet.}
      - id: happy_path
        text: {es: Solo una prueba de éxito., en: Only a success test., da: Kun en succes-test.}
      - id: print_message
        text: {es: Un mensaje de impresión., en: A printed message., da: En udskrevet besked.}
    correct_option_ids: [failure_test]
    explanation: {es: La propiedad debe observarse bajo el fallo relevante., en: The property must be observed under the relevant failure., da: Egenskaben skal observeres under den relevante fejl.}

assessment_items:
  - id: dm857.m08.a01
    activity_type: pipeline_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña un importador de CSV sintético con columnas obligatorias, conversión numérica, validación de dominio,
        política explícita para filas inválidas y un resumen de calidad. Separa lectura, validación y análisis.
      en: >-
        Design a synthetic CSV importer with required columns, numeric conversion, domain validation, an explicit
        invalid-row policy, and a quality summary. Separate reading, validation, and analysis.
      da: >-
        Design en syntetisk CSV-importør med obligatoriske kolonner, numerisk konvertering, domænevalidering,
        eksplicit politik for ugyldige rækker og kvalitetsresumé. Adskil læsning, validering og analyse.
    accepted_answer_elements:
      - pathlib and explicit UTF-8/newline policy
      - csv library rather than naive split
      - separate structural, conversion, and semantic layers
      - row-level diagnostic context
      - explicit fail-fast or collect-errors policy
      - accepted plus rejected invariant
    rubric:
      - {criterion: input_contract, points: 2}
      - {criterion: layered_validation, points: 3}
      - {criterion: error_policy_and_context, points: 3}
      - {criterion: invariants_and_tests, points: 2}
    linked_objectives: [m08.o1, m08.o3, m08.o5, m08.o6, m08.o8]

  - id: dm857.m08.a02
    activity_type: debugging
    difficulty: advanced
    prompt:
      es: >-
        Analiza una función que envuelve toda su lógica en `try: ... except Exception: return []`. Explica cuatro
        riesgos, refactoriza la frontera de excepciones y propone pruebas que distingan archivo vacío de fallo oculto.
      en: >-
        Analyze a function wrapping all logic in `try: ... except Exception: return []`. Explain four risks,
        refactor the exception boundary, and propose tests distinguishing an empty file from a hidden failure.
      da: >-
        Analysér en funktion der omslutter al logik i `try: ... except Exception: return []`. Forklar fire risici,
        refaktorér exceptiongrænsen og design test der skelner tom fil fra skjult fejl.
    accepted_answer_elements:
      - broad catch hides programming defects
      - empty result becomes ambiguous
      - diagnostic traceback is lost
      - partial state may be hidden
      - catch only expected I/O or conversion failures
      - use distinct result or raised contextual exception
    rubric:
      - {criterion: risk_analysis, points: 4}
      - {criterion: specific_refactoring, points: 3}
      - {criterion: ambiguity_resolution, points: 2}
      - {criterion: tests, points: 1}
    linked_objectives: [m08.o5, m08.o6, m08.o7, m08.o8]

  - id: dm857.m08.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: >-
        Explica cómo una frontera de entrada transforma bytes externos en datos internos confiables. Incluye rutas,
        codificación, parsing, validación, excepciones y evidencia de pruebas.
      en: >-
        Explain how an input boundary transforms external bytes into trustworthy internal data. Include paths,
        encoding, parsing, validation, exceptions, and test evidence.
      da: >-
        Forklar hvordan en inputgrænse transformerer eksterne bytes til pålidelige interne data. Medtag stier,
        kodning, parsing, validering, undtagelser og testevidens.
    accepted_answer_elements:
      - path and access are validated
      - bytes are decoded explicitly
      - format is parsed with an appropriate tool
      - structure, conversion, and semantics are distinct
      - errors preserve location and cause
      - downstream analysis receives validated types
    rubric:
      - {criterion: complete_boundary_model, points: 4}
      - {criterion: validation_layers, points: 2}
      - {criterion: exception_strategy, points: 2}
      - {criterion: evidence_and_limits, points: 2}
    linked_objectives: [m08.o1, m08.o2, m08.o3, m08.o5, m08.o6, m08.o7]

