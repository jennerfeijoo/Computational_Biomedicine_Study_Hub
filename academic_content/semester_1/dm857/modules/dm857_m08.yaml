  - id: dm857.m08.q09
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {es: ¿Qué preserva `raise DomainError(...) from exc`?, en: What does `raise DomainError(...) from exc` preserve?, da: Hvad bevarer `raise DomainError(...) from exc`?}
