concepts:
  - id: paths-and-execution-context
    title:
      es: Rutas y contexto de ejecución
      en: Paths and execution context
      da: Stier og kørselskontekst
    body:
      es: >-
        Una ruta identifica una ubicación, pero no garantiza que exista, sea un archivo ni sea accesible.
        `Path` compone componentes sin concatenar separadores manualmente y permite consultar nombre, sufijo,
        padre y tipo. Una ruta relativa se interpreta respecto al directorio de trabajo actual, que puede cambiar
        entre terminal, IDE, pruebas y aplicación instalada. Las rutas deben recibirse o derivarse desde una base
        explícita, no depender de una ubicación accidental.
      en: >-
        A path identifies a location but does not guarantee existence, file type, or access. `Path` composes
        components portably and exposes name, suffix, parent, and type queries. Relative paths depend on the
        current working directory, which may differ across terminals, IDEs, tests, and installed applications.
      da: >-
        En sti identificerer en placering, men garanterer ikke eksistens, filtype eller adgang. Relative stier
        afhænger af arbejdsmappen og bør fortolkes ud fra en eksplicit base.
    linked_objectives: [m08.o1, m08.o8]

  - id: modes-encoding-and-context-managers
    title:
      es: Modos, codificación y gestores de contexto
      en: Modes, encodings, and context managers
      da: Tilstande, kodning og context managers
    body:
      es: >-
        `r` lee, `w` reemplaza o trunca, `a` añade y `x` exige que el archivo no exista. En texto debe
        declararse la codificación, normalmente `utf-8`. `with path.open(...) as handle` administra la vida
        del recurso y garantiza el cierre aun cuando una excepción interrumpa el bloque. El modo y la política
        de sobrescritura son parte del contrato porque una elección incorrecta puede destruir datos.
      en: >-
        `r` reads, `w` replaces or truncates, `a` appends, and `x` requires a new file. Text should declare
        an encoding, commonly `utf-8`. A `with` context manages resource lifetime and closes the file even when
        an exception occurs. Mode and overwrite policy belong in the contract.
      da: >-
        `r` læser, `w` erstatter, `a` tilføjer, og `x` kræver en ny fil. Tekst bør angive kodning.
        `with` styrer ressourcens levetid og sikrer lukning ved fejl.
    linked_objectives: [m08.o2, m08.o7]

  - id: reading-strategies-and-memory
    title:
      es: Estrategias de lectura y uso de memoria
      en: Reading strategies and memory use
      da: Læsestrategier og hukommelsesbrug
    body:
      es: >-
        `read()` carga todo el contenido, apropiado solo cuando el tamaño conocido es manejable. Recorrer el
        archivo procesa líneas incrementalmente y conserva contexto de número de línea. `readline()` permite
        control explícito, pero suele ser más verboso. `strip()` elimina espacios en ambos extremos y puede borrar
        información significativa; `rstrip('\n')` es más específico cuando solo se desea retirar el salto final.
      en: >-
        `read()` loads all content and fits files known to be manageable. Iterating over the handle processes
        lines incrementally and preserves line-number context. `strip()` removes whitespace from both ends and
        may erase meaningful information; `rstrip('\n')` is more specific for trailing newlines.
      da: >-
        `read()` indlæser hele filen. Linjeiteration er inkrementel og bevarer linjekontekst. `strip()` kan
        fjerne betydningsfuldt whitespace og bør bruges med et eksplicit formål.
    linked_objectives: [m08.o3, m08.o5]

  - id: delimited-data-and-csv
    title:
      es: Datos delimitados y CSV
      en: Delimited data and CSV
      da: Afgrænsede data og CSV
    body:
      es: >-
        CSV no es simplemente texto separado por comas: los campos pueden contener delimitadores, comillas y
        saltos. `csv.reader` procesa filas y `csv.DictReader` relaciona cabeceras con valores. El delimitador,
        dialecto, presencia de cabecera y política de campos adicionales o ausentes deben definirse. Usar
        `split(',')` para CSV real es frágil y puede desplazar columnas silenciosamente.
      en: >-
        CSV is not merely comma-split text: fields may contain delimiters, quotes, and newlines. `csv.reader`
        parses rows and `csv.DictReader` maps headers to values. Delimiter, dialect, header presence, and policy
        for extra or missing fields must be defined. Naive `split(',')` is fragile.
      da: >-
        CSV er ikke blot tekst delt ved komma. Felter kan indeholde separatorer og citationstegn. Brug CSV-værktøjer
        og definér dialect, header og politik for manglende eller ekstra felter.
    linked_objectives: [m08.o3, m08.o5]

  - id: writing-representation-and-atomicity
    title:
      es: Escritura, representación y protección del destino
      en: Writing, representation, and destination protection
      da: Skrivning, repræsentation og beskyttelse af destination
    body:
      es: >-
        La lógica de cálculo debe producir valores estructurados y una capa separada convertirlos en texto o filas.
        `write` espera cadenas y no añade saltos automáticamente; `writelines` tampoco inserta separadores.
        `csv.writer` gestiona escapado. La escritura debe definir orden de columnas, formato de ausentes, nueva línea,
        sobrescritura y comportamiento si falla a mitad. Para resultados importantes puede escribirse primero a un
        archivo temporal y reemplazar el destino solo tras completar y validar la salida.
      en: >-
        Computation should produce structured values, while a separate layer converts them to text or rows.
        `write` expects strings and adds no newline; `writelines` adds no separators. Writing must define column order,
        missing-value representation, newline policy, overwrite behavior, and partial-failure handling.
      da: >-
        Beregning bør producere strukturerede værdier, mens et separat lag skriver tekst eller rækker. Outputformat,
        kolonnerækkefølge, fravær og overskrivning skal være eksplicitte.
    linked_objectives: [m08.o4, m08.o8]

  - id: validation-layers
    title:
      es: Capas de validación
      en: Validation layers
      da: Valideringslag
    body:
      es: >-
        La validación estructural comprueba cabeceras, columnas, cantidad de campos y presencia. La conversión
        transforma texto en tipos como `int` o `float` y puede producir `ValueError`. La validación semántica
        comprueba rangos, categorías y coherencia entre campos. Separar estas capas mejora los diagnósticos y evita
        confundir un formato incorrecto con un valor fuera del dominio. Debe conservarse número de línea, nombre de
        campo y valor original.
      en: >-
        Structural validation checks headers, columns, field count, and presence. Conversion turns text into types
        and may raise `ValueError`. Semantic validation checks ranges, categories, and cross-field consistency.
        Separate layers improve diagnostics and preserve line number, field name, and original value.
      da: >-
        Strukturel validering kontrollerer form, konvertering ændrer tekst til typer, og semantisk validering
        kontrollerer domænet. Bevar linje, felt og original værdi i fejlmeddelelser.
    linked_objectives: [m08.o5, m08.o8]

  - id: exception-specificity-and-propagation
    title:
      es: Especificidad, manejo y propagación de excepciones
      en: Exception specificity, handling, and propagation
      da: Specificitet, håndtering og propagation af undtagelser
    body:
      es: >-
        Una excepción interrumpe el flujo normal y busca un manejador compatible. `FileNotFoundError`,
        `PermissionError`, `UnicodeDecodeError`, `ValueError` y `OSError` describen fallos diferentes. Solo debe
        capturarse aquello que puede resolverse, traducirse o enriquecer con contexto. Capturar `Exception` de forma
        amplia puede ocultar defectos de programación y perder el traceback. Lo inesperado debe propagarse.
      en: >-
        An exception interrupts normal control flow and seeks a compatible handler. Different exception types
        describe different failures. Catch only what can be resolved, translated, or enriched with context. Broadly
        catching `Exception` may hide programming defects and destroy diagnostic tracebacks.
      da: >-
        Undtagelser afbryder normal kontrolstrøm. Fang kun fejl, som kan håndteres eller beriges med kontekst;
        uventede fejl bør propagere med traceback.
    linked_objectives: [m08.o6, m08.o8]

  - id: try-else-finally-raise-and-chaining
    title:
      es: Flujo con `try`, `else`, `finally`, `raise` y encadenamiento
      en: Flow with `try`, `else`, `finally`, `raise`, and chaining
      da: Kontrolflow med `try`, `else`, `finally`, `raise` og chaining
    body:
      es: >-
        El bloque `try` debe contener la operación que puede fallar, no código innecesario. `except` maneja tipos
        específicos; `else` ejecuta el camino de éxito y evita capturar errores de operaciones posteriores;
        `finally` ejecuta limpieza independientemente del resultado. `raise` comunica una violación del contrato.
        `raise NewError(...) from original` conserva la causa al traducir una excepción de bajo nivel a una del dominio.
      en: >-
        The `try` block should contain the operation expected to fail, not unrelated code. `except` handles specific
        types; `else` is the success path; `finally` performs cleanup. `raise` reports a contract violation, and
        `raise NewError(...) from original` preserves causal context when translating errors.
      da: >-
        Hold `try` smal. `except` håndterer specifikke typer, `else` er succesvejen, `finally` rydder op, og
        `raise ... from ...` bevarer den oprindelige årsag.
    linked_objectives: [m08.o6, m08.o7]

worked_examples:
  - id: dm857.m08.e01
    title:
      es: Leer mediciones sintéticas línea por línea con contexto
      en: Read synthetic measurements line by line with context
      da: Læs syntetiske målinger linje for linje med kontekst
    problem:
      es: Leer un archivo de una medición por línea, ignorar líneas vacías y reportar la línea exacta de una conversión inválida.
      en: Read one synthetic measurement per line, skip empty lines, and report the exact line of invalid conversion.
      da: Læs én syntetisk måling pr. linje, spring tomme linjer over og rapportér den præcise linje ved ugyldig konvertering.
    assumptions:
      - input is UTF-8 text
      - each non-empty line should contain one floating-point value
    code: |-
      from pathlib import Path

      def read_values(path: Path) -> list[float]:
          values = []
          with path.open("r", encoding="utf-8") as handle:
              for line_number, raw in enumerate(handle, start=1):
                  text = raw.strip()
                  if not text:
                      continue
                  try:
                      value = float(text)
                  except ValueError as exc:
                      raise ValueError(
                          f"line {line_number}: invalid number {text!r}"
                      ) from exc
                  values.append(value)
          return values
    expected_output: Returns a list of floats or raises a contextual ValueError.
    validation:
      - empty file returns an empty list
      - blank lines are skipped according to the contract
      - invalid text reports line number and original value
      - the file closes after success or failure
    explanation:
      es: La lectura incremental, el contexto de línea y el encadenamiento conservan evidencia diagnóstica.
      en: Incremental reading, line context, and exception chaining preserve diagnostic evidence.
      da: Inkrementel læsning, linjekontekst og chaining bevarer diagnostisk evidens.
    limitations:
      - semantic range validation is not included
    linked_objectives: [m08.o2, m08.o3, m08.o5, m08.o6, m08.o7]

  - id: dm857.m08.e02
    title:
      es: Leer CSV sin dividir manualmente
      en: Read CSV without manual splitting
      da: Læs CSV uden manuel opdeling
    problem:
      es: Leer registros sintéticos con cabecera `sample_id,value`, validar columnas y convertir el valor.
      en: Read synthetic records with header `sample_id,value`, validate columns, and convert the value.
      da: Læs syntetiske poster med header `sample_id,value`, validér kolonner og konvertér værdien.
    code: |-
      import csv
      from pathlib import Path

      def read_records(path: Path) -> list[dict[str, object]]:
          records = []
          with path.open("r", encoding="utf-8", newline="") as handle:
              reader = csv.DictReader(handle)
              required = {"sample_id", "value"}
              if reader.fieldnames is None or not required <= set(reader.fieldnames):
                  raise ValueError("missing required CSV columns")

              for row_number, row in enumerate(reader, start=2):
                  sample_id = (row["sample_id"] or "").strip()
                  if not sample_id:
                      raise ValueError(f"row {row_number}: empty sample_id")
                  try:
                      value = float(row["value"])
                  except (TypeError, ValueError) as exc:
                      raise ValueError(f"row {row_number}: invalid value") from exc
                  records.append({"sample_id": sample_id, "value": value})
          return records
    expected_output: A validated list of dictionaries or a contextual ValueError.
    validation:
      - quoted delimiters remain inside fields
      - missing headers fail before row analysis
      - row number refers to the physical CSV row including header
    explanation:
      es: `DictReader` conserva el significado de las columnas y evita errores de desplazamiento por comillas.
      en: `DictReader` preserves column meaning and avoids quote-related field shifts.
      da: `DictReader` bevarer kolonnebetydning og undgår forskydning på grund af citationstegn.
    limitations:
      - duplicate sample identifiers require a separate policy
    linked_objectives: [m08.o3, m08.o5, m08.o6]

  - id: dm857.m08.e03
    title:
      es: Separar cálculo y escritura de un resumen
      en: Separate summary computation from writing
      da: Adskil beregning og skrivning af et resumé
    problem:
      es: Calcular un resumen en memoria y escribirlo a un archivo nuevo sin sobrescribir uno existente.
      en: Compute a summary in memory and write it to a new file without overwriting an existing file.
      da: Beregn et resumé i hukommelsen og skriv det til en ny fil uden at overskrive en eksisterende fil.
    code: |-
      from pathlib import Path

      def summarize(values: list[float]) -> dict[str, float | int]:
          if not values:
              raise ValueError("values must be non-empty")
          return {
              "count": len(values),
              "mean": sum(values) / len(values),
          }

      def write_summary(path: Path, summary: dict[str, float | int]) -> None:
          lines = [
              f"count\t{summary['count']}\n",
              f"mean\t{summary['mean']:.6g}\n",
          ]
          with path.open("x", encoding="utf-8", newline="") as handle:
              handle.writelines(lines)
    expected_output: A new UTF-8 text file with two tab-separated lines.
    validation:
      - empty input fails before any file is created
      - an existing destination raises FileExistsError
      - calculation can be unit-tested without file access
    explanation:
      es: La función pura de resumen se prueba de forma aislada; la función de escritura contiene el efecto secundario.
      en: The pure summary function is tested independently; the writer contains the side effect.
      da: Den rene resumefunktion testes isoleret, mens skrivefunktionen indeholder sideeffekten.
    limitations:
      - a temporary-file replacement strategy is preferable for critical outputs
    linked_objectives: [m08.o4, m08.o6, m08.o8]

practice_exercises:
  - id: dm857.m08.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: ¿Qué ocurre al abrir un archivo existente con modo `w`?
      en: What happens when an existing file is opened with mode `w`?
      da: Hvad sker der, når en eksisterende fil åbnes med `w`?
    reference_solution:
      es: Se trunca antes de escribir; su contenido previo se pierde.
      en: It is truncated before writing; previous content is lost.
      da: Den afkortes før skrivning, og tidligere indhold går tabt.
    linked_objectives: [m08.o2]

  - id: dm857.m08.p02
    activity_type: method_selection
    difficulty: foundational
    prompt:
      es: Elige entre `read()`, iteración por líneas y `csv.DictReader` para una nota corta, un archivo enorme de una observación por línea y un CSV con campos entrecomillados.
      en: Choose among `read()`, line iteration, and `csv.DictReader` for a short note, a huge one-observation-per-line file, and quoted CSV.
      da: Vælg mellem `read()`, linjeiteration og `csv.DictReader` til en kort note, en stor linjefil og CSV med citationstegn.
    reference_solution:
      es: `read()`, iteración por líneas y `csv.DictReader`, respectivamente.
      en: `read()`, line iteration, and `csv.DictReader`, respectively.
      da: `read()`, linjeiteration og `csv.DictReader`.
    linked_objectives: [m08.o3]

  - id: dm857.m08.p03
    activity_type: debugging
    difficulty: intermediate
    prompt:
      es: Corrige un lector CSV que usa `line.strip().split(',')` y falla cuando un campo contiene una coma entre comillas.
      en: Fix a CSV reader using `line.strip().split(',')` that fails when a quoted field contains a comma.
      da: Ret en CSV-læser med `line.strip().split(',')`, som fejler ved komma i et citeret felt.
    reference_solution:
      es: Usar `csv.reader` o `csv.DictReader` con `newline=''` y el dialecto correspondiente.
      en: Use `csv.reader` or `csv.DictReader` with `newline=''` and the appropriate dialect.
      da: Brug `csv.reader` eller `csv.DictReader` med `newline=''` og korrekt dialect.
    linked_objectives: [m08.o3, m08.o5]

  - id: dm857.m08.p04
    activity_type: error_classification
    difficulty: intermediate
    prompt:
      es: Clasifica: archivo ausente, UTF-8 inválido, texto `abc` donde se esperaba float y valor `-4` fuera del dominio permitido.
      en: Classify: missing file, invalid UTF-8, text `abc` where float was expected, and value `-4` outside the allowed domain.
      da: Klassificér manglende fil, ugyldig UTF-8, teksten `abc` som float og værdien `-4` uden for domænet.
    reference_solution:
      es: `FileNotFoundError`, `UnicodeDecodeError`, error de conversión `ValueError` y error semántico definido por el programa.
      en: `FileNotFoundError`, `UnicodeDecodeError`, conversion `ValueError`, and a program-defined semantic error.
      da: `FileNotFoundError`, `UnicodeDecodeError`, konverterings-`ValueError` og programdefineret semantisk fejl.
    linked_objectives: [m08.o5, m08.o6]

  - id: dm857.m08.p05
    activity_type: refactoring
    difficulty: intermediate
    prompt:
      es: Refactoriza una función que lee, calcula, imprime y escribe para separar funciones puras de efectos secundarios.
      en: Refactor a function that reads, computes, prints, and writes to separate pure functions from side effects.
      da: Refaktorér en funktion der læser, beregner, udskriver og skriver, så rene funktioner adskilles fra sideeffekter.
    accepted_answer_elements:
      - reader returns validated data
      - pure analyzer accepts data and returns a summary
      - formatter or writer receives the summary
      - errors are handled at an explicit boundary
    linked_objectives: [m08.o4, m08.o6]

  - id: dm857.m08.p06
    activity_type: test_design
    difficulty: advanced
    prompt:
      es: Diseña pruebas de fallos para un importador de CSV y explica qué debe verificarse además del tipo de excepción.
      en: Design failure tests for a CSV importer and explain what should be checked beyond exception type.
      da: Design fejltest til en CSV-importør og forklar hvad der skal kontrolleres ud over exceptiontypen.
    accepted_answer_elements:
      - missing path
      - wrong encoding
      - missing header
      - short and extra rows
      - invalid numeric conversion
      - semantically invalid value
      - line or row context in message
      - resource closure and no partial output
    linked_objectives: [m08.o5, m08.o6, m08.o8]

objective_bank:
  - id: dm857.m08.q01
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Qué modo evita sobrescribir un archivo existente?, en: Which mode prevents overwriting an existing file?, da: Hvilken tilstand forhindrer overskrivning af en eksisterende fil?}
    options:
      - id: x_mode
        text: {es: `x`, en: `x`, da: `x`}
      - id: w_mode
        text: {es: `w`, en: `w`, da: `w`}
      - id: a_mode
        text: {es: `a`, en: `a`, da: `a`}
    correct_option_ids: [x_mode]
    explanation: {es: `x` exige que el destino no exista., en: `x` requires a non-existing destination., da: `x` kræver at destinationen ikke findes.}
  - id: dm857.m08.q02
    activity_type: true_false
    difficulty: foundational
