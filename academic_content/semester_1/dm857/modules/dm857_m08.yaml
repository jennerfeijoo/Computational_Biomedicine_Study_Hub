  - id: dm857.m08.q05
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué herramienta es apropiada para CSV con comillas?, en: Which tool is appropriate for quoted CSV?, da: Hvilket værktøj er passende til CSV med citationstegn?}
    options:
      - id: csv_reader
        text: {es: `csv.reader` o `csv.DictReader`., en: `csv.reader` or `csv.DictReader`., da: `csv.reader` eller `csv.DictReader`.}
      - id: split_comma
        text: {es: `split(',')` siempre., en: Always `split(',')`., da: Altid `split(',')`.}
      - id: character_loop
        text: {es: Un bucle por caracteres sin estado., en: A stateless character loop., da: En tilstandsløs tegnløkke.}
    correct_option_ids: [csv_reader]
    explanation: {es: La biblioteca gestiona dialecto y escapado., en: The library handles dialect and escaping., da: Biblioteket håndterer dialect og escaping.}
  - id: dm857.m08.q06
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Cuál es validación semántica?, en: Which is semantic validation?, da: Hvad er semantisk validering?}
    options:
      - id: range_check
        text: {es: Comprobar que un valor esté en un rango permitido., en: Check that a value lies in an allowed range., da: Kontrollér at en værdi ligger i et tilladt interval.}
      - id: header_check
        text: {es: Comprobar que exista la cabecera., en: Check that a header exists., da: Kontrollér at en header findes.}
      - id: float_conversion
        text: {es: Convertir texto a `float`., en: Convert text to `float`., da: Konvertér tekst til `float`.}
    correct_option_ids: [range_check]
    explanation: {es: El rango pertenece al significado del dato., en: The range belongs to data meaning., da: Intervallet tilhører dataens betydning.}
  - id: dm857.m08.q07
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Capturar `Exception` ampliamente es la mejor forma de hacer robusto un importador., en: Broadly catching `Exception` is the best way to make an importer robust., da: Bred fangst af `Exception` er den bedste måde at gøre en importør robust.}
    correct_answer: false
    explanation: {es: Puede ocultar defectos inesperados y perder diagnóstico., en: It may hide unexpected defects and diagnostics., da: Det kan skjule uventede fejl og diagnostik.}
  - id: dm857.m08.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Para qué sirve `else` en una estructura `try`?, en: What is `else` for in a `try` statement?, da: Hvad bruges `else` til i en `try`-struktur?}
    options:
      - id: success_path
        text: {es: Ejecutar código solo si el `try` terminó sin excepción., en: Run code only when `try` completed without exception., da: Kør kode kun når `try` afsluttede uden undtagelse.}
      - id: cleanup
        text: {es: Ejecutar siempre limpieza., en: Always run cleanup., da: Kør altid oprydning.}
      - id: catch_all
        text: {es: Capturar cualquier error., en: Catch any error., da: Fang enhver fejl.}
