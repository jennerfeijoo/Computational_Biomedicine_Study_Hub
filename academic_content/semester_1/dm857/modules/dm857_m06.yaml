metadata:
  title:
    es: Listas, tuplas, mutabilidad y procesamiento de secuencias
    en: Lists, tuples, mutability, and sequence processing
    da: Lister, tupler, muterbarhed og sekvensbehandling
  summary:
    es: >-
      Uso de listas y tuplas para representar colecciones ordenadas: acceso, slicing, mutabilidad,
      reasignación, aliasing, copias superficiales, métodos, recorridos, búsqueda, agregación,
      colecciones vacías, listas anidadas, matrices rectangulares, desempaquetado y retorno múltiple.
    en: >-
      Use of lists and tuples for ordered collections: access, slicing, mutability, reassignment,
      aliasing, shallow copies, methods, traversal, search, aggregation, empty collections,
      nested lists, rectangular matrices, unpacking, and multiple return values.
    da: >-
      Brug af lister og tupler til ordnede samlinger: adgang, slicing, muterbarhed, gentildeling,
      aliasing, overfladiske kopier, metoder, gennemløb, søgning, aggregering, tomme samlinger,
      indlejrede lister, rektangulære matricer, udpakning og flere returværdier.
  prerequisites: [dm857.m01, dm857.m02, dm857.m03, dm857.m04, dm857.m05]
  official_learning_outcomes: [dm857.lo02, dm857.lo03, dm857.lo05]
  estimated_study_hours: 18
  difficulty: intermediate

