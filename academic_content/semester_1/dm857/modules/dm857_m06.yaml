concepts:
  - id: ordered-sequences
    title:
      es: Secuencias ordenadas, índices y slices
      en: Ordered sequences, indices, and slices
      da: Ordnede sekvenser, indeks og slices
    body:
      es: >-
        Listas y tuplas preservan orden y admiten `len`, índices, slices, pertenencia e iteración. El índice
        representa posición, no valor. Un slice crea una secuencia nueva del mismo tipo, pero la copia es superficial:
        los objetos internos siguen siendo compartidos. Las listas se escriben con corchetes; una tupla se define por
        comas, con o sin paréntesis según el contexto.
      en: >-
        Lists and tuples preserve order and support `len`, indexing, slicing, membership, and iteration. An index
        denotes position rather than value. A slice creates a new sequence of the same type, but the copy is shallow:
        nested objects remain shared. Lists use brackets; tuples are defined by commas, with parentheses depending on context.
      da: >-
        Lister og tupler bevarer rækkefølge og understøtter `len`, indeks, slices, medlemskab og iteration. Et indeks
        angiver position. Et slice skaber en ny, men overfladisk, sekvens. Tupler defineres af kommaer.
    linked_objectives: [m06.o1, m06.o6]

  - id: mutation-reassignment-aliasing
    title:
      es: Mutación, reasignación, identidad y aliasing
      en: Mutation, reassignment, identity, and aliasing
      da: Mutation, gentildeling, identitet og aliasing
    body:
      es: >-
        Mutar cambia el contenido de un objeto existente; reasignar cambia qué objeto referencia un nombre. Si
        `a = b` y `b` es una lista, ambos nombres apuntan al mismo objeto: una mutación mediante uno es visible mediante
        el otro. Eso es aliasing. `a == b` compara valor; `a is b` compara identidad. La identidad rara vez debe usarse
        para comparar contenido, salvo casos como `x is None`.
      en: >-
        Mutation changes the contents of an existing object; reassignment changes which object a name references.
        If `a = b` and `b` is a list, both names refer to the same object, so mutation through either is visible through
        the other. This is aliasing. `==` compares value; `is` compares identity. Identity is rarely appropriate for
        content comparison except cases such as `x is None`.
      da: >-
        Mutation ændrer et eksisterende objekt; gentildeling ændrer hvilket objekt et navn refererer til. `a = b`
        skaber aliasing for en liste. `==` sammenligner værdi; `is` sammenligner identitet.
    linked_objectives: [m06.o2, m06.o8]

  - id: shallow-copy-nesting
    title:
      es: Copias superficiales y objetos anidados
      en: Shallow copies and nested objects
      da: Overfladiske kopier og indlejrede objekter
    body:
      es: >-
        `a[:]`, `list(a)` y `a.copy()` crean una lista exterior nueva, pero no duplican recursivamente los
        elementos. Si esos elementos son listas, ambas copias comparten las listas internas. Para estructuras anidadas
        independientes se requiere construirlas correctamente o realizar una copia profunda, cuya semántica y coste
        deben justificarse. La multiplicación `[[0]*m]*n` también comparte la misma fila repetida.
      en: >-
        `a[:]`, `list(a)`, and `a.copy()` create a new outer list but do not recursively duplicate elements. If elements
        are lists, both outer copies share those inner lists. Independent nested structures require correct construction
        or a justified deep copy. Multiplication such as `[[0]*m]*n` also repeats aliases to the same row.
      da: >-
        `a[:]`, `list(a)` og `a.copy()` skaber en ny ydre liste, men deler indre lister. Uafhængige indlejrede
        strukturer kræver korrekt konstruktion eller en begrundet dyb kopi. `[[0]*m]*n` gentager aliaser til samme række.
    linked_objectives: [m06.o2, m06.o6, m06.o8]

  - id: list-methods-effects
    title:
      es: Métodos de listas, efectos y retornos
      en: List methods, effects, and returns
      da: Listemetoder, effekter og returværdier
    body:
      es: >-
        `append` añade un objeto como un elemento; `extend` incorpora los elementos de un iterable. `insert` añade
        en una posición; `remove` elimina la primera coincidencia y falla si no existe; `pop` elimina y retorna;
        `clear` vacía. La mayoría mutan y retornan `None`, por lo que `items = items.append(x)` destruye el enlace útil.
        `sorted(items)` retorna una lista nueva, mientras `items.sort()` muta y retorna `None`.
      en: >-
        `append` adds one object as one element; `extend` adds the elements of an iterable. `insert` adds at a
        position; `remove` deletes the first match and fails if absent; `pop` removes and returns; `clear` empties.
        Most mutate and return `None`, so `items = items.append(x)` loses the list binding. `sorted(items)` returns a
        new list, while `items.sort()` mutates and returns `None`.
      da: >-
        `append` tilføjer ét objekt; `extend` tilføjer elementer. `remove` fjerner første match; `pop` fjerner og
        returnerer. De fleste metoder muterer og returnerer `None`. `sorted` skaber ny liste; `sort` muterer.
    linked_objectives: [m06.o3, m06.o8]

  - id: traversal-construction-zip
    title:
      es: Recorrido, construcción, `enumerate` y `zip`
      en: Traversal, construction, `enumerate`, and `zip`
      da: Gennemløb, konstruktion, `enumerate` og `zip`
    body:
      es: >-
        Se recorren valores directamente cuando no se necesitan posiciones; `enumerate` añade índice y `zip` recorre
        varias secuencias en paralelo hasta que termina la más corta. Para transformar datos suele ser más seguro
        construir una lista nueva que eliminar o insertar en la misma lista durante el recorrido. Mutar la colección
        iterada puede cambiar índices y provocar elementos omitidos.
      en: >-
        Traverse values directly when positions are unnecessary; `enumerate` adds indices and `zip` traverses several
        sequences in parallel until the shortest ends. For transformations, building a new list is usually safer than
        deleting or inserting into the same list during traversal, which can shift indices and skip elements.
      da: >-
        Gennemløb værdier direkte uden behov for positioner; `enumerate` tilføjer indeks og `zip` stopper med den
        korteste sekvens. Byg normalt en ny liste frem for at mutere den gennemløbne samling.
    linked_objectives: [m06.o4, m06.o8]

  - id: aggregation-empty-policy
    title:
      es: Agregación y política para colecciones vacías
      en: Aggregation and empty-collection policy
      da: Aggregering og politik for tomme samlinger
    body:
      es: >-
        `sum` y `len` permiten calcular una media solo si la colección no está vacía. `min` y `max` generan
        `ValueError` sin elementos salvo que se use un `default` apropiado. Una búsqueda puede retornar valor, índice,
        booleano o `None`; el contrato debe elegir una opción consistente. Inicializar un máximo con 0 es incorrecto
        cuando todos los valores podrían ser negativos.
      en: >-
        `sum` and `len` support a mean only for non-empty input. `min` and `max` raise `ValueError` without elements
        unless an appropriate `default` is used. Search may return a value, index, Boolean, or `None`; the contract
        should choose consistently. Initializing a maximum to 0 fails when all values may be negative.
      da: >-
        `sum` og `len` giver kun mening for middelværdi ved ikke-tomt input. `min` og `max` fejler uden elementer.
        Søgekontrakter skal definere fravær. Maksimum må ikke initialiseres vilkårligt til 0.
    linked_objectives: [m06.o5, m06.o8]

  - id: nested-lists-shape
    title:
      es: Listas anidadas, forma y matrices rectangulares
      en: Nested lists, shape, and rectangular matrices
      da: Indlejrede lister, form og rektangulære matricer
    body:
      es: >-
        Una lista de listas no es automáticamente una matriz: las filas pueden tener longitudes diferentes. Una operación
        matricial debe validar rectangularidad, dimensiones compatibles y significado de filas y columnas. El acceso
        `matrix[i][j]` realiza dos indexaciones. Construir con comprensión `[[0 for _ in range(cols)] for _ in range(rows)]`
        crea filas independientes, a diferencia de `[[0]*cols]*rows`.
      en: >-
        A list of lists is not automatically a matrix: rows may have different lengths. Matrix-like operations should
        validate rectangularity, compatible dimensions, and row/column meaning. Access `matrix[i][j]` performs two
        index operations. A nested comprehension creates independent rows, unlike `[[0]*cols]*rows`.
      da: >-
        En liste af lister er ikke automatisk en matrix; rækker kan have forskellig længde. Validér rektangularitet og
        dimensioner. En indlejret comprehension skaber uafhængige rækker, i modsætning til listemultiplikation.
    linked_objectives: [m06.o6, m06.o8]

  - id: tuples-unpacking-records
    title:
      es: Tuplas, desempaquetado y registros pequeños
      en: Tuples, unpacking, and small records
      da: Tupler, udpakning og små poster
    body:
      es: >-
        Una tupla representa una colección ordenada e inmutable y es útil para resultados pequeños con estructura fija.
        `a, b = pair` exige exactamente dos elementos; el desempaquetado extendido `head, *middle, tail` admite longitud
        variable. Una función que parece retornar varios valores en realidad retorna una tupla. Cuando los campos necesitan
        nombres persistentes o validación compleja, una estructura con nombres puede ser más clara.
      en: >-
        A tuple is an ordered immutable collection useful for small fixed-structure results. `a, b = pair` requires
        exactly two elements; extended unpacking permits variable length. A function appearing to return multiple values
        actually returns one tuple. Named structures may be clearer when fields need persistent names or complex validation.
      da: >-
        En tuple er ordnet og uforanderlig og passer til små resultater med fast struktur. Udpakning kræver passende antal
        elementer. Flere returværdier er faktisk én tuple. Navngivne strukturer kan være klarere ved komplekse felter.
    linked_objectives: [m06.o7]

worked_examples:
  - id: dm857.m06.e01
    title:
      es: Transformar valores sin modificar la entrada
      en: Transform values without mutating the input
      da: Transformér værdier uden at mutere input
    problem:
      es: Convertir mediciones sintéticas no negativas a una escala multiplicada por un factor, preservando la lista original.
      en: Scale synthetic non-negative measurements by a factor while preserving the original list.
      da: Skalér syntetiske ikke-negative målinger med en faktor og bevar den oprindelige liste.
    assumptions:
      - values is a sequence of numbers
      - factor is numeric
      - negative values are invalid for this teaching rule
    reasoning:
      es:
        - Validar cada valor antes de producir salida.
        - Construir una lista nueva.
        - No modificar la colección recibida.
      en:
        - Validate each value before producing output.
        - Construct a new list.
        - Do not mutate the supplied collection.
      da:
        - Validér hver værdi før output.
        - Konstruér en ny liste.
        - Mutér ikke input.
    code: |-
      def scale_nonnegative(values, factor):
          """Return scaled values; reject negative input and do not mutate `values`."""
          result = []
          for value in values:
              if value < 0:
                  raise ValueError("values must be non-negative")
              result.append(value * factor)
          return result

      original = [1.0, 2.5, 4.0]
      scaled = scale_nonnegative(original, 2)
      print(original, scaled)
    expected_output: "[1.0, 2.5, 4.0] [2.0, 5.0, 8.0]"
    validation:
      - original remains unchanged
      - empty input returns an empty list
      - negative input raises ValueError
    explanation:
      es: Construir una salida nueva elimina aliasing accidental y hace explícito el contrato sin mutación.
      en: Building a new output removes accidental aliasing and makes the non-mutating contract explicit.
      da: En ny outputliste fjerner utilsigtet aliasing og gør kontrakten uden mutation tydelig.
    limitations:
      - the rule about negative values is synthetic and purpose-specific
    linked_objectives: [m06.o2, m06.o4, m06.o8]

  - id: dm857.m06.e02
    title:
      es: Demostrar una copia superficial
      en: Demonstrate a shallow copy
      da: Demonstrér en overfladisk kopi
    problem:
      es: Explicar por qué copiar una lista exterior no independiza sus listas internas.
      en: Explain why copying an outer list does not make its inner lists independent.
      da: Forklar hvorfor kopiering af en ydre liste ikke gør de indre lister uafhængige.
    assumptions:
      - rows is a list containing mutable lists
    reasoning:
      es:
        - Crear una copia exterior con slicing.
        - Comparar identidad de la lista exterior y de una fila interna.
        - Mutar una fila y observar ambas estructuras.
      en:
        - Create an outer copy using slicing.
        - Compare identity of the outer list and one inner row.
        - Mutate a row and observe both structures.
      da:
        - Opret en ydre kopi med slicing.
        - Sammenlign identitet for ydre liste og indre række.
        - Mutér en række og observer begge strukturer.
    code: |-
      rows = [[1, 2], [3, 4]]
      copied = rows[:]
      copied[0].append(99)
      print(rows)
      print(rows is copied, rows[0] is copied[0])
    expected_output: |-
      [[1, 2, 99], [3, 4]]
      False True
    validation:
      - outer lists have different identity
      - first inner list has shared identity
      - mutation is visible through both structures
    explanation:
      es: El slice duplica referencias de elementos; no clona recursivamente los objetos internos.
      en: The slice duplicates element references rather than recursively cloning inner objects.
      da: Slicet kopierer elementreferencer og kloner ikke indre objekter rekursivt.
    limitations:
      - deep copying is not automatically the correct semantic choice
    linked_objectives: [m06.o2, m06.o6, m06.o8]

  - id: dm857.m06.e03
    title:
      es: Resumir una secuencia con política vacía explícita
      en: Summarize a sequence with an explicit empty policy
      da: Opsummér en sekvens med eksplicit tom-politik
    problem:
      es: Retornar cantidad, mínimo, máximo y media; generar error para entrada vacía.
      en: Return count, minimum, maximum, and mean; raise an error for empty input.
      da: Returnér antal, minimum, maksimum og middelværdi; rejs fejl ved tomt input.
    assumptions:
      - values contains comparable numeric elements
      - all values use compatible units
    reasoning:
      es:
        - Verificar la precondición antes de `min`, `max` o división.
        - Calcular agregados una sola vez.
        - Retornar una tupla con orden documentado.
      en:
        - Check the precondition before `min`, `max`, or division.
        - Compute aggregates once.
        - Return a tuple with documented order.
      da:
        - Kontrollér forudsætningen før `min`, `max` eller division.
        - Beregn aggregater én gang.
        - Returnér en tuple med dokumenteret rækkefølge.
    code: |-
      def summarize(values):
          """Return `(count, minimum, maximum, mean)` for non-empty numeric input."""
          if not values:
              raise ValueError("values must be non-empty")
          count = len(values)
          return count, min(values), max(values), sum(values) / count

      count, low, high, mean = summarize([-2, 1, 4])
      print(count, low, high, mean)
    expected_output: "3 -2 4 1.0"
    validation:
      - one element returns identical min, max, and mean
      - all-negative values are handled correctly
      - empty input raises ValueError
    explanation:
      es: La validación evita errores ambiguos y el retorno estructurado permite pruebas directas.
      en: Validation prevents ambiguous failures and the structured return enables direct testing.
      da: Validering undgår tvetydige fejl, og struktureret retur muliggør direkte test.
    limitations:
      - the tuple relies on documented positional meaning
    linked_objectives: [m06.o5, m06.o7, m06.o8]

practice_exercises:
  - id: dm857.m06.p01
    activity_type: code_tracing
    difficulty: foundational
    prompt:
      es: Traza `a=[1,2]`, `b=a`, `b.append(3)`, `b=[9]`. Indica el valor final de `a` y `b`.
      en: Trace `a=[1,2]`, `b=a`, `b.append(3)`, `b=[9]`. State final `a` and `b`.
      da: Gennemgå `a=[1,2]`, `b=a`, `b.append(3)`, `b=[9]`. Angiv endelig `a` og `b`.
    reference_solution:
      es: Tras `append`, ambos observan `[1,2,3]`; la reasignación final hace `b=[9]` y deja `a=[1,2,3]`.
      en: After `append`, both observe `[1,2,3]`; final reassignment makes `b=[9]` while `a` remains `[1,2,3]`.
      da: Efter `append` ser begge `[1,2,3]`; sidste gentildeling giver `b=[9]`, mens `a` forbliver `[1,2,3]`.
    linked_objectives: [m06.o2]

  - id: dm857.m06.p02
    activity_type: debugging
    difficulty: foundational
    prompt:
      es: Corrige `items = items.append(value)` y explica el error.
      en: Correct `items = items.append(value)` and explain the error.
      da: Ret `items = items.append(value)` og forklar fejlen.
    reference_solution:
      es: Usar `items.append(value)` sin asignación; `append` muta la lista y retorna `None`.
      en: Use `items.append(value)` without assignment; `append` mutates the list and returns `None`.
      da: Brug `items.append(value)` uden tildeling; `append` muterer og returnerer `None`.
    linked_objectives: [m06.o3]

  - id: dm857.m06.p03
    activity_type: comparison
    difficulty: intermediate
    prompt:
      es: Explica la diferencia entre `append([2,3])` y `extend([2,3])` sobre `[1]`.
      en: Explain the difference between `append([2,3])` and `extend([2,3])` on `[1]`.
      da: Forklar forskellen mellem `append([2,3])` og `extend([2,3])` på `[1]`.
    reference_solution:
      es: `append` produce `[1,[2,3]]`; `extend` produce `[1,2,3]`.
      en: `append` produces `[1,[2,3]]`; `extend` produces `[1,2,3]`.
      da: `append` giver `[1,[2,3]]`; `extend` giver `[1,2,3]`.
    linked_objectives: [m06.o3]

  - id: dm857.m06.p04
    activity_type: refactoring
    difficulty: intermediate
    prompt:
      es: Reescribe un bucle que elimina números negativos de la misma lista mientras la recorre.
      en: Rewrite a loop that removes negative numbers from the same list while traversing it.
      da: Omskriv en løkke der fjerner negative tal fra samme liste under gennemløb.
    reference_solution:
      es: Construir otra lista con los valores que cumplen `value >= 0`, o filtrar mediante una comprensión documentada.
      en: Build another list containing values satisfying `value >= 0`, or use a documented comprehension.
      da: Byg en ny liste med værdier der opfylder `value >= 0`, eller brug en dokumenteret comprehension.
    explanation:
      es: Eliminar desplaza índices y puede saltar elementos consecutivos.
      en: Removal shifts indices and may skip consecutive elements.
      da: Fjernelse forskyder indeks og kan springe elementer over.
    linked_objectives: [m06.o4, m06.o8]

  - id: dm857.m06.p05
    activity_type: matrix_validation
    difficulty: intermediate
    prompt:
      es: Diseña una función que determine si una lista de filas es rectangular, incluyendo la matriz vacía.
      en: Design a function that determines whether a list of rows is rectangular, including the empty matrix.
      da: Design en funktion der afgør om en liste af rækker er rektangulær, inklusive tom matrix.
    accepted_answer_elements:
      - explicit policy for empty outer list
      - all rows must be sequences with equal length
      - zero-column rows handled consistently
      - tests for rectangular, ragged, empty, and empty-row structures
    linked_objectives: [m06.o6, m06.o8]

  - id: dm857.m06.p06
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: Explica cuándo una tupla es apropiada y cuándo conviene una estructura con campos nombrados.
      en: Explain when a tuple is appropriate and when a named-field structure is preferable.
      da: Forklar hvornår en tuple er passende, og hvornår en struktur med navngivne felter er bedre.
    accepted_answer_elements:
      - tuple suits small fixed-order local results
      - positional meaning must remain clear
      - named fields improve long-lived or public interfaces
      - validation and evolution concerns acknowledged
    linked_objectives: [m06.o7]

objective_bank:
  - id: dm857.m06.q01
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Qué crea `b = a` cuando `a` es una lista?, en: What does `b = a` create when `a` is a list?, da: Hvad skaber `b = a` når `a` er en liste?}
    options:
      - {id: alias, text: {es: Otro nombre para el mismo objeto., en: Another name for the same object., da: Et andet navn for samme objekt.}}
      - {id: deep, text: {es: Una copia profunda., en: A deep copy., da: En dyb kopi.}}
      - {id: immutable, text: {es: Una versión inmutable., en: An immutable version., da: En uforanderlig version.}}
    correct_option_ids: [alias]
    explanation: {es: La asignación copia la referencia, no el contenido., en: Assignment copies the reference, not the contents., da: Tildeling kopierer referencen, ikke indholdet.}
    linked_objectives: [m06.o2]

  - id: dm857.m06.q02
    activity_type: true_false
    difficulty: foundational
    prompt: {es: Reasignar `a = [9]` modifica automáticamente la lista anterior., en: Reassigning `a = [9]` automatically mutates the previous list., da: Gentildeling `a = [9]` muterer automatisk den tidligere liste.}
    correct_answer: false
    explanation: {es: Cambia el enlace del nombre; no modifica el objeto anterior., en: It changes the name binding rather than the previous object., da: Det ændrer navnets binding og ikke det tidligere objekt.}
    linked_objectives: [m06.o2]

  - id: dm857.m06.q03
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Qué retorna normalmente `list.append`?, en: What does `list.append` normally return?, da: Hvad returnerer `list.append` normalt?}
    options:
      - {id: none, text: {es: `None`., en: `None`., da: `None`.}}
      - {id: list, text: {es: La lista modificada., en: The modified list., da: Den ændrede liste.}}
      - {id: item, text: {es: El elemento añadido., en: The added element., da: Det tilføjede element.}}
    correct_option_ids: [none]
    explanation: {es: El método muta la lista y retorna `None`., en: The method mutates the list and returns `None`., da: Metoden muterer listen og returnerer `None`.}
    linked_objectives: [m06.o3]

  - id: dm857.m06.q04
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {es: ¿Qué diferencia `append` de `extend`?, en: What distinguishes `append` from `extend`?, da: Hvad skelner `append` fra `extend`?}
    options:
      - {id: one_vs_many, text: {es: `append` añade un objeto; `extend` añade los elementos de un iterable., en: `append` adds one object; `extend` adds elements from an iterable., da: `append` tilføjer ét objekt; `extend` tilføjer elementer fra en iterable.}}
      - {id: copy, text: {es: `append` copia profundamente y `extend` no., en: `append` deep-copies and `extend` does not., da: `append` dybkopierer og `extend` gør ikke.}}
    correct_option_ids: [one_vs_many]
    explanation: {es: El argumento completo de `append` se convierte en un solo elemento., en: The complete argument to `append` becomes one element., da: Hele argumentet til `append` bliver ét element.}
    linked_objectives: [m06.o3]

  - id: dm857.m06.q05
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Una copia superficial de una lista anidada independiza todas las listas internas., en: A shallow copy of a nested list makes all inner lists independent., da: En overfladisk kopi af en indlejret liste gør alle indre lister uafhængige.}
    correct_answer: false
    explanation: {es: Solo la lista exterior es nueva; los objetos internos siguen compartidos., en: Only the outer list is new; inner objects remain shared., da: Kun den ydre liste er ny; indre objekter deles stadig.}
    linked_objectives: [m06.o2, m06.o6]

  - id: dm857.m06.q06
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Por qué es peligroso `[[0]*3]*4`?, en: Why is `[[0]*3]*4` dangerous?, da: Hvorfor er `[[0]*3]*4` farligt?}
    options:
      - {id: shared_rows, text: {es: Las cuatro posiciones referencian la misma fila., en: All four positions reference the same row., da: Alle fire positioner refererer til samme række.}}
      - {id: immutable, text: {es: Crea tuplas en lugar de listas., en: It creates tuples instead of lists., da: Det skaber tupler i stedet for lister.}}
      - {id: syntax, text: {es: Es sintaxis inválida., en: It is invalid syntax., da: Det er ugyldig syntaks.}}
    correct_option_ids: [shared_rows]
    explanation: {es: Mutar una fila se observa en todas las posiciones., en: Mutating one row appears in every position., da: Mutation af én række ses i alle positioner.}
    linked_objectives: [m06.o6, m06.o8]

  - id: dm857.m06.q07
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué hace `zip(a, b)` si `a` y `b` tienen longitudes distintas?, en: What does `zip(a, b)` do when lengths differ?, da: Hvad gør `zip(a, b)` når længderne er forskellige?}
    options:
      - {id: shortest, text: {es: Se detiene con la secuencia más corta., en: It stops with the shortest sequence., da: Den stopper med den korteste sekvens.}}
      - {id: error, text: {es: Siempre genera error., en: It always raises an error., da: Den giver altid fejl.}}
      - {id: pad, text: {es: Rellena automáticamente con `None`., en: It automatically pads with `None`., da: Den udfylder automatisk med `None`.}}
    correct_option_ids: [shortest]
    explanation: {es: La pérdida silenciosa de elementos debe considerarse en el contrato., en: Silent truncation must be considered in the contract., da: Stiltiende trunkering skal indgå i kontrakten.}
    linked_objectives: [m06.o4]

  - id: dm857.m06.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué problema tiene `maximum = 0` al buscar el máximo?, en: What is wrong with `maximum = 0` when searching for a maximum?, da: Hvad er problemet med `maximum = 0` ved maksimumsøgning?}
    options:
      - {id: negatives, text: {es: Falla si todos los valores son negativos., en: It fails when all values are negative., da: Det fejler når alle værdier er negative.}}
      - {id: floats, text: {es: No permite números decimales., en: It prevents floating-point values., da: Det tillader ikke decimaltal.}}
      - {id: alias, text: {es: Crea aliasing con la lista., en: It creates aliasing with the list., da: Det skaber aliasing med listen.}}
    correct_option_ids: [negatives]
    explanation: {es: El inicializador introduce un valor que quizá no pertenece a los datos., en: The initializer introduces a value that may not belong to the data., da: Initialiseringen introducerer en værdi der måske ikke tilhører data.}
    linked_objectives: [m06.o5]

  - id: dm857.m06.q09
    activity_type: true_false
    difficulty: intermediate
    prompt: {es: Una lista de listas siempre es una matriz rectangular., en: A list of lists is always a rectangular matrix., da: En liste af lister er altid en rektangulær matrix.}
    correct_answer: false
    explanation: {es: Las filas pueden tener longitudes distintas o significados incompatibles., en: Rows may have different lengths or incompatible meanings., da: Rækker kan have forskellige længder eller uforenelige betydninger.}
    linked_objectives: [m06.o6]

  - id: dm857.m06.q10
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {es: ¿Qué retorna una función con `return low, high`?, en: What does a function with `return low, high` return?, da: Hvad returnerer en funktion med `return low, high`?}
    options:
      - {id: tuple, text: {es: Una tupla de dos elementos., en: A two-element tuple., da: En tuple med to elementer.}}
      - {id: two_objects, text: {es: Dos objetos independientes sin contenedor., en: Two independent objects without a container., da: To uafhængige objekter uden beholder.}}
      - {id: list, text: {es: Una lista automática., en: An automatic list., da: En automatisk liste.}}
    correct_option_ids: [tuple]
    explanation: {es: La coma construye la tupla retornada., en: The comma constructs the returned tuple., da: Kommaet konstruerer den returnerede tuple.}
    linked_objectives: [m06.o7]

assessment_items:
  - id: dm857.m06.a01
    activity_type: sequence_function_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña `filter_valid(values, lower, upper)` para retornar una lista nueva con valores dentro del intervalo
        cerrado. No debe modificar la entrada. Documenta tipos, límites y pruebas, incluida la entrada vacía.
      en: >-
        Design `filter_valid(values, lower, upper)` to return a new list containing values in the closed interval.
        It must not mutate the input. Document types, bounds, and tests, including empty input.
      da: >-
        Design `filter_valid(values, lower, upper)` der returnerer en ny liste med værdier i det lukkede interval.
        Input må ikke muteres. Dokumentér typer, grænser og test inklusive tomt input.
    accepted_answer_elements:
      - closed-interval logic
      - new list rather than mutation
      - explicit policy when lower exceeds upper
      - tests for boundaries, outside values, duplicates, and empty input
    rubric:
      - {criterion: contract_and_boundaries, points: 3}
      - {criterion: correct_transformation, points: 3}
      - {criterion: no_mutation, points: 2}
      - {criterion: tests, points: 2}
    linked_objectives: [m06.o4, m06.o5, m06.o8]

  - id: dm857.m06.a02
    activity_type: debugging
    difficulty: advanced
    prompt:
      es: >-
        Un programa crea `matrix = [[0]*3]*4`, copia con `copy = matrix[:]` y después modifica `copy[0][1]`.
        Explica todas las relaciones de aliasing, corrige la construcción y diseña pruebas de independencia.
      en: >-
        A program creates `matrix = [[0]*3]*4`, copies it with `copy = matrix[:]`, and modifies `copy[0][1]`.
        Explain all aliasing relationships, correct construction, and design independence tests.
      da: >-
        Et program skaber `matrix = [[0]*3]*4`, kopierer med `copy = matrix[:]` og ændrer `copy[0][1]`.
        Forklar alle aliasrelationer, ret konstruktionen og design uafhængighedstest.
    accepted_answer_elements:
      - repeated rows share one inner object
      - shallow outer copy retains shared rows
      - nested comprehension creates independent rows
      - tests compare identities and mutation visibility
    rubric:
      - {criterion: complete_aliasing_model, points: 4}
      - {criterion: corrected_construction, points: 2}
      - {criterion: independence_tests, points: 3}
      - {criterion: explanation, points: 1}
    linked_objectives: [m06.o2, m06.o6, m06.o8]

  - id: dm857.m06.a03
    activity_type: oral_explanation
    difficulty: advanced
    prompt:
      es: Defiende una política para retorno de búsqueda y entrada vacía en una biblioteca de funciones de secuencias.
      en: Defend a search-return and empty-input policy for a sequence-function library.
      da: Forsvar en politik for søgeretur og tomt input i et bibliotek af sekvensfunktioner.
    accepted_answer_elements:
      - consistent distinction among found value, index, Boolean, sentinel, and exception
      - empty aggregation policy separated from ordinary absence
      - examples of caller behavior
      - compatibility and ambiguity tradeoffs
      - tests for every outcome
    rubric:
      - {criterion: policy_consistency, points: 3}
      - {criterion: technical_accuracy, points: 3}
      - {criterion: caller_examples, points: 2}
      - {criterion: tests_and_limitations, points: 2}
    linked_objectives: [m06.o5, m06.o7, m06.o8]

