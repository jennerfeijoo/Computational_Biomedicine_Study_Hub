glossary:
  - id: term.list
    term: {es: lista, en: list, da: liste}
    definition: {es: Secuencia ordenada y mutable., en: Ordered mutable sequence., da: Ordnet muterbar sekvens.}
    related_terms: [term.tuple, term.mutation]
  - id: term.tuple
    term: {es: tupla, en: tuple, da: tuple}
    definition: {es: Secuencia ordenada e inmutable definida por comas., en: Ordered immutable sequence defined by commas., da: Ordnet uforanderlig sekvens defineret af kommaer.}
    related_terms: [term.unpacking]
  - id: term.mutation
    term: {es: mutación, en: mutation, da: mutation}
    definition: {es: Cambio del contenido de un objeto existente., en: Change to an existing object's contents., da: Ændring af et eksisterende objekts indhold.}
    related_terms: [term.reassignment, term.aliasing]
  - id: term.reassignment
    term: {es: reasignación, en: reassignment, da: gentildeling}
    definition: {es: Cambio del objeto al que referencia un nombre., en: Change to which object a name references., da: Ændring af hvilket objekt et navn refererer til.}
    related_terms: [term.mutation]
  - id: term.aliasing
    term: {es: aliasing, en: aliasing, da: aliasing}
    definition: {es: Situación en la que varios nombres o posiciones referencian el mismo objeto mutable., en: Situation where multiple names or positions reference the same mutable object., da: Situation hvor flere navne eller positioner refererer til samme muterbare objekt.}
    related_terms: [term.identity, term.shallow_copy]
  - id: term.identity
    term: {es: identidad, en: identity, da: identitet}
    definition: {es: Propiedad de ser exactamente el mismo objeto., en: Property of being the exact same object., da: Egenskab ved at være præcis samme objekt.}
    related_terms: [term.aliasing]
  - id: term.shallow_copy
    term: {es: copia superficial, en: shallow copy, da: overfladisk kopi}
    definition: {es: Nueva colección exterior que conserva referencias a los mismos elementos internos., en: New outer collection retaining references to the same inner elements., da: Ny ydre samling der bevarer referencer til samme indre elementer.}
    related_terms: [term.aliasing]
  - id: term.aggregation
    term: {es: agregación, en: aggregation, da: aggregering}
    definition: {es: Reducción de una colección a uno o varios resúmenes., en: Reduction of a collection to one or more summaries., da: Reduktion af en samling til et eller flere resuméer.}
    related_terms: [term.empty_policy]
  - id: term.ragged
    term: {es: estructura irregular, en: ragged structure, da: ujævn struktur}
    definition: {es: Colección de filas con longitudes diferentes., en: Collection of rows with different lengths., da: Samling af rækker med forskellige længder.}
    related_terms: [term.rectangular]
  - id: term.unpacking
    term: {es: desempaquetado, en: unpacking, da: udpakning}
    definition: {es: Asignación de elementos de una secuencia a varios nombres según una estructura., en: Assignment of sequence elements to multiple names according to structure., da: Tildeling af sekvenselementer til flere navne efter struktur.}
    related_terms: [term.tuple]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      El módulo diferencia nombres, objetos y contenido. La asignación puede crear aliasing; la mutación cambia el objeto
      compartido y la reasignación solo cambia un enlace. Las copias superficiales no independizan estructuras anidadas.
      Las funciones de secuencias deben declarar si mutan, cómo representan ausencia y qué ocurre con entrada vacía.
      La seguridad mejora al construir resultados nuevos y validar forma antes de tratar listas anidadas como matrices.
    en: >-
      The module separates names, objects, and contents. Assignment may create aliasing; mutation changes the shared
      object while reassignment changes only one binding. Shallow copies do not make nested structures independent.
      Sequence functions should declare mutation, absence representation, and empty-input behavior. Safety improves by
      constructing new results and validating shape before treating nested lists as matrices.
    da: >-
      Modulet adskiller navne, objekter og indhold. Tildeling kan skabe aliasing; mutation ændrer det delte objekt,
      mens gentildeling kun ændrer bindingen. Overfladiske kopier gør ikke indlejrede strukturer uafhængige. Funktioner
      bør erklære mutation, fravær og tomt input og validere form før matrixbehandling.
  misconceptions:
    - id: m06.mc01
      claim: `a = b` copies a list
      correction: it creates another reference to the same object
    - id: m06.mc02
      claim: list methods such as append return the modified list
      correction: most mutating list methods return None
    - id: m06.mc03
      claim: a shallow copy makes nested content independent
      correction: nested objects remain shared
    - id: m06.mc04
      claim: a list of lists is automatically rectangular
      correction: row lengths and semantics must be validated
    - id: m06.mc05
      claim: initializing maximum to zero is safe
      correction: it fails when all values are negative
  socratic_prompts:
    - Which names refer to the same object at this step?
    - Did the statement mutate an object or reassign a name?
    - What exactly was copied: the outer list or nested objects too?
    - What should happen for empty input?
    - Can mutation during traversal shift the remaining indices?
    - Are all rows independent and equal in length?
  grading_criteria:
    - accurate object and aliasing traces
    - correct use of list methods and return values
    - explicit mutation and empty-input contracts
    - safe traversal and output construction
    - validation of nested structure shape
  response_constraints:
    - never describe assignment as an automatic copy
    - distinguish equality from identity
    - state clearly that shallow copies share nested objects
    - do not assume list methods return the list
    - do not call a ragged list a matrix without validation
  retrieval_fragments:
    - id: m06.rf01
      topic: aliasing
      canonical_answer: Aliasing occurs when multiple names or positions reference the same mutable object.
    - id: m06.rf02
      topic: mutation_reassignment
      canonical_answer: Mutation changes an object's contents; reassignment changes one name's binding.
    - id: m06.rf03
      topic: shallow_copy
      canonical_answer: A shallow copy creates a new outer container while retaining references to nested objects.
    - id: m06.rf04
      topic: list_methods
      canonical_answer: Most mutating list methods change the list in place and return None.
    - id: m06.rf05
      topic: empty_input
      canonical_answer: Aggregation and search functions must document a consistent policy for empty input and absence.

