schema_version: 1.0.0
course_code: DM847
module_id: dm847.m07
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m07.f01, type: conceptual, front: {"es": "¿Cuál es la entrada y salida de búsqueda exacta?", "en": "What are the input and output of exact search?", "da": "Hvad er input og output ved eksakt søgning?"}, back: {"es": "Un texto y un patrón; todas las posiciones donde el patrón coincide símbolo por símbolo.", "en": "A text and a pattern; every position where the pattern matches symbol by symbol.", "da": "En tekst og et mønster; alle positioner med symbol-for-symbol-match."}}
  - {id: dm847.m07.f02, type: complexity, front: {"es": "¿Peor coste de búsqueda ingenua?", "en": "Worst-case cost of naive search?", "da": "Værste omkostning for naiv søgning?"}, back: {"es": "O(nm) para texto n y patrón m.", "en": "O(nm) for text length n and pattern length m.", "da": "O(nm) for tekstlængde n og mønsterlængde m."}}
  - {id: dm847.m07.f03, type: boundary, front: {"es": "¿Por qué debe definirse la política para patrón vacío?", "en": "Why must empty-pattern policy be defined?", "da": "Hvorfor skal politikken for tomt mønster defineres?"}, back: {"es": "Porque distintas APIs pueden considerarlo coincidencia en cada frontera o entrada inválida.", "en": "APIs may treat it as matching every boundary or as invalid input.", "da": "API'er kan behandle det som match ved alle grænser eller ugyldigt input."}}
  - {id: dm847.m07.f04, type: conceptual, front: {"es": "¿Qué comparte un trie?", "en": "What does a trie share?", "da": "Hvad deler en trie?"}, back: {"es": "Prefijos comunes entre cadenas o patrones.", "en": "Common prefixes among strings or patterns.", "da": "Fælles præfikser mellem strenge eller mønstre."}}
  - {id: dm847.m07.f05, type: misconception, front: {"es": "Corrige: sólo las hojas pueden terminar patrones en un trie.", "en": "Correct: only leaves can terminate patterns in a trie.", "da": "Ret: kun blade kan afslutte mønstre i en trie."}, back: {"es": "Un patrón que es prefijo de otro termina en un nodo interno marcado.", "en": "A pattern that prefixes another ends at a marked internal node.", "da": "Et mønster der er præfiks for et andet slutter i en markeret intern node."}}
  - {id: dm847.m07.f06, type: conceptual, front: {"es": "¿Qué indexa un trie de sufijos?", "en": "What does a suffix trie index?", "da": "Hvad indekserer en suffix-trie?"}, back: {"es": "Todos los sufijos y, por tanto, todas las subcadenas como prefijos de algún sufijo.", "en": "All suffixes and therefore all substrings as prefixes of some suffix.", "da": "Alle suffikser og dermed alle substrenge som præfikser af et suffiks."}}
  - {id: dm847.m07.f07, type: complexity, front: {"es": "¿Por qué un trie de sufijos ingenuo puede ocupar O(n²)?", "en": "Why can a naive suffix trie use O(n²) space?", "da": "Hvorfor kan en naiv suffix-trie bruge O(n²) plads?"}, back: {"es": "Porque inserta n sufijos cuya longitud total es cuadrática.", "en": "It inserts n suffixes whose total length is quadratic.", "da": "Den indsætter n suffikser med samlet kvadratisk længde."}}
  - {id: dm847.m07.f08, type: conceptual, front: {"es": "¿Qué función cumple el sentinela?", "en": "What is the sentinel's role?", "da": "Hvad er sentinelens rolle?"}, back: {"es": "Marca un final único y evita que un sufijo sea prefijo de otro.", "en": "It marks a unique end and prevents one suffix from prefixing another.", "da": "Den markerer en unik slutning og forhindrer at ét suffiks er præfiks for et andet."}}
  - {id: dm847.m07.f09, type: representation, front: {"es": "¿Cómo evita un árbol de sufijos copiar etiquetas largas?", "en": "How does a suffix tree avoid copying long edge labels?", "da": "Hvordan undgår et suffikstræ at kopiere lange kantetiketter?"}, back: {"es": "Guarda intervalos inicio-fin que referencian el texto original.", "en": "It stores start-end intervals referencing the original text.", "da": "Den gemmer start-slut-intervaller, der refererer originalteksten."}}
  - {id: dm847.m07.f10, type: misconception, front: {"es": "Corrige: tamaño O(n) implica construcción O(n).", "en": "Correct: O(n) size implies O(n) construction.", "da": "Ret: O(n) størrelse medfører O(n) konstruktion."}, back: {"es": "La estructura puede ser lineal aunque un algoritmo de construcción ingenuo sea cuadrático.", "en": "The structure may be linear while naive construction is quadratic.", "da": "Strukturen kan være lineær, selv om naiv konstruktion er kvadratisk."}}
  - {id: dm847.m07.f11, type: conceptual, front: {"es": "¿Qué almacena un array de sufijos?", "en": "What does a suffix array store?", "da": "Hvad gemmer et suffiksarray?"}, back: {"es": "Posiciones iniciales de sufijos ordenadas lexicográficamente.", "en": "Suffix start positions in lexicographic order.", "da": "Suffiksers startpositioner i leksikografisk orden."}}
  - {id: dm847.m07.f12, type: algorithm, front: {"es": "¿Por qué las coincidencias de un patrón forman un intervalo?", "en": "Why do pattern matches form an interval?", "da": "Hvorfor danner mønstermatches et interval?"}, back: {"es": "Todos los sufijos con el patrón como prefijo son contiguos en orden lexicográfico.", "en": "Suffixes sharing the pattern prefix are contiguous in lexicographic order.", "da": "Suffikser med mønsteret som præfiks er sammenhængende i leksikografisk orden."}}
  - {id: dm847.m07.f13, type: algorithm, front: {"es": "¿Qué producen las dos búsquedas binarias?", "en": "What do the two binary searches produce?", "da": "Hvad producerer de to binære søgninger?"}, back: {"es": "El límite inferior y superior del intervalo de sufijos coincidentes.", "en": "Lower and upper bounds of the matching suffix interval.", "da": "Nedre og øvre grænse for intervallet af matchende suffikser."}}
  - {id: dm847.m07.f14, type: conceptual, front: {"es": "¿Qué registra LCP?", "en": "What does LCP record?", "da": "Hvad registrerer LCP?"}, back: {"es": "La longitud del prefijo común entre sufijos adyacentes en orden del array.", "en": "Common-prefix length between adjacent suffixes in array order.", "da": "Længden af fælles præfiks mellem nabosuffikser i array-orden."}}
  - {id: dm847.m07.f15, type: interpretation, front: {"es": "¿Qué indica un LCP máximo alto?", "en": "What does a high maximum LCP indicate?", "da": "Hvad indikerer et højt maksimum-LCP?"}, back: {"es": "Una subcadena repetida larga; no demuestra función biológica.", "en": "A long repeated substring; it does not prove biological function.", "da": "En lang gentaget substring; det beviser ikke biologisk funktion."}}
  - {id: dm847.m07.f16, type: conceptual, front: {"es": "¿Qué mapea un índice de k-mers?", "en": "What does a k-mer index map?", "da": "Hvad mapper et k-mer-indeks?"}, back: {"es": "Cada palabra de longitud k a sus posiciones en el texto.", "en": "Each length-k word to its text positions.", "da": "Hvert ord af længde k til dets positioner i teksten."}}
  - {id: dm847.m07.f17, type: practical, front: {"es": "¿Por qué un seed hit requiere verificación?", "en": "Why does a seed hit require verification?", "da": "Hvorfor kræver et seed-hit verifikation?"}, back: {"es": "La semilla cubre sólo parte del patrón y puede aparecer donde el resto no coincide.", "en": "The seed covers only part of the pattern and may occur where the remainder mismatches.", "da": "Seedet dækker kun en del af mønsteret og kan forekomme uden fuldt match."}}
  - {id: dm847.m07.f18, type: tradeoff, front: {"es": "Efecto típico de k pequeño.", "en": "Typical effect of small k.", "da": "Typisk effekt af lille k."}, back: {"es": "Pocas claves posibles, cubetas grandes y más candidatos por verificar.", "en": "Few possible keys, large buckets, and more candidates to verify.", "da": "Få mulige nøgler, store buckets og flere kandidater."}}
  - {id: dm847.m07.f19, type: tradeoff, front: {"es": "Efecto típico de k grande.", "en": "Typical effect of large k.", "da": "Typisk effekt af stor k."}, back: {"es": "Mayor selectividad y espacio de claves, pero menor utilidad para patrones cortos y errores en la semilla.", "en": "Greater selectivity and key space, but less utility for short patterns and seed errors.", "da": "Større selektivitet og nøgleområde, men mindre nytte ved korte mønstre og seed-fejl."}}
  - {id: dm847.m07.f20, type: validation, front: {"es": "¿Cuál es un buen oráculo para textos pequeños?", "en": "What is a good oracle for small texts?", "da": "Hvad er et godt orakel for små tekster?"}, back: {"es": "Búsqueda exhaustiva simple que enumera todas las posiciones.", "en": "Simple exhaustive search enumerating every position.", "da": "Simpel udtømmende søgning over alle positioner."}}
  - {id: dm847.m07.f21, type: validation, front: {"es": "Nombra cuatro casos adversariales.", "en": "Name four adversarial cases.", "da": "Nævn fire adversarial cases."}, back: {"es": "Texto muy repetitivo, patrón ausente, patrón más largo que el texto y coincidencias solapadas.", "en": "Highly repetitive text, absent pattern, pattern longer than text, and overlapping matches.", "da": "Meget repetitiv tekst, fraværende mønster, længere mønster end tekst og overlap."}}
  - {id: dm847.m07.f22, type: selection, front: {"es": "¿Cuándo compensa preprocesar?", "en": "When is preprocessing worthwhile?", "da": "Hvornår kan præprocessering betale sig?"}, back: {"es": "Cuando se realizarán muchas consultas sobre un texto relativamente estable.", "en": "When many queries will be run against a relatively stable text.", "da": "Når mange forespørgsler køres mod en relativt stabil tekst."}}
  - {id: dm847.m07.f23, type: oral, front: {"es": "Defiende array de sufijos en una frase.", "en": "Defend a suffix array in one sentence.", "da": "Forsvar et suffiksarray i én sætning."}, back: {"es": "Ofrece un índice exacto compacto y ordenado con búsquedas por intervalo y menor sobrecarga que un árbol explícito.", "en": "It provides a compact ordered exact index with interval queries and lower overhead than an explicit tree.", "da": "Det giver et kompakt ordnet eksakt indeks med intervalforespørgsler og lavere overhead end et eksplicit træ."}}
  - {id: dm847.m07.f24, type: transfer, front: {"es": "¿Cómo conecta este módulo con FM-index?", "en": "How does this module connect to the FM-index?", "da": "Hvordan forbindes modulet med FM-index?"}, back: {"es": "BWT y FM-index conservan la lógica del orden de sufijos, pero comprimen y permiten búsqueda hacia atrás.", "en": "BWT and the FM-index preserve suffix-order logic while enabling compressed backward search.", "da": "BWT og FM-index bevarer suffiksorden og muliggør komprimeret backward search."}}
