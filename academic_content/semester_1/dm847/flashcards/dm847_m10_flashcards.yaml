course_code: DM847
module_id: dm847.m10
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m10.f01, type: conceptual, front: {es: ¿Qué es un motivo de secuencia?, en: What is a sequence motif?, da: Hvad er et sekvensmotiv?}, back: {es: Una distribución recurrente de preferencias de símbolos en posiciones alineadas., en: A recurring distribution of symbol preferences across aligned positions., da: En tilbagevendende fordeling af symbolpræferencer over alignede positioner.}}
  - {id: dm847.m10.f02, type: distinction, front: {es: Diferencia entre consenso y PWM., en: Difference between consensus and PWM., da: Forskel mellem konsensus og PWM.}, back: {es: El consenso conserva sólo el símbolo modal; la PWM conserva probabilidades o log-ratios por símbolo y posición., en: Consensus keeps only the modal symbol; a PWM keeps probabilities or log ratios by symbol and position., da: Konsensus beholder kun det mest hyppige symbol; PWM bevarer sandsynligheder eller log-ratioer.}}
  - {id: dm847.m10.f03, type: practical, front: {es: ¿Cómo se obtiene una matriz de frecuencia?, en: How is a frequency matrix obtained?, da: Hvordan fås en frekvensmatrix?}, back: {es: Normalizando los conteos de cada columna, incluyendo pseudoconteos si se usan., en: Normalize counts within each column, including pseudocounts if used., da: Normalisér tællingerne i hver kolonne, inklusive pseudotællinger.}}
  - {id: dm847.m10.f04, type: conceptual, front: {es: ¿Qué suele almacenar una PWM?, en: What does a PWM commonly store?, da: Hvad gemmer en PWM typisk?}, back: {es: Log-ratios entre la probabilidad del símbolo en el motivo y en el fondo., en: Log ratios between symbol probability in the motif and in the background., da: Log-ratioer mellem symbolsandsynlighed i motiv og baggrund.}}
  - {id: dm847.m10.f05, type: misconception, front: {es: Corrige: un score PWM depende sólo del motivo., en: Correct: a PWM score depends only on the motif., da: Ret: en PWM-score afhænger kun af motivet.}, back: {es: También depende del modelo de fondo usado como referencia., en: It also depends on the background model used as reference., da: Den afhænger også af baggrundsmodellen.}}
  - {id: dm847.m10.f06, type: conceptual, front: {es: ¿Qué indica entropía baja en una columna?, en: What does low entropy in a column indicate?, da: Hvad viser lav entropi i en kolonne?}, back: {es: Que la distribución está concentrada en uno o pocos símbolos., en: The distribution is concentrated on one or a few symbols., da: Fordelingen er koncentreret på ét eller få symboler.}}
  - {id: dm847.m10.f07, type: conceptual, front: {es: ¿Por qué 2-H no siempre es la información correcta?, en: Why is 2-H not always the correct information measure?, da: Hvorfor er 2-H ikke altid korrekt information?}, back: {es: Sólo corresponde a un fondo uniforme de cuatro símbolos; con fondo no uniforme se usa divergencia respecto al fondo., en: It assumes a uniform four-symbol background; non-uniform backgrounds require divergence from that background., da: Det antager uniform fire-symbol-baggrund; ellers bruges divergens fra baggrunden.}}
  - {id: dm847.m10.f08, type: model, front: {es: ¿Qué asume OOPS?, en: What does OOPS assume?, da: Hvad antager OOPS?}, back: {es: Exactamente una ocurrencia de motivo por secuencia., en: Exactly one motif occurrence per sequence., da: Præcis én motivforekomst pr. sekvens.}}
  - {id: dm847.m10.f09, type: model, front: {es: ¿Qué asume ZOOPS?, en: What does ZOOPS assume?, da: Hvad antager ZOOPS?}, back: {es: Cero o una ocurrencia por secuencia., en: Zero or one occurrence per sequence., da: Nul eller én forekomst pr. sekvens.}}
  - {id: dm847.m10.f10, type: model, front: {es: ¿Qué asume TCM?, en: What does TCM assume?, da: Hvad antager TCM?}, back: {es: Múltiples ocurrencias potenciales según una tasa o probabilidad., en: Potentially multiple occurrences according to a rate or probability., da: Potentielt flere forekomster efter en rate eller sandsynlighed.}}
  - {id: dm847.m10.f11, type: misconception, front: {es: Corrige: elegir OOPS es sólo una decisión computacional., en: Correct: choosing OOPS is only a computational decision., da: Ret: valg af OOPS er kun en beregningsbeslutning.}, back: {es: Es una hipótesis biológica sobre cuántos sitios contiene cada secuencia., en: It is a biological hypothesis about how many sites each sequence contains., da: Det er en biologisk hypotese om antal sites pr. sekvens.}}
  - {id: dm847.m10.f12, type: conceptual, front: {es: ¿Qué es una variable latente en este modelo?, en: What is a latent variable in this model?, da: Hvad er en latent variabel i denne model?}, back: {es: La posición, orientación y, según el modelo, presencia del sitio no observadas directamente., en: The unobserved site position, orientation, and possibly presence., da: Den ikke-observerede site-position, orientering og eventuelle tilstedeværelse.}}
  - {id: dm847.m10.f13, type: algorithm, front: {es: ¿Qué hace la fase E?, en: What does the E-step do?, da: Hvad gør E-trinnet?}, back: {es: Calcula responsabilidades posteriores para posiciones, orientaciones y estado sin sitio., en: It computes posterior responsibilities for positions, orientations, and the no-site state., da: Den beregner posterior-responsibilities for positioner, orienteringer og no-site.}}
  - {id: dm847.m10.f14, type: algorithm, front: {es: ¿Qué hace la fase M?, en: What does the M-step do?, da: Hvad gør M-trinnet?}, back: {es: Actualiza PWM y parámetros usando conteos esperados ponderados por responsabilidades., en: It updates the PWM and parameters using responsibility-weighted expected counts., da: Den opdaterer PWM og parametre med vægtede forventede tællinger.}}
  - {id: dm847.m10.f15, type: misconception, front: {es: Corrige: EM encuentra siempre el motivo verdadero., en: Correct: EM always finds the true motif., da: Ret: EM finder altid det sande motiv.}, back: {es: Puede converger a óptimos locales, motivos de baja complejidad o patrones de fondo., en: It may converge to local optima, low-complexity motifs, or background patterns., da: Den kan konvergere til lokale optima, lav-kompleksitetsmotiver eller baggrundsmønstre.}}
  - {id: dm847.m10.f16, type: numerical, front: {es: ¿Por qué usar log-sum-exp?, en: Why use log-sum-exp?, da: Hvorfor bruge log-sum-exp?}, back: {es: Para normalizar sumas de probabilidades pequeñas en espacio logarítmico sin underflow., en: To normalize sums of tiny probabilities in log space without underflow., da: For at normalisere små sandsynligheder i log-rum uden underflow.}}
  - {id: dm847.m10.f17, type: regularization, front: {es: ¿Qué resuelven los pseudoconteos?, en: What do pseudocounts address?, da: Hvad løser pseudotællinger?}, back: {es: Evitan frecuencias cero y regularizan estimaciones con muestras pequeñas., en: They avoid zero frequencies and regularize small-sample estimates., da: De undgår nulfrekvenser og regulariserer små samples.}}
  - {id: dm847.m10.f18, type: model_selection, front: {es: Riesgo de un motivo demasiado ancho., en: Risk of an overly wide motif., da: Risiko ved et for bredt motiv.}, back: {es: Absorber flancos no informativos y aumentar parámetros y sobreajuste., en: Absorb uninformative flanks and increase parameters and overfitting., da: Absorbere uinformative flanker og øge parametre og overfitting.}}
  - {id: dm847.m10.f19, type: model_selection, front: {es: Riesgo de un motivo demasiado estrecho., en: Risk of an overly narrow motif., da: Risiko ved et for smalt motiv.}, back: {es: Fragmentar el núcleo del patrón y perder posiciones informativas., en: Fragment the pattern core and miss informative positions., da: Fragmentere mønsterkernen og miste informative positioner.}}
  - {id: dm847.m10.f20, type: validation, front: {es: ¿Qué comprueba una simulación con sitios conocidos?, en: What does simulation with known sites test?, da: Hvad tester simulering med kendte sites?}, back: {es: Recuperación de posición, orientación, PWM y calibración bajo condiciones controladas., en: Recovery of position, orientation, PWM, and calibration under controlled conditions., da: Genfinding af position, orientering, PWM og kalibrering under kontrollerede forhold.}}
  - {id: dm847.m10.f21, type: confounding, front: {es: ¿Por qué emparejar controles por GC y longitud?, en: Why match controls by GC and length?, da: Hvorfor matche kontroller efter GC og længde?}, back: {es: Para evitar que composición o tamaño aparenten enriquecimiento de un motivo., en: To prevent composition or length from masquerading as motif enrichment., da: For at undgå at sammensætning eller længde ligner motivberigelse.}}
  - {id: dm847.m10.f22, type: misconception, front: {es: Corrige: enriquecimiento demuestra unión directa., en: Correct: enrichment proves direct binding., da: Ret: berigelse beviser direkte binding.}, back: {es: Indica asociación estadística; unión directa requiere evidencia externa específica., en: It indicates statistical association; direct binding requires specific external evidence., da: Det viser statistisk association; direkte binding kræver specifikt eksternt bevis.}}
  - {id: dm847.m10.f23, type: oral, front: {es: ¿Qué cinco elecciones deben declararse al reportar EM de motivos?, en: Which five choices should be reported for motif EM?, da: Hvilke fem valg bør rapporteres for motiv-EM?}, back: {es: Modelo de ocurrencia, ancho, fondo, pseudoconteos e inicialización; además hebras y criterio de convergencia., en: Occurrence model, width, background, pseudocounts, and initialization; also strands and convergence criterion., da: Forekomstmodel, bredde, baggrund, pseudotællinger og initialisering; også strenge og konvergens.}}
  - {id: dm847.m10.f24, type: transfer, front: {es: ¿Cómo conecta este módulo con HMM?, en: How does this module connect to HMMs?, da: Hvordan forbindes modulet med HMM'er?}, back: {es: Ambos usan variables latentes, probabilidades generativas, responsabilidades posteriores y EM, aunque con estructuras distintas., en: Both use latent variables, generative probabilities, posterior responsibilities, and EM, though with different structures., da: Begge bruger latente variable, generative sandsynligheder, posteriorer og EM, men med forskellig struktur.}}
