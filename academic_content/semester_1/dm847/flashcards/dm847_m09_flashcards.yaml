count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m09.f01, type: conceptual, front: {es: ¿Qué es un operón?, en: What is an operon?, da: Hvad er et operon?}, back: {es: Un conjunto contiguo de genes bajo regulación común y potencialmente transcritos juntos., en: A contiguous set of genes under shared regulation and potentially transcribed together., da: Et sammenhængende gensæt under fælles regulering og mulig fælles transkription.}}
  - {id: dm847.m09.f02, type: distinction, front: {es: Diferencia entre operón y unidad de transcripción., en: Difference between operon and transcription unit., da: Forskel mellem operon og transkriptionsenhed.}, back: {es: El operón es la organización regulatoria potencial; la unidad es el transcrito concreto producido bajo una condición., en: The operon is potential regulatory organization; the unit is the actual transcript under a condition., da: Operonet er potentiel reguleringsorganisation; enheden er det konkrete transkript under en betingelse.}}
  - {id: dm847.m09.f03, type: distinction, front: {es: Diferencia entre operón y regulón., en: Difference between operon and regulon., da: Forskel mellem operon og regulon.}, back: {es: El operón es contiguo; el regulón puede incluir genes y operones dispersos controlados por el mismo regulador., en: An operon is contiguous; a regulon may contain dispersed genes and operons controlled by the same regulator., da: Et operon er sammenhængende; et regulon kan omfatte spredte gener og operoner.}}
  - {id: dm847.m09.f04, type: conceptual, front: {es: Función principal de un promotor., en: Main role of a promoter., da: Promotorens hovedrolle.}, back: {es: Reclutar y posicionar la maquinaria de iniciación de la transcripción., en: Recruit and position transcription-initiation machinery., da: Rekruttere og positionere transkriptionsinitieringsmaskineriet.}}
  - {id: dm847.m09.f05, type: conceptual, front: {es: Función de un operador., en: Role of an operator., da: Operatorens rolle.}, back: {es: Sitio de ADN donde un regulador puede modular la transcripción., en: A DNA site where a regulator can modulate transcription., da: Et DNA-site hvor en regulator kan modulere transkription.}}
  - {id: dm847.m09.f06, type: conceptual, front: {es: Función de un terminador., en: Role of a terminator., da: Terminatorens rolle.}, back: {es: Contribuir a detener la transcripción y delimitar una unidad transcrita., en: Help stop transcription and delimit a transcribed unit., da: Bidrage til at stoppe transkription og afgrænse en transkriptionsenhed.}}
  - {id: dm847.m09.f07, type: misconception, front: {es: Corrige: una secuencia consenso promotora es obligatoria e idéntica., en: Correct: a promoter consensus is mandatory and identical., da: Ret: en promotorkonsensus er obligatorisk og identisk.}, back: {es: Es una distribución de preferencias; promotores funcionales pueden desviarse y motivos parecidos pueden ser inactivos., en: It is a preference distribution; functional promoters may deviate and similar motifs may be inactive., da: Det er en præferencefordeling; funktionelle promotorer kan afvige.}}
  - {id: dm847.m09.f08, type: conceptual, front: {es: ¿Por qué la proximidad es útil en bacterias?, en: Why is proximity useful in bacteria?, da: Hvorfor er nærhed nyttig i bakterier?}, back: {es: La alta densidad génica y la organización operónica hacen que genes relacionados aparezcan juntos con frecuencia., en: High gene density and operon organization often place related genes together., da: Høj gentæthed og operonorganisation placerer ofte relaterede gener sammen.}}
  - {id: dm847.m09.f09, type: misconception, front: {es: Corrige: genes cercanos siempre están cotranscritos., en: Correct: nearby genes are always cotranscribed., da: Ret: nærliggende gener er altid kotranskriberede.}, back: {es: Distancia corta es sólo una señal; promotores internos, terminación y condiciones pueden separarlos., en: Short distance is only a signal; internal promoters, termination, and conditions may separate them., da: Kort afstand er kun et signal; interne promotorer og terminering kan adskille dem.}}
  - {id: dm847.m09.f10, type: practical, front: {es: Fórmula de distancia intergénica con coordenadas inclusivas., en: Intergenic-distance formula with inclusive coordinates., da: Formel for intergenisk afstand med inklusive koordinater.}, back: {es: inicio_siguiente - fin_anterior - 1, ajustada por orientación y circularidad cuando corresponda., en: next_start - previous_end - 1, adjusted for orientation and circularity when needed., da: næste_start - forrige_slut - 1, justeret for orientering og cirkularitet.}}
  - {id: dm847.m09.f11, type: conceptual, front: {es: ¿Qué significa un valor negativo de distancia intergénica?, en: What does negative intergenic distance mean?, da: Hvad betyder negativ intergenisk afstand?}, back: {es: Que las anotaciones génicas se solapan según la convención usada., en: The gene annotations overlap under the chosen convention., da: Genannotationerne overlapper under den valgte konvention.}}
  - {id: dm847.m09.f12, type: conceptual, front: {es: ¿Qué aporta la conservación de vecindad?, en: What does neighborhood conservation provide?, da: Hvad bidrager bevaret naboskab med?}, back: {es: Evidencia comparativa de asociación funcional o cotranscripción, dependiente de filogenia., en: Comparative evidence of functional association or cotranscription, dependent on phylogeny., da: Komparativt bevis for funktionel association eller kotranskription, afhængigt af fylogeni.}}
  - {id: dm847.m09.f13, type: misconception, front: {es: Corrige: veinte cepas casi idénticas son veinte evidencias independientes., en: Correct: twenty near-identical strains are twenty independent pieces of evidence., da: Ret: tyve næsten identiske stammer er tyve uafhængige beviser.}, back: {es: Comparten historia y vecindades, por lo que la evidencia está correlacionada., en: They share history and neighborhoods, so the evidence is correlated., da: De deler historie og naboskaber, så evidensen er korreleret.}}
  - {id: dm847.m09.f14, type: conceptual, front: {es: Nombra tres elementos móviles bacterianos., en: Name three bacterial mobile elements., da: Nævn tre bakterielle mobile elementer.}, back: {es: Plasmidios, profagos y transposones; también islas genómicas móviles., en: Plasmids, prophages, and transposons; also mobile genomic islands., da: Plasmider, profager og transposoner; også mobile genomøer.}}
  - {id: dm847.m09.f15, type: misconception, front: {es: Corrige: GC anómalo prueba transferencia horizontal., en: Correct: unusual GC proves horizontal transfer., da: Ret: usædvanlig GC beviser horisontal overførsel.}, back: {es: Es un indicio que debe combinarse con contexto filogenético, movilidad, sintenia y composición., en: It is a clue requiring phylogenetic, mobility, synteny, and composition context., da: Det er et tegn, der kræver fylogenetisk og genomisk kontekst.}}
  - {id: dm847.m09.f16, type: feature, front: {es: Cuatro características para predicción de operones., en: Four features for operon prediction., da: Fire features til operonprædiktion.}, back: {es: Misma hebra, distancia, solapamiento y conservación de vecindad; pueden añadirse expresión y función., en: Same strand, distance, overlap, and neighborhood conservation; expression and function may be added., da: Samme streng, afstand, overlap og bevaret naboskab; ekspression og funktion kan tilføjes.}}
  - {id: dm847.m09.f17, type: modeling, front: {es: ¿Cuál es una unidad de predicción común?, en: What is a common prediction unit?, da: Hvad er en almindelig prædiktionsenhed?}, back: {es: Un par de genes adyacentes clasificado como misma o distinta unidad de transcripción., en: An adjacent gene pair classified as same versus different transcription unit., da: Et par nabogener klassificeret som samme eller forskellig transkriptionsenhed.}}
  - {id: dm847.m09.f18, type: distinction, front: {es: ¿Por qué predecir pares no reconstruye automáticamente operones completos?, en: Why does pair prediction not automatically reconstruct full operons?, da: Hvorfor rekonstruerer parprædiktion ikke automatisk hele operoner?}, back: {es: Las decisiones locales deben integrarse respetando consistencia, circularidad e incertidumbre acumulada., en: Local decisions must be integrated while preserving consistency, circularity, and accumulated uncertainty., da: Lokale beslutninger skal integreres med konsistens, cirkularitet og usikkerhed.}}
  - {id: dm847.m09.f19, type: leakage, front: {es: ¿Por qué un split aleatorio de pares puede ser optimista?, en: Why can random pair splitting be optimistic?, da: Hvorfor kan tilfældigt par-split være optimistisk?}, back: {es: Genes ortólogos y vecindades casi idénticas pueden aparecer en train y test., en: Orthologous genes and near-identical neighborhoods may appear in both train and test., da: Ortologe gener og næsten identiske naboskaber kan findes i både træning og test.}}
  - {id: dm847.m09.f20, type: validation, front: {es: Mejor split para generalizar a especies nuevas., en: Better split for generalizing to new species., da: Bedre split til generalisering til nye arter.}, back: {es: Mantener especies o clados completos fuera del entrenamiento., en: Hold complete species or clades out of training., da: Hold hele arter eller klader ude af træningen.}}
  - {id: dm847.m09.f21, type: metrics, front: {es: ¿Por qué accuracy puede engañar?, en: Why can accuracy mislead?, da: Hvorfor kan accuracy vildlede?}, back: {es: Una clase mayoritaria puede dominar el valor aunque la minoritaria se detecte mal., en: The majority class can dominate even when the minority is poorly detected., da: Majoritetsklassen kan dominere selv om minoriteten opdages dårligt.}}
  - {id: dm847.m09.f22, type: metrics, front: {es: Métricas recomendadas con desbalance., en: Recommended metrics under imbalance., da: Anbefalede metrikker ved ubalance.}, back: {es: Precision, recall, PR-AUC, matriz de confusión y calibración al umbral elegido., en: Precision, recall, PR-AUC, confusion matrix, and calibration at the chosen threshold., da: Precision, recall, PR-AUC, confusion matrix og kalibrering.}}
  - {id: dm847.m09.f23, type: interpretation, front: {es: ¿Qué permite una salida probabilística calibrada?, en: What does a calibrated probabilistic output allow?, da: Hvad muliggør et kalibreret probabilistisk output?}, back: {es: Elegir umbrales según coste de errores y comunicar incertidumbre de forma interpretable., en: Choose thresholds by error cost and communicate uncertainty interpretably., da: Vælge tærskler efter fejlomkostning og kommunikere usikkerhed.}}
  - {id: dm847.m09.f24, type: oral, front: {es: Resume la principal limitación de predicción de operones., en: Summarize the main limitation of operon prediction., da: Opsummér hovedbegrænsningen ved operonprædiktion.}, back: {es: Las etiquetas y relaciones son incompletas, dependientes de condición y evolutivamente estructuradas., en: Labels and relations are incomplete, condition-dependent, and evolutionarily structured., da: Labels og relationer er ufuldstændige, betingelsesafhængige og evolutionært strukturerede.}}
