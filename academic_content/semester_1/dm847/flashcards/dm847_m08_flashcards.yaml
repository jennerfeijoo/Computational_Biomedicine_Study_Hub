course_code: DM847
module_id: dm847.m08
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m08.f01, type: conceptual, front: {es: ¿Qué es la BWT?, en: What is the BWT?, da: Hvad er BWT?}, back: {es: Una permutación reversible obtenida como la última columna de rotaciones ordenadas o desde el orden de sufijos., en: A reversible permutation obtained as the last column of sorted rotations or from suffix order., da: En reversibel permutation fra sidste kolonne af sorterede rotationer eller suffix-orden.}}
  - {id: dm847.m08.f02, type: practical, front: {es: ¿Cómo se obtiene BWT[i] desde SA[i]?, en: How is BWT[i] obtained from SA[i]?, da: Hvordan fås BWT[i] fra SA[i]?}, back: {es: Tomando el símbolo inmediatamente anterior al sufijo; para SA[i]=0 se usa el sentinela final., en: Take the symbol immediately preceding the suffix; for SA[i]=0 use the terminal sentinel., da: Tag symbolet umiddelbart før suffikset; ved start 0 bruges sentinellen.}}
  - {id: dm847.m08.f03, type: misconception, front: {es: Corrige: la BWT es compresión irreversible., en: Correct: the BWT is irreversible compression., da: Ret: BWT er irreversibel kompression.}, back: {es: Es una transformación reversible; la compresión se aplica después aprovechando sus runs., en: It is reversible; compression is applied afterward by exploiting its runs., da: Den er reversibel; kompression anvendes bagefter via runs.}}
  - {id: dm847.m08.f04, type: conceptual, front: {es: ¿Qué contienen F y L?, en: What do F and L contain?, da: Hvad indeholder F og L?}, back: {es: Los mismos símbolos; F ordenados y L en el orden BWT., en: The same symbols; F sorted and L in BWT order., da: De samme symboler; F sorteret og L i BWT-orden.}}
  - {id: dm847.m08.f05, type: conceptual, front: {es: ¿Cómo se distinguen símbolos repetidos entre F y L?, en: How are repeated symbols distinguished between F and L?, da: Hvordan skelnes gentagne symboler mellem F og L?}, back: {es: Por su rango de ocurrencia dentro del mismo símbolo., en: By occurrence rank within the same symbol., da: Ved forekomstrank for samme symbol.}}
  - {id: dm847.m08.f06, type: conceptual, front: {es: ¿Qué hace LF-mapping?, en: What does LF mapping do?, da: Hvad gør LF-mapping?}, back: {es: Conecta una ocurrencia en L con la misma ocurrencia ordenada en F y avanza al carácter previo del texto., en: It maps an occurrence in L to the same ranked occurrence in F and steps to the preceding text character., da: Den forbinder en forekomst i L med samme rank i F og går til forrige teksttegn.}}
  - {id: dm847.m08.f07, type: validation, front: {es: ¿Qué prueba verifica fuertemente una BWT?, en: What strongly validates a BWT?, da: Hvilken test validerer BWT stærkt?}, back: {es: Invertirla y recuperar exactamente el texto con sentinela., en: Invert it and exactly recover the sentinel-terminated text., da: Invertér den og rekonstruér præcis teksten med sentinel.}}
  - {id: dm847.m08.f08, type: conceptual, front: {es: ¿Qué almacena C[c]?, en: What does C[c] store?, da: Hvad gemmer C[c]?}, back: {es: El número de símbolos del texto lexicográficamente menores que c., en: The number of text symbols lexicographically smaller than c., da: Antallet af tekstsymboler leksikografisk mindre end c.}}
  - {id: dm847.m08.f09, type: conceptual, front: {es: ¿Qué responde Occ(c,i)?, en: What does Occ(c,i) answer?, da: Hvad svarer Occ(c,i) på?}, back: {es: Cuántas veces aparece c en un prefijo de L según una convención de frontera definida., en: How many times c occurs in a prefix of L under a defined boundary convention., da: Hvor mange gange c forekommer i et præfiks af L under en defineret grænsekonvention.}}
  - {id: dm847.m08.f10, type: debugging, front: {es: Causa típica de off-by-one en backward search., en: Typical cause of off-by-one in backward search., da: Typisk årsag til off-by-one i backward search.}, back: {es: Mezclar Occ inclusiva con intervalos semiabiertos o una Occ exclusiva., en: Mixing inclusive Occ with half-open intervals or exclusive Occ., da: Blanding af inklusiv Occ med halvåbne intervaller eller eksklusiv Occ.}}
  - {id: dm847.m08.f11, type: algorithm, front: {es: ¿En qué dirección se procesa el patrón?, en: In what direction is the pattern processed?, da: I hvilken retning behandles mønsteret?}, back: {es: De derecha a izquierda, extendiendo el intervalo por la izquierda., en: Right to left, extending the interval on the left., da: Fra højre mod venstre med venstre udvidelse.}}
  - {id: dm847.m08.f12, type: interpretation, front: {es: ¿Qué representa el intervalo tras procesar un sufijo del patrón?, en: What does the interval represent after processing a pattern suffix?, da: Hvad repræsenterer intervallet efter et mønstersuffiks?}, back: {es: Las filas cuyos sufijos comienzan con ese fragmento ya procesado., en: Rows whose suffixes begin with the processed fragment., da: Rækker hvis suffikser begynder med det behandlede fragment.}}
  - {id: dm847.m08.f13, type: conceptual, front: {es: ¿Qué indica un intervalo vacío?, en: What does an empty interval indicate?, da: Hvad indikerer et tomt interval?}, back: {es: Que el patrón procesado no aparece exactamente en el texto., en: The processed pattern does not occur exactly in the text., da: Det behandlede mønster forekommer ikke eksakt i teksten.}}
  - {id: dm847.m08.f14, type: conceptual, front: {es: ¿Qué indica el tamaño del intervalo final?, en: What does final interval size indicate?, da: Hvad viser slutintervallets størrelse?}, back: {es: El número de coincidencias exactas del patrón., en: The number of exact pattern occurrences., da: Antallet af eksakte forekomster.}}
  - {id: dm847.m08.f15, type: distinction, front: {es: Diferencia entre count y locate., en: Difference between count and locate., da: Forskel mellem count og locate.}, back: {es: Count usa el tamaño del intervalo; locate recupera posiciones y necesita suffix-array completo o muestreado., en: Count uses interval size; locate recovers positions and needs a full or sampled suffix array., da: Count bruger intervalstørrelsen; locate kræver suffix-array-data.}}
  - {id: dm847.m08.f16, type: tradeoff, front: {es: ¿Qué ocurre al muestrear SA más dispersamente?, en: What happens with sparser SA sampling?, da: Hvad sker ved mere sparsom SA-sampling?}, back: {es: Baja memoria, pero aumentan los pasos LF necesarios para localizar., en: Memory decreases, but LF steps needed for location increase., da: Hukommelse falder, men LF-trin til lokalisering stiger.}}
  - {id: dm847.m08.f17, type: tradeoff, front: {es: ¿Qué ocurre al separar más los checkpoints Occ?, en: What happens when Occ checkpoints are farther apart?, da: Hvad sker når Occ-checkpoints ligger længere fra hinanden?}, back: {es: Se ahorra memoria, pero cada consulta rank debe escanear más símbolos desde el checkpoint., en: Memory is saved, but each rank query scans farther from a checkpoint., da: Hukommelse spares, men rank-forespørgsler scanner længere.}}
  - {id: dm847.m08.f18, type: conceptual, front: {es: ¿Por qué la BWT suele comprimir bien textos repetitivos?, en: Why does the BWT often compress repetitive texts well?, da: Hvorfor komprimerer BWT ofte repetitive tekster godt?}, back: {es: Contextos similares agrupan símbolos precedentes iguales en runs largos., en: Similar contexts group equal preceding symbols into long runs., da: Lignende kontekster grupperer ens foregående symboler i lange runs.}}
  - {id: dm847.m08.f19, type: misconception, front: {es: Corrige: comprimido siempre significa más rápido., en: Correct: compressed always means faster., da: Ret: komprimeret betyder altid hurtigere.}, back: {es: La compresión reduce memoria, pero las operaciones rank y locate pueden introducir coste adicional., en: Compression saves memory but rank and locate operations may add cost., da: Kompression sparer hukommelse, men rank og locate kan koste ekstra.}}
  - {id: dm847.m08.f20, type: practical, front: {es: ¿Qué es una semilla en read mapping?, en: What is a seed in read mapping?, da: Hvad er et seed i read-mapping?}, back: {es: Un fragmento de la lectura usado para generar ubicaciones candidatas., en: A read fragment used to generate candidate locations., da: Et read-fragment brugt til at generere kandidatpositioner.}}
  - {id: dm847.m08.f21, type: misconception, front: {es: Corrige: encontrar una semilla completa el alineamiento., en: Correct: finding a seed completes the alignment., da: Ret: et seed fuldfører alignmentet.}, back: {es: La ubicación debe extenderse y puntuarse permitiendo el modelo de errores definido., en: The candidate must be extended and scored under the defined error model., da: Kandidaten skal udvides og scores under den definerede fejlmodel.}}
  - {id: dm847.m08.f22, type: practical, front: {es: ¿Por qué considerar reverse complement?, en: Why consider the reverse complement?, da: Hvorfor overveje reverse complement?}, back: {es: Una lectura puede originarse de cualquiera de las dos hebras de referencia., en: A read may originate from either reference strand., da: Et read kan komme fra begge referencestrenge.}}
  - {id: dm847.m08.f23, type: validation, front: {es: ¿Cómo validar count y locate?, en: How should count and locate be validated?, da: Hvordan valideres count og locate?}, back: {es: Comparar conteos y posiciones con búsqueda exhaustiva en textos aleatorios y repetitivos., en: Compare counts and positions with exhaustive search on random and repetitive texts., da: Sammenlign med udtømmende søgning på tilfældige og repetitive tekster.}}
  - {id: dm847.m08.f24, type: oral, front: {es: Resume el FM-index en una frase., en: Summarize the FM-index in one sentence., da: Opsummér FM-index i én sætning.}, back: {es: Es un índice comprimido basado en BWT y rank que mantiene intervalos de sufijos mediante búsqueda hacia atrás., en: It is a BWT- and rank-based compressed index that maintains suffix intervals through backward search., da: Det er et komprimeret BWT- og rank-baseret indeks med suffix-intervaller via backward search.}}
