course_code: DM847
module_id: dm847.m11
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m11.f01, type: distinction, front: {"es": "Diferencia entre molécula, fragmento y read.", "en": "Difference among molecule, fragment, and read.", "da": "Forskel mellem molekyle, fragment og read."}, back: {"es": "La molécula es material original; el fragmento es una unidad de biblioteca; la read es la secuencia observada desde ese fragmento.", "en": "A molecule is original material; a fragment is a library unit; a read is the observed sequence from that fragment.", "da": "Molekylet er originalt materiale; fragmentet er en biblioteksenhed; readet er den observerede sekvens."}}
  - {id: dm847.m11.f02, type: conceptual, front: {"es": "¿Qué produce paired-end?", "en": "What does paired-end sequencing produce?", "da": "Hvad producerer paired-end?"}, back: {"es": "Dos reads desde extremos opuestos del mismo fragmento, con orientación y distancia esperadas.", "en": "Two reads from opposite ends of one fragment with expected orientation and distance.", "da": "To reads fra modsatte ender af samme fragment med forventet orientering og afstand."}}
  - {id: dm847.m11.f03, type: misconception, front: {"es": "Corrige: una read siempre equivale a una molécula original.", "en": "Correct: one read always equals one original molecule.", "da": "Ret: ét read svarer altid til ét originalt molekyle."}, back: {"es": "PCR y duplicación pueden generar varias reads de una molécula; una molécula también puede no observarse.", "en": "PCR and duplication may yield several reads from one molecule, while some molecules are never observed.", "da": "PCR kan give flere reads fra ét molekyle, og nogle molekyler observeres ikke."}}
  - {id: dm847.m11.f04, type: format, front: {"es": "Las cuatro líneas de FASTQ.", "en": "The four FASTQ lines.", "da": "De fire FASTQ-linjer."}, back: {"es": "Identificador, secuencia, separador y cadena de calidades.", "en": "Identifier, sequence, separator, and quality string.", "da": "Identifikator, sekvens, separator og kvalitetsstreng."}}
  - {id: dm847.m11.f05, type: formula, front: {"es": "Fórmula Phred.", "en": "Phred formula.", "da": "Phred-formel."}, back: {"es": "Q=-10 log10(p_error), por tanto p_error=10^(-Q/10).", "en": "Q=-10 log10(p_error), so p_error=10^(-Q/10).", "da": "Q=-10 log10(p_error), så p_error=10^(-Q/10)."}}
  - {id: dm847.m11.f06, type: calculation, front: {"es": "Probabilidad aproximada de error para Q20 y Q30.", "en": "Approximate error probability for Q20 and Q30.", "da": "Omtrentlig fejlsandsynlighed for Q20 og Q30."}, back: {"es": "Q20≈0.01; Q30≈0.001 por base.", "en": "Q20≈0.01; Q30≈0.001 per base.", "da": "Q20≈0,01; Q30≈0,001 pr. base."}}
  - {id: dm847.m11.f07, type: misconception, front: {"es": "Corrige: Q30 significa 99.9% de probabilidad de una read perfecta.", "en": "Correct: Q30 means a 99.9% probability of a perfect read.", "da": "Ret: Q30 betyder 99,9% sandsynlighed for et perfekt read."}, back: {"es": "Es una estimación por base; la probabilidad de una read sin errores depende de longitud y dependencia entre bases.", "en": "It is a per-base estimate; whole-read perfection depends on length and dependence among base calls.", "da": "Det er et estimat pr. base; sandsynligheden for et fejlfrit read afhænger af længde og afhængighed."}}
  - {id: dm847.m11.f08, type: qc, front: {"es": "¿Qué muestra calidad por ciclo?", "en": "What does per-cycle quality show?", "da": "Hvad viser kvalitet pr. cyklus?"}, back: {"es": "Cómo cambia la calidad estimada según la posición dentro de las reads.", "en": "How estimated quality changes by position within reads.", "da": "Hvordan estimeret kvalitet ændres efter position i reads."}}
  - {id: dm847.m11.f09, type: qc, front: {"es": "Tres causas de secuencias sobrerrepresentadas.", "en": "Three causes of overrepresented sequences.", "da": "Tre årsager til overrepræsenterede sekvenser."}, back: {"es": "Adaptadores, rRNA y contaminación; también amplicones o abundancia biológica real.", "en": "Adapters, rRNA, and contamination; also amplicons or true biological abundance.", "da": "Adaptere, rRNA og kontaminering; også ampliconer eller reel biologisk abundance."}}
  - {id: dm847.m11.f10, type: misconception, front: {"es": "Corrige: una alerta QC obliga a descartar la muestra.", "en": "Correct: a QC warning requires discarding the sample.", "da": "Ret: en QC-advarsel kræver kassation af prøven."}, back: {"es": "Debe interpretarse según el ensayo y comprobarse su impacto downstream.", "en": "It must be interpreted in assay context and checked for downstream impact.", "da": "Den skal fortolkes i assay-kontekst og kontrolleres downstream."}}
  - {id: dm847.m11.f11, type: practical, front: {"es": "¿Cuándo aparecen adaptadores dentro de reads?", "en": "When do adapters appear inside reads?", "da": "Hvornår ses adaptere inde i reads?"}, back: {"es": "Cuando el inserto es más corto que la longitud secuenciada y la lectura atraviesa el fragmento.", "en": "When the insert is shorter than read length and sequencing continues into the adapter.", "da": "Når insertet er kortere end read-længden og sekventeringen fortsætter ind i adapteren."}}
  - {id: dm847.m11.f12, type: tradeoff, front: {"es": "Riesgo de trimming agresivo.", "en": "Risk of aggressive trimming.", "da": "Risiko ved aggressiv trimming."}, back: {"es": "Reads más cortas, menor unicidad, mayor multimapeo y pérdida de información.", "en": "Shorter reads, reduced uniqueness, more multimapping, and information loss.", "da": "Kortere reads, mindre unikhed, mere multimapping og informationstab."}}
  - {id: dm847.m11.f13, type: conceptual, front: {"es": "¿Qué estima mapping quality?", "en": "What does mapping quality estimate?", "da": "Hvad estimerer mapping quality?"}, back: {"es": "Confianza en la ubicación elegida frente a ubicaciones alternativas.", "en": "Confidence in the chosen placement relative to alternatives.", "da": "Tillid til den valgte placering relativt til alternativer."}}
  - {id: dm847.m11.f14, type: distinction, front: {"es": "Base quality frente a mapping quality.", "en": "Base quality versus mapping quality.", "da": "Base quality versus mapping quality."}, back: {"es": "Base quality trata error del símbolo; mapping quality trata ambigüedad de ubicación.", "en": "Base quality concerns symbol error; mapping quality concerns placement ambiguity.", "da": "Base quality handler om symbolfejl; mapping quality om placeringsusikkerhed."}}
  - {id: dm847.m11.f15, type: conceptual, front: {"es": "¿Qué es multimapeo?", "en": "What is multimapping?", "da": "Hvad er multimapping?"}, back: {"es": "Compatibilidad de una read con varias posiciones de referencia de calidad similar.", "en": "Compatibility of a read with multiple similarly plausible reference positions.", "da": "Et read passer til flere omtrent lige sandsynlige referencepositioner."}}
  - {id: dm847.m11.f16, type: bias, front: {"es": "¿Qué es reference bias?", "en": "What is reference bias?", "da": "Hvad er referencebias?"}, back: {"es": "Tendencia a mapear o detectar mejor alelos similares a la referencia.", "en": "Preferential mapping or detection of alleles similar to the reference.", "da": "Tendens til bedre mapping eller detektion af alleler, der ligner referencen."}}
  - {id: dm847.m11.f17, type: conceptual, front: {"es": "¿Qué es profundidad de cobertura?", "en": "What is coverage depth?", "da": "Hvad er dækningsdybde?"}, back: {"es": "Número de reads o fragmentos que cubren una posición bajo una convención declarada.", "en": "Number of reads or fragments covering a position under a stated convention.", "da": "Antal reads eller fragmenter over en position under en angivet konvention."}}
  - {id: dm847.m11.f18, type: conceptual, front: {"es": "¿Qué es breadth de cobertura?", "en": "What is coverage breadth?", "da": "Hvad er coverage breadth?"}, back: {"es": "Fracción del objetivo que alcanza al menos una profundidad k definida.", "en": "Fraction of the target reaching at least a defined depth k.", "da": "Andelen af målet der når mindst en defineret dybde k."}}
  - {id: dm847.m11.f19, type: misconception, front: {"es": "Corrige: 30x medio implica cobertura uniforme.", "en": "Correct: 30x mean depth implies uniform coverage.", "da": "Ret: 30x gennemsnit betyder uniform dækning."}, back: {"es": "La misma media puede coexistir con regiones sin cobertura y otras extremadamente profundas.", "en": "The same mean may coexist with uncovered and extremely deep regions.", "da": "Samme gennemsnit kan have både udækkede og meget dybe regioner."}}
  - {id: dm847.m11.f20, type: conceptual, front: {"es": "¿Qué es una peak?", "en": "What is a peak?", "da": "Hvad er en peak?"}, back: {"es": "Una región con acumulación de fragmentos mayor que un fondo definido por modelo y controles.", "en": "A region with fragment accumulation above a model- and control-defined background.", "da": "En region med fragmentakkumulation over en model- og kontroldefineret baggrund."}}
  - {id: dm847.m11.f21, type: misconception, front: {"es": "Corrige: una peak demuestra unión causal.", "en": "Correct: a peak proves causal binding.", "da": "Ret: en peak beviser kausal binding."}, back: {"es": "Demuestra enriquecimiento estadístico bajo un ensayo; causalidad o función requieren evidencia adicional.", "en": "It demonstrates statistical enrichment under an assay; causality or function require additional evidence.", "da": "Den viser statistisk berigelse; kausalitet og funktion kræver ekstra evidens."}}
  - {id: dm847.m11.f22, type: reproducibility, front: {"es": "Cinco elementos de procedencia de un pipeline.", "en": "Five pipeline provenance elements.", "da": "Fem provenance-elementer i et pipeline."}, back: {"es": "Checksums, referencia y versión, anotación, parámetros, software y entorno; también orden de etapas.", "en": "Checksums, reference and version, annotation, parameters, software and environment; also stage order.", "da": "Checksums, referenceversion, annotation, parametre, software og miljø; også trinrækkefølge."}}
  - {id: dm847.m11.f23, type: validation, front: {"es": "¿Qué son métricas de transición?", "en": "What are transition metrics?", "da": "Hvad er overgangsmetrikker?"}, back: {"es": "Conteos que registran cuántas unidades entran, se retienen, se mapean, filtran y analizan en cada etapa.", "en": "Counts recording how many units enter, remain, map, are filtered, and reach analysis at each stage.", "da": "Tællinger af hvor mange enheder der går ind, beholdes, mappes, filtreres og analyseres."}}
  - {id: dm847.m11.f24, type: oral, front: {"es": "Resume un pipeline NGS reproducible en una frase.", "en": "Summarize a reproducible NGS pipeline in one sentence.", "da": "Opsummér et reproducerbart NGS-pipeline i én sætning."}, back: {"es": "Cada transformación debe estar versionada, parametrizada, cuantificada y verificable desde datos crudos hasta resultado.", "en": "Every transformation must be versioned, parameterized, quantified, and verifiable from raw data to result.", "da": "Hver transformation skal være versioneret, parametriseret, kvantificeret og verificerbar fra rådata til resultat."}}
