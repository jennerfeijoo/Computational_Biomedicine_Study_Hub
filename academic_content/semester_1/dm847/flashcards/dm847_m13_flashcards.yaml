course_code: DM847
module_id: dm847.m13
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m13.f01, type: conceptual, front: {"es": "¿Qué pregunta ORA?", "en": "What does ORA ask?", "da": "Hvad spørger ORA om?"}, back: {"es": "Si una lista contiene más miembros de un conjunto que lo esperado desde un universo definido.", "en": "Whether a target list contains more set members than expected from a defined universe.", "da": "Om en målliste indeholder flere medlemmer af et sæt end forventet fra et defineret univers."}}
  - {id: dm847.m13.f02, type: conceptual, front: {"es": "¿Qué debe contener el universo?", "en": "What should the universe contain?", "da": "Hvad bør universet indeholde?"}, back: {"es": "Genes que podían haber sido medidos, mapeados, filtrados y seleccionados en el análisis.", "en": "Genes that could have been measured, mapped, filtered, and selected.", "da": "Gener der kunne være målt, mappet, filtreret og valgt."}}
  - {id: dm847.m13.f03, type: misconception, front: {"es": "Corrige: el universo siempre es todo el genoma.", "en": "Correct: the universe is always the whole genome.", "da": "Ret: universet er altid hele genomet."}, back: {"es": "Debe reflejar elegibilidad experimental; usar todo el genoma puede sesgar el nulo.", "en": "It should reflect experimental eligibility; using the whole genome may bias the null.", "da": "Det bør afspejle eksperimentel valgbarhed; hele genomet kan give bias."}}
  - {id: dm847.m13.f04, type: formula, front: {"es": "Parámetros de la hipergeométrica en ORA.", "en": "Hypergeometric parameters in ORA.", "da": "Hypergeometriske parametre i ORA."}, back: {"es": "N universo, K miembros del conjunto, n genes seleccionados y k solapamientos.", "en": "N universe size, K set members, n selected genes, and k overlaps.", "da": "N universstørrelse, K sætelementer, n valgte gener og k overlap."}}
  - {id: dm847.m13.f05, type: effect, front: {"es": "¿Qué es fold enrichment?", "en": "What is fold enrichment?", "da": "Hvad er fold enrichment?"}, back: {"es": "Solapamiento observado dividido por el solapamiento esperado nK/N.", "en": "Observed overlap divided by expected overlap nK/N.", "da": "Observeret overlap divideret med forventet overlap nK/N."}}
  - {id: dm847.m13.f06, type: misconception, front: {"es": "Corrige: p-value pequeño significa efecto grande.", "en": "Correct: a small p-value means a large effect.", "da": "Ret: en lille p-værdi betyder en stor effekt."}, back: {"es": "El p-value depende también de tamaños; deben reportarse overlap y efecto.", "en": "The p-value also depends on sample and set sizes; overlap and effect must be reported.", "da": "P-værdien afhænger også af størrelser; overlap og effekt skal rapporteres."}}
  - {id: dm847.m13.f07, type: distinction, front: {"es": "ORA frente a método por ranking.", "en": "ORA versus a rank-based method.", "da": "ORA versus rank-baseret metode."}, back: {"es": "ORA usa una lista binaria; ranking usa todos los genes ordenados y evita un umbral duro.", "en": "ORA uses a binary list; rank methods use all ordered genes and avoid a hard threshold.", "da": "ORA bruger en binær liste; rank-metoder bruger alle ordnede gener."}}
  - {id: dm847.m13.f08, type: ranking, front: {"es": "¿Por qué no ordenar sólo por p-value?", "en": "Why not rank only by p-value?", "da": "Hvorfor ikke rangere kun efter p-værdi?"}, back: {"es": "Porque se pierde la dirección del efecto; conviene un estadístico firmado.", "en": "Because effect direction is lost; a signed statistic is preferable.", "da": "Fordi effektretningen mistes; en signeret statistik er bedre."}}
  - {id: dm847.m13.f09, type: conceptual, front: {"es": "¿Qué es leading edge?", "en": "What is the leading edge?", "da": "Hvad er leading edge?"}, back: {"es": "Miembros del conjunto que contribuyen principalmente al score de enriquecimiento por ranking.", "en": "Set members contributing most to a rank-based enrichment score.", "da": "Sætelementer der bidrager mest til en rank-baseret enrichment-score."}}
  - {id: dm847.m13.f10, type: distinction, front: {"es": "Nulo competitivo frente a autocontenido.", "en": "Competitive versus self-contained null.", "da": "Konkurrerende versus selvstændig nul."}, back: {"es": "Competitivo compara dentro y fuera del conjunto; autocontenido pregunta si hay alguna asociación dentro.", "en": "Competitive compares inside versus outside the set; self-contained asks whether any association exists inside.", "da": "Konkurrerende sammenligner indenfor og udenfor sættet; selvstændig spørger om nogen association findes indenfor."}}
  - {id: dm847.m13.f11, type: permutation, front: {"es": "¿Por qué preferir permutar etiquetas de muestra?", "en": "Why prefer permuting sample labels?", "da": "Hvorfor foretrække permutation af samplelabels?"}, back: {"es": "Puede preservar correlación entre genes si el diseño permite intercambiabilidad.", "en": "It can preserve gene-gene correlation when the design permits exchangeability.", "da": "Det kan bevare genkorrelation når designet tillader udskiftelighed."}}
  - {id: dm847.m13.f12, type: design, front: {"es": "¿Qué limita permutaciones en un estudio pareado?", "en": "What constrains permutations in a paired study?", "da": "Hvad begrænser permutationer i et parret studie?"}, back: {"es": "Las etiquetas sólo pueden intercambiarse dentro de pares o bloques compatibles.", "en": "Labels can be exchanged only within compatible pairs or blocks.", "da": "Labels kan kun byttes inden for kompatible par eller blokke."}}
  - {id: dm847.m13.f13, type: multiplicity, front: {"es": "¿Qué controla BH?", "en": "What does BH control?", "da": "Hvad kontrollerer BH?"}, back: {"es": "La tasa esperada de falsos descubrimientos entre resultados declarados.", "en": "The expected false discovery rate among declared results.", "da": "Den forventede false discovery rate blandt deklarerede resultater."}}
  - {id: dm847.m13.f14, type: misconception, front: {"es": "Corrige: FDR elimina redundancia de vías.", "en": "Correct: FDR removes pathway redundancy.", "da": "Ret: FDR fjerner pathway-redundans."}, back: {"es": "Controla multiplicidad estadística; términos solapados siguen siendo semánticamente redundantes.", "en": "It controls statistical multiplicity; overlapping terms remain semantically redundant.", "da": "Det kontrollerer multipel testning; overlappende termer er stadig redundante."}}
  - {id: dm847.m13.f15, type: network, front: {"es": "¿Qué hace network propagation?", "en": "What does network propagation do?", "da": "Hvad gør netværkspropagation?"}, back: {"es": "Difunde scores semilla a través de conexiones según una matriz normalizada.", "en": "It diffuses seed scores through connections according to a normalized matrix.", "da": "Den diffuserer seed-scores gennem forbindelser efter en normaliseret matrix."}}
  - {id: dm847.m13.f16, type: parameter, front: {"es": "¿Qué controla restart?", "en": "What does restart control?", "da": "Hvad kontrollerer restart?"}, back: {"es": "El equilibrio entre permanecer cerca de semillas y explorar la red global.", "en": "The balance between staying near seeds and exploring the global network.", "da": "Balancen mellem nærhed til seeds og global udforskning."}}
  - {id: dm847.m13.f17, type: bias, front: {"es": "¿Por qué hubs pueden acumular señal?", "en": "Why can hubs accumulate signal?", "da": "Hvorfor kan hubs akkumulere signal?"}, back: {"es": "Tienen muchas rutas de entrada; la normalización y los nulos por grado deben evaluarlo.", "en": "They have many incoming paths; normalization and degree-aware nulls should assess this.", "da": "De har mange indgående stier; normalisering og gradbevidste nulmodeller bør vurderes."}}
  - {id: dm847.m13.f18, type: conceptual, front: {"es": "¿Qué es un módulo activo?", "en": "What is an active module?", "da": "Hvad er et aktivt modul?"}, back: {"es": "Un subgrafo conectado cuyos nodos muestran señal coordinada mayor que la esperada.", "en": "A connected subgraph whose nodes show coordinated signal beyond expectation.", "da": "En sammenhængende subgraf med koordineret signal over forventning."}}
  - {id: dm847.m13.f19, type: selection_bias, front: {"es": "¿Por qué evaluar un módulo seleccionado es difícil?", "en": "Why is evaluating a selected module difficult?", "da": "Hvorfor er evaluering af et valgt modul vanskelig?"}, back: {"es": "El mismo algoritmo buscó entre muchos subgrafos y favorece máximos por selección.", "en": "The algorithm searched many subgraphs and selection favors extreme scores.", "da": "Algoritmen søgte mange subgrafer, og selektion favoriserer ekstreme scores."}}
  - {id: dm847.m13.f20, type: stability, front: {"es": "Cuatro pruebas de estabilidad de módulos.", "en": "Four active-module stability checks.", "da": "Fire stabilitetstests for aktive moduler."}, back: {"es": "Bootstrap de muestras, perturbación de red, variación de parámetros y múltiples semillas.", "en": "Sample bootstrap, network perturbation, parameter variation, and multiple seeds.", "da": "Sample-bootstrap, netværksperturbation, parameterændring og flere seeds."}}
  - {id: dm847.m13.f21, type: redundancy, front: {"es": "¿Cómo reducir redundancia de términos?", "en": "How can term redundancy be reduced?", "da": "Hvordan kan termredundans reduceres?"}, back: {"es": "Agrupar por genes compartidos, similitud semántica, jerarquía u overlap del leading edge.", "en": "Group by shared genes, semantic similarity, hierarchy, or leading-edge overlap.", "da": "Gruppér efter delte gener, semantisk lighed, hierarki eller leading-edge-overlap."}}
  - {id: dm847.m13.f22, type: misconception, front: {"es": "Corrige: una vía significativa es un mecanismo causal demostrado.", "en": "Correct: a significant pathway is a proven causal mechanism.", "da": "Ret: en signifikant pathway er en bevist kausal mekanisme."}, back: {"es": "Es una hipótesis resumida basada en anotaciones y un nulo; requiere validación independiente.", "en": "It is a summarized hypothesis based on annotations and a null; independent validation is required.", "da": "Det er en opsummeret hypotese baseret på annotationer og nulmodel; uafhængig validering kræves."}}
  - {id: dm847.m13.f23, type: reporting, front: {"es": "¿Qué reportar además de q-value?", "en": "What should be reported besides q-value?", "da": "Hvad bør rapporteres ud over q-værdi?"}, back: {"es": "Universo, tamaños, overlap, efecto, genes conductores, dirección, versión de colección y redundancia.", "en": "Universe, sizes, overlap, effect, leading genes, direction, collection version, and redundancy.", "da": "Univers, størrelser, overlap, effekt, leading genes, retning, samlingsversion og redundans."}}
  - {id: dm847.m13.f24, type: oral, front: {"es": "Resume el principio central del enriquecimiento.", "en": "Summarize the central principle of enrichment.", "da": "Opsummér det centrale princip i enrichment."}, back: {"es": "La conclusión sólo es válida respecto al universo, anotaciones, estadístico y modelo nulo explícitos.", "en": "A conclusion is valid only relative to the explicit universe, annotations, statistic, and null model.", "da": "En konklusion er kun gyldig relativt til eksplicit univers, annotationer, statistik og nulmodel."}}
