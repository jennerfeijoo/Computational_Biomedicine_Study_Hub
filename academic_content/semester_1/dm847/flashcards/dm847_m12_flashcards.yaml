schema_version: 1.0.0
course_code: DM847
module_id: dm847.m12
count: 24
locales: [es, en, da]

cards:
  - {id: dm847.m12.f01, type: conceptual, front: {es: ¿Qué representan V y E en G=(V,E)?, en: What do V and E represent in G=(V,E)?, da: Hvad repræsenterer V og E i G=(V,E)?}, back: {es: V es el conjunto de nodos y E el conjunto de aristas o relaciones., en: V is the node set and E the edge or relation set., da: V er nodesættet og E er kanterne eller relationerne.}}
  - {id: dm847.m12.f02, type: modeling, front: {es: ¿Por qué una red es una hipótesis y no una fotografía neutral?, en: Why is a network a hypothesis rather than a neutral photograph?, da: Hvorfor er et netværk en hypotese og ikke et neutralt billede?}, back: {es: Porque nodos, aristas, umbrales, condiciones y fuentes se eligen según una pregunta., en: Because nodes, edges, thresholds, conditions, and sources are chosen for a question., da: Fordi noder, kanter, tærskler, betingelser og kilder vælges efter et spørgsmål.}}
  - {id: dm847.m12.f03, type: distinction, front: {es: Interacción física frente a coexpresión., en: Physical interaction versus coexpression., da: Fysisk interaktion versus coexpression.}, back: {es: La primera afirma contacto o asociación molecular; la segunda, correlación de perfiles. No son equivalentes., en: The first asserts molecular contact or association; the second, correlated profiles. They are not equivalent., da: Den første angiver molekylær kontakt; den anden korrelerede profiler. De er ikke ækvivalente.}}
  - {id: dm847.m12.f04, type: conceptual, front: {es: ¿Cuándo usar una arista dirigida?, en: When should an edge be directed?, da: Hvornår bør en kant være rettet?}, back: {es: Cuando la relación tiene fuente y destino distintos, como regulación o flujo., en: When the relation has distinct source and target, such as regulation or flow., da: Når relationen har forskellig kilde og mål, som regulering eller flow.}}
  - {id: dm847.m12.f05, type: tradeoff, front: {es: ¿Qué puede significar un peso?, en: What can an edge weight mean?, da: Hvad kan en kantvægt betyde?}, back: {es: Fuerza, confianza, frecuencia, similitud o distancia; debe declararse antes de usar algoritmos., en: Strength, confidence, frequency, similarity, or distance; it must be declared before algorithms are used., da: Styrke, tillid, frekvens, lighed eller afstand; betydningen skal deklareres.}}
  - {id: dm847.m12.f06, type: representation, front: {es: Ventaja de una lista de aristas., en: Advantage of an edge list., da: Fordel ved en edge-list.}, back: {es: Es compacta, fácil de intercambiar y conserva atributos por arista., en: It is compact, easy to exchange, and can preserve edge attributes., da: Den er kompakt, let at udveksle og kan bevare kantattributter.}}
  - {id: dm847.m12.f07, type: representation, front: {es: Ventaja de una lista de adyacencia., en: Advantage of an adjacency list., da: Fordel ved en adjacency-list.}, back: {es: Permite recorrer vecinos en tiempo proporcional al grado y es adecuada para redes dispersas., en: It traverses neighbors in time proportional to degree and suits sparse networks., da: Den gennemløber naboer i tid proportional med graden og passer til sparse netværk.}}
  - {id: dm847.m12.f08, type: representation, front: {es: Coste de memoria de una matriz de adyacencia densa., en: Memory cost of a dense adjacency matrix., da: Hukommelsesomkostning for en tæt adjacency-matrix.}, back: {es: O(|V|²), incluso si hay pocas aristas., en: O(|V|²), even when few edges exist., da: O(|V|²), selv hvis der er få kanter.}}
  - {id: dm847.m12.f09, type: algorithm, front: {es: ¿Qué estructura usa BFS?, en: Which data structure does BFS use?, da: Hvilken datastruktur bruger BFS?}, back: {es: Una cola FIFO., en: A FIFO queue., da: En FIFO-kø.}}
  - {id: dm847.m12.f10, type: algorithm, front: {es: ¿Qué calcula BFS en un grafo no ponderado?, en: What does BFS compute in an unweighted graph?, da: Hvad beregner BFS i en uvægtet graf?}, back: {es: Distancias mínimas en número de aristas desde la fuente y un árbol de descubrimiento., en: Minimum edge-count distances from the source and a discovery tree., da: Korteste afstande i antal kanter fra kilden og et discovery-træ.}}
  - {id: dm847.m12.f11, type: algorithm, front: {es: ¿Para qué es útil DFS?, en: What is DFS useful for?, da: Hvad er DFS nyttig til?}, back: {es: Explorar componentes, detectar ciclos y construir órdenes según el tipo de grafo., en: Exploring components, detecting cycles, and constructing orderings depending on graph type., da: Udforske komponenter, finde cykler og konstruere ordninger afhængigt af graftype.}}
  - {id: dm847.m12.f12, type: conceptual, front: {es: ¿Qué cuenta el grado?, en: What does degree count?, da: Hvad tæller grad?}, back: {es: Vecinos o aristas incidentes bajo una convención explícita; en dirigidos se separan entrada y salida., en: Neighbors or incident edges under an explicit convention; directed graphs separate in- and out-degree., da: Naboer eller incident edges; rettede grafer skelner ind- og udgrad.}}
  - {id: dm847.m12.f13, type: conceptual, front: {es: ¿Qué es fuerza de nodo?, en: What is node strength?, da: Hvad er nodestyrke?}, back: {es: La suma de pesos de sus aristas incidentes según dirección y definición., en: The sum of incident edge weights under the stated direction and definition., da: Summen af vægte på incident edges efter retning og definition.}}
  - {id: dm847.m12.f14, type: conceptual, front: {es: ¿Qué mide betweenness?, en: What does betweenness measure?, da: Hvad måler betweenness?}, back: {es: La fracción de caminos mínimos entre pares que pasan por un nodo o arista., en: The fraction of pairwise shortest paths passing through a node or edge., da: Andelen af korteste stier mellem par, der går gennem en node eller kant.}}
  - {id: dm847.m12.f15, type: misconception, front: {es: Corrige: un hub es automáticamente esencial., en: Correct: a hub is automatically essential., da: Ret: en hub er automatisk essentiel.}, back: {es: El grado puede reflejar sesgo de estudio o integración; esencialidad requiere evidencia independiente., en: Degree may reflect study or integration bias; essentiality requires independent evidence., da: Grad kan afspejle forskningsbias; essentialitet kræver uafhængigt bevis.}}
  - {id: dm847.m12.f16, type: provenance, front: {es: ¿Qué atributos mínimos debería conservar una arista?, en: Which minimum attributes should an edge preserve?, da: Hvilke minimumsattributter bør en kant bevare?}, back: {es: Fuente, versión, método, organismo, condición, tipo de evidencia y score o confianza., en: Source, version, method, organism, condition, evidence type, and score or confidence., da: Kilde, version, metode, organisme, betingelse, evidenstype og score eller tillid.}}
  - {id: dm847.m12.f17, type: bias, front: {es: ¿Cómo puede el sesgo de publicación afectar grado?, en: How can publication bias affect degree?, da: Hvordan kan publikationsbias påvirke grad?}, back: {es: Genes estudiados con más intensidad acumulan más aristas documentadas., en: More intensively studied genes accumulate more documented edges., da: Mere undersøgte gener akkumulerer flere dokumenterede kanter.}}
  - {id: dm847.m12.f18, type: visualization, front: {es: ¿Qué hace un layout?, en: What does a layout do?, da: Hvad gør et layout?}, back: {es: Asigna coordenadas visuales según una regla gráfica; normalmente no crea coordenadas biológicas., en: It assigns visual coordinates by a graphical rule; it usually does not create biological coordinates., da: Det tildeler visuelle koordinater efter en grafisk regel, normalt ikke biologiske koordinater.}}
  - {id: dm847.m12.f19, type: misconception, front: {es: Corrige: nodos cercanos en force-directed tienen relación biológica más fuerte., en: Correct: nearby nodes in force-directed layout have stronger biological relation., da: Ret: nære noder i force-directed layout har stærkere biologisk relation.}, back: {es: La cercanía puede depender del algoritmo, semilla y topología global; no es una medición biológica directa., en: Proximity may depend on algorithm, seed, and global topology; it is not a direct biological measurement., da: Nærhed kan afhænge af algoritme, seed og global topologi; det er ikke direkte biologisk måling.}}
  - {id: dm847.m12.f20, type: null_model, front: {es: ¿Por qué usar un modelo nulo?, en: Why use a null model?, da: Hvorfor bruge en nulmodel?}, back: {es: Para evaluar si una propiedad observada excede lo esperable bajo una hipótesis de randomización definida., en: To test whether an observed property exceeds expectation under a defined randomization hypothesis., da: For at teste om en observeret egenskab overstiger forventningen under en defineret randomisering.}}
  - {id: dm847.m12.f21, type: null_model, front: {es: ¿Qué preserva un nulo de reconfiguración por grado?, en: What does a degree-preserving rewiring null preserve?, da: Hvad bevarer en gradbevarende rewiring-nulmodel?}, back: {es: La secuencia de grados de los nodos, mientras cambia qué pares están conectados., en: The node degree sequence while changing which pairs are connected., da: Nodernes gradsekvens mens forbindelsespar ændres.}}
  - {id: dm847.m12.f22, type: misconception, front: {es: Corrige: un p bajo con cualquier nulo demuestra la misma propiedad., en: Correct: a low p-value under any null proves the same property., da: Ret: en lav p-værdi under enhver nulmodel beviser samme egenskab.}, back: {es: La conclusión depende de qué preserva y permite el nulo; distintos nulos responden preguntas distintas., en: The conclusion depends on what the null preserves and permits; different nulls answer different questions., da: Konklusionen afhænger af hvad nulmodellen bevarer og tillader.}}
  - {id: dm847.m12.f23, type: oral, front: {es: ¿Qué debes declarar antes de reportar centralidad?, en: What must be declared before reporting centrality?, da: Hvad skal deklareres før centralitet rapporteres?}, back: {es: Definición de nodos y aristas, dirección, peso, filtros, evidencia, componente analizada y centralidad exacta., en: Node and edge definitions, direction, weight, filters, evidence, analyzed component, and exact centrality., da: Node- og kantdefinitioner, retning, vægt, filtre, evidens, komponent og præcis centralitet.}}
  - {id: dm847.m12.f24, type: transfer, front: {es: ¿Cómo prepara este módulo el análisis de enriquecimiento en redes?, en: How does this module prepare network enrichment analysis?, da: Hvordan forbereder modulet netværksberigelse?}, back: {es: Define topología, procedencia, nulos y sesgos necesarios para evaluar módulos o rutas sin sobreinterpretar., en: It defines topology, provenance, nulls, and biases needed to evaluate modules or pathways cautiously., da: Det definerer topologi, provenance, nulmodeller og bias til forsigtig evaluering af moduler og pathways.}}
