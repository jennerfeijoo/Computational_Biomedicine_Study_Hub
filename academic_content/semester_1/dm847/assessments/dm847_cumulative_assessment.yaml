  - id: dm847.oral.15
    outcomes: [dm847.lo05]
    question:
      es: "Diseña un modelo nulo para probar si genes de una vía forman un módulo más denso de lo esperado."
      en: "Design a null model testing whether pathway genes form a denser-than-expected module."
      da: "Design en nulmodel der tester om pathway-gener danner et tættere modul end forventet."
