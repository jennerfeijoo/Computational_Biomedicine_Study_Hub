schema_version: 1.0.0
course_code: DM847
assessment_id: dm847.cumulative.01
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: "Evaluación acumulativa de DM847: proyecto y defensa oral"
    en: "DM847 cumulative assessment: project and oral defense"
    da: "DM847 kumulativ evaluering: projekt og mundtligt forsvar"
  official_format_reference:
    en: "Written project assignment followed by a final oral examination."
  scope:
    es: "Integra los nueve resultados de aprendizaje mediante un proyecto reproducible y preguntas individuales de todo el programa."
    en: "Integrates all nine learning outcomes through a reproducible project and individual questions spanning the syllabus."
    da: "Integrerer alle ni læringsmål gennem et reproducerbart projekt og individuelle spørgsmål på tværs af pensum."
  note:
    es: "La distribución temporal propuesta para la práctica oral es orientativa y no sustituye instrucciones oficiales del curso."
    en: "The proposed timing for oral practice is instructional and does not replace official course instructions."
    da: "Den foreslåede tidsfordeling til mundtlig træning er vejledende og erstatter ikke officielle kursusinstruktioner."

project_requirements:
  mandatory_elements:
    - id: question
      description:
        es: "Pregunta biológica y especificación computacional verificables."
        en: "Verifiable biological question and computational specification."
        da: "Verificerbart biologisk spørgsmål og beregningsspecifikation."
    - id: provenance
      description:
        es: "Fuentes, licencias, identificadores, versiones, anotaciones y criterios de inclusión."
        en: "Sources, licenses, identifiers, versions, annotations, and inclusion criteria."
        da: "Kilder, licenser, identifikatorer, versioner, annotationer og inklusionskriterier."
    - id: baseline
      description:
        es: "Baseline simple y al menos una alternativa metodológica razonable."
        en: "A simple baseline and at least one reasonable methodological alternative."
        da: "En simpel baseline og mindst ét rimeligt metodisk alternativ."
    - id: implementation
      description:
        es: "Workflow reproducible con parámetros, entorno, semillas y métricas de transición."
        en: "Reproducible workflow with parameters, environment, seeds, and transition metrics."
        da: "Reproducerbart workflow med parametre, miljø, seeds og overgangsmetrikker."
    - id: validation
      description:
        es: "Validación técnica, algorítmica, estadística y biológica proporcional a la pregunta."
        en: "Technical, algorithmic, statistical, and biological validation proportional to the question."
        da: "Teknisk, algoritmisk, statistisk og biologisk validering proportional med spørgsmålet."
    - id: interpretation
      description:
        es: "Resultados, incertidumbre, sensibilidad, limitaciones y alcance de conclusiones."
        en: "Results, uncertainty, sensitivity, limitations, and claim scope."
        da: "Resultater, usikkerhed, følsomhed, begrænsninger og påstandens rækkevidde."
  prohibited_shortcuts:
    - Selecting methods solely because software is familiar.
    - Tuning parameters on final evaluation data.
    - Treating identifiers from different namespaces as interchangeable.
    - Reporting execution as the only validation evidence.
    - Calling associations causal, mechanistic, or clinical without suitable evidence.
    - Copying protected exercises, figures, tables, or passages.

project_tracks:
  - id: dm847.project.sequence_family
    title:
      es: "Detección y anotación de una familia de secuencias"
      en: "Sequence-family detection and annotation"
      da: "Detektion og annotation af en sekvensfamilie"
    core_question:
      es: "¿Puede un modelo de familia distinguir miembros de no miembros difíciles en datos externos?"
      en: "Can a family model distinguish members from difficult non-members in external data?"
      da: "Kan en familiemodel skelne medlemmer fra vanskelige ikke-medlemmer i eksterne data?"
    required_methods:
      - sequence representation and quality checks
      - pairwise alignment or similarity baseline
      - profile HMM or another probabilistic family model
      - held-out family-aware evaluation
    required_controls:
      - shuffled or composition-matched negatives
      - close homologs outside the target family
      - sensitivity to sequence length and threshold
    oral_connections: [dm847.m01, dm847.m04, dm847.m05, dm847.m06, dm847.m14]
  - id: dm847.project.index_search
    title:
      es: "Índice exacto y extensión tolerante a errores"
      en: "Exact index and error-tolerant extension"
      da: "Eksakt indeks og fejltolerant udvidelse"
    core_question:
      es: "¿Qué compromiso tiempo-memoria ofrece un índice de secuencias para una carga de consultas definida?"
      en: "What time-memory trade-off does a sequence index provide for a defined query workload?"
      da: "Hvilket tid-hukommelseskompromis giver et sekvensindeks for en defineret workload?"
    required_methods:
      - exhaustive-search correctness oracle
      - suffix array or FM-index
      - memory and query profiling
      - seed verification or extension strategy
    required_controls:
      - random and repetitive texts
      - absent, overlapping, and boundary patterns
      - full versus sampled structures
    oral_connections: [dm847.m04, dm847.m05, dm847.m07, dm847.m08, dm847.m11]
  - id: dm847.project.operon
    title:
      es: "Predicción de fronteras de operones entre especies"
      en: "Cross-species operon-boundary prediction"
      da: "Operongrænseprædiktion på tværs af arter"
    core_question:
      es: "¿Qué señales de vecindad generalizan a genomas o clados no vistos?"
      en: "Which neighborhood signals generalize to unseen genomes or clades?"
      da: "Hvilke naboskabssignaler generaliserer til usete genomer eller klader?"
    required_methods:
      - provenance-aware bacterial annotation table
      - distance and orientation baseline
      - probabilistic classifier with grouped validation
      - calibration and mechanism-stratified error analysis
    required_controls:
      - species- or clade-held-out testing
      - annotation uncertainty review
      - circular-genome boundary handling
    oral_connections: [dm847.m01, dm847.m02, dm847.m03, dm847.m09, dm847.m12]
  - id: dm847.project.motif_ngs
    title:
      es: "Motivos enriquecidos en regiones NGS"
      en: "Motifs enriched in NGS-defined regions"
      da: "Motiver beriget i NGS-definerede regioner"
    core_question:
      es: "¿Qué patrones de secuencia se reproducen en regiones enriquecidas bajo controles emparejados?"
      en: "Which sequence patterns replicate in enriched regions under matched controls?"
      da: "Hvilke sekvensmønstre reproduceres i berigede regioner under matchede kontroller?"
    required_methods:
      - NGS quality and mapping audit
      - region or peak definition with assay-appropriate controls
      - de novo motif model with training-only discovery
      - held-out enrichment and multiple-testing control
    required_controls:
      - GC-, length-, and mappability-matched backgrounds
      - both-strand scanning
      - alternative motif width or background models
    oral_connections: [dm847.m04, dm847.m06, dm847.m10, dm847.m11, dm847.m13]
  - id: dm847.project.network_omics
    title:
      es: "Priorización de módulos en una red biológica"
      en: "Module prioritization in a biological network"
      da: "Prioritering af moduler i et biologisk netværk"
    core_question:
      es: "¿Añade una red versionada valor reproducible sobre un ranking ómico sin red?"
      en: "Does a versioned network add reproducible value over a no-network omics ranking?"
      da: "Tilfører et versioneret netværk reproducerbar værdi over en omics-ranking uden netværk?"
    required_methods:
      - leakage-free omics statistic or prediction pipeline
      - provenance-aware network construction
      - no-network baseline and propagation or active-module method
      - null model, redundancy reduction, and external validation
    required_controls:
      - degree-matched seeds or degree-preserving nulls
      - network-source sensitivity
      - sample resampling and module-stability analysis
    oral_connections: [dm847.m02, dm847.m03, dm847.m12, dm847.m13, dm847.m14]

report_blueprint:
  recommended_sections:
    - section: Abstract
      purpose: State question, data, method, principal result, and limitation without unsupported claims.
    - section: Introduction
      purpose: Establish biological context, gap, and precise objective.
    - section: Data and provenance
      purpose: Describe entities, sources, versions, licenses, units, filters, and exclusions.
    - section: Methods
      purpose: Specify algorithms, assumptions, baseline, parameters, validation, and software environment.
    - section: Results
      purpose: Present quality evidence, primary comparison, uncertainty, sensitivity, and error analysis.
    - section: Discussion
      purpose: Interpret evidence, compare alternatives, discuss external validity, and delimit conclusions.
    - section: Reproducibility statement
      purpose: Explain how inputs regenerate outputs and list any unavailable or manual dependencies.
  required_tables:
    - dataset and provenance table
    - method and assumption comparison table
    - primary metrics with uncertainty
    - error or sensitivity summary
  required_figures:
    - evidence-chain or workflow diagram
    - quality or validation figure
    - primary result figure
    - uncertainty, error, or sensitivity figure

project_rubric:
  total_weight: 1.0
  criteria:
    - id: formulation
      weight: 0.15
      excellent: The biological question and computational specification are precise, feasible, and aligned.
      insufficient: The project is tool-driven, vague, or lacks a testable output.
    - id: data_provenance
      weight: 0.15
      excellent: Entities, IDs, versions, licenses, groups, filters, and exclusions are fully traceable.
      insufficient: Data origin or analysis units cannot be reconstructed.
    - id: method_reasoning
      weight: 0.20
      excellent: Method, baseline, alternatives, assumptions, and complexity are justified from requirements.
      insufficient: Method choice is asserted without assumptions or comparison.
    - id: implementation_reproducibility
      weight: 0.15
      excellent: The workflow regenerates outputs from documented inputs in a defined environment.
      insufficient: Essential manual steps, versions, or parameters are missing.
    - id: validation
      weight: 0.20
      excellent: Validation is layered, independent, leakage-aware, and matched to the scientific claim.
      insufficient: Evaluation reuses development data or reports execution as validation.
    - id: interpretation
      weight: 0.15
      excellent: Claims match evidence, uncertainty and sensitivity are explicit, and limitations are actionable.
      insufficient: Association is inflated into mechanism, causality, or clinical utility.

oral_practice_blueprint:
  recommended_duration_minutes: 30
  recommended_phases:
    - phase: concise_project_account
      minutes: 6
      purpose: Present question, data, method, result, and principal limitation.
    - phase: project_reasoning
      minutes: 9
      purpose: Defend methodological choices, validation, uncertainty, and an alternative.
    - phase: syllabus_transfer
      minutes: 12
      purpose: Answer questions from course areas not directly used in the project.
    - phase: synthesis
      minutes: 3
      purpose: State what the evidence supports, what remains unknown, and the next decisive analysis.
  answer_structure:
    - direct conclusion
    - precise definition
    - mechanism, recurrence, or statistical reasoning
    - evidence or validation
    - limitation and alternative

oral_question_bank:
  - id: dm847.oral.01
    outcomes: [dm847.lo01]
    question:
      es: "Explica por qué el dogma central no significa que cada gen codifique una proteína ni que el flujo regulatorio sea lineal."
      en: "Explain why the central dogma does not mean every gene encodes a protein or regulation is linear."
      da: "Forklar hvorfor det centrale dogme ikke betyder at hvert gen koder et protein eller at regulering er lineær."
    expected_elements: [noncoding_rna, regulation, processing, feedback, scope_of_dogma]
  - id: dm847.oral.02
    outcomes: [dm847.lo01, dm847.lo06]
    question:
      es: "Distingue operón, unidad de transcripción y regulón, e indica por qué dependen de la condición."
      en: "Distinguish operon, transcription unit, and regulon, and explain condition dependence."
      da: "Skeln mellem operon, transkriptionsenhed og regulon og forklar betingelsesafhængighed."
    expected_elements: [contiguity, actual_transcript, distributed_regulation, internal_promoters]
  - id: dm847.oral.03
    outcomes: [dm847.lo02]
    question:
      es: "¿Por qué símbolo génico, accession, versión y concepto ontológico no deben usarse como el mismo identificador?"
      en: "Why must gene symbol, accession, version, and ontology concept not be used as one identifier?"
      da: "Hvorfor må gensymbol, accession, version og ontologibegreb ikke bruges som samme identifikator?"
    expected_elements: [entity_types, namespace, versioning, ambiguity, provenance]
  - id: dm847.oral.04
    outcomes: [dm847.lo02, dm847.lo03]
    question:
      es: "Diseña la procedencia mínima de una afirmación derivada de una base integrada."
      en: "Design minimum provenance for a claim derived from an integrated database."
      da: "Design minimum provenance for en påstand afledt fra en integreret database."
    expected_elements: [source_version, entity_mapping, transformation, evidence_code, timestamp]
  - id: dm847.oral.05
    outcomes: [dm847.lo03]
    question:
      es: "Compara una base relacional normalizada y un grafo para integrar genes, proteínas, muestras y vías."
      en: "Compare a normalized relational database and a graph for integrating genes, proteins, samples, and pathways."
      da: "Sammenlign en normaliseret relationel database og en graf til integration af gener, proteiner, samples og pathways."
    expected_elements: [constraints, joins, traversal, provenance, hybrid_design]
  - id: dm847.oral.06
    outcomes: [dm847.lo04]
    question:
      es: "¿Qué diferencia score de alineamiento, identidad y significancia estadística?"
      en: "What distinguishes alignment score, identity, and statistical significance?"
      da: "Hvad adskiller alignment-score, identitet og statistisk signifikans?"
    expected_elements: [scoring_model, observed_matches, null_database_size, e_value_or_p_value]
  - id: dm847.oral.07
    outcomes: [dm847.lo04]
    question:
      es: "Deriva conceptualmente la recurrencia de alineamiento global y explica su inicialización."
      en: "Conceptually derive the global-alignment recurrence and explain initialization."
      da: "Udled konceptuelt rekurrensen for global alignment og forklar initialisering."
    expected_elements: [subproblem, diagonal_up_left, gap_penalty, boundary_cost, traceback]
  - id: dm847.oral.08
    outcomes: [dm847.lo04]
    question:
      es: "Compara forward, Viterbi y posterior decoding en un HMM."
      en: "Compare forward, Viterbi, and posterior decoding in an HMM."
      da: "Sammenlign forward, Viterbi og posterior-dekodning i en HMM."
    expected_elements: [sum_over_paths, max_path, marginal_states, numerical_stability]
  - id: dm847.oral.09
    outcomes: [dm847.lo07]
    question:
      es: "Explica cómo un array de sufijos convierte búsqueda de patrón en búsqueda de intervalo."
      en: "Explain how a suffix array turns pattern search into interval search."
      da: "Forklar hvordan et suffix-array omdanner mønstersøgning til intervalsøgning."
    expected_elements: [lexicographic_order, contiguous_prefix_interval, lower_upper_bound, complexity]
  - id: dm847.oral.10
    outcomes: [dm847.lo07]
