      es: "Explica C, Occ y búsqueda hacia atrás en un FM-index."
      en: "Explain C, Occ, and backward search in an FM-index."
      da: "Forklar C, Occ og backward search i et FM-index."
    expected_elements: [rank, interval_update, right_to_left, count_vs_locate]
  - id: dm847.oral.11
    outcomes: [dm847.lo08]
