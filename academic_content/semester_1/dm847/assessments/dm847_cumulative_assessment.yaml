  - id: dm847.oral.16
    outcomes: [dm847.lo05]
    question:
      es: "¿Por qué el universo y la unidad de permutación cambian una conclusión de enriquecimiento?"
      en: "Why do the universe and permutation unit change an enrichment conclusion?"
      da: "Hvorfor ændrer universet og permutationsenheden en enrichment-konklusion?"
    expected_elements: [eligibility, null_hypothesis, exchangeability, correlation]
  - id: dm847.oral.17
    outcomes: [dm847.lo09]
    question:
      es: "Explica cómo ocurre fuga al seleccionar genes antes de cross-validation."
      en: "Explain leakage from selecting genes before cross-validation."
      da: "Forklar lækage ved genselektion før cross-validation."
    expected_elements: [validation_labels_in_selection, optimistic_bias, nested_pipeline]
  - id: dm847.oral.18
    outcomes: [dm847.lo09]
    question:
      es: "Compara discriminación, calibración y utilidad para un clasificador ómico."
      en: "Compare discrimination, calibration, and utility for an omics classifier."
      da: "Sammenlign diskrimination, kalibrering og nytte for en omics-klassifikator."
    expected_elements: [ranking, probability_accuracy, threshold_cost, external_validation]

oral_rubric:
  criteria:
    - id: conceptual_accuracy
      weight: 0.30
      descriptors:
        excellent: Definitions, algorithms, and biological interpretations are precise and internally consistent.
        insufficient: Fundamental objects or methods are conflated.
    - id: reasoning
      weight: 0.25
      descriptors:
        excellent: Answers derive conclusions from assumptions, mechanisms, recurrences, or statistical logic.
        insufficient: Answers list terms without connecting them.
    - id: transfer
      weight: 0.20
      descriptors:
        excellent: The student compares alternatives and transfers concepts beyond the project.
        insufficient: Knowledge is confined to memorized project steps.
    - id: evidence_and_validation
      weight: 0.15
      descriptors:
        excellent: Claims are tied to appropriate controls, metrics, and validation layers.
        insufficient: Execution or a single metric is treated as proof.
    - id: uncertainty_and_limits
      weight: 0.10
      descriptors:
        excellent: Unknowns and limitations are identified accurately with a plan to resolve them.
        insufficient: Precision is invented or limitations are denied.

hidden_examiner_support:
  follow_up_patterns:
    - What assumption makes that algorithm valid?
    - What would be the simplest baseline?
    - What observation would contradict your interpretation?
    - How would the result change under a different background or universe?
    - Which data were unavailable to the fitting or selection procedure?
    - How would you validate the method on another species, site, or platform?
    - Which alternative from the syllabus solves a related but different problem?
  grading_guardrails:
    - Do not require exact wording when the scientific meaning is correct.
    - Distinguish a minor notation error from a conceptual error.
    - Reward explicit assumptions and honest uncertainty.
    - Challenge causal or clinical inflation consistently.
    - Do not reveal the full expected-element list before an active response.
