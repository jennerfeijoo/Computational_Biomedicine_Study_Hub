    prerequisites: [dm847.m07, dm857.m15]
  - id: dm847.m09
    order: 9
    title:
      es: Organización génica bacteriana y predicción de operones
      en: Bacterial gene organization and operon prediction
      da: Bakteriel genorganisation og operonprædiktion
    outcomes: [dm847.lo01, dm847.lo06]
    prerequisites: [dm847.m01, dm847.m04]
  - id: dm847.m10
    order: 10
    title:
      es: Descubrimiento de motivos de novo con entropía, mezclas y EM
