    outcomes: [dm847.lo01, dm847.lo02, dm847.lo03, dm847.lo04, dm847.lo05, dm847.lo06, dm847.lo07, dm847.lo08, dm847.lo09]
    prerequisites: [dm847.m01, dm847.m02, dm847.m03, dm847.m04, dm847.m05, dm847.m06, dm847.m07, dm847.m08, dm847.m09, dm847.m10, dm847.m11, dm847.m12, dm847.m13, dm847.m14]

constructive_alignment:
  standard_module_minimums:
    concepts: 6
    worked_examples: 3
    guided_practice: 6
    objective_questions: 10
    open_assessment_items: 3
    flashcards: 24
    glossary_entries: 10
    hidden_support_fragments: 10
  integrative_module_minimums:
    concepts: 8
    worked_examples: 4
    guided_practice: 8
    objective_questions: 12
    open_assessment_items: 5
    flashcards: 36
    glossary_entries: 12
    hidden_support_fragments: 12

assessment_strategy:
  formative:
    - conceptual retrieval and misconception correction
    - algorithm tracing and recurrence reconstruction
    - interpretation of sequence, network, and omics outputs
    - database and ontology modeling exercises
    - method-selection tasks under explicit assumptions
  module_assessment:
    - randomized objective questions
    - short algorithmic implementations
    - structured biological interpretation
    - open tasks with analytic rubrics
  cumulative_assessment:
    - written project with transparent question and method selection
    - reproducible implementation or analytical workflow
    - validation using synthetic or public reference data
    - comparison against an alternative method or baseline
    - limitations, uncertainty, and provenance statement
    - final oral examination spanning the complete syllabus

quality_requirements:
  - Biological statements distinguish mechanism, evidence, and simplification.
  - Sequence algorithms specify inputs, outputs, scoring assumptions, and complexity.
  - Statistical methods state the probabilistic object and validation criterion.
  - Database examples distinguish identifiers, entities, versions, and provenance.
  - Network interpretation avoids treating visual proximity as biological evidence.
  - Omics examples separate exploratory association from causal or clinical claims.
  - All learner-visible content has equivalent Spanish, English, and Danish versions.
  - Every objective is taught, practised, and assessed.
  - Open responses use rubrics and are never graded by exact-string matching.
  - Hidden support does not expose answer keys during active assessment.
  - No copyrighted exercise, figure, table, or passage is reproduced.

