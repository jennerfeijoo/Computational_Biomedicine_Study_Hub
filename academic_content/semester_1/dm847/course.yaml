      da: Biomedicinske identifikatorer, ontologier, proveniens og FAIR-dataafhængigheder
    outcomes: [dm847.lo02]
    prerequisites: [dm857.m07, dm857.m08]
  - id: dm847.m03
    order: 3
    title:
