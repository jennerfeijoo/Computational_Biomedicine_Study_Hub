course_code: DM847
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: Introducción a la bioinformática
    en: Introduction to Bioinformatics
    da: Introduktion til bioinformatik
  ects: 10
  level: masters
  term: autumn
  teaching_language: English
  assessment:
    es: Proyecto escrito y examen oral final
    en: Written project and final oral examination
    da: Skriftligt projekt og afsluttende mundtlig eksamen
  purpose:
    es: >-
      Introducir los principios biológicos, algorítmicos, estadísticos y de modelado de datos
      necesarios para formular, implementar, validar e interpretar análisis bioinformáticos.
      El curso conecta genética molecular, secuencias, bases de datos, modelos probabilísticos,
      estructuras de índice, redes biológicas y aprendizaje estadístico aplicado a datos ómicos.
    en: >-
      Introduce the biological, algorithmic, statistical, and data-modeling principles required
      to formulate, implement, validate, and interpret bioinformatics analyses. The course connects
      molecular genetics, sequences, databases, probabilistic models, indexing structures,
      biological networks, and statistical learning applied to omics data.
    da: >-
      Introducere de biologiske, algoritmiske, statistiske og datamodelleringsmæssige principper,
      der kræves for at formulere, implementere, validere og fortolke bioinformatiske analyser.
      Kurset forbinder molekylær genetik, sekvenser, databaser, probabilistiske modeller,
      indeksstrukturer, biologiske netværk og statistisk læring på omics-data.

academic_preconditions:
  required:
    - basic probability theory
    - basic algorithmic reasoning
    - programming proficiency
  bridges:
    - dm857.m05
    - dm857.m06
    - dm857.m07
    - dm857.m09
    - dm857.m10
    - dm857.m13
    - dm857.m15
    - bmb830.m05

official_learning_outcomes:
  - id: dm847.lo01
    statement:
      es: Explicar genética molecular central, regulación génica, modificación epigenética del ADN y características de bacterias y fagos.
      en: Explain central molecular genetics, gene regulation, epigenetic DNA modification, and bacterial and phage genetics.
      da: Forklare central molekylær genetik, genregulering, epigenetisk DNA-modifikation samt bakterie- og faggenetik.
  - id: dm847.lo02
    statement:
      es: Modelar ontologías y dependencias de datos biomédicos.
      en: Model ontologies and biomedical data dependencies.
      da: Modellere ontologier og afhængigheder i biomedicinske data.
  - id: dm847.lo03
    statement:
      es: Diseñar bases de datos para biología de sistemas.
      en: Design systems-biology databases.
      da: Designe databaser til systembiologi.
  - id: dm847.lo04
    statement:
      es: Explicar e implementar análisis de secuencias de ADN y proteínas mediante HMM, matrices de puntuación, índices de sufijos y estadística eficiente.
      en: Explain and implement DNA and amino-acid sequence analysis using HMMs, scoring matrices, suffix indexes, and efficient statistics.
      da: Forklare og implementere analyse af DNA- og aminosyresekvenser med HMM'er, scoringsmatricer, suffiksindeks og effektiv statistik.
  - id: dm847.lo05
    statement:
      es: Explicar e implementar aprendizaje estadístico sobre redes biológicas.
      en: Explain and implement statistical learning on biological networks.
      da: Forklare og implementere statistisk læring på biologiske netværk.
  - id: dm847.lo06
    statement:
      es: Explicar particularidades de genética bacteriana y predicción de operones.
      en: Explain bacterial-genetics specialties and operon prediction.
      da: Forklare særlige aspekter af bakteriegenetik og operonprædiktion.
  - id: dm847.lo07
    statement:
      es: Explicar e implementar árboles y arrays de sufijos y la transformación de Burrows-Wheeler.
      en: Explain and implement suffix trees, suffix arrays, and the Burrows-Wheeler transform.
      da: Forklare og implementere suffikstræer, suffiksarrays og Burrows-Wheeler-transformen.
  - id: dm847.lo08
    statement:
      es: Explicar cribado de motivos de novo mediante expectation-maximization y modelos de entropía.
      en: Explain de novo motif screening using expectation-maximization and entropy models.
      da: Forklare de novo-motifsøgning med expectation-maximization og entropimodeller.
  - id: dm847.lo09
    statement:
      es: Explicar e implementar métodos supervisados y no supervisados para datos ómicos biomédicos.
      en: Explain and implement supervised and unsupervised methods for biomedical omics data.
      da: Forklare og implementere superviserede og ikke-superviserede metoder til biomedicinske omics-data.

module_sequence:
  - id: dm847.m01
    order: 1
    title:
      es: Información molecular, dogma central, regulación, epigenética, bacterias y fagos
      en: Molecular information, central dogma, regulation, epigenetics, bacteria, and phages
