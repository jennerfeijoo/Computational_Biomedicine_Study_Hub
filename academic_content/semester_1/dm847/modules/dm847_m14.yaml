glossary:
  - {id: dm847.term.p_greater_n, es: p≫n, en: p much greater than n, da: p meget større end n, definition_en: Feature count greatly exceeds independent sample count.}
  - {id: dm847.term.data_leakage, es: Fuga de datos, en: Data leakage, da: Datalækage, definition_en: Information unavailable in training improperly influences model fitting or evaluation.}
  - {id: dm847.term.pca, es: PCA, en: Principal component analysis, da: PCA, definition_en: Orthogonal linear projection maximizing variance.}
  - {id: dm847.term.loading, es: Loading, en: Loading, da: Loading, definition_en: Variable coefficient defining a principal component.}
  - {id: dm847.term.cluster_stability, es: Estabilidad de clusters, en: Cluster stability, da: Clusterstabilitet, definition_en: Reproducibility of grouping under resampling or perturbation.}
  - {id: dm847.term.regularization, es: Regularización, en: Regularization, da: Regularisering, definition_en: Constraint or penalty reducing model flexibility.}
  - {id: dm847.term.nested_cv, es: CV anidada, en: Nested cross-validation, da: Nested cross-validation, definition_en: Outer performance estimation with inner model selection.}
  - {id: dm847.term.pr_auc, es: PR-AUC, en: Precision-recall AUC, da: PR-AUC, definition_en: Area under the precision-recall curve.}
  - {id: dm847.term.calibration, es: Calibración, en: Calibration, da: Kalibrering, definition_en: Agreement between predicted probabilities and observed frequencies.}
  - {id: dm847.term.domain_shift, es: Desplazamiento de dominio, en: Domain shift, da: Domain shift, definition_en: Change in data or outcome distributions across deployment contexts.}

hidden_support:
  canonical_explanation:
    es: >-
      En ómicas, la alta dimensionalidad hace fácil sobreajustar. El pipeline completo debe ajustarse
      dentro de cada fold y la unidad de partición debe respetar pacientes, lotes o sitios. PCA y clustering
      describen estructura, no subtipos validados. La evaluación predictiva separa discriminación,
      calibración, umbral y transportabilidad. Features seleccionados son asociaciones predictivas hasta
      que evidencia adicional sostenga mecanismo o utilidad clínica.
    en: >-
      High-dimensional omics makes overfitting easy. The full pipeline must be fitted within each fold,
      and splitting must respect patients, batches, or sites. PCA and clustering describe structure rather
      than validated subtypes. Predictive evaluation separates discrimination, calibration, threshold, and
      transportability. Selected features remain predictive associations until further evidence supports mechanism or utility.
    da: >-
      Højdimensionel omics gør overfitting let. Hele pipelinet fittes i hvert fold, og split respekterer
      patienter, batches eller sites. PCA og clustering beskriver struktur, ikke validerede subtyper.
  misconceptions:
    - {id: dm847.m14.mc01, false_belief: {es: Preprocesar antes de CV es inocuo, en: Preprocessing before CV is harmless, da: Preprocessing før CV er harmløst}, correction: {es: Pasos que aprenden de datos producen fuga y deben quedar dentro del fold, en: Data-adaptive steps leak and must be inside each fold, da: Dataadaptive trin giver lækage og skal være i hvert fold}}
    - {id: dm847.m14.mc02, false_belief: {es: Clusters visibles son subtipos reales, en: Visible clusters are real subtypes, da: Synlige clusters er reelle subtyper}, correction: {es: Requieren estabilidad, replicación y asociación externa, en: They require stability, replication, and external association, da: De kræver stabilitet, replikation og ekstern association}}
    - {id: dm847.m14.mc03, false_belief: {es: AUC alta valida un biomarcador, en: High AUC validates a biomarker, da: Høj AUC validerer en biomarkør}, correction: {es: Se necesitan calibración, validación externa, validez analítica y utilidad, en: Calibration, external validation, analytical validity, and utility are also needed, da: Kalibrering, ekstern validering, analytisk validitet og nytte kræves}}
  socratic_questions:
    - ¿Cuál es la unidad realmente independiente?
    - ¿Qué paso del pipeline vio datos de validación?
    - ¿La estructura de PCA corresponde a batch o biología?
    - ¿Cómo se eligieron hiperparámetros y umbral?
    - ¿Qué evidencia sostiene transportabilidad y utilidad?
  knowledge_fragments:
    - {id: dm847.m14.k01, content_en: p much greater than n creates severe overfitting risk.}
    - {id: dm847.m14.k02, content_en: Grouped splitting must follow the dependency unit.}
    - {id: dm847.m14.k03, content_en: Data-adaptive preprocessing belongs inside resampling.}
    - {id: dm847.m14.k04, content_en: PCA variance is not predictive performance.}
    - {id: dm847.m14.k05, content_en: Cluster interpretation requires stability and external evidence.}
    - {id: dm847.m14.k06, content_en: Nested CV separates tuning from performance estimation.}
    - {id: dm847.m14.k07, content_en: PR-AUC is informative under rare positive outcomes.}
    - {id: dm847.m14.k08, content_en: Discrimination and calibration are distinct.}
    - {id: dm847.m14.k09, content_en: Site-held-out validation probes domain shift.}
    - {id: dm847.m14.k10, content_en: Predictive association does not establish causality or clinical utility.}
  response_constraints:
    - State the independent unit, grouping, outcome time, and data available at prediction time.
    - Place all learned preprocessing and selection inside resampling.
    - Report discrimination, calibration, threshold metrics, uncertainty, and external validation separately.
    - Do not call selected features validated biomarkers without analytical and external evidence.

