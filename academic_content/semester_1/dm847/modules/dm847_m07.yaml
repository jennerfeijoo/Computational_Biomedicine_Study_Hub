schema_version: 1.0.0
course_code: DM847
module_id: dm847.m07
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: Árboles de sufijos, arrays de sufijos, índices de k-mers y búsqueda exacta
    en: Suffix trees, suffix arrays, k-mer indexes, and exact pattern search
    da: Suffikstræer, suffiksarrays, k-mer-indekser og eksakt mønstersøgning
  summary:
    es: >-
      Diseño y análisis de estructuras para búsqueda exacta de patrones en secuencias. Se
      comparan búsqueda ingenua, tries, árboles de sufijos, arrays de sufijos, LCP e índices
      de k-mers, con énfasis en invariantes, sentinela, complejidad temporal, consumo de
      memoria, construcción, consultas múltiples y validación sobre secuencias repetitivas.
    en: >-
      Design and analysis of structures for exact pattern search in sequences. Naive search,
      tries, suffix trees, suffix arrays, LCP, and k-mer indexes are compared with emphasis on
      invariants, sentinel handling, time complexity, memory, construction, repeated queries,
      and validation on repetitive sequences.
    da: >-
      Design og analyse af strukturer til eksakt mønstersøgning. Naiv søgning, tries,
      suffikstræer, suffiksarrays, LCP og k-mer-indekser sammenlignes med fokus på invarianter,
      sentinel, tid, hukommelse, konstruktion og validering.
  estimated_study_hours: 12
  difficulty: advanced_foundational

alignment:
  official_learning_outcomes: [dm847.lo04, dm847.lo07]
  prerequisite_modules: [dm857.m05, dm857.m07, dm857.m10, dm857.m15, dm847.m04]
  later_modules: [dm847.m08, dm847.m11]

objectives:
  - {id: dm847.m07.o01, text: {es: Formular búsqueda exacta y derivar el coste del algoritmo ingenuo, en: Formulate exact search and derive naive-search cost, da: Formulere eksakt søgning og udlede omkostningen ved naiv søgning}}
  - {id: dm847.m07.o02, text: {es: Construir un trie de patrones y explicar su utilidad para consultas múltiples, en: Build a pattern trie and explain its use for multiple queries, da: Bygge en pattern-trie og forklare brugen ved flere forespørgsler}}
  - {id: dm847.m07.o03, text: {es: Explicar cómo un árbol de sufijos comprime el trie de todos los sufijos, en: Explain how a suffix tree compresses the trie of all suffixes, da: Forklare hvordan et suffikstræ komprimerer alle suffiksers trie}}
  - {id: dm847.m07.o04, text: {es: Construir y consultar un array de sufijos mediante búsqueda binaria, en: Build and query a suffix array with binary search, da: Bygge og forespørge et suffiksarray med binær søgning}}
  - {id: dm847.m07.o05, text: {es: Interpretar el array LCP y usarlo para repeticiones y prefijos compartidos, en: Interpret the LCP array and use it for repeats and shared prefixes, da: Fortolke LCP-arrayet og bruge det til gentagelser og fælles præfikser}}
  - {id: dm847.m07.o06, text: {es: Diseñar un índice de k-mers y analizar sensibilidad, memoria y tamaño de cubeta, en: Design a k-mer index and analyze sensitivity, memory, and bucket size, da: Designe et k-mer-indeks og analysere følsomhed, hukommelse og bucket-størrelse}}
  - {id: dm847.m07.o07, text: {es: Comparar estructuras según número de consultas, tamaño del texto y repetitividad, en: Compare structures by query count, text size, and repetitiveness, da: Sammenligne strukturer efter antal forespørgsler, tekststørrelse og repetitivitet}}
  - {id: dm847.m07.o08, text: {es: Validar índices contra búsqueda exhaustiva y casos frontera, en: Validate indexes against exhaustive search and boundary cases, da: Validere indekser mod udtømmende søgning og grænsetilfælde}}

concepts:
  - id: dm847.m07.c01
    title: {es: Problema de búsqueda exacta, en: Exact pattern-search problem, da: Eksakt mønstersøgningsproblem}
    body:
      es: >-
        Dado un texto T de longitud n y un patrón P de longitud m, se buscan todas las posiciones
        i donde T[i:i+m]=P. La búsqueda ingenua compara P en hasta n-m+1 posiciones y cuesta
        O(nm) en el peor caso, aunque suele detener comparaciones temprano. Antes de optimizar
        debe definirse si se permiten solapamientos, símbolos ambiguos, circularidad y múltiples
        textos, porque cambian el contrato de salida.
      en: >-
        Given text T of length n and pattern P of length m, find every i where T[i:i+m]=P.
        Naive search checks up to n-m+1 positions and costs O(nm) worst case, although many
        comparisons stop early. The contract must specify overlaps, ambiguous symbols,
        circularity, and multiple texts before optimization.
      da: >-
        Givet tekst T og mønster P findes alle positioner med et eksakt match. Naiv søgning
        koster O(nm) i værste fald. Kontrakten skal definere overlap, tvetydige symboler og
        cirkulære sekvenser.
    key_points:
      - {es: La salida es un conjunto ordenado de posiciones, en: Output is an ordered set of positions, da: Output er et ordnet sæt positioner}
      - {es: Un patrón vacío necesita una política explícita, en: An empty pattern needs an explicit policy, da: Et tomt mønster kræver en eksplicit politik}
  - id: dm847.m07.c02
    title: {es: Tries de patrones, en: Pattern tries, da: Pattern-tries}
    body:
      es: >-
        Un trie comparte prefijos entre patrones. Cada arista representa un símbolo y un nodo
        terminal marca el final de uno o más patrones. Escanear el texto desde cada posición y
        recorrer el trie permite buscar muchos patrones simultáneamente. El coste depende de
        cuánto se avanza antes de fallar; la memoria depende del número de prefijos distintos.
      en: >-
        A trie shares prefixes among patterns. Edges represent symbols and terminal nodes mark
        pattern ends. Starting from each text position and traversing the trie searches many
        patterns at once. Cost depends on traversal before mismatch; memory depends on the
        number of distinct prefixes.
      da: >-
        En trie deler præfikser mellem mønstre. Kanter repræsenterer symboler og terminale
        noder markerer mønsterslutninger. Hukommelsen afhænger af antal forskellige præfikser.
    key_points:
      - {es: Los patrones que son prefijos de otros requieren marcas terminales internas, en: Patterns that prefix others require internal terminal marks, da: Mønstre der er præfikser for andre kræver interne terminalmarkeringer}
  - id: dm847.m07.c03
    title: {es: Trie de sufijos y sentinela, en: Suffix trie and sentinel, da: Suffiks-trie og sentinel}
    body:
      es: >-
        Insertar todos los sufijos de T crea un índice de todas las subcadenas, pero puede usar
        O(n²) nodos. Añadir un sentinela único al final garantiza que ningún sufijo sea prefijo
        de otro y que cada hoja identifique un inicio distinto. El sentinela debe estar fuera
        del alfabeto biológico y no interpretarse como dato real.
      en: >-
        Inserting all suffixes of T indexes all substrings but may require O(n²) nodes. A unique
        terminal sentinel ensures no suffix is a prefix of another and each leaf identifies a
        distinct start. The sentinel lies outside the biological alphabet and is not data.
      da: >-
        Alle suffikser i en trie kan kræve O(n²) noder. En unik sentinel sikrer, at intet
        suffiks er præfiks for et andet, og må ikke fortolkes biologisk.
    key_points:
      - {es: El sentinela aparece exactamente una vez, en: The sentinel appears exactly once, da: Sentinellen forekommer præcis én gang}
  - id: dm847.m07.c04
    title: {es: Árbol de sufijos comprimido, en: Compressed suffix tree, da: Komprimeret suffikstræ}
    body:
      es: >-
        Un árbol de sufijos comprime cadenas de nodos con un solo hijo en aristas etiquetadas
        por intervalos del texto. Tiene O(n) nodos para un texto con sentinela, aunque una
        construcción ingenua puede seguir costando O(n²). Una consulta sigue caracteres del
        patrón y luego reporta las hojas bajo el locus alcanzado. Representar etiquetas como
        pares inicio-fin evita copiar subcadenas.
      en: >-
        A suffix tree compresses unary paths into edges labeled by text intervals. It has O(n)
        nodes for a sentinel-terminated text, although naive construction may still cost O(n²).
        Querying follows pattern characters and reports leaves under the reached locus. Edge
        labels should use start-end references rather than copied substrings.
      da: >-
        Et suffikstræ komprimerer en-barns-stier til kanter mærket med tekstintervaller og har
        O(n) noder. Etiketter bør gemmes som start-slut-referencer.
    key_points:
      - {es: Tamaño lineal no implica construcción lineal en una implementación ingenua, en: Linear size does not imply linear construction in a naive implementation, da: Lineær størrelse betyder ikke lineær konstruktion i en naiv implementering}
  - id: dm847.m07.c05
    title: {es: Array de sufijos y búsqueda binaria, en: Suffix array and binary search, da: Suffiksarray og binær søgning}
    body:
      es: >-
        Un array de sufijos almacena las posiciones iniciales de los sufijos en orden
        lexicográfico. Dos búsquedas binarias delimitan el intervalo de sufijos que comienzan
        con P; las posiciones de ese intervalo son las ocurrencias. La estructura ocupa O(n)
        enteros y suele ser más compacta que un árbol. Construir ordenando sufijos materializados
        es costoso; algoritmos de duplicación de prefijos evitan copias masivas.
      en: >-
        A suffix array stores suffix start positions in lexicographic order. Two binary searches
        delimit the interval of suffixes beginning with P; those positions are occurrences.
        It stores O(n) integers and is usually more compact than a tree. Sorting materialized
        suffix strings is expensive; prefix-doubling methods avoid massive copying.
      da: >-
        Et suffiksarray gemmer startpositioner i leksikografisk orden. To binære søgninger
        afgrænser alle suffikser med mønsteret som præfiks. Det bruger O(n) heltal.
    key_points:
      - {es: El intervalo de coincidencias es contiguo en orden lexicográfico, en: Matching suffixes form a contiguous lexicographic interval, da: Matchende suffikser danner et sammenhængende interval}
  - id: dm847.m07.c06
    title: {es: LCP y repetición, en: LCP and repeats, da: LCP og gentagelser}
    body:
      es: >-
        LCP[i] registra la longitud del prefijo común entre sufijos adyacentes en el array.
        El máximo LCP identifica una repetición larga, pero no necesariamente única, y los
        intervalos LCP permiten grupos de sufijos con prefijos compartidos. LCP acelera
        consultas y evita recomparar caracteres; debe definirse su convención para la primera
        entrada.
      en: >-
        LCP[i] records the common-prefix length of adjacent suffixes in suffix-array order.
        The maximum identifies a long repeat, not necessarily a unique one, and LCP intervals
        capture groups sharing prefixes. LCP can accelerate queries by avoiding repeated
        comparisons; its first-entry convention must be stated.
      da: >-
        LCP[i] er længden af fælles præfiks mellem nabo-suffikser. Maksimum identificerer en
        lang gentagelse, og LCP-intervaller beskriver grupper med fælles præfikser.
    key_points:
      - {es: Repetición larga no equivale automáticamente a relevancia biológica, en: A long repeat is not automatically biologically relevant, da: En lang gentagelse er ikke automatisk biologisk relevant}
  - id: dm847.m07.c07
    title: {es: Índices de k-mers, en: k-mer indexes, da: k-mer-indekser}
    body:
      es: >-
        Un índice de k-mers asocia cada palabra de longitud k con sus posiciones. Para un patrón
        de longitud al menos k se consulta una semilla y se verifican candidatos completos.
        k pequeño produce cubetas grandes y más verificaciones; k grande aumenta memoria y
        pierde utilidad para patrones cortos o con errores. Un índice exacto no tolera
        sustituciones salvo que se consulten semillas alternativas.
      en: >-
        A k-mer index maps each length-k word to its positions. For a pattern at least k long,
        query a seed and verify full candidates. Small k yields large buckets and more checks;
        large k increases memory and is less useful for short or erroneous patterns. Exact
        indexing does not tolerate substitutions unless alternative seeds are queried.
      da: >-
        Et k-mer-indeks knytter hvert ord af længde k til positioner. Lille k giver store
        buckets; stor k øger hukommelse og er mindre nyttig for korte eller fejlbehæftede mønstre.
    key_points:
      - {es: Semilla encontrada no es coincidencia completa, en: A seed hit is not a full match, da: Et seed-hit er ikke et fuldt match}
  - id: dm847.m07.c08
    title: {es: Selección, complejidad y validación, en: Selection, complexity, and validation, da: Valg, kompleksitet og validering}
    body:
      es: >-
        Para pocas consultas, la búsqueda directa puede ser suficiente. Para muchas consultas
        sobre un texto fijo, el coste de preprocesamiento se amortiza. Arrays de sufijos ofrecen
        compacidad y orden; árboles facilitan operaciones de subcadena; índices de k-mers son
        sencillos y rápidos para semillas. Toda implementación debe compararse con un oráculo
        exhaustivo en textos aleatorios y adversariales, incluyendo repeticiones, patrón ausente,
        patrón más largo, solapamientos y sentinela.
      en: >-
        For few queries, direct search may suffice. For many queries on a fixed text,
        preprocessing is amortized. Suffix arrays are compact and ordered; trees support rich
        substring operations; k-mer indexes are simple and fast for seeding. Validate every
        implementation against exhaustive search on random and adversarial repetitive texts.
      da: >-
        Ved få forespørgsler kan direkte søgning være nok. Ved mange forespørgsler kan
        præprocessering betale sig. Valider mod udtømmende søgning på tilfældige og repetitive tekster.
    key_points:
      - {es: Medir incluye construcción, consulta y memoria, en: Measurement includes construction, query, and memory, da: Måling omfatter konstruktion, forespørgsel og hukommelse}

worked_examples:
  - id: dm847.m07.e01
    title: {es: Array de sufijos de banana$, en: Suffix array of banana$, da: Suffiksarray for banana$}
    scenario: {es: Ordenar conceptualmente los sufijos de banana$ y localizar ana., en: Conceptually sort the suffixes of banana$ and locate ana., da: Sortér suffikserne af banana$ og find ana.}
    solution_outline:
      es: >-
        Listar posiciones 0..6, ordenar por el sufijo referenciado y obtener [6,5,3,1,0,4,2].
        Las búsquedas de límite inferior y superior para ana delimitan las posiciones 3 y 1,
        correspondientes a dos ocurrencias solapadas. Verificar con búsqueda directa.
      en: >-
        Sort suffix references to obtain [6,5,3,1,0,4,2]. Lower and upper bounds for ana
        delimit starts 3 and 1, representing two overlapping occurrences. Verify directly.
      da: >-
        Sortér suffiksreferencer til [6,5,3,1,0,4,2]. Grænserne for ana giver start 3 og 1.
    validation: [sentinel_unique, suffixes_sorted, matches_naive]
  - id: dm847.m07.e02
    title: {es: Elección de k para un índice, en: Choosing k for an index, da: Valg af k til et indeks}
    scenario: {es: Comparar k=4 y k=12 para patrones de 20 nt en un genoma repetitivo., en: Compare k=4 and k=12 for 20-nt patterns in a repetitive genome., da: Sammenlign k=4 og k=12 for 20-nt mønstre i et repetitivt genom.}
    solution_outline:
      es: >-
        k=4 tiene como máximo 256 palabras canónicas y genera cubetas grandes; k=12 discrimina
        mejor pero requiere más claves y es sensible a errores dentro de la semilla. Medir
        distribución de tamaños de cubeta, candidatos verificados, memoria y tiempo total.
      en: >-
        k=4 has at most 256 canonical words and large buckets; k=12 is more selective but uses
        more keys and is sensitive to errors in the seed. Measure bucket distribution,
        candidates, memory, and total time.
      da: >-
        k=4 giver store buckets; k=12 er mere selektiv men bruger flere nøgler og er følsom for seed-fejl.
    validation: [all_true_hits_recovered_for_exact_queries, candidate_counts_reported, memory_measured]
  - id: dm847.m07.e03
    title: {es: Repetición más larga con LCP, en: Longest repeat with LCP, da: Længste gentagelse med LCP}
    scenario: {es: Identificar la repetición más larga y sus posiciones a partir de SA y LCP., en: Identify the longest repeat and positions from SA and LCP., da: Identificér den længste gentagelse fra SA og LCP.}
    solution_outline:
      es: >-
        Encontrar el máximo de LCP, recuperar el prefijo de esa longitud en los dos sufijos
        adyacentes y explorar el intervalo LCP si existen más ocurrencias. Informar empates y
        no atribuir función biológica sin análisis adicional.
      en: >-
        Find the maximum LCP, recover that-length prefix from adjacent suffixes, and explore
        the LCP interval for more occurrences. Report ties and avoid biological claims without
        additional evidence.
      da: >-
        Find maksimum LCP, hent præfikset og udforsk intervallet for flere forekomster.
    validation: [substring_occurs_at_reported_positions, ties_preserved, no_overclaim]

