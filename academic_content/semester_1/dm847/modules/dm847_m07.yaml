glossary:
  - {id: dm847.term.exact_match, es: Coincidencia exacta, en: Exact match, da: Eksakt match, definition_en: A pattern occurrence with symbol-for-symbol equality.}
  - {id: dm847.term.trie, es: Trie, en: Trie, da: Trie, definition_en: Prefix-sharing rooted tree for strings.}
  - {id: dm847.term.suffix, es: Sufijo, en: Suffix, da: Suffiks, definition_en: Substring extending from a position to the text end.}
  - {id: dm847.term.sentinel, es: Sentinela, en: Sentinel, da: Sentinel, definition_en: Unique terminal symbol outside the text alphabet.}
  - {id: dm847.term.suffix_tree, es: Árbol de sufijos, en: Suffix tree, da: Suffikstræ, definition_en: Compressed trie of all text suffixes.}
  - {id: dm847.term.suffix_array, es: Array de sufijos, en: Suffix array, da: Suffiksarray, definition_en: Lexicographically ordered suffix start positions.}
  - {id: dm847.term.lcp_array, es: Array LCP, en: LCP array, da: LCP-array, definition_en: Common-prefix lengths of neighboring suffixes in suffix-array order.}
  - {id: dm847.term.kmer, es: k-mer, en: k-mer, da: k-mer, definition_en: Contiguous sequence word of fixed length k.}
  - {id: dm847.term.seed_hit, es: Coincidencia de semilla, en: Seed hit, da: Seed-hit, definition_en: Candidate location found from an indexed short substring.}
  - {id: dm847.term.bucket, es: Cubeta, en: Bucket, da: Bucket, definition_en: Collection of positions associated with an index key.}

hidden_support:
  canonical_explanation:
    es: >-
      Los índices intercambian preprocesamiento y memoria por consultas más rápidas. Un array de
      sufijos ordena referencias a todos los sufijos y convierte coincidencias de prefijo en un
      intervalo binario. Un índice de k-mers recupera candidatos mediante una semilla, que siempre
      debe verificarse. La elección correcta depende de volumen de consultas, longitud de patrón,
      repetitividad, memoria y tolerancia a errores.
    en: >-
      Indexes trade preprocessing and memory for faster queries. A suffix array orders references
      to all suffixes and turns prefix matches into a binary-search interval. A k-mer index retrieves
      candidates through a seed that must be verified. Choice depends on query volume, pattern
      length, repetitiveness, memory, and error tolerance.
    da: >-
      Indekser bytter præprocessering og hukommelse for hurtigere forespørgsler. Suffiksarrays
      giver et binært søgeinterval; k-mer-indekser giver kandidater via seeds, som skal verificeres.
  misconceptions:
    - {id: dm847.m07.mc01, false_belief: {es: Un seed hit es una coincidencia completa, en: A seed hit is a full match, da: Et seed-hit er et fuldt match}, correction: {es: Sólo es un candidato que debe verificarse, en: It is only a candidate requiring verification, da: Det er kun en kandidat der skal verificeres}}
    - {id: dm847.m07.mc02, false_belief: {es: Tamaño lineal garantiza construcción lineal, en: Linear size guarantees linear construction, da: Lineær størrelse garanterer lineær konstruktion}, correction: {es: La complejidad de construcción depende del algoritmo, en: Construction complexity depends on the algorithm, da: Konstruktionskompleksitet afhænger af algoritmen}}
    - {id: dm847.m07.mc03, false_belief: {es: Mayor k siempre es mejor, en: Larger k is always better, da: Større k er altid bedre}, correction: {es: Hay compromisos con memoria, patrones cortos y errores, en: Memory, short patterns, and errors create trade-offs, da: Hukommelse, korte mønstre og fejl giver kompromiser}}
  socratic_questions:
    - ¿Cuántas consultas justifican el coste de construir el índice?
    - ¿Cómo se representan las etiquetas sin copiar subcadenas?
    - ¿Qué casos repetitivos maximizan el número de candidatos?
    - ¿Cómo comprobarías que no se pierden coincidencias solapadas?
    - ¿Qué parte del coste es construcción y qué parte consulta?
  knowledge_fragments:
    - {id: dm847.m07.k01, content_en: Naive exact search is O(nm) worst case.}
    - {id: dm847.m07.k02, content_en: A sentinel makes every suffix terminate uniquely.}
    - {id: dm847.m07.k03, content_en: Suffix trees compress unary suffix-trie paths.}
    - {id: dm847.m07.k04, content_en: A suffix array stores positions, not necessarily copied suffix strings.}
    - {id: dm847.m07.k05, content_en: Prefix matches form a contiguous suffix-array interval.}
    - {id: dm847.m07.k06, content_en: LCP stores shared-prefix lengths of adjacent ordered suffixes.}
    - {id: dm847.m07.k07, content_en: k-mer hits are candidates requiring full verification.}
    - {id: dm847.m07.k08, content_en: Small k increases bucket size; large k increases key space.}
    - {id: dm847.m07.k09, content_en: Exhaustive search is a useful correctness oracle.}
    - {id: dm847.m07.k10, content_en: Biological meaning requires evidence beyond repeat detection.}
  response_constraints:
    - State preprocessing, query, and memory costs separately.
    - Preserve overlapping occurrences unless the task explicitly excludes them.
    - Do not claim approximate matching from an exact index without an added strategy.
    - Treat the sentinel as an algorithmic symbol, not biological data.

