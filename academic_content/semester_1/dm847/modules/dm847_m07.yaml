  - {id: dm847.m07.p03, activity_type: algorithm_design, difficulty: intermediate, prompt: {es: Diseña las dos búsquedas binarias que delimitan un patrón en un array de sufijos., en: Design the two binary searches delimiting a pattern in a suffix array., da: Design de to binære søgninger, der afgrænser et mønster.}, expected_elements: [lower_bound, upper_bound, prefix_comparator, empty_interval]}
  - {id: dm847.m07.p04, activity_type: debugging, difficulty: advanced, prompt: {es: Corrige un constructor que materializa todos los sufijos y excede memoria., en: Fix a constructor that materializes all suffix strings and exceeds memory., da: Ret en konstruktion der materialiserer alle suffiksstrenge.}, expected_elements: [store_positions, compare_by_text, prefix_doubling_or_library_method, memory_evidence]}
  - {id: dm847.m07.p05, activity_type: data_interpretation, difficulty: advanced, prompt: {es: Interpreta un histograma de tamaños de cubeta para tres valores de k., en: Interpret a bucket-size histogram for three k values., da: Fortolk et histogram over bucket-størrelser for tre k-værdier.}, expected_elements: [repetitiveness, candidate_verification_cost, memory_tradeoff]}
  - {id: dm847.m07.p06, activity_type: oral_explanation, difficulty: advanced, prompt: {es: Defiende cuándo elegirías array de sufijos en lugar de índice de k-mers., en: Defend when you would choose a suffix array over a k-mer index., da: Forsvar hvornår du vælger et suffiksarray frem for et k-mer-indeks.}, expected_elements: [query_types, memory, exactness, preprocessing, pattern_length]}

objective_bank:
  - id: dm847.m07.q01
    type: multiple_choice
    prompt: {es: ¿Cuál es el peor coste de búsqueda ingenua?, en: What is worst-case naive-search cost?, da: Hvad er værste omkostning for naiv søgning?}
    options: [{id: a, es: O(nm), en: O(nm), da: O(nm)}, {id: b, es: O(log n), en: O(log n), da: O(log n)}, {id: c, es: O(n+m) siempre, en: Always O(n+m), da: Altid O(n+m)}, {id: d, es: O(1), en: O(1), da: O(1)}]
    correct_option_ids: [a]
  - id: dm847.m07.q02
    type: true_false
    prompt: {es: Un patrón que es prefijo de otro puede terminar en un nodo interno del trie., en: A pattern that prefixes another may end at an internal trie node., da: Et mønster der er præfiks for et andet kan slutte i en intern node.}
    correct: true
  - id: dm847.m07.q03
    type: multiple_choice
    prompt: {es: ¿Por qué se añade un sentinela único?, en: Why add a unique sentinel?, da: Hvorfor tilføjes en unik sentinel?}
    options: [{id: a, es: Para distinguir todos los sufijos y sus finales, en: To distinguish every suffix and its ending, da: For at skelne alle suffikser og deres slutninger}, {id: b, es: Para tolerar errores, en: To tolerate errors, da: For at tolerere fejl}, {id: c, es: Para traducir ADN, en: To translate DNA, da: For at oversætte DNA}, {id: d, es: Para ordenar por longitud, en: To sort by length, da: For at sortere efter længde}]
    correct_option_ids: [a]
  - id: dm847.m07.q04
    type: true_false
    prompt: {es: Que un árbol de sufijos tenga tamaño O(n) garantiza que cualquier construcción sea O(n)., en: Linear suffix-tree size guarantees every construction is O(n)., da: Lineær størrelse garanterer at enhver konstruktion er O(n).}
    correct: false
  - id: dm847.m07.q05
    type: multiple_choice
    prompt: {es: ¿Qué almacena un array de sufijos?, en: What does a suffix array store?, da: Hvad gemmer et suffiksarray?}
    options: [{id: a, es: Posiciones iniciales de sufijos en orden lexicográfico, en: Suffix start positions in lexicographic order, da: Suffiksers startpositioner i leksikografisk orden}, {id: b, es: Todos los sufijos copiados obligatoriamente, en: Necessarily all copied suffix strings, da: Nødvendigvis alle kopierede suffiksstrenge}, {id: c, es: Sólo k-mers únicos, en: Only unique k-mers, da: Kun unikke k-mers}, {id: d, es: Probabilidades de sustitución, en: Substitution probabilities, da: Substitutionssandsynligheder}]
    correct_option_ids: [a]
  - id: dm847.m07.q06
    type: multiple_choice
    prompt: {es: ¿Qué representa LCP[i] en la convención habitual?, en: What does LCP[i] commonly represent?, da: Hvad repræsenterer LCP[i] typisk?}
    options: [{id: a, es: Longitud del prefijo común de sufijos adyacentes, en: Common-prefix length of adjacent suffixes, da: Længden af fælles præfiks for nabosuffikser}, {id: b, es: Longitud total del genoma, en: Total genome length, da: Genomets totale længde}, {id: c, es: Número de patrones, en: Number of patterns, da: Antal mønstre}, {id: d, es: Distancia de Hamming, en: Hamming distance, da: Hamming-afstand}]
    correct_option_ids: [a]
  - id: dm847.m07.q07
    type: true_false
    prompt: {es: Una coincidencia de semilla k-mer debe verificarse contra el patrón completo., en: A k-mer seed hit should be verified against the full pattern., da: Et k-mer seed-hit bør verificeres mod hele mønsteret.}
    correct: true
  - id: dm847.m07.q08
    type: multiple_choice
    prompt: {es: ¿Qué efecto suele tener aumentar k?, en: What effect does increasing k usually have?, da: Hvilken effekt har større k typisk?}
    options: [{id: a, es: Menos candidatos por semilla y más claves posibles, en: Fewer candidates per seed and more possible keys, da: Færre kandidater pr. seed og flere mulige nøgler}, {id: b, es: Siempre menos memoria, en: Always less memory, da: Altid mindre hukommelse}, {id: c, es: Tolerancia automática a errores, en: Automatic error tolerance, da: Automatisk fejltolerance}, {id: d, es: Elimina la verificación, en: Eliminates verification, da: Fjerner verifikation}]
    correct_option_ids: [a]
  - id: dm847.m07.q09
    type: multiple_choice
    prompt: {es: ¿Cuál es el mejor oráculo para validar un índice exacto pequeño?, en: What is the best oracle for validating a small exact index?, da: Hvad er det bedste orakel til validering af et lille eksakt indeks?}
    options: [{id: a, es: Búsqueda exhaustiva simple, en: Simple exhaustive search, da: Simpel udtømmende søgning}, {id: b, es: El mismo índice, en: The same index, da: Det samme indeks}, {id: c, es: Sólo tiempo de ejecución, en: Runtime only, da: Kun køretid}, {id: d, es: Una figura, en: A figure, da: En figur}]
