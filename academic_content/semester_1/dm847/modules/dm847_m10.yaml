glossary:
  - {id: dm847.term.motif, es: Motivo, en: Motif, da: Motiv, definition_en: Recurring sequence pattern represented probabilistically.}
  - {id: dm847.term.count_matrix, es: Matriz de conteo, en: Count matrix, da: Tællematrix, definition_en: Symbol counts by aligned motif position.}
  - {id: dm847.term.pwm, es: Matriz de pesos, en: Position weight matrix, da: Positionsvægtmatrix, definition_en: Position-specific log likelihood ratios against background.}
  - {id: dm847.term.sequence_logo, es: Logo de secuencia, en: Sequence logo, da: Sekvenslogo, definition_en: Visual display of symbol preferences and information by position.}
  - {id: dm847.term.entropy, es: Entropía, en: Entropy, da: Entropi, definition_en: Measure of uncertainty in a probability distribution.}
  - {id: dm847.term.information_content, es: Contenido de información, en: Information content, da: Informationsindhold, definition_en: Divergence of a motif column from its background distribution.}
  - {id: dm847.term.oops, es: OOPS, en: OOPS, da: OOPS, definition_en: Exactly one motif occurrence per sequence model.}
  - {id: dm847.term.zoops, es: ZOOPS, en: ZOOPS, da: ZOOPS, definition_en: Zero or one motif occurrence per sequence model.}
  - {id: dm847.term.tcm, es: TCM, en: TCM, da: TCM, definition_en: Multiple independent occurrence mixture model.}
  - {id: dm847.term.responsibility, es: Responsabilidad, en: Responsibility, da: Responsibility, definition_en: Posterior weight assigned to a latent candidate in EM.}

hidden_support:
  canonical_explanation:
    es: >-
      Un motivo se representa como distribuciones por posición comparadas con un fondo. EM alterna
      entre asignar probabilidades posteriores a sitios candidatos y actualizar la PWM con conteos
      esperados. El resultado depende de modelo de ocurrencia, ancho, fondo, pseudoconteos e
      inicialización. La significancia estadística y la función reguladora requieren validaciones distintas.
    en: >-
      A motif is represented by position-specific distributions compared with a background. EM
      alternates between assigning posterior probabilities to candidate sites and updating the PWM
      from expected counts. Results depend on occurrence model, width, background, pseudocounts, and
      initialization. Statistical significance and regulatory function require different validation layers.
    da: >-
      Et motiv repræsenteres med positionsspecifikke fordelinger mod en baggrund. EM skifter mellem
      posteriorer for sites og opdatering af PWM fra forventede tællinger. Funktion kræver ekstern validering.
  misconceptions:
    - {id: dm847.m10.mc01, false_belief: {"es": "Consenso y PWM contienen la misma información", "en": "Consensus and PWM contain the same information", "da": "Konsensus og PWM indeholder samme information"}, correction: {"es": "El consenso descarta variabilidad y probabilidades", "en": "Consensus discards variability and probabilities", "da": "Konsensus kasserer variation og sandsynligheder"}}
    - {id: dm847.m10.mc02, false_belief: {"es": "EM siempre encuentra el motivo verdadero", "en": "EM always finds the true motif", "da": "EM finder altid det sande motiv"}, correction: {"es": "Puede converger a óptimos locales o patrones de fondo", "en": "It may converge to local optima or background patterns", "da": "Den kan konvergere til lokale optima eller baggrundsmønstre"}}
    - {id: dm847.m10.mc03, false_belief: {"es": "Enriquecimiento implica causalidad reguladora", "en": "Enrichment implies regulatory causality", "da": "Berigelse indebærer regulatorisk kausalitet"}, correction: {"es": "Es asociación estadística que requiere evidencia funcional", "en": "It is statistical association requiring functional evidence", "da": "Det er statistisk association der kræver funktionelt bevis"}}
  socratic_questions:
    - ¿Qué modelo de fondo define el score?
    - ¿Cada secuencia debe contener un sitio?
    - ¿Cómo cambia la solución con otra inicialización?
    - ¿Se evaluó el ancho en datos independientes?
    - ¿Qué evidencia distingue asociación de unión funcional?
  knowledge_fragments:
    - {id: dm847.m10.k01, content_en: A motif is a distribution, not an exact consensus string.}
    - {id: dm847.m10.k02, content_en: PWM scores are motif-versus-background log likelihood ratios.}
    - {id: dm847.m10.k03, content_en: Information content depends on the background distribution.}
    - {id: dm847.m10.k04, content_en: OOPS assumes one site; ZOOPS allows none; TCM allows multiple.}
    - {id: dm847.m10.k05, content_en: EM responsibilities normalize over latent candidates.}
    - {id: dm847.m10.k06, content_en: EM likelihood can improve while biological relevance does not.}
    - {id: dm847.m10.k07, content_en: Pseudocounts regularize zero symbol counts.}
    - {id: dm847.m10.k08, content_en: Motif width is a model-selection choice.}
    - {id: dm847.m10.k09, content_en: Matched controls reduce compositional confounding.}
    - {id: dm847.m10.k10, content_en: Enrichment does not prove direct factor binding.}
  response_constraints:
    - State motif width, occurrence model, strand handling, background, and pseudocounts.
    - Separate discovery, statistical enrichment, and functional validation.
    - Do not identify a transcription factor from motif similarity alone.
    - Report multiple starts and stability when EM is used.

