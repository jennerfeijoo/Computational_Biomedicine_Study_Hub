hidden_support:
  canonical_explanation:
    es: >-
      La BWT reorganiza símbolos según el orden lexicográfico de sufijos. C y Occ permiten
      actualizar un intervalo de sufijos al anteponer símbolos, dando búsqueda exacta hacia
      atrás. Contar usa sólo el intervalo; localizar requiere suffix-array completo o muestreado.
      En mapeo de lecturas, el índice genera semillas y un alineador separado resuelve errores.
    en: >-
      The BWT rearranges symbols according to suffix order. C and Occ update a suffix interval
      when characters are prepended, enabling exact backward search. Counting uses the interval;
      locating requires a full or sampled suffix array. In read mapping, the index generates
      seeds and a separate aligner handles errors.
    da: >-
      BWT omordner symboler efter suffix-orden. C og Occ opdaterer et interval ved venstre
      udvidelse. Optælling bruger intervallet; lokalisering kræver suffix-array-data.
  misconceptions:
    - {id: dm847.m08.mc01, false_belief: {es: BWT es irreversiblemente comprimida, en: The BWT is irreversible compression, da: BWT er irreversibel kompression}, correction: {es: Es una permutación reversible con sentinela; la compresión se aplica después, en: It is a reversible permutation with a sentinel; compression is applied afterward, da: Det er en reversibel permutation; kompression anvendes bagefter}}
    - {id: dm847.m08.mc02, false_belief: {es: Contar y localizar cuestan lo mismo, en: Counting and locating have the same cost, da: Optælling og lokalisering koster det samme}, correction: {es: Localizar puede requerir múltiples pasos LF hasta una muestra SA, en: Locating may require multiple LF steps to an SA sample, da: Lokalisering kan kræve flere LF-trin}}
    - {id: dm847.m08.mc03, false_belief: {es: Un índice exacto ya es un alineador completo, en: An exact index is already a complete aligner, da: Et eksakt indeks er allerede en komplet aligner}, correction: {es: Los errores e indels requieren generación de candidatos y extensión adicional, en: Errors and indels require candidate generation and separate extension, da: Fejl og indels kræver separat udvidelse}}
  socratic_questions:
    - ¿Qué convención usa Occ en el límite i?
    - ¿Qué representa el intervalo antes y después de añadir un símbolo?
    - ¿Necesitas contar o también localizar?
    - ¿Cuánta memoria ahorra el muestreo y cuántos pasos añade?
    - ¿Cómo recuperarás lecturas con un error dentro de la semilla?
  knowledge_fragments:
    - {id: dm847.m08.k01, content_en: BWT is the last column of sorted rotations or the predecessor symbols in suffix-array order.}
    - {id: dm847.m08.k02, content_en: LF mapping pairs equal symbols by occurrence rank.}
    - {id: dm847.m08.k03, content_en: C counts lexicographically smaller symbols.}
    - {id: dm847.m08.k04, content_en: Occ supports rank queries on BWT prefixes.}
    - {id: dm847.m08.k05, content_en: Backward search processes the pattern right to left.}
    - {id: dm847.m08.k06, content_en: Final interval size is the exact match count.}
    - {id: dm847.m08.k07, content_en: Locating requires suffix-array information.}
    - {id: dm847.m08.k08, content_en: Sparser sampling trades memory for LF steps.}
    - {id: dm847.m08.k09, content_en: BWT compression benefits from repetitive contexts.}
    - {id: dm847.m08.k10, content_en: Seed-and-extend separates candidate generation from tolerant alignment.}
  response_constraints:
    - State the sentinel and Occ boundary convention.
    - Distinguish count from locate operations.
    - Do not claim error tolerance from exact backward search alone.
    - Report both memory and query latency when comparing representations.

sources:
  - {id: sdu.dm847.official.2025, role: official_scope_and_learning_outcomes}
  - {id: compeau.pevzner.bioinformatics_algorithms.v1, role: bwt_and_string_index_foundations}
  - {id: original.dm847.m08, role: original_examples_questions_and_explanations}

limitations:
  - Production read mappers use additional heuristics, scoring models, and engineering optimizations.
  - Compression and latency depend strongly on sequence repetitiveness and implementation.
  - Exact search does not by itself address sequencing errors, variants, or structural rearrangements.