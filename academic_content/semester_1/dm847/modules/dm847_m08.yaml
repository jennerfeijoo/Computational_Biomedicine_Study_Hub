    prompt: {es: Deriva búsqueda hacia atrás y demuestra qué representa el intervalo tras cada símbolo., en: Derive backward search and prove what the interval represents after each symbol., da: Udled backward search og bevis intervallets betydning efter hvert symbol.}
    rubric: [{criterion: c_occ_definitions, weight: 0.25}, {criterion: interval_recurrence, weight: 0.30}, {criterion: invariant_and_induction, weight: 0.30}, {criterion: boundary_convention, weight: 0.15}]
  - id: dm847.m08.a02
    prompt: {es: Diseña un experimento tiempo-memoria para checkpoints Occ y SA muestreado., en: Design a time-memory experiment for Occ checkpoints and sampled SA., da: Design et tid-hukommelseseksperiment for Occ-checkpoints og samplet SA.}
    rubric: [{criterion: workloads_and_datasets, weight: 0.20}, {criterion: correctness_controls, weight: 0.20}, {criterion: memory_and_latency_metrics, weight: 0.35}, {criterion: justified_recommendation, weight: 0.25}]
  - id: dm847.m08.a03
    prompt: {es: Diseña un mapeador seed-and-extend y delimita lo que el FM-index resuelve y no resuelve., en: Design a seed-and-extend mapper and delimit what the FM-index does and does not solve., da: Design en seed-and-extend-mapper og afgræns hvad FM-index løser.}
    rubric: [{criterion: seed_strategy, weight: 0.25}, {criterion: candidate_extension, weight: 0.25}, {criterion: strands_errors_and_multimapping, weight: 0.30}, {criterion: limitations, weight: 0.20}]

glossary:
  - {id: dm847.term.bwt, es: Transformada de Burrows-Wheeler, en: Burrows-Wheeler transform, da: Burrows-Wheeler-transform, definition_en: Reversible permutation derived from sorted rotations or suffix order.}
  - {id: dm847.term.first_column, es: Primera columna F, en: First column F, da: Første kolonne F, definition_en: Sorted symbols of the BWT matrix.}
  - {id: dm847.term.last_column, es: Última columna L, en: Last column L, da: Sidste kolonne L, definition_en: The BWT string.}
  - {id: dm847.term.lf_mapping, es: LF-mapping, en: LF mapping, da: LF-mapping, definition_en: Mapping between ranked equal symbols in last and first columns.}
  - {id: dm847.term.occ, es: Tabla Occ, en: Occ table, da: Occ-tabel, definition_en: Prefix rank counts for BWT symbols.}
  - {id: dm847.term.c_table, es: Tabla C, en: C table, da: C-tabel, definition_en: Counts of lexicographically smaller text symbols.}
  - {id: dm847.term.backward_search, es: Búsqueda hacia atrás, en: Backward search, da: Backward search, definition_en: Pattern search by repeated left extension of a suffix interval.}
  - {id: dm847.term.fm_index, es: FM-index, en: FM-index, da: FM-index, definition_en: Compressed full-text index built from the BWT and rank support.}
  - {id: dm847.term.sampled_sa, es: Suffix array muestreado, en: Sampled suffix array, da: Samplet suffix-array, definition_en: Subset of suffix positions used to trade location time for memory.}
