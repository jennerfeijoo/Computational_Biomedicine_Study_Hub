limitations:
  - Molecular mechanisms are summarized at introductory bioinformatics depth and omit many organism-specific exceptions.
  - Synthetic examples do not represent clinical, diagnostic, or laboratory protocols.
  - Epigenetic terminology varies across subfields and must be interpreted with the study design.
  - Bacterial and phage diversity is broader than the canonical models used for teaching.
