glossary:
  - id: term.gene
    term: {"es": "gen", "en": "gene", "da": "gen"}
    definition: {"es": "Región genómica cuya actividad produce uno o más productos funcionales.", "en": "Genomic region whose activity produces one or more functional products.", "da": "Genomisk region hvis aktivitet producerer et eller flere funktionelle produkter."}
    related_terms: [term.transcript, term.locus]
  - id: term.genome
    term: {"es": "genoma", "en": "genome", "da": "genom"}
    definition: {"es": "Conjunto de material genético de una entidad biológica.", "en": "Complete genetic material of a biological entity.", "da": "Det samlede genetiske materiale i en biologisk enhed."}
    related_terms: [term.chromosome]
  - id: term.template_strand
    term: {"es": "hebra plantilla", "en": "template strand", "da": "template-streng"}
    definition: {"es": "Hebra leída por una polimerasa para sintetizar una cadena complementaria.", "en": "Strand read by a polymerase to synthesize a complementary strand.", "da": "Streng læst af en polymerase for at syntetisere en komplementær streng."}
    related_terms: [term.coding_strand, term.reverse_complement]
  - id: term.reverse_complement
    term: {"es": "reverso-complementaria", "en": "reverse complement", "da": "reverse complement"}
    definition: {"es": "Secuencia obtenida al invertir el orden y complementar cada base.", "en": "Sequence obtained by reversing order and complementing each base.", "da": "Sekvens opnået ved at vende rækkefølgen og komplementere hver base."}
    related_terms: [term.template_strand]
  - id: term.transcript
    term: {"es": "transcrito", "en": "transcript", "da": "transkript"}
    definition: {"es": "Molécula de ARN producida desde una plantilla de ADN o ARN.", "en": "RNA molecule produced from a DNA or RNA template.", "da": "RNA-molekyle produceret fra en DNA- eller RNA-template."}
    related_terms: [term.isoform]
  - id: term.isoform
    term: {"es": "isoforma", "en": "isoform", "da": "isoform"}
    definition: {"es": "Variante molecular producida desde un mismo locus mediante procesamiento o inicio alternativo.", "en": "Molecular variant produced from one locus through alternative processing or initiation.", "da": "Molekylær variant produceret fra ét locus gennem alternativ processering eller initiering."}
    related_terms: [term.transcript]
  - id: term.reading_frame
    term: {"es": "marco de lectura", "en": "reading frame", "da": "læseramme"}
    definition: {"es": "Partición de una secuencia en codones consecutivos desde una posición y orientación determinadas.", "en": "Partition of a sequence into consecutive codons from a defined position and orientation.", "da": "Opdeling af en sekvens i kodoner fra en bestemt position og orientering."}
    related_terms: [term.orf]
  - id: term.orf
    term: {"es": "marco abierto de lectura", "en": "open reading frame", "da": "åben læseramme"}
    definition: {"es": "Tramo de un marco sin codones de terminación internos entre límites definidos.", "en": "Segment of a reading frame without internal stop codons between defined boundaries.", "da": "Segment af en læseramme uden interne stopkodoner mellem definerede grænser."}
    related_terms: [term.reading_frame]
  - id: term.epigenetic_state
    term: {"es": "estado epigenético", "en": "epigenetic state", "da": "epigenetisk tilstand"}
    definition: {"es": "Estado regulador relativamente persistente sin cambio necesario de secuencia de ADN.", "en": "Relatively persistent regulatory state without a required DNA-sequence change.", "da": "Relativt persistent regulatorisk tilstand uden nødvendigt skift i DNA-sekvens."}
    related_terms: [term.chromatin]
  - id: term.operon
    term: {"es": "operón", "en": "operon", "da": "operon"}
    definition: {"es": "Unidad reguladora bacteriana donde genes relacionados pueden transcribirse conjuntamente.", "en": "Bacterial regulatory unit in which related genes may be transcribed together.", "da": "Bakteriel regulatorisk enhed hvor relaterede gener kan transkriberes sammen."}
    related_terms: [term.polycistronic_rna]
  - id: term.prophage
    term: {"es": "profago", "en": "prophage", "da": "profag"}
    definition: {"es": "Genoma de fago mantenido de forma estable con el genoma bacteriano durante lisogenia.", "en": "Phage genome maintained stably with the bacterial genome during lysogeny.", "da": "Faggenom stabilt vedligeholdt med bakteriegenomet under lysogeni."}
    related_terms: [term.lysogeny]
  - id: term.horizontal_transfer
    term: {"es": "transferencia horizontal", "en": "horizontal gene transfer", "da": "horisontal genoverførsel"}
    definition: {"es": "Movimiento de material genético entre organismos fuera de la transmisión progenitor-descendiente.", "en": "Movement of genetic material between organisms outside parent-offspring transmission.", "da": "Bevægelse af genetisk materiale mellem organismer uden for forælder-afkom-overførsel."}
    related_terms: [term.transformation, term.transduction]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      La bioinformática comienza separando tres niveles: la secuencia observada, la entidad biológica que se
      intenta representar y la evidencia que conecta ambas. Orientación, versión de referencia, tipo celular,
      estado regulador y método experimental pueden cambiar la interpretación. El dogma central describe flujos
      frecuentes de información, no una equivalencia simple ADN=ARN=proteína. Cada inferencia debe formularse
      con alcance proporcional: similitud sugiere homología o candidatura; expresión demuestra producción bajo
      condiciones medidas; perturbación y ensayos funcionales sostienen mecanismos más específicos.
    en: >-
      Bioinformatics begins by separating the observed sequence, the biological entity being represented,
      and the evidence connecting them. Orientation, reference version, cell type, regulatory state, and assay
      can change interpretation. The central dogma describes common information flows, not a simple DNA=RNA=protein
      equivalence. Every inference should be proportional: similarity supports homology or candidacy; expression
      supports production under measured conditions; perturbation and functional assays support specific mechanisms.
    da: >-
      Bioinformatik begynder med at adskille den observerede sekvens, den biologiske enhed og evidensen der forbinder dem.
      Orientering, referenceversion, celletype, regulatorisk tilstand og assay kan ændre fortolkningen. Det centrale dogme
      er ikke en simpel DNA=RNA=protein-lighed. Slutninger skal være proportionale med evidensen.
  misconceptions:
    - id: m01.mc01
      claim: {"es": "Todo ADN es un gen.", "en": "All DNA is a gene.", "da": "Alt DNA er et gen."}
      correction: {"es": "El genoma contiene muchas regiones no génicas con funciones estructurales, reguladoras o móviles.", "en": "Genomes contain many non-gene regions with structural, regulatory, or mobile roles.", "da": "Genomer indeholder mange ikke-genregioner med strukturelle, regulatoriske eller mobile roller."}
    - id: m01.mc02
      claim: {"es": "Un gen produce exactamente una proteína.", "en": "One gene produces exactly one protein.", "da": "Ét gen producerer præcis ét protein."}
      correction: {"es": "Puede producir ARN funcional, múltiples transcritos y diferentes productos proteicos.", "en": "It may produce functional RNA, multiple transcripts, and different protein products.", "da": "Det kan producere funktionelt RNA, flere transkripter og forskellige proteinprodukter."}
    - id: m01.mc03
      claim: {"es": "Complementar una secuencia ya produce su reverso-complementaria.", "en": "Complementing a sequence already gives its reverse complement.", "da": "Komplementering alene giver reverse complement."}
      correction: {"es": "También debe invertirse el orden para escribir la hebra opuesta 5'→3'.", "en": "Order must also be reversed to write the opposite strand 5'→3'.", "da": "Rækkefølgen skal også vendes for at skrive den modsatte streng 5'→3'."}
    - id: m01.mc04
      claim: {"es": "Más ARN siempre significa más proteína activa.", "en": "More RNA always means more active protein.", "da": "Mere RNA betyder altid mere aktivt protein."}
      correction: {"es": "Traducción, degradación, plegamiento, modificación y localización modulan la relación.", "en": "Translation, degradation, folding, modification, and localization modulate the relationship.", "da": "Translation, nedbrydning, foldning, modifikation og lokalisering modulerer forholdet."}
    - id: m01.mc05
      claim: {"es": "Una diferencia epigenética demuestra causalidad.", "en": "An epigenetic difference proves causality.", "da": "En epigenetisk forskel beviser kausalitet."}
      correction: {"es": "Puede ser causa, consecuencia, confusión o cambio de composición celular.", "en": "It may be cause, consequence, confounding, or a cell-composition shift.", "da": "Den kan være årsag, konsekvens, confounding eller ændret cellesammensætning."}
    - id: m01.mc06
      claim: {"es": "Genes vecinos siempre forman un operón.", "en": "Neighboring genes always form an operon.", "da": "Nabogener danner altid et operon."}
      correction: {"es": "Se requiere integrar orientación, distancia, señales regulatorias y evidencia de transcrito.", "en": "Orientation, distance, regulatory signals, and transcript evidence must be integrated.", "da": "Orientering, afstand, regulatoriske signaler og transkriptevidens skal integreres."}
    - id: m01.mc07
      claim: {"es": "Una región similar a fago es necesariamente un fago activo.", "en": "A phage-like region is necessarily an active phage.", "da": "En faglignende region er nødvendigvis en aktiv fag."}
      correction: {"es": "Puede ser incompleta, degradada o no inducible.", "en": "It may be incomplete, degraded, or non-inducible.", "da": "Den kan være ufuldstændig, degraderet eller ikke-inducerbar."}
  socratic_questions:
    - ¿Qué entidad exacta representan estas coordenadas y en qué versión del ensamblaje?
    - Which strand is being shown, and in what orientation?
    - Hvilken evidens forbinder denne sekvens med et transkript eller protein?
    - ¿La medición refleja síntesis, abundancia estable, actividad o localización?
    - What alternative explanations fit the same observation?
    - Hvilken perturbation ville skelne årsag fra korrelation?
    - ¿Qué conclusión mínima permanece válida si la anotación cambia?
    - Does the example concern eukaryotic, bacterial, organelle, or phage biology?
  grading_criteria:
    - distinguishes sequence observation from biological interpretation
    - states strand, direction, reference, and context when relevant
    - separates association, mechanism, and causality
    - uses proportional language such as candidate, supports, consistent with, and demonstrates
    - integrates multiple evidence layers rather than relying on one signal
    - identifies organism-specific limits and exceptions
  response_constraints:
    - never present a synthetic sequence as a validated biological locus
    - never infer clinical meaning from sequence similarity alone
    - do not equate DNA methylation globally with repression
    - do not reveal objective-answer keys during an active assessment
    - request organism, assembly, strand, assay, and condition when interpretation depends on them
  retrieval_fragments:
    - id: dm847.m01.h01
      topic: gene_definition
      text: {"es": "Un gen se define por productos funcionales y evidencia contextual, no sólo por longitud u ORF.", "en": "A gene is defined by functional products and contextual evidence, not merely length or an ORF.", "da": "Et gen defineres af funktionelle produkter og kontekstuel evidens, ikke blot længde eller ORF."}
    - id: dm847.m01.h02
      topic: strand_orientation
      text: {"es": "Reverso-complementar exige invertir orden y complementar bases.", "en": "Reverse complementation requires reversing order and complementing bases.", "da": "Reverse complement kræver vending af rækkefølge og komplementering af baser."}
    - id: dm847.m01.h03
      topic: transcript_interpretation
      text: {"es": "Abundancia de ARN integra síntesis, procesamiento y degradación.", "en": "RNA abundance integrates synthesis, processing, and degradation.", "da": "RNA-mængde integrerer syntese, processering og nedbrydning."}
    - id: dm847.m01.h04
      topic: protein_interpretation
      text: {"es": "Cantidad y actividad proteica dependen de etapas posteriores a la transcripción.", "en": "Protein abundance and activity depend on post-transcriptional stages.", "da": "Proteinmængde og aktivitet afhænger af post-transkriptionelle trin."}
    - id: dm847.m01.h05
      topic: regulatory_evidence
      text: {"es": "Ocupación, perturbación y respuesta son capas de evidencia diferentes.", "en": "Occupancy, perturbation, and response are distinct evidence layers.", "da": "Binding, perturbation og respons er forskellige evidenslag."}
    - id: dm847.m01.h06
      topic: epigenetic_causality
      text: {"es": "Una marca epigenética puede ser causa, consecuencia o correlato.", "en": "An epigenetic mark may be cause, consequence, or correlate.", "da": "Et epigenetisk mærke kan være årsag, konsekvens eller korrelat."}
    - id: dm847.m01.h07
      topic: operon_prediction
      text: {"es": "Proximidad y orientación apoyan un operón, pero un transcrito conjunto aporta evidencia más directa.", "en": "Proximity and orientation support an operon, but a joint transcript is more direct evidence.", "da": "Nærhed og orientering støtter et operon, men et fælles transkript er mere direkte evidens."}
    - id: dm847.m01.h08
      topic: horizontal_transfer
      text: {"es": "Transformación, conjugación y transducción difieren por fuente y mecanismo de transferencia.", "en": "Transformation, conjugation, and transduction differ by source and transfer mechanism.", "da": "Transformation, konjugation og transduktion adskiller sig i kilde og overførselsmekanisme."}
    - id: dm847.m01.h09
      topic: prophage_annotation
      text: {"es": "Una región similar a fago no demuestra completitud, inducibilidad ni infectividad.", "en": "A phage-like region does not demonstrate completeness, inducibility, or infectivity.", "da": "En faglignende region beviser ikke komplethed, inducerbarhed eller infektivitet."}
    - id: dm847.m01.h10
      topic: evidence_rule
      text: {"es": "Formula la conclusión más específica que todas las evidencias independientes puedan sostener.", "en": "State the most specific conclusion that all independent evidence can support.", "da": "Formulér den mest specifikke konklusion som al uafhængig evidens kan støtte."}

