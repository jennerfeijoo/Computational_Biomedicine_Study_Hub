metadata:
  title:
    es: "Información molecular, dogma central, regulación, epigenética, bacterias y fagos"
    en: "Molecular information, central dogma, regulation, epigenetics, bacteria, and phages"
    da: "Molekylær information, det centrale dogme, regulering, epigenetik, bakterier og fager"
  summary:
    es: >-
      Base biológica para bioinformática: organización del genoma, replicación, transcripción,
      procesamiento de ARN, traducción, regulación génica, cromatina, modificación epigenética
      del ADN, organización génica bacteriana y ciclos de bacteriófagos. El módulo enfatiza que
      las secuencias adquieren significado mediante contexto, orientación, estado celular y evidencia.
    en: >-
      Biological foundation for bioinformatics: genome organization, replication, transcription,
      RNA processing, translation, gene regulation, chromatin, epigenetic DNA modification,
      bacterial gene organization, and bacteriophage cycles. The module emphasizes that sequences
      acquire meaning through context, orientation, cellular state, and evidence.
    da: >-
      Biologisk grundlag for bioinformatik: genomorganisering, replikation, transkription,
      RNA-processering, translation, genregulering, kromatin, epigenetisk DNA-modifikation,
      bakteriel genorganisation og bakteriofagers cyklusser. Sekvenser får betydning gennem
      kontekst, orientering, cellulær tilstand og evidens.
  prerequisites: [dm857.m05, dm857.m06]
  official_learning_outcomes: [dm847.lo01]
  estimated_study_hours: 20
  difficulty: foundational_to_intermediate

