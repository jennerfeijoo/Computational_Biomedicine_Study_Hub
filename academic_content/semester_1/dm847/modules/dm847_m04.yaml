content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: "Representación de secuencias, probabilidad, matrices de sustitución y significancia"
    en: "Sequence representation, probability, substitution matrices, and significance"
    da: "Sekvensrepræsentation, sandsynlighed, substitutionsmatricer og signifikans"
  summary:
    es: >-
      Fundamentos para comparar secuencias de ADN, ARN y proteínas: alfabetos, símbolos ambiguos,
      orientación, formatos, calidad, composición, identidad, similitud, homología, modelos nulos,
      puntuaciones log-odds, matrices de sustitución, penalizaciones de gaps, sesgo composicional,
      complejidad baja y significancia estadística. El módulo separa puntuación algorítmica,
      normalización y evidencia evolutiva.
    en: >-
      Foundations for comparing DNA, RNA, and protein sequences: alphabets, ambiguous symbols,
      orientation, formats, quality, composition, identity, similarity, homology, null models,
      log-odds scores, substitution matrices, gap penalties, compositional bias, low complexity,
      and statistical significance. The module separates algorithmic score, normalization,
      and evolutionary evidence.
    da: >-
      Grundlag for sammenligning af DNA-, RNA- og proteinsekvenser: alfabeter, tvetydige symboler,
      orientering, formater, kvalitet, sammensætning, identitet, lighed, homologi, nulmodeller,
      log-odds-scorer, substitutionsmatricer, gap-straffe, kompositionsbias, lav kompleksitet og signifikans.
  prerequisites: [dm847.m01, dm847.m02, bmb830.m05, dm857.m05, dm857.m06]
  official_learning_outcomes: [dm847.lo04]
  estimated_study_hours: 22
  difficulty: intermediate

