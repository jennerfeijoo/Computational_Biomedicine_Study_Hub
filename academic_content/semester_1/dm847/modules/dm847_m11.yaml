glossary:
  - {id: dm847.term.fastq, es: FASTQ, en: FASTQ, da: FASTQ, definition_en: Text format storing sequence reads and base qualities.}
  - {id: dm847.term.phred, es: Phred, en: Phred score, da: Phred-score, definition_en: Logarithmic encoding of estimated base-call error probability.}
  - {id: dm847.term.adapter, es: Adaptador, en: Adapter, da: Adapter, definition_en: Synthetic sequence ligated during library preparation.}
  - {id: dm847.term.duplicate_read, es: Read duplicada, en: Duplicate read, da: Duplikeret read, definition_en: Reads with identical or near-identical coordinates or sequence under a duplicate definition.}
  - {id: dm847.term.mapping_quality, es: Calidad de mapeo, en: Mapping quality, da: Mapping quality, definition_en: Confidence in the selected alignment location.}
  - {id: dm847.term.multimapping, es: Multimapeo, en: Multimapping, da: Multimapping, definition_en: A read compatible with multiple reference locations.}
  - {id: dm847.term.reference_bias, es: Sesgo de referencia, en: Reference bias, da: Referencebias, definition_en: Preferential alignment or detection of reference-like alleles.}
  - {id: dm847.term.coverage_depth, es: Profundidad, en: Coverage depth, da: Dækningsdybde, definition_en: Number of reads or fragments covering a position.}
  - {id: dm847.term.coverage_breadth, es: Breadth de cobertura, en: Coverage breadth, da: Coverage breadth, definition_en: Fraction of target positions meeting a depth threshold.}
  - {id: dm847.term.peak_calling, es: Peak calling, en: Peak calling, da: Peak calling, definition_en: Detection of regions enriched for assay fragments relative to background.}

hidden_support:
  canonical_explanation:
    es: >-
      Un flujo NGS transforma reads crudas en evidencia mediante QC, preprocesamiento justificado,
      mapeo, filtrado y resumen. Cada etapa cambia el conjunto de datos y debe registrar cuántas
      unidades entran y salen. Phred describe error de base; mapping quality describe ambigüedad de
      ubicación. Cobertura necesita denominadores y una peak es enriquecimiento estadístico, no causalidad.
    en: >-
      An NGS workflow turns raw reads into evidence through QC, justified preprocessing, mapping,
      filtering, and summarization. Every step changes the dataset and should record inputs and outputs.
      Phred describes base-call error; mapping quality describes placement ambiguity. Coverage needs
      explicit denominators, and a peak is statistical enrichment rather than causality.
    da: >-
      Et NGS-workflow omdanner rå reads til evidens gennem QC, begrundet preprocessing, mapping,
      filtrering og opsummering. Phred beskriver basefejl; mapping quality beskriver placeringsusikkerhed.
  misconceptions:
    - {id: dm847.m11.mc01, false_belief: {es: Más trimming siempre mejora datos, en: More trimming always improves data, da: Mere trimming forbedrer altid data}, correction: {es: Puede reducir longitud, unicidad y mapeabilidad, en: It may reduce length, uniqueness, and mappability, da: Det kan reducere længde, unikhed og mappability}}
    - {id: dm847.m11.mc02, false_belief: {es: Q30 significa que la read es 99.9% correcta, en: Q30 means the whole read is 99.9% correct, da: Q30 betyder at hele readet er 99,9% korrekt}, correction: {es: Q30 es una estimación por base, no la probabilidad de perfección de toda la read, en: Q30 is a per-base estimate, not whole-read perfection probability, da: Q30 er et estimat pr. base, ikke for hele readet}}
    - {id: dm847.m11.mc03, false_belief: {es: Una peak prueba función, en: A peak proves function, da: En peak beviser funktion}, correction: {es: Sólo evidencia enriquecimiento bajo el modelo y controles usados, en: It only evidences enrichment under the chosen model and controls, da: Den viser kun berigelse under den valgte model og kontroller}}
  socratic_questions:
    - ¿Cuál es la unidad biológica y cuál la unidad de lectura?
    - ¿Qué evidencia concreta justifica recortar?
    - ¿Cómo se manejan reads multimapeadas?
    - ¿Qué numerador y denominador producen la cobertura reportada?
    - ¿Qué control modela el fondo del ensayo?
  knowledge_fragments:
    - {id: dm847.m11.k01, content_en: A read is not automatically one original molecule.}
    - {id: dm847.m11.k02, content_en: Phred scores encode per-base estimated error probabilities.}
    - {id: dm847.m11.k03, content_en: QC warnings require assay context.}
    - {id: dm847.m11.k04, content_en: Aggressive trimming can reduce mappability.}
    - {id: dm847.m11.k05, content_en: Mapping quality differs from base quality.}
    - {id: dm847.m11.k06, content_en: Multimapping policy changes downstream counts.}
    - {id: dm847.m11.k07, content_en: Mean depth and coverage breadth answer different questions.}
    - {id: dm847.m11.k08, content_en: Peak calling requires assay-appropriate background controls.}
    - {id: dm847.m11.k09, content_en: Multiple testing applies when scanning many genomic regions.}
    - {id: dm847.m11.k10, content_en: Reproducibility includes reference, annotation, parameters, software, and environment.}
  response_constraints:
    - Distinguish biological replicate, molecule, fragment, read, and read pair.
    - State reference and annotation versions and all filtering conventions.
    - Do not label QC warnings as automatic failure without assay context.
    - Do not interpret peaks as causal or direct binding without additional evidence.

sources:
