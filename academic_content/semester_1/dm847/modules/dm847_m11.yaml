objective_bank:
  - {id: dm847.m11.q01, type: multiple_choice, prompt: {es: ¿Qué representa paired-end?, en: What does paired-end sequencing represent?, da: Hvad repræsenterer paired-end?}, options: [{id: a, es: Dos lecturas de extremos de un fragmento, en: Two reads from the ends of one fragment, da: To reads fra enderne af ét fragment}, {id: b, es: Dos pacientes, en: Two patients, da: To patienter}, {id: c, es: Dos genes necesariamente, en: Necessarily two genes, da: Nødvendigvis to gener}, {id: d, es: Dos referencias, en: Two references, da: To referencer}], correct_option_ids: [a]}
  - {id: dm847.m11.q02, type: true_false, prompt: {es: Una read equivale siempre a una molécula original., en: One read always equals one original molecule., da: Ét read svarer altid til ét originalt molekyle.}, correct: false}
  - {id: dm847.m11.q03, type: multiple_choice, prompt: {es: Q30 corresponde aproximadamente a qué p_error?, en: Q30 corresponds approximately to what error probability?, da: Hvilken fejlsandsynlighed svarer Q30 omtrent til?}, options: [{id: a, es: 0.001, en: 0.001, da: 0.001}, {id: b, es: 0.1, en: 0.1, da: 0.1}, {id: c, es: 0.03, en: 0.03, da: 0.03}, {id: d, es: 0.3, en: 0.3, da: 0.3}], correct_option_ids: [a]}
  - {id: dm847.m11.q04, type: true_false, prompt: {es: Una alerta QC siempre obliga a descartar la muestra., en: A QC warning always requires discarding the sample., da: En QC-advarsel kræver altid kassation af prøven.}, correct: false}
  - {id: dm847.m11.q05, type: multiple_choice, prompt: {es: ¿Qué riesgo tiene trimming agresivo?, en: What is a risk of aggressive trimming?, da: Hvad er en risiko ved aggressiv trimming?}, options: [{id: a, es: Menor longitud y mapeabilidad, en: Reduced length and mappability, da: Mindre længde og mappability}, {id: b, es: Crea réplicas biológicas, en: Creates biological replicates, da: Skaber biologiske replikater}, {id: c, es: Elimina todo sesgo, en: Eliminates all bias, da: Fjerner al bias}, {id: d, es: Aumenta siempre cobertura, en: Always increases coverage, da: Øger altid dækning}], correct_option_ids: [a]}
  - {id: dm847.m11.q06, type: true_false, prompt: {es: Mapping quality y base quality miden lo mismo., en: Mapping quality and base quality measure the same thing., da: Mapping quality og base quality måler det samme.}, correct: false}
  - {id: dm847.m11.q07, type: multiple_choice, prompt: {es: ¿Qué es breadth de cobertura?, en: What is coverage breadth?, da: Hvad er coverage breadth?}, options: [{id: a, es: Fracción del objetivo cubierta al menos k veces, en: Fraction of target covered at least k times, da: Andel af målet dækket mindst k gange}, {id: b, es: Media de Phred, en: Mean Phred, da: Gennemsnitlig Phred}, {id: c, es: Número de muestras, en: Number of samples, da: Antal prøver}, {id: d, es: Longitud de adaptador, en: Adapter length, da: Adapterlængde}], correct_option_ids: [a]}
  - {id: dm847.m11.q08, type: true_false, prompt: {es: Misma profundidad media implica distribución de cobertura equivalente., en: Equal mean depth implies equivalent coverage distribution., da: Samme gennemsnitsdybde betyder samme dækningsfordeling.}, correct: false}
  - {id: dm847.m11.q09, type: multiple_choice, prompt: {es: ¿Qué representa una peak?, en: What does a peak represent?, da: Hvad repræsenterer en peak?}, options: [{id: a, es: Enriquecimiento regional frente a un fondo definido, en: Regional enrichment relative to a defined background, da: Regional berigelse relativt til en defineret baggrund}, {id: b, es: Causalidad demostrada, en: Proven causality, da: Bevist kausalitet}, {id: c, es: Un gen nuevo, en: A new gene, da: Et nyt gen}, {id: d, es: Una variante validada, en: A validated variant, da: En valideret variant}], correct_option_ids: [a]}
  - {id: dm847.m11.q10, type: true_false, prompt: {es: Reejecutar el pipeline desde FASTQ en un entorno limpio es una prueba de reproducibilidad., en: Re-running from FASTQ in a clean environment tests reproducibility., da: Genkørsel fra FASTQ i et rent miljø tester reproducerbarhed.}, correct: true}

