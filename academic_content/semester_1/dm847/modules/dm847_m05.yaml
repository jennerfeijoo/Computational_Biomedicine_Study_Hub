  expected_count: 24

glossary:
  - id: term.alignment
    term: {"es": "alineamiento", "en": "alignment", "da": "alignment"}
    definition: {"es": "Correspondencia ordenada entre símbolos y gaps que preserva el orden de cada secuencia.", "en": "Ordered correspondence among symbols and gaps preserving each sequence's order.", "da": "Ordnet korrespondance mellem symboler og gaps der bevarer sekvensernes orden."}
    related_terms: [term.global_alignment, term.local_alignment]
  - id: term.dynamic_programming
    term: {"es": "programación dinámica", "en": "dynamic programming", "da": "dynamisk programmering"}
    definition: {"es": "Método que resuelve subproblemas solapados y combina sus óptimos almacenados.", "en": "Method solving overlapping subproblems and combining stored optima.", "da": "Metode der løser overlappende delproblemer og kombinerer gemte optima."}
    related_terms: [term.recurrence]
  - id: term.recurrence
    term: {"es": "recurrencia", "en": "recurrence", "da": "recurrence"}
    definition: {"es": "Regla que define el valor de un estado a partir de estados menores.", "en": "Rule defining a state value from smaller states.", "da": "Regel der definerer en tilstandsværdi fra mindre tilstande."}
    related_terms: [term.dynamic_programming]
  - id: term.global_alignment
    term: {"es": "alineamiento global", "en": "global alignment", "da": "global alignment"}
    definition: {"es": "Alineamiento que cubre ambas secuencias completas bajo el modelo.", "en": "Alignment covering both complete sequences under the model.", "da": "Alignment der dækker begge hele sekvenser."}
    related_terms: [term.local_alignment]
  - id: term.local_alignment
    term: {"es": "alineamiento local", "en": "local alignment", "da": "lokal alignment"}
    definition: {"es": "Alineamiento de las subregiones con mayor puntuación.", "en": "Alignment of the highest-scoring subregions.", "da": "Alignment af de højest scorende delregioner."}
    related_terms: [term.global_alignment]
  - id: term.semiglobal_alignment
    term: {"es": "alineamiento semiglobal", "en": "semiglobal alignment", "da": "semiglobal alignment"}
    definition: {"es": "Variante que libera penalizaciones de extremos especificados para cubrir una secuencia o solapar extremos.", "en": "Variant freeing specified end penalties to cover one sequence or overlap ends.", "da": "Variant der frigiver bestemte endestraf for at dække en sekvens eller overlappe ender."}
    related_terms: [term.global_alignment]
  - id: term.traceback
    term: {"es": "traceback", "en": "traceback", "da": "traceback"}
    definition: {"es": "Reconstrucción de decisiones óptimas desde una celda final hacia estados predecesores.", "en": "Reconstruction of optimal decisions from an endpoint through predecessor states.", "da": "Rekonstruktion af optimale beslutninger fra endpoint gennem predecessors."}
    related_terms: [term.tie]
  - id: term.tie
    term: {"es": "empate", "en": "tie", "da": "tie"}
    definition: {"es": "Situación donde varias transiciones alcanzan el mismo score óptimo.", "en": "Situation where multiple transitions reach the same optimum score.", "da": "Situation hvor flere transitions når samme optimumscore."}
    related_terms: [term.traceback]
  - id: term.affine_gap
    term: {"es": "gap afín", "en": "affine gap", "da": "affin gap"}
    definition: {"es": "Modelo de gap con costes distintos de apertura y extensión.", "en": "Gap model with separate opening and extension costs.", "da": "Gapmodel med separate omkostninger for åbning og forlængelse."}
    related_terms: [term.gap_open, term.gap_extend]
  - id: term.banding
    term: {"es": "banding", "en": "banding", "da": "banding"}
    definition: {"es": "Restricción de la matriz a una banda de celdas alrededor de una trayectoria esperada.", "en": "Restriction of the matrix to a band around an expected path.", "da": "Begrænsning af matricen til en band omkring en forventet rute."}
    related_terms: [term.dynamic_programming]
  - id: term.hirschberg
    term: {"es": "algoritmo de Hirschberg", "en": "Hirschberg algorithm", "da": "Hirschberg-algoritme"}
    definition: {"es": "Reconstrucción global por divide-and-conquer usando memoria lineal.", "en": "Divide-and-conquer global reconstruction using linear memory.", "da": "Divide-and-conquer global rekonstruktion med lineær hukommelse."}
    related_terms: [term.traceback]
  - id: term.optimal_substructure
    term: {"es": "subestructura óptima", "en": "optimal substructure", "da": "optimal delstruktur"}
    definition: {"es": "Propiedad donde una solución óptima contiene soluciones óptimas de subproblemas relevantes.", "en": "Property where an optimum solution contains optimum solutions to relevant subproblems.", "da": "Egenskab hvor en optimumløsning indeholder optima for relevante delproblemer."}
    related_terms: [term.dynamic_programming]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      Un alineamiento dinámico se especifica con cinco piezas inseparables: estado, recurrencia, inicialización,
      endpoint y traceback. Cambiar sólo una pieza puede transformar global en local o producir un algoritmo incoherente.
      La matriz almacena scores de prefijos; el traceback traduce transiciones en columnas. Empates significan múltiples
      óptimos. Gaps afines requieren recordar si un gap está abierto. La validación debe comparar score y alineamiento con
      casos exhaustivos pequeños y verificar que el modelo elegido corresponde a la pregunta biológica.
    en: >-
      Dynamic alignment has five inseparable pieces: state, recurrence, initialization, endpoint, and traceback.
      Changing only one can transform global into local or create inconsistency. The matrix stores prefix scores;
      traceback translates transitions into columns. Ties mean multiple optima. Affine gaps require remembering open-gap state.
      Validation compares score and alignment with small exhaustive cases and verifies that the model fits the biological question.
    da: >-
      Dynamisk alignment har fem uadskillelige dele: tilstand, recurrence, initialisering, endpoint og traceback.
      Ties giver flere optima, affine gaps kræver gaptilstand, og validering bør bruge små exhaustive cases.
  misconceptions:
    - id: m05.mc01
      claim: {"es": "El alineamiento óptimo es la historia evolutiva verdadera.", "en": "The optimum alignment is the true evolutionary history.", "da": "Optimumalignmentet er den sande evolutionære historie."}
      correction: {"es": "Es el máximo bajo un modelo de puntuación y puede no ser único ni históricamente correcto.", "en": "It is the maximum under a scoring model and may be non-unique or historically incorrect.", "da": "Det er maksimum under en scoringsmodel og kan være ikke-entydigt eller historisk forkert."}
    - id: m05.mc02
      claim: {"es": "La misma recurrencia con cualquier inicialización produce el mismo problema.", "en": "The same recurrence with any initialization solves the same problem.", "da": "Samme recurrence med enhver initialisering løser samme problem."}
      correction: {"es": "Inicialización y endpoint definen qué extremos y cobertura se penalizan.", "en": "Initialization and endpoint define which ends and coverage are penalized.", "da": "Initialisering og endpoint definerer hvilke ender og coverage der straffes."}
    - id: m05.mc03
      claim: {"es": "Smith–Waterman comienza traceback en F[m,n].", "en": "Smith–Waterman traceback starts at F[m,n].", "da": "Smith–Waterman traceback starter i F[m,n]."}
      correction: {"es": "Comienza en la celda máxima y termina al llegar a cero.", "en": "It starts at the maximum cell and stops at zero.", "da": "Det starter i maksimal celle og stopper ved nul."}
    - id: m05.mc04
      claim: {"es": "Un score determina un único alineamiento.", "en": "A score determines one unique alignment.", "da": "En score bestemmer ét unikt alignment."}
      correction: {"es": "Empates pueden generar múltiples rutas y alineamientos con el mismo score.", "en": "Ties can generate multiple paths and alignments with the same score.", "da": "Ties kan give flere ruter og alignments med samme score."}
    - id: m05.mc05
      claim: {"es": "Gaps afines pueden implementarse correctamente con una sola matriz sin estado adicional.", "en": "Affine gaps can always be correctly implemented with one scalar matrix and no extra state.", "da": "Affine gaps kan altid implementeres korrekt med én skalarmatrix uden ekstra tilstand."}
      correction: {"es": "El coste depende de si el gap se abre o extiende, por lo que deben conservarse estados.", "en": "Cost depends on whether the gap opens or extends, requiring state memory.", "da": "Omkostningen afhænger af åbning eller forlængelse og kræver tilstand."}
    - id: m05.mc06
      claim: {"es": "Dos filas conservan score y traceback completo.", "en": "Two rows preserve both score and full traceback.", "da": "To rækker bevarer både score og fuldt traceback."}
      correction: {"es": "Conservan score; traceback requiere matriz, punteros comprimidos o divide-and-conquer.", "en": "They preserve score; traceback needs a matrix, compressed pointers, or divide-and-conquer.", "da": "De bevarer score; traceback kræver matrix, komprimerede pointers eller divide-and-conquer."}
    - id: m05.mc07
      claim: {"es": "Banding siempre encuentra el óptimo.", "en": "Banding always finds the optimum.", "da": "Banding finder altid optimum."}
      correction: {"es": "Sólo si la banda contiene una ruta óptima; de lo contrario devuelve un óptimo restringido.", "en": "Only if the band contains an optimum path; otherwise it returns a constrained optimum.", "da": "Kun hvis banden indeholder en optimumrute; ellers fås et begrænset optimum."}
  socratic_questions:
    - ¿Qué cubre exactamente el alineamiento solicitado?
    - Which state information is necessary for the next decision?
    - Hvilke randværdier gør endegaps gratis eller straffede?
    - ¿Dónde comienza y termina traceback en esta variante?
    - What does a tie in this cell imply?
    - Hvilken gapkonvention bruges for første position?
    - ¿Cómo sabes que el traceback corresponde al score almacenado?
    - Which exhaustive small case could falsify the implementation?
  grading_criteria:
    - defines optimization objective and valid alignment columns
    - derives recurrence, initialization, endpoint, and traceback consistently
    - selects alignment variant from biological coverage requirements
    - handles ties and affine-gap states explicitly
    - analyzes time, memory, and optimization assumptions
    - validates with rescoring, invariants, boundary cases, and exhaustive oracles
    - separates algorithmic optimum from evolutionary interpretation
  response_constraints:
    - never present an optimal alignment as unique without checking ties
    - never change end-gap treatment after traceback without reformulating the problem
    - always state gap-cost convention
    - do not recommend banding without a justified distance assumption or fallback
    - do not reveal objective-answer keys during active assessment
  retrieval_fragments:
    - id: dm847.m05.h01
      topic: alignment_definition
      text: {"es": "Alineamiento preserva orden y forma columnas símbolo-símbolo o símbolo-gap bajo un score.", "en": "Alignment preserves order and forms symbol-symbol or symbol-gap columns under a score.", "da": "Alignment bevarer orden og danner symbol-symbol- eller symbol-gap-kolonner under en score."}
    - id: dm847.m05.h02
      topic: dp_state
      text: {"es": "F[i,j] representa el óptimo para prefijos de longitudes i y j.", "en": "F[i,j] represents the optimum for prefixes of lengths i and j.", "da": "F[i,j] repræsenterer optimum for prefixes med længder i og j."}
    - id: dm847.m05.h03
      topic: global
      text: {"es": "Global penaliza bordes, termina en F[m,n] y traza hasta F[0,0].", "en": "Global penalizes borders, ends at F[m,n], and traces to F[0,0].", "da": "Global straffer rande, ender i F[m,n] og tracer til F[0,0]."}
    - id: dm847.m05.h04
      topic: local
      text: {"es": "Local incluye cero, comienza en el máximo de la matriz y termina en cero.", "en": "Local includes zero, starts at the matrix maximum, and ends at zero.", "da": "Lokal inkluderer nul, starter i matrixmaksimum og ender ved nul."}
    - id: dm847.m05.h05
      topic: semiglobal
      text: {"es": "Semiglobal libera extremos específicos mediante inicialización y endpoint.", "en": "Semiglobal frees specified ends through initialization and endpoint.", "da": "Semiglobal frigiver bestemte ender gennem initialisering og endpoint."}
    - id: dm847.m05.h06
      topic: traceback
      text: {"es": "Traceback traduce predecessors óptimos en columnas y debe reproducir el score.", "en": "Traceback converts optimum predecessors into columns and must reproduce the score.", "da": "Traceback omdanner optimum-predecessors til kolonner og skal reproducere scoren."}
    - id: dm847.m05.h07
      topic: ties
      text: {"es": "Empates en transiciones significan múltiples alineamientos óptimos posibles.", "en": "Tied transitions imply multiple possible optimum alignments.", "da": "Tied transitions betyder flere mulige optimumalignments."}
    - id: dm847.m05.h08
      topic: affine_gaps
      text: {"es": "Gaps afines requieren estados que distingan par, gap-X y gap-Y.", "en": "Affine gaps require states distinguishing pair, gap-X, and gap-Y.", "da": "Affine gaps kræver tilstande der skelner par, gap-X og gap-Y."}
    - id: dm847.m05.h09
      topic: complexity
      text: {"es": "Matriz completa cuesta O(mn) tiempo y memoria; sólo score puede usar memoria lineal.", "en": "Full matrix costs O(mn) time and memory; score alone can use linear memory.", "da": "Fuld matrix koster O(mn) tid og hukommelse; kun score kan bruge lineær hukommelse."}
    - id: dm847.m05.h10
      topic: validation
      text: {"es": "Valida con casos vacíos, empates, enumeración pequeña, rescoring y recuperación de secuencias.", "en": "Validate with empty cases, ties, small enumeration, rescoring, and sequence recovery.", "da": "Validér med tomme cases, ties, lille enumeration, rescoring og sekvensgendannelse."}

