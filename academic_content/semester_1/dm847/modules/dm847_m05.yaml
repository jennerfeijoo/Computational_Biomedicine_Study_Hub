limitations:
  - Statistical calibration of database-search scores is treated more fully in indexing and search modules.
  - Multiple-sequence alignment is outside this module.
  - Real aligners add heuristics, seeding, vectorization, and hardware-specific optimizations not covered exhaustively here.
