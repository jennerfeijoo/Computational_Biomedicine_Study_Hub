metadata:
  title:
    es: "Alineamiento por pares y programación dinámica"
    en: "Pairwise sequence alignment and dynamic programming"
    da: "Parvis sekvensalignment og dynamisk programmering"
  summary:
    es: >-
      Formulación e implementación de alineamientos globales, locales y semiglobales mediante programación dinámica.
      Incluye principio de optimalidad, estados, recurrencias, inicialización, traceback, empates, matrices de sustitución,
      gaps lineales y afines, complejidad temporal y espacial, optimización de memoria, banding, validación contra enumeración
      y límites biológicos de interpretar un alineamiento óptimo.
    en: >-
      Formulation and implementation of global, local, and semiglobal pairwise alignment using dynamic programming.
      It covers optimal substructure, states, recurrences, initialization, traceback, ties, substitution matrices,
      linear and affine gaps, time and space complexity, memory optimization, banding, validation against enumeration,
      and biological limits of interpreting an optimal alignment.
    da: >-
      Formulering og implementering af global, lokal og semiglobal parvis alignment med dynamisk programmering.
      Modulet dækker optimal delstruktur, tilstande, recurrencer, initialisering, traceback, ties, substitutionsmatricer,
      lineære og affine gaps, tids- og plads-kompleksitet, hukommelsesoptimering, banding og validering.
  prerequisites: [dm847.m04, dm857.m03, dm857.m04, dm857.m06, dm857.m15]
  official_learning_outcomes: [dm847.lo04]
  estimated_study_hours: 24
  difficulty: intermediate_to_advanced

