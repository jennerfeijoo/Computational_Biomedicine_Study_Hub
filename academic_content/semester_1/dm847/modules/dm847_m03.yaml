limitations:
  - SQL, SPARQL, and graph-query syntax are introduced in later implementation-oriented material rather than exhaustively here.
  - Performance recommendations depend on database engine, hardware, data distribution, and workload and must be measured.
  - Privacy and retention requirements depend on jurisdiction and institutional governance.
