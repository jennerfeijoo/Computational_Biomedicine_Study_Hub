glossary:
  - {id: dm847.term.hidden_state, es: Estado latente, en: Hidden state, da: Skjult tilstand, definition_en: Unobserved variable that generates observations and evolves through transitions.}
  - {id: dm847.term.emission_probability, es: Probabilidad de emisión, en: Emission probability, da: Emissionssandsynlighed, definition_en: Probability of observing a symbol conditional on a state.}
  - {id: dm847.term.transition_probability, es: Probabilidad de transición, en: Transition probability, da: Overgangssandsynlighed, definition_en: Probability of moving from one state to another.}
  - {id: dm847.term.forward_algorithm, es: Algoritmo forward, en: Forward algorithm, da: Forward-algoritme, definition_en: Dynamic program that sums probabilities over all paths.}
  - {id: dm847.term.viterbi_algorithm, es: Algoritmo de Viterbi, en: Viterbi algorithm, da: Viterbi-algoritme, definition_en: Dynamic program that finds the maximum-probability state path.}
  - {id: dm847.term.backward_algorithm, es: Algoritmo backward, en: Backward algorithm, da: Backward-algoritme, definition_en: Dynamic program summarizing the probability of future observations.}
  - {id: dm847.term.posterior_decoding, es: Decodificación posterior, en: Posterior decoding, da: Posterior-dekodning, definition_en: Position-wise inference from marginal state probabilities.}
  - {id: dm847.term.baum_welch, es: Baum-Welch, en: Baum-Welch, da: Baum-Welch, definition_en: EM procedure for HMM parameter estimation with latent states.}
  - {id: dm847.term.profile_hmm, es: Profile HMM, en: Profile HMM, da: Profile HMM, definition_en: HMM architecture representing a sequence family alignment.}
  - {id: dm847.term.logsumexp, es: Log-sum-exp, en: Log-sum-exp, da: Log-sum-exp, definition_en: Stable computation of the logarithm of a sum of exponentials.}

hidden_support:
  canonical_explanation:
    es: >-
      Un HMM combina una cadena de estados latentes con emisiones observables. Forward responde
      cuánto explica el modelo una secuencia sumando todas las trayectorias; Viterbi responde
      cuál es la trayectoria completa más probable; forward-backward responde cuánta evidencia
      marginal existe para cada estado en cada posición. Entrenamiento y decodificación deben
      separarse de la interpretación biológica, que requiere validación externa.
    en: >-
      An HMM combines a latent-state Markov chain with observable emissions. Forward asks how
      well the model explains a sequence by summing over all paths; Viterbi asks for the single
      most probable complete path; forward-backward asks for marginal support for each state at
      each position. Training and decoding are distinct from biological interpretation, which
      requires external validation.
    da: >-
      En HMM kombinerer en skjult Markovkæde med observerbare emissioner. Forward summerer
      over alle stier, Viterbi finder én mest sandsynlig komplet sti, og forward-backward giver
      marginal støtte pr. position. Biologisk fortolkning kræver ekstern validering.
  misconceptions:
    - id: dm847.m06.mc01
      false_belief:
        es: "Viterbi calcula la probabilidad total de la secuencia."
        en: "Viterbi computes total sequence probability."
        da: "Viterbi beregner den samlede sekvenssandsynlighed."
      correction:
        es: "Viterbi maximiza sobre trayectorias; forward suma sobre ellas."
        en: "Viterbi maximizes over paths; forward sums over them."
        da: "Viterbi maksimerer over stier; forward summerer."
    - id: dm847.m06.mc02
      false_belief:
        es: "Los estados aprendidos reciben automáticamente una interpretación biológica."
        en: "Learned states automatically receive biological meaning."
        da: "Lærte tilstande får automatisk biologisk betydning."
      correction:
        es: "Las etiquetas son modelísticas y requieren evidencia externa para interpretarse."
        en: "Labels are model constructs requiring external evidence."
        da: "Etiketter er modelkonstruktioner og kræver eksternt bevis."
    - id: dm847.m06.mc03
      false_belief:
        es: "EM siempre encuentra la mejor solución posible."
        en: "EM always finds the best possible solution."
        da: "EM finder altid den bedst mulige løsning."
      correction:
        es: "Puede converger a óptimos locales y debe repetirse con varias inicializaciones."
        en: "It may reach local optima and should be run from multiple starts."
        da: "Den kan nå lokale optima og bør køres fra flere initialiseringer."
  socratic_questions:
    - ¿Qué cantidad estás calculando: una suma sobre trayectorias, un máximo global o un marginal por posición?
    - ¿Qué supuesto de independencia permite la recurrencia?
    - ¿Qué evidencia externa justifica el nombre biológico asignado a un estado?
    - ¿Cómo sabes que una diferencia de resultados no es un problema de underflow?
    - ¿Qué cambia en la arquitectura de un profile HMM al modificar el umbral de ocupación?
  knowledge_fragments:
    - id: dm847.m06.k01
      content_en: Forward sums path probabilities; Viterbi maximizes one path probability.
    - id: dm847.m06.k02
      content_en: Posterior decoding uses normalized forward-backward products.
    - id: dm847.m06.k03
      content_en: Dense HMM dynamic programming commonly costs O(TK squared).
    - id: dm847.m06.k04
      content_en: Log-space computation requires log-sum-exp for marginalization.
    - id: dm847.m06.k05
      content_en: Delete states in profile HMMs are silent.
    - id: dm847.m06.k06
      content_en: Baum-Welch is EM and is sensitive to initialization.
    - id: dm847.m06.k07
      content_en: Pseudocounts regularize sparse transition and emission counts.
    - id: dm847.m06.k08
      content_en: State labels do not automatically imply biological categories.
    - id: dm847.m06.k09
      content_en: Simulated truth and held-out data serve different validation roles.
    - id: dm847.m06.k10
      content_en: A profile HMM architecture depends on how alignment columns are classified.
  response_constraints:
    - Do not describe an HMM state as biologically validated unless external evidence is provided.
    - Do not conflate Viterbi score with sequence marginal likelihood.
    - State whether probabilities are raw, scaled, or represented in log space.
    - Expose assumptions, initialization, pseudocounts, and validation split.

