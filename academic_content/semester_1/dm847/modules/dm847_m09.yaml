glossary:
  - {id: dm847.term.operon, es: Operón, en: Operon, da: Operon, definition_en: Contiguous genes potentially controlled and transcribed together.}
  - {id: dm847.term.transcription_unit, es: Unidad de transcripción, en: Transcription unit, da: Transkriptionsenhed, definition_en: The actual transcript produced from a promoter to a termination site.}
  - {id: dm847.term.regulon, es: Regulón, en: Regulon, da: Regulon, definition_en: Dispersed genes or operons controlled by a shared regulator.}
  - {id: dm847.term.promoter, es: Promotor, en: Promoter, da: Promotor, definition_en: Region recruiting transcription initiation machinery.}
  - {id: dm847.term.operator, es: Operador, en: Operator, da: Operator, definition_en: Regulatory DNA site bound by a regulatory protein.}
  - {id: dm847.term.terminator, es: Terminador, en: Terminator, da: Terminator, definition_en: Signal contributing to transcription termination.}
  - {id: dm847.term.synteny, es: Sintenia, en: Synteny, da: Synteni, definition_en: Conservation of genomic neighborhood or order.}
  - {id: dm847.term.hgt, es: Transferencia horizontal, en: Horizontal gene transfer, da: Horisontal genoverførsel, definition_en: Genetic transfer outside direct parent-to-offspring inheritance.}
  - {id: dm847.term.prophage, es: Profago, en: Prophage, da: Profag, definition_en: Phage genome integrated or maintained in a bacterial host.}
  - {id: dm847.term.intergenic_distance, es: Distancia intergénica, en: Intergenic distance, da: Intergenisk afstand, definition_en: Coordinate distance between adjacent gene boundaries.}

hidden_support:
  canonical_explanation:
    es: >-
      La predicción de operones combina señales débiles: misma hebra, distancia, conservación de
      vecindad, función y expresión. Ninguna es determinista. Las etiquetas dependen de anotación y
      condición, y la evaluación debe separar genomas o clados para evitar que vecindades homólogas
      aparezcan en ambos conjuntos. La salida probabilística requiere calibración y umbral según uso.
    en: >-
      Operon prediction combines weak signals: same strand, distance, neighborhood conservation,
      function, and expression. None is deterministic. Labels depend on annotation and condition,
      and evaluation should separate genomes or clades to avoid homologous-neighborhood leakage.
      Probabilistic output requires calibration and use-specific thresholding.
    da: >-
      Operonprædiktion kombinerer svage signaler som streng, afstand, bevaret naboskab, funktion og
      ekspression. Labels afhænger af annotation og betingelse; evaluering skal splitte efter genomer eller klader.
  misconceptions:
    - {id: dm847.m09.mc01, false_belief: {"es": "Operón y regulón son sinónimos", "en": "Operon and regulon are synonyms", "da": "Operon og regulon er synonymer"}, correction: {"es": "Un operón es contiguo; un regulón puede estar distribuido", "en": "An operon is contiguous; a regulon may be distributed", "da": "Et operon er sammenhængende; et regulon kan være spredt"}}
    - {id: dm847.m09.mc02, false_belief: {"es": "Distancia corta demuestra cotranscripción", "en": "Short distance proves cotranscription", "da": "Kort afstand beviser kotranskription"}, correction: {"es": "Es una característica probabilística que requiere evidencia adicional", "en": "It is a probabilistic feature requiring additional evidence", "da": "Det er en probabilistisk feature der kræver mere bevis"}}
    - {id: dm847.m09.mc03, false_belief: {"es": "Accuracy resume bien datos desbalanceados", "en": "Accuracy adequately summarizes imbalanced data", "da": "Accuracy opsummerer ubalancerede data godt"}, correction: {"es": "Deben añadirse precision, recall, PR-AUC y calibración", "en": "Precision, recall, PR-AUC, and calibration are needed", "da": "Precision, recall, PR-AUC og kalibrering kræves"}}
  socratic_questions:
    - ¿Qué definición exacta utiliza la etiqueta positiva?
    - ¿La anotación corresponde a una condición o a una capacidad potencial?
    - ¿Hay genomas o clados compartidos entre entrenamiento y prueba?
    - ¿Qué error es más costoso para el uso previsto?
    - ¿Qué mecanismo explica los principales falsos positivos?
  knowledge_fragments:
    - {id: dm847.m09.k01, content_en: Operons are contiguous; regulons may be distributed.}
    - {id: dm847.m09.k02, content_en: Transcription units may be condition dependent.}
    - {id: dm847.m09.k03, content_en: Same strand and short distance are probabilistic signals.}
    - {id: dm847.m09.k04, content_en: Coordinate conventions determine intergenic distance.}
    - {id: dm847.m09.k05, content_en: Conserved neighborhood is phylogenetically dependent evidence.}
    - {id: dm847.m09.k06, content_en: GC deviation is not proof of horizontal transfer.}
    - {id: dm847.m09.k07, content_en: Adjacent-pair classification differs from full-operon reconstruction.}
    - {id: dm847.m09.k08, content_en: Random row splits can leak homologous neighborhoods.}
    - {id: dm847.m09.k09, content_en: Imbalanced evaluation requires precision-recall metrics.}
    - {id: dm847.m09.k10, content_en: Probability scores need calibration before probabilistic interpretation.}
  response_constraints:
    - Do not infer cotranscription from distance alone.
    - State coordinate and circular-genome conventions.
    - Separate mobility, virulence, resistance, and function.
    - Report label provenance, grouping strategy, class balance, and calibration.

