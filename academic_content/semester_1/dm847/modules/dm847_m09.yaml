schema_version: 1.0.0
course_code: DM847
module_id: dm847.m09
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: "Organización genética bacteriana y predicción de operones"
    en: "Bacterial gene organization and operon prediction"
    da: "Bakteriel genorganisation og operonprædiktion"
  summary:
    es: >-
      Arquitectura de genomas bacterianos, operones y unidades de transcripción, regulación
      local, terminación, plasmidios, fagos y transferencia horizontal. La parte computacional
      desarrolla características de vecindad, formulación de clasificación, diseño de etiquetas,
      particiones por genoma, métricas y límites de inferir coexpresión o función a partir de proximidad.
    en: >-
      Bacterial genome architecture, operons and transcription units, local regulation,
      termination, plasmids, phages, and horizontal transfer. The computational component
      develops neighborhood features, classification formulation, label design, genome-aware
      data splitting, metrics, and limits of inferring coexpression or function from proximity.
    da: >-
      Bakteriel genomarkitektur, operoner og transkriptionsenheder, lokal regulering,
      terminering, plasmider, fager og horisontal genoverførsel. Den beregningsmæssige del
      omfatter naboskabsfeatures, klassifikation, labels, genombevidst datasplit og metrikker.
  estimated_study_hours: 11
  difficulty: intermediate_advanced

alignment:
  official_learning_outcomes: [dm847.lo01, dm847.lo06]
  prerequisite_modules: [dm847.m01, dm847.m04, dm847.m07]
  later_modules: [dm847.m11, dm847.m12, dm847.m13]

objectives:
  - {id: dm847.m09.o01, text: {"es": "Distinguir gen, operón, unidad de transcripción y regulón", "en": "Distinguish gene, operon, transcription unit, and regulon", "da": "Skelne mellem gen, operon, transkriptionsenhed og regulon"}}
  - {id: dm847.m09.o02, text: {"es": "Explicar promotores, operadores, terminadores y transcritos policistrónicos", "en": "Explain promoters, operators, terminators, and polycistronic transcripts", "da": "Forklare promotorer, operatorer, terminatorer og polycistroniske transkripter"}}
  - {id: dm847.m09.o03, text: {"es": "Interpretar orientación, distancia intergénica y sintenia local", "en": "Interpret orientation, intergenic distance, and local synteny", "da": "Fortolke orientering, intergenisk afstand og lokal synteni"}}
  - {id: dm847.m09.o04, text: {"es": "Explicar transferencia horizontal, plasmidios y fagos sin confundir movilidad con función", "en": "Explain horizontal transfer, plasmids, and phages without conflating mobility with function", "da": "Forklare horisontal overførsel, plasmider og fager uden at forveksle mobilitet med funktion"}}
  - {id: dm847.m09.o05, text: {"es": "Construir características para pares de genes adyacentes", "en": "Construct features for adjacent gene pairs", "da": "Konstruere features for par af nabogener"}}
  - {id: dm847.m09.o06, text: {"es": "Formular predicción de operones como clasificación probabilística", "en": "Formulate operon prediction as probabilistic classification", "da": "Formulere operonprædiktion som probabilistisk klassifikation"}}
  - {id: dm847.m09.o07, text: {"es": "Diseñar particiones por genoma y métricas apropiadas para clases desbalanceadas", "en": "Design genome-level splits and metrics for imbalanced classes", "da": "Designe genomniveau-split og metrikker til ubalancerede klasser"}}
  - {id: dm847.m09.o08, text: {"es": "Auditar errores, incertidumbre, sesgo de anotación y transferencia entre especies", "en": "Audit errors, uncertainty, annotation bias, and cross-species transfer", "da": "Revidere fejl, usikkerhed, annotationsbias og overførsel mellem arter"}}

concepts:
  - id: dm847.m09.c01
    title: {"es": "Genomas bacterianos y densidad génica", "en": "Bacterial genomes and gene density", "da": "Bakterielle genomer og gentæthed"}
    body:
      es: >-
        Muchos genomas bacterianos son compactos, con alta densidad de regiones codificantes y
        espacios intergénicos cortos, pero existen excepciones por estilo de vida, pseudogenización,
        islas genómicas y elementos móviles. Cromosomas y plasmidios pueden ser circulares o lineales.
        La compactación favorece señales de vecindad, pero no convierte toda proximidad en cotranscripción.
      en: >-
        Many bacterial genomes are compact, with high coding density and short intergenic regions,
        but lifestyle, pseudogenization, genomic islands, and mobile elements create exceptions.
        Chromosomes and plasmids may be circular or linear. Compactness makes neighborhood useful,
        but proximity alone does not imply cotranscription.
      da: >-
        Mange bakterielle genomer er kompakte med høj kodende tæthed, men livsstil, pseudogener,
        genomøer og mobile elementer giver undtagelser. Nærhed alene betyder ikke kotranskription.
    key_points:
      - {"es": "La circularidad afecta genes cercanos al origen del archivo de referencia", "en": "Circularity affects genes near the reference-file boundary", "da": "Cirkularitet påvirker gener nær referencefilens grænse"}
  - id: dm847.m09.c02
    title: {"es": "Operón, unidad de transcripción y regulón", "en": "Operon, transcription unit, and regulon", "da": "Operon, transkriptionsenhed og regulon"}
    body:
      es: >-
        Un operón es un conjunto de genes contiguos regulados desde una región promotora y
        potencialmente transcritos juntos. Una unidad de transcripción es el transcrito concreto
        producido bajo una condición y puede cubrir subconjuntos por promotores internos o
        terminación alternativa. Un regulón agrupa genes u operones distribuidos que responden al
        mismo regulador. Las definiciones no son intercambiables.
      en: >-
        An operon is a contiguous gene set controlled from a promoter region and potentially
        transcribed together. A transcription unit is the actual transcript under a condition and
        may cover subsets because of internal promoters or alternative termination. A regulon
        groups dispersed genes or operons responding to the same regulator.
      da: >-
        Et operon er et sammenhængende gensæt under fælles promotorregulering. En transkriptionsenhed
        er det konkrete transkript under en betingelse. Et regulon kan omfatte spredte gener.
    key_points:
      - {"es": "La organización puede ser dependiente de condición", "en": "Organization can be condition-dependent", "da": "Organisation kan være betingelsesafhængig"}
  - id: dm847.m09.c03
    title: {"es": "Promotores, operadores y terminadores", "en": "Promoters, operators, and terminators", "da": "Promotorer, operatorer og terminatorer"}
    body:
      es: >-
        El promotor recluta la maquinaria de transcripción; operadores y otros sitios reguladores
        modulan su actividad; los terminadores contribuyen a delimitar transcritos. Las secuencias
        consenso son distribuciones, no cadenas obligatorias. La predicción puramente por motivos
        produce falsos positivos porque secuencias parecidas aparecen por azar y la arquitectura
        regulatoria varía entre linajes y factores sigma.
      en: >-
        Promoters recruit transcription machinery; operators and other sites modulate activity;
        terminators help delimit transcripts. Consensus sequences are distributions, not mandatory
        strings. Motif-only prediction yields false positives because similar sequences occur by
        chance and regulatory architecture varies across lineages and sigma factors.
      da: >-
        Promotorer rekrutterer transkriptionsmaskineriet, regulatoriske sites modulerer aktiviteten,
        og terminatorer afgrænser transkripter. Konsensussekvenser er fordelinger, ikke obligatoriske strenge.
    key_points:
      - {"es": "Motivo compatible no demuestra actividad en una condición", "en": "A compatible motif does not prove activity in a condition", "da": "Et kompatibelt motiv beviser ikke aktivitet i en betingelse"}
  - id: dm847.m09.c04
    title: {"es": "Orientación y distancia intergénica", "en": "Orientation and intergenic distance", "da": "Orientering og intergenisk afstand"}
    body:
      es: >-
        Genes adyacentes en la misma hebra y con corta distancia intergénica tienen mayor
        probabilidad de pertenecer al mismo operón, pero el solapamiento y la distancia deben
        calcularse con coordenadas y convenciones claras. Pares convergentes o divergentes suelen
        separar unidades, aunque pueden compartir regiones regulatorias. En genomas circulares debe
        tratarse la vecindad entre último y primer gen.
      en: >-
        Adjacent same-strand genes with short intergenic distance are more likely to share an
        operon, but overlap and distance require explicit coordinate conventions. Convergent or
        divergent pairs often separate units, though regulatory regions may be shared. Circular
        genomes require last-to-first adjacency handling.
      da: >-
        Nabogener på samme streng med kort intergenisk afstand er oftere i samme operon, men
        afstand og overlap kræver eksplicitte koordinatkonventioner. Cirkulære genomer kræver wrap-around.
    key_points:
      - {"es": "La distancia es predictiva, no determinista", "en": "Distance is predictive, not deterministic", "da": "Afstand er prædiktiv, ikke deterministisk"}
  - id: dm847.m09.c05
    title: {"es": "Conservación de vecindad y función", "en": "Neighborhood conservation and function", "da": "Bevarelse af naboskab og funktion"}
    body:
      es: >-
        La conservación de pares de genes y orden local entre genomas puede apoyar cotranscripción
        o relación funcional. Debe distinguirse ortología de similitud genérica y evitar contar
        múltiples cepas casi idénticas como evidencia independiente. La fusión de genes, perfiles
        filogenéticos y anotaciones funcionales aportan características complementarias, pero ninguna
        demuestra por sí sola un operón.
      en: >-
        Conserved gene pairs and local order across genomes can support cotranscription or functional
        relation. Orthology must be distinguished from generic similarity, and nearly identical
        strains should not be counted as independent evidence. Gene fusion, phylogenetic profiles,
        and functional annotations are complementary, not individually decisive.
      da: >-
        Bevaret genorden kan støtte kotranskription eller funktionel relation. Ortologi skal
        skelnes fra generel lighed, og nært beslægtede stammer er ikke uafhængige beviser.
    key_points:
      - {"es": "La estructura filogenética induce dependencia entre ejemplos", "en": "Phylogenetic structure induces dependence among examples", "da": "Fylogenetisk struktur giver afhængighed mellem eksempler"}
  - id: dm847.m09.c06
    title: {"es": "Plasmidios, fagos y transferencia horizontal", "en": "Plasmids, phages, and horizontal transfer", "da": "Plasmider, fager og horisontal overførsel"}
    body:
      es: >-
        Plasmidios, profagos, transposones e islas genómicas movilizan genes y alteran composición,
        cobertura y vecindad. Señales como desviación de GC, integrasas o repeticiones terminales
        son indicios, no pruebas concluyentes. Un gen transferido puede integrarse en redes regulatorias
        nuevas; movilidad, virulencia y resistencia son propiedades distintas que requieren evidencia específica.
      en: >-
        Plasmids, prophages, transposons, and genomic islands move genes and alter composition,
        coverage, and neighborhood. GC deviation, integrases, or terminal repeats are clues rather
        than conclusive proof. A transferred gene may integrate into new regulatory networks;
        mobility, virulence, and resistance are distinct properties requiring separate evidence.
      da: >-
        Plasmider, profager, transposoner og genomøer flytter gener og ændrer sammensætning og
        naboskab. GC-afvigelse og integraser er indikatorer, ikke endelige beviser.
    key_points:
      - {"es": "Elemento móvil no equivale automáticamente a patógeno", "en": "Mobile element does not automatically mean pathogenic", "da": "Mobilt element betyder ikke automatisk patogent"}
  - id: dm847.m09.c07
    title: {"es": "Formulación de predicción de operones", "en": "Operon-prediction formulation", "da": "Formulering af operonprædiktion"}
    body:
      es: >-
        Una formulación común clasifica pares de genes adyacentes como misma o distinta unidad.
        Características posibles incluyen hebra, distancia, solapamiento, conservación de vecindad,
        correlación de expresión y compatibilidad funcional. Las etiquetas pueden provenir de bases
        curadas o transcriptómica, pero contienen incertidumbre y dependencia de condición. La salida
        probabilística permite umbrales distintos según el coste de errores.
      en: >-
        A common formulation classifies adjacent gene pairs as same versus different unit. Features
        include strand, distance, overlap, neighborhood conservation, expression correlation, and
        functional compatibility. Labels may come from curated resources or transcriptomics but carry
        uncertainty and condition dependence. Probabilistic output supports task-specific thresholds.
      da: >-
        En almindelig formulering klassificerer nabogenpar som samme eller forskellig enhed.
        Features omfatter streng, afstand, overlap, bevaret naboskab og ekspressionskorrelation.
    key_points:
      - {"es": "Predecir fronteras y reconstruir operones completos son tareas relacionadas pero distintas", "en": "Boundary prediction and full-operon reconstruction are related but distinct", "da": "Grænseprædiktion og rekonstruktion af hele operoner er forskellige opgaver"}
  - id: dm847.m09.c08
    title: {"es": "Evaluación y transferencia", "en": "Evaluation and transfer", "da": "Evaluering og overførsel"}
    body:
      es: >-
        Dividir pares aleatoriamente filtra genes y vecindades casi idénticas entre entrenamiento y
        prueba. Es preferible separar por genoma, especie o clado según la pregunta. Con desbalance,
        accuracy puede ser engañosa; se reportan precisión, recall, PR-AUC, calibración y rendimiento
        por subgrupos. La validación externa debe examinar especies con distinta arquitectura y
        anotaciones, y los errores deben revisarse por mecanismo.
      en: >-
        Random pair splitting leaks nearly identical genes and neighborhoods across train and test.
        Split by genome, species, or clade according to the target. Under imbalance, accuracy is
        misleading; report precision, recall, PR-AUC, calibration, and subgroup performance. External
        validation should cover distinct architectures and annotations, with mechanism-based error review.
      da: >-
        Tilfældig opdeling af genpar giver lækage mellem træning og test. Split efter genom, art eller
        klade. Ved ubalance rapporteres precision, recall, PR-AUC og kalibrering.
    key_points:
      - {"es": "El nivel de partición debe corresponder al uso futuro", "en": "Split level must match future use", "da": "Splitniveau skal svare til fremtidig brug"}

worked_examples:
  - id: dm847.m09.e01
    title: {"es": "Cálculo de características de un par adyacente", "en": "Feature calculation for an adjacent pair", "da": "Featureberegning for et nabogenpar"}
    scenario: {"es": "Dos genes en la hebra positiva terminan en 1200 y comienzan en 1215.", "en": "Two plus-strand genes end at 1200 and start at 1215.", "da": "To plus-streng-gener slutter ved 1200 og starter ved 1215."}
    solution_outline:
      es: >-
        Definir coordenadas inclusivas o semiabiertas antes de calcular. Con coordenadas inclusivas,
        las bases intergénicas son 1215-1200-1=14. Registrar misma hebra, distancia 14, ausencia de
        solapamiento y cualquier evidencia adicional. No etiquetar operón sólo por la distancia.
      en: >-
        Define inclusive or half-open coordinates first. Under inclusive coordinates, intergenic
        bases equal 1215-1200-1=14. Record same strand, distance 14, no overlap, and other evidence.
        Do not assign an operon label from distance alone.
      da: >-
        Definér koordinatkonventionen. Med inklusive koordinater er afstanden 14 baser. Afstand alene er ikke et label.
    validation: [coordinate_convention_explicit, manual_distance_check, no_deterministic_claim]
  - id: dm847.m09.e02
    title: {"es": "Fuga en una partición aleatoria", "en": "Leakage in a random split", "da": "Lækage i et tilfældigt split"}
    scenario: {"es": "Pares de genes de veinte cepas casi idénticas se distribuyen aleatoriamente.", "en": "Gene pairs from twenty nearly identical strains are randomly distributed.", "da": "Genpar fra tyve næsten identiske stammer fordeles tilfældigt."}
    solution_outline:
      es: >-
        Mostrar que ortólogos y vecindades equivalentes aparecen en ambos conjuntos. Repetir la
        evaluación dejando fuera especies o clados completos. Comparar la caída de rendimiento y
        reportarla como estimación más realista de transferencia.
      en: >-
        Show that orthologs and equivalent neighborhoods appear in both sets. Re-evaluate by holding
        out species or clades. Compare the performance drop as a more realistic transfer estimate.
      da: >-
        Vis at ortologe naboskaber findes i begge sæt. Evaluer igen med hele arter eller klader holdt ude.
    validation: [group_split, no_shared_genome, relatedness_reported]
  - id: dm847.m09.e03
    title: {"es": "Umbral según coste de errores", "en": "Threshold by error cost", "da": "Tærskel efter fejlomkostning"}
    scenario: {"es": "Una aplicación prioriza no fusionar unidades distintas.", "en": "An application prioritizes avoiding fusion of distinct units.", "da": "En anvendelse prioriterer at undgå sammenlægning af forskellige enheder."}
    solution_outline:
      es: >-
        Definir que falsos positivos tienen mayor coste, elegir umbral usando precisión o valor
        predictivo positivo bajo validación independiente y reportar recall resultante. Revisar
        calibración antes de interpretar probabilidades como riesgos absolutos.
      en: >-
        Define false positives as more costly, select a threshold targeting precision on held-out
        validation, and report resulting recall. Check calibration before treating scores as probabilities.
      da: >-
        Definér falske positiver som dyrere, vælg tærskel efter precision og rapportér recall og kalibrering.
    validation: [cost_defined, threshold_not_test_tuned, precision_recall_reported]

practice_exercises:
  - {id: dm847.m09.p01, activity_type: concept_mapping, difficulty: foundational, prompt: {"es": "Relaciona gen, operón, unidad de transcripción y regulón con un ejemplo.", "en": "Relate gene, operon, transcription unit, and regulon in one example.", "da": "Relatér gen, operon, transkriptionsenhed og regulon i et eksempel."}, expected_elements: [distinct_definitions, condition_dependence, distributed_regulon]}
  - {id: dm847.m09.p02, activity_type: data_interpretation, difficulty: intermediate, prompt: {"es": "Interpreta seis pares de genes con orientación y distancia distintas.", "en": "Interpret six gene pairs with different orientation and distance.", "da": "Fortolk seks genpar med forskellig orientering og afstand."}, expected_elements: [same_strand_signal, convergent_divergent, overlap, uncertainty]}
  - {id: dm847.m09.p03, activity_type: feature_engineering, difficulty: intermediate, prompt: {"es": "Diseña una tabla de características para predicción de fronteras.", "en": "Design a feature table for boundary prediction.", "da": "Design en feature-tabel til grænseprædiktion."}, expected_elements: [pair_identifier, genome_group, strand, distance, conservation, expression, label_provenance]}
  - {id: dm847.m09.p04, activity_type: model_audit, difficulty: advanced, prompt: {"es": "Detecta fuga y sesgo en un conjunto de 200 cepas de una sola especie.", "en": "Detect leakage and bias in a 200-strain single-species dataset.", "da": "Find lækage og bias i et datasæt med 200 stammer af én art."}, expected_elements: [phylogenetic_dependence, group_split, limited_external_validity]}
  - {id: dm847.m09.p05, activity_type: metric_selection, difficulty: advanced, prompt: {"es": "Elige métricas con 10% de fronteras positivas.", "en": "Choose metrics with 10% positive boundaries.", "da": "Vælg metrikker med 10% positive grænser."}, expected_elements: [precision_recall, pr_auc, calibration, confusion_matrix_at_threshold]}
  - {id: dm847.m09.p06, activity_type: oral_explanation, difficulty: advanced, prompt: {"es": "Explica por qué proximidad no demuestra cotranscripción.", "en": "Explain why proximity does not prove cotranscription.", "da": "Forklar hvorfor nærhed ikke beviser kotranskription."}, expected_elements: [promoters_terminators, condition_dependence, internal_regulation, empirical_evidence]}

objective_bank:
  - {id: dm847.m09.q01, type: multiple_choice, prompt: {"es": "¿Qué distingue un regulón de un operón?", "en": "What distinguishes a regulon from an operon?", "da": "Hvad adskiller et regulon fra et operon?"}, options: [{id: a, es: Puede incluir genes dispersos controlados por un regulador, en: It may include dispersed genes controlled by one regulator, da: Det kan omfatte spredte gener under samme regulator}, {id: b, es: Siempre es un único gen, en: It is always one gene, da: Det er altid ét gen}, {id: c, es: No tiene regulación, en: It has no regulation, da: Det har ingen regulering}, {id: d, es: Sólo existe en eucariotas, en: It exists only in eukaryotes, da: Det findes kun i eukaryoter}], correct_option_ids: [a]}
  - {id: dm847.m09.q02, type: true_false, prompt: {"es": "Un operón siempre produce exactamente la misma unidad de transcripción en todas las condiciones.", "en": "An operon always produces exactly the same transcription unit in all conditions.", "da": "Et operon producerer altid præcis samme transkriptionsenhed under alle betingelser."}, correct: false}
  - {id: dm847.m09.q03, type: multiple_choice, prompt: {"es": "¿Qué par es más compatible con un operón, manteniendo incertidumbre?", "en": "Which pair is more compatible with an operon while retaining uncertainty?", "da": "Hvilket par er mest kompatibelt med et operon?"}, options: [{id: a, es: Genes adyacentes, misma hebra y distancia corta, en: Adjacent same-strand genes with short distance, da: Nabogener på samme streng med kort afstand}, {id: b, es: Genes en cromosomas distintos, en: Genes on different chromosomes, da: Gener på forskellige kromosomer}, {id: c, es: Genes divergentes muy separados, en: Distant divergent genes, da: Fjerne divergente gener}, {id: d, es: Cualquier par con GC similar, en: Any pair with similar GC, da: Ethvert par med lignende GC}], correct_option_ids: [a]}
  - {id: dm847.m09.q04, type: true_false, prompt: {"es": "Una desviación de GC demuestra transferencia horizontal.", "en": "GC deviation proves horizontal transfer.", "da": "GC-afvigelse beviser horisontal overførsel."}, correct: false}
  - {id: dm847.m09.q05, type: multiple_choice, prompt: {"es": "¿Cuál es una característica válida para pares adyacentes?", "en": "Which is a valid adjacent-pair feature?", "da": "Hvilken er en gyldig feature for nabogenpar?"}, options: [{id: a, es: Distancia intergénica, en: Intergenic distance, da: Intergenisk afstand}, {id: b, es: Número de pacientes, en: Number of patients, da: Antal patienter}, {id: c, es: Color del gráfico, en: Plot color, da: Figurfarve}, {id: d, es: Orden alfabético del nombre, en: Alphabetical gene-name order, da: Alfabetisk gennavn}], correct_option_ids: [a]}
  - {id: dm847.m09.q06, type: true_false, prompt: {"es": "Una partición aleatoria de pares puede filtrar vecindades homólogas entre train y test.", "en": "Random pair splitting may leak homologous neighborhoods across train and test.", "da": "Tilfældig opdeling kan lække homologe naboskaber mellem træning og test."}, correct: true}
  - {id: dm847.m09.q07, type: multiple_choice, prompt: {"es": "¿Qué partición estima mejor transferencia a especies nuevas?", "en": "Which split better estimates transfer to new species?", "da": "Hvilket split estimerer bedst overførsel til nye arter?"}, options: [{id: a, es: Dejar especies completas fuera, en: Hold out complete species, da: Hold hele arter ude}, {id: b, es: Dividir filas al azar, en: Random row split, da: Tilfældigt række-split}, {id: c, es: Usar todo para entrenar, en: Train on everything, da: Træn på alt}, {id: d, es: Duplicar positivos, en: Duplicate positives, da: Duplikér positive}], correct_option_ids: [a]}
  - {id: dm847.m09.q08, type: true_false, prompt: {"es": "Accuracy puede ser alta aunque una clase minoritaria se detecte mal.", "en": "Accuracy may be high while the minority class is poorly detected.", "da": "Accuracy kan være høj selv om minoritetsklassen opdages dårligt."}, correct: true}
  - {id: dm847.m09.q09, type: multiple_choice, prompt: {"es": "¿Qué aporta calibración?", "en": "What does calibration assess?", "da": "Hvad vurderer kalibrering?"}, options: [{id: a, es: Correspondencia entre probabilidades predichas y frecuencias observadas, en: Agreement between predicted probabilities and observed frequencies, da: Overensstemmelse mellem prædikterede sandsynligheder og observerede frekvenser}, {id: b, es: Sólo ranking, en: Ranking only, da: Kun rangering}, {id: c, es: Longitud del genoma, en: Genome length, da: Genomlængde}, {id: d, es: Sintaxis del código, en: Code syntax, da: Kodesyntaks}], correct_option_ids: [a]}
  - {id: dm847.m09.q10, type: true_false, prompt: {"es": "La predicción de pares y la reconstrucción de operones completos son exactamente la misma tarea.", "en": "Pair prediction and full-operon reconstruction are exactly the same task.", "da": "Parprædiktion og rekonstruktion af hele operoner er præcis samme opgave."}, correct: false}

open_assessment:
  - id: dm847.m09.a01
    prompt: {"es": "Diseña un modelo de predicción de operones transferible entre especies.", "en": "Design an operon-prediction model transferable across species.", "da": "Design en operonmodel der kan overføres mellem arter."}
