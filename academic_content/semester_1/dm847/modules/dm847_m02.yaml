metadata:
  title:
    es: "Identificadores biomédicos, ontologías, procedencia y dependencias FAIR"
    en: "Biomedical identifiers, ontologies, provenance, and FAIR data dependencies"
    da: "Biomedicinske identifikatorer, ontologier, proveniens og FAIR-dataafhængigheder"
  summary:
    es: >-
      Modelado semántico de datos biomédicos mediante identificadores persistentes, accesiones y versiones,
      vocabularios controlados, ontologías, relaciones tipadas, axiomas, procedencia, códigos de evidencia,
      mapeos entre recursos y principios FAIR. El módulo enseña a distinguir entidades biológicas de etiquetas
      y registros, y a representar dependencias sin perder versión, contexto ni incertidumbre.
    en: >-
      Semantic modeling of biomedical data using persistent identifiers, accessions and versions,
      controlled vocabularies, ontologies, typed relations, axioms, provenance, evidence codes,
      cross-resource mappings, and FAIR principles. The module distinguishes biological entities from labels
      and records and represents dependencies without losing version, context, or uncertainty.
    da: >-
      Semantisk modellering af biomedicinske data med persistente identifikatorer, accessioner og versioner,
      kontrollerede vokabularer, ontologier, typede relationer, aksiomer, proveniens, evidenskoder,
      mapping mellem ressourcer og FAIR-principper. Modulet adskiller biologiske enheder fra etiketter og poster.
  prerequisites: [dm847.m01, dm857.m07, dm857.m08]
  official_learning_outcomes: [dm847.lo02]
  estimated_study_hours: 18
  difficulty: intermediate

