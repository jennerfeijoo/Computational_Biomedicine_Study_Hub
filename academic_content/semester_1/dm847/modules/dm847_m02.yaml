limitations:
  - Specific identifier schemes and ontologies evolve and must be checked against their documented versions during implementation.
  - Formal logic is introduced conceptually; description-logic syntax and reasoner internals are deferred.
  - Clinical data governance is jurisdiction- and institution-dependent and is not replaced by FAIR assessment.
