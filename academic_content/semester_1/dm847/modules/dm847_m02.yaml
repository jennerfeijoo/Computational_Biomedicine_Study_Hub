  source_file: ../flashcards/dm847_m02_flashcards.yaml
  expected_count: 24

glossary:
  - id: term.namespace
    term: {"es": "espacio de nombres", "en": "namespace", "da": "namespace"}
    definition: {"es": "Contexto que define autoridad, reglas y unicidad de identificadores.", "en": "Context defining identifier authority, rules, and uniqueness.", "da": "Kontekst der definerer identifikatorautoritet, regler og entydighed."}
    related_terms: [term.identifier]
  - id: term.accession
    term: {"es": "accesión", "en": "accession", "da": "accession"}
    definition: {"es": "Identificador asignado por un recurso a un registro, a menudo estable entre revisiones.", "en": "Identifier assigned by a resource to a record, often stable across revisions.", "da": "Identifikator tildelt en post, ofte stabil mellem revisioner."}
    related_terms: [term.version]
  - id: term.version
    term: {"es": "versión", "en": "version", "da": "version"}
    definition: {"es": "Marca que distingue revisiones de contenido o esquema.", "en": "Marker distinguishing content or schema revisions.", "da": "Markør der skelner revisioner af indhold eller skema."}
    related_terms: [term.accession]
  - id: term.controlled_vocabulary
    term: {"es": "vocabulario controlado", "en": "controlled vocabulary", "da": "kontrolleret vokabular"}
    definition: {"es": "Conjunto regulado de términos permitidos y sus definiciones.", "en": "Governed set of allowed terms and definitions.", "da": "Styret sæt af tilladte termer og definitioner."}
    related_terms: [term.ontology]
  - id: term.ontology
    term: {"es": "ontología", "en": "ontology", "da": "ontologi"}
    definition: {"es": "Modelo explícito de clases, relaciones y restricciones de un dominio.", "en": "Explicit model of domain classes, relations, and constraints.", "da": "Eksplicit model af domænets klasser, relationer og restriktioner."}
    related_terms: [term.axiom]
  - id: term.axiom
    term: {"es": "axioma", "en": "axiom", "da": "aksiom"}
    definition: {"es": "Afirmación formal usada para restringir o inferir conocimiento en un modelo.", "en": "Formal statement used to constrain or infer knowledge in a model.", "da": "Formel påstand brugt til at begrænse eller inferere viden i en model."}
    related_terms: [term.ontology]
  - id: term.is_a
    term: {"es": "relación es-un", "en": "is-a relation", "da": "is-a-relation"}
    definition: {"es": "Relación de subclasificación entre un tipo específico y otro más general.", "en": "Subclassification relation between a specific and broader type.", "da": "Subklassifikationsrelation mellem en specifik og bredere type."}
    related_terms: [term.part_of]
  - id: term.part_of
    term: {"es": "relación parte-de", "en": "part-of relation", "da": "part-of-relation"}
    definition: {"es": "Relación mereológica entre componente y totalidad.", "en": "Mereological relation between component and whole.", "da": "Mereologisk relation mellem del og helhed."}
    related_terms: [term.is_a]
  - id: term.provenance
    term: {"es": "procedencia", "en": "provenance", "da": "proveniens"}
    definition: {"es": "Registro del origen y proceso de producción de una entidad o afirmación.", "en": "Record of the origin and production process of an entity or claim.", "da": "Registrering af oprindelse og produktionsproces for en enhed eller påstand."}
    related_terms: [term.lineage]
  - id: term.evidence_code
    term: {"es": "código de evidencia", "en": "evidence code", "da": "evidenskode"}
    definition: {"es": "Categoría estructurada que describe cómo se respalda una afirmación.", "en": "Structured category describing how a claim is supported.", "da": "Struktureret kategori der beskriver hvordan en påstand understøttes."}
    related_terms: [term.provenance]
  - id: term.semantic_drift
    term: {"es": "deriva semántica", "en": "semantic drift", "da": "semantisk drift"}
    definition: {"es": "Cambio de significado o alcance de un término o mapeo a través del tiempo.", "en": "Change in meaning or scope of a term or mapping over time.", "da": "Ændring i betydning eller omfang af en term eller mapping over tid."}
    related_terms: [term.version]
  - id: term.fair
    term: {"es": "FAIR", "en": "FAIR", "da": "FAIR"}
    definition: {"es": "Principios para que datos sean encontrables, accesibles, interoperables y reutilizables.", "en": "Principles making data findable, accessible, interoperable, and reusable.", "da": "Principper der gør data findbare, tilgængelige, interoperable og genbrugelige."}
    related_terms: [term.provenance, term.namespace]

hidden_guided_support:
  visibility: hidden_from_standard_reader
  canonical_explanation:
    es: >-
      La integración biomédica falla cuando una etiqueta se trata como una entidad estable o cuando una conexión
      se interpreta como equivalencia. Antes de unir datos, se identifica la capa: entidad real, registro, accesión,
      versión, símbolo o término. Luego se declaran espacio de nombres, organismo, ensamblaje, tiempo y procedencia.
      Una ontología aporta relaciones tipadas y restricciones; no convierte automáticamente asociaciones en causas.
      FAIR describe propiedades del ecosistema de datos, incluida la posibilidad de acceso gobernado, no una obligación
      de publicar datos sensibles sin control.
    en: >-
      Biomedical integration fails when a label is treated as a stable entity or a connection is interpreted as equivalence.
      Before joining data, identify the layer: real entity, record, accession, version, symbol, or term. Then declare namespace,
      organism, assembly, time, and provenance. An ontology provides typed relations and constraints; it does not turn
      associations into causes. FAIR describes data-ecosystem properties, including governed access, not an obligation to
      release sensitive data without control.
    da: >-
      Biomedicinsk integration fejler når en label behandles som en stabil enhed eller en forbindelse som ækvivalens.
      Identificér først laget: enhed, post, accession, version, symbol eller term. Angiv derefter namespace, organisme,
      assembly, tid og proveniens. Ontologier giver typede relationer; FAIR kan omfatte reguleret adgang.
  misconceptions:
    - id: m02.mc01
      claim: {"es": "Un símbolo génico es un identificador universal permanente.", "en": "A gene symbol is a permanent universal identifier.", "da": "Et gensymbol er en permanent universel identifikator."}
      correction: {"es": "Puede cambiar, ser ambiguo o depender de organismo; debe resolverse a un namespace estable.", "en": "It may change, be ambiguous, or organism-dependent and should resolve to a stable namespace.", "da": "Det kan ændres eller være tvetydigt og bør resolves til et stabilt namespace."}
    - id: m02.mc02
      claim: {"es": "Una accesión estable nunca cambia de contenido.", "en": "A stable accession never changes content.", "da": "En stabil accession ændrer aldrig indhold."}
      correction: {"es": "La versión distingue revisiones mientras la accesión base puede persistir.", "en": "Version distinguishes revisions while the base accession may persist.", "da": "Version skelner revisioner mens accession kan bestå."}
    - id: m02.mc03
      claim: {"es": "Toda jerarquía es una ontología formal.", "en": "Every hierarchy is a formal ontology.", "da": "Ethvert hierarki er en formel ontologi."}
      correction: {"es": "Una ontología formal declara semántica, relaciones y axiomas además de orden jerárquico.", "en": "A formal ontology declares semantics, relations, and axioms beyond hierarchy.", "da": "En formel ontologi deklarerer semantik, relationer og aksiomer ud over hierarki."}
    - id: m02.mc04
      claim: {"es": "Parte-de y es-un son equivalentes.", "en": "Part-of and is-a are equivalent.", "da": "Part-of og is-a er ækvivalente."}
      correction: {"es": "Una expresa composición y la otra clasificación.", "en": "One expresses composition and the other classification.", "da": "Den ene udtrykker komposition, den anden klassifikation."}
    - id: m02.mc05
      claim: {"es": "Cross-reference significa identidad exacta.", "en": "Cross-reference means exact identity.", "da": "Cross-reference betyder eksakt identitet."}
      correction: {"es": "Sólo indica una conexión cuyo tipo y evidencia deben revisarse.", "en": "It indicates a connection whose type and evidence require review.", "da": "Det angiver en forbindelse hvis type og evidens skal vurderes."}
    - id: m02.mc06
      claim: {"es": "Procedencia es sólo citar una publicación.", "en": "Provenance is only citing a publication.", "da": "Proveniens er kun at citere en publikation."}
      correction: {"es": "Incluye entradas, actividades, agentes, software, versiones, parámetros, tiempo y salidas.", "en": "It includes inputs, activities, agents, software, versions, parameters, time, and outputs.", "da": "Det omfatter input, aktiviteter, agenter, software, versioner, parametre, tid og output."}
    - id: m02.mc07
      claim: {"es": "FAIR significa datos completamente abiertos.", "en": "FAIR means completely open data.", "da": "FAIR betyder helt åbne data."}
      correction: {"es": "Datos restringidos pueden ser FAIR con metadatos y acceso gobernado bien definidos.", "en": "Restricted data may be FAIR with metadata and well-defined governed access.", "da": "Begrænsede data kan være FAIR med metadata og veldefineret reguleret adgang."}
  socratic_questions:
    - ¿Qué entidad real pretende identificar esta cadena?
    - Which namespace and version define this identifier?
    - Er relationen klassifikation, del-helhed, proveniens eller association?
    - ¿La correspondencia es exacta o sólo relacionada?
    - What would become invalid if the ontology version changed?
    - Hvilke input, parametre og software producerede denne tabel?
    - ¿Qué metadatos permanecen encontrables si los datos están restringidos?
    - Does this model encode an observation, an inference, or universal domain knowledge?
  grading_criteria:
    - separates biological entities from database records and labels
    - uses namespaced versioned identifiers when required
    - selects semantically correct relation types and direction
    - distinguishes source, provenance, and evidence
    - records uncertainty and mapping granularity
    - evaluates all FAIR dimensions independently
  response_constraints:
    - never resolve ambiguous symbols without organism and namespace
    - never assume cross-references are exact equivalence
    - never convert association into causal relation without causal evidence
    - preserve deprecation history and versions
    - do not reveal objective-answer keys during active assessment
  retrieval_fragments:
    - id: dm847.m02.h01
      topic: identifier_layers
      text: {"es": "Entidad, registro, accesión, versión, símbolo y etiqueta son capas distintas.", "en": "Entity, record, accession, version, symbol, and label are distinct layers.", "da": "Enhed, post, accession, version, symbol og label er forskellige lag."}
    - id: dm847.m02.h02
      topic: namespace
      text: {"es": "Un identificador sin namespace puede ser ambiguo.", "en": "An identifier without a namespace may be ambiguous.", "da": "En identifikator uden namespace kan være tvetydig."}
    - id: dm847.m02.h03
      topic: genomic_coordinates
      text: {"es": "Coordenadas requieren ensamblaje, contig, convención y orientación.", "en": "Coordinates require assembly, contig, convention, and orientation.", "da": "Koordinater kræver assembly, contig, konvention og orientering."}
    - id: dm847.m02.h04
      topic: ontology
      text: {"es": "Una ontología declara clases, relaciones y restricciones para representar significado.", "en": "An ontology declares classes, relations, and constraints to represent meaning.", "da": "En ontologi deklarerer klasser, relationer og restriktioner for at repræsentere betydning."}
    - id: dm847.m02.h05
      topic: relation_typing
      text: {"es": "Es-un clasifica; parte-de compone; derivado-de registra linaje.", "en": "Is-a classifies; part-of composes; derived-from records lineage.", "da": "Is-a klassificerer; part-of sammensætter; derived-from registrerer lineage."}
    - id: dm847.m02.h06
      topic: provenance
      text: {"es": "Procedencia enlaza salida, actividad, entradas, parámetros, agente y tiempo.", "en": "Provenance links output, activity, inputs, parameters, agent, and time.", "da": "Proveniens forbinder output, aktivitet, input, parametre, agent og tid."}
    - id: dm847.m02.h07
      topic: mapping
      text: {"es": "Un mapeo debe tipar equivalencia y conservar evidencia y versión.", "en": "A mapping should type equivalence and preserve evidence and version.", "da": "En mapping bør type ækvivalens og bevare evidens og version."}
    - id: dm847.m02.h08
      topic: semantic_drift
      text: {"es": "Términos fusionados, divididos o deprecados pueden invalidar mapeos antiguos.", "en": "Merged, split, or deprecated terms can invalidate old mappings.", "da": "Fusionerede, splittede eller deprecierede termer kan invalidere gamle mappings."}
    - id: dm847.m02.h09
      topic: fair_access
      text: {"es": "Accesible puede significar acceso autenticado y gobernado, no necesariamente abierto.", "en": "Accessible may mean authenticated governed access, not necessarily open.", "da": "Tilgængelig kan betyde autentificeret reguleret adgang, ikke nødvendigvis åben."}
    - id: dm847.m02.h10
      topic: reuse
      text: {"es": "Reutilización requiere licencia, contexto, calidad, procedencia y restricciones claras.", "en": "Reuse requires license, context, quality, provenance, and clear constraints.", "da": "Genbrug kræver licens, kontekst, kvalitet, proveniens og klare restriktioner."}

