concepts:
  - id: dm847.m02.c01
    title:
      es: "Entidades, registros e identificadores"
      en: "Entities, records, and identifiers"
      da: "Enheder, poster og identifikatorer"
    body:
      es: >-
        Una entidad biológica es aquello sobre lo que se afirma algo: una variante, muestra, gen, proteína,
        enfermedad o proceso. Un registro es la representación de esa entidad en un recurso concreto. Un identificador
        nombra un registro o entidad dentro de un espacio de nombres; una accesión suele ser estable, mientras una versión
        distingue revisiones del contenido. Un símbolo humano legible puede cambiar, reutilizarse o ser ambiguo.
        Integrar datos exige registrar namespace, versión del recurso, fecha de acceso y reglas de resolución.
      en: >-
        A biological entity is what a statement concerns: a variant, sample, gene, protein, disease, or process.
        A record is that entity's representation in a specific resource. An identifier names a record or entity within
        a namespace; an accession is often stable, while a version distinguishes content revisions. A human-readable
        symbol may change, be reused, or be ambiguous. Integration requires namespace, resource version, access date,
        and resolution rules.
      da: >-
        En biologisk enhed er det som en påstand handler om: variant, prøve, gen, protein, sygdom eller proces.
        En post er en repræsentation i en bestemt ressource. En identifikator navngiver en post eller enhed i et namespace;
        accession er ofte stabil, mens version skelner revisioner. Symboler kan ændres eller være tvetydige.
    key_points:
      - {"es": "Entidad y registro no son lo mismo.", "en": "Entity and record are not the same.", "da": "Enhed og post er ikke det samme."}
      - {"es": "Un identificador sólo es interpretable con su espacio de nombres.", "en": "An identifier is interpretable only with its namespace.", "da": "En identifikator kan kun fortolkes med sit namespace."}
      - {"es": "Accesión estable no significa contenido inmutable.", "en": "Stable accession does not mean immutable content.", "da": "Stabil accession betyder ikke uforanderligt indhold."}
    linked_objectives: [m02.o1, m02.o2]

  - id: dm847.m02.c02
    title:
      es: "Versiones, ensamblajes y coordenadas"
      en: "Versions, assemblies, and coordinates"
      da: "Versioner, assemblies og koordinater"
    body:
      es: >-
        Una coordenada genómica sólo tiene significado dentro de un ensamblaje, cromosoma o contig, sistema de
        coordenadas y orientación. Cambiar ensamblaje puede desplazar, dividir o eliminar una región. De forma similar,
        una secuencia de referencia, transcrito o proteína puede cambiar entre versiones mientras conserva una accesión base.
        Para reproducibilidad se deben conservar identificador con versión, ensamblaje, rango, convención de extremos,
        hebra y método de conversión cuando se realiza lift-over.
      en: >-
        A genomic coordinate has meaning only within an assembly, chromosome or contig, coordinate convention,
        and orientation. Changing assembly can shift, split, or remove a region. Reference sequences, transcripts,
        and proteins may change between versions while retaining a base accession. Reproducibility requires versioned
        identifier, assembly, interval convention, strand, and lift-over method when conversion occurs.
      da: >-
        En genomisk koordinat har kun betydning inden for et assembly, kromosom eller contig, koordinatkonvention
        og orientering. Assemblyskift kan flytte, splitte eller fjerne en region. Reproducerbarhed kræver versions-ID,
        assembly, intervalkonvention, streng og lift-over-metode.
    key_points:
      - {"es": "chr1:1000 no es un identificador completo.", "en": "chr1:1000 is not a complete identifier.", "da": "chr1:1000 er ikke en komplet identifikator."}
      - {"es": "Los intervalos 0-based y 1-based no son intercambiables.", "en": "Zero-based and one-based intervals are not interchangeable.", "da": "Nulbaserede og étbaserede intervaller er ikke udskiftelige."}
      - {"es": "Lift-over puede fallar o producir correspondencias parciales.", "en": "Lift-over may fail or produce partial mappings.", "da": "Lift-over kan fejle eller give delvise mappings."}
    linked_objectives: [m02.o1, m02.o2, m02.o7]

  - id: dm847.m02.c03
    title:
      es: "Vocabularios, taxonomías, tesauros y ontologías"
      en: "Vocabularies, taxonomies, thesauri, and ontologies"
      da: "Vokabularer, taksonomier, tesauri og ontologier"
    body:
      es: >-
        Un vocabulario controlado restringe términos permitidos. Una taxonomía organiza categorías principalmente
        mediante jerarquías. Un tesauro añade sinónimos y relaciones asociativas. Una ontología formal especifica
        clases, relaciones, restricciones y, a veces, axiomas que permiten inferencia. No toda lista con sangrías es
        una ontología, y mayor formalidad no siempre es mejor: la elección depende de consulta, validación e intercambio.
      en: >-
        A controlled vocabulary restricts permitted terms. A taxonomy organizes categories mainly through hierarchy.
        A thesaurus adds synonyms and associative relations. A formal ontology specifies classes, relations,
        constraints, and sometimes axioms enabling inference. Not every indented list is an ontology, and greater
        formality is not always better; selection depends on querying, validation, and exchange needs.
      da: >-
        Et kontrolleret vokabular begrænser tilladte termer. En taksonomi organiserer kategorier hierarkisk.
        En tesaurus tilføjer synonymer og associationer. En formel ontologi specificerer klasser, relationer,
        restriktioner og eventuelt aksiomer til inferens.
    key_points:
      - {"es": "Sinónimo no implica identidad conceptual perfecta.", "en": "Synonymy does not imply perfect conceptual identity.", "da": "Synonymi betyder ikke perfekt konceptuel identitet."}
      - {"es": "Una ontología modela significado además de etiquetas.", "en": "An ontology models meaning beyond labels.", "da": "En ontologi modellerer betydning ud over labels."}
      - {"es": "La expresividad debe corresponder al uso.", "en": "Expressivity should match intended use.", "da": "Ekspressivitet bør matche brugen."}
    linked_objectives: [m02.o3, m02.o4]

  - id: dm847.m02.c04
    title:
      es: "Clases, instancias y axiomas"
      en: "Classes, instances, and axioms"
      da: "Klasser, instanser og aksiomer"
    body:
      es: >-
        Una clase representa un tipo general, como célula T; una instancia representa una entidad concreta,
        como una célula individual observada. «Es-un» conecta una subclase con una clase más general. Las restricciones
        pueden declarar dominio, rango, cardinalidad o disyunción. Los axiomas permiten inferir nuevas afirmaciones,
        pero también pueden introducir contradicciones si las categorías se modelan mal. Debe distinguirse conocimiento
        universal del dominio y anotaciones contingentes de una muestra.
      en: >-
        A class represents a general type, such as T cell; an instance represents a concrete entity, such as one observed cell.
        “Is-a” links a subclass to a broader class. Constraints may specify domain, range, cardinality, or disjointness.
        Axioms enable inference but can create contradictions when categories are modeled poorly. Universal domain knowledge
        must be separated from contingent annotations of one sample.
      da: >-
        En klasse repræsenterer en generel type, fx T-celle; en instans er en konkret enhed, fx én observeret celle.
        “Is-a” forbinder en subklasse med en bredere klasse. Restriktioner kan angive domæne, range, kardinalitet eller disjunktion.
    key_points:
      - {"es": "Clase no es lo mismo que conjunto observado en un estudio.", "en": "A class is not the same as an observed study group.", "da": "En klasse er ikke det samme som en observeret studiegruppe."}
      - {"es": "Los axiomas deben ser verdaderos para todas las instancias pretendidas.", "en": "Axioms should hold for all intended instances.", "da": "Aksiomer bør gælde for alle tilsigtede instanser."}
      - {"es": "La inferencia depende de las relaciones y restricciones declaradas.", "en": "Inference depends on declared relations and constraints.", "da": "Inferens afhænger af deklarerede relationer og restriktioner."}
    linked_objectives: [m02.o4, m02.o5]

  - id: dm847.m02.c05
    title:
      es: "Relaciones tipadas y errores de jerarquía"
      en: "Typed relations and hierarchy errors"
      da: "Typede relationer og hierarkifejl"
    body:
      es: >-
        «Es-un» expresa clasificación: un hepatocito es una célula. «Parte-de» expresa mereología: un lóbulo es parte
        de un órgano. «Ubicado-en», «derivado-de», «regula», «interactúa-con» y «medido-en» tienen semánticas distintas.
        Sustituirlas por una arista genérica pierde capacidad de validar e inferir. Un error frecuente es modelar una parte
        como subtipo, por ejemplo «núcleo es-una célula», o convertir correlación en «causa-de».
      en: >-
        “Is-a” expresses classification: a hepatocyte is a cell. “Part-of” expresses mereology: a lobe is part of an organ.
        “Located-in,” “derived-from,” “regulates,” “interacts-with,” and “measured-in” have different semantics.
        Replacing them with a generic edge loses validation and inference. Common errors include modeling a part as a subtype
        or converting correlation into “causes.”
      da: >-
        “Is-a” udtrykker klassifikation; “part-of” udtrykker del-helhed. “Located-in”, “derived-from”, “regulates”,
        “interacts-with” og “measured-in” har forskellig semantik. Generiske kanter mister validering og inferens.
    key_points:
      - {"es": "«Es-un» y «parte-de» no son intercambiables.", "en": "“Is-a” and “part-of” are not interchangeable.", "da": "“Is-a” og “part-of” er ikke udskiftelige."}
      - {"es": "La dirección de una relación puede cambiar su significado.", "en": "Relation direction can change meaning.", "da": "Relationens retning kan ændre betydning."}
      - {"es": "Correlación no debe codificarse como causalidad.", "en": "Correlation should not be encoded as causation.", "da": "Korrelation bør ikke kodes som kausalitet."}
    linked_objectives: [m02.o4, m02.o5]

  - id: dm847.m02.c06
    title:
      es: "Procedencia, evidencia y linaje de transformaciones"
      en: "Provenance, evidence, and transformation lineage"
      da: "Proveniens, evidens og transformationslinje"
    body:
      es: >-
        Procedencia describe de dónde proviene una entidad o afirmación y cómo fue producida. Un registro útil identifica
        entrada, actividad, agente, software, versión, parámetros, tiempo y salida. La evidencia respalda una afirmación,
        pero no es idéntica a su procedencia: una publicación puede ser la fuente y un ensayo específico el tipo de evidencia.
        En un pipeline, cada tabla derivada debe poder vincularse con datos de entrada y transformaciones para reproducir
        y auditar resultados.
      en: >-
        Provenance describes where an entity or claim came from and how it was produced. A useful record identifies input,
        activity, agent, software, version, parameters, time, and output. Evidence supports a claim but is not identical to provenance:
        a publication may be the source while a specific assay is the evidence type. Each derived table in a pipeline should link
        to inputs and transformations for reproduction and audit.
      da: >-
        Proveniens beskriver hvor en enhed eller påstand kommer fra, og hvordan den blev produceret. En nyttig post identificerer
        input, aktivitet, agent, software, version, parametre, tid og output. Evidens støtter en påstand, men er ikke identisk med proveniens.
    key_points:
      - {"es": "Fuente, método y tipo de evidencia son campos distintos.", "en": "Source, method, and evidence type are distinct fields.", "da": "Kilde, metode og evidenstype er forskellige felter."}
      - {"es": "Una salida derivada debe apuntar a sus entradas y parámetros.", "en": "A derived output should point to its inputs and parameters.", "da": "Et afledt output bør pege på input og parametre."}
      - {"es": "Procedencia permite reproducir y asignar responsabilidad.", "en": "Provenance supports reproduction and accountability.", "da": "Proveniens støtter reproduktion og ansvarlighed."}
    linked_objectives: [m02.o6]

  - id: dm847.m02.c07
    title:
      es: "Mapeos, equivalencia y deriva semántica"
      en: "Mappings, equivalence, and semantic drift"
      da: "Mapping, ækvivalens og semantisk drift"
    body:
      es: >-
        Un cross-reference indica conexión, no necesariamente equivalencia. Dos registros pueden describir la misma entidad,
        una entidad más amplia, una isoforma concreta o conceptos históricamente relacionados. Los mapeos deben tiparse como
        exactos, estrechos, amplios, relacionados o inciertos y conservar evidencia y versión. Las ontologías y bases evolucionan:
        términos se fusionan, dividen, deprecian o redefinen. Aplicar un mapeo antiguo sin revisar versión puede introducir deriva semántica.
      en: >-
        A cross-reference indicates connection, not necessarily equivalence. Two records may describe the same entity,
        a broader entity, one isoform, or historically related concepts. Mappings should be typed as exact, narrow, broad,
        related, or uncertain and preserve evidence and version. Ontologies and databases evolve: terms merge, split,
        deprecate, or change definition. Reusing old mappings can introduce semantic drift.
      da: >-
        En cross-reference viser forbindelse, ikke nødvendigvis ækvivalens. To poster kan beskrive samme enhed,
        en bredere enhed, en isoform eller historisk relaterede begreber. Mapping bør types og gemme evidens og version.
    key_points:
      - {"es": "Cross-reference no equivale a same-as.", "en": "A cross-reference is not equivalent to same-as.", "da": "En cross-reference er ikke det samme som same-as."}
      - {"es": "Los mapeos requieren versión y evidencia.", "en": "Mappings require version and evidence.", "da": "Mapping kræver version og evidens."}
      - {"es": "La deprecación debe resolverse, no borrarse silenciosamente.", "en": "Deprecation should be resolved, not silently erased.", "da": "Deprecation bør løses, ikke skjules."}
    linked_objectives: [m02.o2, m02.o7]

  - id: dm847.m02.c08
    title:
      es: "FAIR, acceso responsable y reutilización"
      en: "FAIR, responsible access, and reuse"
      da: "FAIR, ansvarlig adgang og genbrug"
    body:
      es: >-
        FAIR significa encontrable, accesible, interoperable y reutilizable. Accesible no significa necesariamente abierto:
        datos sensibles pueden requerir autenticación y gobernanza, mientras sus metadatos permanecen encontrables.
        Interoperabilidad exige formatos, identificadores y semántica compartida; reutilización requiere licencia, procedencia,
        calidad, contexto y restricciones de uso. Un archivo descargable sin metadatos puede ser abierto pero poco FAIR.
      en: >-
        FAIR means findable, accessible, interoperable, and reusable. Accessible does not necessarily mean open:
        sensitive data may require authentication and governance while metadata remain findable. Interoperability requires
        shared formats, identifiers, and semantics; reuse requires licensing, provenance, quality, context, and use constraints.
        A downloadable file without metadata may be open but poorly FAIR.
      da: >-
        FAIR betyder findbar, tilgængelig, interoperabel og genbrugelig. Tilgængelig betyder ikke nødvendigvis åben:
        følsomme data kan kræve autentifikation og governance. Interoperabilitet kræver fælles formater, identifikatorer og semantik;
        genbrug kræver licens, proveniens, kvalitet og kontekst.
    key_points:
      - {"es": "FAIR y abierto no son sinónimos.", "en": "FAIR and open are not synonyms.", "da": "FAIR og åben er ikke synonymer."}
      - {"es": "Metadatos persistentes pueden ser públicos aunque los datos estén restringidos.", "en": "Persistent metadata may be public while data are restricted.", "da": "Persistente metadata kan være offentlige mens data er begrænsede."}
      - {"es": "Reutilización exige contexto y licencia.", "en": "Reuse requires context and license.", "da": "Genbrug kræver kontekst og licens."}
    linked_objectives: [m02.o6, m02.o8]

worked_examples:
  - id: dm847.m02.e01
    title:
      es: "Auditar una lista de genes identificada sólo por símbolos"
      en: "Audit a gene list identified only by symbols"
      da: "Auditér en genliste identificeret kun med symboler"
    problem:
      es: "Una tabla contiene `APC`, `CAT`, `DEC1` y `PARK2` sin organismo, namespace ni fecha. Explica los riesgos y propón una corrección."
      en: "A table contains `APC`, `CAT`, `DEC1`, and `PARK2` without organism, namespace, or date. Explain risks and propose a correction."
      da: "En tabel indeholder `APC`, `CAT`, `DEC1` og `PARK2` uden organisme, namespace eller dato. Forklar risici og foreslå rettelse."
    reasoning:
      es:
        - Los símbolos pueden ser ambiguos entre organismos y recursos.
        - Símbolos históricos pueden haber sido reemplazados o reutilizados.
        - Un símbolo no especifica transcrito, proteína ni versión.
        - Resolver cada fila contra un namespace autoritativo y conservar el símbolo original como etiqueta.
      en:
        - Symbols may be ambiguous across organisms and resources.
        - Historical symbols may be replaced or reused.
        - A symbol does not specify transcript, protein, or version.
        - Resolve each row against an authoritative namespace and retain the original symbol as a label.
      da:
        - Symboler kan være tvetydige mellem organismer og ressourcer.
        - Historiske symboler kan være erstattet eller genbrugt.
        - Et symbol angiver ikke transkript, protein eller version.
        - Resolve hver række mod et autoritativt namespace og behold original label.
    expected_answer:
      es: "Añadir organismo, identificador estable con namespace, versión o fecha de resolución, estado de deprecación y regla de mapeo."
      en: "Add organism, stable namespaced identifier, version or resolution date, deprecation status, and mapping rule."
      da: "Tilføj organisme, stabil namespaced identifikator, version eller resolutionsdato, deprecationsstatus og mappingregel."
    linked_objectives: [m02.o1, m02.o2, m02.o7]

  - id: dm847.m02.e02
    title:
      es: "Corregir una jerarquía biológica defectuosa"
      en: "Correct a defective biological hierarchy"
      da: "Ret et defekt biologisk hierarki"
    problem:
      es: "Un modelo afirma `núcleo is-a célula` y `hepatocito part-of célula`. Corrige las relaciones."
      en: "A model states `nucleus is-a cell` and `hepatocyte part-of cell`. Correct the relations."
      da: "En model siger `nucleus is-a cell` og `hepatocyte part-of cell`. Ret relationerne."
    reasoning:
      es:
        - Un núcleo es una estructura subcelular, no una subclase de célula.
        - Un hepatocito sí es un tipo de célula.
        - Debe comprobarse dirección: núcleo part-of célula; hepatocito is-a célula.
      en:
        - A nucleus is a subcellular structure, not a subtype of cell.
        - A hepatocyte is a type of cell.
        - Correct direction: nucleus part-of cell; hepatocyte is-a cell.
      da:
        - En kerne er en subcellulær struktur, ikke en celletype.
        - En hepatocyt er en celletype.
        - Korrekt: nucleus part-of cell; hepatocyte is-a cell.
    expected_answer:
      es: "`núcleo part-of célula`; `hepatocito is-a célula`."
      en: "`nucleus part-of cell`; `hepatocyte is-a cell`."
      da: "`nucleus part-of cell`; `hepatocyte is-a cell`."
    linked_objectives: [m02.o4, m02.o5]

  - id: dm847.m02.e03
    title:
      es: "Construir procedencia para una tabla diferencial"
      en: "Build provenance for a differential-results table"
      da: "Byg proveniens for en tabel med differentielle resultater"
    problem:
      es: >-
        Una tabla final contiene identificador, efecto y p ajustado. Diseña la cadena mínima de procedencia
        desde archivos de entrada hasta la tabla.
      en: >-
        A final table contains identifier, effect, and adjusted p-value. Design the minimal provenance chain
        from input files to the table.
      da: >-
        En sluttabel indeholder identifikator, effekt og justeret p-værdi. Design den minimale provenienskæde fra inputfiler til tabellen.
    reasoning:
      es:
        - Registrar archivos y checksums o identificadores persistentes.
        - Registrar referencia/anotación y versiones.
        - Registrar pasos de control, cuantificación, normalización, modelo y corrección múltiple.
        - Conservar software, versiones, parámetros, agente, tiempo y salidas intermedias esenciales.
      en:
        - Record files and checksums or persistent identifiers.
        - Record reference/annotation and versions.
        - Record quality control, quantification, normalization, model, and multiple-testing steps.
        - Preserve software, versions, parameters, agent, time, and essential intermediate outputs.
      da:
        - Registrér filer og checksums eller persistente ID'er.
        - Registrér reference/annotation og versioner.
        - Registrér QC, kvantificering, normalisering, model og multipel testkorrektion.
        - Bevar software, versioner, parametre, agent, tid og vigtige mellemoutput.
    expected_answer:
      es: "Un grafo dirigido donde cada salida derivada apunta a actividad, entradas, parámetros y agente que la produjo."
      en: "A directed graph where each derived output points to the activity, inputs, parameters, and agent that produced it."
      da: "En rettet graf hvor hvert afledt output peger på aktivitet, input, parametre og agent."
    linked_objectives: [m02.o6, m02.o8]

practice_exercises:
  - id: dm847.m02.p01
    activity_type: identifier_audit
    difficulty: foundational
    prompt:
      es: "Indica qué campos faltan para reproducir `chr7:140453136 A>T`."
      en: "State which fields are missing to reproduce `chr7:140453136 A>T`."
      da: "Angiv hvilke felter der mangler for at reproducere `chr7:140453136 A>T`."
    accepted_answer_elements:
      - reference assembly and version
      - coordinate convention
      - chromosome/contig namespace
      - reference and alternate allele normalization
      - strand or representation convention when relevant
      - variant identifier or source if available
    linked_objectives: [m02.o1, m02.o2]

  - id: dm847.m02.p02
    activity_type: concept_classification
    difficulty: foundational
    prompt:
      es: "Clasifica `BRCA1`, `NM_007294.4`, «cáncer de mama» y una biopsia concreta como símbolo, accesión versionada, concepto e instancia."
      en: "Classify `BRCA1`, `NM_007294.4`, “breast cancer,” and one concrete biopsy as symbol, versioned accession, concept, and instance."
      da: "Klassificér `BRCA1`, `NM_007294.4`, “brystkræft” og en konkret biopsi som symbol, versionsaccession, koncept og instans."
    reference_solution:
      es: "BRCA1 símbolo; NM_007294.4 accesión versionada; cáncer de mama concepto/clase; biopsia concreta instancia."
      en: "BRCA1 symbol; NM_007294.4 versioned accession; breast cancer concept/class; concrete biopsy instance."
      da: "BRCA1 symbol; NM_007294.4 versionsaccession; brystkræft koncept/klasse; konkret biopsi instans."
    linked_objectives: [m02.o1, m02.o4]

  - id: dm847.m02.p03
    activity_type: relation_typing
    difficulty: intermediate
    prompt:
      es: "Asigna la relación más precisa: mitocondria—célula; célula T—linfocito; muestra—paciente; resultado—archivo de entrada."
      en: "Assign the most precise relation: mitochondrion—cell; T cell—lymphocyte; sample—patient; result—input file."
      da: "Tildel den mest præcise relation: mitokondrie—celle; T-celle—lymfocyt; prøve—patient; resultat—inputfil."
    reference_solution:
      es: "mitocondria part-of célula; célula T is-a linfocito; muestra derived-from/donated-by paciente según modelo; resultado derived-from archivo."
      en: "mitochondrion part-of cell; T cell is-a lymphocyte; sample derived-from/donated-by patient depending on model; result derived-from file."
      da: "mitokondrie part-of celle; T-celle is-a lymfocyt; prøve derived-from/donated-by patient; resultat derived-from fil."
    linked_objectives: [m02.o4, m02.o5]

  - id: dm847.m02.p04
    activity_type: mapping_audit
    difficulty: intermediate
    prompt:
      es: "Un recurso mapea una enfermedad rara a una categoría amplia de trastorno neurológico con `same-as`. Evalúa y corrige."
      en: "A resource maps a rare disease to a broad neurological-disorder category using `same-as`. Evaluate and correct it."
      da: "En ressource mapper en sjælden sygdom til en bred neurologisk kategori med `same-as`. Vurdér og ret."
    accepted_answer_elements:
      - exact equivalence is too strong
      - use is-a or narrower-than depending on representation
      - preserve source, version, and mapping evidence
      - check whether the broad category is a class rather than a record for the same entity
    linked_objectives: [m02.o5, m02.o7]

  - id: dm847.m02.p05
    activity_type: fair_assessment
    difficulty: intermediate
    prompt:
      es: "Evalúa un archivo CSV público sin licencia, diccionario, identificadores persistentes ni procedencia según FAIR."
      en: "Evaluate a public CSV lacking license, data dictionary, persistent identifiers, and provenance under FAIR."
      da: "Vurdér en offentlig CSV uden licens, dataordbog, persistente ID'er eller proveniens efter FAIR."
    reference_solution:
      es: >-
        Puede ser accesible y quizá encontrable por una página, pero presenta baja interoperabilidad y reutilización.
        Debe añadirse identificador persistente, metadatos, esquema, vocabularios, licencia, procedencia, versión y condiciones de acceso.
      en: >-
        It may be accessible and perhaps findable through a page, but interoperability and reusability are poor.
        Add a persistent identifier, metadata, schema, vocabularies, license, provenance, version, and access conditions.
      da: >-
        Filen kan være tilgængelig og måske findbar, men interoperabilitet og genbrug er svage.
        Tilføj persistent ID, metadata, skema, vokabularer, licens, proveniens, version og adgangsbetingelser.
    linked_objectives: [m02.o8]

  - id: dm847.m02.p06
    activity_type: ontology_design
    difficulty: advanced
    prompt:
      es: "Diseña un fragmento para representar paciente, muestra, ensayo, medición y gen. Incluye clases, instancias y relaciones sin codificar correlación como causalidad."
      en: "Design a fragment representing patient, sample, assay, measurement, and gene. Include classes, instances, and relations without encoding correlation as causation."
      da: "Design et fragment for patient, prøve, assay, måling og gen. Medtag klasser, instanser og relationer uden at kode korrelation som kausalitet."
    accepted_answer_elements:
      - patient, sample, assay, measurement, and gene are classes or typed entities
      - concrete records are instances with persistent IDs
      - sample derived-from patient
      - measurement generated-by assay and about/entity-target gene
      - value, unit, time, and method are represented
      - association result is distinct from causal relation
    linked_objectives: [m02.o4, m02.o5, m02.o6]

objective_question_bank:
  - id: dm847.m02.q01
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {"es": "¿Qué necesita un identificador para ser interpretable?", "en": "What does an identifier need to be interpretable?", "da": "Hvad kræver en identifikator for at kunne fortolkes?"}
    options:
      - id: namespace
        text: {"es": "Un espacio de nombres y reglas de resolución.", "en": "A namespace and resolution rules.", "da": "Et namespace og resolutionsregler."}
      - id: color
        text: {"es": "Un color de visualización.", "en": "A display color.", "da": "En visningsfarve."}
      - id: random_prefix
        text: {"es": "Un prefijo aleatorio no documentado.", "en": "An undocumented random prefix.", "da": "Et udokumenteret tilfældigt præfiks."}
    correct_option_ids: [namespace]
    explanation: {"es": "La misma cadena puede significar cosas distintas en diferentes recursos.", "en": "The same string may mean different things in different resources.", "da": "Samme streng kan betyde forskellige ting i forskellige ressourcer."}
    linked_objectives: [m02.o1, m02.o2]

  - id: dm847.m02.q02
    activity_type: true_false
    difficulty: foundational
    prompt: {"es": "Una accesión estable garantiza que el contenido nunca cambia.", "en": "A stable accession guarantees that content never changes.", "da": "En stabil accession garanterer at indhold aldrig ændres."}
    correct_answer: false
    explanation: {"es": "La accesión puede persistir mientras una versión distingue revisiones del registro o secuencia.", "en": "The accession may persist while a version distinguishes record or sequence revisions.", "da": "Accession kan bestå mens version skelner revisioner."}
    linked_objectives: [m02.o1, m02.o2]

  - id: dm847.m02.q03
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {"es": "¿Qué relación corresponde a «hepatocito — célula»?", "en": "Which relation fits “hepatocyte — cell”?", "da": "Hvilken relation passer til “hepatocyt — celle”?"}
    options:
      - {id: is_a, text: {"es": "is-a", "en": "is-a", "da": "is-a"}}
      - {id: part_of, text: {"es": "part-of", "en": "part-of", "da": "part-of"}}
      - {id: derived_from, text: {"es": "derived-from", "en": "derived-from", "da": "derived-from"}}
    correct_option_ids: [is_a]
    explanation: {"es": "Un hepatocito es un tipo de célula.", "en": "A hepatocyte is a type of cell.", "da": "En hepatocyt er en celletype."}
    linked_objectives: [m02.o4, m02.o5]

  - id: dm847.m02.q04
    activity_type: multiple_choice
    difficulty: foundational
    prompt: {"es": "¿Qué relación corresponde a «núcleo — célula»?", "en": "Which relation fits “nucleus — cell”?", "da": "Hvilken relation passer til “kerne — celle”?"}
    options:
      - {id: part_of, text: {"es": "part-of", "en": "part-of", "da": "part-of"}}
      - {id: is_a, text: {"es": "is-a", "en": "is-a", "da": "is-a"}}
      - {id: causes, text: {"es": "causes", "en": "causes", "da": "causes"}}
    correct_option_ids: [part_of]
    explanation: {"es": "El núcleo es un componente de la célula, no un subtipo de célula.", "en": "A nucleus is a component of a cell, not a subtype of cell.", "da": "Kernen er en del af cellen, ikke en celletype."}
    linked_objectives: [m02.o5]

  - id: dm847.m02.q05
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Qué diferencia principal tiene una ontología formal frente a un vocabulario controlado?", "en": "What mainly distinguishes a formal ontology from a controlled vocabulary?", "da": "Hvad adskiller primært en formel ontologi fra et kontrolleret vokabular?"}
    options:
      - id: axioms_relations
        text: {"es": "Relaciones y axiomas explícitos que permiten validación o inferencia.", "en": "Explicit relations and axioms enabling validation or inference.", "da": "Eksplicitte relationer og aksiomer der muliggør validering eller inferens."}
      - id: more_words
        text: {"es": "Contener siempre más palabras.", "en": "Always containing more words.", "da": "Altid at indeholde flere ord."}
      - id: public_access
        text: {"es": "Ser necesariamente pública.", "en": "Necessarily being public.", "da": "Nødvendigvis at være offentlig."}
    correct_option_ids: [axioms_relations]
    explanation: {"es": "La ontología modela semántica formal, no sólo una lista permitida.", "en": "An ontology models formal semantics, not merely an allowed list.", "da": "En ontologi modellerer formel semantik, ikke blot en tilladt liste."}
    linked_objectives: [m02.o3, m02.o4]

  - id: dm847.m02.q06
    activity_type: true_false
    difficulty: intermediate
    prompt: {"es": "Un cross-reference entre dos registros demuestra equivalencia exacta.", "en": "A cross-reference between two records proves exact equivalence.", "da": "En cross-reference mellem to poster beviser eksakt ækvivalens."}
    correct_answer: false
    explanation: {"es": "Puede expresar relación amplia, estrecha, histórica o incierta; el tipo debe auditarse.", "en": "It may express broad, narrow, historical, or uncertain relation; mapping type must be audited.", "da": "Den kan udtrykke bred, snæver, historisk eller usikker relation og skal auditeres."}
    linked_objectives: [m02.o7]

  - id: dm847.m02.q07
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Qué pertenece a la procedencia de una tabla derivada?", "en": "What belongs to provenance for a derived table?", "da": "Hvad hører til proveniens for en afledt tabel?"}
    options:
      - id: inputs_activity_agent
        text: {"es": "Entradas, actividad, agente/software, parámetros, versiones y tiempo.", "en": "Inputs, activity, agent/software, parameters, versions, and time.", "da": "Input, aktivitet, agent/software, parametre, versioner og tid."}
      - id: only_title
        text: {"es": "Sólo el título del archivo.", "en": "Only the file title.", "da": "Kun filens titel."}
      - id: only_author
        text: {"es": "Sólo el nombre del autor.", "en": "Only the author's name.", "da": "Kun forfatterens navn."}
    correct_option_ids: [inputs_activity_agent]
    explanation: {"es": "Procedencia debe reconstruir cómo se produjo la salida.", "en": "Provenance should reconstruct how the output was produced.", "da": "Proveniens bør rekonstruere hvordan output blev produceret."}
    linked_objectives: [m02.o6]

  - id: dm847.m02.q08
    activity_type: multiple_choice
    difficulty: intermediate
    prompt: {"es": "¿Cuál afirmación sobre FAIR es correcta?", "en": "Which statement about FAIR is correct?", "da": "Hvilken påstand om FAIR er korrekt?"}
    options:
      - id: fair_not_open
        text: {"es": "Datos restringidos pueden ser FAIR si tienen metadatos, acceso definido, semántica y condiciones de reutilización.", "en": "Restricted data can be FAIR with metadata, defined access, semantics, and reuse conditions.", "da": "Begrænsede data kan være FAIR med metadata, defineret adgang, semantik og genbrugsbetingelser."}
      - id: fair_public_only
        text: {"es": "FAIR significa que todo dato debe descargarse sin autenticación.", "en": "FAIR means all data must be downloadable without authentication.", "da": "FAIR betyder at alle data skal kunne downloades uden autentifikation."}
      - id: fair_csv_only
        text: {"es": "Guardar como CSV hace automáticamente FAIR un conjunto.", "en": "Saving as CSV automatically makes a dataset FAIR.", "da": "CSV-format gør automatisk et datasæt FAIR."}
    correct_option_ids: [fair_not_open]
    explanation: {"es": "Acceso puede estar regulado; FAIR exige rutas claras, metadatos e interoperabilidad.", "en": "Access may be governed; FAIR requires clear routes, metadata, and interoperability.", "da": "Adgang kan være reguleret; FAIR kræver klare adgangsveje, metadata og interoperabilitet."}
    linked_objectives: [m02.o8]

  - id: dm847.m02.q09
    activity_type: multiple_choice
    difficulty: advanced
    prompt: {"es": "¿Cuál es el mayor riesgo de reutilizar un mapeo antiguo sin versión?", "en": "What is the main risk of reusing an old unversioned mapping?", "da": "Hvad er hovedrisikoen ved at genbruge en gammel mapping uden version?"}
    options:
      - id: semantic_drift
        text: {"es": "Deriva semántica por términos fusionados, divididos, redefinidos o deprecados.", "en": "Semantic drift from merged, split, redefined, or deprecated terms.", "da": "Semantisk drift fra fusionerede, splittede, redefinerede eller deprecierede termer."}
      - id: file_color
        text: {"es": "Cambio de color del archivo.", "en": "A change in file color.", "da": "Ændring af filfarve."}
      - id: guaranteed_equivalence
        text: {"es": "Garantía automática de equivalencia.", "en": "Automatic guarantee of equivalence.", "da": "Automatisk garanti for ækvivalens."}
    correct_option_ids: [semantic_drift]
    explanation: {"es": "El significado y alcance de términos cambian con las versiones.", "en": "Term meaning and scope change across versions.", "da": "Termers betydning og omfang ændres mellem versioner."}
    linked_objectives: [m02.o7]

  - id: dm847.m02.q10
    activity_type: true_false
    difficulty: advanced
    prompt: {"es": "Codificar una asociación estadística como `causes` es válido si el p-valor es pequeño.", "en": "Encoding a statistical association as `causes` is valid when the p-value is small.", "da": "Det er gyldigt at kode en statistisk association som `causes`, hvis p-værdien er lille."}
    correct_answer: false
    explanation: {"es": "Significancia estadística no establece una relación causal; debe usarse una relación de asociación con procedencia del análisis.", "en": "Statistical significance does not establish causality; use an association relation with analysis provenance.", "da": "Statistisk signifikans fastlægger ikke kausalitet; brug en associationsrelation med analyseproveniens."}
    linked_objectives: [m02.o5, m02.o6]

assessment_items:
  - id: dm847.m02.a01
    activity_type: semantic_model_design
    difficulty: intermediate
    prompt:
      es: >-
        Diseña un modelo mínimo para paciente, muestra, ensayo de secuenciación, archivo, gen, medición y resultado diferencial.
        Incluye identificadores, clases, instancias, relaciones, versiones y procedencia.
      en: >-
        Design a minimal model for patient, sample, sequencing assay, file, gene, measurement, and differential result.
        Include identifiers, classes, instances, relations, versions, and provenance.
      da: >-
        Design en minimal model for patient, prøve, sekventeringsassay, fil, gen, måling og differentielt resultat.
        Medtag identifikatorer, klasser, instanser, relationer, versioner og proveniens.
    accepted_answer_elements:
      - stable namespaced IDs for concrete entities
      - classes separated from instances
      - sample derived-from or collected-from patient
      - file generated-by assay and associated with reference versions
      - measurement about gene and generated-from file or analysis activity
      - differential result derived-from measurements through a versioned model
      - time, parameters, software, and responsible agent represented
    rubric:
      - {criterion: entity_identifier_precision, points: 3}
      - {criterion: relation_semantics, points: 3}
      - {criterion: provenance_completeness, points: 2}
      - {criterion: versioning_and_constraints, points: 2}
    linked_objectives: [m02.o1, m02.o2, m02.o4, m02.o5, m02.o6]

  - id: dm847.m02.a02
    activity_type: mapping_audit
    difficulty: advanced
    prompt:
      es: >-
        Recibes 10 000 mapeos entre dos recursos con relaciones no tipadas. Diseña un protocolo de auditoría,
        actualización y registro de incertidumbre que no convierta automáticamente todo en equivalencia exacta.
      en: >-
        You receive 10,000 untyped mappings between two resources. Design an audit, update, and uncertainty-recording
        protocol that does not automatically convert every link into exact equivalence.
      da: >-
        Du modtager 10.000 utypede mappings mellem to ressourcer. Design en audit-, opdaterings- og usikkerhedsprotokol
        der ikke automatisk gør alle links til eksakt ækvivalens.
    accepted_answer_elements:
      - freeze source and target versions
      - resolve deprecated and merged records
      - compare definitions, scope, organism, entity type, and granularity
      - classify exact, narrow, broad, related, or uncertain mappings
      - retain evidence, method, confidence, and reviewer or algorithm
      - sample manual review and define automated validation rules
      - version the mapping release and preserve previous states
    rubric:
      - {criterion: version_and_deprecation_control, points: 2}
      - {criterion: semantic_comparison, points: 3}
      - {criterion: uncertainty_and_evidence, points: 3}
      - {criterion: scalable_quality_control, points: 2}
    linked_objectives: [m02.o2, m02.o7]

  - id: dm847.m02.a03
    activity_type: fair_case_analysis
    difficulty: advanced
    prompt:
      es: >-
        Evalúa un conjunto clínico con acceso restringido, metadatos públicos, identificador persistente,
        formato propietario, licencia ambigua y procedencia incompleta. Propón mejoras por cada dimensión FAIR.
      en: >-
        Evaluate a restricted clinical dataset with public metadata, a persistent identifier, proprietary format,
        ambiguous license, and incomplete provenance. Propose improvements for each FAIR dimension.
      da: >-
        Vurdér et begrænset klinisk datasæt med offentlige metadata, persistent ID, proprietært format,
        tvetydig licens og ufuldstændig proveniens. Foreslå forbedringer for hver FAIR-dimension.
    accepted_answer_elements:
      - findable strengths include persistent ID and searchable metadata
      - accessible can be satisfied through documented governed access
      - interoperability requires open or documented formats and semantic identifiers
      - reuse requires clear license, provenance, data dictionary, quality, and use conditions
      - privacy and governance are preserved rather than removed
    rubric:
      - {criterion: fair_dimension_separation, points: 4}
      - {criterion: responsible_access_reasoning, points: 2}
      - {criterion: concrete_improvements, points: 3}
      - {criterion: limitations, points: 1}
    linked_objectives: [m02.o6, m02.o8]

