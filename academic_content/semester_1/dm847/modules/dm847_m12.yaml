glossary:
  - {id: dm847.term.graph, es: Grafo, en: Graph, da: Graf, definition_en: Nodes and edges representing entities and relations.}
  - {id: dm847.term.directed_edge, es: Arista dirigida, en: Directed edge, da: Rettet kant, definition_en: Ordered relation from source to target.}
  - {id: dm847.term.weighted_graph, es: Grafo ponderado, en: Weighted graph, da: Vægtet graf, definition_en: Graph whose edges or nodes carry quantitative weights.}
  - {id: dm847.term.adjacency_list, es: Lista de adyacencia, en: Adjacency list, da: Adjacency-list, definition_en: Neighbor collection stored for each node.}
  - {id: dm847.term.connected_component, es: Componente conexo, en: Connected component, da: Sammenhængende komponent, definition_en: Maximal set of mutually reachable nodes under a graph definition.}
  - {id: dm847.term.degree, es: Grado, en: Degree, da: Grad, definition_en: Number of incident neighbors or edges under a stated convention.}
  - {id: dm847.term.betweenness, es: Betweenness, en: Betweenness centrality, da: Betweenness-centralitet, definition_en: Fraction of shortest paths passing through a node or edge.}
  - {id: dm847.term.layout, es: Layout, en: Layout, da: Layout, definition_en: Rule assigning visual coordinates to graph elements.}
  - {id: dm847.term.multilayer_network, es: Red multicapa, en: Multilayer network, da: Multilagsnetværk, definition_en: Graph separating relation types, contexts, or time into layers.}
  - {id: dm847.term.null_network, es: Red nula, en: Null network, da: Nulnetværk, definition_en: Randomized graph representing a comparison hypothesis.}

hidden_support:
  canonical_explanation:
    es: >-
      Una red es un modelo de relaciones definidas, no una fotografía neutral de la biología. La
      procedencia y el tipo de evidencia deben conservarse por arista. Las métricas describen topología
      bajo esa construcción; los layouts sólo organizan una figura. Comparar con nulos adecuados y
      estratificar por evidencia evita convertir sesgo de estudio en conclusión biológica.
    en: >-
      A network is a model of defined relations, not a neutral photograph of biology. Edge provenance
      and evidence type must be preserved. Metrics describe topology under that construction; layouts
      only organize a figure. Appropriate nulls and evidence stratification help avoid turning study bias
      into biological conclusions.
    da: >-
      Et netværk er en model af definerede relationer, ikke et neutralt billede af biologien. Provenance
      skal bevares, layouts er kun grafiske, og nulmodeller skal passe til spørgsmålet.
  misconceptions:
    - {id: dm847.m12.mc01, false_belief: {"es": "Una arista siempre significa interacción física", "en": "An edge always means physical interaction", "da": "En kant betyder altid fysisk interaktion"}, correction: {"es": "Su significado depende de la relación definida y la evidencia", "en": "Its meaning depends on the defined relation and evidence", "da": "Betydningen afhænger af relation og evidens"}}
    - {id: dm847.m12.mc02, false_belief: {"es": "Un hub es automáticamente esencial", "en": "A hub is automatically essential", "da": "En hub er automatisk essentiel"}, correction: {"es": "Grado puede reflejar sesgo, y esencialidad requiere evidencia independiente", "en": "Degree may reflect bias and essentiality needs independent evidence", "da": "Grad kan afspejle bias, og essentialitet kræver uafhængigt bevis"}}
    - {id: dm847.m12.mc03, false_belief: {"es": "Cercanía visual prueba relación fuerte", "en": "Visual proximity proves a strong relation", "da": "Visuel nærhed beviser en stærk relation"}, correction: {"es": "Puede ser una consecuencia del layout y sus parámetros", "en": "It may be a consequence of layout and parameters", "da": "Det kan skyldes layout og parametre"}}
  socratic_questions:
    - ¿Qué afirmación exacta representa cada arista?
    - ¿Qué evidencia falta cuando no hay arista?
    - ¿Qué métrica responde realmente la pregunta?
    - ¿La posición visual tiene significado externo al layout?
    - ¿Qué propiedades conserva el modelo nulo?
  knowledge_fragments:
    - {id: dm847.m12.k01, content_en: Graph construction is part of the scientific hypothesis.}
    - {id: dm847.m12.k02, content_en: Directed, weighted, signed, and multilayer edges encode different semantics.}
    - {id: dm847.m12.k03, content_en: Sparse networks favor adjacency-list representations.}
    - {id: dm847.m12.k04, content_en: BFS gives unweighted shortest-path distances.}
    - {id: dm847.m12.k05, content_en: Centrality measures answer distinct questions.}
    - {id: dm847.m12.k06, content_en: Edge provenance and condition should be preserved.}
    - {id: dm847.m12.k07, content_en: Study intensity can inflate observed degree.}
    - {id: dm847.m12.k08, content_en: Layout coordinates are usually not biological coordinates.}
    - {id: dm847.m12.k09, content_en: Null models should preserve properties relevant to the hypothesis.}
    - {id: dm847.m12.k10, content_en: Topological association does not establish causality.}
  response_constraints:
    - Define node and edge semantics before reporting metrics.
    - Name the exact centrality and weight interpretation.
    - Preserve evidence source, condition, and version.
    - Do not infer causality, essentiality, or physical interaction from topology alone.

