metadata:
  title:
    es: "Proyecto bioinformático integrador y defensa científica oral"
    en: "Integrative bioinformatics project and oral scientific defense"
    da: "Integreret bioinformatikprojekt og mundtligt videnskabeligt forsvar"
  summary:
    es: >-
      Integración de genética molecular, ontologías, bases de datos, algoritmos de secuencia,
      modelos probabilísticos, índices, motivos, NGS, redes y aprendizaje ómico en un proyecto
      reproducible. El módulo desarrolla formulación de preguntas, cadena de evidencia, elección
      de baselines, validación, análisis de incertidumbre, informe técnico y preparación de una
      defensa oral individual de treinta minutos que cubre el programa completo.
    en: >-
      Integration of molecular genetics, ontologies, databases, sequence algorithms,
      probabilistic models, indexes, motifs, NGS, networks, and omics learning in a reproducible
      project. The module develops question formulation, evidence chains, baseline selection,
      validation, uncertainty analysis, technical reporting, and preparation for a thirty-minute
      individual oral defense spanning the complete syllabus.
    da: >-
      Integration af molekylær genetik, ontologier, databaser, sekvensalgoritmer,
      probabilistiske modeller, indeks, motiver, NGS, netværk og omics-læring i et
      reproducerbart projekt. Modulet udvikler spørgsmål, evidenskæde, baselines, validering,
      usikkerhed, rapportering og forberedelse til et individuelt mundtligt forsvar.
  estimated_study_hours: 24
  difficulty: integrative_advanced

