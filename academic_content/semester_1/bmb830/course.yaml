assessment_strategy:
  formative:
    - retrieval practice using conceptual and practical cards
    - R code tracing and output interpretation
    - data-quality and visualization audits
    - method selection from study design and variable type
    - short oral explanations of assumptions and limitations
  module_assessment:
    - randomized objective questions
    - reproducible R tasks
    - interpretation of tables, plots, estimates, intervals, and diagnostics
    - constructed responses with analytic rubrics
  cumulative_assessment:
    - end-to-end biological data analysis
    - critical appraisal of a published statistical workflow
    - oral interpretation of R output and graphics
    - defense of assumptions, alternatives, and limitations
  grading_principles:
    - statistical method follows the estimand, design, variable type, and dependence structure
    - p-values are interpreted with effect size, uncertainty, and multiplicity
    - association is not described as causation without an appropriate design
    - data cleaning decisions remain traceable
    - visualizations disclose sample size, scale, aggregation, and uncertainty where relevant
    - open responses are assessed with rubrics rather than exact-string matching

r_scope:
  core_objects:
    - atomic vectors
    - factors
    - lists
    - matrices
    - data frames and tibbles
  core_workflows:
    - readr or base import
    - dplyr transformation
    - tidyr reshaping
    - ggplot2 visualization
    - base statistical models
    - broom-style extraction where appropriate
  reproducibility:
    - project-relative paths
    - explicit package loading
    - recorded package versions
    - deterministic seeds for stochastic demonstrations
    - separation of raw, derived, and output data
    - Quarto or script-based reporting

quality_requirements:
  - Every analysis begins with the biological question, study unit, estimand, and scope of inference.
  - Variables are described by measurement scale and role, not only storage type.
  - Missing values are not automatically treated as random or interchangeable.
  - Summary statistics and plots are selected by distribution and question.
  - Probability models are linked to plausible data-generating mechanisms.
  - Confidence intervals are not described as posterior probabilities.
  - Hypothesis tests include effect size and uncertainty.
  - Linear models include residual and influence diagnostics.
  - PCA and clustering are treated as exploratory unless independently validated.
  - R code is reproducible, readable, and auditable.
  - Learner-visible content is equivalent in Spanish, English, and Danish.
  - Hidden support does not reveal answer keys during active assessment.
  - No protected exercise, figure, table, or passage is reproduced.

