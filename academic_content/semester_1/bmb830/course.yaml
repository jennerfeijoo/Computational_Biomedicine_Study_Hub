metadata:
  title:
    es: "Bioestadística en R I"
    en: "Biostatistics in R I"
    da: "Biostatistik i R I"
  ects: 5
  level: masters
  term: autumn
  teaching_language: English
  assessment:
    es: "Participación tutorial obligatoria y examen oral"
    en: "Mandatory tutorial participation and oral examination"
    da: "Obligatorisk tutorialdeltagelse og mundtlig eksamen"
  purpose:
    es: >-
      Desarrollar la capacidad de formular preguntas estadísticas a partir de problemas biológicos,
      organizar y validar datos, programar análisis reproducibles en R, seleccionar métodos básicos,
      interpretar incertidumbre y comunicar resultados sin exceder la evidencia. El curso conecta
      análisis descriptivo, probabilidad, inferencia, modelos lineales y análisis multivariante introductorio.
    en: >-
      Develop the ability to formulate statistical questions from biological problems, organize and
      validate data, program reproducible analyses in R, select basic methods, interpret uncertainty,
      and communicate results without exceeding the evidence. The course connects descriptive analysis,
      probability, inference, linear models, and introductory multivariate analysis.
    da: >-
      Udvikle evnen til at formulere statistiske spørgsmål fra biologiske problemer, organisere og
      validere data, programmere reproducerbare analyser i R, vælge grundlæggende metoder,
      fortolke usikkerhed og kommunikere resultater uden at overdrive evidensen.

academic_preconditions:
  required:
    - high-school mathematics and algebra
    - ability to read tables and simple graphs
  recommended:
    - basic spreadsheet familiarity
    - willingness to inspect code and statistical output
  not_assumed:
    - prior R programming
    - prior formal statistics beyond introductory concepts

