glossary:
  - {id: bmb830.term.population, term: {"es": "población objetivo", "en": "target population", "da": "målpopulation"}, definition: {"es": "Conjunto sobre el que se pretende concluir.", "en": "Set about which conclusions are intended.", "da": "Gruppe som konklusioner vedrører."}}
  - {id: bmb830.term.sample, term: {"es": "muestra", "en": "sample", "da": "sample"}, definition: {"es": "Unidades efectivamente observadas.", "en": "Units actually observed.", "da": "Enheder der faktisk observeres."}}
  - {id: bmb830.term.experimental_unit, term: {"es": "unidad experimental", "en": "experimental unit", "da": "forsøgsenhed"}, definition: {"es": "Unidad asignada independientemente a intervención.", "en": "Unit independently assigned to intervention.", "da": "Enhed der uafhængigt tildeles intervention."}}
  - {id: bmb830.term.observational_unit, term: {"es": "unidad observacional", "en": "observational unit", "da": "observationsenhed"}, definition: {"es": "Entidad que aporta una medición.", "en": "Entity contributing a measurement.", "da": "Enhed der bidrager med en måling."}}
  - {id: bmb830.term.estimand, term: {"es": "estimando", "en": "estimand", "da": "estimand"}, definition: {"es": "Cantidad poblacional objetivo.", "en": "Target population quantity.", "da": "Målparameter i populationen."}}
  - {id: bmb830.term.estimator, term: {"es": "estimador", "en": "estimator", "da": "estimator"}, definition: {"es": "Regla que transforma datos en una estimación.", "en": "Rule mapping data to an estimate.", "da": "Regel der omdanner data til et estimat."}}
  - {id: bmb830.term.pseudoreplication, term: {"es": "pseudorreplicación", "en": "pseudoreplication", "da": "pseudoreplikation"}, definition: {"es": "Tratar mediciones dependientes como réplicas independientes.", "en": "Treating dependent measurements as independent replicates.", "da": "At behandle afhængige målinger som uafhængige replikater."}}
  - {id: bmb830.term.confounder, term: {"es": "confusor", "en": "confounder", "da": "confounder"}, definition: {"es": "Causa común relevante de exposición y outcome.", "en": "Relevant common cause of exposure and outcome.", "da": "Relevant fælles årsag til eksponering og outcome."}}
  - {id: bmb830.term.provenance, term: {"es": "procedencia", "en": "provenance", "da": "provenance"}, definition: {"es": "Registro del origen y transformación de los datos.", "en": "Record of data origin and transformation.", "da": "Registrering af dataoprindelse og transformation."}}
  - {id: bmb830.term.scope, term: {"es": "alcance de inferencia", "en": "scope of inference", "da": "inferensområde"}, definition: {"es": "Conjunto de poblaciones y afirmaciones apoyadas por diseño y datos.", "en": "Populations and claims supported by design and data.", "da": "Populationer og påstande understøttet af design og data."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Empieza siempre por pregunta, población, unidad, variables, estimando y diseño. Después evalúa
      dependencia, procedencia y alcance. No recomiendes una prueba estadística antes de saber qué se estima.
    en: >-
      Always start with question, population, unit, variables, estimand, and design. Then assess dependence,
      provenance, and scope. Do not recommend a test before knowing what is being estimated.
    da: >-
      Start altid med spørgsmål, population, enhed, variable, estimand og design. Vurder derefter afhængighed,
      provenance og inferensområde.
  misconceptions:
    - large_n_eliminates_bias
    - every_row_is_independent
    - storage_type_equals_measurement_scale
    - association_implies_causation
    - method_name_defines_estimand
    - provenance_is_only_a_url
  socratic_questions:
    - What entity could have been independently sampled or randomized?
    - What population quantity would answer the biological question?
    - Which measurements share a subject, batch, family, site, or time series?
    - What claim would remain valid if unmeasured confounding exists?
    - What information is required to reproduce how the table was produced?
  grading_criteria:
    - identify the correct independence unit
    - define a complete estimand
    - separate measurement scale from storage type
    - distinguish association, prediction, and causation
    - bound conclusions by design and provenance
  retrieval_fragments:
    - {id: bmb830.m01.r01, topic: units, text: {"es": "La unidad independiente se determina por muestreo o asignación, no por el número de filas.", "en": "The independent unit follows sampling or assignment, not row count.", "da": "Den uafhængige enhed følger sampling eller tildeling, ikke antal rækker."}}
    - {id: bmb830.m01.r02, topic: estimand, text: {"es": "Un estimando especifica población, contraste, outcome, tiempo y resumen.", "en": "An estimand specifies population, contrast, outcome, time, and summary.", "da": "Et estimand specificerer population, kontrast, outcome, tidspunkt og summary."}}
    - {id: bmb830.m01.r03, topic: causality, text: {"es": "Ajustar covariables no convierte automáticamente asociación en causalidad.", "en": "Covariate adjustment does not automatically turn association into causation.", "da": "Covariatjustering gør ikke automatisk association kausal."}}
    - {id: bmb830.m01.r04, topic: provenance, text: {"es": "Procedencia registra fuente, versión, unidades, transformaciones y exclusiones.", "en": "Provenance records source, version, units, transformations, and exclusions.", "da": "Provenance registrerer kilde, version, enheder, transformationer og eksklusioner."}}
    - {id: bmb830.m01.r05, topic: scope, text: {"es": "La inferencia no debe exceder población, periodo y contexto respaldados.", "en": "Inference should not exceed the supported population, period, and context.", "da": "Inferens bør ikke overskride understøttet population, periode og kontekst."}}

