glossary:
  - {id: bmb830.term.mean, term: {"es": "media", "en": "mean", "da": "mean"}, definition: {"es": "Suma dividida por n.", "en": "Sum divided by n.", "da": "Sum divideret med n."}}
  - {id: bmb830.term.median, term: {"es": "mediana", "en": "median", "da": "median"}, definition: {"es": "Valor central de los datos ordenados.", "en": "Middle value of ordered data.", "da": "Midterværdi i sorterede data."}}
  - {id: bmb830.term.standard_deviation, term: {"es": "desviación estándar", "en": "standard deviation", "da": "standardafvigelse"}, definition: {"es": "Escala de dispersión alrededor de la media.", "en": "Scale of spread around the mean.", "da": "Skala for spredning omkring mean."}}
  - {id: bmb830.term.iqr, term: {"es": "rango intercuartílico", "en": "interquartile range", "da": "interkvartilafstand"}, definition: {"es": "Diferencia Q3-Q1.", "en": "Difference Q3-Q1.", "da": "Forskellen Q3-Q1."}}
  - {id: bmb830.term.ecdf, term: {"es": "función de distribución empírica", "en": "empirical cumulative distribution function", "da": "empirisk fordelingsfunktion"}, definition: {"es": "Proporción observada menor o igual a cada valor.", "en": "Observed proportion at or below each value.", "da": "Observeret proportion ved eller under hver værdi."}}
  - {id: bmb830.term.skewness, term: {"es": "asimetría", "en": "skewness", "da": "skævhed"}, definition: {"es": "Falta de simetría de una distribución.", "en": "Lack of symmetry in a distribution.", "da": "Manglende symmetri i en fordeling."}}
  - {id: bmb830.term.outlier, term: {"es": "valor extremo", "en": "outlier", "da": "outlier"}, definition: {"es": "Observación inusual respecto a un patrón o regla.", "en": "Observation unusual relative to a pattern or rule.", "da": "Observation usædvanlig i forhold til et mønster eller en regel."}}
  - {id: bmb830.term.log_scale, term: {"es": "escala logarítmica", "en": "logarithmic scale", "da": "logaritmisk skala"}, definition: {"es": "Escala donde distancias iguales representan razones iguales.", "en": "Scale where equal distances represent equal ratios.", "da": "Skala hvor lige afstande repræsenterer lige ratios."}}
  - {id: bmb830.term.stratification, term: {"es": "estratificación", "en": "stratification", "da": "stratifikation"}, definition: {"es": "Separación del análisis por niveles de una variable.", "en": "Separating analysis by levels of a variable.", "da": "Opdeling af analyse efter niveauer af en variabel."}}
  - {id: bmb830.term.simpson, term: {"es": "paradoja de Simpson", "en": "Simpson's paradox", "da": "Simpsons paradoks"}, definition: {"es": "Cambio o inversión de asociación entre análisis agregado y estratificado.", "en": "Change or reversal between aggregate and stratified association.", "da": "Ændring eller inversion mellem aggregeret og stratificeret association."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Pregunta primero qué variable, unidad y comparación se quieren mostrar. Después selecciona resumen y gráfico.
      Exige distribución, n, unidades, escala, missingness y dependencia antes de interpretar.
    en: >-
      First ask which variable, unit, and comparison should be shown. Then select summary and plot.
      Require distribution, n, units, scale, missingness, and dependence before interpretation.
    da: >-
      Spørg først hvilken variabel, enhed og sammenligning der skal vises. Vælg derefter summary og plot.
  misconceptions:
    - mean_is_always_best
    - median_is_always_best
    - SD_equals_SE
    - boxplot_outlier_equals_error
    - barplot_of_means_is_complete
    - aggregate_trend_applies_to_each_stratum
  socratic_questions:
    - What aspect does the chosen summary represent?
    - What does one point or bar represent?
    - Are denominators and sample sizes visible?
    - Could aggregation hide subgroup structure?
    - Does the axis or transformation change interpretation?
  grading_criteria:
    - align plot with variable type and study unit
    - describe center, spread, and shape
    - disclose n, units, scales, and uncertainty
    - avoid unjustified deletion of extremes
    - recognize aggregation and stratification issues
  retrieval_fragments:
    - {id: bmb830.m04.r01, topic: summaries, text: {"es": "Media y SD resumen balance y dispersión; mediana e IQR resumen orden y centro robusto.", "en": "Mean and SD summarize balance and spread; median and IQR summarize order and robust center.", "da": "Mean og SD opsummerer balance og spredning; median og IQR robust center."}}
    - {id: bmb830.m04.r02, topic: plotting, text: {"es": "Muestra observaciones individuales cuando n y legibilidad lo permitan.", "en": "Show individual observations when n and readability permit.", "da": "Vis individuelle observationer når n og læsbarhed tillader det."}}
    - {id: bmb830.m04.r03, topic: outlier, text: {"es": "Un extremo se investiga y se somete a sensibilidad; no se elimina por regla gráfica.", "en": "Investigate an extreme and assess sensitivity; do not delete it by plotting rule.", "da": "Undersøg en ekstrem værdi og lav følsomhedsanalyse; slet ikke efter grafisk regel."}}
    - {id: bmb830.m04.r04, topic: scale, text: {"es": "Escalas y transformaciones deben declararse porque cambian percepción e interpretación.", "en": "Scales and transformations must be declared because they change perception and interpretation.", "da": "Skalaer og transformationer skal deklareres fordi de ændrer perception og fortolkning."}}
    - {id: bmb830.m04.r05, topic: aggregation, text: {"es": "Una tendencia agregada puede ocultar o invertir tendencias por estrato.", "en": "An aggregate trend may hide or reverse stratum-specific trends.", "da": "En aggregeret trend kan skjule eller vende trends i strata."}}

