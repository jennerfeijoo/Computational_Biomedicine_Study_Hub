glossary:
  - {id: bmb830.term.sample_space, term: {"es": "espacio muestral", "en": "sample space", "da": "udfaldsrum"}, definition: {"es": "Conjunto de resultados posibles.", "en": "Set of possible outcomes.", "da": "Mængde af mulige udfald."}}
  - {id: bmb830.term.conditional_probability, term: {"es": "probabilidad condicional", "en": "conditional probability", "da": "betinget sandsynlighed"}, definition: {"es": "Probabilidad restringida a que otro evento ocurrió.", "en": "Probability restricted to another event having occurred.", "da": "Sandsynlighed betinget på en anden hændelse."}}
  - {id: bmb830.term.independence, term: {"es": "independencia", "en": "independence", "da": "uafhængighed"}, definition: {"es": "Conocer un evento no cambia la probabilidad del otro.", "en": "Knowing one event does not change the probability of the other.", "da": "Viden om én hændelse ændrer ikke sandsynligheden for den anden."}}
  - {id: bmb830.term.expectation, term: {"es": "esperanza", "en": "expectation", "da": "forventning"}, definition: {"es": "Promedio ponderado por probabilidades.", "en": "Probability-weighted average.", "da": "Sandsynlighedsvægtet gennemsnit."}}
  - {id: bmb830.term.variance, term: {"es": "varianza", "en": "variance", "da": "varians"}, definition: {"es": "Esperanza de la desviación cuadrática respecto a la media.", "en": "Expected squared deviation from the mean.", "da": "Forventet kvadratisk afvigelse fra mean."}}
  - {id: bmb830.term.bernoulli, term: {"es": "Bernoulli", "en": "Bernoulli", "da": "Bernoulli"}, definition: {"es": "Distribución de un resultado binario.", "en": "Distribution of one binary outcome.", "da": "Fordeling for ét binært udfald."}}
  - {id: bmb830.term.binomial, term: {"es": "binomial", "en": "binomial", "da": "binomial"}, definition: {"es": "Conteo de éxitos en n ensayos Bernoulli bajo supuestos comunes.", "en": "Count of successes in n Bernoulli trials under common assumptions.", "da": "Antal successer i n Bernoulli-forsøg under fælles antagelser."}}
  - {id: bmb830.term.poisson, term: {"es": "Poisson", "en": "Poisson", "da": "Poisson"}, definition: {"es": "Modelo de conteos por exposición con tasa constante aproximada.", "en": "Count model over exposure with approximately constant rate.", "da": "Count-model over exposure med omtrent konstant rate."}}
  - {id: bmb830.term.overdispersion, term: {"es": "sobre-dispersión", "en": "overdispersion", "da": "overdispersion"}, definition: {"es": "Variabilidad mayor que la esperada por el modelo.", "en": "Variability larger than expected under the model.", "da": "Variation større end forventet under modellen."}}
  - {id: bmb830.term.memoryless, term: {"es": "sin memoria", "en": "memoryless", "da": "memoryless"}, definition: {"es": "La distribución de espera restante no depende de la espera ya transcurrida.", "en": "Remaining waiting distribution does not depend on elapsed waiting.", "da": "Resterende ventetid afhænger ikke af allerede forløbet ventetid."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Para elegir distribución pregunta: ¿es binario, conteo, proporción, medida continua o tiempo? ¿Hay n o exposición?
      ¿Las unidades son independientes? ¿La tasa o p puede variar? Después conecta soporte, media-varianza y mecanismo.
    en: >-
      To choose a distribution ask: binary, count, proportion, continuous measurement, or waiting time? Is there a denominator
      or exposure? Are units independent? Can rate or p vary? Then connect support, mean-variance, and mechanism.
    da: >-
      Ved valg af fordeling: spørg om outcome-type, denominator eller exposure, uafhængighed og heterogenitet.
  misconceptions:
    - disjoint_equals_independent
    - sensitivity_equals_PPV
    - expectation_must_be_observable
    - binomial_rows_are_always_independent
    - poisson_count_equals_rate
    - normal_is_default_for_all_continuous_data
  socratic_questions:
    - What is the sample space and conditioning event?
    - What denominator defines this probability or proportion?
    - What mechanism would produce the count or waiting time?
    - Is variance consistent with the proposed model?
    - Could clustering or heterogeneous probabilities break independence?
  grading_criteria:
    - use correct conditioning and denominators
    - distinguish independence and exclusivity
    - connect distributions to mechanisms
    - interpret expectation and variance in units
    - identify overdispersion and dependence
  retrieval_fragments:
    - {id: bmb830.m05.r01, topic: bayes, text: {"es": "PPV depende de sensibilidad, especificidad y prevalencia.", "en": "PPV depends on sensitivity, specificity, and prevalence.", "da": "PPV afhænger af sensitivitet, specificitet og prævalens."}}
    - {id: bmb830.m05.r02, topic: binomial, text: {"es": "Binomial requiere n fijo, p común e independencia condicional.", "en": "Binomial requires fixed n, common p, and conditional independence.", "da": "Binomial kræver fast n, fælles p og betinget uafhængighed."}}
    - {id: bmb830.m05.r03, topic: poisson, text: {"es": "Poisson modela counts sobre exposición; media y varianza son λ bajo el modelo simple.", "en": "Poisson models counts over exposure; mean and variance equal λ in the simple model.", "da": "Poisson modellerer counts over exposure; mean og varians er λ."}}
    - {id: bmb830.m05.r04, topic: normal, text: {"es": "La normalidad relevante suele ser condicional o del estimador, no necesariamente del outcome bruto.", "en": "Relevant normality is often conditional or about an estimator, not necessarily the raw outcome.", "da": "Relevant normalitet er ofte betinget eller for estimatoren, ikke raw outcome."}}
    - {id: bmb830.m05.r05, topic: mechanism, text: {"es": "Elige distribución por soporte, mecanismo, exposición y dependencia, no sólo por forma visual.", "en": "Choose distributions by support, mechanism, exposure, and dependence, not visual shape alone.", "da": "Vælg fordeling efter support, mekanisme, exposure og afhængighed, ikke kun visuel form."}}

