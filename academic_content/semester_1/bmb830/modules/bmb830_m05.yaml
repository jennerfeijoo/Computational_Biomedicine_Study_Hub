schema_version: 1.0.0
course_code: BMB830
module_id: bmb830.m05
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: "Probabilidad, variables aleatorias y distribuciones biológicas"
    en: "Probability, random variables, and biological distributions"
    da: "Sandsynlighed, stokastiske variable og biologiske fordelinger"
  summary:
    es: >-
      Fundamentos de probabilidad para modelar incertidumbre biológica. Se cubren eventos, probabilidad
      condicional, independencia, regla de Bayes, variables aleatorias, esperanza, varianza, distribuciones
      Bernoulli, binomial, Poisson, normal y exponencial, simulación en R y elección de modelos a partir
      del mecanismo generador, soporte, escala temporal y estructura de dependencia.
    en: >-
      Probability foundations for modeling biological uncertainty. Events, conditional probability,
      independence, Bayes' rule, random variables, expectation, variance, Bernoulli, binomial, Poisson,
      normal, and exponential distributions, simulation in R, and model choice from data-generating
      mechanism, support, time scale, and dependence structure are covered.
    da: >-
      Sandsynlighedsgrundlag til biologisk usikkerhed: hændelser, betinget sandsynlighed, uafhængighed,
      Bayes' regel, stokastiske variable, forventning, varians og centrale fordelinger.
  estimated_study_hours: 13
  difficulty: intermediate

alignment:
  official_learning_outcomes: [bmb830.lo01, bmb830.lo05]
  prerequisite_modules: [bmb830.m01, bmb830.m04]
  later_modules: [bmb830.m06, bmb830.m07, bmb830.m08, bmb830.m09, bmb830.m10, dm847.m04, dm847.m06, dm847.m10]

objectives:
  - {id: bmb830.m05.o01, text: {"es": "Definir espacio muestral, evento y probabilidad", "en": "Define sample space, event, and probability", "da": "Definere udfaldsrum, hændelse og sandsynlighed"}}
  - {id: bmb830.m05.o02, text: {"es": "Calcular probabilidades conjuntas y condicionales", "en": "Calculate joint and conditional probabilities", "da": "Beregne fælles og betingede sandsynligheder"}}
  - {id: bmb830.m05.o03, text: {"es": "Distinguir independencia de exclusión mutua", "en": "Distinguish independence from mutual exclusivity", "da": "Skelne uafhængighed fra gensidig udelukkelse"}}
  - {id: bmb830.m05.o04, text: {"es": "Aplicar la regla de Bayes a pruebas diagnósticas", "en": "Apply Bayes' rule to diagnostic testing", "da": "Anvende Bayes' regel på diagnostiske tests"}}
  - {id: bmb830.m05.o05, text: {"es": "Interpretar variables aleatorias, esperanza y varianza", "en": "Interpret random variables, expectation, and variance", "da": "Fortolke stokastiske variable, forventning og varians"}}
  - {id: bmb830.m05.o06, text: {"es": "Seleccionar distribuciones básicas según mecanismo y soporte", "en": "Select basic distributions by mechanism and support", "da": "Vælge grundlæggende fordelinger efter mekanisme og support"}}
  - {id: bmb830.m05.o07, text: {"es": "Simular distribuciones y comprobar propiedades en R", "en": "Simulate distributions and check properties in R", "da": "Simulere fordelinger og kontrollere egenskaber i R"}}
  - {id: bmb830.m05.o08, text: {"es": "Reconocer sobre-dispersión, dependencia y violaciones del modelo", "en": "Recognize overdispersion, dependence, and model violations", "da": "Genkende overdispersion, afhængighed og modelbrud"}}

concepts:
  - id: bmb830.m05.c01
    title: {"es": "Eventos y reglas básicas", "en": "Events and basic rules", "da": "Hændelser og grundregler"}
    body:
      es: >-
        Un espacio muestral contiene resultados posibles y un evento es un subconjunto. La probabilidad es no negativa,
        suma uno sobre el espacio y es aditiva para eventos disjuntos. El complemento cumple P(A^c)=1-P(A). La unión
        general usa P(A∪B)=P(A)+P(B)-P(A∩B), evitando contar dos veces la intersección.
      en: >-
        A sample space contains possible outcomes and an event is a subset. Probability is non-negative, sums to one over
        the space, and is additive for disjoint events. Complements satisfy P(A^c)=1-P(A). General unions subtract the intersection.
      da: >-
        Udfaldsrummet indeholder mulige udfald; en hændelse er en delmængde. Sandsynligheder er ikke-negative og summerer til én.
    key_points:
      - {"es": "Disjuntos no significa independientes", "en": "Disjoint does not mean independent", "da": "Disjunkte betyder ikke uafhængige"}
  - id: bmb830.m05.c02
    title: {"es": "Probabilidad condicional e independencia", "en": "Conditional probability and independence", "da": "Betinget sandsynlighed og uafhængighed"}
    body:
      es: >-
        P(A|B)=P(A∩B)/P(B) actualiza el universo a casos donde B ocurrió. A y B son independientes si P(A∩B)=P(A)P(B),
        equivalente a que conocer B no cambie P(A), cuando las probabilidades son positivas. Eventos mutuamente excluyentes
        con probabilidad positiva no son independientes porque la ocurrencia de uno impide el otro.
      en: >-
        P(A|B)=P(A∩B)/P(B) restricts the universe to cases where B occurred. A and B are independent if P(A∩B)=P(A)P(B).
        Positive-probability mutually exclusive events are not independent because one prevents the other.
      da: >-
        Betinget sandsynlighed begrænser universet til B. Uafhængighed betyder at viden om B ikke ændrer sandsynligheden for A.
    key_points:
      - {"es": "Independencia es una propiedad del modelo o diseño", "en": "Independence is a model or design property", "da": "Uafhængighed er en model- eller designegenskab"}
  - id: bmb830.m05.c03
    title: {"es": "Regla de Bayes y valor predictivo", "en": "Bayes' rule and predictive value", "da": "Bayes' regel og prædiktiv værdi"}
    body:
      es: >-
        Bayes combina verosimilitud con prevalencia previa. En una prueba binaria, sensibilidad y especificidad no determinan por sí solas
        el valor predictivo positivo; éste depende de prevalencia. En enfermedades raras, incluso una prueba específica puede generar muchos
        falsos positivos respecto a verdaderos positivos. La interpretación debe usar conteos o probabilidades absolutas.
      en: >-
        Bayes combines likelihood with prior prevalence. In binary testing, sensitivity and specificity do not alone determine positive predictive value;
        prevalence matters. In rare disease, even a specific test may yield many false positives relative to true positives.
      da: >-
        Bayes kombinerer likelihood med prævalens. Positiv prædiktiv værdi afhænger af prævalens, ikke kun sensitivitet og specificitet.
    key_points:
      - {"es": "Sensibilidad no es P(enfermedad|positivo)", "en": "Sensitivity is not P(disease|positive)", "da": "Sensitivitet er ikke P(sygdom|positiv)"}
  - id: bmb830.m05.c04
    title: {"es": "Variables aleatorias, esperanza y varianza", "en": "Random variables, expectation, and variance", "da": "Stokastiske variable, forventning og varians"}
    body:
      es: >-
        Una variable aleatoria asigna un número a cada resultado. La esperanza es un promedio ponderado a largo plazo, no necesariamente un valor posible.
        La varianza E[(X-E[X])²] mide dispersión cuadrática y la SD devuelve unidades originales. Para constantes a,b,
        E[a+bX]=a+bE[X]; Var(a+bX)=b²Var(X). La varianza de una suma incluye covarianzas salvo independencia.
      en: >-
        A random variable assigns a number to each outcome. Expectation is a probability-weighted long-run average and need not be attainable.
        Variance measures squared spread; SD returns original units. Variance of a sum includes covariance unless independence applies.
      da: >-
        En stokastisk variabel tildeler tal til udfald. Forventning er et vægtet langtidsmiddel; varians måler kvadratisk spredning.
    key_points:
      - {"es": "E[X+Y]=E[X]+E[Y] sin requerir independencia", "en": "E[X+Y]=E[X]+E[Y] without independence", "da": "E[X+Y]=E[X]+E[Y] uden uafhængighed"}
  - id: bmb830.m05.c05
    title: {"es": "Bernoulli y binomial", "en": "Bernoulli and binomial", "da": "Bernoulli og binomial"}
    body:
      es: >-
        Bernoulli modela un ensayo binario con probabilidad p. Binomial cuenta éxitos en n ensayos Bernoulli con n fijo,
        misma p e independencia condicional. Su media es np y varianza np(1-p). Si las probabilidades difieren o hay agrupación,
        la binomial simple puede subestimar variabilidad.
      en: >-
        Bernoulli models one binary trial with probability p. Binomial counts successes in n trials with fixed n, common p,
        and conditional independence. Mean is np and variance np(1-p). Heterogeneous probabilities or clustering may cause extra variation.
      da: >-
        Bernoulli modellerer ét binært forsøg. Binomial tæller successer i n forsøg med fast n, fælles p og uafhængighed.
    key_points:
      - {"es": "Binomial requiere un denominador n definido", "en": "Binomial requires a defined denominator n", "da": "Binomial kræver en defineret denominator n"}
  - id: bmb830.m05.c06
    title: {"es": "Poisson y tasas", "en": "Poisson counts and rates", "da": "Poisson-counts og rater"}
    body:
      es: >-
        Poisson modela conteos de eventos en una exposición fija bajo tasa constante e independencia aproximada; media y varianza son λ.
        Si exposiciones difieren, se modela tasa mediante un offset. Sobre-dispersión (varianza mayor que media) puede surgir por heterogeneidad,
        agrupación o exceso de ceros, indicando que Poisson simple es insuficiente.
      en: >-
        Poisson models event counts over fixed exposure under an approximately constant rate and independence; mean and variance are λ.
        Unequal exposures require rate modeling with an offset. Overdispersion can arise from heterogeneity, clustering, or excess zeros.
      da: >-
        Poisson modellerer counts over fast exposure med omtrent konstant rate. Overdispersion kan skyldes heterogenitet eller clustering.
    key_points:
      - {"es": "Conteo y tasa no son intercambiables sin exposición", "en": "Count and rate are not interchangeable without exposure", "da": "Count og rate kan ikke udskiftes uden exposure"}
  - id: bmb830.m05.c07
    title: {"es": "Normal y teorema del límite central", "en": "Normal distribution and central-limit reasoning", "da": "Normalfordeling og central-limit-ræsonnering"}
    body:
      es: >-
        La normal es continua, simétrica y determinada por media y SD. Puede aproximar mediciones generadas por muchos efectos pequeños o distribuciones
        de ciertos estimadores, pero no debe asumirse por costumbre. Datos acotados, muy sesgados, multimodales o con colas pesadas pueden requerir
        otra escala o modelo. Normalidad de residuos es distinta de normalidad del outcome bruto.
      en: >-
        The normal is continuous, symmetric, and determined by mean and SD. It may approximate measurements produced by many small effects or sampling
        distributions of estimators, but should not be assumed by habit. Residual normality differs from raw-outcome normality.
      da: >-
        Normalfordelingen er kontinuert og symmetrisk og bestemmes af mean og SD. Den bør ikke antages mekanisk.
    key_points:
      - {"es": "Un QQ plot evalúa forma, no independencia", "en": "A QQ plot assesses shape, not independence", "da": "Et QQ-plot vurderer form, ikke uafhængighed"}
  - id: bmb830.m05.c08
    title: {"es": "Exponencial, tiempos y memoria nula", "en": "Exponential waiting times and memorylessness", "da": "Eksponentielle ventetider og memorylessness"}
    body:
      es: >-
        La exponencial modela tiempo hasta el próximo evento en un proceso Poisson homogéneo. Tiene soporte no negativo y propiedad sin memoria:
        la espera adicional no depende de cuánto se ha esperado. Muchos procesos biológicos presentan envejecimiento, heterogeneidad o riesgos cambiantes,
        por lo que esta propiedad debe justificarse y no inferirse sólo por una forma sesgada.
      en: >-
        The exponential models time to the next event in a homogeneous Poisson process. It is non-negative and memoryless.
        Biological waiting times may show aging, heterogeneity, or changing hazards, so memorylessness requires justification.
      da: >-
        Eksponentialfordelingen modellerer ventetid i en homogen Poisson-proces og er memoryless. Biologiske processer kan bryde denne antagelse.
    key_points:
      - {"es": "Distribución se elige por mecanismo, no sólo por histograma", "en": "Distribution choice follows mechanism, not histogram alone", "da": "Fordeling vælges efter mekanisme, ikke kun histogram"}

worked_examples:
  - id: bmb830.m05.e01
    example_kind: r_code
    language: r
    code: |-
      prevalence <- 0.01
      sensitivity <- 0.90
      specificity <- 0.95
      ppv <- sensitivity * prevalence /
        (sensitivity * prevalence + (1 - specificity) * (1 - prevalence))
      round(ppv, 3)
    expected_output: |-
      [1] 0.154
    output_kind: console
    title: {"es": "Valor predictivo en evento raro", "en": "Predictive value for a rare event", "da": "Prædiktiv værdi ved sjælden hændelse"}
    problem: {"es": "Prevalencia 1%, sensibilidad 90% y especificidad 95%.", "en": "Prevalence 1%, sensitivity 90%, specificity 95%.", "da": "Prævalens 1%, sensitivitet 90% og specificitet 95%."}
    reasoning: {"es": "En 10,000 personas se esperan 90 verdaderos positivos y 495 falsos positivos; PPV≈15.4%.", "en": "Among 10,000 people expect 90 true positives and 495 false positives; PPV≈15.4%.", "da": "Blandt 10.000 forventes 90 sande positive og 495 falske positive; PPV≈15,4%."}
    answer: {"es": "Un positivo no implica 90% de probabilidad de enfermedad.", "en": "A positive result does not imply 90% disease probability.", "da": "Et positivt resultat betyder ikke 90% sygdomssandsynlighed."}
  - id: bmb830.m05.e02
    title: {"es": "Binomial con dependencia", "en": "Binomial with dependence", "da": "Binomial med afhængighed"}
    problem: {"es": "Se cuentan células positivas entre 100 células del mismo paciente.", "en": "Positive cells are counted among 100 cells from one patient.", "da": "Positive celler tælles blandt 100 celler fra én patient."}
    reasoning: {"es": "Las células pueden compartir microambiente y estado; la independencia binomial puede fallar y la varianza real superar np(1-p).", "en": "Cells may share microenvironment and state; binomial independence may fail and variance exceed np(1-p).", "da": "Celler kan dele miljø; binomial uafhængighed kan brydes og varians overstige np(1-p)."}
    answer: {"es": "Evaluar agrupación o modelo beta-binomial/hierárquico en niveles posteriores.", "en": "Assess clustering or a beta-binomial/hierarchical model in later coursework.", "da": "Vurder clustering eller beta-binomial/hierarkisk model senere."}
  - id: bmb830.m05.e03
    example_kind: r_code
    language: r
    code: |-
      events <- c(lab_a = 20, lab_b = 30)
      hours <- c(lab_a = 100, lab_b = 300)
      round(100 * events / hours, 1)
    expected_output: |-
      lab_a lab_b
       20.0  10.0
    output_kind: table
    title: {"es": "Poisson con exposiciones distintas", "en": "Poisson with unequal exposure", "da": "Poisson med forskellig exposure"}
    problem: {"es": "Dos laboratorios reportan 20 y 30 eventos, pero observaron 100 y 300 horas.", "en": "Two labs report 20 and 30 events over 100 and 300 hours.", "da": "To laboratorier rapporterer 20 og 30 events over 100 og 300 timer."}
    reasoning: {"es": "Comparar conteos sugiere más en el segundo, pero tasas son 0.20 y 0.10 por hora. Debe incluirse exposición.", "en": "Counts suggest more in the second, but rates are 0.20 and 0.10 per hour. Exposure must be included.", "da": "Counts antyder mere i andet laboratorium, men rater er 0,20 og 0,10 per time; exposure skal med."}
    answer: {"es": "Comparar tasas o usar offset log(exposición).", "en": "Compare rates or use log-exposure as offset.", "da": "Sammenlign rater eller brug log(exposure) som offset."}

guided_practice:
  - {id: bmb830.m05.p01, type: probability_table, prompt: {"es": "Calcula marginales, conjuntas y condicionales de una tabla diagnóstica.", "en": "Calculate marginal, joint, and conditional probabilities from a diagnostic table.", "da": "Beregn marginale, fælles og betingede sandsynligheder fra en diagnostisk tabel."}, expected_elements: [denominator_choice, sensitivity, specificity, PPV, NPV]}
  - {id: bmb830.m05.p02, type: independence, prompt: {"es": "Decide si cinco pares de eventos son independientes, disjuntos o ninguno.", "en": "Decide whether five event pairs are independent, disjoint, or neither.", "da": "Afgør om fem hændelsespar er uafhængige, disjunkte eller ingen af delene."}, expected_elements: [intersection, product_rule, conditional_probability]}
  - {id: bmb830.m05.p03, type: expectation, prompt: {"es": "Calcula esperanza y varianza de una variable discreta.", "en": "Calculate expectation and variance of a discrete variable.", "da": "Beregn forventning og varians af en diskret variabel."}, expected_elements: [probability_weighting, squared_deviation, units]}
  - {id: bmb830.m05.p04, type: distribution_selection, prompt: {"es": "Elige distribución para ocho mecanismos biológicos y justifica supuestos.", "en": "Choose distributions for eight biological mechanisms and justify assumptions.", "da": "Vælg fordelinger til otte biologiske mekanismer og begrund antagelser."}, expected_elements: [support, denominator_or_exposure, dependence, rate_or_probability]}
  - {id: bmb830.m05.p05, type: simulation, prompt: {"es": "Simula Bernoulli, binomial, Poisson y normal en R y compara media/varianza empíricas.", "en": "Simulate Bernoulli, binomial, Poisson, and normal data in R and compare empirical mean/variance.", "da": "Simulér Bernoulli, binomial, Poisson og normal i R og sammenlign empirisk mean/varians."}, expected_elements: [set_seed, r_functions, convergence_not_exact_equality]}
  - {id: bmb830.m05.p06, type: model_critique, prompt: {"es": "Audita sobre-dispersión y dependencia en un modelo Poisson o binomial.", "en": "Audit overdispersion and dependence in a Poisson or binomial model.", "da": "Auditér overdispersion og afhængighed i en Poisson- eller binomialmodel."}, expected_elements: [mean_variance_check, clustering, alternative_model_or_robustness]}

objective_bank:
  - {id: bmb830.m05.q01, type: multiple_choice, prompt: {"es": "Si A y B son independientes, ¿qué se cumple?", "en": "If A and B are independent, what holds?", "da": "Hvis A og B er uafhængige, hvad gælder?"}, options: [{id: a, text: {"es": "P(A∩B)=P(A)P(B)", "en": "P(A∩B)=P(A)P(B)", "da": "P(A∩B)=P(A)P(B)"}}, {id: b, text: {"es": "P(A∩B)=0 siempre", "en": "P(A∩B)=0 always", "da": "P(A∩B)=0 altid"}}, {id: c, text: {"es": "P(A)=P(B)", "en": "P(A)=P(B)", "da": "P(A)=P(B)"}}], correct_option_ids: [a], explanation: {"es": "Es la definición multiplicativa de independencia.", "en": "This is the product definition of independence.", "da": "Det er produktdefinitionen af uafhængighed."}}
  - {id: bmb830.m05.q02, type: true_false, prompt: {"es": "Eventos disjuntos con probabilidad positiva son independientes.", "en": "Positive-probability disjoint events are independent.", "da": "Disjunkte hændelser med positiv sandsynlighed er uafhængige."}, correct: false, explanation: {"es": "Si ocurre uno, el otro no puede ocurrir.", "en": "If one occurs, the other cannot.", "da": "Hvis den ene sker, kan den anden ikke ske."}}
  - {id: bmb830.m05.q03, type: multiple_choice, prompt: {"es": "¿De qué depende PPV además de sensibilidad y especificidad?", "en": "What does PPV depend on besides sensitivity and specificity?", "da": "Hvad afhænger PPV af ud over sensitivitet og specificitet?"}, options: [{id: a, text: {"es": "prevalencia", "en": "prevalence", "da": "prævalens"}}, {id: b, text: {"es": "color del test", "en": "test color", "da": "testens farve"}}, {id: c, text: {"es": "nombre del hospital", "en": "hospital name", "da": "hospitalets navn"}}], correct_option_ids: [a], explanation: {"es": "Bayes incorpora la probabilidad previa.", "en": "Bayes incorporates prior probability.", "da": "Bayes inkluderer prior-sandsynlighed."}}
  - {id: bmb830.m05.q04, type: true_false, prompt: {"es": "Sensibilidad es P(enfermedad|test positivo).", "en": "Sensitivity is P(disease|positive test).", "da": "Sensitivitet er P(sygdom|positiv test)."}, correct: false, explanation: {"es": "Sensibilidad es P(test positivo|enfermedad).", "en": "Sensitivity is P(positive test|disease).", "da": "Sensitivitet er P(positiv test|sygdom)."}}
  - {id: bmb830.m05.q05, type: multiple_choice, prompt: {"es": "Media y varianza de Binomial(n,p).", "en": "Mean and variance of Binomial(n,p).", "da": "Mean og varians for Binomial(n,p)."}, options: [{id: a, text: {"es": "np y np(1-p)", "en": "np and np(1-p)", "da": "np og np(1-p)"}}, {id: b, text: {"es": "p y n", "en": "p and n", "da": "p og n"}}, {id: c, text: {"es": "n² y p²", "en": "n² and p²", "da": "n² og p²"}}], correct_option_ids: [a], explanation: {"es": "Son las propiedades binomiales estándar.", "en": "These are standard binomial properties.", "da": "Det er standard binomialegenskaber."}}
  - {id: bmb830.m05.q06, type: true_false, prompt: {"es": "Poisson simple supone media igual a varianza.", "en": "Simple Poisson assumes mean equals variance.", "da": "Simpel Poisson antager mean lig varians."}, correct: true, explanation: {"es": "Ambas son λ bajo el modelo.", "en": "Both equal λ under the model.", "da": "Begge er λ under modellen."}}
  - {id: bmb830.m05.q07, type: multiple_choice, prompt: {"es": "¿Qué necesita una comparación de tasas con exposiciones distintas?", "en": "What is needed to compare rates with unequal exposure?", "da": "Hvad kræves for at sammenligne rater med forskellig exposure?"}, options: [{id: a, text: {"es": "incluir exposición u offset", "en": "include exposure or offset", "da": "inkludere exposure eller offset"}}, {id: b, text: {"es": "ignorar tiempo", "en": "ignore time", "da": "ignorere tid"}}, {id: c, text: {"es": "convertir a categorías", "en": "convert to categories", "da": "konvertere til kategorier"}}], correct_option_ids: [a], explanation: {"es": "Conteos deben ajustarse por oportunidad de ocurrencia.", "en": "Counts must account for opportunity to occur.", "da": "Counts skal tage højde for mulighed for hændelser."}}
  - {id: bmb830.m05.q08, type: true_false, prompt: {"es": "Normalidad del outcome bruto es requisito universal de modelos lineales.", "en": "Raw outcome normality is a universal requirement of linear models.", "da": "Normalitet af raw outcome er et universelt krav i lineære modeller."}, correct: false, explanation: {"es": "Los supuestos se refieren principalmente a errores condicionales y estructura del modelo.", "en": "Assumptions mainly concern conditional errors and model structure.", "da": "Antagelser vedrører primært betingede fejl og modelstruktur."}}
  - {id: bmb830.m05.q09, type: multiple_choice, prompt: {"es": "Propiedad distintiva de exponencial.", "en": "Distinctive property of the exponential distribution.", "da": "Særkende ved eksponentialfordelingen."}, options: [{id: a, text: {"es": "sin memoria", "en": "memoryless", "da": "memoryless"}}, {id: b, text: {"es": "soporte negativo ilimitado", "en": "unlimited negative support", "da": "ubegrænset negativ support"}}, {id: c, text: {"es": "dos modos obligatorios", "en": "necessarily bimodal", "da": "nødvendigvis bimodal"}}], correct_option_ids: [a], explanation: {"es": "La espera adicional no depende del tiempo ya esperado.", "en": "Additional waiting does not depend on elapsed waiting.", "da": "Yderligere ventetid afhænger ikke af allerede ventet tid."}}
  - {id: bmb830.m05.q10, type: true_false, prompt: {"es": "La distribución debe elegirse sólo por parecido visual del histograma.", "en": "Distribution choice should rely only on histogram appearance.", "da": "Fordeling bør vælges kun efter histogrammets udseende."}, correct: false, explanation: {"es": "Deben considerarse mecanismo, soporte, exposición y dependencia.", "en": "Mechanism, support, exposure, and dependence must be considered.", "da": "Mekanisme, support, exposure og afhængighed skal overvejes."}}

open_assessment:
  - id: bmb830.m05.a01
    prompt: {"es": "Resuelve e interpreta un problema de Bayes con una prueba biomédica.", "en": "Solve and interpret a Bayes problem for a biomedical test.", "da": "Løs og fortolk et Bayes-problem for en biomedicinsk test."}
