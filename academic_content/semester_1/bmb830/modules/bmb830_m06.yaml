glossary:
  - {id: bmb830.term.parameter, term: {"es": "parámetro", "en": "parameter", "da": "parameter"}, definition: {"es": "Cantidad fija del proceso o población.", "en": "Fixed quantity of a process or population.", "da": "Fast størrelse i en proces eller population."}}
  - {id: bmb830.term.statistic, term: {"es": "estadístico", "en": "statistic", "da": "statistik"}, definition: {"es": "Función de los datos muestrales.", "en": "Function of sample data.", "da": "Funktion af sampledata."}}
  - {id: bmb830.term.sampling_distribution, term: {"es": "distribución muestral", "en": "sampling distribution", "da": "samplingfordeling"}, definition: {"es": "Distribución de un estadístico bajo repetición del diseño.", "en": "Distribution of a statistic under repeated design.", "da": "Fordeling af en statistik under gentaget design."}}
  - {id: bmb830.term.bias, term: {"es": "sesgo", "en": "bias", "da": "bias"}, definition: {"es": "Diferencia entre esperanza del estimador y parámetro.", "en": "Difference between estimator expectation and parameter.", "da": "Forskellen mellem estimatorens forventning og parameteren."}}
  - {id: bmb830.term.standard_error, term: {"es": "error estándar", "en": "standard error", "da": "standard error"}, definition: {"es": "SD de la distribución muestral de un estimador.", "en": "SD of an estimator's sampling distribution.", "da": "SD for estimatorens samplingfordeling."}}
  - {id: bmb830.term.mse, term: {"es": "error cuadrático medio", "en": "mean squared error", "da": "mean squared error"}, definition: {"es": "Varianza más sesgo al cuadrado.", "en": "Variance plus squared bias.", "da": "Varians plus bias i anden."}}
  - {id: bmb830.term.confidence_interval, term: {"es": "intervalo de confianza", "en": "confidence interval", "da": "konfidensinterval"}, definition: {"es": "Intervalo producido por un procedimiento con cobertura repetida nominal.", "en": "Interval produced by a procedure with nominal repeated coverage.", "da": "Interval fra en procedure med nominel gentagen dækning."}}
  - {id: bmb830.term.coverage, term: {"es": "cobertura", "en": "coverage", "da": "dækning"}, definition: {"es": "Proporción de repeticiones cuyos intervalos contienen el parámetro.", "en": "Proportion of repeated intervals containing the parameter.", "da": "Proportion af gentagne intervaller der indeholder parameteren."}}
  - {id: bmb830.term.bootstrap, term: {"es": "bootstrap", "en": "bootstrap", "da": "bootstrap"}, definition: {"es": "Aproximación por remuestreo con reemplazo desde datos observados.", "en": "Approximation by resampling observed data with replacement.", "da": "Approksimation ved resampling af observerede data med replacement."}}
  - {id: bmb830.term.percentile_interval, term: {"es": "intervalo percentil", "en": "percentile interval", "da": "percentilinterval"}, definition: {"es": "Intervalo basado en cuantiles de estimaciones bootstrap.", "en": "Interval based on quantiles of bootstrap estimates.", "da": "Interval baseret på kvantiler af bootstrap-estimater."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Distingue siempre distribución de datos y distribución del estimador. Pregunta cuál es la unidad independiente,
      cómo se repetiría el estudio y qué procedimiento genera el intervalo. Corrige lenguaje posterior sobre IC frecuentista.
    en: >-
      Always distinguish the data distribution from the estimator distribution. Ask for the independent unit,
      how the study would repeat, and which procedure generates the interval. Correct posterior language about frequentist CIs.
    da: >-
      Skeln altid datafordeling fra estimatorfordeling. Spørg om uafhængig enhed, gentaget design og intervalprocedure.
  misconceptions:
    - sampling_distribution_equals_data_histogram
    - SE_equals_SD
    - CLT_makes_data_normal
    - CI_is_posterior_probability
    - narrow_CI_means_unbiased
    - bootstrap_creates_new_information
  socratic_questions:
    - What would vary if the study were repeated?
    - Is the stated n the number of independent units?
    - What assumptions support the interval's coverage?
    - Does the bootstrap preserve pairs, clusters, or time dependence?
    - Is uncertainty statistical, systematic, or both?
  grading_criteria:
    - distinguish parameter and estimator
    - interpret SE and sampling distribution
    - state CI coverage correctly
    - implement valid bootstrap
    - preserve design dependence in resampling
  retrieval_fragments:
    - {id: bmb830.m06.r01, topic: sampling, text: {"es": "La distribución muestral describe un estadístico bajo repetición del diseño.", "en": "A sampling distribution describes a statistic under repeated design.", "da": "Samplingfordelingen beskriver en statistik under gentaget design."}}
    - {id: bmb830.m06.r02, topic: se, text: {"es": "SE es la SD del estimador, no la SD de individuos.", "en": "SE is the SD of the estimator, not the SD of individuals.", "da": "SE er SD for estimatoren, ikke for individer."}}
    - {id: bmb830.m06.r03, topic: ci, text: {"es": "Un IC95% es una propiedad de cobertura del procedimiento, no 95% posterior del parámetro.", "en": "A 95% CI is a coverage property of the procedure, not 95% posterior probability for the parameter.", "da": "Et 95% CI er en dæknings-egenskab, ikke 95% posterior sandsynlighed."}}
    - {id: bmb830.m06.r04, topic: bootstrap, text: {"es": "Bootstrap remuestrea unidades independientes con reemplazo y recalcula el estimador completo.", "en": "Bootstrap resamples independent units with replacement and recomputes the full estimator.", "da": "Bootstrap resampler uafhængige enheder med replacement og genberegner hele estimatoren."}}
    - {id: bmb830.m06.r05, topic: dependence, text: {"es": "Pares, clústeres y series requieren esquemas que preserven dependencia.", "en": "Pairs, clusters, and time series require dependence-preserving schemes.", "da": "Par, clusters og tidsserier kræver schemes der bevarer afhængighed."}}

