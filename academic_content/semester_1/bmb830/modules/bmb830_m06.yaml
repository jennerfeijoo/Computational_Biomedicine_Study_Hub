schema_version: 1.0.0
course_code: BMB830
module_id: bmb830.m06
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title:
    es: "Distribuciones muestrales, estimación, intervalos de confianza y bootstrap"
    en: "Sampling distributions, estimation, confidence intervals, and bootstrap reasoning"
    da: "Samplingfordelinger, estimation, konfidensintervaller og bootstrap-ræsonnering"
  summary:
    es: >-
      Fundamentos de inferencia frecuentista para cuantificar incertidumbre. Se distinguen parámetro,
      estadístico, estimador, sesgo, varianza, error estándar y distribución muestral. Se construyen e
      interpretan intervalos de confianza, se introduce el teorema del límite central y se desarrolla
      la lógica del bootstrap respetando unidad independiente, dependencia y diseño.
    en: >-
      Frequentist foundations for quantifying uncertainty. Parameter, statistic, estimator, bias,
      variance, standard error, and sampling distribution are distinguished. Confidence intervals,
      central-limit reasoning, and bootstrap logic are developed while respecting the independent unit,
      dependence, and study design.
    da: >-
      Frequentistisk grundlag for usikkerhed: parameter, statistik, estimator, bias, varians,
      standard error, samplingfordeling, konfidensintervaller, central limit og bootstrap.
  estimated_study_hours: 13
  difficulty: intermediate

alignment:
  official_learning_outcomes: [bmb830.lo01, bmb830.lo05, bmb830.lo06]
  prerequisite_modules: [bmb830.m04, bmb830.m05]
  later_modules: [bmb830.m07, bmb830.m08, bmb830.m09, bmb830.m10]

objectives:
  - {id: bmb830.m06.o01, text: {"es": "Distinguir parámetro, estadístico, estimador y estimación", "en": "Distinguish parameter, statistic, estimator, and estimate", "da": "Skelne parameter, statistik, estimator og estimat"}}
  - {id: bmb830.m06.o02, text: {"es": "Explicar una distribución muestral", "en": "Explain a sampling distribution", "da": "Forklare en samplingfordeling"}}
  - {id: bmb830.m06.o03, text: {"es": "Interpretar sesgo, varianza y error estándar", "en": "Interpret bias, variance, and standard error", "da": "Fortolke bias, varians og standard error"}}
  - {id: bmb830.m06.o04, text: {"es": "Aplicar razonamiento del límite central con condiciones", "en": "Apply central-limit reasoning with conditions", "da": "Anvende central-limit-ræsonnering med betingelser"}}
  - {id: bmb830.m06.o05, text: {"es": "Construir e interpretar intervalos de confianza", "en": "Construct and interpret confidence intervals", "da": "Konstruere og fortolke konfidensintervaller"}}
  - {id: bmb830.m06.o06, text: {"es": "Ejecutar bootstrap no paramétrico en R", "en": "Perform nonparametric bootstrap in R", "da": "Udføre nonparametrisk bootstrap i R"}}
  - {id: bmb830.m06.o07, text: {"es": "Elegir la unidad correcta de remuestreo", "en": "Choose the correct resampling unit", "da": "Vælge korrekt resampling-enhed"}}
  - {id: bmb830.m06.o08, text: {"es": "Comunicar incertidumbre sin interpretación probabilística incorrecta", "en": "Communicate uncertainty without incorrect probability interpretation", "da": "Kommunikere usikkerhed uden forkert sandsynlighedsfortolkning"}}

concepts:
  - id: bmb830.m06.c01
    title: {"es": "Parámetros y estadísticos", "en": "Parameters and statistics", "da": "Parametre og statistikker"}
    body:
      es: >-
        Un parámetro describe una población o proceso y normalmente es desconocido. Un estadístico es cualquier función
        de la muestra. Un estimador es un estadístico usado para aproximar un parámetro; la estimación es el valor observado.
        La misma muestra puede producir estimadores distintos del mismo parámetro, con diferentes sesgos y varianzas.
      en: >-
        A parameter describes a population or process and is usually unknown. A statistic is any function of the sample.
        An estimator is a statistic used to approximate a parameter; the estimate is its observed value. Different estimators
        may target the same parameter with different bias and variance.
      da: >-
        En parameter beskriver en population; en statistik er en funktion af samplen; en estimator målretter parameteren.
    key_points:
      - {"es": "El parámetro no cambia entre muestras del mismo proceso", "en": "The parameter does not change across samples from the same process", "da": "Parameteren ændres ikke mellem samples fra samme proces"}
  - id: bmb830.m06.c02
    title: {"es": "Distribución muestral", "en": "Sampling distribution", "da": "Samplingfordeling"}
    body:
      es: >-
        La distribución muestral es la distribución de un estadístico bajo repetición hipotética del mismo diseño y proceso de muestreo.
        No es la distribución de los datos individuales. Permite definir sesgo, error estándar, intervalos y pruebas. Simular muchas muestras
        desde un modelo conocido ayuda a visualizarla, pero en datos reales se aproxima mediante teoría, bootstrap u otros métodos.
      en: >-
        A sampling distribution is the distribution of a statistic under hypothetical repetition of the same design and sampling process.
        It is not the distribution of individual observations. It supports bias, standard errors, intervals, and tests.
      da: >-
        Samplingfordelingen er fordelingen af en statistik under hypotetisk gentagelse af samme design, ikke fordelingen af individuelle data.
    key_points:
      - {"es": "Repetir mediciones dentro de una muestra no equivale a repetir el estudio", "en": "Repeated measurements within one sample do not equal repeating the study", "da": "Gentagne målinger i én sample er ikke gentagelse af studiet"}
  - id: bmb830.m06.c03
    title: {"es": "Sesgo, varianza y MSE", "en": "Bias, variance, and MSE", "da": "Bias, varians og MSE"}
    body:
      es: >-
        El sesgo es E[estimador]−parámetro. La varianza describe variabilidad entre muestras y el error cuadrático medio combina varianza y sesgo².
        Un estimador insesgado puede ser muy variable; uno ligeramente sesgado puede tener menor error total. La elección debe considerar objetivo,
        robustez, supuestos y tamaño muestral, no sólo insesgamiento.
      en: >-
        Bias is E[estimator]−parameter. Variance describes between-sample variability, and mean squared error combines variance and squared bias.
        An unbiased estimator may be highly variable; a slightly biased estimator may have lower total error.
      da: >-
        Bias er E[estimator]−parameter. MSE kombinerer varians og bias². Insesghed alene er ikke tilstrækkelig.
    key_points:
      - {"es": "Precisión y exactitud no son idénticas", "en": "Precision and accuracy are not identical", "da": "Præcision og nøjagtighed er ikke identiske"}
  - id: bmb830.m06.c04
    title: {"es": "Error estándar y tamaño muestral", "en": "Standard error and sample size", "da": "Standard error og sample size"}
    body:
      es: >-
        El error estándar es la SD de la distribución muestral del estimador. Para una media independiente con varianza finita, SE≈s/√n.
        Duplicar n no divide SE por dos; se necesita aproximadamente cuadruplicar n. Dependencia reduce el tamaño efectivo, por lo que usar el
        número de filas en lugar de unidades independientes produce SE demasiado pequeño.
      en: >-
        Standard error is the SD of the estimator's sampling distribution. For an independent mean with finite variance, SE≈s/√n.
        Doubling n does not halve SE; roughly quadrupling n does. Dependence reduces effective sample size.
      da: >-
        Standard error er SD for estimatorens samplingfordeling. For et uafhængigt mean er SE≈s/√n; afhængighed reducerer effektiv n.
    key_points:
      - {"es": "SE cuantifica incertidumbre del estimador, no variación biológica individual", "en": "SE quantifies estimator uncertainty, not individual biological variation", "da": "SE måler estimatorusikkerhed, ikke individuel biologisk variation"}
  - id: bmb830.m06.c05
    title: {"es": "Teorema del límite central", "en": "Central limit theorem", "da": "Central limit theorem"}
    body:
      es: >-
        Bajo condiciones como independencia suficiente, varianza finita y ausencia de dominación extrema, la distribución estandarizada de la media
        se aproxima a normal al crecer n. El CLT no hace normales los datos ni corrige sesgo, dependencia o muestreo no representativo.
        En colas pesadas, n pequeño o clústeres, la aproximación puede ser deficiente.
      en: >-
        Under conditions such as sufficient independence, finite variance, and no extreme domination, the standardized mean approaches normality as n grows.
        The CLT does not make data normal or repair bias, dependence, or nonrepresentative sampling.
      da: >-
        Under passende betingelser nærmer den standardiserede mean sig normalitet når n vokser. CLT gør ikke rådata normale og reparerer ikke bias.
    key_points:
      - {"es": "“n grande” depende de forma y dependencia", "en": "“Large n” depends on shape and dependence", "da": "“Stor n” afhænger af form og afhængighed"}
  - id: bmb830.m06.c06
    title: {"es": "Intervalos de confianza", "en": "Confidence intervals", "da": "Konfidensintervaller"}
    body:
      es: >-
        Un procedimiento de intervalo del 95% captura el parámetro en 95% de repeticiones bajo el modelo y diseño. Tras observar un intervalo frecuentista,
        el parámetro fijo está o no dentro; no se interpreta como 95% de probabilidad del parámetro sin un modelo bayesiano. Anchura depende de SE,
        nivel de confianza y forma del procedimiento. Un intervalo estrecho puede ser preciso pero sesgado si diseño o modelo fallan.
      en: >-
        A 95% confidence procedure captures the parameter in 95% of repetitions under the model and design. After observing a frequentist interval,
        the fixed parameter is either inside or outside; it is not a 95% posterior probability statement. Width depends on SE, confidence level, and procedure.
      da: >-
        En 95% konfidensprocedure dækker parameteren i 95% af gentagelser under modellen og designet. Det er ikke en posterior sandsynlighed.
    key_points:
      - {"es": "Cobertura depende de supuestos y diseño", "en": "Coverage depends on assumptions and design", "da": "Dækning afhænger af antagelser og design"}
  - id: bmb830.m06.c07
    title: {"es": "Bootstrap no paramétrico", "en": "Nonparametric bootstrap", "da": "Nonparametrisk bootstrap"}
    body:
      es: >-
        El bootstrap aproxima la distribución muestral remuestreando con reemplazo unidades observadas del tamaño original y recalculando el estadístico.
        La distribución empírica actúa como aproximación poblacional. Puede estimar SE, sesgo e intervalos, pero hereda sesgo de muestra, no crea información
        fuera de lo observado y puede fallar con n pequeño, extremos, estadísticas no suaves o dependencia mal representada.
      en: >-
        The bootstrap approximates a sampling distribution by resampling observed units with replacement at the original sample size and recalculating the statistic.
        It can estimate SE, bias, and intervals, but inherits sample bias and may fail for small n, extremes, non-smooth statistics, or mishandled dependence.
      da: >-
        Bootstrap resampler observerede enheder med replacement og genberegner statistikken. Det arver sample-bias og kræver korrekt afhængighedsenhed.
    key_points:
      - {"es": "Remuestrear filas sólo es válido si las filas son unidades independientes", "en": "Resampling rows is valid only when rows are independent units", "da": "Resampling af rækker er kun gyldigt hvis rækker er uafhængige enheder"}
  - id: bmb830.m06.c08
    title: {"es": "Intervalos bootstrap y diseño", "en": "Bootstrap intervals and design", "da": "Bootstrap-intervaller og design"}
    body:
      es: >-
        El intervalo percentil usa cuantiles de estimaciones bootstrap; el intervalo normal usa estimate±z·SE y requiere simetría aproximada;
        BCa ajusta sesgo y aceleración, pero no repara diseño. En datos emparejados se remuestrean pares; en clústeres se remuestrean clústeres;
        en series temporales se necesitan bloques u otros métodos que preserven dependencia.
      en: >-
        Percentile intervals use bootstrap-estimate quantiles; normal intervals use estimate±z·SE and assume approximate symmetry; BCa adjusts bias and acceleration.
        Paired data resample pairs, clustered data resample clusters, and time series require dependence-preserving schemes.
      da: >-
        Percentilintervaller bruger bootstrap-kvantiler. Parrede data resamples som par; clustrede data som clusters; tidsserier kræver blokke.
    key_points:
      - {"es": "El esquema de remuestreo debe imitar el diseño generador", "en": "The resampling scheme should mimic the generating design", "da": "Resampling-schemat bør efterligne det genererende design"}

worked_examples:
  - id: bmb830.m06.e01
    example_kind: r_code
    language: r
    code: |-
      sample_sd <- 12
      n <- 36L
      standard_error <- sample_sd / sqrt(n)
      standard_error
    expected_output: |-
      [1] 2
    output_kind: console
    title: {"es": "SD frente a SE", "en": "SD versus SE", "da": "SD versus SE"}
    problem: {"es": "Una muestra tiene SD=12 y n=36.", "en": "A sample has SD=12 and n=36.", "da": "En sample har SD=12 og n=36."}
    reasoning: {"es": "SE de la media≈12/√36=2. SD describe personas; SE describe incertidumbre de la media.", "en": "Mean SE≈12/√36=2. SD describes individuals; SE describes uncertainty in the mean.", "da": "SE≈12/√36=2. SD beskriver personer; SE usikkerhed i mean."}
    answer: {"es": "SD=12 unidades; SE≈2 unidades.", "en": "SD=12 units; SE≈2 units.", "da": "SD=12 enheder; SE≈2 enheder."}
  - id: bmb830.m06.e02
    title: {"es": "Interpretación de IC95%", "en": "Interpreting a 95% CI", "da": "Fortolkning af 95% CI"}
    problem: {"es": "Diferencia media 4.2 con IC95% [1.1,7.3].", "en": "Mean difference 4.2 with 95% CI [1.1,7.3].", "da": "Mean-forskel 4,2 med 95% CI [1,1;7,3]."}
    reasoning: {"es": "El procedimiento es compatible con diferencias positivas de ese rango bajo supuestos. No significa 95% de probabilidad de que el parámetro esté dentro.", "en": "Under assumptions, the procedure yields values compatible with positive differences in that range. It is not a 95% posterior probability.", "da": "Under antagelser er intervallet kompatibelt med positive forskelle; det er ikke 95% posterior sandsynlighed."}
    answer: {"es": "Estimación positiva con incertidumbre; revisar importancia biológica y supuestos.", "en": "Positive estimate with uncertainty; assess biological relevance and assumptions.", "da": "Positivt estimat med usikkerhed; vurder biologisk relevans og antagelser."}
  - id: bmb830.m06.e03
    example_kind: r_code
    language: r
    code: |-
      patient_means <- c(4.1, 5.3, 4.8, 6.0, 5.5, 4.6)
      set.seed(830)
      bootstrap_means <- replicate(
        2000,
        mean(sample(patient_means, replace = TRUE))
      )
      round(quantile(bootstrap_means, c(0.025, 0.975)), 2)
    expected_output:
      es: "Dos cuantiles reproducibles que delimitan la distribución bootstrap de la media de pacientes; la unidad remuestreada sigue siendo el paciente."
      en: "Two reproducible quantiles delimiting the bootstrap distribution of the patient mean; the resampled unit remains the patient."
      da: "To reproducerbare kvantiler af bootstrapfordelingen for patientgennemsnittet; den resamplede enhed er fortsat patienten."
    output_kind: interpretation
    title: {"es": "Bootstrap por paciente", "en": "Patient-level bootstrap", "da": "Bootstrap på patientniveau"}
    problem: {"es": "Cada paciente tiene varias mediciones celulares.", "en": "Each patient has multiple cellular measurements.", "da": "Hver patient har flere cellulære målinger."}
    reasoning: {"es": "Remuestrear células rompe la estructura y exagera n. Se remuestrean pacientes con todas sus mediciones, recalculando el estimador completo.", "en": "Resampling cells breaks structure and inflates n. Resample patients with all their measurements and recompute the full estimator.", "da": "Resampling af celler bryder strukturen. Resample patienter med alle deres målinger."}
    answer: {"es": "Unidad bootstrap: paciente o clúster definido por diseño.", "en": "Bootstrap unit: patient or design-defined cluster.", "da": "Bootstrap-enhed: patient eller design-defineret cluster."}

guided_practice:
  - {id: bmb830.m06.p01, type: simulation, prompt: {"es": "Simula 5000 muestras y construye la distribución muestral de la media.", "en": "Simulate 5000 samples and build the sampling distribution of the mean.", "da": "Simulér 5000 samples og byg samplingfordelingen for mean."}, expected_elements: [fixed_population_model, repeated_samples, estimate_distribution]}
  - {id: bmb830.m06.p02, type: se_calculation, prompt: {"es": "Compara SD y SE para distintos n.", "en": "Compare SD and SE across sample sizes.", "da": "Sammenlign SD og SE for forskellige n."}, expected_elements: [units, square_root_relationship, interpretation]}
  - {id: bmb830.m06.p03, type: ci_interpretation, prompt: {"es": "Corrige ocho interpretaciones incorrectas de intervalos.", "en": "Correct eight incorrect interval interpretations.", "da": "Ret otte forkerte fortolkninger af intervaller."}, expected_elements: [coverage_language, fixed_parameter, assumptions]}
  - {id: bmb830.m06.p04, type: bootstrap, prompt: {"es": "Implementa bootstrap de mediana y diferencia de medianas.", "en": "Implement bootstrap for a median and median difference.", "da": "Implementér bootstrap for median og medianforskel."}, expected_elements: [replacement, original_n, repeated_statistic, interval]}
  - {id: bmb830.m06.p05, type: resampling_design, prompt: {"es": "Elige unidad de remuestreo para datos independientes, emparejados, clústeres y tiempo.", "en": "Choose resampling units for independent, paired, clustered, and temporal data.", "da": "Vælg resampling-enhed for uafhængige, parrede, clustrede og tidslige data."}, expected_elements: [design_mimicry, pair_or_cluster_preservation, dependence]}
  - {id: bmb830.m06.p06, type: method_critique, prompt: {"es": "Audita un IC estrecho obtenido con pseudorreplicación.", "en": "Audit a narrow CI obtained through pseudoreplication.", "da": "Auditér et smalt CI opnået gennem pseudoreplikation."}, expected_elements: [effective_n, invalid_se, corrected_design]}

objective_bank:
  - {id: bmb830.m06.q01, type: multiple_choice, prompt: {"es": "¿Qué es una distribución muestral?", "en": "What is a sampling distribution?", "da": "Hvad er en samplingfordeling?"}, options: [{id: a, text: {"es": "Distribución de un estadístico en estudios repetidos", "en": "Distribution of a statistic across repeated studies", "da": "Fordeling af en statistik over gentagne studier"}}, {id: b, text: {"es": "Histograma de una muestra", "en": "Histogram of one sample", "da": "Histogram af én sample"}}, {id: c, text: {"es": "Lista de variables", "en": "Variable list", "da": "Variabelliste"}}], correct_option_ids: [a], explanation: {"es": "Se refiere a repetición hipotética del diseño.", "en": "It refers to hypothetical repetition of the design.", "da": "Den refererer til hypotetisk gentagelse af designet."}}
  - {id: bmb830.m06.q02, type: true_false, prompt: {"es": "El error estándar describe variabilidad individual.", "en": "Standard error describes individual variability.", "da": "Standard error beskriver individuel variation."}, correct: false, explanation: {"es": "Describe variabilidad del estimador entre muestras.", "en": "It describes estimator variability across samples.", "da": "Den beskriver estimatorens variation mellem samples."}}
  - {id: bmb830.m06.q03, type: multiple_choice, prompt: {"es": "Si n se cuadruplica, SE de la media aproximadamente...", "en": "If n quadruples, mean SE approximately...", "da": "Hvis n firedobles, bliver mean SE omtrent..."}, options: [{id: a, text: {"es": "se reduce a la mitad", "en": "halves", "da": "halveret"}}, {id: b, text: {"es": "se cuadruplica", "en": "quadruples", "da": "firedoblet"}}, {id: c, text: {"es": "no cambia nunca", "en": "never changes", "da": "ændres aldrig"}}], correct_option_ids: [a], explanation: {"es": "SE escala como 1/√n.", "en": "SE scales as 1/√n.", "da": "SE skalerer som 1/√n."}}
  - {id: bmb830.m06.q04, type: true_false, prompt: {"es": "El CLT hace normales los datos individuales.", "en": "The CLT makes individual data normal.", "da": "CLT gør individuelle data normale."}, correct: false, explanation: {"es": "Aproxima la distribución de ciertos estadísticos estandarizados.", "en": "It approximates the distribution of certain standardized statistics.", "da": "Den approksimerer fordelingen af visse standardiserede statistikker."}}
  - {id: bmb830.m06.q05, type: multiple_choice, prompt: {"es": "Interpretación frecuentista correcta de IC95%.", "en": "Correct frequentist interpretation of a 95% CI.", "da": "Korrekt frequentistisk fortolkning af 95% CI."}, options: [{id: a, text: {"es": "El procedimiento cubre el parámetro en 95% de repeticiones", "en": "The procedure covers the parameter in 95% of repetitions", "da": "Proceduren dækker parameteren i 95% af gentagelser"}}, {id: b, text: {"es": "El parámetro tiene 95% de probabilidad posterior dentro", "en": "The parameter has 95% posterior probability inside", "da": "Parameteren har 95% posterior sandsynlighed indenfor"}}, {id: c, text: {"es": "95% de observaciones están dentro", "en": "95% of observations are inside", "da": "95% af observationer er indenfor"}}], correct_option_ids: [a], explanation: {"es": "Es una propiedad del procedimiento bajo repetición.", "en": "It is a repeated-procedure property.", "da": "Det er en egenskab ved proceduren under gentagelse."}}
  - {id: bmb830.m06.q06, type: true_false, prompt: {"es": "Un IC estrecho garantiza ausencia de sesgo.", "en": "A narrow CI guarantees absence of bias.", "da": "Et smalt CI garanterer fravær af bias."}, correct: false, explanation: {"es": "Puede ser preciso alrededor de un valor sesgado.", "en": "It may be precise around a biased value.", "da": "Det kan være præcist omkring en biased værdi."}}
  - {id: bmb830.m06.q07, type: multiple_choice, prompt: {"es": "Bootstrap no paramétrico remuestrea...", "en": "Nonparametric bootstrap resamples...", "da": "Nonparametrisk bootstrap resampler..."}, options: [{id: a, text: {"es": "con reemplazo y tamaño original", "en": "with replacement at original size", "da": "med replacement og original størrelse"}}, {id: b, text: {"es": "sin reemplazo y mitad del tamaño", "en": "without replacement at half size", "da": "uden replacement og halv størrelse"}}, {id: c, text: {"es": "sólo parámetros", "en": "only parameters", "da": "kun parametre"}}], correct_option_ids: [a], explanation: {"es": "Esa es la construcción bootstrap básica.", "en": "This is the basic bootstrap construction.", "da": "Det er den grundlæggende bootstrap-konstruktion."}}
  - {id: bmb830.m06.q08, type: true_false, prompt: {"es": "Bootstrap corrige automáticamente sesgo de selección de la muestra.", "en": "Bootstrap automatically fixes sample selection bias.", "da": "Bootstrap retter automatisk sample-selection bias."}, correct: false, explanation: {"es": "Remuestrea la muestra observada y hereda su representación.", "en": "It resamples the observed sample and inherits its representation.", "da": "Den resampler den observerede sample og arver dens repræsentation."}}
  - {id: bmb830.m06.q09, type: multiple_choice, prompt: {"es": "En datos emparejados, se debe remuestrear...", "en": "For paired data, one should resample...", "da": "For parrede data bør man resample..."}, options: [{id: a, text: {"es": "pares completos", "en": "complete pairs", "da": "komplette par"}}, {id: b, text: {"es": "cada columna independientemente", "en": "each column independently", "da": "hver kolonne uafhængigt"}}, {id: c, text: {"es": "sólo diferencias positivas", "en": "only positive differences", "da": "kun positive forskelle"}}], correct_option_ids: [a], explanation: {"es": "Se preserva la dependencia dentro del par.", "en": "This preserves within-pair dependence.", "da": "Det bevarer afhængigheden inden for parret."}}
  - {id: bmb830.m06.q10, type: true_false, prompt: {"es": "El esquema de remuestreo debe imitar el diseño de muestreo.", "en": "The resampling scheme should mimic the sampling design.", "da": "Resampling-schemat bør efterligne samplingdesignet."}, correct: true, explanation: {"es": "Así aproxima la variabilidad relevante.", "en": "This approximates the relevant variability.", "da": "Så approksimeres den relevante variation."}}

