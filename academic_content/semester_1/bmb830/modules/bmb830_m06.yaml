    prompt: {"es": "Explica y simula la distribución muestral de un estimador.", "en": "Explain and simulate the sampling distribution of an estimator.", "da": "Forklar og simulér samplingfordelingen af en estimator."}
    rubric: [{criterion: parameter_and_estimator, points: 2}, {criterion: repeated_design, points: 3}, {criterion: bias_and_se, points: 3}, {criterion: interpretation, points: 2}]
  - id: bmb830.m06.a02
    prompt: {"es": "Construye e interpreta un intervalo con método teórico y bootstrap.", "en": "Construct and interpret an interval using theoretical and bootstrap methods.", "da": "Konstruér og fortolk et interval med teoretisk og bootstrap-metode."}
    rubric: [{criterion: correct_computation, points: 3}, {criterion: assumptions, points: 2}, {criterion: interval_interpretation, points: 3}, {criterion: comparison, points: 2}]
  - id: bmb830.m06.a03
    prompt: {"es": "Diseña remuestreo válido para un conjunto jerárquico.", "en": "Design valid resampling for a hierarchical dataset.", "da": "Design gyldig resampling for et hierarkisk datasæt."}
