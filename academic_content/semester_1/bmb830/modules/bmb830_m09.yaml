    prompt: {"es": "Diseña, ejecuta e interpreta una PCA completa con análisis de sensibilidad.", "en": "Design, run, and interpret a complete PCA with sensitivity analysis.", "da": "Design, udfør og fortolk en komplet PCA med følsomhedsanalyse."}
    rubric: [{criterion: matrix_and_preprocessing, points: 3}, {criterion: scores_loadings_variance, points: 3}, {criterion: metadata_and_batch, points: 2}, {criterion: limitations, points: 2}]
  - id: bmb830.m09.a02
    prompt: {"es": "Compara dos estrategias de clustering y evalúa estabilidad.", "en": "Compare two clustering strategies and evaluate stability.", "da": "Sammenlign to clustering-strategier og evaluer stabilitet."}
    rubric: [{criterion: distance_and_algorithm, points: 3}, {criterion: k_or_cut_choice, points: 2}, {criterion: stability_evidence, points: 3}, {criterion: cautious_claim, points: 2}]
