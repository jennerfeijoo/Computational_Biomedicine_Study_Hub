glossary:
  - {id: bmb830.term.multivariate_matrix, term: {"es": "matriz multivariante", "en": "multivariate matrix", "da": "multivariat matrix"}, definition: {"es": "Matriz con unidades y múltiples variables.", "en": "Matrix containing units and multiple variables.", "da": "Matrix med enheder og flere variable."}}
  - {id: bmb830.term.centering, term: {"es": "centrado", "en": "centering", "da": "centrering"}, definition: {"es": "Restar la media de cada variable.", "en": "Subtracting each variable mean.", "da": "At trække mean fra hver variabel."}}
  - {id: bmb830.term.scaling, term: {"es": "escalado", "en": "scaling", "da": "skalering"}, definition: {"es": "Dividir por una medida de escala como SD.", "en": "Dividing by a scale measure such as SD.", "da": "At dividere med et skalamål som SD."}}
  - {id: bmb830.term.euclidean, term: {"es": "distancia euclídea", "en": "Euclidean distance", "da": "euclidisk afstand"}, definition: {"es": "Raíz de la suma de diferencias cuadráticas.", "en": "Square root of summed squared differences.", "da": "Kvadratroden af summen af kvadrerede forskelle."}}
  - {id: bmb830.term.pca, term: {"es": "análisis de componentes principales", "en": "principal component analysis", "da": "principal component analysis"}, definition: {"es": "Rotación ortogonal que ordena direcciones por varianza.", "en": "Orthogonal rotation ordering directions by variance.", "da": "Ortogonal rotation der ordner retninger efter varians."}}
  - {id: bmb830.term.score, term: {"es": "score de PCA", "en": "PCA score", "da": "PCA-score"}, definition: {"es": "Coordenada de una muestra en una componente.", "en": "Sample coordinate on a component.", "da": "Sample-koordinat på en komponent."}}
  - {id: bmb830.term.loading, term: {"es": "loading", "en": "loading", "da": "loading"}, definition: {"es": "Peso o contribución de una variable a una componente.", "en": "Weight or contribution of a variable to a component.", "da": "Vægt eller bidrag fra en variabel til en komponent."}}
  - {id: bmb830.term.dendrogram, term: {"es": "dendrograma", "en": "dendrogram", "da": "dendrogram"}, definition: {"es": "Árbol que representa el orden y altura de fusiones de clustering.", "en": "Tree representing clustering merge order and height.", "da": "Træ der viser rækkefølge og højde af cluster-fusioner."}}
  - {id: bmb830.term.centroid, term: {"es": "centroide", "en": "centroid", "da": "centroid"}, definition: {"es": "Vector medio de un cluster en k-means.", "en": "Mean vector of a k-means cluster.", "da": "Mean-vektor for en k-means-cluster."}}
  - {id: bmb830.term.silhouette, term: {"es": "silhouette", "en": "silhouette", "da": "silhouette"}, definition: {"es": "Medida de cohesión y separación relativa de una unidad.", "en": "Measure of relative within-cluster cohesion and separation.", "da": "Mål for relativ cohesion og separation for en enhed."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Antes de interpretar PCA o clustering, pregunta qué representan filas y columnas, qué preprocessing se aplicó,
      qué metadatos técnicos explican los ejes y cuán estable es el patrón. Nunca conviertas separación visual en subtipo validado.
    en: >-
      Before interpreting PCA or clustering, ask what rows and columns represent, what preprocessing was used,
      which technical metadata explain axes, and how stable the pattern is. Never turn visual separation into a validated subtype.
    da: >-
      Før fortolkning af PCA eller clustering: spørg om rækker, kolonner, preprocessing, tekniske metadata og stabilitet.
  misconceptions:
    - PCA_is_supervised
    - PC1_is_most_biologically_important
    - scaling_is_always_required
    - loading_sign_has_absolute_meaning
    - dendrogram_proves_natural_groups
    - stable_cluster_is_validated_subtype
  socratic_questions:
    - What does one row represent and is it independent?
    - Which variables dominate before and after scaling?
    - What biological notion of similarity does the distance encode?
    - Are PCs associated with batch, quality, or site?
    - Does the cluster assignment persist under reasonable perturbations?
  grading_criteria:
    - define matrix orientation and preprocessing
    - interpret scores, loadings, and variance correctly
    - justify distance and clustering choices
    - evaluate stability and technical confounding
    - maintain exploratory claim scope
  retrieval_fragments:
    - {id: bmb830.m09.r01, topic: matrix, text: {"es": "Declarar muestras en filas y variables en columnas evita invertir la pregunta.", "en": "Declaring samples in rows and variables in columns prevents reversing the question.", "da": "Deklaration af samples i rækker og variable i kolonner forhindrer omvendt spørgsmål."}}
    - {id: bmb830.m09.r02, topic: scaling, text: {"es": "Escalado iguala peso inicial pero puede amplificar ruido; debe justificarse.", "en": "Scaling equalizes initial weight but may amplify noise; justify it.", "da": "Skalering udligner initial vægt men kan forstærke støj; begrund den."}}
    - {id: bmb830.m09.r03, topic: pca, text: {"es": "PCA ordena varianza, no relevancia ni separación confirmatoria.", "en": "PCA orders variance, not relevance or confirmatory separation.", "da": "PCA ordner varians, ikke relevans eller confirmatory separation."}}
    - {id: bmb830.m09.r04, topic: scores, text: {"es": "Scores describen muestras; loadings describen contribuciones de variables.", "en": "Scores describe samples; loadings describe variable contributions.", "da": "Scores beskriver samples; loadings beskriver variabelbidrag."}}
    - {id: bmb830.m09.r05, topic: sign, text: {"es": "El signo de una PC puede invertirse sin cambiar la solución.", "en": "A PC sign may flip without changing the solution.", "da": "Fortegnet på en PC kan vendes uden at ændre løsningen."}}
    - {id: bmb830.m09.r06, topic: distance, text: {"es": "Distancias codifican nociones distintas de similitud y dependen del preprocessing.", "en": "Distances encode different notions of similarity and depend on preprocessing.", "da": "Afstande koder forskellige lighedsbegreber og afhænger af preprocessing."}}
    - {id: bmb830.m09.r07, topic: hierarchical, text: {"es": "Un dendrograma siempre crea una jerarquía; no demuestra clusters naturales.", "en": "A dendrogram always creates a hierarchy; it does not prove natural clusters.", "da": "Et dendrogram skaber altid et hierarki; det beviser ikke naturlige clusters."}}
    - {id: bmb830.m09.r08, topic: kmeans, text: {"es": "k-means requiere k, múltiples inicios y evaluación de estabilidad.", "en": "k-means requires k, multiple starts, and stability assessment.", "da": "k-means kræver k, flere starts og stabilitetsvurdering."}}
    - {id: bmb830.m09.r09, topic: batch, text: {"es": "Separación por grupo puede ser lote cuando ambos están confundidos.", "en": "Group separation may be batch when the two are confounded.", "da": "Gruppeseparation kan være batch når de er confounded."}}
    - {id: bmb830.m09.r10, topic: validity, text: {"es": "Un cluster exploratorio necesita replicación y evidencia externa antes de llamarse subtipo.", "en": "An exploratory cluster needs replication and external evidence before being called a subtype.", "da": "En eksplorativ cluster kræver replikation og ekstern evidens før den kaldes subtype."}}

