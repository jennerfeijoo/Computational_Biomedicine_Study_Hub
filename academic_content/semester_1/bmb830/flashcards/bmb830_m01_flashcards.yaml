course_code: BMB830
module_id: bmb830.m01
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m01.f01, type: concept, front: {"es": "¿Qué convierte una pregunta biológica en una pregunta estadística?", "en": "What turns a biological question into a statistical question?", "da": "Hvad gør et biologisk spørgsmål til et statistisk spørgsmål?"}, back: {"es": "Especificar población, unidad, variables, contraste, tiempo y cantidad objetivo.", "en": "Specifying population, unit, variables, contrast, time, and target quantity.", "da": "At specificere population, enhed, variable, kontrast, tidspunkt og målparameter."}}
  - {id: bmb830.m01.f02, type: concept, front: {"es": "Población objetivo frente a muestra.", "en": "Target population versus sample.", "da": "Målpopulation versus sample."}, back: {"es": "La población es sobre quien se quiere concluir; la muestra contiene las unidades observadas.", "en": "The population is whom conclusions target; the sample contains observed units.", "da": "Populationen er den gruppe konklusionen vedrører; samplen indeholder observerede enheder."}}
  - {id: bmb830.m01.f03, type: concept, front: {"es": "¿Qué es el marco de muestreo?", "en": "What is the sampling frame?", "da": "Hvad er et sampling frame?"}, back: {"es": "La lista o mecanismo que define qué unidades accesibles podían seleccionarse.", "en": "The list or mechanism defining which accessible units could be selected.", "da": "Listen eller mekanismen der definerer hvilke tilgængelige enheder der kunne vælges."}}
  - {id: bmb830.m01.f04, type: misconception, front: {"es": "Corrige: una muestra grande siempre es representativa.", "en": "Correct: a large sample is always representative.", "da": "Ret: en stor sample er altid repræsentativ."}, back: {"es": "Un tamaño grande reduce error aleatorio, pero no corrige un marco o selección sesgados.", "en": "Large size reduces random error but does not repair biased framing or selection.", "da": "Stor størrelse reducerer tilfældig fejl, men reparerer ikke skæv sampling."}}
  - {id: bmb830.m01.f05, type: concept, front: {"es": "¿Qué es la unidad experimental?", "en": "What is the experimental unit?", "da": "Hvad er forsøgsenheden?"}, back: {"es": "La entidad asignada independientemente a una intervención.", "en": "The entity independently assigned to an intervention.", "da": "Den enhed der uafhængigt tildeles en intervention."}}
  - {id: bmb830.m01.f06, type: concept, front: {"es": "¿Qué es la unidad observacional?", "en": "What is the observational unit?", "da": "Hvad er observationsenheden?"}, back: {"es": "La entidad que aporta una medición o registro.", "en": "The entity contributing a measurement or record.", "da": "Den enhed der bidrager med en måling eller registrering."}}
  - {id: bmb830.m01.f07, type: concept, front: {"es": "¿Qué es la unidad de análisis?", "en": "What is the analysis unit?", "da": "Hvad er analyseenheden?"}, back: {"es": "La entidad tratada como unidad estadísticamente independiente en el modelo.", "en": "The entity treated as statistically independent in the model.", "da": "Den enhed der behandles som statistisk uafhængig i modellen."}}
  - {id: bmb830.m01.f08, type: application, front: {"es": "Se miden 50 células por paciente. ¿Cuántas unidades independientes aporta cada paciente para una comparación clínica?", "en": "Fifty cells are measured per patient. How many independent units does each patient contribute to a clinical comparison?", "da": "Halvtreds celler måles per patient. Hvor mange uafhængige enheder bidrager hver patient med?"}, back: {"es": "Normalmente una; las células están anidadas dentro del paciente.", "en": "Usually one; cells are nested within the patient.", "da": "Normalt én; cellerne er nested inden for patienten."}}
  - {id: bmb830.m01.f09, type: concept, front: {"es": "¿Qué es pseudorreplicación?", "en": "What is pseudoreplication?", "da": "Hvad er pseudoreplikation?"}, back: {"es": "Tratar mediciones dependientes como réplicas independientes.", "en": "Treating dependent measurements as independent replicates.", "da": "At behandle afhængige målinger som uafhængige replikater."}}
  - {id: bmb830.m01.f10, type: concept, front: {"es": "Escala de medición frente a tipo de almacenamiento.", "en": "Measurement scale versus storage type.", "da": "Måleskala versus lagringstype."}, back: {"es": "La escala expresa significado científico; el tipo de almacenamiento sólo cómo se codifica.", "en": "Scale expresses scientific meaning; storage type only how values are encoded.", "da": "Skala udtrykker videnskabelig betydning; lagringstype kun kodning."}}
  - {id: bmb830.m01.f11, type: concept, front: {"es": "¿Qué es un estimando?", "en": "What is an estimand?", "da": "Hvad er et estimand?"}, back: {"es": "La cantidad poblacional específica que responde la pregunta.", "en": "The specific population quantity answering the question.", "da": "Den specifikke populationsparameter der besvarer spørgsmålet."}}
  - {id: bmb830.m01.f12, type: comparison, front: {"es": "Estimador frente a estimación.", "en": "Estimator versus estimate.", "da": "Estimator versus estimat."}, back: {"es": "El estimador es la regla; la estimación es el valor obtenido al aplicarla.", "en": "The estimator is the rule; the estimate is the realized value.", "da": "Estimatoren er reglen; estimatet er den realiserede værdi."}}
  - {id: bmb830.m01.f13, type: application, front: {"es": "Elementos mínimos de un estimando de tratamiento.", "en": "Minimum elements of a treatment estimand.", "da": "Minimumselementer i et behandlingsestimand."}, back: {"es": "Población, contraste, outcome, tiempo, resumen y manejo de eventos intercurrentes cuando corresponda.", "en": "Population, contrast, outcome, time, summary, and intercurrent-event handling when relevant.", "da": "Population, kontrast, outcome, tidspunkt, summary og håndtering af intercurrent events når relevant."}}
  - {id: bmb830.m01.f14, type: concept, front: {"es": "¿Qué es un confusor?", "en": "What is a confounder?", "da": "Hvad er en confounder?"}, back: {"es": "Una causa común relevante de exposición y outcome que puede distorsionar su asociación.", "en": "A relevant common cause of exposure and outcome that may distort their association.", "da": "En relevant fælles årsag til eksponering og outcome som kan forvrænge associationen."}}
  - {id: bmb830.m01.f15, type: misconception, front: {"es": "Corrige: ajustar muchas covariables prueba causalidad.", "en": "Correct: adjusting for many covariates proves causation.", "da": "Ret: justering for mange kovariater beviser kausalitet."}, back: {"es": "El ajuste depende de medición, modelo y estructura causal; no sustituye diseño ni elimina confusión no medida.", "en": "Adjustment depends on measurement, model, and causal structure; it does not replace design or remove unmeasured confounding.", "da": "Justering afhænger af måling, model og kausal struktur og fjerner ikke umålt confounding."}}
  - {id: bmb830.m01.f16, type: concept, front: {"es": "¿Qué aporta la aleatorización?", "en": "What does randomization contribute?", "da": "Hvad bidrager randomisering med?"}, back: {"es": "Comparabilidad causal en expectativa y una base probabilística para la inferencia del efecto asignado.", "en": "Causal comparability in expectation and a probabilistic basis for inference on assigned treatment.", "da": "Kausal sammenlignelighed i forventning og et probabilistisk grundlag for inferens."}}
  - {id: bmb830.m01.f17, type: comparison, front: {"es": "Asociación frente a predicción.", "en": "Association versus prediction.", "da": "Association versus prædiktion."}, back: {"es": "Asociación describe relación; predicción evalúa desempeño en datos nuevos. Ninguna implica causalidad por sí sola.", "en": "Association describes relationship; prediction evaluates performance on new data. Neither alone implies causation.", "da": "Association beskriver relation; prædiktion evaluerer performance på nye data. Ingen af dem beviser kausalitet alene."}}
  - {id: bmb830.m01.f18, type: claim_review, front: {"es": "¿Qué puede concluir un estudio transversal?", "en": "What may a cross-sectional study conclude?", "da": "Hvad kan et tværsnitsstudie konkludere?"}, back: {"es": "Asociaciones en el contexto medido; temporalidad y causalidad suelen permanecer inciertas.", "en": "Associations in the measured context; temporality and causation usually remain uncertain.", "da": "Associationer i den målte kontekst; temporalitet og kausalitet er typisk usikre."}}
  - {id: bmb830.m01.f19, type: concept, front: {"es": "¿Qué incluye la procedencia de datos?", "en": "What does data provenance include?", "da": "Hvad omfatter data provenance?"}, back: {"es": "Fuente, versión, fecha, criterios, unidades, instrumentos, transformaciones, filtros y exclusiones.", "en": "Source, version, date, criteria, units, instruments, transformations, filters, and exclusions.", "da": "Kilde, version, dato, kriterier, enheder, instrumenter, transformationer, filtre og eksklusioner."}}
  - {id: bmb830.m01.f20, type: misconception, front: {"es": "Corrige: guardar la URL es suficiente procedencia.", "en": "Correct: saving the URL is sufficient provenance.", "da": "Ret: det er tilstrækkeligt at gemme URL'en."}, back: {"es": "La URL no documenta versión, criterios, transformaciones ni estado del archivo.", "en": "A URL does not document version, criteria, transformations, or file state.", "da": "En URL dokumenterer ikke version, kriterier, transformationer eller filtilstand."}}
  - {id: bmb830.m01.f21, type: concept, front: {"es": "¿Qué limita el alcance de inferencia?", "en": "What limits scope of inference?", "da": "Hvad begrænser inferensområdet?"}, back: {"es": "Muestreo, población observada, diseño, periodo, contexto, pérdidas y calidad de medición.", "en": "Sampling, observed population, design, period, context, attrition, and measurement quality.", "da": "Sampling, observeret population, design, periode, kontekst, frafald og målekvalitet."}}
  - {id: bmb830.m01.f22, type: application, front: {"es": "Tres niveles que revisar antes de elegir una prueba.", "en": "Three levels to review before choosing a test.", "da": "Tre niveauer der skal vurderes før valg af test."}, back: {"es": "Pregunta y estimando; diseño y dependencia; tipo y distribución de variables.", "en": "Question and estimand; design and dependence; variable type and distribution.", "da": "Spørgsmål og estimand; design og afhængighed; variabeltype og fordeling."}}
  - {id: bmb830.m01.f23, type: oral, front: {"es": "¿Por qué cada fila no equivale necesariamente a una réplica independiente?", "en": "Why does each row not necessarily equal an independent replicate?", "da": "Hvorfor er hver række ikke nødvendigvis en uafhængig replikat?"}, back: {"es": "Filas pueden compartir paciente, lote, familia, sitio o tiempo y por ello compartir fuentes de variación.", "en": "Rows may share patient, batch, family, site, or time and therefore share variation.", "da": "Rækker kan dele patient, batch, familie, site eller tid og derfor variation."}}
  - {id: bmb830.m01.f24, type: integration, front: {"es": "Orden correcto al iniciar un análisis biológico.", "en": "Correct order when starting a biological analysis.", "da": "Korrekt rækkefølge ved start af en biologisk analyse."}, back: {"es": "Pregunta → población y unidad → variables y estimando → diseño y dependencia → procedencia → método.", "en": "Question → population and unit → variables and estimand → design and dependence → provenance → method.", "da": "Spørgsmål → population og enhed → variable og estimand → design og afhængighed → provenance → metode."}}
