count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m09.f01, type: matrix, front: {"es": "¿Qué convención debe declararse antes de un análisis multivariante?", "en": "What convention must be declared before multivariate analysis?", "da": "Hvilken konvention skal deklareres før multivariat analyse?"}, back: {"es": "Qué representan filas y columnas y cuál es la unidad independiente.", "en": "What rows and columns represent and which unit is independent.", "da": "Hvad rækker og kolonner repræsenterer og hvilken enhed er uafhængig."}}
  - {id: bmb830.m09.f02, type: misconception, front: {"es": "Corrige: cada fila de una matriz es automáticamente independiente.", "en": "Correct: every matrix row is automatically independent.", "da": "Ret: hver matrixrække er automatisk uafhængig."}, back: {"es": "Filas pueden ser réplicas técnicas, células o tiempos anidados dentro de una unidad.", "en": "Rows may be technical replicates, cells, or times nested within a unit.", "da": "Rækker kan være tekniske replikater, celler eller tidspunkter nested i en enhed."}}
  - {id: bmb830.m09.f03, type: preprocessing, front: {"es": "¿Qué hace el centrado?", "en": "What does centering do?", "da": "Hvad gør centrering?"}, back: {"es": "Resta la media de cada variable para analizar desviaciones respecto a su nivel medio.", "en": "It subtracts each variable mean to analyze deviations around its average level.", "da": "Det trækker mean fra hver variabel for at analysere afvigelser."}}
  - {id: bmb830.m09.f04, type: preprocessing, front: {"es": "¿Qué hace el escalado z?", "en": "What does z-scaling do?", "da": "Hvad gør z-skalering?"}, back: {"es": "Divide cada variable centrada por su SD, dándole varianza unitaria.", "en": "It divides each centered variable by its SD, giving unit variance.", "da": "Det dividerer hver centreret variabel med dens SD og giver enhedsvarians."}}
  - {id: bmb830.m09.f05, type: misconception, front: {"es": "Corrige: escalar siempre mejora PCA.", "en": "Correct: scaling always improves PCA.", "da": "Ret: skalering forbedrer altid PCA."}, back: {"es": "Puede evitar dominio por unidades, pero también amplificar variables ruidosas; depende de la pregunta.", "en": "It may prevent unit dominance but can amplify noisy variables; it depends on the question.", "da": "Det kan forhindre enhedsdominans men også forstærke støj; det afhænger af spørgsmålet."}}
  - {id: bmb830.m09.f06, type: distance, front: {"es": "¿Qué enfatiza la distancia euclídea?", "en": "What does Euclidean distance emphasize?", "da": "Hvad vægter euclidisk afstand?"}, back: {"es": "Diferencias absolutas cuadráticas y, por tanto, variables de gran escala si no se ajustan.", "en": "Squared absolute differences and therefore large-scale variables if unadjusted.", "da": "Kvadrerede absolutte forskelle og derfor variable med stor skala uden justering."}}
  - {id: bmb830.m09.f07, type: distance, front: {"es": "Manhattan frente a euclídea.", "en": "Manhattan versus Euclidean distance.", "da": "Manhattan versus euclidisk afstand."}, back: {"es": "Manhattan suma diferencias absolutas; euclídea usa raíz de diferencias cuadráticas y penaliza más discrepancias grandes.", "en": "Manhattan sums absolute differences; Euclidean uses squared differences and penalizes large discrepancies more.", "da": "Manhattan summerer absolutte forskelle; euclidisk bruger kvadrerede forskelle og vægter store afvigelser mere."}}
  - {id: bmb830.m09.f08, type: distance, front: {"es": "¿Qué compara la distancia de correlación?", "en": "What does correlation distance compare?", "da": "Hvad sammenligner korrelationsafstand?"}, back: {"es": "El patrón relativo entre variables, reduciendo importancia de magnitud global.", "en": "Relative pattern across variables, reducing emphasis on overall magnitude.", "da": "Det relative mønster mellem variable med mindre vægt på samlet magnitude."}}
  - {id: bmb830.m09.f09, type: pca, front: {"es": "¿Qué optimiza PC1?", "en": "What does PC1 optimize?", "da": "Hvad optimerer PC1?"}, back: {"es": "La varianza de las proyecciones sobre una dirección unitaria.", "en": "The variance of projections onto a unit direction.", "da": "Variansen af projektioner på en enhedsretning."}}
  - {id: bmb830.m09.f10, type: misconception, front: {"es": "Corrige: PC1 es la variable biológicamente más importante.", "en": "Correct: PC1 is the most biologically important variable.", "da": "Ret: PC1 er den biologisk vigtigste variabel."}, back: {"es": "PC1 es una combinación de variables que maximiza varianza; relevancia requiere contexto y evidencia.", "en": "PC1 is a variable combination maximizing variance; relevance needs context and evidence.", "da": "PC1 er en kombination der maksimerer varians; relevans kræver kontekst og evidens."}}
  - {id: bmb830.m09.f11, type: pca, front: {"es": "Scores frente a loadings.", "en": "Scores versus loadings.", "da": "Scores versus loadings."}, back: {"es": "Scores ubican muestras; loadings describen contribuciones de variables a cada componente.", "en": "Scores locate samples; loadings describe variable contributions to each component.", "da": "Scores placerer samples; loadings beskriver variabelbidrag til komponenten."}}
  - {id: bmb830.m09.f12, type: pca, front: {"es": "¿Qué significa varianza explicada?", "en": "What does explained variance mean?", "da": "Hvad betyder forklaret varians?"}, back: {"es": "La fracción de variación total capturada por una componente, no precisión predictiva.", "en": "The fraction of total variation captured by a component, not predictive accuracy.", "da": "Andelen af total variation fanget af en komponent, ikke prædiktiv nøjagtighed."}}
  - {id: bmb830.m09.f13, type: misconception, front: {"es": "Corrige: el signo de PC1 tiene interpretación absoluta.", "en": "Correct: the sign of PC1 has absolute interpretation.", "da": "Ret: fortegnet på PC1 har absolut fortolkning."}, back: {"es": "Puede invertirse junto con los loadings sin cambiar distancias ni varianza.", "en": "It may be reversed with loadings without changing distances or variance.", "da": "Det kan vendes sammen med loadings uden at ændre afstande eller varians."}}
  - {id: bmb830.m09.f14, type: clustering, front: {"es": "¿Qué representa un dendrograma?", "en": "What does a dendrogram represent?", "da": "Hvad repræsenterer et dendrogram?"}, back: {"es": "El orden y altura de fusiones producidas por una distancia y un linkage específicos.", "en": "Merge order and height produced by a specific distance and linkage.", "da": "Rækkefølge og højde af fusioner fra en bestemt afstand og linkage."}}
  - {id: bmb830.m09.f15, type: clustering, front: {"es": "Single frente a complete linkage.", "en": "Single versus complete linkage.", "da": "Single versus complete linkage."}, back: {"es": "Single usa la pareja más cercana y puede encadenar; complete usa la más lejana y favorece grupos compactos.", "en": "Single uses the closest pair and may chain; complete uses the farthest pair and favors compact groups.", "da": "Single bruger nærmeste par og kan kæde; complete bruger fjerneste par og favoriserer kompakte grupper."}}
  - {id: bmb830.m09.f16, type: misconception, front: {"es": "Corrige: un dendrograma prueba clusters naturales.", "en": "Correct: a dendrogram proves natural clusters.", "da": "Ret: et dendrogram beviser naturlige clusters."}, back: {"es": "El algoritmo siempre produce una jerarquía, incluso para un continuo sin grupos discretos.", "en": "The algorithm always produces a hierarchy, even for a continuum without discrete groups.", "da": "Algoritmen producerer altid et hierarki, selv for et kontinuum uden diskrete grupper."}}
  - {id: bmb830.m09.f17, type: kmeans, front: {"es": "Objetivo de k-means.", "en": "Objective of k-means.", "da": "Målet for k-means."}, back: {"es": "Minimizar la suma de distancias cuadráticas de cada punto a su centroide asignado.", "en": "Minimize the sum of squared distances from points to assigned centroids.", "da": "Minimere summen af kvadrerede afstande fra punkter til deres centroids."}}
  - {id: bmb830.m09.f18, type: kmeans, front: {"es": "¿Por qué usar múltiples inicios en k-means?", "en": "Why use multiple starts in k-means?", "da": "Hvorfor bruge flere starts i k-means?"}, back: {"es": "Porque puede converger a distintos óptimos locales según la inicialización.", "en": "It may converge to different local optima depending on initialization.", "da": "Det kan konvergere til forskellige lokale optima afhængigt af initialisering."}}
  - {id: bmb830.m09.f19, type: misconception, front: {"es": "Corrige: fijar una semilla demuestra estabilidad de clusters.", "en": "Correct: fixing a seed proves cluster stability.", "da": "Ret: et fast seed beviser clusterstabilitet."}, back: {"es": "Sólo reproduce una realización; estabilidad requiere perturbaciones, resampling e inicializaciones alternativas.", "en": "It only reproduces one realization; stability needs perturbations, resampling, and alternative starts.", "da": "Det reproducerer kun én realisering; stabilitet kræver perturbationer og alternative starts."}}
  - {id: bmb830.m09.f20, type: stability, front: {"es": "¿Cómo evaluar estabilidad de clustering?", "en": "How can clustering stability be assessed?", "da": "Hvordan vurderes clusterstabilitet?"}, back: {"es": "Comparando asignaciones bajo bootstrap, subconjuntos, escalas, distancias, k e inicializaciones.", "en": "Compare assignments under bootstrap, subsets, scaling, distances, k, and starts.", "da": "Sammenlign assignments under bootstrap, subsets, skalering, afstande, k og starts."}}
  - {id: bmb830.m09.f21, type: batch, front: {"es": "¿Qué indica PC1 asociado a fecha de procesamiento?", "en": "What does PC1 associated with processing date suggest?", "da": "Hvad antyder PC1 associeret med behandlingsdato?"}, back: {"es": "Que variación técnica puede dominar el eje y debe investigarse antes de interpretar biología.", "en": "Technical variation may dominate the axis and must be investigated before biological interpretation.", "da": "Teknisk variation kan dominere aksen og skal undersøges før biologisk fortolkning."}}
  - {id: bmb830.m09.f22, type: misconception, front: {"es": "Corrige: batch correction siempre recupera la señal biológica verdadera.", "en": "Correct: batch correction always recovers the true biological signal.", "da": "Ret: batch correction genskaber altid det sande biologiske signal."}, back: {"es": "Si batch y grupo están confundidos, no pueden separarse de forma identificable sin información adicional.", "en": "If batch and group are confounded, they cannot be identifiable separated without additional information.", "da": "Hvis batch og gruppe er confounded, kan de ikke separeres identificerbart uden ekstra information."}}
  - {id: bmb830.m09.f23, type: claim_review, front: {"es": "¿Qué evidencia falta antes de llamar “subtipo” a un cluster?", "en": "What evidence is missing before calling a cluster a subtype?", "da": "Hvilken evidens mangler før en cluster kaldes subtype?"}, back: {"es": "Estabilidad, replicación independiente, relación externa y utilidad o mecanismo coherente.", "en": "Stability, independent replication, external association, and coherent utility or mechanism.", "da": "Stabilitet, uafhængig replikation, ekstern association og sammenhængende nytte eller mekanisme."}}
  - {id: bmb830.m09.f24, type: integration, front: {"es": "Orden seguro para análisis multivariante.", "en": "Safe order for multivariate analysis.", "da": "Sikker rækkefølge for multivariat analyse."}, back: {"es": "Definir matriz/unidad → auditar calidad → justificar transformación/escalado → elegir geometría → PCA/clustering → superponer metadatos → estabilidad → validación externa.", "en": "Define matrix/unit → audit quality → justify transform/scaling → choose geometry → PCA/clustering → overlay metadata → stability → external validation.", "da": "Definér matrix/enhed → auditér kvalitet → begrund transformation/skalering → vælg geometri → PCA/clustering → metadata → stabilitet → ekstern validering."}}
