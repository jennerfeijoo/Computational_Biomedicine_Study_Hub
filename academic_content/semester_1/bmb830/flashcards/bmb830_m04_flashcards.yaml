course_code: BMB830
module_id: bmb830.m04
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m04.f01, type: concept, front: {"es": "¿Qué debe acompañar siempre a una proporción?", "en": "What should always accompany a proportion?", "da": "Hvad bør altid ledsage en proportion?"}, back: {"es": "El denominador y, preferiblemente, el conteo absoluto.", "en": "The denominator and preferably the absolute count.", "da": "Denominatoren og helst det absolutte antal."}}
  - {id: bmb830.m04.f02, type: comparison, front: {"es": "Media frente a mediana.", "en": "Mean versus median.", "da": "Mean versus median."}, back: {"es": "La media usa magnitudes y es sensible a extremos; la mediana usa orden y es robusta.", "en": "The mean uses magnitudes and is sensitive to extremes; the median uses order and is robust.", "da": "Mean bruger størrelser og er følsom for ekstremer; median bruger orden og er robust."}}
  - {id: bmb830.m04.f03, type: comparison, front: {"es": "SD frente a IQR.", "en": "SD versus IQR.", "da": "SD versus IQR."}, back: {"es": "SD resume dispersión alrededor de la media; IQR el 50% central y es robusto.", "en": "SD summarizes spread around the mean; IQR covers the central 50% and is robust.", "da": "SD opsummerer spredning omkring mean; IQR det centrale 50% og er robust."}}
  - {id: bmb830.m04.f04, type: misconception, front: {"es": "Corrige: SD y error estándar son intercambiables.", "en": "Correct: SD and standard error are interchangeable.", "da": "Ret: SD og standard error kan bruges om hinanden."}, back: {"es": "SD describe variabilidad de observaciones; SE incertidumbre de un estimador.", "en": "SD describes variability of observations; SE uncertainty of an estimator.", "da": "SD beskriver variation i observationer; SE usikkerhed i en estimator."}}
  - {id: bmb830.m04.f05, type: concept, front: {"es": "¿Qué muestra una ECDF?", "en": "What does an ECDF show?", "da": "Hvad viser en ECDF?"}, back: {"es": "La proporción de observaciones menores o iguales a cada valor.", "en": "The proportion of observations at or below each value.", "da": "Proportionen af observationer ved eller under hver værdi."}}
  - {id: bmb830.m04.f06, type: concept, front: {"es": "¿Qué cambia una transformación log?", "en": "What does a log transformation change?", "da": "Hvad ændrer en log-transformation?"}, back: {"es": "Convierte comparaciones multiplicativas en aditivas y cambia unidades e interpretación.", "en": "It turns multiplicative comparisons into additive ones and changes units and interpretation.", "da": "Den gør multiplikative sammenligninger additive og ændrer enheder og fortolkning."}}
  - {id: bmb830.m04.f07, type: application, front: {"es": "¿Cuándo es útil mostrar media y mediana juntas?", "en": "When is it useful to show mean and median together?", "da": "Hvornår er det nyttigt at vise mean og median sammen?"}, back: {"es": "En distribuciones sesgadas o con extremos, porque resumen aspectos distintos.", "en": "In skewed or extreme-prone distributions because they summarize different aspects.", "da": "I skæve fordelinger eller med ekstremer fordi de opsummerer forskellige aspekter."}}
  - {id: bmb830.m04.f08, type: misconception, front: {"es": "Corrige: un punto fuera de bigotes es un error de medición.", "en": "Correct: a point beyond whiskers is a measurement error.", "da": "Ret: et punkt uden for whiskers er en målefejl."}, back: {"es": "Es un flag basado en una regla gráfica; requiere investigación de procedencia.", "en": "It is a plotting-rule flag and requires provenance investigation.", "da": "Det er et grafisk flag og kræver provenance-undersøgelse."}}
  - {id: bmb830.m04.f09, type: plot_selection, front: {"es": "Gráfico apropiado para una variable numérica continua.", "en": "Appropriate plot for a continuous numerical variable.", "da": "Passende plot til en kontinuert numerisk variabel."}, back: {"es": "Histograma, ECDF, densidad o dotplot, según n y objetivo.", "en": "Histogram, ECDF, density, or dot plot depending on n and purpose.", "da": "Histogram, ECDF, density eller dotplot afhængigt af n og formål."}}
  - {id: bmb830.m04.f10, type: plot_selection, front: {"es": "Gráfico para dos variables numéricas.", "en": "Plot for two numerical variables.", "da": "Plot til to numeriske variable."}, back: {"es": "Scatterplot, posiblemente con identidad de sujeto, tendencia y escala declarada.", "en": "Scatterplot, possibly with subject identity, trend, and declared scale.", "da": "Scatterplot eventuelt med personidentitet, trend og deklareret skala."}}
  - {id: bmb830.m04.f11, type: plot_selection, front: {"es": "Gráfico para medidas repetidas por sujeto.", "en": "Plot for repeated measures by subject.", "da": "Plot til gentagne målinger per person."}, back: {"es": "Puntos o líneas conectadas por sujeto, no sólo medias grupales.", "en": "Points or lines connected by subject, not only group means.", "da": "Punkter eller linjer forbundet per person, ikke kun gruppemeans."}}
  - {id: bmb830.m04.f12, type: misconception, front: {"es": "Corrige: un barplot de medias muestra todos los datos necesarios.", "en": "Correct: a mean bar plot shows all needed data.", "da": "Ret: et mean-barplot viser alle nødvendige data."}, back: {"es": "Oculta distribución, n, dependencia y posibles subgrupos.", "en": "It hides distribution, n, dependence, and possible subgroups.", "da": "Det skjuler fordeling, n, afhængighed og mulige subgrupper."}}
  - {id: bmb830.m04.f13, type: concept, front: {"es": "¿Por qué truncar eje y en barras puede engañar?", "en": "Why can truncating the y-axis in bars mislead?", "da": "Hvorfor kan en trunkeret y-akse i bars være misvisende?"}, back: {"es": "Porque la longitud de barras se interpreta desde un origen común y la diferencia se exagera.", "en": "Bar length is interpreted from a common origin, so differences are exaggerated.", "da": "Bar-længde fortolkes fra fælles nulpunkt, så forskelle overdrives."}}
  - {id: bmb830.m04.f14, type: concept, front: {"es": "¿Cuándo puede ser aceptable un eje truncado?", "en": "When may a truncated axis be acceptable?", "da": "Hvornår kan en trunkeret akse være acceptabel?"}, back: {"es": "En líneas o scatterplots para variación local, si se declara claramente y no distorsiona el mensaje.", "en": "In lines or scatterplots for local variation if clearly declared and not distorting the message.", "da": "I linjer eller scatterplots for lokal variation hvis tydeligt deklareret."}}
  - {id: bmb830.m04.f15, type: concept, front: {"es": "¿Qué es estratificación descriptiva?", "en": "What is descriptive stratification?", "da": "Hvad er deskriptiv stratifikation?"}, back: {"es": "Mostrar resúmenes o gráficos por niveles de una variable relevante.", "en": "Showing summaries or plots across levels of a relevant variable.", "da": "At vise summaries eller plots efter niveauer af en relevant variabel."}}
  - {id: bmb830.m04.f16, type: concept, front: {"es": "Paradoja de Simpson.", "en": "Simpson's paradox.", "da": "Simpsons paradoks."}, back: {"es": "La dirección de una asociación agregada cambia o se invierte al estratificar.", "en": "The direction of an aggregate association changes or reverses after stratification.", "da": "Retningen af en aggregeret association ændres eller vendes efter stratifikation."}}
  - {id: bmb830.m04.f17, type: application, front: {"es": "¿Qué revisar si dos grupos tienen igual media pero gráficos distintos?", "en": "What should be checked if two groups have the same mean but different plots?", "da": "Hvad bør kontrolleres hvis to grupper har samme mean men forskellige plots?"}, back: {"es": "Dispersión, asimetría, multimodalidad, extremos y n.", "en": "Spread, skewness, multimodality, extremes, and n.", "da": "Spredning, skævhed, multimodalitet, ekstremer og n."}}
  - {id: bmb830.m04.f18, type: concept, front: {"es": "¿Por qué posición suele ser mejor que área para comparar valores?", "en": "Why is position usually better than area for comparing values?", "da": "Hvorfor er position normalt bedre end areal til sammenligning?"}, back: {"es": "La posición sobre una escala común se percibe con mayor precisión.", "en": "Position on a common scale is perceived more accurately.", "da": "Position på fælles skala opfattes mere præcist."}}
  - {id: bmb830.m04.f19, type: caption, front: {"es": "Elementos mínimos de un caption estadístico.", "en": "Minimum elements of a statistical caption.", "da": "Minimumselementer i en statistisk caption."}, back: {"es": "Población, variable y unidad, n, resumen o intervalo, transformación y manejo de ausentes.", "en": "Population, variable and unit, n, summary or interval, transformation, and missingness handling.", "da": "Population, variabel og enhed, n, summary eller interval, transformation og missingness-håndtering."}}
  - {id: bmb830.m04.f20, type: reproducibility, front: {"es": "¿Qué hace reproducible una figura?", "en": "What makes a figure reproducible?", "da": "Hvad gør en figur reproducerbar?"}, back: {"es": "Código versionado, datos identificables, parámetros de exportación y decisiones visibles.", "en": "Versioned code, identifiable data, export parameters, and visible decisions.", "da": "Versioneret kode, identificerbare data, eksportparametre og synlige beslutninger."}}
  - {id: bmb830.m04.f21, type: oral, front: {"es": "¿Cómo defender la elección de mediana e IQR?", "en": "How do you defend choosing median and IQR?", "da": "Hvordan forsvares valget af median og IQR?"}, back: {"es": "Mostrando asimetría o extremos y explicando que se busca un centro y dispersión robustos.", "en": "Show skewness or extremes and explain that robust center and spread are targeted.", "da": "Vis skævhed eller ekstremer og forklar at robust center og spredning ønskes."}}
  - {id: bmb830.m04.f22, type: claim_review, front: {"es": "¿Qué error hay en “el grupo B es más variable” basado sólo en un rango mayor?", "en": "What is wrong with “group B is more variable” based only on a larger range?", "da": "Hvad er galt med “gruppe B er mere variabel” kun baseret på større range?"}, back: {"es": "El rango depende fuertemente de extremos y n; debe compararse distribución y una medida de dispersión adecuada.", "en": "Range depends strongly on extremes and n; compare distributions and an appropriate spread measure.", "da": "Range afhænger stærkt af ekstremer og n; sammenlign fordelinger og passende spredningsmål."}}
  - {id: bmb830.m04.f23, type: integration, front: {"es": "Orden para construir un gráfico honesto.", "en": "Order for building an honest plot.", "da": "Rækkefølge for at bygge et ærligt plot."}, back: {"es": "Pregunta y unidad → tipo de variables → distribución y n → gráfico y escala → resumen/intervalo → etiquetas y caption.", "en": "Question and unit → variable types → distribution and n → plot and scale → summary/interval → labels and caption.", "da": "Spørgsmål og enhed → variabeltyper → fordeling og n → plot og skala → summary/interval → labels og caption."}}
  - {id: bmb830.m04.f24, type: misconception, front: {"es": "Corrige: una visualización descriptiva prueba una hipótesis.", "en": "Correct: a descriptive visualization proves a hypothesis.", "da": "Ret: en deskriptiv visualisering beviser en hypotese."}, back: {"es": "Describe patrones y calidad; la inferencia requiere un diseño y modelo adecuados.", "en": "It describes patterns and quality; inference requires an appropriate design and model.", "da": "Den beskriver mønstre og kvalitet; inferens kræver passende design og model."}}
