course_code: BMB830
module_id: bmb830.m02
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m02.f01, type: concept, front: {"es": "¿Qué vincula un nombre en R?", "en": "What does a name bind to in R?", "da": "Hvad binder et navn til i R?"}, back: {"es": "A un objeto; reasignar cambia el vínculo del nombre.", "en": "An object; reassignment changes the name binding.", "da": "Et objekt; reassignment ændrer navnets binding."}}
  - {id: bmb830.m02.f02, type: comparison, front: {"es": "`typeof()` frente a `class()`.", "en": "`typeof()` versus `class()`.", "da": "`typeof()` versus `class()`."}, back: {"es": "`typeof()` describe representación interna básica; `class()` comportamiento y semántica de alto nivel.", "en": "`typeof()` describes basic internal representation; `class()` higher-level behavior and semantics.", "da": "`typeof()` beskriver intern repræsentation; `class()` højere niveau adfærd."}}
  - {id: bmb830.m02.f03, type: concept, front: {"es": "¿Qué propiedad define un vector atómico?", "en": "What defines an atomic vector?", "da": "Hvad definerer en atomar vektor?"}, back: {"es": "Todos sus elementos comparten un único tipo.", "en": "All elements share one type.", "da": "Alle elementer deler én type."}}
  - {id: bmb830.m02.f04, type: code_trace, front: {"es": "Resultado de `c(TRUE, 2L, 3.5)`.", "en": "Result of `c(TRUE, 2L, 3.5)`.", "da": "Resultat af `c(TRUE, 2L, 3.5)`."}, back: {"es": "Un vector double; logical e integer se coercionan hacia double.", "en": "A double vector; logical and integer are coerced to double.", "da": "En double-vektor; logical og integer coerces til double."}}
  - {id: bmb830.m02.f05, type: code_trace, front: {"es": "Resultado conceptual de `c(1, \"2\")`.", "en": "Conceptual result of `c(1, \"2\")`.", "da": "Konceptuelt resultat af `c(1, \"2\")`."}, back: {"es": "Vector character `c(\"1\", \"2\")`.", "en": "Character vector `c(\"1\", \"2\")`.", "da": "Character-vektor `c(\"1\", \"2\")`."}}
  - {id: bmb830.m02.f06, type: misconception, front: {"es": "Corrige: un vector atómico puede conservar simultáneamente numeric y character.", "en": "Correct: an atomic vector can preserve numeric and character types simultaneously.", "da": "Ret: en atomar vektor kan samtidig bevare numeric og character."}, back: {"es": "Se coerciona a un tipo común; para tipos heterogéneos se usa una lista.", "en": "It coerces to one common type; use a list for heterogeneous components.", "da": "Den coerces til én fælles type; brug en liste til heterogene komponenter."}}
  - {id: bmb830.m02.f07, type: concept, front: {"es": "Índices positivos y negativos.", "en": "Positive and negative indices.", "da": "Positive og negative indeks."}, back: {"es": "Los positivos seleccionan; los negativos excluyen. No se mezclan en la misma indexación.", "en": "Positive selects; negative excludes. They cannot be mixed in one subset.", "da": "Positive vælger; negative udelukker. De kan ikke blandes i samme subset."}}
  - {id: bmb830.m02.f08, type: comparison, front: {"es": "`df[\"age\"]` frente a `df[[\"age\"]]`.", "en": "`df[\"age\"]` versus `df[[\"age\"]]`.", "da": "`df[\"age\"]` versus `df[[\"age\"]]`."}, back: {"es": "El primero conserva un data frame de una columna; el segundo extrae el vector columna.", "en": "The first preserves a one-column data frame; the second extracts the column vector.", "da": "Første bevarer et data frame med én kolonne; anden udtrækker kolonnevektoren."}}
  - {id: bmb830.m02.f09, type: concept, front: {"es": "¿Por qué `x == NA` no detecta ausentes?", "en": "Why does `x == NA` not detect missing values?", "da": "Hvorfor finder `x == NA` ikke manglende værdier?"}, back: {"es": "Comparar con un valor desconocido produce desconocido; se usa `is.na(x)`.", "en": "Comparing with an unknown yields unknown; use `is.na(x)`.", "da": "Sammenligning med ukendt giver ukendt; brug `is.na(x)`."}}
  - {id: bmb830.m02.f10, type: concept, front: {"es": "¿Qué es reciclaje en R?", "en": "What is recycling in R?", "da": "Hvad er recycling i R?"}, back: {"es": "Repetir el vector corto para operar con uno más largo.", "en": "Repeating the shorter vector to operate with a longer one.", "da": "At gentage den kortere vektor ved operation med en længere."}}
  - {id: bmb830.m02.f11, type: misconception, front: {"es": "Corrige: si el reciclaje no produce warning, es correcto.", "en": "Correct: recycling is correct if no warning appears.", "da": "Ret: recycling er korrekt hvis der ikke kommer warning."}, back: {"es": "El reciclaje exacto puede ser silencioso y aun contradecir el diseño de datos.", "en": "Exact recycling may be silent yet contradict the data design.", "da": "Eksakt recycling kan være stille og stadig være forkert."}}
  - {id: bmb830.m02.f12, type: concept, front: {"es": "¿Qué almacena un factor?", "en": "What does a factor store?", "da": "Hvad lagrer en faktor?"}, back: {"es": "Códigos enteros más un conjunto de niveles categóricos.", "en": "Integer codes plus a set of categorical levels.", "da": "Heltalskoder plus kategoriniveauer."}}
  - {id: bmb830.m02.f13, type: debugging, front: {"es": "¿Por qué `as.numeric(factor(c(\"10\",\"20\")))` puede devolver 1 y 2?", "en": "Why may `as.numeric(factor(c(\"10\",\"20\")))` return 1 and 2?", "da": "Hvorfor kan `as.numeric(factor(c(\"10\",\"20\")))` returnere 1 og 2?"}, back: {"es": "Convierte códigos internos de nivel, no etiquetas; convierte vía character y valida.", "en": "It converts internal level codes, not labels; convert through character and validate.", "da": "Den konverterer interne niveaukoder, ikke labels; konvertér via character og valider."}}
  - {id: bmb830.m02.f14, type: concept, front: {"es": "¿Qué es un data frame en su estructura básica?", "en": "What is a data frame structurally?", "da": "Hvad er et data frame strukturelt?"}, back: {"es": "Una lista nombrada de columnas de igual longitud.", "en": "A named list of equal-length columns.", "da": "En navngivet liste af kolonner med samme længde."}}
  - {id: bmb830.m02.f15, type: function, front: {"es": "Elementos de un contrato de función.", "en": "Elements of a function contract.", "da": "Elementer i en funktionskontrakt."}, back: {"es": "Entradas, tipos o estructura, supuestos, salida, efectos secundarios y errores.", "en": "Inputs, types or structure, assumptions, output, side effects, and errors.", "da": "Input, typer eller struktur, antagelser, output, side effects og fejl."}}
  - {id: bmb830.m02.f16, type: misconception, front: {"es": "Corrige: una función analítica debe imprimir el resultado y no devolverlo.", "en": "Correct: an analytical function should print rather than return its result.", "da": "Ret: en analytisk funktion bør printe i stedet for at returnere."}, back: {"es": "Debe devolver un objeto reutilizable y comprobable; imprimir es opcional.", "en": "It should return a reusable, testable object; printing is optional.", "da": "Den bør returnere et genbrugeligt, testbart objekt; print er valgfrit."}}
  - {id: bmb830.m02.f17, type: reproducibility, front: {"es": "¿Qué prueba sencilla detecta dependencia del Environment?", "en": "What simple test detects Environment dependence?", "da": "Hvilken simpel test finder afhængighed af Environment?"}, back: {"es": "Reiniciar R y ejecutar el script completo desde el inicio.", "en": "Restart R and run the full script from the beginning.", "da": "Genstart R og kør hele scriptet fra begyndelsen."}}
  - {id: bmb830.m02.f18, type: reproducibility, front: {"es": "Rutas absolutas frente a relativas.", "en": "Absolute versus relative paths.", "da": "Absolutte versus relative stier."}, back: {"es": "Las absolutas dependen de máquina y usuario; las relativas se resuelven desde una raíz de proyecto controlada.", "en": "Absolute paths depend on machine and user; relative paths resolve from a controlled project root.", "da": "Absolutte stier afhænger af maskine og bruger; relative stier fra en kontrolleret projektrod."}}
  - {id: bmb830.m02.f19, type: project, front: {"es": "Separación mínima de carpetas en un proyecto analítico.", "en": "Minimum folder separation in an analytical project.", "da": "Minimum mappestruktur i et analyseprojekt."}, back: {"es": "Datos crudos, datos derivados, scripts o funciones, resultados, figuras y reporte.", "en": "Raw data, derived data, scripts or functions, results, figures, and report.", "da": "Rådata, afledte data, scripts eller funktioner, resultater, figurer og rapport."}}
  - {id: bmb830.m02.f20, type: concept, front: {"es": "¿Por qué no sobrescribir datos crudos?", "en": "Why not overwrite raw data?", "da": "Hvorfor ikke overskrive rådata?"}, back: {"es": "Se pierde la referencia original, trazabilidad y capacidad de reproducir transformaciones.", "en": "It destroys the original reference, traceability, and ability to reproduce transformations.", "da": "Det ødelægger original reference, sporbarhed og reproduktion af transformationer."}}
  - {id: bmb830.m02.f21, type: oral, front: {"es": "Orden para depurar un objeto inesperado en R.", "en": "Order for debugging an unexpected R object.", "da": "Rækkefølge til fejlsøgning af et uventet R-objekt."}, back: {"es": "Inspeccionar `str`, tipo, clase, longitud, dimensiones, nombres, ausentes y luego la operación que lo creó.", "en": "Inspect `str`, type, class, length, dimensions, names, missingness, then the creating operation.", "da": "Inspicér `str`, type, klasse, længde, dimensioner, navne, missingness og derefter operationen."}}
  - {id: bmb830.m02.f22, type: application, front: {"es": "¿Qué implica `na.rm=TRUE` científicamente?", "en": "What does `na.rm=TRUE` imply scientifically?", "da": "Hvad indebærer `na.rm=TRUE` videnskabeligt?"}, back: {"es": "El resumen se calcula sólo con valores observados; esto debe concordar con el mecanismo de ausencia y el estimando.", "en": "The summary uses observed values only; this must align with missingness and the estimand.", "da": "Summary bruger kun observerede værdier; det skal passe til missingness og estimand."}}
  - {id: bmb830.m02.f23, type: code_review, front: {"es": "Tres señales de un script no reproducible.", "en": "Three signs of a non-reproducible script.", "da": "Tre tegn på et ikke-reproducerbart script."}, back: {"es": "Rutas personales, objetos no creados en el script y pasos manuales no documentados.", "en": "Personal paths, objects not created by the script, and undocumented manual steps.", "da": "Personlige stier, objekter ikke skabt af scriptet og udokumenterede manuelle trin."}}
  - {id: bmb830.m02.f24, type: integration, front: {"es": "Principio central de programación estadística reproducible.", "en": "Central principle of reproducible statistical programming.", "da": "Centralt princip for reproducerbar statistisk programmering."}, back: {"es": "Desde entradas declaradas, un script limpio debe reconstruir objetos, análisis y productos con decisiones visibles.", "en": "From declared inputs, a clean script should rebuild objects, analyses, and outputs with visible decisions.", "da": "Fra deklarerede input bør et rent script genskabe objekter, analyser og output med synlige beslutninger."}}
