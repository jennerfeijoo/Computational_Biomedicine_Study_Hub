count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m08.f01, type: concept, front: {es: ¿Qué modela una regresión lineal?, en: What does linear regression model?, da: Hvad modellerer lineær regression?}, back: {es: La media condicional de Y como función lineal de parámetros., en: The conditional mean of Y as a function linear in parameters., da: Det betingede mean af Y som en funktion lineær i parametre.}}
  - {id: bmb830.m08.f02, type: concept, front: {es: ¿Qué representa el término de error?, en: What does the error term represent?, da: Hvad repræsenterer fejlleddet?}, back: {es: Variación de Y alrededor de la media modelada, no necesariamente error de medición., en: Variation of Y around the modeled mean, not necessarily measurement error., da: Variation i Y omkring det modellerede mean, ikke nødvendigvis målefejl.}}
  - {id: bmb830.m08.f03, type: interpretation, front: {es: Interpretación de β1 en regresión múltiple., en: Interpretation of β1 in multiple regression., da: Fortolkning af β1 i multipel regression.}, back: {es: Cambio esperado en Y por una unidad de X1 manteniendo constantes los otros predictores modelados., en: Expected change in Y per unit X1 holding other modeled predictors constant., da: Forventet ændring i Y per enhed X1 med andre modellerede predictors konstante.}}
  - {id: bmb830.m08.f04, type: concept, front: {es: ¿Cuándo es interpretable el intercepto?, en: When is the intercept interpretable?, da: Hvornår er interceptet fortolkeligt?}, back: {es: Cuando cero y niveles de referencia de los predictores son científicamente relevantes o tras centrado apropiado., en: When zero and reference levels are scientifically meaningful or after appropriate centering., da: Når nul og referenceniveauer er videnskabeligt meningsfulde eller efter passende centering.}}
  - {id: bmb830.m08.f05, type: concept, front: {es: ¿Qué hace centrar un predictor?, en: What does centering a predictor do?, da: Hvad gør centering af en predictor?}, back: {es: Resta una referencia como la media, cambiando la interpretación del intercepto sin cambiar fitted values., en: Subtracts a reference such as the mean, changing intercept interpretation without changing fitted values., da: Trækker en reference som mean fra og ændrer interceptfortolkning uden at ændre fitted values.}}
  - {id: bmb830.m08.f06, type: factor, front: {es: ¿Cuántas columnas usa treatment coding para k niveles?, en: How many columns does treatment coding use for k levels?, da: Hvor mange kolonner bruger treatment coding for k niveauer?}, back: {es: k−1, con un nivel como referencia., en: k−1, with one reference level., da: k−1 med ét referenceniveau.}}
  - {id: bmb830.m08.f07, type: misconception, front: {es: Corrige: cambiar referencia cambia las predicciones del modelo., en: Correct: changing reference changes model predictions., da: Ret: ændring af reference ændrer modelprædiktioner.}, back: {es: Cambia coeficientes y comparaciones representadas, pero no fitted values del mismo modelo., en: It changes coefficients and represented comparisons, not fitted values from the same model., da: Det ændrer koefficienter og sammenligninger, ikke fitted values.}}
  - {id: bmb830.m08.f08, type: concept, front: {es: ¿Qué es un contraste lineal?, en: What is a linear contrast?, da: Hvad er en lineær kontrast?}, back: {es: Una combinación lineal de parámetros que expresa una comparación científica específica., en: A linear combination of parameters expressing a specific scientific comparison., da: En lineær kombination af parametre der udtrykker en specifik videnskabelig sammenligning.}}
  - {id: bmb830.m08.f09, type: concept, front: {es: ¿Cómo se relaciona ANOVA de un factor con regresión?, en: How is one-way ANOVA related to regression?, da: Hvordan relaterer one-way ANOVA sig til regression?}, back: {es: Es un modelo lineal con un predictor categórico., en: It is a linear model with a categorical predictor., da: Det er en lineær model med en kategorisk predictor.}}
  - {id: bmb830.m08.f10, type: concept, front: {es: ¿Qué evalúa un F global?, en: What does a global F test evaluate?, da: Hvad evaluerer en global F-test?}, back: {es: Si un conjunto de coeficientes o contrastes es simultáneamente cero., en: Whether a set of coefficients or contrasts is jointly zero., da: Om et sæt koefficienter eller kontraster samlet er nul.}}
  - {id: bmb830.m08.f11, type: misconception, front: {es: Corrige: F global significativo indica qué pares difieren., en: Correct: a significant global F identifies which pairs differ., da: Ret: en signifikant global F viser hvilke par der er forskellige.}, back: {es: Sólo indica alguna diferencia conjunta; se requieren contrastes específicos., en: It only indicates some joint difference; specific contrasts are required., da: Den viser kun en fælles forskel; specifikke kontraster kræves.}}
  - {id: bmb830.m08.f12, type: concept, front: {es: ¿Qué significa una interacción X1:X2?, en: What does an X1:X2 interaction mean?, da: Hvad betyder en X1:X2-interaktion?}, back: {es: La asociación de X1 con Y depende del valor o nivel de X2., en: The association of X1 with Y depends on the value or level of X2., da: Associationen mellem X1 og Y afhænger af værdien eller niveauet af X2.}}
  - {id: bmb830.m08.f13, type: interpretation, front: {es: En `y~x1*x2`, ¿dónde se interpreta el efecto principal de x1?, en: In `y~x1*x2`, where is the x1 main effect interpreted?, da: I `y~x1*x2`, hvor fortolkes x1-hovedeffekten?}, back: {es: Cuando x2=0 si es numérico o en su nivel de referencia si es factor., en: At x2=0 if numeric or at its reference level if a factor., da: Ved x2=0 hvis numerisk eller ved referenceniveau hvis faktor.}}
  - {id: bmb830.m08.f14, type: concept, front: {es: ¿Qué es un residuo?, en: What is a residual?, da: Hvad er en residual?}, back: {es: Valor observado menos valor ajustado., en: Observed value minus fitted value., da: Observeret værdi minus fitted værdi.}}
  - {id: bmb830.m08.f15, type: diagnostic, front: {es: Curvatura en residuals vs fitted sugiere..., en: Curvature in residuals versus fitted suggests..., da: Kurvatur i residuals versus fitted antyder...}, back: {es: Forma media mal especificada o relación no lineal no modelada., en: Misspecified mean structure or unmodeled nonlinearity., da: Forkert mean-struktur eller umodelleret ikke-linearitet.}}
  - {id: bmb830.m08.f16, type: diagnostic, front: {es: Forma de embudo en residuals vs fitted sugiere..., en: Funnel shape in residuals versus fitted suggests..., da: Tragtform i residuals versus fitted antyder...}, back: {es: Heterocedasticidad, es decir, varianza condicional cambiante., en: Heteroscedasticity, i.e., changing conditional variance., da: Heteroskedasticitet, dvs. ændrende betinget varians.}}
  - {id: bmb830.m08.f17, type: misconception, front: {es: Corrige: QQ plot verifica independencia., en: Correct: a QQ plot verifies independence., da: Ret: QQ-plot verificerer uafhængighed.}, back: {es: Evalúa forma de residuos; independencia se justifica principalmente por diseño y estructura., en: It assesses residual shape; independence is mainly justified by design and structure., da: Det vurderer residualform; uafhængighed begrundes primært af design og struktur.}}
  - {id: bmb830.m08.f18, type: concept, front: {es: ¿Qué es leverage?, en: What is leverage?, da: Hvad er leverage?}, back: {es: Qué tan inusual es una combinación de predictores respecto al resto., en: How unusual a predictor combination is relative to the rest., da: Hvor usædvanlig en predictor-kombination er i forhold til resten.}}
  - {id: bmb830.m08.f19, type: concept, front: {es: ¿Qué es influencia?, en: What is influence?, da: Hvad er influence?}, back: {es: Cuánto cambia el ajuste o una conclusión por una observación., en: How much the fit or conclusion changes because of an observation., da: Hvor meget fit eller konklusion ændres på grund af en observation.}}
  - {id: bmb830.m08.f20, type: misconception, front: {es: Corrige: Cook's distance alta obliga a eliminar., en: Correct: high Cook's distance requires deletion., da: Ret: høj Cook's distance kræver sletning.}, back: {es: Obliga a investigar procedencia, modelo y sensibilidad; no a eliminar automáticamente., en: It requires investigation of provenance, model, and sensitivity, not automatic deletion., da: Det kræver undersøgelse af provenance, model og følsomhed, ikke automatisk sletning.}}
  - {id: bmb830.m08.f21, type: concept, front: {es: ¿Qué efecto tiene la colinealidad?, en: What is the effect of collinearity?, da: Hvilken effekt har collinearitet?}, back: {es: Hace difícil separar coeficientes, aumenta SE y vuelve inestables sus signos o magnitudes., en: It impairs coefficient separation, increases SEs, and destabilizes signs or magnitudes., da: Det gør koefficienter svære at adskille, øger SE og gør tegn eller magnitude ustabile.}}
  - {id: bmb830.m08.f22, type: misconception, front: {es: Corrige: VIF por encima de un número universal invalida el modelo., en: Correct: VIF above a universal number invalidates a model., da: Ret: VIF over et universelt tal invaliderer modellen.}, back: {es: VIF es un diagnóstico contextual; la relevancia depende de propósito, diseño y estimando., en: VIF is contextual; relevance depends on purpose, design, and estimand., da: VIF er kontekstuel; relevans afhænger af formål, design og estimand.}}
  - {id: bmb830.m08.f23, type: claim_review, front: {es: ¿Por qué “ajustado por” no prueba causalidad?, en: Why does “adjusted for” not prove causality?, da: Hvorfor beviser “justeret for” ikke kausalitet?}, back: {es: Porque ajuste depende de confusores medidos, forma del modelo y no condicionar mediadores o colliders; el diseño sigue siendo decisivo., en: Because adjustment depends on measured confounders, model form, and avoiding mediators or colliders; design remains decisive., da: Fordi justering afhænger af målte confounders, modelstruktur og korrekt variabelvalg; designet er stadig afgørende.}}
  - {id: bmb830.m08.f24, type: integration, front: {es: Orden para defender un modelo lineal., en: Order for defending a linear model., da: Rækkefølge for at forsvare en lineær model.}, back: {es: Pregunta/estimando → fórmula y referencias → coeficientes/contrastes → predicciones → diagnósticos → influencia → incertidumbre → límites., en: Question/estimand → formula and references → coefficients/contrasts → predictions → diagnostics → influence → uncertainty → limitations., da: Spørgsmål/estimand → formel og referencer → koefficienter/kontraster → prædiktioner → diagnostik → influence → usikkerhed → begrænsninger.}}
