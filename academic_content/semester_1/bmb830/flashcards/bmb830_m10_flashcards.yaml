course_code: BMB830
module_id: bmb830.m10
count: 30
locales: [es, en, da]

cards:
  - {id: bmb830.m10.f01, type: workflow, front: {"es": "Primer paso de un análisis biológico defendible.", "en": "First step of a defensible biological analysis.", "da": "Første trin i en forsvarlig biologisk analyse."}, back: {"es": "Definir pregunta, población, unidad y estimando antes de elegir método.", "en": "Define question, population, unit, and estimand before choosing a method.", "da": "Definér spørgsmål, population, enhed og estimand før metodevalg."}}
  - {id: bmb830.m10.f02, type: workflow, front: {"es": "Cadena mínima de análisis.", "en": "Minimum analysis chain.", "da": "Minimum analysekæde."}, back: {"es": "Pregunta→diseño→datos→calidad→descripción→modelo→inferencia→diagnóstico→afirmación.", "en": "Question→design→data→quality→description→model→inference→diagnostics→claim.", "da": "Spørgsmål→design→data→kvalitet→beskrivelse→model→inferens→diagnostik→påstand."}}
  - {id: bmb830.m10.f03, type: misconception, front: {"es": "Corrige: primero se elige el test y luego se formula la pregunta.", "en": "Correct: choose the test first and formulate the question afterward.", "da": "Ret: vælg testen først og formulér spørgsmålet bagefter."}, back: {"es": "El test debe seguir al estimando, diseño, variable y dependencia.", "en": "The test should follow the estimand, design, variable, and dependence.", "da": "Testen bør følge estimand, design, variabel og afhængighed."}}
  - {id: bmb830.m10.f04, type: analysis_plan, front: {"es": "Elementos de un plan de análisis.", "en": "Elements of an analysis plan.", "da": "Elementer i en analyseplan."}, back: {"es": "Outcome, unidades, exclusiones, transformaciones, covariables, modelo, contrastes, multiplicidad y sensibilidad.", "en": "Outcome, units, exclusions, transformations, covariates, model, contrasts, multiplicity, and sensitivity.", "da": "Outcome, enheder, eksklusioner, transformationer, kovariater, model, kontraster, multiplicitet og følsomhed."}}
  - {id: bmb830.m10.f05, type: concept, front: {"es": "Preespecificado frente a exploratorio.", "en": "Prespecified versus exploratory.", "da": "Præspecifik versus eksplorativ."}, back: {"es": "Preespecificado se decide antes de resultados; exploratorio surge o cambia después y requiere etiqueta y validación posterior.", "en": "Prespecified is decided before results; exploratory arises or changes afterward and needs labeling and later validation.", "da": "Præspecifik besluttes før resultater; eksplorativ opstår efter og kræver mærkning og senere validering."}}
  - {id: bmb830.m10.f06, type: reproducibility, front: {"es": "¿Qué debe lograr una ejecución limpia?", "en": "What should a clean run achieve?", "da": "Hvad bør en ren kørsel opnå?"}, back: {"es": "Reconstruir todos los objetos, tablas, figuras y valores desde entradas declaradas.", "en": "Rebuild all objects, tables, figures, and values from declared inputs.", "da": "Genskabe alle objekter, tabeller, figurer og værdier fra deklarerede input."}}
  - {id: bmb830.m10.f07, type: misconception, front: {"es": "Corrige: guardar el workspace hace reproducible un análisis.", "en": "Correct: saving the workspace makes an analysis reproducible.", "da": "Ret: at gemme workspace gør analysen reproducerbar."}, back: {"es": "Puede ocultar objetos y orden; la reproducibilidad exige código que reconstruya desde entradas.", "en": "It may hide objects and order; reproducibility requires code rebuilding from inputs.", "da": "Det kan skjule objekter og rækkefølge; reproducerbarhed kræver kode der genskaber fra input."}}
  - {id: bmb830.m10.f08, type: provenance, front: {"es": "¿Qué rompe copiar resultados manualmente?", "en": "What does manually copying results break?", "da": "Hvad bryder manuel kopiering af resultater?"}, back: {"es": "El vínculo verificable entre código, output y reporte.", "en": "The verifiable link between code, output, and report.", "da": "Den verificerbare forbindelse mellem kode, output og rapport."}}
  - {id: bmb830.m10.f09, type: evidence, front: {"es": "¿Qué es triangulación de evidencia?", "en": "What is evidence triangulation?", "da": "Hvad er evidenstriangulering?"}, back: {"es": "Coherencia entre diseño, efecto, intervalo, gráfico, diagnóstico y sensibilidad.", "en": "Coherence across design, effect, interval, plot, diagnostics, and sensitivity.", "da": "Sammenhæng mellem design, effekt, interval, plot, diagnostik og følsomhed."}}
  - {id: bmb830.m10.f10, type: misconception, front: {"es": "Corrige: un p pequeño anula problemas de calidad o diseño.", "en": "Correct: a small p-value cancels quality or design problems.", "da": "Ret: en lille p-værdi ophæver kvalitets- eller designproblemer."}, back: {"es": "El valor p es condicional al modelo; no corrige sesgo, dependencia ni errores de datos.", "en": "The p-value is model-conditional; it does not repair bias, dependence, or data errors.", "da": "P-værdien er modelbetinget og retter ikke bias, afhængighed eller datafejl."}}
  - {id: bmb830.m10.f11, type: appraisal, front: {"es": "Primera pregunta al leer Métodos estadísticos.", "en": "First question when reading Statistical Methods.", "da": "Første spørgsmål ved læsning af Statistical Methods."}, back: {"es": "¿Cuál es la unidad independiente y qué estimando pretende responder el análisis?", "en": "What is the independent unit and which estimand does the analysis target?", "da": "Hvad er den uafhængige enhed og hvilket estimand målretter analysen?"}}
  - {id: bmb830.m10.f12, type: appraisal, front: {"es": "Cuatro áreas de auditoría de una publicación.", "en": "Four areas for appraising a publication.", "da": "Fire områder ved vurdering af en publikation."}, back: {"es": "Diseño/unidades, preprocessing, modelo/supuestos y resultados/afirmaciones.", "en": "Design/units, preprocessing, model/assumptions, and results/claims.", "da": "Design/enheder, preprocessing, model/antagelser og resultater/påstande."}}
  - {id: bmb830.m10.f13, type: misconception, front: {"es": "Corrige: una revista prestigiosa garantiza métodos válidos.", "en": "Correct: a prestigious journal guarantees valid methods.", "da": "Ret: et prestigefyldt tidsskrift garanterer gyldige metoder."}, back: {"es": "Revisión y prestigio reducen algunos riesgos, pero cada análisis necesita evaluación propia.", "en": "Review and prestige may reduce some risks, but each analysis needs its own appraisal.", "da": "Review og prestige kan reducere nogle risici, men hver analyse kræver egen vurdering."}}
  - {id: bmb830.m10.f14, type: claim, front: {"es": "Evidencia necesaria para afirmar asociación.", "en": "Evidence needed to claim association.", "da": "Evidens nødvendig for at påstå association."}, back: {"es": "Comparación estimada con incertidumbre bajo diseño y modelo adecuados, sin lenguaje causal automático.", "en": "Estimated comparison with uncertainty under suitable design and model, without automatic causal language.", "da": "Estimeret sammenligning med usikkerhed under passende design og model uden automatisk kausalt sprog."}}
  - {id: bmb830.m10.f15, type: claim, front: {"es": "Evidencia necesaria para afirmar predicción.", "en": "Evidence needed to claim prediction.", "da": "Evidens nødvendig for at påstå prædiktion."}, back: {"es": "Rendimiento del pipeline completo en datos no usados para construirlo, con métricas apropiadas.", "en": "Full-pipeline performance on data not used for construction, with suitable metrics.", "da": "Performance af hele pipelinet på data ikke brugt til konstruktion med passende metrikker."}}
  - {id: bmb830.m10.f16, type: claim, front: {"es": "Evidencia necesaria para afirmar causalidad.", "en": "Evidence needed to claim causation.", "da": "Evidens nødvendig for at påstå kausalitet."}, back: {"es": "Diseño y supuestos causales defendibles, temporalidad, control de confusión y análisis alineado.", "en": "Defensible causal design and assumptions, temporality, confounding control, and aligned analysis.", "da": "Forsvarligt kausalt design og antagelser, temporalitet, confounding-kontrol og tilpasset analyse."}}
  - {id: bmb830.m10.f17, type: misconception, front: {"es": "Corrige: separación visual en PCA demuestra capacidad predictiva.", "en": "Correct: visual PCA separation proves predictive ability.", "da": "Ret: visuel PCA-separation beviser prædiktiv evne."}, back: {"es": "PCA es exploratoria; predicción requiere validación del pipeline en datos nuevos.", "en": "PCA is exploratory; prediction requires full-pipeline validation on new data.", "da": "PCA er eksplorativ; prædiktion kræver validering af hele pipelinet på nye data."}}
  - {id: bmb830.m10.f18, type: claim_review, front: {"es": "OR=1.8, IC [0.7,4.9]: conclusión prudente.", "en": "OR=1.8, CI [0.7,4.9]: cautious conclusion.", "da": "OR=1,8, CI [0,7;4,9]: forsigtig konklusion."}, back: {"es": "Resultado impreciso compatible con reducción, ausencia y aumento; no demuestra ausencia.", "en": "Imprecise result compatible with reduction, no association, and increase; it does not prove absence.", "da": "Upræcist resultat kompatibelt med reduktion, ingen association og stigning; det beviser ikke fravær."}}
  - {id: bmb830.m10.f19, type: sensitivity, front: {"es": "¿Qué es un análisis de sensibilidad válido?", "en": "What is a valid sensitivity analysis?", "da": "Hvad er en gyldig følsomhedsanalyse?"}, back: {"es": "Comparar decisiones plausibles manteniendo fija la pregunta y reportar cómo cambian conclusiones.", "en": "Compare plausible choices while keeping the question fixed and report how conclusions change.", "da": "Sammenlign plausible valg med fast spørgsmål og rapportér ændringer i konklusioner."}}
  - {id: bmb830.m10.f20, type: misconception, front: {"es": "Corrige: sensibilidad significa elegir el análisis con p menor.", "en": "Correct: sensitivity means choosing the analysis with the smallest p-value.", "da": "Ret: følsomhed betyder at vælge analysen med mindst p-værdi."}, back: {"es": "Esa práctica es selección oportunista; sensibilidad muestra robustez o fragilidad.", "en": "That is opportunistic selection; sensitivity reveals robustness or fragility.", "da": "Det er opportunistisk selection; følsomhed viser robusthed eller skrøbelighed."}}
  - {id: bmb830.m10.f21, type: oral, front: {"es": "Estructura de una respuesta oral sólida.", "en": "Structure of a strong oral response.", "da": "Struktur for et stærkt mundtligt svar."}, back: {"es": "Pregunta→objetos→mecanismo del método→output→supuestos→alternativa→limitación.", "en": "Question→objects→method mechanism→output→assumptions→alternative→limitation.", "da": "Spørgsmål→objekter→metodemekanisme→output→antagelser→alternativ→begrænsning."}}
  - {id: bmb830.m10.f22, type: oral, front: {"es": "¿Qué hacer cuando falta información en un examen oral?", "en": "What should be done when information is missing in an oral exam?", "da": "Hvad bør gøres når information mangler i en mundtlig eksamen?"}, back: {"es": "Declarar qué falta, qué supuesto provisional usarías y cómo cambiaría la respuesta.", "en": "State what is missing, which provisional assumption you would use, and how the answer could change.", "da": "Angiv hvad der mangler, hvilken foreløbig antagelse du bruger og hvordan svaret kan ændres."}}
  - {id: bmb830.m10.f23, type: oral, front: {"es": "¿Por qué reconocer incertidumbre fortalece una defensa?", "en": "Why does acknowledging uncertainty strengthen a defense?", "da": "Hvorfor styrker anerkendelse af usikkerhed et forsvar?"}, back: {"es": "Demuestra comprensión del alcance de los datos y evita certeza inventada.", "en": "It demonstrates understanding of data scope and avoids invented certainty.", "da": "Det viser forståelse af dataområdet og undgår opdigtet sikkerhed."}}
  - {id: bmb830.m10.f24, type: alternative, front: {"es": "Comparación justa de métodos.", "en": "Fair method comparison.", "da": "Retfærdig metodesammenligning."}, back: {"es": "Mismo estimando, datos evaluativos, preprocessing permitido y criterio de evaluación.", "en": "Same estimand, evaluation data, permitted preprocessing, and evaluation criterion.", "da": "Samme estimand, evalueringsdata, tilladt preprocessing og evalueringskriterium."}}
  - {id: bmb830.m10.f25, type: limitation, front: {"es": "¿Qué hace útil una limitación?", "en": "What makes a limitation useful?", "da": "Hvad gør en begrænsning nyttig?"}, back: {"es": "Explica fuente, posible dirección o efecto y qué afirmaciones o poblaciones afecta.", "en": "It explains source, possible direction or effect, and which claims or populations are affected.", "da": "Den forklarer kilde, mulig retning eller effekt og hvilke påstande eller populationer der påvirkes."}}
  - {id: bmb830.m10.f26, type: misconception, front: {"es": "Corrige: “más datos” siempre resuelve una limitación.", "en": "Correct: “more data” always solves a limitation.", "da": "Ret: “mere data” løser altid en begrænsning."}, back: {"es": "Más datos del mismo proceso sesgado pueden aumentar precisión sin mejorar validez.", "en": "More data from the same biased process may increase precision without improving validity.", "da": "Mere data fra samme biased proces kan øge præcision uden at forbedre validitet."}}
  - {id: bmb830.m10.f27, type: publication, front: {"es": "Señal de pseudorreplicación en una publicación.", "en": "Sign of pseudoreplication in a paper.", "da": "Tegn på pseudoreplikation i en artikel."}, back: {"es": "n reportado como número de células, imágenes o medidas cuando tratamiento o muestreo ocurre por paciente o animal.", "en": "n reported as cells, images, or measurements when treatment or sampling occurs by patient or animal.", "da": "n rapporteret som celler, billeder eller målinger når behandling eller sampling sker per patient eller dyr."}}
  - {id: bmb830.m10.f28, type: integration, front: {"es": "¿Qué debe concordar antes de una conclusión?", "en": "What should agree before drawing a conclusion?", "da": "Hvad bør stemme overens før en konklusion?"}, back: {"es": "Diseño, unidad, estimando, calidad, efecto, intervalo, gráfico, diagnóstico y sensibilidad.", "en": "Design, unit, estimand, quality, effect, interval, plot, diagnostics, and sensitivity.", "da": "Design, enhed, estimand, kvalitet, effekt, interval, plot, diagnostik og følsomhed."}}
  - {id: bmb830.m10.f29, type: integration, front: {"es": "Producto mínimo de un análisis completo.", "en": "Minimum products of a complete analysis.", "da": "Minimumsprodukter fra en komplet analyse."}, back: {"es": "Diccionario y calidad, script/report reproducible, figura descriptiva, tabla principal, diagnósticos, sensibilidad y limitaciones.", "en": "Dictionary and quality report, reproducible script/report, descriptive figure, main table, diagnostics, sensitivity, and limitations.", "da": "Dataordbog og kvalitetsrapport, reproducerbart script/rapport, figur, hovedtabel, diagnostik, følsomhed og begrænsninger."}}
  - {id: bmb830.m10.f30, type: oral, front: {"es": "Pregunta final para cualquier método estadístico.", "en": "Final question for any statistical method.", "da": "Sidste spørgsmål til enhver statistisk metode."}, back: {"es": "¿Qué supuesto, alternativa o dato adicional podría cambiar esta interpretación?", "en": "Which assumption, alternative, or additional data could change this interpretation?", "da": "Hvilken antagelse, alternativ eller ekstra data kunne ændre denne fortolkning?"}}
