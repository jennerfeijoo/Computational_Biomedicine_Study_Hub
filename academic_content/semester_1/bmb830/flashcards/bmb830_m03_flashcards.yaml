schema_version: 1.0.0
course_code: BMB830
module_id: bmb830.m03
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m03.f01, type: concept, front: {es: ¿Qué debe declarar un esquema de datos?, en: What should a data schema declare?, da: Hvad bør et dataschema deklarere?}, back: {es: Nombre, significado, tipo, unidad, valores permitidos, clave y política de ausencia., en: Name, meaning, type, unit, allowed values, key, and missingness policy., da: Navn, betydning, type, enhed, tilladte værdier, nøgle og missingness-politik.}}
  - {id: bmb830.m03.f02, type: application, front: {es: ¿Por qué importar identificadores como texto?, en: Why import identifiers as text?, da: Hvorfor importere identifikatorer som tekst?}, back: {es: Para preservar ceros iniciales, longitud, formato y semántica no cuantitativa., en: To preserve leading zeros, length, format, and non-quantitative meaning., da: For at bevare indledende nuller, længde, format og ikke-kvantitativ betydning.}}
  - {id: bmb830.m03.f03, type: concept, front: {es: ¿Qué es la granularidad de una tabla?, en: What is table granularity?, da: Hvad er en tabels granularitet?}, back: {es: La unidad o nivel de detalle representado por una fila., en: The unit or level of detail represented by one row., da: Den enhed eller detaljegrad som én række repræsenterer.}}
  - {id: bmb830.m03.f04, type: concept, front: {es: ¿Qué es una clave compuesta?, en: What is a composite key?, da: Hvad er en sammensat nøgle?}, back: {es: Un conjunto de columnas que en combinación identifica una fila de forma única., en: A set of columns that jointly identifies a row uniquely., da: Et sæt kolonner der tilsammen identificerer en række unikt.}}
  - {id: bmb830.m03.f05, type: misconception, front: {es: Corrige: todos los duplicados se eliminan con `distinct()`., en: Correct: all duplicates should be removed with `distinct()`., da: Ret: alle duplikater bør fjernes med `distinct()`.}, back: {es: Primero se define clave y granularidad; duplicados pueden ser réplicas válidas o conflictos., en: Define key and granularity first; duplicates may be valid replicates or conflicts., da: Definér nøgle og granularitet først; duplikater kan være gyldige replikater eller konflikter.}}
  - {id: bmb830.m03.f06, type: concept, front: {es: ¿Por qué NA no equivale a cero?, en: Why is NA not zero?, da: Hvorfor er NA ikke nul?}, back: {es: NA indica valor desconocido o no disponible; cero es una cantidad observada., en: NA indicates unknown or unavailable; zero is an observed quantity., da: NA betyder ukendt eller utilgængelig; nul er en observeret mængde.}}
  - {id: bmb830.m03.f07, type: concept, front: {es: Ausencia estructural., en: Structural missingness., da: Strukturelt fravær.}, back: {es: El valor no existe porque la medición no aplica a esa unidad., en: The value is undefined because the measurement does not apply to that unit., da: Værdien er udefineret fordi målingen ikke gælder for enheden.}}
  - {id: bmb830.m03.f08, type: concept, front: {es: ¿Qué información contiene “<LOD”?, en: What information does “<LOD” contain?, da: Hvilken information indeholder “<LOD”?}, back: {es: Que el valor está por debajo de un límite conocido; es censura, no un valor exacto., en: The value lies below a known limit; it is censoring, not an exact value., da: Værdien ligger under en kendt grænse; det er censurering, ikke en eksakt værdi.}}
  - {id: bmb830.m03.f09, type: misconception, front: {es: Corrige: todo valor bajo LOD debe sustituirse por LOD/2., en: Correct: every below-LOD value should be replaced by LOD/2., da: Ret: hver værdi under LOD bør erstattes med LOD/2.}, back: {es: La sustitución fija puede sesgar resultados; debe justificarse o modelarse la censura y evaluarse sensibilidad., en: Fixed substitution may bias results; justify it or model censoring and assess sensitivity., da: Fast substitution kan give bias; begrund eller modellér censurering og lav følsomhedsanalyse.}}
  - {id: bmb830.m03.f10, type: validation, front: {es: Tres clases de reglas de calidad., en: Three classes of quality rules., da: Tre typer kvalitetsregler.}, back: {es: Rango o dominio, coherencia temporal y coherencia entre variables o unidades., en: Range/domain, temporal consistency, and cross-variable or unit consistency., da: Interval/domæne, tidskonsistens og konsistens mellem variable eller enheder.}}
  - {id: bmb830.m03.f11, type: misconception, front: {es: Corrige: un outlier estadístico es necesariamente un error., en: Correct: a statistical outlier is necessarily an error., da: Ret: en statistisk outlier er nødvendigvis en fejl.}, back: {es: Puede ser error, caso raro real o consecuencia del modelo; debe investigarse., en: It may be error, a true rare case, or model-related; investigate it., da: Den kan være fejl, et reelt sjældent tilfælde eller modelrelateret; undersøg den.}}
  - {id: bmb830.m03.f12, type: concept, front: {es: ¿Qué caracteriza formato long?, en: What characterizes long format?, da: Hvad karakteriserer long format?}, back: {es: Una fila por observación o medición con columnas que identifican unidad y variable., en: One row per observation or measurement with unit and variable identifiers., da: Én række per observation eller måling med kolonner for enhed og variabel.}}
  - {id: bmb830.m03.f13, type: concept, front: {es: ¿Qué caracteriza formato wide?, en: What characterizes wide format?, da: Hvad karakteriserer wide format?}, back: {es: Mediciones distintas aparecen en columnas separadas para una unidad., en: Different measurements appear in separate columns for a unit., da: Forskellige målinger står i separate kolonner for en enhed.}}
  - {id: bmb830.m03.f14, type: validation, front: {es: ¿Cómo validar un reshaping reversible?, en: How do you validate reversible reshaping?, da: Hvordan valideres reversibel reshaping?}, back: {es: Comprobar claves únicas, conteos y que wide→long→wide reproduce valores y nombres esperados., en: Check unique keys, counts, and that wide→long→wide reproduces expected values and names., da: Kontrollér unikke nøgler, antal og at wide→long→wide genskaber forventede værdier og navne.}}
  - {id: bmb830.m03.f15, type: concept, front: {es: Cardinalidad uno-a-uno., en: One-to-one cardinality., da: One-to-one-kardinalitet.}, back: {es: Cada clave aparece como máximo una vez en cada tabla., en: Each key appears at most once in each table., da: Hver nøgle optræder højst én gang i hver tabel.}}
  - {id: bmb830.m03.f16, type: concept, front: {es: Riesgo de un join muchos-a-muchos., en: Risk of a many-to-many join., da: Risiko ved many-to-many join.}, back: {es: Multiplicación de filas y duplicación no intencional de información o peso estadístico., en: Row multiplication and unintended duplication of information or statistical weight., da: Multiplikation af rækker og utilsigtet duplikation af information eller statistisk vægt.}}
  - {id: bmb830.m03.f17, type: application, front: {es: Cuatro conteos que revisar en un join., en: Four counts to inspect in a join., da: Fire antal der bør kontrolleres i et join.}, back: {es: Filas antes/después, claves únicas, claves duplicadas y unidades no emparejadas., en: Rows before/after, unique keys, duplicate keys, and unmatched units., da: Rækker før/efter, unikke nøgler, duplikerede nøgler og unmatched enheder.}}
  - {id: bmb830.m03.f18, type: misconception, front: {es: Corrige: si `left_join()` ejecuta sin error, el join es válido., en: Correct: if `left_join()` runs without error, the join is valid., da: Ret: hvis `left_join()` kører uden fejl, er joinet gyldigt.}, back: {es: La validez depende de claves, cardinalidad, granularidad y no emparejados, no sólo de sintaxis., en: Validity depends on keys, cardinality, granularity, and unmatched units, not syntax alone., da: Validitet afhænger af nøgler, kardinalitet, granularitet og unmatched enheder, ikke kun syntaks.}}
  - {id: bmb830.m03.f19, type: provenance, front: {es: ¿Qué registra una transformación trazable?, en: What does a traceable transformation record?, da: Hvad registrerer en sporbar transformation?}, back: {es: Entrada, salida, código, regla, fecha, conteos afectados y justificación., en: Input, output, code, rule, date, affected counts, and justification., da: Input, output, kode, regel, dato, berørte antal og begrundelse.}}
  - {id: bmb830.m03.f20, type: concept, front: {es: ¿Por qué mantener datos crudos inmutables?, en: Why keep raw data immutable?, da: Hvorfor holde rådata uændrede?}, back: {es: Para conservar referencia original y poder regenerar todos los derivados., en: To preserve the original reference and regenerate all derived data., da: For at bevare original reference og kunne regenerere alle afledte data.}}
  - {id: bmb830.m03.f21, type: oral, front: {es: ¿Qué preguntar antes de imputar?, en: What should be asked before imputation?, da: Hvad bør spørges før imputering?}, back: {es: Por qué falta, qué unidad y variable, qué estimando, qué información predice la ausencia y qué sensibilidad se evaluará., en: Why it is missing, which unit and variable, what estimand, what predicts missingness, and what sensitivity will be assessed., da: Hvorfor det mangler, hvilken enhed og variabel, hvilket estimand, hvad der forudsiger missingness, og hvilken følsomhed der vurderes.}}
  - {id: bmb830.m03.f22, type: application, front: {es: ¿Qué hacer ante una fecha de alta anterior al ingreso?, en: What should be done when discharge precedes admission?, da: Hvad bør gøres når udskrivning ligger før indlæggelse?}, back: {es: Marcar la violación, revisar fuente y metadatos y corregir sólo con evidencia documentada., en: Flag the violation, review source and metadata, and correct only with documented evidence., da: Flag bruddet, gennemgå kilde og metadata og korrigér kun med dokumenteret evidens.}}
  - {id: bmb830.m03.f23, type: integration, front: {es: Orden mínimo de un pipeline de limpieza., en: Minimum order of a cleaning pipeline., da: Minimum rækkefølge i et cleaning-pipeline.}, back: {es: Importar con esquema → validar claves/tipos/unidades → caracterizar ausencia → corregir con evidencia → reshape/join auditado → guardar derivados y log., en: Schema import → validate keys/types/units → characterize missingness → evidence-based correction → audited reshape/join → save derived data and log., da: Schema-import → valider nøgler/typer/enheder → karakterisér missingness → evidensbaseret korrektion → auditeret reshape/join → gem afledte data og log.}}
  - {id: bmb830.m03.f24, type: claim_review, front: {es: ¿Por qué la limpieza pertenece a Métodos?, en: Why does cleaning belong in Methods?, da: Hvorfor hører datarensning til i Methods?}, back: {es: Porque filtros, exclusiones, unidades y transformaciones cambian la población analizada y los valores modelados., en: Because filters, exclusions, units, and transformations change the analyzed population and modeled values., da: Fordi filtre, eksklusioner, enheder og transformationer ændrer populationen og de modellerede værdier.}}
