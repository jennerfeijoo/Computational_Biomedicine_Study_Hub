course_code: BMB830
module_id: bmb830.m05
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m05.f01, type: concept, front: {es: ¿Qué es un evento?, en: What is an event?, da: Hvad er en hændelse?}, back: {es: Un subconjunto del espacio muestral., en: A subset of the sample space., da: En delmængde af udfaldsrummet.}}
  - {id: bmb830.m05.f02, type: formula, front: {es: Regla del complemento., en: Complement rule., da: Komplementreglen.}, back: {es: P(Aᶜ)=1−P(A)., en: P(Aᶜ)=1−P(A)., da: P(Aᶜ)=1−P(A).}}
  - {id: bmb830.m05.f03, type: formula, front: {es: Regla general de la unión., en: General union rule., da: Generel unionsregel.}, back: {es: P(A∪B)=P(A)+P(B)−P(A∩B)., en: P(A∪B)=P(A)+P(B)−P(A∩B)., da: P(A∪B)=P(A)+P(B)−P(A∩B).}}
  - {id: bmb830.m05.f04, type: concept, front: {es: Probabilidad condicional., en: Conditional probability., da: Betinget sandsynlighed.}, back: {es: P(A|B)=P(A∩B)/P(B), restringiendo el universo a B., en: P(A|B)=P(A∩B)/P(B), restricting the universe to B., da: P(A|B)=P(A∩B)/P(B), hvor universet begrænses til B.}}
  - {id: bmb830.m05.f05, type: concept, front: {es: Criterio de independencia., en: Independence criterion., da: Kriterium for uafhængighed.}, back: {es: P(A∩B)=P(A)P(B), o equivalentemente P(A|B)=P(A) cuando está definido., en: P(A∩B)=P(A)P(B), or equivalently P(A|B)=P(A) when defined., da: P(A∩B)=P(A)P(B), eller P(A|B)=P(A) når defineret.}}
  - {id: bmb830.m05.f06, type: misconception, front: {es: Corrige: eventos mutuamente excluyentes son independientes., en: Correct: mutually exclusive events are independent., da: Ret: gensidigt udelukkende hændelser er uafhængige.}, back: {es: Si tienen probabilidad positiva, son dependientes porque uno impide el otro., en: If they have positive probability, they are dependent because one prevents the other., da: Hvis de har positiv sandsynlighed, er de afhængige fordi den ene udelukker den anden.}}
  - {id: bmb830.m05.f07, type: bayes, front: {es: ¿Qué combina la regla de Bayes?, en: What does Bayes' rule combine?, da: Hvad kombinerer Bayes' regel?}, back: {es: Probabilidad previa y verosimilitud para obtener una probabilidad posterior., en: Prior probability and likelihood to obtain posterior probability., da: Prior-sandsynlighed og likelihood for at få posterior sandsynlighed.}}
  - {id: bmb830.m05.f08, type: misconception, front: {es: Corrige: sensibilidad=P(enfermedad|positivo)., en: Correct: sensitivity=P(disease|positive)., da: Ret: sensitivitet=P(sygdom|positiv).}, back: {es: Sensibilidad=P(positivo|enfermedad); P(enfermedad|positivo) es PPV y depende de prevalencia., en: Sensitivity=P(positive|disease); P(disease|positive) is PPV and depends on prevalence., da: Sensitivitet=P(positiv|sygdom); P(sygdom|positiv) er PPV og afhænger af prævalens.}}
  - {id: bmb830.m05.f09, type: application, front: {es: ¿Por qué baja prevalencia reduce PPV?, en: Why does low prevalence reduce PPV?, da: Hvorfor reducerer lav prævalens PPV?}, back: {es: Porque los no enfermos son muchos y aun una pequeña tasa de falsos positivos puede superar a los verdaderos positivos., en: Because non-diseased people are numerous and a small false-positive rate may exceed true positives., da: Fordi ikke-syge er mange og en lille falsk-positiv-rate kan overstige sande positive.}}
  - {id: bmb830.m05.f10, type: concept, front: {es: ¿Qué es una variable aleatoria?, en: What is a random variable?, da: Hvad er en stokastisk variabel?}, back: {es: Una función que asigna un número a cada resultado posible., en: A function assigning a number to each possible outcome., da: En funktion der tildeler et tal til hvert muligt udfald.}}
  - {id: bmb830.m05.f11, type: concept, front: {es: ¿Qué representa la esperanza?, en: What does expectation represent?, da: Hvad repræsenterer forventning?}, back: {es: Un promedio ponderado por probabilidades o promedio de largo plazo., en: A probability-weighted or long-run average., da: Et sandsynlighedsvægtet langtidsmiddel.}}
  - {id: bmb830.m05.f12, type: misconception, front: {es: Corrige: la esperanza debe ser un valor observable., en: Correct: expectation must be an observable value., da: Ret: forventning skal være en observerbar værdi.}, back: {es: Puede no pertenecer al soporte, como 3.5 en el resultado de un dado., en: It need not be in the support, such as 3.5 for a die., da: Den behøver ikke ligge i supporten, fx 3,5 for en terning.}}
  - {id: bmb830.m05.f13, type: formula, front: {es: E[a+bX] y Var(a+bX)., en: E[a+bX] and Var(a+bX)., da: E[a+bX] og Var(a+bX).}, back: {es: E[a+bX]=a+bE[X]; Var(a+bX)=b²Var(X)., en: E[a+bX]=a+bE[X]; Var(a+bX)=b²Var(X)., da: E[a+bX]=a+bE[X]; Var(a+bX)=b²Var(X).}}
  - {id: bmb830.m05.f14, type: concept, front: {es: ¿Qué modela Bernoulli?, en: What does Bernoulli model?, da: Hvad modellerer Bernoulli?}, back: {es: Un único resultado binario con probabilidad p de éxito., en: One binary outcome with success probability p., da: Ét binært udfald med succes-sandsynlighed p.}}
  - {id: bmb830.m05.f15, type: concept, front: {es: Supuestos principales de Binomial(n,p)., en: Main assumptions of Binomial(n,p)., da: Hovedantagelser for Binomial(n,p).}, back: {es: n fijo, resultados binarios, p común e independencia condicional., en: Fixed n, binary outcomes, common p, and conditional independence., da: Fast n, binære udfald, fælles p og betinget uafhængighed.}}
  - {id: bmb830.m05.f16, type: formula, front: {es: Media y varianza binomial., en: Binomial mean and variance., da: Binomial mean og varians.}, back: {es: E[X]=np; Var(X)=np(1−p)., en: E[X]=np; Var(X)=np(1−p)., da: E[X]=np; Var(X)=np(1−p).}}
  - {id: bmb830.m05.f17, type: concept, front: {es: ¿Qué modela Poisson?, en: What does Poisson model?, da: Hvad modellerer Poisson?}, back: {es: Conteos de eventos sobre una exposición bajo una tasa aproximadamente constante., en: Event counts over exposure under an approximately constant rate., da: Counts af events over exposure med omtrent konstant rate.}}
  - {id: bmb830.m05.f18, type: formula, front: {es: Media y varianza Poisson simple., en: Simple Poisson mean and variance., da: Simpel Poisson mean og varians.}, back: {es: Ambas son λ., en: Both equal λ., da: Begge er λ.}}
  - {id: bmb830.m05.f19, type: concept, front: {es: ¿Qué es sobre-dispersión?, en: What is overdispersion?, da: Hvad er overdispersion?}, back: {es: Variabilidad observada mayor que la predicha por el modelo, por ejemplo Var>media en Poisson., en: Observed variability exceeding model prediction, such as variance>mean for Poisson., da: Observeret variation større end modellen forudsiger, fx varians>mean i Poisson.}}
  - {id: bmb830.m05.f20, type: application, front: {es: Conteos con tiempos de observación distintos: ¿qué falta?, en: Counts with unequal observation times: what is missing?, da: Counts med forskellige observationstider: hvad mangler?}, back: {es: La exposición o un offset para modelar tasas comparables., en: Exposure or an offset to model comparable rates., da: Exposure eller offset til sammenlignelige rater.}}
  - {id: bmb830.m05.f21, type: concept, front: {es: ¿Qué caracteriza la distribución normal?, en: What characterizes the normal distribution?, da: Hvad karakteriserer normalfordelingen?}, back: {es: Es continua, simétrica y determinada por media y SD., en: It is continuous, symmetric, and determined by mean and SD., da: Den er kontinuert, symmetrisk og bestemt af mean og SD.}}
  - {id: bmb830.m05.f22, type: misconception, front: {es: Corrige: todo outcome continuo debe ser normal., en: Correct: every continuous outcome should be normal., da: Ret: hvert kontinuert outcome bør være normalt.}, back: {es: La elección depende de soporte, mecanismo, forma condicional y propósito del modelo., en: Choice depends on support, mechanism, conditional shape, and model purpose., da: Valget afhænger af support, mekanisme, betinget form og modelmål.}}
  - {id: bmb830.m05.f23, type: concept, front: {es: Propiedad sin memoria de la exponencial., en: Memoryless property of the exponential., da: Memoryless-egenskaben for eksponentialfordelingen.}, back: {es: La distribución de espera restante no depende del tiempo ya esperado., en: Remaining waiting time does not depend on elapsed waiting time., da: Resterende ventetid afhænger ikke af allerede ventet tid.}}
  - {id: bmb830.m05.f24, type: integration, front: {es: Orden para elegir distribución., en: Order for choosing a distribution., da: Rækkefølge ved valg af fordeling.}, back: {es: Outcome y soporte → mecanismo → denominador/exposición → dependencia → relación media-varianza → diagnóstico y alternativas., en: Outcome and support → mechanism → denominator/exposure → dependence → mean-variance relation → diagnostics and alternatives., da: Outcome og support → mekanisme → denominator/exposure → afhængighed → mean-varians-relation → diagnostik og alternativer.}}
