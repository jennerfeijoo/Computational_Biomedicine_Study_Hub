module_id: bmb830.m06
count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m06.f01, type: concept, front: {es: Parámetro frente a estadístico., en: Parameter versus statistic., da: Parameter versus statistik.}, back: {es: El parámetro describe la población; el estadístico se calcula en la muestra., en: A parameter describes the population; a statistic is calculated from the sample., da: En parameter beskriver populationen; en statistik beregnes fra samplen.}}
  - {id: bmb830.m06.f02, type: concept, front: {es: Estimador frente a estimación., en: Estimator versus estimate., da: Estimator versus estimat.}, back: {es: El estimador es la regla aleatoria; la estimación es el valor observado., en: The estimator is the random rule; the estimate is the observed value., da: Estimatoren er den stokastiske regel; estimatet er den observerede værdi.}}
  - {id: bmb830.m06.f03, type: concept, front: {es: ¿Qué es una distribución muestral?, en: What is a sampling distribution?, da: Hvad er en samplingfordeling?}, back: {es: La distribución de un estadístico bajo repetición hipotética del mismo diseño., en: The distribution of a statistic under hypothetical repetition of the same design., da: Fordelingen af en statistik under hypotetisk gentagelse af samme design.}}
  - {id: bmb830.m06.f04, type: misconception, front: {es: Corrige: el histograma de los datos es la distribución muestral de la media., en: Correct: the data histogram is the sampling distribution of the mean., da: Ret: datahistogrammet er samplingfordelingen for mean.}, back: {es: El histograma describe observaciones; la distribución muestral describe medias de muestras repetidas., en: The histogram describes observations; the sampling distribution describes means across repeated samples., da: Histogrammet beskriver observationer; samplingfordelingen beskriver means fra gentagne samples.}}
  - {id: bmb830.m06.f05, type: concept, front: {es: Definición de sesgo de un estimador., en: Definition of estimator bias., da: Definition af estimatorbias.}, back: {es: E[estimador]−parámetro., en: E[estimator]−parameter., da: E[estimator]−parameter.}}
  - {id: bmb830.m06.f06, type: formula, front: {es: Descomposición de MSE., en: MSE decomposition., da: MSE-dekomponering.}, back: {es: MSE=Varianza+Sesgo²., en: MSE=Variance+Bias²., da: MSE=Varians+Bias².}}
  - {id: bmb830.m06.f07, type: concept, front: {es: ¿Qué es el error estándar?, en: What is standard error?, da: Hvad er standard error?}, back: {es: La SD de la distribución muestral del estimador., en: The SD of the estimator's sampling distribution., da: SD for estimatorens samplingfordeling.}}
  - {id: bmb830.m06.f08, type: comparison, front: {es: SD frente a SE., en: SD versus SE., da: SD versus SE.}, back: {es: SD describe variación entre observaciones; SE incertidumbre del estimador., en: SD describes variation among observations; SE estimator uncertainty., da: SD beskriver variation mellem observationer; SE estimatorusikkerhed.}}
  - {id: bmb830.m06.f09, type: formula, front: {es: SE aproximado de una media independiente., en: Approximate SE of an independent mean., da: Omtrentligt SE for et uafhængigt mean.}, back: {es: s/√n., en: s/√n., da: s/√n.}}
  - {id: bmb830.m06.f10, type: application, front: {es: Si n se cuadruplica, ¿qué ocurre con SE?, en: If n quadruples, what happens to SE?, da: Hvis n firedobles, hvad sker der med SE?}, back: {es: Se reduce aproximadamente a la mitad., en: It approximately halves., da: Det halveres omtrent.}}
  - {id: bmb830.m06.f11, type: concept, front: {es: ¿Qué aproxima el CLT?, en: What does the CLT approximate?, da: Hvad approksimerer CLT?}, back: {es: La distribución estandarizada de ciertas sumas o medias bajo condiciones., en: The standardized distribution of certain sums or means under conditions., da: Den standardiserede fordeling af visse summer eller means under betingelser.}}
  - {id: bmb830.m06.f12, type: misconception, front: {es: Corrige: el CLT vuelve normales las observaciones., en: Correct: the CLT makes observations normal., da: Ret: CLT gør observationerne normale.}, back: {es: No cambia la distribución de datos; aproxima la distribución de ciertos estimadores., en: It does not change the data distribution; it approximates certain estimator distributions., da: Det ændrer ikke datafordelingen; det approksimerer estimatorfordelinger.}}
  - {id: bmb830.m06.f13, type: concept, front: {es: Interpretación correcta de cobertura 95%., en: Correct interpretation of 95% coverage., da: Korrekt fortolkning af 95% dækning.}, back: {es: En repeticiones del procedimiento, aproximadamente 95% de intervalos contienen el parámetro., en: Across procedure repetitions, about 95% of intervals contain the parameter., da: Ved gentagelse af proceduren indeholder ca. 95% af intervallerne parameteren.}}
  - {id: bmb830.m06.f14, type: misconception, front: {es: Corrige: hay 95% de probabilidad frecuentista de que el parámetro esté en este IC., en: Correct: there is 95% frequentist probability that the parameter lies in this CI., da: Ret: der er 95% frequentistisk sandsynlighed for at parameteren ligger i dette CI.}, back: {es: El parámetro se trata como fijo; 95% describe el procedimiento antes de observar datos., en: The parameter is treated as fixed; 95% describes the pre-data procedure., da: Parameteren behandles som fast; 95% beskriver proceduren før data.}}
  - {id: bmb830.m06.f15, type: concept, front: {es: ¿Qué determina la anchura de un IC?, en: What determines CI width?, da: Hvad bestemmer bredden af et CI?}, back: {es: Error estándar, nivel de confianza y forma del procedimiento., en: Standard error, confidence level, and procedure form., da: Standard error, konfidensniveau og procedureform.}}
  - {id: bmb830.m06.f16, type: misconception, front: {es: Corrige: un IC estrecho demuestra ausencia de sesgo., en: Correct: a narrow CI proves absence of bias., da: Ret: et smalt CI beviser fravær af bias.}, back: {es: Puede ser estrecho alrededor de un valor sesgado por diseño o medición., en: It may be narrow around a design- or measurement-biased value., da: Det kan være smalt omkring en biased værdi fra design eller måling.}}
  - {id: bmb830.m06.f17, type: concept, front: {es: Pasos básicos del bootstrap., en: Basic bootstrap steps., da: Grundlæggende bootstrap-trin.}, back: {es: Remuestrear con reemplazo n unidades, recalcular estadístico, repetir y resumir distribución., en: Resample n units with replacement, recompute statistic, repeat, and summarize distribution., da: Resample n enheder med replacement, genberegn statistik, gentag og opsummér fordelingen.}}
  - {id: bmb830.m06.f18, type: concept, front: {es: ¿Qué aproxima la distribución empírica en bootstrap?, en: What does the empirical distribution approximate in bootstrap?, da: Hvad approksimerer den empiriske fordeling i bootstrap?}, back: {es: La población generadora desconocida., en: The unknown generating population., da: Den ukendte genererende population.}}
  - {id: bmb830.m06.f19, type: misconception, front: {es: Corrige: bootstrap elimina el sesgo de selección., en: Correct: bootstrap removes selection bias., da: Ret: bootstrap fjerner selection bias.}, back: {es: Remuestrea la muestra observada y hereda su sesgo de representación., en: It resamples the observed sample and inherits representation bias., da: Den resampler den observerede sample og arver repræsentationsbias.}}
  - {id: bmb830.m06.f20, type: resampling, front: {es: Unidad bootstrap en datos emparejados., en: Bootstrap unit for paired data., da: Bootstrap-enhed for parrede data.}, back: {es: El par completo o la diferencia por par, preservando la asociación., en: The complete pair or paired difference, preserving association., da: Det komplette par eller parforskel, så associationen bevares.}}
  - {id: bmb830.m06.f21, type: resampling, front: {es: Unidad bootstrap en datos por paciente con múltiples células., en: Bootstrap unit for patients with multiple cells., da: Bootstrap-enhed for patienter med flere celler.}, back: {es: El paciente como clúster con sus células, salvo un modelo específico de varios niveles., en: The patient as a cluster with its cells, unless a specific multilevel scheme is used., da: Patienten som cluster med sine celler, medmindre et specifikt multilevel-scheme bruges.}}
  - {id: bmb830.m06.f22, type: comparison, front: {es: Intervalo percentil frente a normal bootstrap., en: Percentile versus normal bootstrap interval., da: Percentil versus normal bootstrap-interval.}, back: {es: Percentil usa cuantiles de estimaciones; normal usa estimación±z·SE y asume simetría aproximada., en: Percentile uses estimate quantiles; normal uses estimate±z·SE with approximate symmetry., da: Percentil bruger estimat-kvantiler; normal bruger estimat±z·SE med omtrent symmetri.}}
  - {id: bmb830.m06.f23, type: oral, front: {es: ¿Qué preguntar antes de confiar en un IC?, en: What should be asked before trusting a CI?, da: Hvad bør spørges før man stoler på et CI?}, back: {es: Unidad independiente, diseño, modelo, sesgo, forma de estimador y método de SE o remuestreo., en: Independent unit, design, model, bias, estimator shape, and SE or resampling method., da: Uafhængig enhed, design, model, bias, estimatorform og SE- eller resamplingmetode.}}
  - {id: bmb830.m06.f24, type: integration, front: {es: Cadena de inferencia de una estimación., en: Inference chain for an estimate., da: Inferenskæde for et estimat.}, back: {es: Estimando → estimador → diseño repetido → distribución muestral → SE → intervalo → interpretación y limitaciones., en: Estimand → estimator → repeated design → sampling distribution → SE → interval → interpretation and limitations., da: Estimand → estimator → gentaget design → samplingfordeling → SE → interval → fortolkning og begrænsninger.}}
