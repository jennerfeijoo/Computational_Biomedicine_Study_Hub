count: 24
locales: [es, en, da]

cards:
  - {id: bmb830.m07.f01, type: concept, front: {es: ¿Sobre qué debe formularse una hipótesis?, en: What should a hypothesis be formulated about?, da: Hvad bør en hypotese formuleres om?}, back: {es: Sobre un parámetro o distribución definidos por el estimando., en: A parameter or distribution defined by the estimand., da: En parameter eller fordeling defineret af estimandet.}}
  - {id: bmb830.m07.f02, type: concept, front: {es: ¿Qué resume un estadístico de prueba?, en: What does a test statistic summarize?, da: Hvad opsummerer en teststatistik?}, back: {es: La discrepancia entre los datos y la hipótesis nula, usualmente relativa a su variabilidad., en: The discrepancy between data and the null hypothesis, usually relative to variability., da: Afvigelsen mellem data og nulhypotesen, typisk relativt til variationen.}}
  - {id: bmb830.m07.f03, type: concept, front: {es: ¿Qué es la distribución nula?, en: What is the null distribution?, da: Hvad er nulfordelingen?}, back: {es: La distribución del estadístico si H0 y los supuestos fueran correctos., en: The distribution of the statistic if H0 and assumptions were correct., da: Fordelingen af statistikken hvis H0 og antagelserne var korrekte.}}
  - {id: bmb830.m07.f04, type: concept, front: {es: Definición correcta de valor p., en: Correct definition of a p-value., da: Korrekt definition af en p-værdi.}, back: {es: Probabilidad bajo H0 y el modelo de un estadístico al menos tan incompatible como el observado., en: Probability under H0 and the model of a statistic at least as incompatible as observed., da: Sandsynligheden under H0 og modellen for en statistik mindst så inkompatibel som observeret.}}
  - {id: bmb830.m07.f05, type: misconception, front: {es: Corrige: p=0.02 significa 2% de probabilidad de que H0 sea verdadera., en: Correct: p=0.02 means a 2% probability that H0 is true., da: Ret: p=0,02 betyder 2% sandsynlighed for at H0 er sand.}, back: {es: El valor p es condicional a H0; no es una probabilidad posterior de H0., en: The p-value is conditional on H0; it is not a posterior probability for H0., da: P-værdien er betinget på H0; den er ikke en posterior sandsynlighed for H0.}}
  - {id: bmb830.m07.f06, type: misconception, front: {es: Corrige: valor p es la probabilidad de que el resultado se deba al azar., en: Correct: the p-value is the probability the result is due to chance., da: Ret: p-værdien er sandsynligheden for at resultatet skyldes tilfældighed.}, back: {es: Es una probabilidad del estadístico bajo un modelo nulo, no una clasificación causal del resultado., en: It is a probability of the statistic under a null model, not a causal classification of the result., da: Det er en sandsynlighed for statistikken under nulmodellen, ikke en kausal klassifikation.}}
  - {id: bmb830.m07.f07, type: concept, front: {es: Error tipo I., en: Type I error., da: Type I-fejl.}, back: {es: Rechazar H0 cuando H0 es verdadera., en: Rejecting H0 when H0 is true., da: At afvise H0 når H0 er sand.}}
  - {id: bmb830.m07.f08, type: concept, front: {es: Error tipo II., en: Type II error., da: Type II-fejl.}, back: {es: No rechazar H0 bajo una alternativa verdadera y relevante., en: Failing to reject H0 under a true relevant alternative., da: Ikke at afvise H0 under en sand relevant alternativ.}}
  - {id: bmb830.m07.f09, type: concept, front: {es: ¿Qué es potencia?, en: What is power?, da: Hvad er power?}, back: {es: La probabilidad de rechazar H0 bajo una alternativa específica; 1−β., en: The probability of rejecting H0 under a specific alternative; 1−β., da: Sandsynligheden for at afvise H0 under en specifik alternativ; 1−β.}}
  - {id: bmb830.m07.f10, type: application, front: {es: ¿Qué aumenta normalmente la potencia?, en: What usually increases power?, da: Hvad øger normalt power?}, back: {es: Mayor n, mayor efecto, menor variabilidad o mayor α, con sus respectivos compromisos., en: Larger n, larger effect, lower variability, or larger α, with trade-offs., da: Større n, større effekt, mindre variation eller større α, med trade-offs.}}
  - {id: bmb830.m07.f11, type: misconception, front: {es: Corrige: p>0.05 demuestra que el efecto es cero., en: Correct: p>0.05 proves the effect is zero., da: Ret: p>0,05 beviser at effekten er nul.}, back: {es: Puede reflejar baja precisión; el intervalo muestra qué efectos siguen compatibles., en: It may reflect low precision; the interval shows which effects remain compatible., da: Det kan afspejle lav præcision; intervallet viser kompatible effekter.}}
  - {id: bmb830.m07.f12, type: concept, front: {es: ¿Cuándo es defendible una prueba unilateral?, en: When is a one-sided test defensible?, da: Hvornår er en ensidet test forsvarlig?}, back: {es: Cuando la dirección se preespecifica y el efecto opuesto no apoyaría la misma afirmación., en: When direction is prespecified and the opposite effect would not support the same claim., da: Når retningen er præspecifik og modsat effekt ikke støtter samme påstand.}}
  - {id: bmb830.m07.f13, type: misconception, front: {es: Corrige: puede elegirse unilateral después de observar el signo., en: Correct: one-sided testing may be chosen after observing the sign., da: Ret: ensidet test kan vælges efter at have set tegnet.}, back: {es: Esa selección retrospectiva invalida el control nominal de error., en: That retrospective selection invalidates nominal error control., da: Den retrospektive selection invaliderer den nominelle fejlkontrol.}}
  - {id: bmb830.m07.f14, type: concept, front: {es: ¿Qué es un tamaño de efecto?, en: What is an effect size?, da: Hvad er en effektstørrelse?}, back: {es: Una medida de la magnitud de una diferencia o asociación en una escala definida., en: A measure of the magnitude of a difference or association on a defined scale., da: Et mål for magnitude af en forskel eller association på en defineret skala.}}
  - {id: bmb830.m07.f15, type: comparison, front: {es: Efecto absoluto frente a estandarizado., en: Absolute versus standardized effect., da: Absolut versus standardiseret effekt.}, back: {es: El absoluto conserva unidades y suele ser más interpretable; el estandarizado divide por una escala de variabilidad., en: Absolute effects retain units and are often more interpretable; standardized effects divide by a variability scale., da: Absolut effekt bevarer enheder; standardiseret effekt dividerer med en variationsskala.}}
  - {id: bmb830.m07.f16, type: misconception, front: {es: Corrige: significancia estadística implica importancia biológica., en: Correct: statistical significance implies biological importance., da: Ret: statistisk signifikans indebærer biologisk betydning.}, back: {es: Importancia depende de magnitud, contexto, costes y umbrales externos., en: Importance depends on magnitude, context, costs, and external thresholds., da: Betydning afhænger af magnitude, kontekst, omkostninger og eksterne tærskler.}}
  - {id: bmb830.m07.f17, type: concept, front: {es: ¿Qué es multiplicidad?, en: What is multiplicity?, da: Hvad er multiplicitet?}, back: {es: Múltiples oportunidades de obtener o seleccionar resultados extremos mediante varios análisis., en: Multiple opportunities to obtain or select extreme results through several analyses., da: Flere muligheder for at få eller vælge ekstreme resultater gennem flere analyser.}}
  - {id: bmb830.m07.f18, type: application, front: {es: Fuentes de multiplicidad además de muchos genes., en: Sources of multiplicity beyond many genes., da: Kilder til multiplicitet ud over mange gener.}, back: {es: Outcomes, tiempos, subgrupos, transformaciones, filtros, covariables y modelos., en: Outcomes, time points, subgroups, transformations, filters, covariates, and models., da: Outcomes, tidspunkter, subgrupper, transformationer, filtre, kovariater og modeller.}}
  - {id: bmb830.m07.f19, type: misconception, front: {es: Corrige: pruebas no reportadas no afectan multiplicidad., en: Correct: unreported tests do not affect multiplicity., da: Ret: urapporterede tests påvirker ikke multiplicitet.}, back: {es: Si influyeron en seleccionar el resultado reportado, forman parte de la oportunidad inferencial., en: If they influenced selection of the reported result, they are part of the inferential opportunity., da: Hvis de påvirkede selection af resultatet, er de del af inferensen.}}
  - {id: bmb830.m07.f20, type: concept, front: {es: ¿Qué controla Bonferroni?, en: What does Bonferroni control?, da: Hvad kontrollerer Bonferroni?}, back: {es: El error familiar de al menos un falso positivo mediante umbral α/m., en: Family-wise error of at least one false positive using threshold α/m., da: Family-wise error for mindst én falsk positiv via tærskel α/m.}}
  - {id: bmb830.m07.f21, type: claim_review, front: {es: Resultado p<0.001 con efecto minúsculo: conclusión., en: p<0.001 with a tiny effect: conclusion., da: p<0,001 med meget lille effekt: konklusion.}, back: {es: Evidencia estadística de una diferencia pequeña; relevancia requiere comparar magnitud e intervalo con un umbral., en: Statistical evidence for a small difference; relevance requires comparing magnitude and interval with a threshold., da: Statistisk evidens for en lille forskel; relevans kræver sammenligning med en tærskel.}}
  - {id: bmb830.m07.f22, type: claim_review, front: {es: p=0.4 con IC muy amplio: conclusión., en: p=0.4 with a very wide CI: conclusion., da: p=0,4 med meget bredt CI: konklusion.}, back: {es: Resultado impreciso e inconcluso, no evidencia de equivalencia., en: Imprecise and inconclusive, not evidence of equivalence., da: Upræcist og inkonklusivt, ikke evidens for ækvivalens.}}
  - {id: bmb830.m07.f23, type: oral, front: {es: Orden para interpretar una prueba., en: Order for interpreting a test., da: Rækkefølge ved fortolkning af en test.}, back: {es: Estimando → diseño → efecto e IC → valor p → supuestos → multiplicidad → relevancia → límites., en: Estimand → design → effect and CI → p-value → assumptions → multiplicity → relevance → limitations., da: Estimand → design → effekt og CI → p-værdi → antagelser → multiplicitet → relevans → begrænsninger.}}
  - {id: bmb830.m07.f24, type: integration, front: {es: ¿Por qué no debe decidirse sólo con p<0.05?, en: Why should decisions not rely only on p<0.05?, da: Hvorfor bør beslutninger ikke kun baseres på p<0,05?}, back: {es: Porque el umbral ignora magnitud, precisión, diseño, costes, multiplicidad y relevancia., en: Because the threshold ignores magnitude, precision, design, costs, multiplicity, and relevance., da: Fordi tærsklen ignorerer magnitude, præcision, design, omkostninger, multiplicitet og relevans.}}
