module_id: bmb831.m03
count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m03.f01, type: concept, front: {es: ¿Qué define una familia de hipótesis?, en: What defines a hypothesis family?, da: Hvad definerer en hypotese-familie?}, back: {es: Una decisión científica o interpretación conjunta especificada antes de revisar significancia., en: A scientific decision or joint interpretation specified before inspecting significance., da: En videnskabelig beslutning eller fælles fortolkning specificeret før signifikans ses.}}
  - {id: bmb831.m03.f02, type: concept, front: {es: Define FWER., en: Define FWER., da: Definér FWER.}, back: {es: Probabilidad de al menos un falso positivo en la familia., en: Probability of at least one false positive in the family., da: Sandsynlighed for mindst én falsk positiv i familien.}}
  - {id: bmb831.m03.f03, type: concept, front: {es: Define FDP., en: Define FDP., da: Definér FDP.}, back: {es: Proporción realizada de falsos entre los descubrimientos de una ejecución., en: Realized proportion of false discoveries in one run., da: Realiseret andel falske blandt discoveries i én kørsel.}}
  - {id: bmb831.m03.f04, type: concept, front: {es: Define FDR., en: Define FDR., da: Definér FDR.}, back: {es: Valor esperado de la FDP bajo repetición del procedimiento., en: Expected FDP under repetition of the procedure., da: Forventet FDP ved gentagelse af proceduren.}}
  - {id: bmb831.m03.f05, type: misconception, front: {es: Corrige: FDR 5% significa exactamente 5% falsos en mi lista., en: Correct: 5% FDR means exactly 5% false in my list., da: Ret: 5% FDR betyder præcist 5% falske i min liste.}, back: {es: Es una expectativa del procedimiento; una lista concreta puede tener otra FDP., en: It is a procedural expectation; one list may have a different FDP., da: Det er en procedureforventning; en konkret liste kan have anden FDP.}}
  - {id: bmb831.m03.f06, type: algorithm, front: {es: Pasos de Benjamini–Hochberg., en: Benjamini–Hochberg steps., da: Benjamini–Hochberg-trin.}, back: {es: Ordenar p, comparar p(k) con kα/m, hallar mayor k y rechazar hasta k., en: Order p, compare p(k) with kα/m, find largest k, and reject through k., da: Sortér p, sammenlign p(k) med kα/m, find største k og afvis til k.}}
  - {id: bmb831.m03.f07, type: interpretation, front: {es: ¿Qué significa un p ajustado BH?, en: What does a BH-adjusted p-value mean?, da: Hvad betyder en BH-justeret p-værdi?}, back: {es: Menor nivel FDR del procedimiento al que la hipótesis sería declarada., en: Smallest procedure FDR level at which the hypothesis would be declared., da: Mindste procedure-FDR-niveau hvor hypotesen ville blive erklæret.}}
  - {id: bmb831.m03.f08, type: misconception, front: {es: Corrige: padj es probabilidad de que la hipótesis sea nula., en: Correct: adjusted p is the probability that the hypothesis is null., da: Ret: padj er sandsynligheden for at hypotesen er nul.}, back: {es: No es una probabilidad posterior; es una medida frecuentista ligada al procedimiento., en: It is not a posterior probability; it is a frequentist procedural measure., da: Det er ikke en posterior sandsynlighed; det er et frequentistisk proceduremål.}}
  - {id: bmb831.m03.f09, type: filtering, front: {es: Define filtrado independiente., en: Define independent filtering., da: Definér independent filtering.}, back: {es: Filtrar por un criterio independiente del test bajo la nula para retirar características sin información., en: Filter by a criterion independent of the test under the null to remove uninformative features., da: Filtrér efter kriterium uafhængigt af testen under nulhypotesen for at fjerne uinformative features.}}
  - {id: bmb831.m03.f10, type: practice, front: {es: ¿Es independiente filtrar por fold change observado?, en: Is filtering by observed fold change independent?, da: Er filtrering efter observeret fold change uafhængig?}, back: {es: No; utiliza el contraste observado y altera la selección., en: No; it uses the observed contrast and changes selection., da: Nej; det bruger den observerede kontrast og ændrer selection.}}
  - {id: bmb831.m03.f11, type: practice, front: {es: ¿Cuándo puede ser válido filtrar por abundancia media?, en: When can mean-abundance filtering be valid?, da: Hvornår kan filtrering på middelabundance være gyldig?}, back: {es: Cuando se calcula sin usar grupo y es independiente del estadístico bajo la nula., en: When computed group-blind and independent of the statistic under the null., da: Når den beregnes gruppeblindt og er uafhængig af statistikken under nulhypotesen.}}
  - {id: bmb831.m03.f12, type: effect, front: {es: p pequeño frente a efecto grande., en: Small p versus large effect., da: Lille p versus stor effekt.}, back: {es: p resume evidencia relativa al modelo; magnitud e incertidumbre responden relevancia y precisión., en: p summarizes model-relative evidence; magnitude and uncertainty address relevance and precision., da: p opsummerer modelrelativ evidens; størrelse og usikkerhed adresserer relevans og præcision.}}
  - {id: bmb831.m03.f13, type: shrinkage, front: {es: ¿Por qué usar shrinkage de efectos?, en: Why use effect shrinkage?, da: Hvorfor bruge effect shrinkage?}, back: {es: Estabiliza estimaciones extremas y ruidosas, especialmente con poca información., en: Stabilizes extreme noisy estimates, especially with little information., da: Stabiliserer ekstreme støjende estimater, især ved lidt information.}}
  - {id: bmb831.m03.f14, type: misconception, front: {es: Corrige: shrinkage elimina efectos reales., en: Correct: shrinkage removes real effects., da: Ret: shrinkage fjerner reelle effekter.}, back: {es: Regulariza según incertidumbre; efectos bien informados cambian menos., en: It regularizes according to uncertainty; well-informed effects change less., da: Det regulariserer efter usikkerhed; velinformerede effekter ændres mindre.}}
  - {id: bmb831.m03.f15, type: prioritization, front: {es: Cuatro componentes de priorización., en: Four prioritization components., da: Fire prioriteringskomponenter.}, back: {es: Magnitud relevante, incertidumbre, multiplicidad y evidencia/replicación externa., en: Relevant magnitude, uncertainty, multiplicity, and external evidence/replication., da: Relevant størrelse, usikkerhed, multiplicitet og ekstern evidens/replikation.}}
  - {id: bmb831.m03.f16, type: stability, front: {es: Define frecuencia de selección., en: Define selection frequency., da: Definér selektionsfrekvens.}, back: {es: Proporción de resamples en que una característica satisface la regla de selección., en: Proportion of resamples in which a feature satisfies the selection rule., da: Andel resamples hvor en feature opfylder selektionsreglen.}}
  - {id: bmb831.m03.f17, type: stability, front: {es: ¿Qué dimensiones de estabilidad revisar?, en: Which stability dimensions should be checked?, da: Hvilke stabilitetsdimensioner bør vurderes?}, back: {es: Signo, magnitud, intervalo, selección y rango., en: Sign, magnitude, interval, selection, and rank., da: Tegn, størrelse, interval, selection og rang.}}
  - {id: bmb831.m03.f18, type: replication, front: {es: Requisito de replicación externa., en: External replication requirement., da: Krav til ekstern replikation.}, back: {es: Mismo estimando o contraste, escala compatible y datos independientes., en: Same estimand or contrast, compatible scale, and independent data., da: Samme estimand eller kontrast, kompatibel skala og uafhængige data.}}
  - {id: bmb831.m03.f19, type: misconception, front: {es: Corrige: top 20 por p son biomarcadores validados., en: Correct: top 20 by p are validated biomarkers., da: Ret: top 20 efter p er validerede biomarkører.}, back: {es: Son candidatos internos; biomarcador exige estabilidad, validación analítica y evaluación externa o clínica., en: They are internal candidates; biomarkers require stability, analytical validation, and external or clinical evaluation., da: De er interne kandidater; biomarkører kræver stabilitet, analytisk validering og ekstern eller klinisk evaluering.}}
  - {id: bmb831.m03.f20, type: calculation, front: {es: En BH, ¿por qué importa m?, en: Why does m matter in BH?, da: Hvorfor betyder m noget i BH?}, back: {es: Determina los umbrales kα/m y refleja oportunidad total de error., en: It determines kα/m thresholds and reflects total error opportunity., da: Det bestemmer kα/m-tærskler og afspejler samlet fejlmulighed.}}
  - {id: bmb831.m03.f21, type: family, front: {es: Riesgo de definir familias después de ver resultados., en: Risk of defining families after seeing results., da: Risiko ved at definere familier efter resultater.}, back: {es: Reduce artificialmente multiplicidad y convierte selección en inferencia no contabilizada., en: It artificially reduces multiplicity and leaves selection unaccounted for., da: Det reducerer kunstigt multiplicitet og efterlader selection ukontrolleret.}}
  - {id: bmb831.m03.f22, type: oral, front: {es: Explica por qué p y efecto deben reportarse juntos., en: Explain why p and effect should be reported together., da: Forklar hvorfor p og effekt bør rapporteres sammen.}, back: {es: p informa compatibilidad bajo modelo; el efecto y su IC informan magnitud y precisión., en: p informs model-based compatibility; effect and CI inform magnitude and precision., da: p informerer modelbaseret kompatibilitet; effekt og CI informerer størrelse og præcision.}}
  - {id: bmb831.m03.f23, type: integration, front: {es: Orden de priorización defendible., en: Defensible prioritization order., da: Forsvarlig prioriteringsrækkefølge.}, back: {es: Familia→QC/filtro independiente→modelo→FDR→efecto/IC→estabilidad→evidencia externa→prioridad., en: Family→QC/independent filter→model→FDR→effect/CI→stability→external evidence→priority., da: Familie→QC/independent filter→model→FDR→effekt/CI→stabilitet→ekstern evidens→prioritet.}}
  - {id: bmb831.m03.f24, type: critique, front: {es: Señal de ranking frágil., en: Sign of a fragile ranking., da: Tegn på en skrøbelig ranking.}, back: {es: Pequeños cambios de muestra o modelo alteran signo y orden de los principales candidatos., en: Small sample or model changes alter sign and order of top candidates., da: Små ændringer i sample eller model ændrer tegn og rækkefølge for topkandidater.}}
