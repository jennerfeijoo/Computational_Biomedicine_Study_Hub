locales: [es, en, da]

cards:
  - {id: bmb831.m10.f01, type: concept, front: {es: ¿Qué pregunta ORA?, en: What does ORA ask?, da: Hvad spørger ORA om?}, back: {es: Si un término está sobrerrepresentado en una lista respecto a un universo elegible., en: Whether a term is overrepresented in a list relative to an eligible universe., da: Om et term er overrepræsenteret i en liste relativt til et eligible univers.}}
  - {id: bmb831.m10.f02, type: universe, front: {es: Define universo correcto., en: Define the correct universe., da: Definér korrekt univers.}, back: {es: Características que fueron medibles y podían ser seleccionadas tras criterios previos., en: Features that were measurable and could have been selected after prior eligibility criteria., da: Features der var målbare og kunne vælges efter tidligere eligibility-kriterier.}}
  - {id: bmb831.m10.f03, type: misconception, front: {es: Corrige: todo el genoma es siempre el background., en: Correct: the whole genome is always the background., da: Ret: hele genomet er altid background.}, back: {es: Si muchas características no eran detectables, el universo genómico distorsiona probabilidades., en: If many features were undetectable, a genome-wide universe distorts probabilities., da: Hvis mange features ikke var detekterbare, forvrænger et genom-bredt univers sandsynligheder.}}
  - {id: bmb831.m10.f04, type: calculation, front: {es: Cuatro cantidades del test hipergeométrico., en: Four quantities in a hypergeometric test., da: Fire størrelser i en hypergeometrisk test.}, back: {es: Tamaño universo, tamaño término, tamaño lista y solapamiento., en: Universe size, term size, list size, and overlap., da: Universstørrelse, termstørrelse, listestørrelse og overlap.}}
  - {id: bmb831.m10.f05, type: assumption, front: {es: Supuesto simplificador de ORA., en: Simplifying ORA assumption., da: Forenklet ORA-antagelse.}, back: {es: Genes tratados como unidades intercambiables bajo la nula, pese a dependencia real., en: Genes treated as exchangeable units under the null despite real dependence., da: Gener behandles som udskiftelige enheder under nulhypotesen trods reel afhængighed.}}
  - {id: bmb831.m10.f06, type: ranked, front: {es: Ventaja de enriquecimiento rankeado., en: Advantage of ranked enrichment., da: Fordel ved ranked enrichment.}, back: {es: Usa todas las características y evita un cutoff binario arbitrario., en: Uses all features and avoids an arbitrary binary cutoff., da: Bruger alle features og undgår et vilkårligt binært cutoff.}}
  - {id: bmb831.m10.f07, type: ranking, front: {es: Requisitos de una métrica rankeada., en: Requirements of a ranking metric., da: Krav til en ranking-metrik.}, back: {es: Signo interpretable, relación con contraste, estabilidad y definición previa., en: Interpretable sign, relation to contrast, stability, and prespecification., da: Fortolkeligt tegn, relation til kontrast, stabilitet og prædefinition.}}
  - {id: bmb831.m10.f08, type: misconception, front: {es: Corrige: ordenar sólo por |log2FC| conserva dirección., en: Correct: ranking only by |log2FC| preserves direction., da: Ret: ranking kun efter |log2FC| bevarer retning.}, back: {es: El valor absoluto elimina dirección y mezcla regulación opuesta., en: Absolute value removes direction and mixes opposite regulation., da: Absolutværdi fjerner retning og blander modsat regulering.}}
  - {id: bmb831.m10.f09, type: null_model, front: {es: Diferencia entre permutar muestras y genes., en: Difference between permuting samples and genes., da: Forskel mellem permutation af samples og gener.}, back: {es: Conservan estructuras distintas y representan nulas diferentes., en: They preserve different structures and represent different nulls., da: De bevarer forskellige strukturer og repræsenterer forskellige nulmodeller.}}
  - {id: bmb831.m10.f10, type: leading_edge, front: {es: Define leading edge., en: Define leading edge., da: Definér leading edge.}, back: {es: Subconjunto de miembros que impulsa principalmente el score de enriquecimiento., en: Subset of members that primarily drives the enrichment score., da: Subset af medlemmer der primært driver enrichment-score.}}
  - {id: bmb831.m10.f11, type: misconception, front: {es: Corrige: vía enriquecida significa todos los genes alterados., en: Correct: enriched pathway means all genes are altered., da: Ret: beriget pathway betyder alle gener er ændret.}, back: {es: La señal puede provenir de un subconjunto y ser direccionalmente heterogénea., en: Signal may arise from a subset and be directionally heterogeneous., da: Signalet kan komme fra et subset og være retningsmæssigt heterogent.}}
  - {id: bmb831.m10.f12, type: set_size, front: {es: Problema de conjuntos muy pequeños., en: Problem with very small gene sets., da: Problem med meget små gensæt.}, back: {es: Resultados inestables y dominados por pocos miembros., en: Unstable results dominated by very few members., da: Ustabile resultater domineret af meget få medlemmer.}}
  - {id: bmb831.m10.f13, type: set_size, front: {es: Problema de conjuntos muy grandes., en: Problem with very large gene sets., da: Problem med meget store gensæt.}, back: {es: Baja especificidad y solapamiento con muchos procesos., en: Low specificity and overlap with many processes., da: Lav specificitet og overlap med mange processer.}}
  - {id: bmb831.m10.f14, type: multiplicity, front: {es: ¿Por qué ajustar FDR en vías?, en: Why adjust FDR for pathways?, da: Hvorfor justere FDR for pathways?}, back: {es: Se prueban muchos términos y existe amplia oportunidad de falsos positivos., en: Many terms are tested, creating substantial false-positive opportunity., da: Mange terms testes og giver stor falsk-positiv mulighed.}}
  - {id: bmb831.m10.f15, type: redundancy, front: {es: Fuente principal de redundancia GO., en: Main source of GO redundancy., da: Hovedkilde til GO-redundans.}, back: {es: Jerarquía parent-child y miembros compartidos entre términos., en: Parent-child hierarchy and shared members among terms., da: Parent-child-hierarki og delte medlemmer mellem terms.}}
  - {id: bmb831.m10.f16, type: misconception, front: {es: Corrige: diez términos similares son diez confirmaciones independientes., en: Correct: ten similar terms are ten independent confirmations., da: Ret: ti lignende terms er ti uafhængige bekræftelser.}, back: {es: Pueden reflejar la misma señal anotada repetidamente., en: They may reflect the same signal annotated repeatedly., da: De kan afspejle det samme signal annoteret gentagne gange.}}
  - {id: bmb831.m10.f17, type: bias, front: {es: Define sesgo de anotación., en: Define annotation bias., da: Definér annotationsbias.}, back: {es: Genes bien estudiados reciben más términos y tienen mayor probabilidad de aparecer enriquecidos., en: Well-studied genes receive more terms and are more likely to appear enriched., da: Velstuderede gener får flere terms og har større sandsynlighed for enrichment.}}
  - {id: bmb831.m10.f18, type: circularity, front: {es: Ejemplo de validación circular., en: Example of circular validation., da: Eksempel på cirkulær validering.}, back: {es: Seleccionar genes por pertenecer a una vía y luego usar esa misma vía para confirmar función., en: Select genes by pathway membership and then use the same pathway to confirm function., da: Vælge gener efter pathway-medlemskab og derefter bruge samme pathway til at bekræfte funktion.}}
  - {id: bmb831.m10.f19, type: misconception, front: {es: Corrige: ORA significativa demuestra vía activada., en: Correct: significant ORA proves pathway activation., da: Ret: signifikant ORA beviser pathway-aktivering.}, back: {es: ORA no modela dirección, actividad ni causalidad; sólo exceso de miembros anotados., en: ORA models neither direction, activity, nor causality; only excess annotated membership., da: ORA modellerer ikke retning, aktivitet eller kausalitet; kun overskud af annoterede medlemmer.}}
  - {id: bmb831.m10.f20, type: sensitivity, front: {es: Cuatro sensibilidades de enriquecimiento., en: Four enrichment sensitivity analyses., da: Fire enrichment-følsomhedsanalyser.}, back: {es: Universo, mapping, cutoff/ranking y base/versión., en: Universe, mapping, cutoff/ranking, and database/version., da: Univers, mapping, cutoff/ranking og database/version.}}
  - {id: bmb831.m10.f21, type: visualization, front: {es: Qué mostrar en dotplot de vías., en: What should a pathway dotplot show?, da: Hvad bør et pathway-dotplot vise?}, back: {es: Tamaño, ratio o NES, dirección, FDR y redundancia/contexto., en: Size, ratio or NES, direction, FDR, and redundancy/context., da: Størrelse, ratio eller NES, retning, FDR og redundans/kontekst.}}
  - {id: bmb831.m10.f22, type: practice, front: {es: Proteómica detectó 3000 proteínas. Universo ORA., en: Proteomics detected 3000 proteins. ORA universe., da: Proteomik detekterede 3000 proteiner. ORA-univers.}, back: {es: Proteínas elegibles tras QC y mapping, no todos los genes del genoma., en: Proteins eligible after QC and mapping, not all genome genes., da: Proteiner eligible efter QC og mapping, ikke alle gener i genomet.}}
  - {id: bmb831.m10.f23, type: oral, front: {es: Orden para defender enriquecimiento., en: Order for defending enrichment., da: Rækkefølge for at forsvare enrichment.}, back: {es: Pregunta→universo/mapping→lista/ranking→nula→método→FDR→leading edge/redundancia→sensibilidad→hipótesis., en: Question→universe/mapping→list/ranking→null→method→FDR→leading edge/redundancy→sensitivity→hypothesis., da: Spørgsmål→univers/mapping→liste/ranking→nul→metode→FDR→leading edge/redundans→følsomhed→hypotese.}}
  - {id: bmb831.m10.f24, type: integration, front: {es: Afirmación funcional prudente., en: Cautious functional claim., da: Forsigtig funktionel påstand.}, back: {es: “Los resultados son compatibles con alteración coordinada de este proceso y justifican validación independiente”., en: “Results are compatible with coordinated alteration of this process and justify independent validation.”, da: “Resultaterne er kompatible med koordineret ændring af denne proces og begrunder uafhængig validering.”}}
