module_id: bmb831.m06
count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m06.f01, type: clustering, front: {es: ¿Por qué no existe un único clustering verdadero?, en: Why is there no single true clustering?, da: Hvorfor findes der ikke én sand clustering?}, back: {es: La solución depende de representación, distancia, algoritmo, parámetros y k., en: The solution depends on representation, distance, algorithm, parameters, and k., da: Løsningen afhænger af repræsentation, afstand, algoritme, parametre og k.}}
  - {id: bmb831.m06.f02, type: clustering, front: {es: Geometría favorecida por k-means., en: Geometry favored by k-means., da: Geometri favoriseret af k-means.}, back: {es: Grupos aproximadamente esféricos bajo distancia euclídea., en: Roughly spherical groups under Euclidean distance., da: Omtrent sfæriske grupper under euklidisk afstand.}}
  - {id: bmb831.m06.f03, type: clustering, front: {es: ¿Qué depende del linkage jerárquico?, en: What depends on hierarchical linkage?, da: Hvad afhænger af hierarkisk linkage?}, back: {es: Cómo se define distancia entre clusters y por tanto el dendrograma., en: How distance between clusters is defined and therefore the dendrogram., da: Hvordan afstand mellem clusters defineres og dermed dendrogrammet.}}
  - {id: bmb831.m06.f04, type: misconception, front: {es: Corrige: silhouette alta demuestra subtipo biológico., en: Correct: high silhouette proves a biological subtype., da: Ret: høj silhouette beviser en biologisk subtype.}, back: {es: Sólo indica separación interna bajo una representación y métrica., en: It only indicates internal separation under one representation and metric., da: Det indikerer kun intern separation under én repræsentation og metrik.}}
  - {id: bmb831.m06.f05, type: stability, front: {es: ¿Cómo evaluar estabilidad de clusters?, en: How should cluster stability be assessed?, da: Hvordan vurderes clusterstabilitet?}, back: {es: Bootstrap, subsampling, perturbación y consistencia de asignaciones o subespacios., en: Bootstrap, subsampling, perturbation, and consistency of assignments or subspaces., da: Bootstrap, subsampling, perturbation og konsistens af assignments eller subspaces.}}
  - {id: bmb831.m06.f06, type: validity, front: {es: ¿Qué añade validez biológica a un cluster?, en: What adds biological validity to a cluster?, da: Hvad giver biologisk validitet til en cluster?}, back: {es: Asociación externa reproducible y no reutilizada para definirlo., en: Reproducible external association not reused to define it., da: Reproducerbar ekstern association der ikke blev genbrugt til at definere den.}}
  - {id: bmb831.m06.f07, type: target, front: {es: Elementos de un target supervisado., en: Elements of a supervised target., da: Elementer i et superviseret target.}, back: {es: Outcome, horizonte, tiempo índice, población y datos disponibles entonces., en: Outcome, horizon, index time, population, and data available then., da: Outcome, horisont, indekstid, population og data tilgængelige da.}}
  - {id: bmb831.m06.f08, type: leakage, front: {es: Define leakage temporal., en: Define temporal leakage., da: Definér temporal leakage.}, back: {es: Uso de información generada después del momento en que debería emitirse la predicción., en: Use of information generated after the prediction should have been made., da: Brug af information genereret efter det tidspunkt hvor prædiktionen skulle være lavet.}}
  - {id: bmb831.m06.f09, type: split, front: {es: Unidad de split con varias visitas por paciente., en: Split unit with multiple visits per patient., da: Split-enhed med flere besøg per patient.}, back: {es: Paciente, manteniendo todas sus visitas juntas., en: Patient, keeping all visits together., da: Patient, med alle besøg samlet.}}
  - {id: bmb831.m06.f10, type: misconception, front: {es: Corrige: dividir células aleatoriamente estima rendimiento en nuevos pacientes., en: Correct: random cell splitting estimates performance in new patients., da: Ret: tilfældig cellesplitting estimerer performance i nye patienter.}, back: {es: Mezcla identidad de paciente entre train y test y produce optimismo., en: It mixes patient identity across train and test and causes optimism., da: Det blander patientidentitet mellem train og test og giver optimisme.}}
  - {id: bmb831.m06.f11, type: leakage, front: {es: Pasos no supervisados que también pueden filtrar información., en: Unsupervised steps that can still leak information., da: Usuperviserede trin der stadig kan lække information.}, back: {es: Imputación, escalado, batch correction, PCA y filtrado por varianza., en: Imputation, scaling, batch correction, PCA, and variance filtering., da: Imputation, skalering, batch correction, PCA og variansfiltrering.}}
  - {id: bmb831.m06.f12, type: pipeline, front: {es: ¿Qué se valida realmente?, en: What is actually validated?, da: Hvad valideres egentlig?}, back: {es: El pipeline completo desde preprocessing hasta predicción y umbral., en: The complete pipeline from preprocessing through prediction and thresholding., da: Hele pipelinet fra preprocessing til prædiktion og tærskel.}}
  - {id: bmb831.m06.f13, type: nested_cv, front: {es: Función del inner loop., en: Function of the inner loop., da: Funktion af inner loop.}, back: {es: Seleccionar hiperparámetros, variables y opciones de preprocessing., en: Select hyperparameters, features, and preprocessing options., da: Vælge hyperparametre, features og preprocessing-valg.}}
  - {id: bmb831.m06.f14, type: nested_cv, front: {es: Función del outer loop., en: Function of the outer loop., da: Funktion af outer loop.}, back: {es: Estimar rendimiento del procedimiento completo de selección., en: Estimate performance of the full selection procedure., da: Estimere performance af hele selektionsproceduren.}}
  - {id: bmb831.m06.f15, type: misconception, front: {es: Corrige: test final puede usarse hasta quedar satisfecho., en: Correct: final test can be used until satisfied., da: Ret: endelig test kan bruges indtil man er tilfreds.}, back: {es: Cada inspección lo convierte en desarrollo y erosiona independencia., en: Each inspection turns it into development data and erodes independence., da: Hver inspektion gør det til udviklingsdata og reducerer uafhængighed.}}
  - {id: bmb831.m06.f16, type: metric, front: {es: ¿Qué mide ROC-AUC?, en: What does ROC-AUC measure?, da: Hvad måler ROC-AUC?}, back: {es: Capacidad de ranking entre positivos y negativos a través de umbrales., en: Ranking ability between positives and negatives across thresholds., da: Rankingevne mellem positive og negative på tværs af tærskler.}}
  - {id: bmb831.m06.f17, type: metric, front: {es: ¿Cuándo es especialmente útil PR-AUC?, en: When is PR-AUC especially useful?, da: Hvornår er PR-AUC særligt nyttig?}, back: {es: Cuando la clase positiva es rara y su recuperación importa., en: When the positive class is rare and its retrieval matters., da: Når den positive klasse er sjælden og dens retrieval er vigtig.}}
  - {id: bmb831.m06.f18, type: calibration, front: {es: Define calibración., en: Define calibration., da: Definér kalibrering.}, back: {es: Concordancia entre riesgos predichos y frecuencias observadas., en: Agreement between predicted risks and observed frequencies., da: Overensstemmelse mellem prædikterede risici og observerede frekvenser.}}
  - {id: bmb831.m06.f19, type: misconception, front: {es: Corrige: AUC alta garantiza probabilidades fiables., en: Correct: high AUC guarantees reliable probabilities., da: Ret: høj AUC garanterer pålidelige sandsynligheder.}, back: {es: Discriminación y calibración son propiedades distintas., en: Discrimination and calibration are distinct properties., da: Diskrimination og kalibrering er forskellige egenskaber.}}
  - {id: bmb831.m06.f20, type: threshold, front: {es: ¿Dónde elegir un umbral?, en: Where should a threshold be chosen?, da: Hvor bør en tærskel vælges?}, back: {es: En desarrollo, con costes y prevalencia objetivo explícitos., en: In development data with explicit costs and target prevalence., da: I udviklingsdata med eksplicitte omkostninger og målprævalens.}}
  - {id: bmb831.m06.f21, type: shift, front: {es: Fuentes de domain shift., en: Sources of domain shift., da: Kilder til domain shift.}, back: {es: Sitio, plataforma, población, prevalencia, protocolo y tiempo., en: Site, platform, population, prevalence, protocol, and time., da: Site, platform, population, prævalens, protokol og tid.}}
  - {id: bmb831.m06.f22, type: stability, front: {es: ¿Qué evaluar en estabilidad de firma?, en: What should be assessed for signature stability?, da: Hvad bør vurderes for signaturstabilitet?}, back: {es: Frecuencia de selección, signo, magnitud, overlap y rendimiento por resample., en: Selection frequency, sign, magnitude, overlap, and resampled performance., da: Selektionsfrekvens, tegn, størrelse, overlap og performance per resample.}}
  - {id: bmb831.m06.f23, type: oral, front: {es: Orden para defender un clasificador., en: Order for defending a classifier., da: Rækkefølge for at forsvare en klassifikator.}, back: {es: Uso futuro→unidad→target→split→pipeline→nested CV→métricas→calibración→shift→limitación., en: Future use→unit→target→split→pipeline→nested CV→metrics→calibration→shift→limitation., da: Fremtidig brug→enhed→target→split→pipeline→nested CV→metrikker→kalibrering→shift→begrænsning.}}
  - {id: bmb831.m06.f24, type: biomarker, front: {es: ¿Por qué una firma predictiva no es automáticamente biomarcador validado?, en: Why is a predictive signature not automatically a validated biomarker?, da: Hvorfor er en prædiktiv signatur ikke automatisk en valideret biomarkør?}, back: {es: Requiere estabilidad, validación externa, rendimiento analítico y evaluación en el uso previsto., en: It requires stability, external validation, analytical performance, and intended-use evaluation., da: Den kræver stabilitet, ekstern validering, analytisk performance og evaluering i tiltænkt brug.}}
