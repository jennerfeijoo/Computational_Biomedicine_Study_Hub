module_id: bmb831.m08
count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m08.f01, type: unit, front: {es: Unidad independiente en RNA-seq bulk., en: Independent unit in bulk RNA-seq., da: Uafhængig enhed i bulk RNA-seq.}, back: {es: La muestra biológica o paciente, no cada lectura., en: The biological sample or patient, not each read., da: Den biologiske sample eller patient, ikke hvert read.}}
  - {id: bmb831.m08.f02, type: misconception, front: {es: Corrige: millones de reads equivalen a millones de réplicas., en: Correct: millions of reads equal millions of replicates., da: Ret: millioner af reads er millioner af replikater.}, back: {es: Los reads son eventos técnicos dentro de una muestra; no aumentan n biológico., en: Reads are technical events within a sample and do not increase biological n., da: Reads er tekniske hændelser i en sample og øger ikke biologisk n.}}
  - {id: bmb831.m08.f03, type: input, front: {es: Entrada para modelo NB de expresión diferencial., en: Input for an NB differential-expression model., da: Input til NB differential-expression-model.}, back: {es: Matriz de conteos crudos enteros y metadata alineada., en: Integer raw-count matrix and aligned metadata., da: Heltals rå count-matrix og alignet metadata.}}
  - {id: bmb831.m08.f04, type: misconception, front: {es: Corrige: TPM es entrada universal para DE., en: Correct: TPM is a universal input for DE., da: Ret: TPM er universelt input til DE.}, back: {es: Modelos NB estándar requieren conteos y factores de escala; TPM cambia el modelo de ruido., en: Standard NB models require counts and scale factors; TPM changes the noise model., da: Standard NB-modeller kræver counts og skalafaktorer; TPM ændrer støjmodellen.}}
  - {id: bmb831.m08.f05, type: qc, front: {es: Cinco áreas de QC RNA-seq., en: Five RNA-seq QC areas., da: Fem RNA-seq-QC-områder.}, back: {es: Profundidad, mapeo, complejidad/composición, genes detectados y relaciones entre muestras., en: Depth, mapping, complexity/composition, detected genes, and sample relationships., da: Dybde, mapping, kompleksitet/komposition, detekterede gener og sample-relationer.}}
  - {id: bmb831.m08.f06, type: qc, front: {es: Rol de PCA/VST en RNA-seq., en: Role of PCA/VST in RNA-seq., da: Rolle af PCA/VST i RNA-seq.}, back: {es: Explorar estructura de muestras, outliers y lotes, no probar DE gen por gen., en: Explore sample structure, outliers, and batches, not test gene-wise DE., da: Udforske samplestruktur, outliers og batches, ikke teste genvis DE.}}
  - {id: bmb831.m08.f07, type: filtering, front: {es: Objetivo del filtrado de baja abundancia., en: Goal of low-abundance filtering., da: Mål med filtrering af lav abundance.}, back: {es: Retirar genes casi no informativos, mejorar potencia y reducir multiplicidad., en: Remove nearly uninformative genes, improve power, and reduce multiplicity., da: Fjerne næsten uinformative gener, forbedre power og reducere multiplicitet.}}
  - {id: bmb831.m08.f08, type: normalization, front: {es: ¿Qué estiman factores de tamaño?, en: What do size factors estimate?, da: Hvad estimerer size factors?}, back: {es: Escala relativa de bibliotecas bajo una referencia composicional., en: Relative library scale under a compositional reference., da: Relativ biblioteksskala under en kompositionsreference.}}
  - {id: bmb831.m08.f09, type: misconception, front: {es: Corrige: normalización elimina cualquier batch., en: Correct: normalization removes any batch., da: Ret: normalisering fjerner enhver batch.}, back: {es: Corrige escala/composición según supuestos; batch debe modelarse o abordarse por diseño., en: It adjusts scale/composition under assumptions; batch needs design-aware modeling., da: Det justerer skala/komposition under antagelser; batch kræver designbevidst modellering.}}
  - {id: bmb831.m08.f10, type: dispersion, front: {es: ¿Qué representa dispersión NB?, en: What does NB dispersion represent?, da: Hvad repræsenterer NB-dispersion?}, back: {es: Variabilidad extra-Poisson entre muestras condicionada a la media y diseño., en: Extra-Poisson variability across samples conditional on mean and design., da: Ekstra-Poisson-variabilitet mellem samples betinget af middel og design.}}
  - {id: bmb831.m08.f11, type: shrinkage, front: {es: ¿Por qué compartir información para dispersión?, en: Why share information for dispersion?, da: Hvorfor dele information for dispersion?}, back: {es: Cada gen tiene pocas réplicas; la tendencia media-dispersión estabiliza estimaciones., en: Each gene has few replicates; the mean-dispersion trend stabilizes estimates., da: Hvert gen har få replikater; middel-dispersion-trenden stabiliserer estimater.}}
  - {id: bmb831.m08.f12, type: design, front: {es: Diseño para antes/después por paciente., en: Design for before/after by patient., da: Design for før/efter per patient.}, back: {es: Incluir paciente como blocking y condición/tiempo como efecto de interés., en: Include patient as blocking and condition/time as the effect of interest., da: Inkludér patient som blocking og condition/tid som interesse-effekt.}}
  - {id: bmb831.m08.f13, type: interaction, front: {es: ¿Qué prueba condición×tiempo?, en: What does condition×time test?, da: Hvad tester condition×tid?}, back: {es: Si el cambio temporal difiere entre condiciones., en: Whether temporal change differs between conditions., da: Om tidsændringen varierer mellem conditions.}}
  - {id: bmb831.m08.f14, type: misconception, front: {es: Corrige: p<0.05 en grupo A y p>0.05 en B prueba interacción., en: Correct: p<0.05 in A and p>0.05 in B proves interaction., da: Ret: p<0.05 i A og p>0.05 i B beviser interaktion.}, back: {es: Se necesita probar directamente la diferencia entre efectos., en: The difference between effects must be directly tested., da: Forskellen mellem effekter skal testes direkte.}}
  - {id: bmb831.m08.f15, type: effect, front: {es: Interpretación de log2FC=1., en: Interpretation of log2FC=1., da: Fortolkning af log2FC=1.}, back: {es: Razón de medias aproximada 2 en la comparación definida, condicionada al modelo., en: Approximate mean ratio of 2 for the defined comparison, conditional on the model., da: Omtrent middelratio 2 for den definerede sammenligning, betinget af modellen.}}
  - {id: bmb831.m08.f16, type: shrinkage, front: {es: Uso principal de shrinkage log2FC., en: Main use of log2FC shrinkage., da: Hovedbrug af log2FC-shrinkage.}, back: {es: Estabilizar magnitudes ruidosas para ranking y visualización., en: Stabilize noisy magnitudes for ranking and visualization., da: Stabilisere støjende størrelser til ranking og visualisering.}}
  - {id: bmb831.m08.f17, type: result, front: {es: Campos mínimos de una tabla DE., en: Minimum fields in a DE table., da: Minimumfelter i en DE-tabel.}, back: {es: ID estable, abundancia, efecto, SE/IC, p, padj y anotación versionada., en: Stable ID, abundance, effect, SE/CI, p, adjusted p, and versioned annotation., da: Stabilt ID, abundance, effekt, SE/CI, p, justeret p og versioneret annotation.}}
  - {id: bmb831.m08.f18, type: annotation, front: {es: ¿Qué usar como clave de resultados?, en: What should be used as the result key?, da: Hvad bør bruges som resultatnøgle?}, back: {es: ID estable; símbolos se añaden como anotación y no reemplazan la clave., en: Stable ID; symbols are annotation and should not replace the key., da: Stabilt ID; symboler er annotation og bør ikke erstatte nøglen.}}
  - {id: bmb831.m08.f19, type: misconception, front: {es: Corrige: gen DE es un mecanismo causal demostrado., en: Correct: a DE gene is a demonstrated causal mechanism., da: Ret: et DE-gen er en demonstreret kausal mekanisme.}, back: {es: Es una asociación de abundancia bajo diseño y contraste; mecanismo requiere evidencia adicional., en: It is an abundance association under a design and contrast; mechanism needs further evidence., da: Det er en abundance-association under design og kontrast; mekanisme kræver mere evidens.}}
  - {id: bmb831.m08.f20, type: sensitivity, front: {es: Sensibilidades importantes en DE., en: Important DE sensitivity analyses., da: Vigtige DE-følsomhedsanalyser.}, back: {es: Exclusión de outliers, filtro, normalización, covariables, contraste y shrinkage., en: Outlier exclusion, filtering, normalization, covariates, contrast, and shrinkage., da: Outlier-eksklusion, filtrering, normalisering, kovariater, kontrast og shrinkage.}}
  - {id: bmb831.m08.f21, type: practice, front: {es: log2FC grande con baseMean muy bajo. Interpretación., en: Large log2FC with very low baseMean. Interpretation., da: Stor log2FC med meget lav baseMean. Fortolkning.}, back: {es: Posible efecto ruidoso e impreciso; revisar SE/IC, shrinkage y estabilidad., en: Potentially noisy imprecise effect; inspect SE/CI, shrinkage, and stability., da: Mulig støjende upræcis effekt; vurder SE/CI, shrinkage og stabilitet.}}
  - {id: bmb831.m08.f22, type: practice, front: {es: PCA separa por lote y grupo parcialmente solapado. Acción., en: PCA separates by batch with partial group overlap. Action., da: PCA separerer efter batch med delvist gruppeoverlap. Handling.}, back: {es: Incluir batch si identificable, revisar diseño y comparar sensibilidad con ajustes plausibles., en: Include batch if identifiable, inspect design, and compare sensitivity under plausible adjustments., da: Inkludér batch hvis identificerbar, vurder design og sammenlign følsomhed.}}
  - {id: bmb831.m08.f23, type: oral, front: {es: Orden para defender un análisis DE., en: Order for defending a DE analysis., da: Rækkefølge for at forsvare en DE-analyse.}, back: {es: Unidad/diseño→conteos/metadata→QC→filtro/normalización→dispersión→contraste→efecto/FDR→anotación→sensibilidad→alcance., en: Unit/design→counts/metadata→QC→filter/normalization→dispersion→contrast→effect/FDR→annotation→sensitivity→scope., da: Enhed/design→counts/metadata→QC→filter/normalisering→dispersion→kontrast→effekt/FDR→annotation→følsomhed→omfang.}}
  - {id: bmb831.m08.f24, type: integration, front: {es: ¿Qué convierte una lista DE en hipótesis biológica útil?, en: What turns a DE list into a useful biological hypothesis?, da: Hvad gør en DE-liste til en nyttig biologisk hypotese?}, back: {es: Efectos robustos, anotación válida, patrones coordinados, evidencia externa y una afirmación limitada y comprobable., en: Robust effects, valid annotation, coordinated patterns, external evidence, and a limited testable claim., da: Robuste effekter, gyldig annotation, koordinerede mønstre, ekstern evidens og en begrænset testbar påstand.}}
