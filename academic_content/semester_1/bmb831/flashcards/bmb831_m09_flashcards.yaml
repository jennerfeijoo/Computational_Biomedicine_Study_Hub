cards:
  - {id: bmb831.m09.f01, type: workflow, front: {"es": "Cadena bottom-up básica.", "en": "Basic bottom-up chain.", "da": "Grundlæggende bottom-up-kæde."}, back: {"es": "Proteína→digestión→péptido→ionización/fragments→espectro→PSM→péptido→grupo de proteínas.", "en": "Protein→digestion→peptide→ionization/fragments→spectrum→PSM→peptide→protein group.", "da": "Protein→digestion→peptid→ionisering/fragments→spektrum→PSM→peptid→proteingruppe."}}
  - {id: bmb831.m09.f02, type: concept, front: {"es": "¿Qué se observa directamente en bottom-up?", "en": "What is directly observed in bottom-up proteomics?", "da": "Hvad observeres direkte i bottom-up-proteomik?"}, back: {"es": "Iones peptídicos y espectros; las proteínas se infieren.", "en": "Peptide ions and spectra; proteins are inferred.", "da": "Peptidioner og spektre; proteiner infereres."}}
  - {id: bmb831.m09.f03, type: identification, front: {"es": "Define PSM.", "en": "Define PSM.", "da": "Definér PSM."}, back: {"es": "Match entre un espectro MS/MS y una secuencia peptídica candidata.", "en": "Match between an MS/MS spectrum and a candidate peptide sequence.", "da": "Match mellem et MS/MS-spektrum og en kandidat-peptidsekvens."}}
  - {id: bmb831.m09.f04, type: fdr, front: {"es": "Objetivo de target-decoy.", "en": "Goal of target-decoy.", "da": "Mål med target-decoy."}, back: {"es": "Estimar falsos matches mediante secuencias señuelo comparables.", "en": "Estimate false matches through comparable decoy sequences.", "da": "Estimere falske matches via sammenlignelige decoy-sekvenser."}}
  - {id: bmb831.m09.f05, type: misconception, front: {"es": "Corrige: PSM FDR 1% implica protein FDR 1%.", "en": "Correct: 1% PSM FDR implies 1% protein FDR.", "da": "Ret: 1% PSM-FDR indebærer 1% protein-FDR."}, back: {"es": "Agregar PSM a péptidos y proteínas cambia unidad y selección; cada nivel necesita control.", "en": "Aggregating PSMs into peptides and proteins changes unit and selection; each level needs control.", "da": "Aggregering af PSM til peptider og proteiner ændrer enhed og selection; hvert niveau kræver kontrol."}}
  - {id: bmb831.m09.f06, type: peptide, front: {"es": "Define péptido único.", "en": "Define unique peptide.", "da": "Definér unikt peptid."}, back: {"es": "Péptido compatible con una proteína o grupo específico bajo la base usada.", "en": "Peptide compatible with one specific protein or group under the database used.", "da": "Peptid kompatibelt med ét specifikt protein eller gruppe under den brugte database."}}
  - {id: bmb831.m09.f07, type: peptide, front: {"es": "Define péptido compartido.", "en": "Define shared peptide.", "da": "Definér delt peptid."}, back: {"es": "Péptido compatible con varias proteínas, isoformas u homólogos.", "en": "Peptide compatible with multiple proteins, isoforms, or homologs.", "da": "Peptid kompatibelt med flere proteiner, isoformer eller homologer."}}
  - {id: bmb831.m09.f08, type: inference, front: {"es": "¿Qué es un protein group?", "en": "What is a protein group?", "da": "Hvad er en proteingruppe?"}, back: {"es": "Conjunto de proteínas no distinguible con la evidencia peptídica disponible.", "en": "Set of proteins indistinguishable from available peptide evidence.", "da": "Sæt af proteiner der ikke kan skelnes med tilgængelig peptid-evidens."}}
  - {id: bmb831.m09.f09, type: misconception, front: {"es": "Corrige: un protein group es una proteína individual.", "en": "Correct: a protein group is one individual protein.", "da": "Ret: en proteingruppe er ét individuelt protein."}, back: {"es": "Puede contener isoformas o genes homólogos indistinguibles.", "en": "It may contain indistinguishable isoforms or homologous genes.", "da": "Det kan indeholde uadskillelige isoformer eller homologe gener."}}
  - {id: bmb831.m09.f10, type: quantification, front: {"es": "Define LFQ.", "en": "Define LFQ.", "da": "Definér LFQ."}, back: {"es": "Cuantificación sin etiqueta basada en intensidades comparadas entre runs.", "en": "Label-free quantification based on intensities compared across runs.", "da": "Label-free-kvantificering baseret på intensiteter sammenlignet mellem runs."}}
  - {id: bmb831.m09.f11, type: quantification, front: {"es": "Ventaja principal de TMT.", "en": "Main advantage of TMT.", "da": "Hovedfordel ved TMT."}, back: {"es": "Multiplexar muestras en un mismo run y reducir parte de la variación entre runs.", "en": "Multiplex samples within one run and reduce some between-run variation.", "da": "Multiplexe samples i samme run og reducere noget variation mellem runs."}}
  - {id: bmb831.m09.f12, type: bias, front: {"es": "Define ratio compression.", "en": "Define ratio compression.", "da": "Definér ratio compression."}, back: {"es": "Atenuación de diferencias por co-isolación e interferencia en cuantificación isobárica.", "en": "Attenuation of differences due to co-isolation and interference in isobaric quantification.", "da": "Dæmpning af forskelle pga. co-isolation og interferens i isobarisk kvantificering."}}
  - {id: bmb831.m09.f13, type: missingness, front: {"es": "Cuatro causas de missingness proteómico.", "en": "Four causes of proteomics missingness.", "da": "Fire årsager til proteomik-missingness."}, back: {"es": "Baja abundancia, selección estocástica, fallo de identificación y fallo técnico.", "en": "Low abundance, stochastic selection, identification failure, and technical failure.", "da": "Lav abundance, stokastisk selection, identifikationsfejl og teknisk fejl."}}
  - {id: bmb831.m09.f14, type: misconception, front: {"es": "Corrige: todo NA proteómico es bajo límite de detección.", "en": "Correct: every proteomics NA is below detection.", "da": "Ret: hvert proteomik-NA er under detektionsgrænsen."}, back: {"es": "El mecanismo puede ser diverso y debe evaluarse por patrón, intensidad, muestra y batch.", "en": "The mechanism may vary and should be assessed by pattern, intensity, sample, and batch.", "da": "Mekanismen kan variere og bør vurderes efter mønster, intensitet, sample og batch."}}
  - {id: bmb831.m09.f15, type: imputation, front: {"es": "Riesgo de imputar mínimos universales.", "en": "Risk of universal minimum imputation.", "da": "Risiko ved universel minimumimputation."}, back: {"es": "Crear separación artificial y subestimar incertidumbre cuando missingness no depende sólo de baja abundancia.", "en": "Create artificial separation and understate uncertainty when missingness is not solely low-abundance-driven.", "da": "Skabe kunstig separation og undervurdere usikkerhed når missingness ikke kun skyldes lav abundance."}}
  - {id: bmb831.m09.f16, type: qc, front: {"es": "Métricas QC proteómicas.", "en": "Proteomics QC metrics.", "da": "Proteomik-QC-metrikker."}, back: {"es": "Intensidad total, IDs, distribución, CV replicados, correlación, carryover y batch.", "en": "Total intensity, IDs, distribution, replicate CV, correlation, carryover, and batch.", "da": "Total intensitet, ID'er, fordeling, replikat-CV, korrelation, carryover og batch."}}
  - {id: bmb831.m09.f17, type: modeling, front: {"es": "¿Qué debe respetar un modelo diferencial proteómico?", "en": "What should a differential proteomics model respect?", "da": "Hvad bør en differential proteomik-model respektere?"}, back: {"es": "Unidad independiente, pairing, batch, escala log, missingness y agregación peptídica.", "en": "Independent unit, pairing, batch, log scale, missingness, and peptide aggregation.", "da": "Uafhængig enhed, pairing, batch, log-skala, missingness og peptidaggregering."}}
  - {id: bmb831.m09.f18, type: ptm, front: {"es": "Requisito para interpretar una PTM.", "en": "Requirement for interpreting a PTM.", "da": "Krav for fortolkning af en PTM."}, back: {"es": "Localización del sitio, control de FDR, comparación con proteína total y contexto funcional.", "en": "Site localization, FDR control, comparison with total protein, and functional context.", "da": "Site-lokalisering, FDR-kontrol, sammenligning med totalprotein og funktionel kontekst."}}
  - {id: bmb831.m09.f19, type: misconception, front: {"es": "Corrige: fosfopéptido aumentado prueba activación.", "en": "Correct: increased phosphopeptide proves activation.", "da": "Ret: øget fosfopeptid beviser aktivering."}, back: {"es": "Puede reflejar ocupación o abundancia; función requiere evidencia independiente.", "en": "It may reflect occupancy or abundance; function needs independent evidence.", "da": "Det kan afspejle occupancy eller abundance; funktion kræver uafhængig evidens."}}
  - {id: bmb831.m09.f20, type: annotation, front: {"es": "Factores que limitan caracterización proteica.", "en": "Factors limiting protein characterization.", "da": "Faktorer der begrænser proteinkarakterisering."}, back: {"es": "Cobertura peptídica, isoformas, dominios, PTMs, base de datos y evidencia de anotación.", "en": "Peptide coverage, isoforms, domains, PTMs, database, and annotation evidence.", "da": "Peptiddækning, isoformer, domæner, PTM'er, database og annotationsevidens."}}
  - {id: bmb831.m09.f21, type: practice, front: {"es": "Dos isoformas sin péptidos únicos. Reporte correcto.", "en": "Two isoforms without unique peptides. Correct report.", "da": "To isoformer uden unikke peptider. Korrekt rapport."}, back: {"es": "Grupo indistinguible, no cuantificaciones separadas por isoforma.", "en": "Indistinguishable group, not separate isoform quantifications.", "da": "Uadskillelig gruppe, ikke separate isoform-kvantificeringer."}}
  - {id: bmb831.m09.f22, type: practice, front: {"es": "Fosfopéptido sube y proteína total estable. Hipótesis prudente.", "en": "Phosphopeptide rises and total protein is stable. Cautious hypothesis.", "da": "Fosfopeptid stiger og totalprotein er stabilt. Forsigtig hypotese."}, back: {"es": "Compatible con mayor modificación/ocupación si la localización es fiable; no prueba actividad.", "en": "Compatible with increased modification/occupancy if localization is reliable; does not prove activity.", "da": "Kompatibel med øget modifikation/occupancy hvis lokalisering er pålidelig; beviser ikke aktivitet."}}
  - {id: bmb831.m09.f23, type: oral, front: {"es": "Orden para defender un análisis proteómico.", "en": "Order for defending a proteomics analysis.", "da": "Rækkefølge for at forsvare en proteomik-analyse."}, back: {"es": "Plataforma→identificación/FDR→péptidos compartidos→cuantificación→QC/missingness→modelo→PTM/anotación→limitación.", "en": "Platform→identification/FDR→shared peptides→quantification→QC/missingness→model→PTM/annotation→limitation.", "da": "Platform→identifikation/FDR→delte peptider→kvantificering→QC/missingness→model→PTM/annotation→begrænsning."}}
  - {id: bmb831.m09.f24, type: integration, front: {"es": "Principio de propagación de incertidumbre.", "en": "Principle of uncertainty propagation.", "da": "Princip for usikkerhedspropagation."}, back: {"es": "La certeza a nivel proteína no puede exceder la evidencia de espectros, péptidos, inferencia y cuantificación subyacentes.", "en": "Protein-level certainty cannot exceed underlying spectral, peptide, inference, and quantification evidence.", "da": "Sikkerhed på proteinniveau kan ikke overstige underliggende spektral-, peptid-, inferens- og kvantificeringsevidens."}}
