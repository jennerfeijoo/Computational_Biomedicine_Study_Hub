module_id: bmb831.m05
count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m05.f01, type: matrix, front: {es: Orientación habitual para PCA de muestras., en: Usual orientation for sample PCA., da: Sædvanlig orientering for sample-PCA.}, back: {es: Muestras en filas y variables en columnas., en: Samples in rows and variables in columns., da: Samples i rækker og variable i kolonner.}}
  - {id: bmb831.m05.f02, type: misconception, front: {es: Corrige: transponer X sólo cambia formato., en: Correct: transposing X only changes formatting., da: Ret: transponering af X ændrer kun format.}, back: {es: Cambia los objetos cuyas distancias y componentes se analizan., en: It changes which objects are represented by distances and components., da: Det ændrer hvilke objekter der analyseres med afstande og komponenter.}}
  - {id: bmb831.m05.f03, type: concept, front: {es: SVD de una matriz centrada., en: SVD of a centered matrix., da: SVD af en centreret matrix.}, back: {es: X=UDVᵀ, con direcciones ortogonales y valores singulares., en: X=UDVᵀ, with orthogonal directions and singular values., da: X=UDVᵀ med ortogonale retninger og singulære værdier.}}
  - {id: bmb831.m05.f04, type: pca, front: {es: ¿Qué contienen los scores?, en: What do scores contain?, da: Hvad indeholder scores?}, back: {es: Coordenadas de muestras en los componentes., en: Sample coordinates on the components., da: Samplekoordinater på komponenterne.}}
  - {id: bmb831.m05.f05, type: pca, front: {es: ¿Qué contienen los loadings?, en: What do loadings contain?, da: Hvad indeholder loadings?}, back: {es: Contribuciones y direcciones de variables en cada componente., en: Variable contributions and directions for each component., da: Variabelbidrag og retninger for hver komponent.}}
  - {id: bmb831.m05.f06, type: misconception, front: {es: Corrige: el signo de PC1 tiene significado biológico fijo., en: Correct: the sign of PC1 has fixed biological meaning., da: Ret: tegnet på PC1 har fast biologisk betydning.}, back: {es: Puede invertirse junto con scores y loadings sin cambiar el modelo., en: It can be flipped with scores and loadings without changing the model., da: Det kan vendes sammen med scores og loadings uden at ændre modellen.}}
  - {id: bmb831.m05.f07, type: explained_variance, front: {es: ¿Qué mide varianza explicada?, en: What does explained variance measure?, da: Hvad måler forklaret varians?}, back: {es: Fracción de variación de la representación capturada por un componente., en: Fraction of variation in the representation captured by a component., da: Andel af variation i repræsentationen fanget af en komponent.}}
  - {id: bmb831.m05.f08, type: misconception, front: {es: Corrige: alta varianza explicada implica relevancia clínica., en: Correct: high explained variance implies clinical relevance., da: Ret: høj forklaret varians indebærer klinisk relevans.}, back: {es: Puede reflejar lote, escala o ruido; relevancia exige evidencia adicional., en: It may reflect batch, scale, or noise; relevance needs additional evidence., da: Det kan afspejle batch, skala eller støj; relevans kræver yderligere evidens.}}
  - {id: bmb831.m05.f09, type: preprocessing, front: {es: Efecto de centrar., en: Effect of centering., da: Effekt af centrering.}, back: {es: Resta la media de cada variable para analizar variación alrededor de ella., en: Subtracts each variable mean to analyze variation around it., da: Trækker hver variabels middel fra for at analysere variation omkring den.}}
  - {id: bmb831.m05.f10, type: preprocessing, front: {es: Efecto de escalar a SD uno., en: Effect of scaling to unit SD., da: Effekt af skalering til SD én.}, back: {es: Igualar varianza marginal y cambiar pesos relativos de variables., en: Equalizes marginal variance and changes relative variable weights., da: Udligner marginal varians og ændrer variablets relative vægt.}}
  - {id: bmb831.m05.f11, type: misconception, front: {es: Corrige: escalar siempre mejora PCA., en: Correct: scaling always improves PCA., da: Ret: skalering forbedrer altid PCA.}, back: {es: Puede amplificar variables ruidosas; depende de unidades y objetivo., en: It may amplify noisy variables; choice depends on units and objective., da: Det kan forstærke støjende variable; valget afhænger af enheder og mål.}}
  - {id: bmb831.m05.f12, type: transformation, front: {es: ¿Por qué log/VST cambia PCA?, en: Why does log/VST change PCA?, da: Hvorfor ændrer log/VST PCA?}, back: {es: Cambia asimetría, relación media-varianza y distancias., en: It changes skewness, mean-variance relation, and distances., da: Det ændrer skævhed, middel-varians-relation og afstande.}}
  - {id: bmb831.m05.f13, type: selection, front: {es: Riesgo de elegir PCs mirando labels., en: Risk of choosing PCs by inspecting labels., da: Risiko ved at vælge PCs ved at se labels.}, back: {es: Convierte exploración en selección supervisada y puede inflar asociaciones., en: It turns exploration into supervised selection and may inflate associations., da: Det gør eksploration til superviseret selection og kan oppuste associationer.}}
  - {id: bmb831.m05.f14, type: stability, front: {es: ¿Qué es estabilidad de subespacio?, en: What is subspace stability?, da: Hvad er subspace-stabilitet?}, back: {es: Persistencia del espacio componente bajo resampling o perturbaciones., en: Persistence of the component space under resampling or perturbations., da: Persistens af komponentrummet under resampling eller perturbationer.}}
  - {id: bmb831.m05.f15, type: outlier, front: {es: ¿Cómo afecta un outlier a PCA clásica?, en: How does an outlier affect classical PCA?, da: Hvordan påvirker en outlier klassisk PCA?}, back: {es: Puede rotar componentes y dominar varianza y loadings., en: It may rotate components and dominate variance and loadings., da: Det kan rotere komponenter og dominere varians og loadings.}}
  - {id: bmb831.m05.f16, type: robust_pca, front: {es: Objetivo de PCA robusta., en: Goal of robust PCA., da: Mål med robust PCA.}, back: {es: Reducir influencia de extremos bajo un modelo robusto explícito., en: Reduce influence of extremes under an explicit robust model., da: Reducere influence fra ekstreme observationer under en eksplicit robust model.}}
  - {id: bmb831.m05.f17, type: mds, front: {es: Objetivo de MDS., en: Goal of MDS., da: Mål med MDS.}, back: {es: Representar objetos preservando lo mejor posible una matriz de distancias., en: Represent objects while preserving a distance matrix as well as possible., da: Repræsentere objekter mens en afstandsmatrix bevares bedst muligt.}}
  - {id: bmb831.m05.f18, type: tsne, front: {es: ¿Qué prioriza t-SNE?, en: What does t-SNE prioritize?, da: Hvad prioriterer t-SNE?}, back: {es: Vecindarios locales, no geometría global literal., en: Local neighborhoods, not literal global geometry., da: Lokale nabolag, ikke bogstavelig global geometri.}}
  - {id: bmb831.m05.f19, type: umap, front: {es: Factores que cambian UMAP., en: Factors that change UMAP., da: Faktorer der ændrer UMAP.}, back: {es: Métrica, número de vecinos, min_dist, semilla y preprocessing., en: Metric, number of neighbors, min_dist, seed, and preprocessing., da: Metrik, antal naboer, min_dist, seed og preprocessing.}}
  - {id: bmb831.m05.f20, type: misconception, front: {es: Corrige: hueco visual en UMAP demuestra dos poblaciones., en: Correct: a visual UMAP gap proves two populations., da: Ret: et visuelt UMAP-hul beviser to populationer.}, back: {es: La embedding puede crear o exagerar separaciones; se requiere validación en datos originales., en: The embedding may create or exaggerate gaps; validation in original data is required., da: Embedding kan skabe eller overdrive huller; validering i originaldata er nødvendig.}}
  - {id: bmb831.m05.f21, type: interpretation, front: {es: ¿Qué debe acompañar a un biplot?, en: What should accompany a biplot?, da: Hvad bør ledsage et biplot?}, back: {es: Escalado declarado, varianza explicada, metadata y límites de lectura de ángulos y longitudes., en: Declared scaling, explained variance, metadata, and limits for interpreting angles and lengths., da: Deklareret skalering, forklaret varians, metadata og fortolkningsgrænser.}}
  - {id: bmb831.m05.f22, type: practice, front: {es: PC1 sigue lote y PC2 condición. Primera interpretación., en: PC1 follows batch and PC2 condition. First interpretation., da: PC1 følger batch og PC2 condition. Første fortolkning.}, back: {es: La mayor variación es técnica; la señal biológica posible debe evaluarse con diseño y ajuste., en: Largest variation is technical; possible biological signal needs design-aware evaluation., da: Største variation er teknisk; mulig biologisk signal kræver designbevidst evaluering.}}
  - {id: bmb831.m05.f23, type: oral, front: {es: Orden para interpretar una PCA., en: Order for interpreting a PCA., da: Rækkefølge for fortolkning af PCA.}, back: {es: Orientación→preprocessing→varianza→scores→metadata→loadings→outliers→estabilidad→alcance., en: Orientation→preprocessing→variance→scores→metadata→loadings→outliers→stability→scope., da: Orientering→preprocessing→varians→scores→metadata→loadings→outliers→stabilitet→omfang.}}
  - {id: bmb831.m05.f24, type: integration, front: {es: Diferencia entre exploración y validación en reducción dimensional., en: Difference between exploration and validation in dimension reduction., da: Forskel mellem eksploration og validering i dimensionsreduktion.}, back: {es: Explorar descubre patrones; validar prueba estabilidad, asociación y reproducibilidad en datos independientes., en: Exploration discovers patterns; validation tests stability, association, and reproducibility in independent data., da: Eksploration opdager mønstre; validering tester stabilitet, association og reproducerbarhed i uafhængige data.}}
