count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m04.f01, type: concept, front: {es: Tres componentes de un GLM., en: Three components of a GLM., da: Tre komponenter i en GLM.}, back: {es: Distribución de Y, predictor lineal Xβ y función link., en: Distribution of Y, linear predictor Xβ, and link function., da: Fordeling af Y, lineær prædiktor Xβ og linkfunktion.}}
  - {id: bmb831.m04.f02, type: concept, front: {es: Diferencia entre familia y link., en: Difference between family and link., da: Forskel mellem familie og link.}, back: {es: La familia define soporte y media-varianza; el link conecta la media con Xβ., en: Family defines support and mean-variance relation; link connects mean to Xβ., da: Familien definerer støtte og middel-varians-relation; link forbinder middel med Xβ.}}
  - {id: bmb831.m04.f03, type: poisson, front: {es: Supuesto media-varianza de Poisson., en: Poisson mean-variance assumption., da: Poisson middel-varians-antagelse.}, back: {es: Var(Y|X)=E(Y|X)., en: Var(Y|X)=E(Y|X)., da: Var(Y|X)=E(Y|X).}}
  - {id: bmb831.m04.f04, type: offset, front: {es: ¿Qué hace un offset?, en: What does an offset do?, da: Hvad gør et offset?}, back: {es: Incluye exposición conocida con coeficiente fijado para modelar una tasa., en: Includes known exposure with a fixed coefficient to model a rate., da: Inkluderer kendt eksponering med fast koefficient for at modellere en rate.}}
  - {id: bmb831.m04.f05, type: practice, front: {es: Conteos 20/10 h y 40/40 h. ¿Mayor tasa?, en: Counts 20/10 h and 40/40 h. Higher rate?, da: Counts 20/10 t og 40/40 t. Højere rate?}, back: {es: La primera: 2 por hora frente a 1 por hora., en: The first: 2 per hour versus 1 per hour., da: Den første: 2 per time versus 1 per time.}}
  - {id: bmb831.m04.f06, type: misconception, front: {es: Corrige: exposición debe estimarse como covariable libre., en: Correct: exposure should be estimated as a free covariate., da: Ret: eksponering bør estimeres som fri kovariat.}, back: {es: Si define el denominador de tasa, su log entra como offset con coeficiente uno., en: If it defines the rate denominator, its log enters as an offset with coefficient one., da: Hvis den definerer ratens nævner, indgår log som offset med koefficient én.}}
  - {id: bmb831.m04.f07, type: overdispersion, front: {es: Define sobredispersión., en: Define overdispersion., da: Definér overdispersion.}, back: {es: Variabilidad condicional mayor que la prevista por la familia del modelo., en: Conditional variability greater than predicted by the model family., da: Betinget variabilitet større end modelfamilien forudsiger.}}
  - {id: bmb831.m04.f08, type: misconception, front: {es: Corrige: sobredispersión sólo significa binomial negativa., en: Correct: overdispersion only means negative binomial., da: Ret: overdispersion betyder kun negativ binomial.}, back: {es: Puede reflejar heterogeneidad, clustering, ceros excesivos o estructura omitida., en: It may reflect heterogeneity, clustering, excess zeros, or omitted structure., da: Det kan afspejle heterogenitet, clustering, overskydende nuller eller udeladt struktur.}}
  - {id: bmb831.m04.f09, type: negative_binomial, front: {es: ¿Qué añade la binomial negativa?, en: What does negative binomial add?, da: Hvad tilføjer negativ binomial?}, back: {es: Un parámetro de dispersión que permite varianza mayor que la media., en: A dispersion parameter allowing variance greater than the mean., da: En dispersionsparameter der tillader varians større end middel.}}
  - {id: bmb831.m04.f10, type: binomial, front: {es: Información perdida al guardar sólo proporción., en: Information lost by storing only a proportion., da: Information tabt ved kun at gemme proportion.}, back: {es: El denominador n y por tanto la precisión del estimado., en: Denominator n and therefore estimate precision., da: Nævneren n og dermed estimatets præcision.}}
  - {id: bmb831.m04.f11, type: link, front: {es: Interpretación de exp(β) con link log., en: Interpretation of exp(β) with log link., da: Fortolkning af exp(β) med log-link.}, back: {es: Razón multiplicativa condicional de medias o tasas., en: Conditional multiplicative ratio of means or rates., da: Betinget multiplikativ ratio af middel eller rater.}}
  - {id: bmb831.m04.f12, type: link, front: {es: Interpretación de exp(β) con logit., en: Interpretation of exp(β) with logit., da: Fortolkning af exp(β) med logit.}, back: {es: Odds ratio condicional., en: Conditional odds ratio., da: Betinget odds ratio.}}
  - {id: bmb831.m04.f13, type: design, front: {es: ¿Qué codifica una matriz de diseño?, en: What does a design matrix encode?, da: Hvad koder en designmatrix?}, back: {es: Intercepto, factores, covariables, blocking e interacciones., en: Intercept, factors, covariates, blocking, and interactions., da: Intercept, faktorer, kovariater, blocking og interaktioner.}}
  - {id: bmb831.m04.f14, type: identifiability, front: {es: Causa de no identificabilidad en X., en: Cause of non-identifiability in X., da: Årsag til ikke-identificerbarhed i X.}, back: {es: Columnas linealmente dependientes o ausencia de combinaciones necesarias., en: Linearly dependent columns or missing required combinations., da: Lineært afhængige kolonner eller manglende nødvendige kombinationer.}}
  - {id: bmb831.m04.f15, type: misconception, front: {es: Corrige: software puede separar condición y lote completamente confundidos., en: Correct: software can separate fully confounded condition and batch., da: Ret: software kan adskille fuldt confounded condition og batch.}, back: {es: Sin variación cruzada los efectos no son identificables., en: Without crossed variation the effects are not identifiable., da: Uden krydsvariation er effekterne ikke identificerbare.}}
  - {id: bmb831.m04.f16, type: contrast, front: {es: Define contraste., en: Define contrast., da: Definér kontrast.}, back: {es: Combinación lineal estimable de parámetros que representa una comparación científica., en: Estimable linear combination of parameters representing a scientific comparison., da: Estimerbar lineær kombination af parametre der repræsenterer en videnskabelig sammenligning.}}
  - {id: bmb831.m04.f17, type: interaction, front: {es: Define interacción., en: Define interaction., da: Definér interaktion.}, back: {es: El efecto de una variable cambia según el nivel de otra., en: The effect of one variable changes across levels of another., da: Effekten af én variabel ændres på tværs af niveauer af en anden.}}
  - {id: bmb831.m04.f18, type: misconception, front: {es: Corrige: con interacción, el efecto principal es universal., en: Correct: with interaction, the main effect is universal., da: Ret: med interaktion er hovedeffekten universel.}, back: {es: Normalmente es condicional al nivel de referencia y debe complementarse con contrastes simples., en: It is usually conditional on the reference level and needs simple contrasts., da: Den er normalt betinget af referenceniveauet og kræver simple kontraster.}}
  - {id: bmb831.m04.f19, type: dependence, front: {es: Unidad independiente con múltiples células por paciente., en: Independent unit with many cells per patient., da: Uafhængig enhed med mange celler per patient.}, back: {es: El paciente, salvo que el diseño justifique otra estructura jerárquica explícita., en: The patient, unless another explicit hierarchical structure is justified., da: Patienten, medmindre en anden eksplicit hierarkisk struktur er begrundet.}}
  - {id: bmb831.m04.f20, type: blocking, front: {es: Función del blocking por paciente., en: Role of patient blocking., da: Rolle af patient-blocking.}, back: {es: Controlar diferencias basales compartidas y comparar dentro de unidad., en: Control shared baseline differences and compare within unit., da: Kontrollere delte baselineforskelle og sammenligne inden for enhed.}}
  - {id: bmb831.m04.f21, type: diagnostics, front: {es: Diagnósticos para GLM de conteos., en: Diagnostics for a count GLM., da: Diagnostik for en count-GLM.}, back: {es: Dispersión, residuos, ceros, influencia, ajuste por grupos y estructura omitida., en: Dispersion, residuals, zeros, influence, group fit, and omitted structure., da: Dispersion, residualer, nuller, influence, gruppefit og udeladt struktur.}}
  - {id: bmb831.m04.f22, type: practice, front: {es: β=0.69 con link log. Efecto aproximado., en: β=0.69 with log link. Approximate effect., da: β=0.69 med log-link. Omtrentlig effekt.}, back: {es: exp(0.69)≈2: el promedio o tasa se duplica condicionalmente., en: exp(0.69)≈2: conditional mean or rate doubles., da: exp(0.69)≈2: betinget middel eller rate fordobles.}}
  - {id: bmb831.m04.f23, type: oral, front: {es: Orden para defender un GLM., en: Order for defending a GLM., da: Rækkefølge for at forsvare en GLM.}, back: {es: Outcome/denominador→familia→link→diseño→contraste→diagnóstico→escala del efecto→limitación., en: Outcome/denominator→family→link→design→contrast→diagnostics→effect scale→limitation., da: Outcome/nævner→familie→link→design→kontrast→diagnostik→effektskala→begrænsning.}}
  - {id: bmb831.m04.f24, type: critique, front: {es: Problema de analizar 50/100 y 1/2 como dos proporciones iguales., en: Problem with treating 50/100 and 1/2 as equally precise proportions., da: Problem ved at behandle 50/100 og 1/2 som lige præcise proportioner.}, back: {es: Ignora denominadores y asigna precisión artificialmente igual., en: It ignores denominators and assigns artificially equal precision., da: Det ignorerer nævnere og tildeler kunstigt samme præcision.}}
