count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m02.f01, type: concept, front: {es: Primer principio de QC ómico., en: First principle of omics QC., da: Første princip for omics-QC.}, back: {es: Interpretar cada métrica desde el mecanismo de medición del assay., en: Interpret each metric from the assay measurement mechanism., da: Fortolk hver metrik ud fra assayets målemekanisme.}}
  - {id: bmb831.m02.f02, type: qc, front: {es: Tres niveles de QC., en: Three QC levels., da: Tre QC-niveauer.}, back: {es: Muestra, característica y matriz global., en: Sample, feature, and global matrix., da: Sample, feature og global matrix.}}
  - {id: bmb831.m02.f03, type: qc, front: {es: Métricas de QC de muestra., en: Sample-level QC metrics., da: Sample-niveau QC-metrikker.}, back: {es: Profundidad, complejidad, distribución, missingness, correlación y metadata técnica., en: Depth, complexity, distribution, missingness, correlation, and technical metadata., da: Dybde, kompleksitet, fordeling, missingness, korrelation og teknisk metadata.}}
  - {id: bmb831.m02.f04, type: qc, front: {es: Métricas de QC de característica., en: Feature-level QC metrics., da: Feature-niveau QC-metrikker.}, back: {es: Prevalencia, abundancia, varianza, detectabilidad y asociación con lote., en: Prevalence, abundance, variance, detectability, and batch association., da: Prævalens, abundance, varians, detekterbarhed og batch-association.}}
  - {id: bmb831.m02.f05, type: misconception, front: {es: Corrige: una muestra fuera de 3 SD debe eliminarse., en: Correct: a sample beyond 3 SD should be removed., da: Ret: en sample over 3 SD bør fjernes.}, back: {es: La exclusión necesita evidencia convergente, causa plausible, regla y sensibilidad., en: Exclusion needs converging evidence, plausible cause, rule, and sensitivity analysis., da: Eksklusion kræver konvergerende evidens, plausibel årsag, regel og følsomhed.}}
  - {id: bmb831.m02.f06, type: normalization, front: {es: ¿Qué pregunta debe responder una normalización?, en: What question should normalization answer?, da: Hvilket spørgsmål bør normalisering besvare?}, back: {es: Qué variación iguala, qué referencia usa y qué señal intenta preservar., en: Which variation it equalizes, which reference it uses, and which signal it preserves., da: Hvilken variation den udligner, hvilken reference den bruger og hvilket signal den bevarer.}}
  - {id: bmb831.m02.f07, type: misconception, front: {es: Corrige: normalizar por total siempre es seguro., en: Correct: total normalization is always safe., da: Ret: totalnormalisering er altid sikker.}, back: {es: Puede ocultar cambios globales e inducir efectos relativos bajo sesgo composicional., en: It may hide global shifts and induce relative effects under composition bias., da: Det kan skjule globale skift og skabe relative effekter ved kompositionsbias.}}
  - {id: bmb831.m02.f08, type: transformation, front: {es: Efecto principal de log/VST., en: Main effect of log/VST., da: Hovedeffekt af log/VST.}, back: {es: Comprimir valores altos, estabilizar varianza y cambiar distancias., en: Compress high values, stabilize variance, and change distances., da: Komprimere høje værdier, stabilisere varians og ændre afstande.}}
  - {id: bmb831.m02.f09, type: misconception, front: {es: Corrige: log1p es una decisión puramente visual., en: Correct: log1p is a purely visual choice., da: Ret: log1p er et rent visuelt valg.}, back: {es: Cambia geometría, peso relativo y potencialmente inferencia; es una decisión estadística., en: It changes geometry, relative weighting, and potentially inference; it is statistical., da: Det ændrer geometri, relativ vægt og muligvis inferens; det er statistisk.}}
  - {id: bmb831.m02.f10, type: missingness, front: {es: Cuatro mecanismos de ausencia relevantes., en: Four relevant missingness mechanisms., da: Fire relevante missingness-mekanismer.}, back: {es: Aleatoria, asociada a covariables, dependiente de abundancia y estructural/filtro., en: Random, covariate-related, abundance-dependent, and structural/filter-induced., da: Tilfældig, kovariatrelateret, abundance-afhængig og strukturel/filterinduceret.}}
  - {id: bmb831.m02.f11, type: proteomics, front: {es: ¿Qué puede significar NA en proteómica?, en: What can NA mean in proteomics?, da: Hvad kan NA betyde i proteomik?}, back: {es: Señal bajo detección, fallo de identificación, muestreo estocástico o ausencia real., en: Below-detection signal, identification failure, stochastic sampling, or true absence., da: Signal under detektion, identifikationsfejl, stokastisk sampling eller reelt fravær.}}
  - {id: bmb831.m02.f12, type: imputation, front: {es: Riesgo de imputar todos los NA con mínimos., en: Risk of minimum-imputing all NAs., da: Risiko ved minimumimputation af alle NA.}, back: {es: Supone ausencia por baja abundancia, crea diferencias y subestima incertidumbre., en: Assumes low-abundance missingness, creates differences, and understates uncertainty., da: Antager lav abundance, skaber forskelle og undervurderer usikkerhed.}}
  - {id: bmb831.m02.f13, type: batch, front: {es: Define batch effect., en: Define batch effect., da: Definér batch effect.}, back: {es: Variación sistemática asociada a procesamiento, plataforma, fecha, operador o reactivo., en: Systematic variation associated with processing, platform, date, operator, or reagent., da: Systematisk variation knyttet til behandling, platform, dato, operatør eller reagens.}}
  - {id: bmb831.m02.f14, type: confounding, front: {es: ¿Qué es confusión completa?, en: What is complete confounding?, da: Hvad er komplet confounding?}, back: {es: Grupo biológico y factor técnico coinciden sin combinaciones cruzadas observadas., en: Biological group and technical factor coincide without observed cross-combinations., da: Biologisk gruppe og teknisk faktor falder sammen uden observerede krydskombinationer.}}
  - {id: bmb831.m02.f15, type: misconception, front: {es: Corrige: ComBat resuelve cualquier batch., en: Correct: ComBat solves any batch problem., da: Ret: ComBat løser ethvert batchproblem.}, back: {es: Requiere supuestos y no puede separar confusión completa ni recuperar diseño ausente., en: It requires assumptions and cannot separate complete confounding or recover missing design., da: Det kræver antagelser og kan ikke adskille komplet confounding eller genskabe manglende design.}}
  - {id: bmb831.m02.f16, type: modeling, front: {es: Ventaja de incluir batch en el diseño., en: Advantage of including batch in the design., da: Fordel ved at inkludere batch i designet.}, back: {es: Ajusta su efecto durante inferencia sin necesariamente modificar la matriz original., en: Adjusts its effect during inference without necessarily altering the original matrix., da: Justerer effekten under inferens uden nødvendigvis at ændre original matrix.}}
  - {id: bmb831.m02.f17, type: correction_audit, front: {es: Dos objetivos de auditar una corrección., en: Two goals of auditing a correction., da: To mål ved audit af korrektion.}, back: {es: Confirmar reducción de señal técnica y preservación de controles biológicos., en: Confirm reduction of technical signal and preservation of biological controls., da: Bekræfte reduktion af teknisk signal og bevarelse af biologiske kontroller.}}
  - {id: bmb831.m02.f18, type: misconception, front: {es: Corrige: ausencia de estructura tras corrección prueba éxito., en: Correct: no structure after correction proves success., da: Ret: ingen struktur efter korrektion beviser succes.}, back: {es: Puede indicar eliminación de señal real; se necesita evaluar qué se preservó., en: It may indicate removal of real signal; preservation must be assessed., da: Det kan indikere fjernelse af reelt signal; bevarelse skal vurderes.}}
  - {id: bmb831.m02.f19, type: outlier, front: {es: Outlier técnico frente a biológico., en: Technical versus biological outlier., da: Teknisk versus biologisk outlier.}, back: {es: El técnico refleja fallo de medición; el biológico puede ser variación real relevante., en: Technical reflects measurement failure; biological may be relevant real variation., da: Teknisk afspejler målefejl; biologisk kan være relevant reel variation.}}
  - {id: bmb831.m02.f20, type: sensitivity, front: {es: Sensibilidad mínima de preprocessing., en: Minimum preprocessing sensitivity analysis., da: Minimum preprocessing-følsomhedsanalyse.}, back: {es: Comparar normalización, exclusión e imputación plausibles y revisar estabilidad de efectos., en: Compare plausible normalization, exclusion, and imputation choices and inspect effect stability., da: Sammenlign plausible normaliserings-, eksklusions- og imputationsvalg og vurder effektstabilitet.}}
  - {id: bmb831.m02.f21, type: practice, front: {es: PC1 coincide con lote. Siguiente paso., en: PC1 matches batch. Next step., da: PC1 matcher batch. Næste trin.}, back: {es: Cruzar lote con condición y otras metadata para evaluar solapamiento, confusión y causa., en: Cross-tabulate batch with condition and metadata to assess overlap, confounding, and cause., da: Krydstabulér batch med condition og metadata for overlap, confounding og årsag.}}
  - {id: bmb831.m02.f22, type: practice, front: {es: Tratamiento aumenta RNA total por célula. Riesgo., en: Treatment increases total RNA per cell. Risk., da: Behandling øger total RNA per celle. Risiko.}, back: {es: Normalización por total puede borrar el aumento y crear descensos relativos aparentes., en: Total normalization may erase the increase and create apparent relative decreases., da: Totalnormalisering kan fjerne stigningen og skabe tilsyneladende relative fald.}}
  - {id: bmb831.m02.f23, type: oral, front: {es: ¿Por qué “batch corrected” no basta como método?, en: Why is “batch corrected” insufficient as a method?, da: Hvorfor er “batch corrected” utilstrækkeligt som metode?}, back: {es: Debe especificar algoritmo, diseño, covariables, supuestos, parámetros y auditoría de preservación., en: It must specify algorithm, design, covariates, assumptions, parameters, and preservation audit., da: Algoritme, design, kovariater, antagelser, parametre og bevarelsesaudit skal angives.}}
  - {id: bmb831.m02.f24, type: integration, front: {es: Secuencia correcta de preprocessing., en: Correct preprocessing sequence., da: Korrekt preprocessing-sekvens.}, back: {es: Mecanismo→QC→diseño/confusión→normalización→transformación/imputación→auditoría→sensibilidad→documentación., en: Mechanism→QC→design/confounding→normalization→transformation/imputation→audit→sensitivity→documentation., da: Mekanisme→QC→design/confounding→normalisering→transformation/imputation→audit→følsomhed→dokumentation.}}
