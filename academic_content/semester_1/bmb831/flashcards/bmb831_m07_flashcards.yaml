cards:
  - {id: bmb831.m07.f01, type: container, front: {"es": "¿Qué coordina SummarizedExperiment?", "en": "What does SummarizedExperiment coordinate?", "da": "Hvad koordinerer SummarizedExperiment?"}, back: {"es": "Assays, metadata de características y metadata de muestras.", "en": "Assays, feature metadata, and sample metadata.", "da": "Assays, featuremetadata og samplemetadata."}}
  - {id: bmb831.m07.f02, type: structure, front: {"es": "¿Qué deben compartir todas las assays?", "en": "What must all assays share?", "da": "Hvad skal alle assays dele?"}, back: {"es": "Número y orden de filas y columnas.", "en": "Number and ordering of rows and columns.", "da": "Antal og rækkefølge af rækker og kolonner."}}
  - {id: bmb831.m07.f03, type: assay, front: {"es": "¿Qué debe declarar cada assay?", "en": "What should every assay declare?", "da": "Hvad bør hvert assay deklarere?"}, back: {"es": "Nombre, escala, método de generación y parámetros.", "en": "Name, scale, generation method, and parameters.", "da": "Navn, skala, genereringsmetode og parametre."}}
  - {id: bmb831.m07.f04, type: metadata, front: {"es": "Rol de rowData.", "en": "Role of rowData.", "da": "Rolle af rowData."}, back: {"es": "Describir genes, proteínas, regiones u otras características alineadas con filas.", "en": "Describe genes, proteins, regions, or other features aligned with rows.", "da": "Beskrive gener, proteiner, regioner eller andre features alignet med rækker."}}
  - {id: bmb831.m07.f05, type: metadata, front: {"es": "Rol de colData.", "en": "Role of colData.", "da": "Rolle af colData."}, back: {"es": "Describir muestras y variables de diseño alineadas con columnas.", "en": "Describe samples and design variables aligned with columns.", "da": "Beskrive samples og designvariable alignet med kolonner."}}
  - {id: bmb831.m07.f06, type: metadata, front: {"es": "Rol de metadata().", "en": "Role of metadata().", "da": "Rolle af metadata()."}, back: {"es": "Guardar procedencia, parámetros y contexto global no tabular.", "en": "Store provenance, parameters, and global non-tabular context.", "da": "Lagre provenance, parametre og global ikke-tabular kontekst."}}
  - {id: bmb831.m07.f07, type: ranges, front: {"es": "Información mínima de rowRanges.", "en": "Minimum rowRanges information.", "da": "Minimumsinformation i rowRanges."}, back: {"es": "Cromosoma, inicio, fin, hebra y genome build.", "en": "Chromosome, start, end, strand, and genome build.", "da": "Kromosom, start, slut, strand og genome build."}}
  - {id: bmb831.m07.f08, type: misconception, front: {"es": "Corrige: chr1:1000-2000 es universalmente interpretable.", "en": "Correct: chr1:1000-2000 is universally interpretable.", "da": "Ret: chr1:1000-2000 er universelt fortolkeligt."}, back: {"es": "Falta build, convención de coordenadas y posiblemente hebra.", "en": "Genome build, coordinate convention, and possibly strand are missing.", "da": "Genome build, koordinatkonvention og muligvis strand mangler."}}
  - {id: bmb831.m07.f09, type: subset, front: {"es": "Ventaja de se[, keep].", "en": "Advantage of se[, keep].", "da": "Fordel ved se[, keep]."}, back: {"es": "Subset sincronizado de assays y colData.", "en": "Synchronized subsetting of assays and colData.", "da": "Synkron subsetting af assays og colData."}}
  - {id: bmb831.m07.f10, type: validation, front: {"es": "Invariante central de columnas.", "en": "Central column invariant.", "da": "Central kolonneinvariant."}, back: {"es": "colnames(assay) debe coincidir exactamente con rownames(colData) en contenido y orden.", "en": "assay colnames must exactly match colData rownames in content and order.", "da": "assay-kolonnenavne skal præcist matche colData-rækkenavne i indhold og rækkefølge."}}
  - {id: bmb831.m07.f11, type: identifiers, front: {"es": "¿Por qué los símbolos génicos son frágiles?", "en": "Why are gene symbols fragile?", "da": "Hvorfor er gensymboler skrøbelige?"}, back: {"es": "Pueden cambiar, ser alias, duplicarse o ser ambiguos entre especies.", "en": "They may change, be aliases, duplicate, or be ambiguous across species.", "da": "De kan ændres, være aliaser, duplikeres eller være tvetydige mellem arter."}}
  - {id: bmb831.m07.f12, type: mapping, front: {"es": "Cuatro cardinalidades de mapeo.", "en": "Four mapping cardinalities.", "da": "Fire mapping-kardinaliteter."}, back: {"es": "Uno-a-uno, uno-a-muchos, muchos-a-uno y sin match.", "en": "One-to-one, one-to-many, many-to-one, and no match.", "da": "En-til-en, en-til-mange, mange-til-en og ingen match."}}
  - {id: bmb831.m07.f13, type: misconception, front: {"es": "Corrige: elegir el primer ID mapeado es neutral.", "en": "Correct: choosing the first mapped ID is neutral.", "da": "Ret: at vælge første mappede ID er neutralt."}, back: {"es": "Puede perder o duplicar información y sesgar análisis downstream.", "en": "It may lose or duplicate information and bias downstream analyses.", "da": "Det kan miste eller duplikere information og bias downstream-analyser."}}
  - {id: bmb831.m07.f14, type: provenance, front: {"es": "¿Qué registrar en un mapeo?", "en": "What should be recorded for a mapping?", "da": "Hvad bør registreres for mapping?"}, back: {"es": "Namespace origen/destino, versiones, fecha, cardinalidad, no matches y política de resolución.", "en": "Source/target namespaces, versions, date, cardinality, no matches, and resolution policy.", "da": "Kilde/mål-namespace, versioner, dato, kardinalitet, no matches og resolutionspolitik."}}
  - {id: bmb831.m07.f15, type: container, front: {"es": "¿Cuándo usar SingleCellExperiment?", "en": "When should SingleCellExperiment be used?", "da": "Hvornår bruges SingleCellExperiment?"}, back: {"es": "Para datos single-cell que requieren reducedDims, sizeFactors o alternative experiments.", "en": "For single-cell data requiring reducedDims, sizeFactors, or alternative experiments.", "da": "Til single-cell-data der kræver reducedDims, sizeFactors eller alternative experiments."}}
  - {id: bmb831.m07.f16, type: container, front: {"es": "¿Cuándo usar MultiAssayExperiment?", "en": "When should MultiAssayExperiment be used?", "da": "Hvornår bruges MultiAssayExperiment?"}, back: {"es": "Cuando múltiples assays tienen cobertura de muestras distinta y necesitan sample map.", "en": "When multiple assays have differing sample coverage and need a sample map.", "da": "Når flere assays har forskellig sampledækning og kræver sample-map."}}
  - {id: bmb831.m07.f17, type: misconception, front: {"es": "Corrige: nombres parecidos bastan para alinear multi-omics.", "en": "Correct: similar names are enough to align multi-omics.", "da": "Ret: lignende navne er nok til at align multi-omics."}, back: {"es": "Se necesita un mapa explícito entre unidades biológicas y columnas de cada assay.", "en": "An explicit map between biological units and assay columns is required.", "da": "Et eksplicit map mellem biologiske enheder og assay-kolonner kræves."}}
  - {id: bmb831.m07.f18, type: serialization, front: {"es": "¿Qué conserva RDS?", "en": "What does RDS preserve?", "da": "Hvad bevarer RDS?"}, back: {"es": "Estructura, clase y contenido del objeto en ese momento.", "en": "Object structure, class, and content at that moment.", "da": "Objektstruktur, klasse og indhold på det tidspunkt."}}
  - {id: bmb831.m07.f19, type: misconception, front: {"es": "Corrige: un RDS sustituye manifest y código.", "en": "Correct: an RDS replaces the manifest and code.", "da": "Ret: en RDS erstatter manifest og kode."}, back: {"es": "No registra necesariamente entradas, versiones externas ni procedimiento de construcción.", "en": "It does not necessarily record inputs, external versions, or construction procedure.", "da": "Det registrerer ikke nødvendigvis input, eksterne versioner eller konstruktionsprocedure."}}
  - {id: bmb831.m07.f20, type: validation, front: {"es": "Validaciones mínimas del contenedor.", "en": "Minimum container validations.", "da": "Minimum container-valideringer."}, back: {"es": "Dimensiones, IDs únicos, orden, tipos, niveles, unidades y missingness.", "en": "Dimensions, unique IDs, ordering, types, levels, units, and missingness.", "da": "Dimensioner, unikke ID'er, rækkefølge, typer, niveauer, enheder og missingness."}}
  - {id: bmb831.m07.f21, type: misconception, front: {"es": "Corrige: objeto estructuralmente válido garantiza semántica correcta.", "en": "Correct: a structurally valid object guarantees correct semantics.", "da": "Ret: et strukturelt gyldigt objekt garanterer korrekt semantik."}, back: {"es": "Puede alinear perfectamente IDs equivocados o escalas mal etiquetadas.", "en": "It may perfectly align wrong IDs or mislabeled scales.", "da": "Det kan perfekt align forkerte ID'er eller fejlmærkede skalaer."}}
  - {id: bmb831.m07.f22, type: practice, front: {"es": "Counts y logCPM en el mismo objeto. Requisito.", "en": "Counts and logCPM in one object. Requirement.", "da": "Counts og logCPM i samme objekt. Krav."}, back: {"es": "Assays con nombres inequívocos y metadata de método, escala y parámetros.", "en": "Unambiguous assay names and metadata for method, scale, and parameters.", "da": "Entydige assay-navne og metadata for metode, skala og parametre."}}
  - {id: bmb831.m07.f23, type: oral, front: {"es": "Orden para auditar un contenedor.", "en": "Order for auditing a container.", "da": "Rækkefølge for audit af container."}, back: {"es": "Clase→dimensiones→IDs/orden→assays/escalas→metadata→ranges/build→mapeos→versiones→reconstrucción.", "en": "Class→dimensions→IDs/order→assays/scales→metadata→ranges/build→mappings→versions→reconstruction.", "da": "Klasse→dimensioner→ID'er/rækkefølge→assays/skalaer→metadata→ranges/build→mappings→versioner→rekonstruktion."}}
  - {id: bmb831.m07.f24, type: integration, front: {"es": "Beneficio central de Bioconductor containers.", "en": "Central benefit of Bioconductor containers.", "da": "Central fordel ved Bioconductor-containere."}, back: {"es": "Mantener mediciones y metadata coordinadas a través del workflow, reduciendo desalineación.", "en": "Keep measurements and metadata coordinated through the workflow, reducing misalignment.", "da": "Holde målinger og metadata koordineret gennem workflowet og reducere misalignment."}}
