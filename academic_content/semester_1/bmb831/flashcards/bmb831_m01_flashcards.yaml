schema_version: 1.0.0
course_code: BMB831
module_id: bmb831.m01
count: 24
locales: [es, en, da]

cards:
  - {id: bmb831.m01.f01, type: concept, front: {es: ¿Qué define un proyecto R reproducible?, en: What defines a reproducible R project?, da: Hvad definerer et reproducerbart R-projekt?}, back: {es: Entradas declaradas, código versionado y productos regenerables desde una sesión limpia., en: Declared inputs, versioned code, and products regenerable from a clean session., da: Deklarerede input, versioneret kode og produkter der kan genskabes fra en ren session.}}
  - {id: bmb831.m01.f02, type: architecture, front: {es: ¿Qué debe permanecer inmutable?, en: What should remain immutable?, da: Hvad bør forblive uforanderligt?}, back: {es: Los datos crudos recibidos y su manifest original., en: Received raw data and their original manifest., da: Modtagne rådata og deres oprindelige manifest.}}
  - {id: bmb831.m01.f03, type: architecture, front: {es: ¿Qué debe poder borrarse y regenerarse?, en: What should be deletable and regenerable?, da: Hvad bør kunne slettes og genskabes?}, back: {es: Datos derivados, tablas, figuras y reportes producidos por el workflow., en: Derived data, tables, figures, and reports produced by the workflow., da: Afledte data, tabeller, figurer og rapporter produceret af workflowet.}}
  - {id: bmb831.m01.f04, type: misconception, front: {es: Corrige: guardar .RData garantiza reproducibilidad., en: Correct: saving .RData guarantees reproducibility., da: Ret: at gemme .RData garanterer reproducerbarhed.}, back: {es: Puede ocultar objetos y orden; el código debe reconstruir desde entradas declaradas., en: It may hide objects and order; code must rebuild from declared inputs., da: Det kan skjule objekter og rækkefølge; kode skal genskabe fra deklarerede input.}}
  - {id: bmb831.m01.f05, type: function, front: {es: Características de una función bien diseñada., en: Features of a well-designed function., da: Egenskaber ved en veldesignet funktion.}, back: {es: Propósito limitado, argumentos explícitos, validación, salida definida y efectos controlados., en: Limited purpose, explicit arguments, validation, defined output, and controlled effects., da: Begrænset formål, eksplicitte argumenter, validering, defineret output og kontrollerede effekter.}}
  - {id: bmb831.m01.f06, type: concept, front: {es: ¿Qué es una función pura?, en: What is a pure function?, da: Hvad er en ren funktion?}, back: {es: Su resultado depende sólo de argumentos y no modifica estado externo observable., en: Its result depends only on arguments and it does not modify observable external state., da: Resultatet afhænger kun af argumenter og ændrer ikke observerbar ekstern state.}}
  - {id: bmb831.m01.f07, type: debugging, front: {es: Una función usa threshold global. ¿Problema?, en: A function uses a global threshold. Problem?, da: En funktion bruger global threshold. Problem?}, back: {es: Dependencia oculta y resultado sensible al entorno; debe ser argumento o configuración explícita., en: Hidden dependency and environment-sensitive result; make it an argument or explicit configuration., da: Skjult afhængighed og miljøfølsomt resultat; gør det til argument eller eksplicit konfiguration.}}
  - {id: bmb831.m01.f08, type: configuration, front: {es: Ejemplos de configuración versionada., en: Examples of versioned configuration., da: Eksempler på versioneret konfiguration.}, back: {es: Rutas, contrastes, umbrales, semillas, filtros y opciones de modelo., en: Paths, contrasts, thresholds, seeds, filters, and model options., da: Stier, kontraster, tærskler, seeds, filtre og modelvalg.}}
  - {id: bmb831.m01.f09, type: provenance, front: {es: Elementos de un manifest de datos., en: Elements of a data manifest., da: Elementer i et datamanifest.}, back: {es: Archivo, rol, origen, versión, checksum, tamaño, fecha y licencia., en: File, role, source, version, checksum, size, date, and license., da: Fil, rolle, kilde, version, checksum, størrelse, dato og licens.}}
  - {id: bmb831.m01.f10, type: provenance, front: {es: ¿Qué detecta un checksum?, en: What does a checksum detect?, da: Hvad detekterer et checksum?}, back: {es: Cambios en el contenido aunque el nombre del archivo permanezca igual., en: Content changes even when the filename remains unchanged., da: Indholdsændringer selv når filnavnet er uændret.}}
  - {id: bmb831.m01.f11, type: environment, front: {es: ¿Qué registra un lockfile?, en: What does a lockfile record?, da: Hvad registrerer en lockfile?}, back: {es: Versiones de dependencias de software; no sustituye versiones de datos o anotaciones., en: Software dependency versions; it does not replace data or annotation versions., da: Softwareafhængigheders versioner; det erstatter ikke data- eller annotationsversioner.}}
  - {id: bmb831.m01.f12, type: misconception, front: {es: Corrige: entorno reproducible implica análisis válido., en: Correct: reproducible environment implies valid analysis., da: Ret: reproducerbart miljø indebærer gyldig analyse.}, back: {es: Permite repetir el análisis, pero diseño, modelo e interpretación requieren validación separada., en: It enables repetition, but design, model, and interpretation need separate validation., da: Det muliggør gentagelse, men design, model og fortolkning kræver separat validering.}}
  - {id: bmb831.m01.f13, type: logging, front: {es: ¿Qué debe registrar un log útil?, en: What should a useful log record?, da: Hvad bør en nyttig log registrere?}, back: {es: Etapas, tiempos, conteos, parámetros, advertencias, exclusiones y fallos., en: Stages, times, counts, parameters, warnings, exclusions, and failures., da: Trin, tider, counts, parametre, advarsler, eksklusioner og fejl.}}
  - {id: bmb831.m01.f14, type: testing, front: {es: Prueba unitaria frente a integración., en: Unit versus integration test., da: Unit versus integrationstest.}, back: {es: La unitaria prueba una función aislada; la integración prueba interacción entre etapas., en: A unit test checks one function; an integration test checks interaction between stages., da: Unit test kontrollerer én funktion; integrationstest kontrollerer samspil mellem trin.}}
  - {id: bmb831.m01.f15, type: invariant, front: {es: Invariante para IDs de muestra., en: Invariant for sample IDs., da: Invariant for sample-ID'er.}, back: {es: No ausentes, únicos y con correspondencia exacta entre metadata y assay., en: Non-missing, unique, and exactly matched between metadata and assay., da: Ikke-manglende, unikke og præcist matchede mellem metadata og assay.}}
  - {id: bmb831.m01.f16, type: invariant, front: {es: Invariante para matriz de conteos., en: Invariant for a count matrix., da: Invariant for en count-matrix.}, back: {es: Dimensiones esperadas, valores no negativos y columnas alineadas con muestras., en: Expected dimensions, non-negative values, and columns aligned with samples., da: Forventede dimensioner, ikke-negative værdier og kolonner tilpasset samples.}}
  - {id: bmb831.m01.f17, type: reproducibility, front: {es: ¿Qué revela una sesión limpia?, en: What does a clean session reveal?, da: Hvad afslører en ren session?}, back: {es: Objetos heredados, paquetes implícitos, orden manual y rutas no declaradas., en: Inherited objects, implicit packages, manual order, and undeclared paths., da: Arvede objekter, implicitte pakker, manuel rækkefølge og udeklarerede stier.}}
  - {id: bmb831.m01.f18, type: randomness, front: {es: ¿Qué logra fijar una semilla?, en: What does fixing a seed achieve?, da: Hvad opnår et fast seed?}, back: {es: Reproduce una realización estocástica concreta; no estima variabilidad entre realizaciones., en: Reproduces one stochastic realization; it does not estimate variability across realizations., da: Reproducerer én stokastisk realisering; estimerer ikke variation mellem realiseringer.}}
  - {id: bmb831.m01.f19, type: error_handling, front: {es: Componentes de un error informativo., en: Components of an informative error., da: Komponenter i en informativ fejl.}, back: {es: Condición fallida, objeto o etapa, valor observado y acción esperada., en: Failed condition, object or stage, observed value, and expected action., da: Fejlet betingelse, objekt eller trin, observeret værdi og forventet handling.}}
  - {id: bmb831.m01.f20, type: code_review, front: {es: Señal de workflow frágil., en: Sign of a fragile workflow., da: Tegn på et skrøbeligt workflow.}, back: {es: Necesita ejecutar celdas o scripts en un orden recordado manualmente., en: It requires cells or scripts to be run in a manually remembered order., da: Det kræver at celler eller scripts køres i en manuelt husket rækkefølge.}}
  - {id: bmb831.m01.f21, type: practice, front: {es: ¿Por qué separar I/O de transformación?, en: Why separate I/O from transformation?, da: Hvorfor adskille I/O fra transformation?}, back: {es: Permite probar lógica con objetos pequeños sin depender de archivos o rutas., en: It allows testing logic on small objects without depending on files or paths., da: Det muliggør test af logik på små objekter uden afhængighed af filer eller stier.}}
  - {id: bmb831.m01.f22, type: oral, front: {es: Explica reproducibilidad en una frase técnica., en: Explain reproducibility in one technical sentence., da: Forklar reproducerbarhed i én teknisk sætning.}, back: {es: Capacidad de reconstruir resultados desde entradas, código, versiones y parámetros declarados., en: Ability to rebuild results from declared inputs, code, versions, and parameters., da: Evnen til at genskabe resultater fra deklarerede input, kode, versioner og parametre.}}
  - {id: bmb831.m01.f23, type: misconception, front: {es: Corrige: rutas absolutas son sólo un detalle local., en: Correct: absolute paths are only a local detail., da: Ret: absolutte stier er kun en lokal detalje.}, back: {es: Codifican una máquina y usuario concretos; deben sustituirse por rutas relativas o configuración., en: They encode a specific machine and user; replace them with relative paths or configuration., da: De koder en bestemt maskine og bruger; erstat med relative stier eller konfiguration.}}
  - {id: bmb831.m01.f24, type: integration, front: {es: Orden de auditoría de reproducibilidad., en: Order for a reproducibility audit., da: Rækkefølge for en reproducerbarhedsaudit.}, back: {es: Entradas→manifest→entorno→configuración→funciones→invariantes→ejecución limpia→productos., en: Inputs→manifest→environment→configuration→functions→invariants→clean run→products., da: Input→manifest→miljø→konfiguration→funktioner→invarianter→ren kørsel→produkter.}}
