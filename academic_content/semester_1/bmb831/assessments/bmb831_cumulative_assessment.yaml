completion_criteria:
  content_complete_when:
    - all seven official learning outcomes are represented in the report plan and rubric
    - all figures and tables are reproducibly generated
    - all IDs, versions, mappings, exclusions, and assay scales are traceable
    - the primary estimand has a corresponding model, contrast, result, and conclusion
