  standard_module_minimums:
    objectives: 8
    concepts: 6
    worked_examples: 3
    guided_practice: 6
    objective_questions: 10
    open_assessment_items: 3
    flashcards: 24
    glossary_entries: 10
    hidden_support_fragments: 10
  integrative_module_minimums:
    objectives: 8
    concepts: 8
    worked_examples: 4
    guided_practice: 8
    objective_questions: 12
    open_assessment_items: 5
    flashcards: 36
    glossary_entries: 12
    hidden_support_fragments: 12

assessment_strategy:
  formative:
    - code tracing and pipeline ordering
    - quality-control and normalization audits
    - interpretation of high-dimensional plots and model outputs
    - method selection under explicit design and distributional assumptions
    - critical appraisal of omics publications
  module_assessment:
    - randomized objective items
    - reproducible R or Bioconductor tasks
    - pipeline design and output interpretation
    - constructed responses with analytic rubrics
  cumulative_assessment:
    - individual omics report with explicit biological question
    - documented provenance, QC, preprocessing, modeling, and validation
    - reproducible R or Quarto workflow
    - functional interpretation separated from statistical evidence
    - sensitivity analyses and critical comparison of alternatives
  grading_principles:
    - preprocessing is justified by measurement scale and estimand
    - multiplicity is controlled at the appropriate family level
    - resampling includes all data-dependent steps
    - biological interpretation is limited by annotation and design
    - selected features are not called validated biomarkers without external evidence
    - open responses use rubrics rather than exact-string matching

quality_requirements:
  - Every module distinguishes biological signal, technical variation, and modeling assumptions.
  - Every omics workflow records assay version, annotation version, sample metadata, and transformation history.
  - Every feature-selection or predictive workflow prevents leakage and uses independent evaluation.
  - Every enrichment analysis declares the universe, ranking or threshold rule, database version, and multiplicity method.
  - Every transcriptomics and proteomics example separates effect magnitude, uncertainty, and biological hypothesis.
  - All learner-visible content has equivalent Spanish, English, and Danish versions.
  - Hidden support guides reasoning without exposing active-assessment answers.
  - No protected textbook exercise, figure, table, or passage is reproduced.

