    - bmb830.m03
    - bmb830.m07
    - bmb830.m08
    - bmb830.m09
    - dm847.m11
    - dm847.m13
    - dm847.m14

official_learning_outcomes:
  - id: bmb831.lo01
    statement:
      es: Analizar de forma independiente conjuntos de datos conceptualmente exigentes.
      en: Independently analyze conceptually demanding datasets.
      da: Selvstændigt analysere konceptuelt krævende datasæt.
  - id: bmb831.lo02
    statement:
      es: Trabajar con grandes conjuntos de datos y aplicar análisis estadísticos estándar para identificar características relevantes.
      en: Work with large datasets and perform standard statistical analysis to identify relevant features.
      da: Arbejde med store datasæt og udføre standardstatistiske analyser for at identificere relevante karakteristika.
  - id: bmb831.lo03
    statement:
      es: Utilizar algoritmos multivariantes estándar.
      en: Use standard multivariate algorithms.
      da: Anvende standard multivariate algoritmer.
  - id: bmb831.lo04
    statement:
      es: Diseñar scripts en R para visualización detallada.
      en: Design R scripts for detailed visualization.
      da: Designe R-scripts til detaljeret visualisering.
  - id: bmb831.lo05
    statement:
      es: Conocer y aplicar herramientas avanzadas para la interpretación biológica.
      en: Know and apply advanced tools for biological interpretation.
      da: Kende og anvende avancerede værktøjer til biologisk fortolkning.
  - id: bmb831.lo06
    statement:
      es: Conocer y aplicar pipelines estándar para el procesamiento de datos ómicos.
      en: Know and apply standard pipelines for omics processing.
      da: Kende og anvende standardpipelines til behandling af omics-data.
  - id: bmb831.lo07
    statement:
      es: Discutir objetivamente métodos de análisis utilizados en publicaciones científicas.
      en: Objectively discuss data-analysis methods used in scientific publications.
      da: Objektivt diskutere dataanalysemetoder anvendt i videnskabelige publikationer.

