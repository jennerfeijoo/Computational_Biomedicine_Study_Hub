metadata:
  title:
    es: Bioestadística en R II
    en: Biostatistics in R II
    da: Biostatistik i R II
  ects: 5
  level: masters
  term: autumn
  teaching_language: English
  assessment:
    es: Participación tutorial obligatoria e informe individual
    en: Mandatory tutorial participation and individual report
    da: Obligatorisk tutorialdeltagelse og individuel rapport
  purpose:
    es: >-
      Desarrollar análisis reproducibles de datos biológicos complejos y de alta dimensión en R.
      El curso integra control de calidad, normalización, multiplicidad, modelos para conteos y
      proporciones, análisis multivariante, validación de modelos, infraestructura Bioconductor,
      transcriptómica, proteómica, enriquecimiento funcional y estrategias de integración multi-ómica.
      El énfasis se mantiene en procedencia, diseño, incertidumbre, sensibilidad y límites de interpretación.
    en: >-
      Develop reproducible analyses of complex and high-dimensional biological data in R. The course
      integrates quality control, normalization, multiplicity, models for counts and proportions,
      multivariate analysis, model validation, Bioconductor infrastructure, transcriptomics, proteomics,
      functional enrichment, and multi-omics integration. Emphasis remains on provenance, design,
      uncertainty, sensitivity, and interpretive limits.
    da: >-
      Udvikle reproducerbare analyser af komplekse og højdimensionelle biologiske data i R.
      Kurset integrerer kvalitetskontrol, normalisering, multiplicitet, modeller for counts og proportioner,
      multivariat analyse, validering, Bioconductor, transkriptomik, proteomik, funktionel berigelse
      og multi-omics-integration med fokus på provenance, design, usikkerhed og fortolkningsgrænser.

academic_preconditions:
  required:
    - completion-equivalent knowledge from BMB830
    - ability to write and inspect R scripts
    - basic probability, inference, linear models, PCA, and clustering
  bridges:
