      - {criterion: conditional_reasoning, weight: 0.25}
      - {criterion: consequence_for_validity, weight: 0.25}
      - {criterion: proposed_analysis_or_data, weight: 0.20}
      - {criterion: concise_communication, weight: 0.10}

glossary:
  - id: bmb831.term.analysis_chain
    term: {"es": "cadena analítica", "en": "analytical chain", "da": "analysekæde"}
    definition:
      es: "Secuencia trazable desde pregunta y datos hasta método, resultado y afirmación."
      en: "Traceable sequence from question and data through method, result, and claim."
      da: "Sporbar sekvens fra spørgsmål og data gennem metode, resultat og påstand."
  - id: bmb831.term.data_contract
    term: {"es": "contrato de datos", "en": "data contract", "da": "datakontrakt"}
    definition:
      es: "Especificación de entidades, claves, tipos, escalas, relaciones y condiciones válidas."
      en: "Specification of entities, keys, types, scales, relations, and validity conditions."
      da: "Specifikation af enheder, nøgler, typer, skalaer, relationer og gyldighedsbetingelser."
  - id: bmb831.term.eligibility
    term: {"es": "elegibilidad", "en": "eligibility", "da": "eligibility"}
    definition:
      es: "Condiciones que determinan qué unidades pueden entrar en el análisis."
      en: "Conditions determining which units may enter the analysis."
      da: "Betingelser der bestemmer hvilke enheder der kan indgå i analysen."
  - id: bmb831.term.claim_ladder
    term: {"es": "escalera de afirmaciones", "en": "claim ladder", "da": "påstandsstige"}
    definition:
      es: "Distinción progresiva entre observación, inferencia, interpretación y mecanismo."
      en: "Progressive distinction among observation, inference, interpretation, and mechanism."
      da: "Progressiv skelnen mellem observation, inferens, fortolkning og mekanisme."
  - id: bmb831.term.main_result
    term: {"es": "resultado principal", "en": "primary result", "da": "primært resultat"}
    definition:
      es: "Resultado directamente ligado al estimando y criterio principal del estudio."
      en: "Result directly linked to the study's primary estimand and criterion."
      da: "Resultat direkte knyttet til studiets primære estimand og kriterium."
  - id: bmb831.term.sensitivity_matrix
    term: {"es": "matriz de sensibilidad", "en": "sensitivity matrix", "da": "følsomhedsmatrix"}
    definition:
      es: "Tabla que relaciona decisiones plausibles, alternativas e impacto en conclusiones."
      en: "Table linking plausible decisions, alternatives, and impact on conclusions."
      da: "Tabel der forbinder plausible beslutninger, alternativer og påvirkning af konklusioner."
  - id: bmb831.term.negative_result
    term: {"es": "resultado negativo", "en": "negative result", "da": "negativt resultat"}
    definition:
      es: "Resultado que no aporta evidencia suficiente de un efecto bajo un análisis definido."
      en: "Result that does not provide sufficient evidence of an effect under a defined analysis."
      da: "Resultat der ikke giver tilstrækkelig evidens for en effekt under en defineret analyse."
  - id: bmb831.term.relevance_margin
    term: {"es": "margen de relevancia", "en": "relevance margin", "da": "relevansmargin"}
    definition:
      es: "Umbral de efecto considerado biológica o prácticamente importante."
      en: "Effect threshold considered biologically or practically important."
      da: "Effekttærskel betragtet som biologisk eller praktisk vigtig."
  - id: bmb831.term.incremental_evidence
    term: {"es": "evidencia incremental", "en": "incremental evidence", "da": "inkrementel evidens"}
    definition:
      es: "Información adicional demostrada sobre un baseline o conocimiento previo."
      en: "Additional information demonstrated beyond a baseline or prior knowledge."
      da: "Yderligere information demonstreret ud over baseline eller tidligere viden."
  - id: bmb831.term.traceable_figure
    term: {"es": "figura trazable", "en": "traceable figure", "da": "sporbar figur"}
    definition:
      es: "Figura regenerable cuyo dato, filtro, código y versión pueden identificarse."
      en: "Regenerable figure whose data, filter, code, and version can be identified."
      da: "Regenererbar figur hvor data, filter, kode og version kan identificeres."
  - id: bmb831.term.conditional_answer
    term: {"es": "respuesta condicional", "en": "conditional answer", "da": "betinget svar"}
    definition:
      es: "Respuesta que explicita el supuesto del que depende la conclusión."
      en: "Answer explicitly stating the assumption on which the conclusion depends."
      da: "Svar der eksplicit angiver den antagelse konklusionen afhænger af."
  - id: bmb831.term.scientific_defense
    term: {"es": "defensa científica", "en": "scientific defense", "da": "videnskabeligt forsvar"}
    definition:
      es: "Justificación razonada de decisiones, resultados, incertidumbre, alternativas y límites."
      en: "Reasoned justification of decisions, results, uncertainty, alternatives, and limits."
      da: "Ræsonneret begrundelse af beslutninger, resultater, usikkerhed, alternativer og grænser."

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Un informe ómico sólido conecta pregunta, estimando, datos, QC, preprocessing, modelo, validación,
      resultado, interpretación y limitación mediante una cadena reproducible. La fuerza de la conclusión
      no puede superar la calidad del diseño, la medición ni la evidencia estadística y biológica disponible.
    en: >-
      A strong omics report connects question, estimand, data, QC, preprocessing, model, validation,
      result, interpretation, and limitation through a reproducible chain. Claim strength cannot exceed
      the quality of design, measurement, or available statistical and biological evidence.
    da: >-
      En stærk omics-rapport forbinder spørgsmål, estimand, data, QC, preprocessing, model, validering,
      resultat, fortolkning og begrænsning gennem en reproducerbar kæde.
  misconceptions:
    - a complex pipeline is inherently a strong report
    - reproducibility guarantees scientific validity
    - a significant feature list is sufficient evidence
    - pathway enrichment establishes mechanism
    - nonsignificance proves absence
    - limitations should be generic and brief
    - an oral defense rewards certainty over calibrated reasoning
  socratic_questions:
    - What exact quantity does the estimand define?
    - Which preprocessing decision has the greatest impact on the conclusion?
    - What is the weakest link in the evidence chain?
    - Which figure directly supports the primary claim?
    - What alternative method would be reasonable and why?
    - What result would falsify the proposed biological interpretation?
    - How would the conclusion change under a different universe, normalization, or split?
    - Which population or platform is not covered by the data?
  grading_criteria:
    - question estimand and design coherence
    - data provenance and structural validity
    - assay-aware QC and preprocessing
    - justified models contrasts and validation
    - effect uncertainty multiplicity and sensitivity
    - reproducible figures tables and report
    - separation of observation inference interpretation and mechanism
    - precise limitation-aware scientific communication
  response_constraints:
    - Do not reveal answer keys during active assessment.
    - Do not grade open responses by exact-string matching.
    - Ask for assumptions when the study unit or measurement scale is ambiguous.
    - Distinguish educational feedback from official grading.
    - Prefer conditional explanations over unsupported certainty.
  retrieval_fragments:
    - id: bmb831.m12.r01
      text:
        es: "El estimando conecta la pregunta con el efecto, el contraste y la escala reportada."
        en: "The estimand connects the question to the reported effect, contrast, and scale."
        da: "Estimandet forbinder spørgsmålet med den rapporterede effekt, kontrast og skala."
    - id: bmb831.m12.r02
      text:
        es: "QC, preprocessing y modelado son etapas distintas y ninguna corrige automáticamente un diseño no identificable."
        en: "QC, preprocessing, and modeling are distinct stages, and none automatically repairs a non-identifiable design."
        da: "QC, preprocessing og modellering er forskellige trin, og ingen reparerer automatisk et ikke-identificerbart design."
    - id: bmb831.m12.r03
      text:
        es: "Una figura principal debe mostrar efecto, incertidumbre, n, unidades y escala."
        en: "A primary figure should show effect, uncertainty, n, units, and scale."
        da: "En primær figur bør vise effekt, usikkerhed, n, enheder og skala."
    - id: bmb831.m12.r04
      text:
        es: "La observación mide un patrón; el mecanismo causal necesita evidencia adicional independiente."
        en: "Observation measures a pattern; a causal mechanism requires additional independent evidence."
        da: "Observation måler et mønster; en kausal mekanisme kræver yderligere uafhængig evidens."
    - id: bmb831.m12.r05
      text:
        es: "Un resultado no significativo con intervalo amplio es impreciso, no evidencia de ausencia."
        en: "A nonsignificant result with a wide interval is imprecise, not evidence of absence."
        da: "Et ikke-signifikant resultat med bredt interval er upræcist, ikke evidens for fravær."
    - id: bmb831.m12.r06
      text:
        es: "La sensibilidad compara decisiones plausibles manteniendo fija la pregunta científica."
        en: "Sensitivity analysis compares plausible decisions while keeping the scientific question fixed."
        da: "Følsomhedsanalyse sammenligner plausible beslutninger mens det videnskabelige spørgsmål holdes fast."
