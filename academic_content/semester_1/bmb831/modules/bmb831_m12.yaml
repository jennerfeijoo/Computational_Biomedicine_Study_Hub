metadata:
  title:
    es: "Proyecto individual de informe ómico y defensa científica"
    en: "Individual omics report project and scientific defense"
    da: "Individuelt omics-rapportprojekt og videnskabeligt forsvar"
  summary:
    es: >-
      Integración de BMB831 en un informe individual reproducible sobre datos ómicos. El módulo conecta
      pregunta biológica, estimando, procedencia, contratos de datos, QC, preprocessing, modelado,
      validación, visualización, interpretación funcional, sensibilidad y limitaciones. También desarrolla
      una defensa científica estructurada de las decisiones tomadas, aunque la forma oficial de evaluación
      se rige por la descripción vigente del curso.
    en: >-
      Integration of BMB831 into an individual reproducible report on omics data. The module connects
      biological question, estimand, provenance, data contracts, QC, preprocessing, modeling, validation,
      visualization, functional interpretation, sensitivity, and limitations. It also develops a structured
      scientific defense of analytical decisions, while the official assessment format remains governed by
      the active course description.
    da: >-
      Integration af BMB831 i en individuel reproducerbar rapport om omics-data. Modulet forbinder biologisk
      spørgsmål, estimand, provenance, datakontrakter, QC, preprocessing, modellering, validering,
      visualisering, funktionel fortolkning, følsomhed og begrænsninger.
  estimated_study_hours: 24
  difficulty: integrative_advanced

