  - id: bmb831.m12.a05
    prompt:
      es: "Responde oralmente a una pregunta inesperada sobre una limitación no discutida en el informe."
      en: "Respond orally to an unexpected question about a limitation not discussed in the report."
      da: "Besvar mundtligt et uventet spørgsmål om en begrænsning der ikke blev diskuteret i rapporten."
    rubric:
