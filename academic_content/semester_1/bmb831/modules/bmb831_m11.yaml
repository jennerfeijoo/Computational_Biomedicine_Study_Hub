  - {id: bmb831.m11.q10, type: true_false, prompt: {"es": "Mayor complejidad multi-ómica garantiza mejor generalización.", "en": "Greater multi-omics complexity guarantees better generalization.", "da": "Større multi-omics-kompleksitet garanterer bedre generalisering."}, correct: false, explanation: {"es": "Puede aumentar varianza, leakage y coste sin añadir señal.", "en": "It may increase variance, leakage, and cost without adding signal.", "da": "Det kan øge varians, leakage og omkostning uden at tilføje signal."}}

