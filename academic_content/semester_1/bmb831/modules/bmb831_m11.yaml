schema_version: 1.0.0
course_code: BMB831
module_id: bmb831.m11
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title: {"es": "Integración multi-ómica, reproducibilidad y comparación crítica de workflows", "en": "Multi-omics integration, reproducibility, and critical workflow comparison", "da": "Multi-omics-integration, reproducerbarhed og kritisk workflowsammenligning"}
  summary:
    es: >-
      Estrategias de integración de transcriptómica, proteómica y otras modalidades. Incluye sample maps,
      armonización de features, integración temprana, intermedia y tardía, factores latentes, PLS/CCA,
      integración basada en redes, modalidades ausentes, escalado, leakage, validación, interpretación,
      reproducibilidad, sensibilidad y comparación con baselines unimodales.
    en: >-
      Strategies for integrating transcriptomics, proteomics, and other modalities. Covers sample maps,
      feature harmonization, early, intermediate, and late integration, latent factors, PLS/CCA,
      network-based integration, missing modalities, scaling, leakage, validation, interpretation,
      reproducibility, sensitivity, and comparison with unimodal baselines.
    da: >-
      Strategier til integration af transkriptomik, proteomik og andre modaliteter med sample maps,
      tidlig, intermediær og sen integration, latente faktorer, PLS/CCA, netværk og validering.
  estimated_study_hours: 18
  difficulty: integrative_advanced

alignment:
  official_learning_outcomes: [bmb831.lo01, bmb831.lo03, bmb831.lo05, bmb831.lo06, bmb831.lo07]
  prerequisite_modules: [bmb831.m05, bmb831.m06, bmb831.m08, bmb831.m09, bmb831.m10]
  later_modules: [bmb831.m12]

objectives:
  - {id: bmb831.m11.o01, text: {"es": "Construir un sample map multi-assay verificable", "en": "Build a verifiable multi-assay sample map", "da": "Bygge et verificerbart multi-assay sample-map"}}
  - {id: bmb831.m11.o02, text: {"es": "Armonizar escalas e identificadores sin ocultar pérdidas", "en": "Harmonize scales and identifiers without hiding losses", "da": "Harmonisere skalaer og ID'er uden at skjule tab"}}
  - {id: bmb831.m11.o03, text: {"es": "Comparar integración temprana, intermedia y tardía", "en": "Compare early, intermediate, and late integration", "da": "Sammenligne tidlig, intermediær og sen integration"}}
  - {id: bmb831.m11.o04, text: {"es": "Interpretar factores latentes y cargas por modalidad", "en": "Interpret latent factors and modality loadings", "da": "Fortolke latente faktorer og modalitetsloadings"}}
  - {id: bmb831.m11.o05, text: {"es": "Aplicar métodos supervisados sin leakage", "en": "Apply supervised methods without leakage", "da": "Anvende superviserede metoder uden leakage"}}
  - {id: bmb831.m11.o06, text: {"es": "Evaluar modalidades ausentes y desbalance de información", "en": "Evaluate missing modalities and information imbalance", "da": "Evaluere manglende modaliteter og informationsubalance"}}
  - {id: bmb831.m11.o07, text: {"es": "Comparar integración con baselines unimodales", "en": "Compare integration with unimodal baselines", "da": "Sammenligne integration med unimodale baselines"}}
  - {id: bmb831.m11.o08, text: {"es": "Auditar estabilidad, sensibilidad y alcance biológico", "en": "Audit stability, sensitivity, and biological scope", "da": "Auditere stabilitet, følsomhed og biologisk omfang"}}

concepts:
  - id: bmb831.m11.c01
    title: {"es": "Sample map y unidad común", "en": "Sample map and common unit", "da": "Sample-map og fælles enhed"}
    body:
      es: >-
        Integrar requiere identificar la misma unidad biológica a través de assays, tiempos, aliquots y plataformas.
        Nombres similares no garantizan identidad. Un sample map registra participante, muestra, assay, tiempo, lote,
        réplica y disponibilidad. Duplicados o intercambios deben resolverse antes del modelado.
      en: >-
        Integration requires identifying the same biological unit across assays, times, aliquots, and platforms.
        Similar names do not guarantee identity. A sample map records participant, specimen, assay, time, batch,
        replicate, and availability.
      da: >-
        Integration kræver identifikation af samme biologiske enhed på tværs af assays, tidspunkter og platforme.
    key_points:
      - {"es": "La intersección de muestras puede cambiar la población analizada", "en": "Sample intersection may change the analyzed population", "da": "Sample-intersection kan ændre den analyserede population"}
  - id: bmb831.m11.c02
    title: {"es": "Armonización de escalas e IDs", "en": "Scale and identifier harmonization", "da": "Skala- og ID-harmonisering"}
    body:
      es: >-
        Modalidades tienen unidades, varianzas, dimensiones y missingness distintas. Concatenar sin escalado puede dejar que una
        modalidad domine. Mapear genes y proteínas puede ser uno-a-muchos y perder isoformas. Armonización debe conservar modalidad,
        versión, cardinalidad y rasgos no compartidos cuando sean informativos.
      en: >-
        Modalities differ in units, variance, dimension, and missingness. Concatenation without scaling may let one dominate.
        Gene-protein mapping may be one-to-many and lose isoforms. Harmonization must preserve modality and mapping provenance.
      da: >-
        Modaliteter har forskellige enheder, varians og missingness. Mapping mellem gener og proteiner kan være en-til-mange.
    key_points:
      - {"es": "“Mismo gen” no implica misma entidad molecular", "en": "“Same gene” does not imply the same molecular entity", "da": "“Samme gen” indebærer ikke samme molekylære enhed"}
  - id: bmb831.m11.c03
    title: {"es": "Integración temprana, intermedia y tardía", "en": "Early, intermediate, and late integration", "da": "Tidlig, intermediær og sen integration"}
    body:
      es: >-
        Integración temprana concatena features antes del modelo; es simple pero sensible a dimensión y escala. Intermedia aprende
        representaciones o factores conjuntos preservando vistas. Tardía combina predicciones o resultados por modalidad, permitiendo
        modelos especializados y muestras parcialmente disponibles. Cada estrategia responde a una pregunta distinta.
      en: >-
        Early integration concatenates features before modeling; it is simple but scale- and dimension-sensitive. Intermediate
        integration learns joint representations while preserving views. Late integration combines modality-specific outputs.
      da: >-
        Tidlig integration concatenates features; intermediær lærer fælles repræsentationer; sen kombinerer modalitetsspecifikke output.
    key_points:
      - {"es": "Mayor complejidad no garantiza valor añadido", "en": "Greater complexity does not guarantee added value", "da": "Større kompleksitet garanterer ikke merværdi"}
  - id: bmb831.m11.c04
    title: {"es": "Factores latentes y estructura compartida", "en": "Latent factors and shared structure", "da": "Latente faktorer og delt struktur"}
    body:
      es: >-
        Modelos factoriales multi-view descomponen variación en factores con loadings por modalidad y scores por muestra.
        Un factor puede capturar biología compartida, señal específica o batch. Varianza explicada por vista, asociación con metadata,
        estabilidad y enriquecimiento de loadings apoyan interpretación, pero no identifican causalidad.
      en: >-
        Multi-view factor models decompose variation into factors with modality-specific loadings and sample scores. A factor may
        capture shared biology, view-specific signal, or batch. Interpretation requires variance, metadata, stability, and loadings.
      da: >-
        Multi-view-faktormodeller dekomponerer variation i faktorer med modalitetsspecifikke loadings og sample-scores.
    key_points:
      - {"es": "Factor latente es constructo estadístico", "en": "A latent factor is a statistical construct", "da": "En latent faktor er et statistisk konstrukt"}
  - id: bmb831.m11.c05
    title: {"es": "Integración supervisada y leakage", "en": "Supervised integration and leakage", "da": "Superviseret integration og leakage"}
    body:
      es: >-
        PLS, sparse methods, CCA supervisada y ensembles pueden usar outcome o correlación entre vistas. Toda selección, escalado,
        imputación y ajuste debe ocurrir dentro de resampling. Evaluar sólo muestras completas puede inducir selección; el test debe
        representar disponibilidad futura de modalidades.
      en: >-
        PLS, sparse methods, supervised CCA, and ensembles may use outcomes or cross-view correlation. All selection, scaling,
        imputation, and tuning must occur inside resampling. Complete-case evaluation may induce selection.
      da: >-
        PLS, sparse metoder og ensembles kræver at selection, skalering, imputation og tuning sker inden for resampling.
    key_points:
      - {"es": "La disponibilidad de assay es parte del escenario de uso", "en": "Assay availability is part of the intended-use scenario", "da": "Assay-tilgængelighed er en del af brugsscenariet"}
  - id: bmb831.m11.c06
    title: {"es": "Valor añadido, validación y sensibilidad", "en": "Added value, validation, and sensitivity", "da": "Merværdi, validering og følsomhed"}
    body:
      es: >-
        Integración debe compararse con el mejor baseline unimodal y con combinaciones simples bajo los mismos splits y tuning.
        Se evalúan rendimiento, calibración, estabilidad, coste y disponibilidad. Sensibilidad a escalado, matching, missing modalities,
        número de factores, bases de red y anotación revela si la conclusión depende de una elección frágil.
      en: >-
        Integration should be compared with the best unimodal baseline and simple combinations under identical splits and tuning.
        Evaluate performance, calibration, stability, cost, and availability. Sensitivity exposes fragile conclusions.
      da: >-
        Integration bør sammenlignes med bedste unimodale baseline under samme splits og tuning.
    key_points:
      - {"es": "Valor añadido debe ser incremental y reproducible", "en": "Added value should be incremental and reproducible", "da": "Merværdi bør være inkrementel og reproducerbar"}

worked_examples:
  - id: bmb831.m11.e01
    title: {"es": "Intersección sesgada de muestras", "en": "Biased sample intersection", "da": "Biased sample-intersection"}
    scenario: {"es": "Proteómica falta más en pacientes graves; integración usa sólo completos.", "en": "Proteomics is more often missing in severe patients; integration uses complete cases only.", "da": "Proteomik mangler oftere hos alvorlige patienter; integration bruger kun komplette cases."}
    reasoning:
      - {"es": "La cohorte integrada excluye sistemáticamente graves.", "en": "Integrated cohort systematically excludes severe patients.", "da": "Integreret kohorte ekskluderer systematisk alvorlige patienter."}
      - {"es": "Comparar características, modelar missing modality o usar integración tardía.", "en": "Compare characteristics, model missing modality, or use late integration.", "da": "Sammenlign karakteristika, modellér manglende modalitet eller brug sen integration."}
    conclusion: {"es": "Complete-case integration cambia estimando y población.", "en": "Complete-case integration changes estimand and population.", "da": "Complete-case-integration ændrer estimand og population."}
  - id: bmb831.m11.e02
    title: {"es": "Concatenación dominada por transcriptómica", "en": "Transcriptomics-dominated concatenation", "da": "Transkriptomik-domineret concatenation"}
    scenario: {"es": "20000 genes y 500 proteins se concatenan sin ponderación.", "en": "20,000 genes and 500 proteins are concatenated without weighting.", "da": "20000 gener og 500 proteiner concatenates uden vægtning."}
    reasoning:
      - {"es": "Dimensión y varianza hacen dominar transcriptómica.", "en": "Dimension and variance make transcriptomics dominate.", "da": "Dimension og varians får transkriptomik til at dominere."}
      - {"es": "Escalar por vista, reducir dimensión o usar método multi-view.", "en": "Scale by view, reduce dimension, or use a multi-view method.", "da": "Skalér per view, reducer dimension eller brug multi-view-metode."}
    conclusion: {"es": "Integración temprana necesita balance explícito.", "en": "Early integration needs explicit balancing.", "da": "Tidlig integration kræver eksplicit balancering."}
  - id: bmb831.m11.e03
    title: {"es": "Integración no mejora baseline", "en": "Integration does not improve baseline", "da": "Integration forbedrer ikke baseline"}
    scenario: {"es": "Modelo multi-ómico AUC 0.81; transcriptómica sola 0.82 en mismos outer folds.", "en": "Multi-omics AUC is 0.81; transcriptomics alone is 0.82 in the same outer folds.", "da": "Multi-omics AUC er 0.81; transkriptomik alene 0.82 i samme outer folds."}
    reasoning:
      - {"es": "No hay valor predictivo incremental demostrado.", "en": "No demonstrated incremental predictive value.", "da": "Ingen demonstreret inkrementel prædiktiv værdi."}
      - {"es": "Evaluar calibración, coste y posibles objetivos mecanísticos separados.", "en": "Assess calibration, cost, and separate mechanistic objectives.", "da": "Vurder kalibrering, omkostning og separate mekanistiske mål."}
    conclusion: {"es": "Integrar no es un fin en sí mismo.", "en": "Integration is not an end in itself.", "da": "Integration er ikke et mål i sig selv."}

guided_practice:
  - {id: bmb831.m11.p01, activity_type: sample_mapping, prompt: {"es": "Construye sample map para RNA, proteína y metabolitos con visitas.", "en": "Build a sample map for RNA, protein, metabolites, and visits.", "da": "Byg sample-map for RNA, protein, metabolitter og besøg."}, expected_elements: [participant, specimen, time, assay, aliquot, batch, availability]}
  - {id: bmb831.m11.p02, activity_type: strategy_selection, prompt: {"es": "Elige integración temprana, intermedia o tardía para tres escenarios.", "en": "Choose early, intermediate, or late integration for three scenarios.", "da": "Vælg tidlig, intermediær eller sen integration for tre scenarier."}, expected_elements: [sample_overlap, dimensionality, prediction_goal, interpretability, missing_modalities]}
  - {id: bmb831.m11.p03, activity_type: latent_factor_interpretation, prompt: {"es": "Interpreta un factor con RNA y proteína concordantes y asociación con lote.", "en": "Interpret a factor with concordant RNA/protein loadings and batch association.", "da": "Fortolk en faktor med konkordante RNA/protein-loadings og batch-association."}, expected_elements: [shared_variance, batch_confounding, loadings, sensitivity, claim_limit]}
  - {id: bmb831.m11.p04, activity_type: validation_design, prompt: {"es": "Diseña nested CV para integración supervisada.", "en": "Design nested CV for supervised integration.", "da": "Design nested CV for superviseret integration."}, expected_elements: [grouped_outer, inner_preprocessing, modality_selection, baseline_comparison, final_test]}
  - {id: bmb831.m11.p05, activity_type: missing_modality, prompt: {"es": "Compara complete-case, imputación y late integration.", "en": "Compare complete-case, imputation, and late integration.", "da": "Sammenlign complete-case, imputation og late integration."}, expected_elements: [missingness_mechanism, population_shift, uncertainty, deployability]}
  - {id: bmb831.m11.p06, activity_type: workflow_comparison, prompt: {"es": "Compara dos pipelines multi-ómicos bajo una rúbrica común.", "en": "Compare two multi-omics pipelines under a common rubric.", "da": "Sammenlign to multi-omics-pipelines under en fælles rubrik."}, expected_elements: [question, inputs, preprocessing, validation, performance, interpretation, cost, reproducibility]}

