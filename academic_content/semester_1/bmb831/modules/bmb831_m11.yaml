glossary:
  - {id: bmb831.term.sample_map, term: {"es": "sample map", "en": "sample map", "da": "sample-map"}, definition: {"es": "Tabla que relaciona unidades biológicas con columnas de cada assay.", "en": "Table linking biological units to columns of each assay.", "da": "Tabel der forbinder biologiske enheder med kolonner i hvert assay."}}
  - {id: bmb831.term.early_integration, term: {"es": "integración temprana", "en": "early integration", "da": "tidlig integration"}, definition: {"es": "Concatenación de features antes del modelo.", "en": "Feature concatenation before modeling.", "da": "Feature-concatenation før modellering."}}
  - {id: bmb831.term.intermediate_integration, term: {"es": "integración intermedia", "en": "intermediate integration", "da": "intermediær integration"}, definition: {"es": "Aprendizaje de representación conjunta preservando vistas.", "en": "Learning a joint representation while preserving views.", "da": "Læring af fælles repræsentation med bevarede views."}}
  - {id: bmb831.term.late_integration, term: {"es": "integración tardía", "en": "late integration", "da": "sen integration"}, definition: {"es": "Combinación de resultados o predicciones por modalidad.", "en": "Combination of modality-specific results or predictions.", "da": "Kombination af modalitetsspecifikke resultater eller prædiktioner."}}
  - {id: bmb831.term.multi_view, term: {"es": "multi-view", "en": "multi-view", "da": "multi-view"}, definition: {"es": "Representación de las mismas unidades mediante varias modalidades.", "en": "Representation of the same units through multiple modalities.", "da": "Repræsentation af samme enheder gennem flere modaliteter."}}
  - {id: bmb831.term.latent_factor, term: {"es": "factor latente", "en": "latent factor", "da": "latent faktor"}, definition: {"es": "Variable no observada que resume variación conjunta o específica.", "en": "Unobserved variable summarizing shared or view-specific variation.", "da": "Uobserveret variabel der opsummerer delt eller view-specifik variation."}}
  - {id: bmb831.term.view_loading, term: {"es": "loading por modalidad", "en": "view loading", "da": "view-loading"}, definition: {"es": "Contribución de features de una modalidad a un factor.", "en": "Contribution of modality features to a factor.", "da": "Bidrag fra modalitetsfeatures til en faktor."}}
  - {id: bmb831.term.missing_modality, term: {"es": "modalidad ausente", "en": "missing modality", "da": "manglende modalitet"}, definition: {"es": "Assay no disponible para una unidad incluida.", "en": "Assay unavailable for an included unit.", "da": "Assay der ikke er tilgængeligt for en inkluderet enhed."}}
  - {id: bmb831.term.unimodal_baseline, term: {"es": "baseline unimodal", "en": "unimodal baseline", "da": "unimodal baseline"}, definition: {"es": "Modelo de referencia usando una sola modalidad.", "en": "Reference model using one modality.", "da": "Referencemodel der bruger én modalitet."}}
  - {id: bmb831.term.incremental_value, term: {"es": "valor incremental", "en": "incremental value", "da": "inkrementel værdi"}, definition: {"es": "Mejora sobre un baseline bajo evaluación comparable.", "en": "Improvement over a baseline under comparable evaluation.", "da": "Forbedring over en baseline under sammenlignelig evaluering."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      La integración multi-ómica comienza por identidad de muestras y escalas, elige una estrategia según solapamiento y objetivo,
      encapsula todo aprendizaje dentro de validación y demuestra valor añadido frente a baselines unimodales.
    en: >-
      Multi-omics integration starts with sample identity and scales, selects a strategy according to overlap and objective,
      encapsulates all learning inside validation, and demonstrates added value over unimodal baselines.
    da: >-
      Multi-omics-integration starter med sampleidentitet og skalaer, vælger strategi efter overlap og mål og validerer mod unimodale baselines.
  misconceptions:
    - matching names proves matching specimens
    - gene and protein measurements are the same entity
    - concatenation is neutral across modalities
    - latent factors are causal biological pathways
    - multi-omics complexity guarantees added value
  socratic_questions:
    - Which biological unit links all assays?
    - How does complete-case selection change the population?
    - Which modality dominates after preprocessing?
    - What baseline demonstrates incremental value?
    - Are latent factors stable and independent of batch?
  grading_criteria:
    - accurate sample and feature harmonization
    - justified integration strategy
    - leakage-resistant validation and missing-modality handling
    - fair incremental-value comparison
    - stable evidence-aware biological interpretation
  retrieval_fragments:
    - id: bmb831.m11.r01
      text: {"es": "Un sample map explícito es obligatorio porque nombres similares no garantizan la misma unidad biológica.", "en": "An explicit sample map is mandatory because similar names do not guarantee the same biological unit.", "da": "Et eksplicit sample-map er obligatorisk fordi lignende navne ikke garanterer samme biologiske enhed."}
    - id: bmb831.m11.r02
      text: {"es": "Integración temprana concatena features, intermedia aprende representaciones y tardía combina outputs.", "en": "Early integration concatenates features, intermediate learns representations, and late combines outputs.", "da": "Tidlig integration concatenates features, intermediær lærer repræsentationer og sen kombinerer output."}
    - id: bmb831.m11.r03
      text: {"es": "Un modelo multi-ómico debe superar baselines unimodales bajo los mismos splits para demostrar valor incremental.", "en": "A multi-omics model must outperform unimodal baselines under the same splits to demonstrate incremental value.", "da": "En multi-omics-model skal overgå unimodale baselines under samme splits for at demonstrere inkrementel værdi."}
