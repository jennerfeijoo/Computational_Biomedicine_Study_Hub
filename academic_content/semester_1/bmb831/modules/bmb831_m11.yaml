  - {id: bmb831.m11.q03, type: multiple_choice, prompt: {"es": "Integración temprana...", "en": "Early integration...", "da": "Tidlig integration..."}, options: [{id: a, text: {"es": "Concatena features antes del modelo", "en": "Concatenates features before modeling", "da": "Concatenates features før modellen"}}, {id: b, text: {"es": "Combina predicciones finales", "en": "Combines final predictions", "da": "Kombinerer endelige prædiktioner"}}], correct_option_ids: [a], explanation: {"es": "Es sensible a escala y dimensión.", "en": "It is sensitive to scale and dimension.", "da": "Det er følsomt for skala og dimension."}}
  - {id: bmb831.m11.q04, type: true_false, prompt: {"es": "Late integration puede manejar modelos específicos por modalidad.", "en": "Late integration can use modality-specific models.", "da": "Late integration kan bruge modalitetsspecifikke modeller."}, correct: true, explanation: {"es": "Combina resultados o predicciones posteriores.", "en": "It combines downstream results or predictions.", "da": "Det kombinerer downstream-resultater eller prædiktioner."}}
  - {id: bmb831.m11.q05, type: multiple_choice, prompt: {"es": "Un factor latente puede representar...", "en": "A latent factor may represent...", "da": "En latent faktor kan repræsentere..."}, options: [{id: a, text: {"es": "Biología, batch o mezcla", "en": "Biology, batch, or a mixture", "da": "Biologi, batch eller blanding"}}, {id: b, text: {"es": "Causalidad por definición", "en": "Causality by definition", "da": "Kausalitet per definition"}}], correct_option_ids: [a], explanation: {"es": "Requiere asociación y validación.", "en": "It requires association and validation.", "da": "Det kræver association og validering."}}
  - {id: bmb831.m11.q06, type: true_false, prompt: {"es": "Selección de features multi-ómica puede hacerse antes de CV.", "en": "Multi-omics feature selection may be done before CV.", "da": "Multi-omics feature selection kan udføres før CV."}, correct: false, explanation: {"es": "Filtraría información de validación.", "en": "It would leak validation information.", "da": "Det ville lække valideringsinformation."}}
  - {id: bmb831.m11.q07, type: multiple_choice, prompt: {"es": "Riesgo de complete-case integration.", "en": "Risk of complete-case integration.", "da": "Risiko ved complete-case-integration."}, options: [{id: a, text: {"es": "Cambiar población si missingness no es aleatoria", "en": "Change population if missingness is nonrandom", "da": "Ændre population hvis missingness ikke er tilfældig"}}, {id: b, text: {"es": "Garantizar ausencia de sesgo", "en": "Guarantee no bias", "da": "Garantere ingen bias"}}], correct_option_ids: [a], explanation: {"es": "Disponibilidad puede depender del estado biológico o técnico.", "en": "Availability may depend on biological or technical state.", "da": "Tilgængelighed kan afhænge af biologisk eller teknisk status."}}
