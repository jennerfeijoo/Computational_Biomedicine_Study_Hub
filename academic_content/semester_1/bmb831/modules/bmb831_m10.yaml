      text: {"es": "Enriquecimiento genera hipótesis funcionales y no demuestra activación o causalidad.", "en": "Enrichment generates functional hypotheses and does not demonstrate activation or causality.", "da": "Enrichment genererer funktionelle hypoteser og demonstrerer ikke aktivering eller kausalitet."}
