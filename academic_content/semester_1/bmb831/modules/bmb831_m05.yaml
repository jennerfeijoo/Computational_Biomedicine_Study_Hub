  - {id: bmb831.m05.p05, activity_type: method_comparison, prompt: {"es": "Compara PCA, MDS, t-SNE y UMAP para una pregunta concreta.", "en": "Compare PCA, MDS, t-SNE, and UMAP for a concrete question.", "da": "Sammenlign PCA, MDS, t-SNE og UMAP for et konkret spørgsmål."}, expected_elements: [objective, preserved_structure, parameters, global_vs_local, reproducibility]}
  - {id: bmb831.m05.p06, activity_type: publication_appraisal, prompt: {"es": "Critica un artículo que llama subtipos a clusters visuales en UMAP.", "en": "Critique a paper calling visual UMAP clusters subtypes.", "da": "Kritisk vurder en artikel der kalder visuelle UMAP-clusters subtyper."}, expected_elements: [embedding_instability, clustering_method, external_association, replication, claim_scope]}

objective_bank:
  - {id: bmb831.m05.q01, type: multiple_choice, prompt: {"es": "En PCA de muestras, filas de X suelen ser...", "en": "In sample PCA, rows of X usually are...", "da": "I sample-PCA er rækker i X normalt..."}, options: [{id: a, text: {"es": "Muestras", "en": "Samples", "da": "Samples"}}, {id: b, text: {"es": "Componentes", "en": "Components", "da": "Komponenter"}}], correct_option_ids: [a], explanation: {"es": "Las distancias entre filas describen muestras.", "en": "Distances between rows describe samples.", "da": "Afstande mellem rækker beskriver samples."}}
  - {id: bmb831.m05.q02, type: true_false, prompt: {"es": "PCA maximiza relevancia clínica.", "en": "PCA maximizes clinical relevance.", "da": "PCA maksimerer klinisk relevans."}, correct: false, explanation: {"es": "Maximiza varianza bajo la representación elegida.", "en": "It maximizes variance under the chosen representation.", "da": "Det maksimerer varians under valgt repræsentation."}}
  - {id: bmb831.m05.q03, type: multiple_choice, prompt: {"es": "En X=UDVᵀ, V contiene...", "en": "In X=UDVᵀ, V contains...", "da": "I X=UDVᵀ indeholder V..."}, options: [{id: a, text: {"es": "Direcciones/loadings", "en": "Directions/loadings", "da": "Retninger/loadings"}}, {id: b, text: {"es": "p-values", "en": "p-values", "da": "p-værdier"}}], correct_option_ids: [a], explanation: {"es": "Define ejes en espacio de variables.", "en": "It defines axes in variable space.", "da": "Det definerer akser i variabelrummet."}}
  - {id: bmb831.m05.q04, type: true_false, prompt: {"es": "Cambiar signo de scores y loadings cambia PCA.", "en": "Flipping signs of scores and loadings changes PCA.", "da": "At ændre tegn på scores og loadings ændrer PCA."}, correct: false, explanation: {"es": "El subespacio y reconstrucción permanecen iguales.", "en": "Subspace and reconstruction remain identical.", "da": "Subspace og rekonstruktion forbliver identiske."}}
  - {id: bmb831.m05.q05, type: multiple_choice, prompt: {"es": "Escalar a SD uno hace que...", "en": "Scaling to unit SD makes...", "da": "Skalering til SD én gør at..."}, options: [{id: a, text: {"es": "Cada variable tenga varianza marginal uno", "en": "Each variable has marginal variance one", "da": "Hver variabel har marginal varians én"}}, {id: b, text: {"es": "Todos los samples sean iguales", "en": "All samples become equal", "da": "Alle samples bliver ens"}}], correct_option_ids: [a], explanation: {"es": "Cambia pesos relativos, no elimina estructura.", "en": "It changes relative weighting, not all structure.", "da": "Det ændrer relativ vægtning, ikke al struktur."}}
  - {id: bmb831.m05.q06, type: true_false, prompt: {"es": "Varianza explicada alta demuestra poder predictivo.", "en": "High explained variance proves predictive power.", "da": "Høj forklaret varians beviser prædiktiv evne."}, correct: false, explanation: {"es": "Predicción exige evaluación supervisada independiente.", "en": "Prediction requires independent supervised evaluation.", "da": "Prædiktion kræver uafhængig superviseret evaluering."}}
  - {id: bmb831.m05.q07, type: multiple_choice, prompt: {"es": "Seleccionar PCs mirando etiquetas es...", "en": "Selecting PCs by looking at labels is...", "da": "At vælge PCs ved at se labels er..."}, options: [{id: a, text: {"es": "Selección supervisada", "en": "Supervised selection", "da": "Superviseret selection"}}, {id: b, text: {"es": "Completamente no supervisado", "en": "Fully unsupervised", "da": "Fuldt usuperviseret"}}], correct_option_ids: [a], explanation: {"es": "Las etiquetas influyen en la elección.", "en": "Labels influence the choice.", "da": "Labels påvirker valget."}}
  - {id: bmb831.m05.q08, type: true_false, prompt: {"es": "Distancias globales en t-SNE deben interpretarse literalmente.", "en": "Global t-SNE distances should be interpreted literally.", "da": "Globale t-SNE-afstande bør fortolkes bogstaveligt."}, correct: false, explanation: {"es": "El método prioriza vecindarios locales.", "en": "The method prioritizes local neighborhoods.", "da": "Metoden prioriterer lokale nabolag."}}
  - {id: bmb831.m05.q09, type: multiple_select, prompt: {"es": "Factores que afectan UMAP.", "en": "Factors affecting UMAP.", "da": "Faktorer der påvirker UMAP."}, options: [{id: a, text: {"es": "Semilla", "en": "Seed", "da": "Seed"}}, {id: b, text: {"es": "Número de vecinos", "en": "Number of neighbors", "da": "Antal naboer"}}, {id: c, text: {"es": "Métrica", "en": "Metric", "da": "Metrik"}}, {id: d, text: {"es": "Ninguno", "en": "None", "da": "Ingen"}}], correct_option_ids: [a,b,c], explanation: {"es": "La embedding es parametrizada y estocástica.", "en": "The embedding is parameterized and stochastic.", "da": "Embedding er parameteriseret og stokastisk."}}
  - {id: bmb831.m05.q10, type: true_false, prompt: {"es": "Un loading grande prueba que el gen causa el fenotipo.", "en": "A large loading proves the gene causes the phenotype.", "da": "En stor loading beviser at genet forårsager fænotypen."}, correct: false, explanation: {"es": "Sólo indica contribución a una dirección de variación.", "en": "It only indicates contribution to a variation direction.", "da": "Det indikerer kun bidrag til en variationsretning."}}

