  - {id: bmb831.m05.p03, activity_type: plot_interpretation, prompt: {"es": "Interpreta scores y loadings sin afirmar causalidad.", "en": "Interpret scores and loadings without claiming causality.", "da": "Fortolk scores og loadings uden at påstå kausalitet."}, expected_elements: [sample_pattern, variable_contribution, metadata_overlay, uncertainty]}
