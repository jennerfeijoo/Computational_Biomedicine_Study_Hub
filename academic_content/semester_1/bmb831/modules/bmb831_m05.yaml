    rubric: [{criterion: representation_limits, weight: 0.25}, {criterion: cluster_validation, weight: 0.25}, {criterion: external_association, weight: 0.25}, {criterion: replication, weight: 0.25}]

glossary:
  - {id: bmb831.term.svd, term: {"es": "SVD", "en": "SVD", "da": "SVD"}, definition: {"es": "Descomposición matricial en vectores singulares y valores singulares.", "en": "Matrix decomposition into singular vectors and singular values.", "da": "Matrixdekomposition i singulære vektorer og værdier."}}
  - {id: bmb831.term.score, term: {"es": "score", "en": "score", "da": "score"}, definition: {"es": "Coordenada de una muestra en un componente.", "en": "Sample coordinate on a component.", "da": "Samplekoordinat på en komponent."}}
  - {id: bmb831.term.loading, term: {"es": "loading", "en": "loading", "da": "loading"}, definition: {"es": "Contribución de una variable a una dirección componente.", "en": "Variable contribution to a component direction.", "da": "Variabelbidrag til en komponentretning."}}
  - {id: bmb831.term.explained_variance, term: {"es": "varianza explicada", "en": "explained variance", "da": "forklaret varians"}, definition: {"es": "Fracción de variación representada por un componente o subespacio.", "en": "Fraction of variation represented by a component or subspace.", "da": "Andel variation repræsenteret af komponent eller subspace."}}
  - {id: bmb831.term.biplot, term: {"es": "biplot", "en": "biplot", "da": "biplot"}, definition: {"es": "Representación conjunta de scores y loadings con escalado declarado.", "en": "Joint display of scores and loadings under a declared scaling.", "da": "Fælles visning af scores og loadings med deklareret skalering."}}
  - {id: bmb831.term.mds, term: {"es": "MDS", "en": "MDS", "da": "MDS"}, definition: {"es": "Embedding construida para preservar distancias.", "en": "Embedding constructed to preserve distances.", "da": "Embedding konstrueret til at bevare afstande."}}
  - {id: bmb831.term.embedding, term: {"es": "embedding", "en": "embedding", "da": "embedding"}, definition: {"es": "Representación de menor dimensión de objetos de alta dimensión.", "en": "Lower-dimensional representation of high-dimensional objects.", "da": "Lavdimensionel repræsentation af højdimensionelle objekter."}}
