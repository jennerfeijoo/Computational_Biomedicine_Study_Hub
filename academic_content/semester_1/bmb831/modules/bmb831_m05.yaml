schema_version: 1.0.0
course_code: BMB831
module_id: bmb831.m05
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title: {"es": "Reducción dimensional, estructura latente y visualización multivariante robusta", "en": "Dimension reduction, latent structure, and robust multivariate visualization", "da": "Dimensionsreduktion, latent struktur og robust multivariat visualisering"}
  summary:
    es: >-
      Análisis de matrices de alta dimensión mediante centrado, escalado, SVD, PCA, scores, loadings,
      biplots, elección de componentes, reconstrucción, detección de outliers, PCA robusta, MDS y
      métodos no lineales. Se enfatiza distinguir estructura técnica, biológica y visual, evitar
      selección por etiquetas y cuantificar estabilidad y sensibilidad.
    en: >-
      Analysis of high-dimensional matrices using centering, scaling, SVD, PCA, scores, loadings,
      biplots, component selection, reconstruction, outlier detection, robust PCA, MDS, and nonlinear
      methods. Emphasis is placed on separating technical, biological, and visual structure.
    da: >-
      Analyse af højdimensionelle matricer med centrering, skalering, SVD, PCA, scores, loadings,
      biplots, komponentvalg, robust PCA, MDS og ikke-lineære metoder.
  estimated_study_hours: 14
  difficulty: advanced

alignment:
  official_learning_outcomes: [bmb831.lo03, bmb831.lo04, bmb831.lo05]
  prerequisite_modules: [bmb830.m09, bmb831.m02]
  later_modules: [bmb831.m06, bmb831.m11, bmb831.m12]

objectives:
  - {id: bmb831.m05.o01, text: {"es": "Construir una matriz multivariante con orientación explícita", "en": "Build a multivariate matrix with explicit orientation", "da": "Bygge en multivariat matrix med eksplicit orientering"}}
  - {id: bmb831.m05.o02, text: {"es": "Explicar SVD y su conexión con PCA", "en": "Explain SVD and its connection to PCA", "da": "Forklare SVD og forbindelsen til PCA"}}
  - {id: bmb831.m05.o03, text: {"es": "Interpretar scores, loadings y varianza explicada", "en": "Interpret scores, loadings, and explained variance", "da": "Fortolke scores, loadings og forklaret varians"}}
  - {id: bmb831.m05.o04, text: {"es": "Evaluar efectos de centrado, escalado y transformación", "en": "Evaluate centering, scaling, and transformation effects", "da": "Evaluere effekter af centrering, skalering og transformation"}}
  - {id: bmb831.m05.o05, text: {"es": "Seleccionar componentes sin usar indebidamente etiquetas", "en": "Select components without improper label use", "da": "Vælge komponenter uden forkert brug af labels"}}
  - {id: bmb831.m05.o06, text: {"es": "Detectar outliers e influencia multivariante", "en": "Detect multivariate outliers and influence", "da": "Detektere multivariate outliers og influence"}}
  - {id: bmb831.m05.o07, text: {"es": "Comparar PCA, MDS, t-SNE y UMAP con cautela", "en": "Compare PCA, MDS, t-SNE, and UMAP cautiously", "da": "Sammenligne PCA, MDS, t-SNE og UMAP med forsigtighed"}}
  - {id: bmb831.m05.o08, text: {"es": "Comunicar estabilidad y límites de una visualización", "en": "Communicate visualization stability and limits", "da": "Kommunikere visualiseringsstabilitet og grænser"}}

concepts:
  - id: bmb831.m05.c01
    title: {"es": "Matriz, orientación y geometría", "en": "Matrix, orientation, and geometry", "da": "Matrix, orientering og geometri"}
    body:
      es: >-
        Una matriz X suele tener muestras en filas y variables en columnas, pero debe declararse. Distancias entre filas
        representan similitud entre muestras sólo después de definir escala, transformación y tratamiento de missingness.
        Transponer cambia la pregunta: PCA de muestras no es PCA de genes.
      en: >-
        X commonly has samples as rows and variables as columns, but orientation must be stated. Distances represent
        sample similarity only after scale, transformation, and missingness are defined. Transposition changes the question.
      da: >-
        X har ofte samples som rækker og variable som kolonner. Transponering ændrer spørgsmålet.
    key_points:
      - {"es": "La geometría depende del preprocessing", "en": "Geometry depends on preprocessing", "da": "Geometri afhænger af preprocessing"}
  - id: bmb831.m05.c02
    title: {"es": "SVD y PCA", "en": "SVD and PCA", "da": "SVD og PCA"}
    body:
      es: >-
        Para X centrada, SVD X=UDVᵀ descompone variación en direcciones ortogonales. Las columnas de V son
        direcciones o loadings; UD contiene scores; D² se relaciona con varianza explicada. PCA encuentra subespacios
        de máxima varianza, no necesariamente máxima relevancia biológica.
      en: >-
        For centered X, SVD X=UDVᵀ decomposes variation into orthogonal directions. V contains loadings,
        UD contains scores, and D² relates to explained variance. PCA maximizes variance, not biological relevance.
      da: >-
        For centreret X dekomponerer SVD X=UDVᵀ variation i ortogonale retninger.
    key_points:
      - {"es": "Ortogonalidad matemática no implica independencia biológica", "en": "Mathematical orthogonality does not imply biological independence", "da": "Matematisk ortogonalitet indebærer ikke biologisk uafhængighed"}
  - id: bmb831.m05.c03
    title: {"es": "Scores, loadings y signos", "en": "Scores, loadings, and signs", "da": "Scores, loadings og tegn"}
    body:
      es: >-
        Scores ubican muestras; loadings indican contribución de variables a una dirección. El signo de un componente es arbitrario:
        multiplicar scores y loadings por -1 no cambia el modelo. La magnitud de loading depende del escalado y no prueba causalidad.
      en: >-
        Scores locate samples; loadings indicate variable contributions. Component sign is arbitrary: multiplying scores
        and loadings by -1 leaves the model unchanged. Loading magnitude depends on scaling and does not establish causality.
      da: >-
        Scores placerer samples; loadings viser variablebidrag. Komponentens tegn er vilkårligt.
    key_points:
      - {"es": "Interpretar conjuntos de loadings es más estable que un único extremo", "en": "Interpreting loading sets is often more stable than one extreme feature", "da": "Fortolkning af loading-sæt er ofte mere stabil end én ekstrem feature"}
  - id: bmb831.m05.c04
    title: {"es": "Centrado, escalado y transformación", "en": "Centering, scaling, and transformation", "da": "Centrering, skalering og transformation"}
    body:
      es: >-
        Centrar elimina medias; escalar a varianza uno iguala contribución marginal; no escalar deja dominar variables de gran varianza.
        Log/VST cambia asimetría y dependencia media-varianza. No existe opción universal: debe corresponder a unidad, ruido y objetivo.
      en: >-
        Centering removes means; unit-variance scaling equalizes marginal contribution; no scaling lets high-variance variables dominate.
        Log/VST changes skewness and mean-variance dependence. Choice depends on unit, noise, and objective.
      da: >-
        Centrering fjerner middel; unit-variance-skalering udligner bidrag; transformation ændrer skævhed og geometri.
    key_points:
      - {"es": "Escalar puede amplificar variables ruidosas de baja varianza", "en": "Scaling may amplify low-variance noisy variables", "da": "Skalering kan forstærke lav-varians støjende variable"}
  - id: bmb831.m05.c05
    title: {"es": "Elección, reconstrucción y estabilidad", "en": "Selection, reconstruction, and stability", "da": "Valg, rekonstruktion og stabilitet"}
    body:
      es: >-
        Scree plots, varianza acumulada, reconstrucción y estabilidad ayudan a decidir dimensiones. Elegir PCs porque separan
        etiquetas observadas convierte exploración en selección supervisada. Bootstrap o perturbación evalúan subespacios,
        no sólo correlación de componentes individuales susceptibles a rotación.
      en: >-
        Scree plots, cumulative variance, reconstruction, and stability guide dimension choice. Selecting PCs because they
        separate observed labels makes exploration supervised. Stability should assess subspaces, not only individual components.
      da: >-
        Scree plots, rekonstruktion og stabilitet hjælper komponentvalg. Label-baseret valg gør analysen superviseret.
    key_points:
      - {"es": "Varianza explicada no mide poder predictivo", "en": "Explained variance does not measure predictive power", "da": "Forklaret varians måler ikke prædiktiv evne"}
  - id: bmb831.m05.c06
    title: {"es": "Robustez y métodos no lineales", "en": "Robustness and nonlinear methods", "da": "Robusthed og ikke-lineære metoder"}
    body:
      es: >-
        PCA clásica es sensible a extremos. Métodos robustos limitan influencia pero introducen supuestos. MDS intenta preservar
        distancias; t-SNE y UMAP priorizan vecindarios y dependen de parámetros, semillas y densidad. Distancias globales,
        tamaños de clusters y separaciones visuales no deben interpretarse literalmente sin validación.
      en: >-
        Classical PCA is outlier-sensitive. Robust methods limit influence under assumptions. MDS preserves distances;
        t-SNE and UMAP emphasize neighborhoods and depend on parameters, seeds, and density. Visual gaps are not direct evidence.
      da: >-
        Klassisk PCA er outlier-følsom. MDS bevarer afstande; t-SNE og UMAP prioriterer nabolag og afhænger af parametre.
    key_points:
      - {"es": "Una embedding es una representación, no el dato original", "en": "An embedding is a representation, not the original data", "da": "En embedding er en repræsentation, ikke originaldata"}

worked_examples:
  - id: bmb831.m05.e01
    example_kind: r_code
    language: r
    code: |-
      features <- data.frame(
        high_scale = c(1000, 1500, 2000, 2500),
        proportion = c(0.10, 0.20, 0.80, 0.90)
      )
      raw_pca <- prcomp(features, scale. = FALSE)
      scaled_pca <- prcomp(features, scale. = TRUE)
      round(raw_pca$rotation[, 1], 3)
      round(scaled_pca$rotation[, 1], 3)
    expected_output:
      es: "PC1 sin escalar queda prácticamente alineada con high_scale; al estandarizar, ambas variables tienen cargas absolutas comparables."
      en: "Unscaled PC1 is almost aligned with high_scale; after standardization, both variables have comparable absolute loadings."
      da: "Uskaleret PC1 følger næsten high_scale; efter standardisering har begge variable sammenlignelige absolutte loadings."
    output_kind: interpretation
    title: {"es": "Efecto de escalado", "en": "Scaling effect", "da": "Skaleringseffekt"}
    scenario: {"es": "Una variable está en miles y otra entre 0 y 1.", "en": "One variable is in thousands and another between 0 and 1.", "da": "Én variabel er i tusinder og en anden mellem 0 og 1."}
    reasoning:
      - {"es": "Sin escalado, la primera domina covarianza.", "en": "Without scaling, the first dominates covariance.", "da": "Uden skalering dominerer den første kovarians."}
      - {"es": "Con z-scores contribuyen por correlación, pero ruido pequeño puede amplificarse.", "en": "With z-scores they contribute by correlation, but small-scale noise may be amplified.", "da": "Med z-scores bidrager de via korrelation, men lavskala støj kan forstærkes."}
    conclusion: {"es": "Comparar ambas representaciones y justificar según unidades.", "en": "Compare both representations and justify by units.", "da": "Sammenlign begge repræsentationer og begrund efter enheder."}
  - id: bmb831.m05.e02
    example_kind: r_code
    language: r
    code: |-
      scores <- data.frame(
        pc1 = c(-3.1, -2.8, -2.5, 2.4, 2.9, 3.0),
        batch = factor(rep(c("run_1", "run_2"), each = 3)),
        condition = factor(rep(c("control", "treated", "control"), 2))
      )
      summary(lm(pc1 ~ batch + condition, data = scores))$coefficients
    expected_output:
      es: "La diferencia de batch domina el modelo de PC1; la condición no puede interpretarse como causa de la separación sin un diseño que la desacople."
      en: "The batch difference dominates the PC1 model; condition cannot explain the separation without a design that disentangles it."
      da: "Batchforskellen dominerer PC1-modellen; condition kan ikke forklare separationen uden et design der adskiller dem."
    output_kind: interpretation
    title: {"es": "PC1 impulsada por lote", "en": "Batch-driven PC1", "da": "Batch-drevet PC1"}
    scenario: {"es": "PC1 explica 35% y coincide con lote.", "en": "PC1 explains 35% and matches batch.", "da": "PC1 forklarer 35% og matcher batch."}
    reasoning:
      - {"es": "Varianza alta puede ser técnica.", "en": "High variance may be technical.", "da": "Høj varians kan være teknisk."}
      - {"es": "Revisar loadings, QC, diseño y solapamiento con condición.", "en": "Inspect loadings, QC, design, and overlap with condition.", "da": "Undersøg loadings, QC, design og overlap med condition."}
    conclusion: {"es": "No atribuir separación a biología sin evidencia externa.", "en": "Do not attribute separation to biology without external evidence.", "da": "Tilskriv ikke separation til biologi uden ekstern evidens."}
  - id: bmb831.m05.e03
    title: {"es": "UMAP cambia con semilla", "en": "UMAP changes with seed", "da": "UMAP ændres med seed"}
    scenario: {"es": "Dos ejecuciones muestran número aparente distinto de clusters.", "en": "Two runs show a different apparent number of clusters.", "da": "To kørsler viser forskelligt tilsyneladende antal clusters."}
    reasoning:
      - {"es": "La embedding es estocástica y parametrizada.", "en": "The embedding is stochastic and parameterized.", "da": "Embedding er stokastisk og parameteriseret."}
      - {"es": "Evaluar estabilidad, datos originales y método formal de clustering.", "en": "Assess stability, original-space structure, and formal clustering.", "da": "Vurder stabilitet, originalt rum og formel clustering."}
    conclusion: {"es": "La figura no define por sí sola subpoblaciones.", "en": "The figure alone does not define subpopulations.", "da": "Figuren alene definerer ikke subpopulationer."}

