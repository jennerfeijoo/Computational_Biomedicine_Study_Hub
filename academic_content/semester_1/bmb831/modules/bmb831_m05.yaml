hidden_tutor_support:
  canonical_explanation:
    es: >-
      PCA resume máxima varianza de una representación concreta. Scores describen muestras, loadings variables y la
      interpretación depende de transformación, escala, outliers y metadata. Embeddings no lineales son visualizaciones parametrizadas.
    en: >-
      PCA summarizes maximum variance of a specific representation. Scores describe samples, loadings variables, and interpretation
      depends on transformation, scaling, outliers, and metadata. Nonlinear embeddings are parameterized visualizations.
    da: >-
      PCA opsummerer maksimal varians i en specifik repræsentation. Fortolkning afhænger af transformation, skalering og metadata.
  misconceptions:
    - PCA discovers clinically relevant dimensions by definition
    - component sign has intrinsic biological meaning
    - explained variance measures prediction
    - visual UMAP clusters are validated subtypes
    - scaling is always beneficial
  socratic_questions:
    - What do rows and columns represent?
    - Which variables dominate before and after scaling?
    - Does PC structure align with technical metadata?
    - How stable is the subspace under resampling?
    - What structure does the chosen embedding preserve?
  grading_criteria:
    - explicit matrix orientation and preprocessing
    - correct SVD PCA scores and loadings reasoning
    - sensitivity to scaling transformation and outliers
    - separation of exploration from prediction
    - restrained interpretation of nonlinear embeddings
  retrieval_fragments:
    - id: bmb831.m05.r01
      text: {"es": "PCA maximiza varianza, no relevancia biológica ni capacidad predictiva.", "en": "PCA maximizes variance, not biological relevance or predictive ability.", "da": "PCA maksimerer varians, ikke biologisk relevans eller prædiktiv evne."}
    - id: bmb831.m05.r02
      text: {"es": "El signo de un componente es arbitrario si scores y loadings cambian juntos.", "en": "Component sign is arbitrary when scores and loadings flip together.", "da": "Komponenttegn er vilkårligt når scores og loadings skifter sammen."}
    - id: bmb831.m05.r03
      text: {"es": "t-SNE y UMAP dependen de parámetros y no preservan necesariamente geometría global.", "en": "t-SNE and UMAP depend on parameters and need not preserve global geometry.", "da": "t-SNE og UMAP afhænger af parametre og bevarer ikke nødvendigvis global geometri."}
