    prompt: {"es": "Compara una embedding lineal y una no lineal y limita su interpretación.", "en": "Compare a linear and nonlinear embedding and limit interpretation.", "da": "Sammenlign en lineær og ikke-lineær embedding og begræns fortolkningen."}
    rubric: [{criterion: preserved_structure, weight: 0.25}, {criterion: parameters_stochasticity, weight: 0.25}, {criterion: stability, weight: 0.25}, {criterion: claim_scope, weight: 0.25}]
