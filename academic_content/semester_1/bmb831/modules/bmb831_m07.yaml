  - {id: bmb831.term.assay, term: {es: assay, en: assay, da: assay}, definition: {es: Matriz de mediciones con escala y método definidos., en: Measurement matrix with defined scale and method., da: Målematrix med defineret skala og metode.}}
  - {id: bmb831.term.row_data, term: {es: rowData, en: rowData, da: rowData}, definition: {es: Metadata alineada con características., en: Metadata aligned with features., da: Metadata alignet med features.}}
  - {id: bmb831.term.col_data, term: {es: colData, en: colData, da: colData}, definition: {es: Metadata alineada con muestras., en: Metadata aligned with samples., da: Metadata alignet med samples.}}
  - {id: bmb831.term.row_ranges, term: {es: rowRanges, en: rowRanges, da: rowRanges}, definition: {es: Rangos genómicos alineados con filas., en: Genomic ranges aligned with rows., da: Genomiske ranges alignet med rækker.}}
  - {id: bmb831.term.genome_build, term: {es: ensamblaje genómico, en: genome build, da: genome build}, definition: {es: Versión de referencia que da significado a coordenadas., en: Reference version giving coordinates meaning., da: Referenceversion der giver koordinater betydning.}}
  - {id: bmb831.term.identifier_cardinality, term: {es: cardinalidad de mapeo, en: mapping cardinality, da: mapping-kardinalitet}, definition: {es: Número de entidades de origen y destino relacionadas., en: Number of related source and target entities., da: Antal relaterede kilde- og målenheder.}}
  - {id: bmb831.term.single_cell_experiment, term: {es: SingleCellExperiment, en: SingleCellExperiment, da: SingleCellExperiment}, definition: {es: Contenedor especializado para datos single-cell., en: Specialized container for single-cell data., da: Specialiseret container til single-cell-data.}}
  - {id: bmb831.term.multi_assay_experiment, term: {es: MultiAssayExperiment, en: MultiAssayExperiment, da: MultiAssayExperiment}, definition: {es: Contenedor coordinado para múltiples assays y mapas de muestras., en: Coordinated container for multiple assays and sample maps., da: Koordineret container for flere assays og sample-maps.}}
  - {id: bmb831.term.serialization, term: {es: serialización, en: serialization, da: serialisering}, definition: {es: Almacenamiento de un objeto conservando estructura y clase., en: Storage of an object preserving structure and class., da: Lagring af et objekt med bevaret struktur og klasse.}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      Los contenedores Bioconductor coordinan mediciones y metadata para reducir desalineación. La validez requiere además
      IDs, escalas, builds, cardinalidades, versiones y procedimientos de construcción explícitos.
    en: >-
      Bioconductor containers coordinate measurements and metadata to reduce misalignment. Validity additionally requires
      explicit IDs, scales, builds, mapping cardinalities, versions, and construction procedures.
    da: >-
      Bioconductor-containere koordinerer målinger og metadata. Gyldighed kræver også eksplicitte ID'er, skalaer og versioner.
  misconceptions:
    - a container automatically validates biological meaning
    - gene symbols are stable unique identifiers
    - first-match identifier mapping is harmless
    - coordinates are meaningful without genome build
    - an RDS file replaces construction code and provenance
  socratic_questions:
    - Are assay columns identical to colData row names and order?
    - What scale and method generated each assay?
    - What is the cardinality of identifier mapping?
    - Which genome build and coordinate convention are used?
    - Can this object be rebuilt from raw inputs?
  grading_criteria:
    - correct container architecture
    - synchronized alignment and validation
    - identifier and coordinate provenance
    - appropriate specialized container selection
    - reproducible serialization and reconstruction
  retrieval_fragments:
    - id: bmb831.m07.r01
      text: {es: SummarizedExperiment sincroniza assays con rowData y colData durante subsetting., en: SummarizedExperiment synchronizes assays with rowData and colData during subsetting., da: SummarizedExperiment synkroniserer assays med rowData og colData under subsetting.}
    - id: bmb831.m07.r02
      text: {es: Un mapeo de identificadores puede ser uno-a-muchos y nunca debe reducirse silenciosamente al primer match., en: Identifier mapping may be one-to-many and should never be silently reduced to the first match., da: Identifikatormapping kan være en-til-mange og bør aldrig stille reduceres til første match.}
    - id: bmb831.m07.r03
      text: {es: Un objeto serializado requiere código, versiones y manifest para ser reconstruible y auditable., en: A serialized object requires code, versions, and a manifest to be reconstructible and auditable., da: Et serialiseret objekt kræver kode, versioner og manifest for at kunne genskabes og auditeres.}
