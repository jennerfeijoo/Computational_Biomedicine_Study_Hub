module_id: bmb831.m07
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title: {es: Contenedores Bioconductor, anotación e infraestructura ómica reproducible, en: Bioconductor data containers, annotation, and reproducible omics infrastructure, da: Bioconductor-datacontainere, annotation og reproducerbar omics-infrastruktur}
  summary:
    es: >-
      Organización de datos ómicos mediante contenedores Bioconductor. Incluye `SummarizedExperiment`,
      assays, metadata de filas y columnas, rangos genómicos, subsetting sincronizado, identificadores,
      anotación versionada, mapeos uno-a-muchos, `SingleCellExperiment`, `MultiAssayExperiment`,
      validación estructural y serialización reproducible.
    en: >-
      Organization of omics data through Bioconductor containers. Covers `SummarizedExperiment`, assays,
      row and column metadata, genomic ranges, synchronized subsetting, identifiers, versioned annotation,
      one-to-many mappings, `SingleCellExperiment`, `MultiAssayExperiment`, structural validation, and serialization.
    da: >-
      Organisering af omics-data med Bioconductor-containere: `SummarizedExperiment`, assays,
      række- og kolonnemetadata, genomiske ranges, synkron subsetting, identifikatorer og versioneret annotation.
  estimated_study_hours: 13
  difficulty: advanced

alignment:
  official_learning_outcomes: [bmb831.lo02, bmb831.lo06]
  prerequisite_modules: [bmb831.m01, bmb831.m02, dm847.m02]
  later_modules: [bmb831.m08, bmb831.m09, bmb831.m11, bmb831.m12]

objectives:
  - {id: bmb831.m07.o01, text: {es: Explicar la arquitectura de SummarizedExperiment, en: Explain SummarizedExperiment architecture, da: Forklare SummarizedExperiment-arkitektur}}
  - {id: bmb831.m07.o02, text: {es: Alinear assays, rowData y colData, en: Align assays, rowData, and colData, da: Tilpasse assays, rowData og colData}}
  - {id: bmb831.m07.o03, text: {es: Usar rowRanges cuando la posición genómica es relevante, en: Use rowRanges when genomic position is relevant, da: Bruge rowRanges når genomisk position er relevant}}
  - {id: bmb831.m07.o04, text: {es: Realizar subsetting sin perder correspondencia, en: Subset without losing correspondence, da: Udføre subsetting uden at miste korrespondance}}
  - {id: bmb831.m07.o05, text: {es: Mapear identificadores con procedencia y cardinalidad, en: Map identifiers with provenance and cardinality, da: Mappe identifikatorer med provenance og kardinalitet}}
  - {id: bmb831.m07.o06, text: {es: Seleccionar contenedor según modalidad, en: Select a container according to modality, da: Vælge container efter modalitet}}
  - {id: bmb831.m07.o07, text: {es: Validar integridad estructural antes del análisis, en: Validate structural integrity before analysis, da: Validere strukturel integritet før analyse}}
  - {id: bmb831.m07.o08, text: {es: Serializar objetos con entorno y versiones registradas, en: Serialize objects with recorded environment and versions, da: Serialisere objekter med registreret miljø og versioner}}

concepts:
  - id: bmb831.m07.c01
    title: {es: SummarizedExperiment como contrato de alineación, en: SummarizedExperiment as an alignment contract, da: SummarizedExperiment som alignment-kontrakt}
    body:
      es: >-
        `SummarizedExperiment` vincula una o más matrices assay con metadata de características y muestras.
        Todas las assays comparten dimensiones y orden de filas/columnas. El contenedor reduce errores de
        desalineación al aplicar subsetting coordinado, pero no valida automáticamente el significado biológico.
      en: >-
        `SummarizedExperiment` links one or more assay matrices with feature and sample metadata. All assays share
        row and column dimensions and ordering. Coordinated subsetting reduces alignment errors but does not validate meaning.
      da: >-
        `SummarizedExperiment` forbinder assays med feature- og samplemetadata og sikrer synkron dimension og rækkefølge.
    key_points:
      - {es: El contenedor protege correspondencia estructural, no semántica, en: The container protects structural, not semantic, correspondence, da: Containeren beskytter strukturel, ikke semantisk, korrespondance}
  - id: bmb831.m07.c02
    title: {es: Assays, rowData, colData y metadata, en: Assays, rowData, colData, and metadata, da: Assays, rowData, colData og metadata}
    body:
      es: >-
        `assays()` almacena mediciones como counts, normalized o log-expression con nombres claros. `rowData()` describe
        genes, proteínas o regiones; `colData()` describe muestras; `metadata()` conserva información global, parámetros y
        procedencia. Guardar resultados incompatibles en el mismo slot sin declarar escala induce errores.
      en: >-
        `assays()` stores measurements such as counts, normalized values, or log expression. `rowData()` describes features,
        `colData()` samples, and `metadata()` global provenance and parameters. Scales must be explicit.
      da: >-
        `assays()` lagrer målinger; `rowData()` beskriver features; `colData()` samples; `metadata()` global provenance.
    key_points:
      - {es: Cada assay necesita nombre, escala y método de generación, en: Every assay needs a name, scale, and generation method, da: Hvert assay kræver navn, skala og genereringsmetode}
  - id: bmb831.m07.c03
    title: {es: Rangos genómicos y coordenadas, en: Genomic ranges and coordinates, da: Genomiske ranges og koordinater}
    body:
      es: >-
        `RangedSummarizedExperiment` usa `rowRanges()` para cromosoma, inicio, fin, hebra y build. Coordenadas deben declarar
        sistema 0/1-based, intervalos cerrados/half-open y ensamblaje. Convertir builds sin cadena o control puede producir
        pérdidas y mapeos múltiples.
      en: >-
        `RangedSummarizedExperiment` uses `rowRanges()` for chromosome, start, end, strand, and genome build. Coordinate
        convention and assembly must be declared. Build conversion may fail or map multiply.
      da: >-
        `rowRanges()` lagrer kromosom, start, slut, strand og genome build; koordinatkonvention skal deklareres.
    key_points:
      - {es: Una coordenada sin build es ambigua, en: A coordinate without a genome build is ambiguous, da: En koordinat uden genome build er tvetydig}
  - id: bmb831.m07.c04
    title: {es: Identificadores y cardinalidad de mapeo, en: Identifiers and mapping cardinality, da: Identifikatorer og mapping-kardinalitet}
    body:
      es: >-
        Ensembl IDs, símbolos, Entrez, UniProt y accesiones no son intercambiables. Versiones como ENSG...“.5” pueden
        requerir tratamiento explícito. Los mapeos pueden ser uno-a-uno, uno-a-muchos, muchos-a-uno o ausentes.
        Elegir el primer match silenciosamente pierde información y sesga conteos o enriquecimiento.
      en: >-
        Ensembl IDs, symbols, Entrez, UniProt, and accessions are not interchangeable. Mapping can be one-to-one,
        one-to-many, many-to-one, or missing. Silently taking the first match loses information.
      da: >-
        Ensembl, symboler, Entrez og UniProt er ikke udskiftelige. Mapping kan være en-til-mange eller manglende.
    key_points:
      - {es: La política de duplicados debe ser explícita, en: Duplicate-resolution policy must be explicit, da: Duplikatpolitik skal være eksplicit}
  - id: bmb831.m07.c05
    title: {es: Contenedores especializados y multi-assay, en: Specialized and multi-assay containers, da: Specialiserede og multi-assay-containere}
    body:
      es: >-
        `SingleCellExperiment` añade reduced dimensions, size factors y alternative experiments. `MultiAssayExperiment`
        coordina múltiples assays con tablas de mapeo porque no todas las muestras o unidades están presentes en cada modalidad.
        La elección debe reflejar jerarquía, modalidad y relaciones entre unidades.
      en: >-
        `SingleCellExperiment` adds reduced dimensions, size factors, and alternative experiments. `MultiAssayExperiment`
        coordinates multiple assays through mapping tables because sample coverage may differ by modality.
      da: >-
        `SingleCellExperiment` tilføjer reduced dimensions og size factors; `MultiAssayExperiment` koordinerer flere assays via mapping-tabeller.
    key_points:
      - {es: Multi-assay requiere mapa de muestras, no sólo nombres parecidos, en: Multi-assay requires a sample map, not merely similar names, da: Multi-assay kræver sample-map, ikke kun lignende navne}
  - id: bmb831.m07.c06
    title: {es: Validación, serialización y procedencia, en: Validation, serialization, and provenance, da: Validering, serialisering og provenance}
    body:
      es: >-
        Antes de modelar se verifican dimensiones, nombres únicos, correspondencia, tipos, niveles, unidades y ausencia.
        RDS preserva clase y slots, pero debe acompañarse de versión de R, paquetes, anotaciones, fuente y código que lo genera.
        Un objeto serializado puede ser reproducible pero obsoleto o semánticamente incorrecto.
      en: >-
        Before modeling, validate dimensions, unique names, alignment, types, levels, units, and missingness. RDS preserves
        class and slots but requires R, package, annotation, source, and generating-code versions.
      da: >-
        Før modellering valideres dimensioner, navne, alignment, typer og enheder. RDS kræver versions- og provenanceinformation.
    key_points:
      - {es: Serialización no sustituye código de construcción, en: Serialization does not replace construction code, da: Serialisering erstatter ikke konstruktionskode}

worked_examples:
  - id: bmb831.m07.e01
    title: {es: Subsetting seguro, en: Safe subsetting, da: Sikker subsetting}
    scenario: {es: Se seleccionan muestras mediante `se[, keep]`., en: Samples are selected using `se[, keep]`., da: Samples vælges med `se[, keep]`.}
    reasoning:
      - {es: Assays y colData se reducen en el mismo orden., en: Assays and colData subset in the same order., da: Assays og colData subsets i samme rækkefølge.}
      - {es: Extraer matriz y metadata por separado requiere volver a validar., en: Separate matrix and metadata subsetting requires revalidation., da: Separat subsetting af matrix og metadata kræver revalidering.}
    conclusion: {es: El contenedor reduce desalineación accidental., en: The container reduces accidental misalignment., da: Containeren reducerer utilsigtet misalignment.}
  - id: bmb831.m07.e02
    title: {es: Mapeo uno-a-muchos, en: One-to-many mapping, da: En-til-mange mapping}
    scenario: {es: Un símbolo antiguo mapea a dos Ensembl IDs., en: An old symbol maps to two Ensembl IDs., da: Et gammelt symbol mapper til to Ensembl-ID'er.}
    reasoning:
      - {es: No elegir primer match silenciosamente., en: Do not silently choose the first match., da: Vælg ikke stille første match.}
      - {es: Conservar tabla de mapeo, evidencia y política según análisis., en: Preserve mapping table, evidence, and analysis-specific policy., da: Bevar mapping-tabel, evidens og analysespecifik politik.}
    conclusion: {es: La ambigüedad debe propagarse o resolverse justificadamente., en: Ambiguity must be propagated or justifiably resolved., da: Tvetydighed skal propagere eller løses begrundet.}
  - id: bmb831.m07.e03
    title: {es: Assays de escalas distintas, en: Assays on different scales, da: Assays på forskellige skalaer}
    scenario: {es: Un objeto contiene counts y logCPM sin nombres descriptivos., en: An object contains counts and logCPM without descriptive names., da: Et objekt indeholder counts og logCPM uden beskrivende navne.}
    reasoning:
      - {es: Modelos pueden usar por error la escala equivocada., en: Models may accidentally use the wrong scale., da: Modeller kan bruge forkert skala.}
      - {es: Nombrar assays y registrar método/parámetros., en: Name assays and record method and parameters., da: Navngiv assays og registrér metode og parametre.}
    conclusion: {es: Escala es parte de la semántica del objeto., en: Scale is part of object semantics., da: Skala er en del af objektets semantik.}

