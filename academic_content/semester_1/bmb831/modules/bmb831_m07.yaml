  - {id: bmb831.m07.p03, activity_type: identifier_mapping, prompt: {es: Resuelve un mapeo Ensembl→símbolo con duplicados., en: Resolve an Ensembl-to-symbol mapping with duplicates., da: Løs Ensembl-til-symbol mapping med duplikater.}, expected_elements: [version_strip_policy, cardinality_table, missing_ids, duplicate_policy, provenance]}
  - {id: bmb831.m07.p04, activity_type: genomic_ranges, prompt: {es: Audita coordenadas sin build ni convención., en: Audit coordinates lacking build and convention., da: Auditér koordinater uden build og konvention.}, expected_elements: [genome_build, coordinate_system, strand, interval_type, liftover_limits]}
  - {id: bmb831.m07.p05, activity_type: method_selection, prompt: {es: Elige SummarizedExperiment, SingleCellExperiment o MultiAssayExperiment., en: Choose SummarizedExperiment, SingleCellExperiment, or MultiAssayExperiment., da: Vælg SummarizedExperiment, SingleCellExperiment eller MultiAssayExperiment.}, expected_elements: [modality, reduced_dims, alternative_experiments, sample_map]}
  - {id: bmb831.m07.p06, activity_type: reproducibility_audit, prompt: {es: Audita un RDS sin código ni versiones., en: Audit an RDS lacking code and versions., da: Auditér en RDS uden kode og versioner.}, expected_elements: [construction_script, package_versions, annotation_version, input_manifest, validity_checks]}

objective_bank:
  - {id: bmb831.m07.q01, type: multiple_choice, prompt: {es: `colData` describe..., en: `colData` describes..., da: `colData` beskriver...}, options: [{id: a, text: {es: Muestras/columnas, en: Samples/columns, da: Samples/kolonner}}, {id: b, text: {es: Genes/filas, en: Genes/rows, da: Gener/rækker}}], correct_option_ids: [a], explanation: {es: Está alineado con columnas de assays., en: It aligns with assay columns., da: Det aligner med assay-kolonner.}}
  - {id: bmb831.m07.q02, type: true_false, prompt: {es: Todas las assays en SummarizedExperiment deben compartir dimensiones., en: All assays in a SummarizedExperiment must share dimensions., da: Alle assays i et SummarizedExperiment skal dele dimensioner.}, correct: true, explanation: {es: Comparten características y muestras., en: They share features and samples., da: De deler features og samples.}}
  - {id: bmb831.m07.q03, type: multiple_choice, prompt: {es: ¿Dónde guardar build genómico?, en: Where should genome build be recorded?, da: Hvor bør genome build registreres?}, options: [{id: a, text: {es: rowRanges/metadata, en: rowRanges/metadata, da: rowRanges/metadata}}, {id: b, text: {es: Sólo nombre de archivo, en: Filename only, da: Kun filnavn}}], correct_option_ids: [a], explanation: {es: Debe viajar con coordenadas., en: It must travel with coordinates., da: Det skal følge koordinaterne.}}
  - {id: bmb831.m07.q04, type: true_false, prompt: {es: Símbolo génico es identificador estable universal., en: A gene symbol is a universal stable identifier., da: Et gensymbol er en universel stabil identifikator.}, correct: false, explanation: {es: Puede cambiar, reutilizarse o ser ambiguo., en: It may change, be reused, or be ambiguous., da: Det kan ændres, genbruges eller være tvetydigt.}}
  - {id: bmb831.m07.q05, type: multiple_choice, prompt: {es: Mejor manejo de mapeo uno-a-muchos., en: Best handling of one-to-many mapping., da: Bedste håndtering af en-til-mange mapping.}, options: [{id: a, text: {es: Conservar cardinalidad y política explícita, en: Preserve cardinality and explicit policy, da: Bevar kardinalitet og eksplicit politik}}, {id: b, text: {es: Elegir primer match silenciosamente, en: Silently choose first match, da: Vælg stille første match}}], correct_option_ids: [a], explanation: {es: Evita pérdida y sesgo ocultos., en: It avoids hidden loss and bias., da: Det undgår skjult tab og bias.}}
  - {id: bmb831.m07.q06, type: true_false, prompt: {es: `se[, keep]` mantiene assay y colData sincronizados., en: `se[, keep]` keeps assay and colData synchronized., da: `se[, keep]` holder assay og colData synkroniseret.}, correct: true, explanation: {es: Es una ventaja del contenedor., en: This is a container advantage., da: Det er en containerfordel.}}
  - {id: bmb831.m07.q07, type: multiple_choice, prompt: {es: Contenedor para múltiples modalidades con cobertura distinta., en: Container for multiple modalities with differing coverage., da: Container for flere modaliteter med forskellig dækning.}, options: [{id: a, text: {es: MultiAssayExperiment, en: MultiAssayExperiment, da: MultiAssayExperiment}}, {id: b, text: {es: Vector atómico, en: Atomic vector, da: Atomisk vektor}}], correct_option_ids: [a], explanation: {es: Incluye mapa entre unidades y assays., en: It includes mappings between units and assays., da: Det inkluderer mapping mellem enheder og assays.}}
  - {id: bmb831.m07.q08, type: true_false, prompt: {es: RDS conserva automáticamente procedencia completa., en: RDS automatically preserves complete provenance., da: RDS bevarer automatisk komplet provenance.}, correct: false, explanation: {es: Preserva objeto, no necesariamente fuente, código o versiones externas., en: It preserves the object, not necessarily source, code, or external versions., da: Det bevarer objektet, ikke nødvendigvis kilde, kode eller eksterne versioner.}}
  - {id: bmb831.m07.q09, type: multiple_select, prompt: {es: Validaciones antes de modelar., en: Validations before modeling., da: Valideringer før modellering.}, options: [{id: a, text: {es: IDs únicos, en: Unique IDs, da: Unikke ID'er}}, {id: b, text: {es: Dimensiones alineadas, en: Aligned dimensions, da: Alignede dimensioner}}, {id: c, text: {es: Tipos y niveles, en: Types and levels, da: Typer og niveauer}}, {id: d, text: {es: Ninguna, en: None, da: Ingen}}], correct_option_ids: [a,b,c], explanation: {es: Estructura y metadata deben ser coherentes., en: Structure and metadata must be coherent., da: Struktur og metadata skal være sammenhængende.}}
  - {id: bmb831.m07.q10, type: true_false, prompt: {es: Contenedor válido garantiza anotación biológicamente correcta., en: A valid container guarantees biologically correct annotation., da: En gyldig container garanterer biologisk korrekt annotation.}, correct: false, explanation: {es: Validez estructural no equivale a semántica., en: Structural validity is not semantic correctness., da: Strukturel validitet er ikke semantisk korrekthed.}}

