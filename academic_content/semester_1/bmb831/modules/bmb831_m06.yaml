schema_version: 1.0.0
course_code: BMB831
module_id: bmb831.m06
content_version: 1.0.0
status: academically_reviewed_draft

metadata:
  title: {"es": "Clustering, clasificación, resampling y validación resistente a fuga", "en": "Clustering, classification, resampling, and leakage-resistant validation", "da": "Clustering, klassifikation, resampling og lækageresistent validering"}
  summary:
    es: >-
      Diseño y evaluación de análisis no supervisados y supervisados en datos ómicos. Incluye distancias,
      k-means, clustering jerárquico, estabilidad, clasificación, regularización, particiones agrupadas,
      validación cruzada anidada, leakage, desbalance, discriminación, calibración, umbrales, subgrupos,
      domain shift y límites de interpretar firmas predictivas como biomarcadores.
    en: >-
      Design and evaluation of unsupervised and supervised analyses in omics data. Covers distances,
      k-means, hierarchical clustering, stability, classification, regularization, grouped splits,
      nested cross-validation, leakage, imbalance, discrimination, calibration, thresholds, subgroups,
      domain shift, and limits of interpreting predictive signatures as biomarkers.
    da: >-
      Design og evaluering af usuperviserede og superviserede analyser i omics-data med clustering,
      regularisering, grouped splits, nested cross-validation, leakage, kalibrering og domain shift.
  estimated_study_hours: 16
  difficulty: advanced

alignment:
  official_learning_outcomes: [bmb831.lo01, bmb831.lo03, bmb831.lo05, bmb831.lo07]
  prerequisite_modules: [bmb830.m09, bmb831.m02, bmb831.m05]
  later_modules: [bmb831.m11, bmb831.m12]

objectives:
  - {id: bmb831.m06.o01, text: {"es": "Seleccionar distancia y algoritmo de clustering según representación", "en": "Select distance and clustering algorithm from the representation", "da": "Vælge afstand og clusteringalgoritme ud fra repræsentationen"}}
  - {id: bmb831.m06.o02, text: {"es": "Evaluar estabilidad y asociación externa de clusters", "en": "Evaluate cluster stability and external association", "da": "Evaluere clusterstabilitet og ekstern association"}}
  - {id: bmb831.m06.o03, text: {"es": "Definir target, tiempo de predicción y unidad independiente", "en": "Define target, prediction time, and independent unit", "da": "Definere target, prædiktionstidspunkt og uafhængig enhed"}}
  - {id: bmb831.m06.o04, text: {"es": "Diseñar splits agrupados y temporales", "en": "Design grouped and temporal splits", "da": "Designe grouped og temporale splits"}}
  - {id: bmb831.m06.o05, text: {"es": "Encapsular preprocessing dentro de resampling", "en": "Encapsulate preprocessing within resampling", "da": "Indkapsle preprocessing inden for resampling"}}
  - {id: bmb831.m06.o06, text: {"es": "Aplicar validación cruzada anidada", "en": "Apply nested cross-validation", "da": "Anvende nested cross-validation"}}
  - {id: bmb831.m06.o07, text: {"es": "Interpretar discriminación, calibración y umbrales", "en": "Interpret discrimination, calibration, and thresholds", "da": "Fortolke diskrimination, kalibrering og tærskler"}}
  - {id: bmb831.m06.o08, text: {"es": "Evaluar estabilidad, subgrupos y desplazamiento de dominio", "en": "Evaluate stability, subgroups, and domain shift", "da": "Evaluere stabilitet, subgrupper og domain shift"}}

concepts:
  - id: bmb831.m06.c01
    title: {"es": "Clustering depende de representación y objetivo", "en": "Clustering depends on representation and objective", "da": "Clustering afhænger af repræsentation og mål"}
    body:
      es: >-
        Clustering no descubre una partición única. Distancia, transformación, selección de variables, algoritmo y k
        definen la solución. K-means favorece grupos aproximadamente esféricos en distancia euclídea; jerárquico depende
        del linkage; métodos de densidad responden a otra geometría.
      en: >-
        Clustering does not discover one unique partition. Distance, transformation, feature selection, algorithm, and k
        define the solution. K-means favors roughly spherical Euclidean groups; hierarchical clustering depends on linkage.
      da: >-
        Clustering finder ikke én unik partition. Afstand, transformation, features, algoritme og k definerer løsningen.
    key_points:
      - {"es": "Un cluster es resultado de un procedimiento, no una entidad automática", "en": "A cluster is a procedure output, not an automatic entity", "da": "En cluster er et procedureoutput, ikke en automatisk enhed"}
  - id: bmb831.m06.c02
    title: {"es": "Estabilidad y validez de clusters", "en": "Cluster stability and validity", "da": "Clusterstabilitet og validitet"}
    body:
      es: >-
        Silhouette y criterios internos describen compactación/separación bajo la misma métrica. Bootstrap, subsampling y
        perturbación evalúan persistencia. Validez biológica requiere asociación externa reproducible, no usar la misma señal
        para definir y confirmar clusters. Un cluster estable puede ser técnico.
      en: >-
        Internal criteria describe compactness under the same metric. Bootstrap and perturbation assess persistence.
        Biological validity requires reproducible external association. A stable cluster may still be technical.
      da: >-
        Interne kriterier beskriver kompakthed. Bootstrap vurderer persistens; biologisk validitet kræver ekstern association.
    key_points:
      - {"es": "Estabilidad es necesaria a menudo, pero no suficiente", "en": "Stability is often necessary but not sufficient", "da": "Stabilitet er ofte nødvendig men ikke tilstrækkelig"}
  - id: bmb831.m06.c03
    title: {"es": "Target y tiempo de predicción", "en": "Target and prediction time", "da": "Target og prædiktionstidspunkt"}
    body:
      es: >-
        Un problema supervisado debe definir outcome, horizonte, tiempo índice y variables disponibles en ese momento.
        Usar información posterior al tiempo de predicción causa leakage temporal. Repeticiones, células o visitas del mismo
        paciente deben mantenerse juntas entre particiones.
      en: >-
        A supervised problem defines outcome, horizon, index time, and variables available then. Post-index information causes
        temporal leakage. Repeated measures or cells from one patient must remain in the same partition.
      da: >-
        Et superviseret problem definerer outcome, horisont, indekstid og tilgængelige variable. Senere information giver leakage.
    key_points:
      - {"es": "La unidad de split debe abarcar toda dependencia", "en": "The split unit must encompass the dependency unit", "da": "Split-enheden skal omfatte afhængighedsenheden"}
  - id: bmb831.m06.c04
    title: {"es": "Leakage y pipeline completo", "en": "Leakage and the complete pipeline", "da": "Leakage og hele pipelinet"}
    body:
      es: >-
        Imputación, escalado, corrección de batch, selección de variables, PCA y ajuste de hiperparámetros aprenden de datos.
        Deben ajustarse sólo en training y aplicarse a validation/test. Preprocesar toda la matriz antes de CV filtra información,
        incluso sin usar explícitamente labels.
      en: >-
        Imputation, scaling, batch correction, feature selection, PCA, and tuning learn from data. Fit them only on training
        and apply to validation/test. Whole-dataset preprocessing before CV leaks information even without explicit labels.
      da: >-
        Imputation, skalering, batch correction, feature selection, PCA og tuning skal fittes kun på training.
    key_points:
      - {"es": "Se valida el pipeline, no sólo el clasificador", "en": "The pipeline is validated, not only the classifier", "da": "Hele pipelinet valideres, ikke kun klassifikatoren"}
  - id: bmb831.m06.c05
    title: {"es": "Resampling y validación anidada", "en": "Resampling and nested validation", "da": "Resampling og nested validering"}
    body:
      es: >-
        El loop interno selecciona hiperparámetros y variables; el externo estima rendimiento del proceso de selección.
        El test final se reserva y se usa una vez. Los folds deben respetar paciente, sitio, familia, tiempo o lote según la
        dependencia y uso futuro. Comparar muchos pipelines en el mismo outer CV también introduce selección.
      en: >-
        Inner loops select hyperparameters and features; outer loops estimate the selection process. Final test data are used once.
        Folds respect patient, site, family, time, or batch. Comparing many pipelines on the same outer CV also induces selection.
      da: >-
        Indre loops vælger hyperparametre; ydre loops estimerer selektionsproceduren. Testdata bruges én gang.
    key_points:
      - {"es": "Nested CV estima un procedimiento", "en": "Nested CV estimates a procedure", "da": "Nested CV estimerer en procedure"}
  - id: bmb831.m06.c06
    title: {"es": "Métricas, calibración y utilidad", "en": "Metrics, calibration, and utility", "da": "Metrikker, kalibrering og nytte"}
    body:
      es: >-
        ROC-AUC mide ranking; PR-AUC es sensible a clase positiva y prevalencia. Sensibilidad, especificidad, PPV y NPV dependen
        del umbral; valores predictivos dependen de prevalencia. Brier y curvas de calibración evalúan probabilidades.
        El umbral se elige con costes y datos de desarrollo, no test.
      en: >-
        ROC-AUC measures ranking; PR-AUC emphasizes positives. Threshold metrics and predictive values depend on threshold and
        prevalence. Brier score and calibration curves evaluate probabilities. Thresholds are chosen in development data.
      da: >-
        ROC-AUC måler ranking; PR-AUC fokuserer på positive. Kalibrering evaluerer sandsynligheder.
    key_points:
      - {"es": "Discriminación y calibración son distintas", "en": "Discrimination and calibration are distinct", "da": "Diskrimination og kalibrering er forskellige"}
  - id: bmb831.m06.c07
    title: {"es": "Estabilidad, subgrupos y domain shift", "en": "Stability, subgroups, and domain shift", "da": "Stabilitet, subgrupper og domain shift"}
    body:
      es: >-
        Firmas seleccionadas pueden variar entre resamples aunque el rendimiento sea parecido. Deben evaluarse frecuencia de selección,
        signo, calibración y errores por subgrupo. Cambios de plataforma, sitio, prevalencia o población alteran distribución;
        validación externa y recalibración pueden ser necesarias.
      en: >-
        Selected signatures may vary across resamples despite similar performance. Evaluate selection frequency, sign, calibration,
        and subgroup errors. Platform, site, prevalence, or population shifts require external validation and possibly recalibration.
      da: >-
        Valgte signaturer kan variere mellem resamples. Platform-, site- og populationsskift kræver ekstern validering.
    key_points:
      - {"es": "Rendimiento interno no establece transportabilidad", "en": "Internal performance does not establish transportability", "da": "Intern performance etablerer ikke transportabilitet"}

worked_examples:
  - id: bmb831.m06.e01
    example_kind: r_code
    language: r
    code: |-
      set.seed(831)
      outcome <- rep(c(0, 1), each = 10)
      features <- matrix(rnorm(20 * 50), nrow = 20)
      fold_id <- sample(rep(1:5, length.out = nrow(features)))
      selected_per_fold <- lapply(1:5, function(fold) {
        training <- fold_id != fold
        correlations <- apply(features[training, , drop = FALSE], 2, cor,
                              y = outcome[training])
        order(abs(correlations), decreasing = TRUE)[1:5]
      })
      lengths(selected_per_fold)
    expected_output: |-
      [1] 5 5 5 5 5
    output_kind: console
    title: {"es": "Leakage por selección global", "en": "Leakage from global selection", "da": "Leakage fra global selection"}
    scenario: {"es": "Se eligen genes por asociación usando todos los datos antes de CV.", "en": "Genes are selected by association using all data before CV.", "da": "Gener vælges efter association på alle data før CV."}
    reasoning:
      - {"es": "Validation labels influyen en features.", "en": "Validation labels influence features.", "da": "Validation-labels påvirker features."}
      - {"es": "Selección debe repetirse dentro de cada training fold.", "en": "Selection must be repeated inside each training fold.", "da": "Selection skal gentages i hvert training-fold."}
    conclusion: {"es": "El AUC global está optimísticamente sesgado.", "en": "Global AUC is optimistically biased.", "da": "Global AUC er optimistisk biased."}
  - id: bmb831.m06.e02
    example_kind: r_code
    language: r
    code: |-
      cells <- data.frame(
        patient_id = rep(sprintf("P%02d", 1:6), each = 3),
        signal = seq_len(18)
      )
      test_patients <- c("P02", "P05")
      cells$split <- ifelse(
        cells$patient_id %in% test_patients,
        "test",
        "train"
      )
      table(cells$split, cells$patient_id)
    expected_output:
      es: "Cada paciente aparece en una sola partición; P02 y P05 aportan únicamente celdas de prueba."
      en: "Every patient appears in one partition only; P02 and P05 contribute test cells only."
      da: "Hver patient forekommer kun i én partition; P02 og P05 bidrager kun med testceller."
    output_kind: interpretation
    title: {"es": "Células repartidas entre folds", "en": "Cells split across folds", "da": "Celler delt mellem folds"}
    scenario: {"es": "Células del mismo paciente aparecen en train y test.", "en": "Cells from the same patient appear in train and test.", "da": "Celler fra samme patient findes i train og test."}
    reasoning:
      - {"es": "El modelo reconoce firma individual.", "en": "The model may recognize patient identity.", "da": "Modellen kan genkende patientidentitet."}
      - {"es": "Split debe agrupar por paciente.", "en": "Split must group by patient.", "da": "Split skal grupperes efter patient."}
    conclusion: {"es": "La unidad efectiva es paciente, no célula.", "en": "Effective unit is patient, not cell.", "da": "Effektiv enhed er patient, ikke celle."}
  - id: bmb831.m06.e03
    title: {"es": "AUC alta, calibración mala", "en": "High AUC, poor calibration", "da": "Høj AUC, dårlig kalibrering"}
    scenario: {"es": "AUC=0.88 pero riesgos predichos duplican frecuencia observada.", "en": "AUC=0.88 but predicted risks double observed frequency.", "da": "AUC=0.88 men prædikterede risici er dobbelt observeret frekvens."}
    reasoning:
      - {"es": "Ranking es bueno pero probabilidades no son fiables.", "en": "Ranking is good but probabilities are unreliable.", "da": "Ranking er god men sandsynligheder er upålidelige."}
      - {"es": "Evaluar intercepto, pendiente y recalibración.", "en": "Assess calibration intercept, slope, and recalibration.", "da": "Vurder kalibreringsintercept, hældning og rekalibrering."}
    conclusion: {"es": "Utilidad probabilística requiere calibración además de discriminación.", "en": "Probabilistic use requires calibration as well as discrimination.", "da": "Probabilistisk brug kræver kalibrering ud over diskrimination."}

