  - {id: bmb831.m06.p02, activity_type: resampling_design, prompt: {"es": "Diseña splits para pacientes, sitios y visitas repetidas.", "en": "Design splits for patients, sites, and repeated visits.", "da": "Design splits for patienter, sites og gentagne besøg."}, expected_elements: [grouped_patient, site_external, temporal_order, no_overlap]}
  - {id: bmb831.m06.p03, activity_type: pipeline_ordering, prompt: {"es": "Ordena imputación, escalado, selección, tuning y evaluación.", "en": "Order imputation, scaling, selection, tuning, and evaluation.", "da": "Ordne imputation, skalering, selection, tuning og evaluering."}, expected_elements: [inside_training, inner_loop, outer_evaluation, final_test]}
  - {id: bmb831.m06.p04, activity_type: metric_selection, prompt: {"es": "Elige métricas para outcome raro y decisiones con umbral.", "en": "Choose metrics for a rare outcome and threshold decisions.", "da": "Vælg metrikker for sjældent outcome og tærskelbeslutninger."}, expected_elements: [pr_auc, sensitivity, specificity, ppv, calibration, decision_cost]}
  - {id: bmb831.m06.p05, activity_type: stability_analysis, prompt: {"es": "Evalúa estabilidad de una firma de diez genes.", "en": "Evaluate stability of a ten-gene signature.", "da": "Evaluér stabilitet af en ti-gen-signatur."}, expected_elements: [selection_frequency, coefficient_sign, performance_distribution, overlap, external_data]}
  - {id: bmb831.m06.p06, activity_type: publication_appraisal, prompt: {"es": "Critica un estudio con CV aleatoria de células y sin calibración.", "en": "Critique a study with random cell-level CV and no calibration.", "da": "Kritisk vurder et studie med tilfældig celle-niveau-CV og uden kalibrering."}, expected_elements: [pseudoreplication, leakage, optimistic_metrics, probability_limit, corrected_design]}

