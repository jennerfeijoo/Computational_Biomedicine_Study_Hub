glossary:
  - {id: bmb831.term.cluster_stability, term: {"es": "estabilidad de cluster", "en": "cluster stability", "da": "clusterstabilitet"}, definition: {"es": "Persistencia de asignaciones o estructura bajo perturbación.", "en": "Persistence of assignments or structure under perturbation.", "da": "Persistens af assignments eller struktur under perturbation."}}
  - {id: bmb831.term.leakage, term: {"es": "fuga de información", "en": "data leakage", "da": "datalækage"}, definition: {"es": "Uso de información no disponible legítimamente al entrenar o predecir.", "en": "Use of information not legitimately available during training or prediction.", "da": "Brug af information der ikke legitimt er tilgængelig under træning eller prædiktion."}}
  - {id: bmb831.term.grouped_split, term: {"es": "partición agrupada", "en": "grouped split", "da": "grouped split"}, definition: {"es": "Partición que mantiene unidades dependientes en el mismo fold.", "en": "Split keeping dependent observations in the same fold.", "da": "Split der holder afhængige observationer i samme fold."}}
  - {id: bmb831.term.nested_cv, term: {"es": "validación cruzada anidada", "en": "nested cross-validation", "da": "nested cross-validation"}, definition: {"es": "Resampling con loop interno de selección y externo de evaluación.", "en": "Resampling with inner selection and outer evaluation loops.", "da": "Resampling med indre selektion og ydre evaluering."}}
  - {id: bmb831.term.roc_auc, term: {"es": "ROC-AUC", "en": "ROC-AUC", "da": "ROC-AUC"}, definition: {"es": "Probabilidad de ordenar un positivo por encima de un negativo.", "en": "Probability of ranking a positive above a negative.", "da": "Sandsynlighed for at rangere en positiv over en negativ."}}
  - {id: bmb831.term.pr_auc, term: {"es": "PR-AUC", "en": "PR-AUC", "da": "PR-AUC"}, definition: {"es": "Resumen de precisión-recall sensible a clase positiva y prevalencia.", "en": "Precision-recall summary sensitive to positive class and prevalence.", "da": "Precision-recall-summary følsomt for positiv klasse og prævalens."}}
  - {id: bmb831.term.calibration, term: {"es": "calibración", "en": "calibration", "da": "kalibrering"}, definition: {"es": "Correspondencia entre probabilidades predichas y frecuencias observadas.", "en": "Agreement between predicted probabilities and observed frequencies.", "da": "Overensstemmelse mellem prædikterede sandsynligheder og observerede frekvenser."}}
  - {id: bmb831.term.brier_score, term: {"es": "Brier score", "en": "Brier score", "da": "Brier score"}, definition: {"es": "Error cuadrático medio de predicciones probabilísticas binarias.", "en": "Mean squared error of binary probabilistic predictions.", "da": "Middel kvadratisk fejl af binære probabilistiske prædiktioner."}}
  - {id: bmb831.term.domain_shift, term: {"es": "desplazamiento de dominio", "en": "domain shift", "da": "domain shift"}, definition: {"es": "Cambio de distribución entre desarrollo y uso.", "en": "Distribution change between development and use.", "da": "Fordelingsændring mellem udvikling og brug."}}
  - {id: bmb831.term.selection_stability, term: {"es": "estabilidad de selección", "en": "selection stability", "da": "selektionsstabilitet"}, definition: {"es": "Persistencia de variables seleccionadas bajo resampling.", "en": "Persistence of selected variables under resampling.", "da": "Persistens af valgte variable under resampling."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      La validación debe reproducir el uso futuro y encapsular todo paso aprendido de datos. Clustering requiere estabilidad
      y evidencia externa; clasificación requiere splits independientes, nested CV, discriminación, calibración y evaluación de shift.
    en: >-
      Validation should mimic future use and encapsulate every data-learned step. Clustering needs stability and external evidence;
      classification needs independent splits, nested CV, discrimination, calibration, and shift evaluation.
    da: >-
      Validering bør efterligne fremtidig brug og indkapsle alle datalærte trin. Clustering kræver stabilitet og ekstern evidens.
  misconceptions:
    - unsupervised preprocessing cannot leak
    - random cell-level splitting is valid for patient prediction
    - high AUC implies calibrated probabilities
    - a stable cluster is automatically biological
    - final test data may be used repeatedly
  socratic_questions:
    - What is the true independent deployment unit?
    - Which pipeline steps learn from data?
    - Does the resampling mimic future site or time shift?
    - Are probabilities calibrated at the intended prevalence?
    - How stable are selected features and subgroup errors?
  grading_criteria:
    - representation-aware clustering
    - grouped leakage-resistant resampling
    - correct nested CV logic
    - discrimination calibration threshold interpretation
    - external validation and restrained biomarker claims
  retrieval_fragments:
    - id: bmb831.m06.r01
      text: {"es": "Todo preprocessing aprendido debe ajustarse dentro del training fold.", "en": "Every learned preprocessing step must be fitted inside the training fold.", "da": "Hvert datalært preprocessing-trin skal fittes i training-foldet."}
    - id: bmb831.m06.r02
      text: {"es": "AUC mide discriminación, no calibración ni utilidad clínica.", "en": "AUC measures discrimination, not calibration or clinical utility.", "da": "AUC måler diskrimination, ikke kalibrering eller klinisk nytte."}
    - id: bmb831.m06.r03
      text: {"es": "La unidad de split debe ser al menos tan grande como la unidad de dependencia.", "en": "The split unit must be at least as large as the dependency unit.", "da": "Split-enheden skal være mindst lige så stor som afhængighedsenheden."}
