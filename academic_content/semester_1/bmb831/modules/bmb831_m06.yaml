    prompt: {"es": "Diseña una validación anidada completa para un clasificador ómico p≫n.", "en": "Design complete nested validation for a p≫n omics classifier.", "da": "Design komplet nested validering for en p≫n omics-klassifikator."}
    rubric: [{criterion: grouped_split, weight: 0.25}, {criterion: inner_pipeline, weight: 0.30}, {criterion: outer_metrics, weight: 0.25}, {criterion: final_test_claims, weight: 0.20}]
  - id: bmb831.m06.a02
    prompt: {"es": "Evalúa si tres clusters representan subtipos biológicos.", "en": "Evaluate whether three clusters represent biological subtypes.", "da": "Evaluér om tre clusters repræsenterer biologiske subtyper."}
    rubric: [{criterion: representation_algorithm, weight: 0.25}, {criterion: stability, weight: 0.25}, {criterion: external_association, weight: 0.25}, {criterion: replication_claim_scope, weight: 0.25}]
  - id: bmb831.m06.a03
    prompt: {"es": "Critica un modelo con AUC alta, mala calibración y fuerte caída externa.", "en": "Critique a model with high AUC, poor calibration, and strong external degradation.", "da": "Kritisk vurder en model med høj AUC, dårlig kalibrering og stærkt eksternt fald."}
