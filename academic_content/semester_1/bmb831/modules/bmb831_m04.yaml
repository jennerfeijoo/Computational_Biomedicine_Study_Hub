glossary:
  - {id: bmb831.term.glm, term: {es: modelo lineal generalizado, en: generalized linear model, da: generaliseret lineær model}, definition: {es: Modelo que combina distribución, predictor lineal y link., en: Model combining a distribution, linear predictor, and link., da: Model der kombinerer fordeling, lineær prædiktor og link.}}
  - {id: bmb831.term.link_function, term: {es: función link, en: link function, da: linkfunktion}, definition: {es: Función que conecta media esperada con predictor lineal., en: Function connecting expected mean to linear predictor., da: Funktion der forbinder forventet middel med lineær prædiktor.}}
  - {id: bmb831.term.offset, term: {es: offset, en: offset, da: offset}, definition: {es: Término conocido con coeficiente fijado, usualmente exposición., en: Known term with fixed coefficient, usually exposure., da: Kendt term med fast koefficient, ofte eksponering.}}
  - {id: bmb831.term.overdispersion, term: {es: sobredispersión, en: overdispersion, da: overdispersion}, definition: {es: Variabilidad mayor que la prevista por el modelo., en: Variability greater than predicted by the model., da: Variabilitet større end modellen forudsiger.}}
  - {id: bmb831.term.negative_binomial, term: {es: binomial negativa, en: negative binomial, da: negativ binomial}, definition: {es: Distribución de conteos con parámetro de dispersión adicional., en: Count distribution with an additional dispersion parameter., da: Count-fordeling med ekstra dispersionsparameter.}}
  - {id: bmb831.term.logit, term: {es: logit, en: logit, da: logit}, definition: {es: Logaritmo de odds usado como link binomial común., en: Log odds used as a common binomial link., da: Log-odds brugt som almindeligt binomial-link.}}
  - {id: bmb831.term.design_matrix, term: {es: matriz de diseño, en: design matrix, da: designmatrix}, definition: {es: Matriz que codifica predictores y estructura del modelo., en: Matrix encoding predictors and model structure., da: Matrix der koder prædiktorer og modelstruktur.}}
  - {id: bmb831.term.contrast, term: {es: contraste, en: contrast, da: kontrast}, definition: {es: Combinación lineal de parámetros que representa una comparación., en: Linear combination of parameters representing a comparison., da: Lineær kombination af parametre der repræsenterer en sammenligning.}}
  - {id: bmb831.term.interaction, term: {es: interacción, en: interaction, da: interaktion}, definition: {es: Dependencia del efecto de una variable respecto a otra., en: Dependence of one variable effect on another., da: Afhængighed af én variabels effekt af en anden.}}
  - {id: bmb831.term.identifiability, term: {es: identificabilidad, en: identifiability, da: identificerbarhed}, definition: {es: Posibilidad de estimar parámetros de forma separada a partir del diseño., en: Ability to separately estimate parameters from the design., da: Mulighed for separat at estimere parametre fra designet.}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      El modelo debe seguir soporte, relación media-varianza, denominador y dependencia. La matriz de diseño
      define qué efectos son identificables; el link define la escala de coeficientes; los diagnósticos evalúan adecuación.
    en: >-
      The model should follow support, mean-variance relation, denominator, and dependence. The design matrix
      determines identifiable effects; the link determines coefficient scale; diagnostics assess adequacy.
    da: >-
      Modellen bør følge støtte, middel-varians-relation, nævner og afhængighed. Designmatrixen bestemmer identificerbare effekter.
  misconceptions:
    - Poisson is appropriate for every count
    - an offset is an ordinary estimated covariate
    - proportions do not need denominators
    - software can estimate fully confounded effects
    - main effects remain universal in the presence of interaction
  socratic_questions:
    - What is the support and denominator of the outcome?
    - Which mean-variance relation is plausible?
    - Is the contrast estimable under the design matrix?
    - Which repeated measurements share an independent unit?
    - How does the coefficient translate to the response scale?
  grading_criteria:
    - family link and offset justification
    - design matrix and contrast validity
    - dependence and blocking
    - diagnostics and sensitivity
    - correct response-scale interpretation
  retrieval_fragments:
    - id: bmb831.m04.r01
      text: {es: Un offset incorpora exposición conocida con coeficiente fijado y permite modelar tasas., en: An offset includes known exposure with a fixed coefficient and enables rate modeling., da: Et offset inkluderer kendt eksponering med fast koefficient og muliggør ratemodellering.}
    - id: bmb831.m04.r02
      text: {es: Sobredispersión puede requerir binomial negativa pero también revisión de estructura omitida., en: Overdispersion may require negative binomial but also review of omitted structure., da: Overdispersion kan kræve negativ binomial men også vurdering af udeladt struktur.}
    - id: bmb831.m04.r03
      text: {es: Un contraste no estimable no se vuelve válido por elegir otro paquete., en: A non-estimable contrast does not become valid by choosing another package., da: En ikke-estimerbar kontrast bliver ikke gyldig ved at vælge en anden pakke.}
