    rubric: [{criterion: environment, weight: 0.25}, {criterion: data_provenance, weight: 0.25}, {criterion: clean_execution, weight: 0.25}, {criterion: validity_limits, weight: 0.25}]

glossary:
  - {id: bmb831.term.clean_session, term: {"es": "sesión limpia", "en": "clean session", "da": "ren session"}, definition: {"es": "Sesión sin objetos heredados que reconstruye el análisis desde entradas declaradas.", "en": "Session without inherited objects that rebuilds analysis from declared inputs.", "da": "Session uden arvede objekter der genskaber analysen fra deklarerede input."}}
  - {id: bmb831.term.manifest, term: {"es": "manifest", "en": "manifest", "da": "manifest"}, definition: {"es": "Registro estructurado de archivos, versiones, checksums y roles.", "en": "Structured record of files, versions, checksums, and roles.", "da": "Struktureret register over filer, versioner, checksums og roller."}}
  - {id: bmb831.term.provenance, term: {"es": "procedencia", "en": "provenance", "da": "provenance"}, definition: {"es": "Cadena que conecta origen, transformaciones y productos.", "en": "Chain connecting origin, transformations, and products.", "da": "Kæde der forbinder oprindelse, transformationer og produkter."}}
  - {id: bmb831.term.invariant, term: {"es": "invariante", "en": "invariant", "da": "invariant"}, definition: {"es": "Condición que debe mantenerse durante una transformación válida.", "en": "Condition that must remain true during a valid transformation.", "da": "Betingelse der skal forblive sand under en gyldig transformation."}}
  - {id: bmb831.term.pure_function, term: {"es": "función pura", "en": "pure function", "da": "ren funktion"}, definition: {"es": "Función cuyo resultado depende sólo de sus argumentos y sin efectos externos observables.", "en": "Function whose result depends only on arguments and has no observable external effects.", "da": "Funktion hvis resultat kun afhænger af argumenter og uden observerbare eksterne effekter."}}
  - {id: bmb831.term.lockfile, term: {"es": "lockfile", "en": "lockfile", "da": "lockfile"}, definition: {"es": "Registro de versiones de dependencias de software.", "en": "Record of software dependency versions.", "da": "Register over softwareafhængigheders versioner."}}
  - {id: bmb831.term.side_effect, term: {"es": "efecto secundario", "en": "side effect", "da": "sideeffekt"}, definition: {"es": "Modificación externa a la salida retornada.", "en": "External modification beyond the returned output.", "da": "Ekstern ændring ud over det returnerede output."}}
  - {id: bmb831.term.checksum, term: {"es": "checksum", "en": "checksum", "da": "checksum"}, definition: {"es": "Huella que permite detectar cambios en contenido.", "en": "Fingerprint enabling detection of content changes.", "da": "Fingeraftryk der gør indholdsændringer detekterbare."}}
  - {id: bmb831.term.configuration, term: {"es": "configuración", "en": "configuration", "da": "konfiguration"}, definition: {"es": "Conjunto versionado de parámetros y opciones de ejecución.", "en": "Versioned set of parameters and run options.", "da": "Versioneret sæt af parametre og kørselsvalg."}}
  - {id: bmb831.term.integration_test, term: {"es": "prueba de integración", "en": "integration test", "da": "integrationstest"}, definition: {"es": "Prueba de interacción correcta entre etapas o componentes.", "en": "Test of correct interaction between stages or components.", "da": "Test af korrekt interaktion mellem trin eller komponenter."}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      La reproducibilidad computacional surge de dependencias explícitas, separación de responsabilidades,
      datos y configuración versionados, validación, pruebas y ejecución limpia. No equivale a validez estadística.
    en: >-
      Computational reproducibility arises from explicit dependencies, separated responsibilities, versioned data
      and configuration, validation, tests, and clean execution. It is not equivalent to statistical validity.
    da: >-
      Beregningsmæssig reproducerbarhed kræver eksplicitte afhængigheder, adskilte ansvar, versionerede data og tests.
  misconceptions:
    - saving the workspace is sufficient for reproducibility
    - a fixed seed quantifies stochastic uncertainty
    - package versions alone fully identify an analysis
    - code that executes is scientifically valid
    - absolute paths are harmless local details
  socratic_questions:
    - Which inputs are currently implicit?
    - Can every derived product be deleted and rebuilt?
    - What invariant would detect sample-order corruption?
    - Which parameter changes the scientific estimand rather than only implementation?
    - What evidence would distinguish reproducibility from validity?
  grading_criteria:
    - explicit inputs outputs and dependencies
    - coherent functional decomposition
    - validated arguments and informative failures
    - versioned environment data annotations and parameters
    - tests for biological and structural invariants
  retrieval_fragments:
    - id: bmb831.m01.r01
      text: {"es": "Un workflow reproducible reconstruye productos desde entradas declaradas en una sesión limpia.", "en": "A reproducible workflow rebuilds products from declared inputs in a clean session.", "da": "Et reproducerbart workflow genskaber produkter fra deklarerede input i en ren session."}
    - id: bmb831.m01.r02
      text: {"es": "Un lockfile no registra por sí solo versiones de datos ni anotaciones.", "en": "A lockfile alone does not record data or annotation versions.", "da": "En lockfile registrerer ikke alene data- eller annotationsversioner."}
    - id: bmb831.m01.r03
      text: {"es": "Las funciones puras reducen estado oculto y facilitan pruebas.", "en": "Pure functions reduce hidden state and facilitate testing.", "da": "Rene funktioner reducerer skjult state og letter tests."}
    - id: bmb831.m01.r04
      text: {"es": "La ejecución limpia detecta dependencias ocultas pero no valida diseño o inferencia.", "en": "Clean execution detects hidden dependencies but does not validate design or inference.", "da": "Ren kørsel opdager skjulte afhængigheder men validerer ikke design eller inferens."}
