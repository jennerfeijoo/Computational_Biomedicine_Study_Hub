  - {id: bmb831.m09.p05, activity_type: method_comparison, prompt: {es: Compara LFQ y TMT para un diseño multicohorte., en: Compare LFQ and TMT for a multi-cohort design., da: Sammenlign LFQ og TMT for et multi-cohort-design.}, expected_elements: [multiplexing, batch, ratio_compression, missingness, bridge_channel, cost]}
  - {id: bmb831.m09.p06, activity_type: publication_appraisal, prompt: {es: Critica un estudio que reporta proteínas individuales desde grupos indistinguibles., en: Critique a study reporting individual proteins from indistinguishable groups., da: Kritisk vurder et studie der rapporterer individuelle proteiner fra uadskillelige grupper.}, expected_elements: [shared_peptides, inference_resolution, false_specificity, revised_reporting]}

objective_bank:
  - {id: bmb831.m09.q01, type: multiple_choice, prompt: {es: En bottom-up, objeto directamente observado., en: In bottom-up, directly observed object., da: I bottom-up, direkte observeret objekt.}, options: [{id: a, text: {es: Espectro/ión peptídico, en: Spectrum/peptide ion, da: Spektrum/peptidion}}, {id: b, text: {es: Proteína intacta universalmente, en: Intact protein universally, da: Intakt protein universelt}}], correct_option_ids: [a], explanation: {es: La proteína se infiere desde péptidos., en: Protein is inferred from peptides., da: Protein infereres fra peptider.}}
  - {id: bmb831.m09.q02, type: true_false, prompt: {es: PSM FDR 1% garantiza protein FDR 1%., en: One-percent PSM FDR guarantees one-percent protein FDR., da: 1% PSM-FDR garanterer 1% protein-FDR.}, correct: false, explanation: {es: Agregación cambia unidad y selección., en: Aggregation changes the error unit and selection., da: Aggregering ændrer fejlenhed og selection.}}
  - {id: bmb831.m09.q03, type: multiple_choice, prompt: {es: Péptido compartido implica..., en: A shared peptide implies..., da: Et delt peptid indebærer...}, options: [{id: a, text: {es: Ambigüedad entre proteínas/isoformas, en: Ambiguity among proteins/isoforms, da: Tvetydighed mellem proteiner/isoformer}}, {id: b, text: {es: Identificación única segura, en: Certain unique identification, da: Sikker unik identifikation}}], correct_option_ids: [a], explanation: {es: No distingue fuentes compatibles., en: It cannot distinguish compatible sources., da: Det kan ikke skelne kompatible kilder.}}
  - {id: bmb831.m09.q04, type: true_false, prompt: {es: Protein group siempre equivale a un único gen., en: A protein group always equals one gene., da: En proteingruppe svarer altid til ét gen.}, correct: false, explanation: {es: Puede contener isoformas u homólogos indistinguibles., en: It may contain indistinguishable isoforms or homologs., da: Det kan indeholde uadskillelige isoformer eller homologer.}}
  - {id: bmb831.m09.q05, type: multiple_choice, prompt: {es: Sesgo característico de TMT., en: Characteristic TMT bias., da: Karakteristisk TMT-bias.}, options: [{id: a, text: {es: Ratio compression, en: Ratio compression, da: Ratio compression}}, {id: b, text: {es: Ausencia total de interferencia, en: Complete absence of interference, da: Fuldstændigt fravær af interferens}}], correct_option_ids: [a], explanation: {es: Co-isolation puede acercar ratios a uno., en: Co-isolation may compress ratios toward one., da: Co-isolation kan komprimere ratios mod én.}}
  - {id: bmb831.m09.q06, type: true_false, prompt: {es: LFQ nunca tiene missingness., en: LFQ never has missingness., da: LFQ har aldrig missingness.}, correct: false, explanation: {es: Identificación estocástica y baja intensidad generan ausencia., en: Stochastic identification and low intensity create missingness., da: Stokastisk identifikation og lav intensitet skaber missingness.}}
  - {id: bmb831.m09.q07, type: multiple_choice, prompt: {es: Imputación mínima supone..., en: Minimum imputation assumes..., da: Minimumimputation antager...}, options: [{id: a, text: {es: Ausencia por baja abundancia, en: Missingness due to low abundance, da: Missingness pga. lav abundance}}, {id: b, text: {es: MCAR universal, en: Universal MCAR, da: Universel MCAR}}], correct_option_ids: [a], explanation: {es: No es válida para todo mecanismo., en: It is not valid for every mechanism., da: Det er ikke gyldigt for enhver mekanisme.}}
  - {id: bmb831.m09.q08, type: true_false, prompt: {es: Fosfopéptido diferencial prueba activación de la proteína., en: A differential phosphopeptide proves protein activation., da: Et differentialt fosfopeptid beviser proteinaktivering.}, correct: false, explanation: {es: Requiere localización, normalización por proteína y evidencia funcional., en: It requires localization, protein normalization, and functional evidence., da: Det kræver lokalisering, proteinnormalisering og funktionel evidens.}}
  - {id: bmb831.m09.q09, type: multiple_select, prompt: {es: QC proteómico relevante., en: Relevant proteomics QC., da: Relevant proteomik-QC.}, options: [{id: a, text: {es: Intensidad total, en: Total intensity, da: Total intensitet}}, {id: b, text: {es: CV replicados, en: Replicate CV, da: Replikat-CV}}, {id: c, text: {es: IDs detectados, en: Detected IDs, da: Detekterede ID'er}}, {id: d, text: {es: Ninguno, en: None, da: Ingen}}], correct_option_ids: [a,b,c], explanation: {es: Evalúan carga, precisión y cobertura., en: They assess loading, precision, and coverage., da: De vurderer loading, præcision og dækning.}}
  - {id: bmb831.m09.q10, type: true_false, prompt: {es: FDR debe declararse al nivel de inferencia reportado., en: FDR should be declared at the reported inference level., da: FDR bør deklareres på det rapporterede inferensniveau.}, correct: true, explanation: {es: El lector debe conocer la unidad de error., en: The reader must know the error unit., da: Læseren skal kende fejlenheden.}}

