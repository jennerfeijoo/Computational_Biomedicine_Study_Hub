metadata:
  title: {es: Caracterización de proteínas y proteómica cuantitativa, en: Protein characterization and quantitative proteomics workflows, da: Proteinkarakterisering og kvantitative proteomikworkflows}
  summary:
    es: >-
      Flujo de proteómica bottom-up desde proteínas y péptidos hasta identificación y cuantificación.
      Incluye digestión, espectros, PSM, target-decoy, FDR a nivel PSM/péptido/proteína, péptidos únicos
      y compartidos, inferencia de proteínas, LFQ, TMT, batch, normalización, missingness, imputación,
      abundancia diferencial, PTMs, isoformas, anotación y propagación de incertidumbre.
    en: >-
      Bottom-up proteomics workflow from proteins and peptides to identification and quantification.
      Covers digestion, spectra, PSMs, target-decoy, FDR at PSM/peptide/protein levels, unique and shared
      peptides, protein inference, LFQ, TMT, batch, normalization, missingness, imputation, differential
      abundance, PTMs, isoforms, annotation, and uncertainty propagation.
    da: >-
      Bottom-up-proteomikworkflow fra proteiner og peptider til identifikation og kvantificering med
      PSM, target-decoy, FDR, proteininferens, LFQ, TMT, missingness, normalisering og differential abundance.
  estimated_study_hours: 17
  difficulty: advanced

alignment:
  official_learning_outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo05, bmb831.lo06]
  prerequisite_modules: [bmb831.m02, bmb831.m03, bmb831.m07]
  later_modules: [bmb831.m10, bmb831.m11, bmb831.m12]

objectives:
  - {id: bmb831.m09.o01, text: {es: Explicar la cadena proteína→péptido→espectro→PSM, en: Explain the protein-to-peptide-to-spectrum-to-PSM chain, da: Forklare kæden protein→peptid→spektrum→PSM}}
  - {id: bmb831.m09.o02, text: {es: Interpretar FDR en distintos niveles, en: Interpret FDR at different levels, da: Fortolke FDR på forskellige niveauer}}
  - {id: bmb831.m09.o03, text: {es: Resolver incertidumbre de péptidos compartidos, en: Resolve uncertainty from shared peptides, da: Håndtere usikkerhed fra delte peptider}}
  - {id: bmb831.m09.o04, text: {es: Comparar LFQ, TMT y sus sesgos, en: Compare LFQ, TMT, and their biases, da: Sammenligne LFQ, TMT og deres bias}}
  - {id: bmb831.m09.o05, text: {es: Evaluar QC, normalización y batch, en: Evaluate QC, normalization, and batch, da: Evaluere QC, normalisering og batch}}
  - {id: bmb831.m09.o06, text: {es: Modelar missingness y abundancia diferencial, en: Model missingness and differential abundance, da: Modellere missingness og differential abundance}}
  - {id: bmb831.m09.o07, text: {es: Integrar isoformas, PTMs y anotación funcional, en: Integrate isoforms, PTMs, and functional annotation, da: Integrere isoformer, PTM'er og funktionel annotation}}
  - {id: bmb831.m09.o08, text: {es: Comunicar incertidumbre desde identificación hasta proteína, en: Communicate uncertainty from identification to protein level, da: Kommunikere usikkerhed fra identifikation til proteinniveau}}

concepts:
  - id: bmb831.m09.c01
    title: {es: Cadena de medición bottom-up, en: Bottom-up measurement chain, da: Bottom-up-målekæde}
    body:
      es: >-
        En proteómica bottom-up, proteínas se digieren en péptidos, se separan, ionizan y fragmentan. Los espectros MS/MS
        se comparan con secuencias candidatas para producir PSM. La abundancia de péptidos se agrega después a grupos de proteínas.
        Cada transición introduce pérdida, sesgo e incertidumbre.
      en: >-
        In bottom-up proteomics, proteins are digested into peptides, separated, ionized, and fragmented. MS/MS spectra
        are matched to candidate sequences as PSMs, then peptide evidence is aggregated to protein groups.
      da: >-
        I bottom-up-proteomik digesteres proteiner til peptider, fragmenteres og matches som PSM, hvorefter evidens aggregeres til proteingrupper.
    key_points:
      - {es: La proteína no se observa directamente en la mayoría de workflows bottom-up, en: The protein is not directly observed in most bottom-up workflows, da: Proteinet observeres ikke direkte i de fleste bottom-up-workflows}
  - id: bmb831.m09.c02
    title: {es: Target-decoy y FDR multinivel, en: Target-decoy and multilevel FDR, da: Target-decoy og FDR på flere niveauer}
    body:
      es: >-
        Búsquedas target-decoy estiman falsos matches a partir de secuencias señuelo. Controlar FDR a nivel PSM no garantiza
        automáticamente FDR equivalente a nivel péptido o proteína. La agregación y selección cambian el universo de errores.
        Deben declararse umbrales y niveles por separado.
      en: >-
        Target-decoy searches estimate false matches from decoy sequences. PSM-level FDR does not automatically imply equivalent
        peptide- or protein-level FDR because aggregation and selection change the error universe.
      da: >-
        Target-decoy estimerer falske matches. PSM-FDR indebærer ikke automatisk samme peptide- eller protein-FDR.
    key_points:
      - {es: El nivel de inferencia debe coincidir con el nivel de FDR, en: The inference level should match the FDR level, da: Inferensniveau skal matche FDR-niveau}
  - id: bmb831.m09.c03
    title: {es: Péptidos compartidos e inferencia de proteínas, en: Shared peptides and protein inference, da: Delte peptider og proteininferens}
    body:
      es: >-
        Un péptido único apoya una proteína o grupo específico; un péptido compartido puede provenir de múltiples isoformas o genes homólogos.
        Parsimonia, grupos indistinguibles y modelos probabilísticos resuelven la asignación de forma distinta. Reportar una sola proteína
        cuando sólo se identifica un grupo exagera resolución.
      en: >-
        A unique peptide supports a specific protein or group; a shared peptide may originate from multiple isoforms or homologs.
        Parsimony, indistinguishable groups, and probabilistic models resolve assignments differently.
      da: >-
        Et unikt peptid støtter et specifikt protein; et delt peptid kan komme fra flere isoformer eller homologer.
    key_points:
      - {es: Protein group no equivale necesariamente a una proteína individual, en: A protein group is not necessarily one individual protein, da: En proteingruppe er ikke nødvendigvis ét individuelt protein}
  - id: bmb831.m09.c04
    title: {es: Cuantificación LFQ y TMT, en: LFQ and TMT quantification, da: LFQ- og TMT-kvantificering}
    body:
      es: >-
        LFQ compara intensidades entre runs y es sensible a alineamiento, missingness y batch. TMT multiplexa muestras y reduce
        variación entre runs, pero puede sufrir ratio compression por co-isolation e interferencia. La normalización debe corresponder
        a carga, composición y diseño de canales; bridges permiten conectar batches TMT.
      en: >-
        LFQ compares intensities across runs and is sensitive to alignment, missingness, and batch. TMT multiplexes samples but may
        suffer ratio compression from co-isolation. Normalization must match loading, composition, and channel design.
      da: >-
        LFQ sammenligner intensiteter mellem runs; TMT multiplexerer samples men kan have ratio compression.
    key_points:
      - {es: La plataforma determina sesgos y estructura de batch, en: Platform determines biases and batch structure, da: Platformen bestemmer bias og batchstruktur}
  - id: bmb831.m09.c05
    title: {es: Missingness, normalización y QC, en: Missingness, normalization, and QC, da: Missingness, normalisering og QC}
    body:
      es: >-
        Missingness puede depender de baja abundancia, selección estocástica, identificación, interferencia o fallo. QC incluye intensidad total,
        número de péptidos/proteínas, distribución, CV de replicados, correlación, carryover y batch. Imputación debe seguir el mecanismo
        y evaluarse con sensibilidad; imputar antes de definir el modelo puede fabricar separación.
      en: >-
        Missingness may depend on low abundance, stochastic selection, identification, interference, or failure. QC includes total intensity,
        peptide/protein counts, replicate CV, correlation, carryover, and batch. Imputation must follow mechanism and sensitivity analysis.
      da: >-
        Missingness kan afhænge af lav abundance, stokastisk selection, identifikation eller fejl. Imputation skal følge mekanismen.
    key_points:
      - {es: La ausencia puede ocurrir en espectro, péptido o proteína, en: Missingness may arise at spectrum, peptide, or protein level, da: Missingness kan opstå på spektrum-, peptid- eller proteinniveau}
  - id: bmb831.m09.c06
    title: {es: Abundancia diferencial, PTMs e interpretación, en: Differential abundance, PTMs, and interpretation, da: Differential abundance, PTM'er og fortolkning}
    body:
      es: >-
        El análisis diferencial debe respetar unidad, pairing, batch y escala log. Agregar péptidos requiere robustez a outliers y compartidos.
        PTMs necesitan localización del sitio y control de FDR adicional; cambios de fosfopéptido pueden reflejar abundancia total o ocupación.
        La caracterización funcional depende de isoforma, dominio y evidencia de anotación.
      en: >-
        Differential analysis respects unit, pairing, batch, and log scale. Peptide aggregation needs robustness to outliers and shared peptides.
        PTMs require site localization and additional FDR; phosphopeptide changes may reflect protein abundance or occupancy.
      da: >-
        Differential analyse respekterer enhed, pairing, batch og log-skala. PTM'er kræver site-lokalisering og ekstra FDR.
    key_points:
      - {es: Cambio de PTM no equivale automáticamente a cambio de actividad, en: A PTM change does not automatically equal activity change, da: En PTM-ændring er ikke automatisk aktivitetsændring}

worked_examples:
  - id: bmb831.m09.e01
    title: {es: FDR PSM frente a proteína, en: PSM versus protein FDR, da: PSM versus protein-FDR}
    scenario: {es: Se controla PSM FDR al 1% y se reportan proteínas sin filtro adicional., en: PSM FDR is controlled at 1% and proteins are reported without further filtering., da: PSM-FDR kontrolleres ved 1% og proteiner rapporteres uden yderligere filter.}
    reasoning:
      - {es: Agregación de PSM cambia unidad de error., en: Aggregating PSMs changes the error unit., da: Aggregering af PSM ændrer fejlenheden.}
      - {es: Aplicar inferencia y FDR a nivel proteína/grupo., en: Apply inference and FDR at protein/group level., da: Anvend inferens og FDR på protein/gruppe-niveau.}
    conclusion: {es: FDR no se transfiere automáticamente entre niveles., en: FDR does not automatically transfer across levels., da: FDR overføres ikke automatisk mellem niveauer.}
  - id: bmb831.m09.e02
    title: {es: Péptido compartido, en: Shared peptide, da: Delt peptid}
    scenario: {es: Un péptido pertenece a dos isoformas y no hay péptidos únicos., en: A peptide belongs to two isoforms and no unique peptides exist., da: Et peptid tilhører to isoformer og ingen unikke peptider findes.}
    reasoning:
      - {es: No distinguir isoformas individualmente., en: Individual isoforms cannot be distinguished., da: Individuelle isoformer kan ikke skelnes.}
      - {es: Reportar grupo indistinguible y propagar ambigüedad., en: Report an indistinguishable group and propagate ambiguity., da: Rapportér en uadskillelig gruppe og propagér tvetydighed.}
    conclusion: {es: La resolución está limitada por péptidos observados., en: Resolution is limited by observed peptides., da: Opløsning begrænses af observerede peptider.}
  - id: bmb831.m09.e03
    title: {es: Fosfopéptido aumenta sin cambio de proteína, en: Phosphopeptide increase without protein change, da: Fosfopeptid-stigning uden proteinændring}
    scenario: {es: Fosfopéptido log2FC=1.2 y proteína total estable., en: Phosphopeptide log2FC=1.2 while total protein is stable., da: Fosfopeptid log2FC=1.2 mens totalprotein er stabilt.}
    reasoning:
      - {es: Compatible con mayor ocupación del sitio, pero requiere localización fiable., en: Compatible with increased site occupancy but requires reliable localization., da: Kompatibel med øget site-occupancy men kræver pålidelig lokalisering.}
      - {es: No prueba actividad funcional sin evidencia adicional., en: It does not prove functional activity without further evidence., da: Det beviser ikke funktionel aktivitet uden yderligere evidens.}
    conclusion: {es: Separar abundancia total, modificación y función., en: Separate total abundance, modification, and function., da: Adskil total abundance, modifikation og funktion.}

