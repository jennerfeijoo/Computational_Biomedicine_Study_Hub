glossary:
  - {id: bmb831.term.psm, term: {es: PSM, en: peptide-spectrum match, da: peptide-spectrum match}, definition: {es: Asignación de un espectro a una secuencia peptídica., en: Assignment of a spectrum to a peptide sequence., da: Tildeling af et spektrum til en peptidsekvens.}}
  - {id: bmb831.term.target_decoy, term: {es: target-decoy, en: target-decoy, da: target-decoy}, definition: {es: Estrategia para estimar falsos matches usando secuencias señuelo., en: Strategy estimating false matches using decoy sequences., da: Strategi der estimerer falske matches med decoy-sekvenser.}}
  - {id: bmb831.term.unique_peptide, term: {es: péptido único, en: unique peptide, da: unikt peptid}, definition: {es: Péptido compatible con una proteína o grupo específico., en: Peptide compatible with one specific protein or group., da: Peptid kompatibelt med ét specifikt protein eller gruppe.}}
  - {id: bmb831.term.shared_peptide, term: {es: péptido compartido, en: shared peptide, da: delt peptid}, definition: {es: Péptido compatible con múltiples proteínas o isoformas., en: Peptide compatible with multiple proteins or isoforms., da: Peptid kompatibelt med flere proteiner eller isoformer.}}
  - {id: bmb831.term.protein_group, term: {es: grupo de proteínas, en: protein group, da: proteingruppe}, definition: {es: Conjunto no distinguible con la evidencia peptídica disponible., en: Set indistinguishable from available peptide evidence., da: Sæt der ikke kan skelnes med tilgængelig peptid-evidens.}}
  - {id: bmb831.term.lfq, term: {es: LFQ, en: label-free quantification, da: label-free quantification}, definition: {es: Cuantificación por intensidades entre runs sin etiquetas isotópicas., en: Intensity-based quantification across runs without isotopic labels., da: Intensitetsbaseret kvantificering mellem runs uden isotoplabels.}}
  - {id: bmb831.term.tmt, term: {es: TMT, en: tandem mass tag, da: tandem mass tag}, definition: {es: Etiquetado isobárico para cuantificación multiplexada., en: Isobaric labeling for multiplexed quantification., da: Isobarisk labeling til multiplex-kvantificering.}}
  - {id: bmb831.term.ratio_compression, term: {es: compresión de ratios, en: ratio compression, da: ratio compression}, definition: {es: Atenuación de diferencias por interferencia de iones co-aislados., en: Attenuation of differences due to co-isolated ion interference., da: Dæmpning af forskelle pga. interferens fra co-isolerede ioner.}}
  - {id: bmb831.term.ptm_localization, term: {es: localización de PTM, en: PTM localization, da: PTM-lokalisering}, definition: {es: Asignación probabilística de una modificación a un residuo concreto., en: Probabilistic assignment of a modification to a specific residue., da: Probabilistisk tildeling af modifikation til en specifik rest.}}
  - {id: bmb831.term.protein_inference, term: {es: inferencia de proteínas, en: protein inference, da: proteininferens}, definition: {es: Proceso de inferir proteínas desde evidencia peptídica., en: Process of inferring proteins from peptide evidence., da: Proces hvor proteiner infereres fra peptid-evidens.}}

hidden_tutor_support:
  canonical_explanation:
    es: >-
      La proteómica bottom-up infiere proteínas desde evidencia peptídica y espectral. FDR debe controlarse al nivel reportado,
      los péptidos compartidos limitan resolución y cuantificación, y missingness, batch y plataforma determinan el modelo diferencial.
    en: >-
      Bottom-up proteomics infers proteins from peptide and spectral evidence. FDR must be controlled at the reported level,
      shared peptides limit resolution and quantification, and missingness, batch, and platform shape differential modeling.
    da: >-
      Bottom-up-proteomik infererer proteiner fra peptid- og spektralevidens. FDR og delte peptider begrænser inferens.
  misconceptions:
    - PSM FDR automatically controls protein FDR
    - a protein group is one protein
    - all missing values are below detection
    - TMT eliminates batch and interference
    - a PTM change proves functional activation
  socratic_questions:
    - At which level is the error rate controlled?
    - Which proteins are distinguishable from observed peptides?
    - What missingness mechanism is plausible?
    - Which platform-specific bias affects quantification?
    - Does the PTM result remain after accounting for total protein?
  grading_criteria:
    - measurement-chain reasoning
    - multilevel FDR and protein inference
    - platform-aware QC normalization and missingness
    - valid differential modeling
    - restrained PTM and functional interpretation
  retrieval_fragments:
    - id: bmb831.m09.r01
      text: {es: PSM FDR no garantiza el mismo FDR a nivel proteína porque la agregación cambia la unidad de error., en: PSM FDR does not guarantee the same protein-level FDR because aggregation changes the error unit., da: PSM-FDR garanterer ikke samme protein-FDR fordi aggregering ændrer fejlenheden.}
    - id: bmb831.m09.r02
      text: {es: Péptidos compartidos limitan la resolución a grupos de proteínas indistinguibles., en: Shared peptides may limit resolution to indistinguishable protein groups., da: Delte peptider kan begrænse opløsning til uadskillelige proteingrupper.}
    - id: bmb831.m09.r03
      text: {es: Un cambio de PTM debe interpretarse junto con localización, proteína total e incertidumbre., en: A PTM change should be interpreted with localization, total protein, and uncertainty., da: En PTM-ændring bør fortolkes med lokalisering, totalprotein og usikkerhed.}
