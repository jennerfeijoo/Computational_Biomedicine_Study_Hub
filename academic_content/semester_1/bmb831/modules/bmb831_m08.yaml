glossary:
  - {id: bmb831.term.raw_count, term: {"es": "conteo crudo", "en": "raw count", "da": "rå count"}, definition: {"es": "Número entero de fragmentos asignados a una característica.", "en": "Integer number of fragments assigned to a feature.", "da": "Heltalsantal fragmenter tildelt en feature."}}
  - {id: bmb831.term.size_factor, term: {"es": "factor de tamaño", "en": "size factor", "da": "size factor"}, definition: {"es": "Escala relativa de biblioteca estimada bajo una referencia composicional.", "en": "Relative library scale estimated under a compositional reference.", "da": "Relativ biblioteksskala estimeret under kompositionsreference."}}
  - {id: bmb831.term.dispersion, term: {"es": "dispersión", "en": "dispersion", "da": "dispersion"}, definition: {"es": "Parámetro de variabilidad extra-Poisson.", "en": "Extra-Poisson variability parameter.", "da": "Parameter for ekstra-Poisson-variabilitet."}}
  - {id: bmb831.term.log2fc, term: {"es": "log2 fold change", "en": "log2 fold change", "da": "log2 fold change"}, definition: {"es": "Logaritmo base dos de una razón de medias condicionada al diseño.", "en": "Base-two log of a design-conditional mean ratio.", "da": "Base-to-log af en designbetinget middelratio."}}
  - {id: bmb831.term.independent_filter, term: {"es": "filtro independiente", "en": "independent filter", "da": "independent filter"}, definition: {"es": "Filtro no asociado al contraste bajo la nula.", "en": "Filter unrelated to the contrast under the null.", "da": "Filter der ikke er relateret til kontrasten under nulhypotesen."}}
  - {id: bmb831.term.mean_dispersion_trend, term: {"es": "tendencia media-dispersión", "en": "mean-dispersion trend", "da": "middel-dispersion-trend"}, definition: {"es": "Relación usada para estabilizar dispersión entre genes.", "en": "Relationship used to stabilize gene-wise dispersion.", "da": "Relation brugt til at stabilisere genvise dispersioner."}}
  - {id: bmb831.term.vst_rnaseq, term: {"es": "VST", "en": "VST", "da": "VST"}, definition: {"es": "Transformación para visualización que reduce dependencia media-varianza.", "en": "Visualization transformation reducing mean-variance dependence.", "da": "Visualiseringstransformation der reducerer middel-varians-afhængighed."}}
  - {id: bmb831.term.de_gene, term: {"es": "gen diferencialmente expresado", "en": "differentially expressed gene", "da": "differentialt udtrykt gen"}, definition: {"es": "Gen con evidencia de diferencia de abundancia bajo un contraste y modelo.", "en": "Gene with evidence of abundance difference under a contrast and model.", "da": "Gen med evidens for abundance-forskel under kontrast og model."}}
  - {id: bmb831.term.paired_design, term: {"es": "diseño pareado", "en": "paired design", "da": "parret design"}, definition: {"es": "Diseño que compara condiciones dentro de la misma unidad.", "en": "Design comparing conditions within the same unit.", "da": "Design der sammenligner conditions inden for samme enhed."}}
