  - {id: bmb831.m08.o02, text: {"es": "Realizar QC de biblioteca, muestra y gen", "en": "Perform library-, sample-, and gene-level QC", "da": "Udføre bibliotek-, sample- og gen-niveau-QC"}}
  - {id: bmb831.m08.o03, text: {"es": "Justificar filtrado y normalización", "en": "Justify filtering and normalization", "da": "Begrunde filtrering og normalisering"}}
  - {id: bmb831.m08.o04, text: {"es": "Explicar dispersión y modelo binomial-negativo", "en": "Explain dispersion and negative-binomial modeling", "da": "Forklare dispersion og negativ-binomial-modellering"}}
  - {id: bmb831.m08.o05, text: {"es": "Construir diseños y contrastes identificables", "en": "Build identifiable designs and contrasts", "da": "Bygge identificerbare designs og kontraster"}}
  - {id: bmb831.m08.o06, text: {"es": "Interpretar log2FC, shrinkage, p y FDR", "en": "Interpret log2FC, shrinkage, p-values, and FDR", "da": "Fortolke log2FC, shrinkage, p-værdier og FDR"}}
  - {id: bmb831.m08.o07, text: {"es": "Integrar anotación y visualización sin perder IDs", "en": "Integrate annotation and visualization without losing IDs", "da": "Integrere annotation og visualisering uden at miste ID'er"}}
  - {id: bmb831.m08.o08, text: {"es": "Evaluar sensibilidad y alcance biológico", "en": "Evaluate sensitivity and biological claim scope", "da": "Evaluere følsomhed og biologisk påstandsomfang"}}

concepts:
  - id: bmb831.m08.c01
    title: {"es": "Unidad, diseño y conteos crudos", "en": "Unit, design, and raw counts", "da": "Enhed, design og rå counts"}
    body:
      es: >-
        La unidad independiente suele ser la muestra biológica o paciente, no la lectura. La matriz conserva conteos enteros
        por gen/transcrito y la metadata define condición, lote, tiempo, pairing y covariables. Conteos normalizados o TPM no
        deben sustituir conteos crudos en modelos que estiman dispersión desde el mecanismo de conteo.
      en: >-
        The independent unit is usually the biological sample or patient, not the read. The matrix stores integer counts and
        metadata defines condition, batch, time, pairing, and covariates. TPM or normalized counts should not replace raw counts
        in models that estimate count dispersion.
      da: >-
        Den uafhængige enhed er normalt biologisk sample eller patient. Count-modeller kræver rå counts og korrekt metadata.
    key_points:
      - {"es": "Lecturas son eventos de medición, no réplicas biológicas", "en": "Reads are measurement events, not biological replicates", "da": "Reads er målehændelser, ikke biologiske replikater"}
  - id: bmb831.m08.c02
    title: {"es": "QC y estructura antes del test", "en": "QC and structure before testing", "da": "QC og struktur før test"}
    body:
      es: >-
        QC revisa profundidad, complejidad, mapeo, composición, genes detectados, distribución, sample correlations,
        PCA/VST y metadata técnica. Un outlier se investiga con múltiples métricas. PCA posterior a transformación sirve para
        estructura y batch, no para probar diferencialmente genes.
      en: >-
        QC reviews depth, complexity, mapping, composition, detected genes, distributions, sample correlations, PCA/VST,
        and technical metadata. Outliers require converging evidence. PCA assesses structure, not gene-level significance.
      da: >-
        QC vurderer dybde, kompleksitet, mapping, komposition, detekterede gener, korrelationer og PCA med metadata.
    key_points:
      - {"es": "QC debe preceder a interpretación de significancia", "en": "QC should precede significance interpretation", "da": "QC bør komme før fortolkning af signifikans"}
  - id: bmb831.m08.c03
    title: {"es": "Filtrado y normalización de tamaño/composición", "en": "Filtering and size/composition normalization", "da": "Filtrering og størrelse/kompositionsnormalisering"}
    body:
      es: >-
        Genes con conteos mínimos aportan poca potencia y muchos tests. Filtrado por abundancia ciega al grupo puede ser independiente.
        Factores de tamaño estiman escala relativa bajo la suposición de que la mayoría de genes no cambia de forma extrema o que
        existe una referencia estable. Cambios globales requieren controles externos o interpretación relativa.
      en: >-
        Very low-count genes add little power and many tests. Group-blind abundance filtering may be independent. Size factors estimate
        relative scale under assumptions about stable reference composition. Global shifts require external controls or relative interpretation.
      da: >-
        Lav-count-gener giver lav power. Size factors estimerer relativ skala under antagelser om stabil referencekomposition.
    key_points:
      - {"es": "Normalización no es corrección universal de batch", "en": "Normalization is not universal batch correction", "da": "Normalisering er ikke universel batch correction"}
  - id: bmb831.m08.c04
    title: {"es": "Dispersión y modelo binomial-negativo", "en": "Dispersion and negative-binomial model", "da": "Dispersion og negativ-binomial-model"}
    body:
      es: >-
        La media esperada combina tamaño de biblioteca y diseño; la dispersión captura variabilidad biológica adicional a Poisson.
        Estimaciones por gen se estabilizan compartiendo información sobre la tendencia media-dispersión. Muy pocas réplicas limitan
        estimación y hacen que supuestos de shrinkage sean influyentes.
      en: >-
        Expected mean combines library size and design; dispersion captures extra-Poisson biological variability. Gene-wise estimates
        are stabilized by sharing information along the mean-dispersion trend. Few replicates limit estimation.
      da: >-
        Forventet middel kombinerer bibliotekstørrelse og design; dispersion fanger ekstra-Poisson biologisk variation.
    key_points:
      - {"es": "Dispersión no es error técnico únicamente", "en": "Dispersion is not only technical error", "da": "Dispersion er ikke kun teknisk fejl"}
  - id: bmb831.m08.c05
    title: {"es": "Diseño, contrastes e interacciones", "en": "Design, contrasts, and interactions", "da": "Design, kontraster og interaktioner"}
    body:
      es: >-
        El diseño puede incluir paciente, lote, condición, tiempo y su interacción. El contraste define exactamente la comparación.
        En paired design, incluir paciente controla baseline. Una interacción condición×tiempo pregunta si el cambio temporal difiere
        entre condiciones, no si un grupo cambia y el otro no según dos p-values separados.
      en: >-
        Design may include patient, batch, condition, time, and interaction. Contrasts define exact comparisons. In paired designs,
        patient blocks baseline. A condition-by-time interaction asks whether temporal change differs between conditions.
      da: >-
        Design kan inkludere patient, batch, condition, tid og interaktion. Kontrasten definerer den præcise sammenligning.
    key_points:
      - {"es": "Diferencia de significancia no es significancia de diferencia", "en": "Difference in significance is not significance of difference", "da": "Forskel i signifikans er ikke signifikans af forskel"}
  - id: bmb831.m08.c06
    title: {"es": "Efecto, shrinkage, multiplicidad y anotación", "en": "Effect, shrinkage, multiplicity, and annotation", "da": "Effekt, shrinkage, multiplicitet og annotation"}
    body:
      es: >-
        log2FC describe cambio multiplicativo condicionado al diseño; shrinkage estabiliza estimaciones ruidosas para ranking y gráficos.
        El test y FDR evalúan evidencia; no sustituyen relevancia. IDs estables se conservan como clave y símbolos se añaden como anotación
        versionada. Un gen diferencial es asociación molecular, no prueba de causalidad o mecanismo.
      en: >-
        log2FC describes design-conditional multiplicative change; shrinkage stabilizes noisy estimates. Tests and FDR assess evidence,
        not relevance. Stable IDs remain keys and symbols are added as versioned annotation. Differential expression is not causality.
      da: >-
        log2FC beskriver betinget multiplikativ ændring; shrinkage stabiliserer støjende estimater. Differential expression er ikke kausalitet.
    key_points:
      - {"es": "Resultado debe incluir baseMean/abundancia, efecto, SE/IC y padj", "en": "Results should include abundance, effect, uncertainty, and adjusted p-value", "da": "Resultater bør inkludere abundance, effekt, usikkerhed og justeret p-værdi"}

worked_examples:
  - id: bmb831.m08.e01
    example_kind: r_code
    language: r
    code: |-
      library(DESeq2)
      sample_data <- data.frame(
        patient = factor(rep(sprintf("P%02d", 1:4), each = 2)),
        condition = factor(rep(c("before", "after"), 4))
      )
      rownames(sample_data) <- sprintf("S%02d", 1:8)
      counts <- matrix(
        c(12, 14, 9, 13, 22, 28, 17, 24,
          40, 38, 35, 37, 44, 45, 41, 43),
        nrow = 2,
        dimnames = list(c("gene_a", "gene_b"), rownames(sample_data))
      )
      dds <- DESeqDataSetFromMatrix(
        countData = counts,
        colData = sample_data,
        design = ~ patient + condition
      )
      design(dds)
    expected_output: |-
      ~patient + condition
    output_kind: console
    title: {"es": "Paired design", "en": "Paired design", "da": "Parret design"}
    scenario: {"es": "Ocho pacientes medidos antes y después.", "en": "Eight patients measured before and after.", "da": "Otte patienter målt før og efter."}
    reasoning:
      - {"es": "Diseño ~patient+time controla diferencias basales.", "en": "Design ~patient+time controls baseline differences.", "da": "Design ~patient+time kontrollerer baselineforskelle."}
      - {"es": "Tratar 16 muestras como independientes infla error residual y puede confundir.", "en": "Treating 16 samples as independent ignores pairing.", "da": "At behandle 16 samples som uafhængige ignorerer pairing."}
    conclusion: {"es": "La comparación es dentro de paciente.", "en": "The comparison is within patient.", "da": "Sammenligningen er inden for patient."}
  - id: bmb831.m08.e02
    example_kind: r_code
    language: r
    code: |-
      sample_data <- expand.grid(
        treatment = factor(c("control", "treated")),
        time = factor(c("baseline", "followup")),
        replicate = 1:3
      )
      design_matrix <- model.matrix(
        ~ treatment * time,
        data = sample_data
      )
      colnames(design_matrix)
    expected_output:
      es: "La matriz contiene intercepto, efectos principales y una columna de interacción tratamiento:tiempo; esa columna representa el cambio diferencial."
      en: "The matrix contains an intercept, both main effects, and a treatment-by-time interaction column representing differential change."
      da: "Matricen indeholder intercept, hovedeffekter og en treatment-by-time-interaktionskolonne der repræsenterer forskellig ændring."
    output_kind: interpretation
    title: {"es": "Interacción tiempo×tratamiento", "en": "Time-by-treatment interaction", "da": "Tid-gange-behandling-interaktion"}
    scenario: {"es": "Tratamiento y control tienen dos tiempos.", "en": "Treatment and control have two time points.", "da": "Behandling og kontrol har to tidspunkter."}
    reasoning:
      - {"es": "Contraste de interacción compara cambios temporales.", "en": "Interaction contrast compares temporal changes.", "da": "Interaktionskontrast sammenligner tidsændringer."}
      - {"es": "Dos tests separados no prueban diferencia entre cambios.", "en": "Two separate tests do not test difference between changes.", "da": "To separate tests tester ikke forskel mellem ændringer."}
    conclusion: {"es": "La pregunta requiere diferencia-de-diferencias.", "en": "The question requires a difference-in-differences contrast.", "da": "Spørgsmålet kræver difference-in-differences."}
  - id: bmb831.m08.e03
    title: {"es": "log2FC extremo en baja abundancia", "en": "Extreme log2FC at low abundance", "da": "Ekstrem log2FC ved lav abundance"}
    scenario: {"es": "Un gen pasa de 0–1 a 4–5 conteos y log2FC crudo es grande.", "en": "A gene shifts from 0–1 to 4–5 counts and raw log2FC is large.", "da": "Et gen går fra 0–1 til 4–5 counts og rå log2FC er stor."}
    reasoning:
      - {"es": "Estimación es ruidosa y sensible a pseudocounts.", "en": "Estimate is noisy and pseudocount-sensitive.", "da": "Estimatet er støjende og pseudocount-følsomt."}
      - {"es": "Shrinkage y filtro/relevancia evitan ranking engañoso.", "en": "Shrinkage and filtering/relevance avoid misleading ranking.", "da": "Shrinkage og filtrering/relevans undgår misvisende ranking."}
    conclusion: {"es": "Magnitud sin precisión no basta.", "en": "Magnitude without precision is insufficient.", "da": "Størrelse uden præcision er utilstrækkelig."}

