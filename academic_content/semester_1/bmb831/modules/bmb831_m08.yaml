hidden_tutor_support:
  canonical_explanation:
    es: >-
      RNA-seq diferencial requiere conteos crudos, metadata alineada, QC, normalización relativa, dispersión,
      diseño identificable y contrastes explícitos. El resultado combina abundancia, efecto, incertidumbre y FDR.
    en: >-
      Differential RNA-seq requires raw counts, aligned metadata, QC, relative normalization, dispersion,
      identifiable design, and explicit contrasts. Results combine abundance, effect, uncertainty, and FDR.
    da: >-
      Differential RNA-seq kræver rå counts, alignet metadata, QC, relativ normalisering, dispersion og eksplicitte kontraster.
  misconceptions:
    - reads are biological replicates
    - TPM is the correct input for every differential expression test
    - normalization removes all batch effects
    - significance in one group and not another proves interaction
    - a DE gene establishes causality
  socratic_questions:
    - What is the independent unit and pairing structure?
    - Which QC evidence supports exclusion?
    - What reference scale does normalization assume?
    - Is the contrast estimable and does it match the question?
    - How do effect, uncertainty, and FDR jointly support prioritization?
  grading_criteria:
    - correct counts and metadata handling
    - assay-specific QC and normalization
    - dispersion design and contrast reasoning
    - effect shrinkage multiplicity and annotation
    - sensitivity and restrained biological interpretation
  retrieval_fragments:
    - id: bmb831.m08.r01
      text: {"es": "Modelos NB de RNA-seq usan conteos crudos con factores de tamaño, no TPM como sustituto.", "en": "RNA-seq NB models use raw counts with size factors, not TPM as a substitute.", "da": "RNA-seq NB-modeller bruger rå counts med size factors, ikke TPM som erstatning."}
    - id: bmb831.m08.r02
      text: {"es": "Una interacción prueba diferencia entre cambios; dos p-values separados no lo hacen.", "en": "An interaction tests the difference between changes; two separate p-values do not.", "da": "En interaktion tester forskellen mellem ændringer; to separate p-værdier gør ikke."}
    - id: bmb831.m08.r03
      text: {"es": "Differential expression es evidencia de asociación molecular condicionada al diseño, no causalidad.", "en": "Differential expression is evidence of a design-conditional molecular association, not causality.", "da": "Differential expression er evidens for designbetinget molekylær association, ikke kausalitet."}
