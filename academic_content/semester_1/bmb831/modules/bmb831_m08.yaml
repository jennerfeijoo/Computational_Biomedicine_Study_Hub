metadata:
  title: {"es": "Pipeline de transcriptómica bulk y expresión diferencial", "en": "Bulk transcriptomics workflow and differential expression", "da": "Bulk-transkriptomikworkflow og differential expression"}
  summary:
    es: >-
      Pipeline completo de RNA-seq bulk desde matriz de conteos y metadata hasta expresión diferencial.
      Incluye diseño experimental, QC, filtrado independiente, normalización, dispersión, modelos de
      binomial negativa, contrastes, batch, paired designs, log2 fold change, shrinkage, FDR, anotación,
      visualización, sensibilidad y límites de atribución mecanística.
    en: >-
      Complete bulk RNA-seq workflow from count matrix and metadata to differential expression.
      Covers experimental design, QC, independent filtering, normalization, dispersion, negative-binomial
      models, contrasts, batch, paired designs, log2 fold change, shrinkage, FDR, annotation, visualization,
      sensitivity, and limits of mechanistic interpretation.
    da: >-
      Komplet bulk RNA-seq-workflow fra count-matrix og metadata til differential expression med design,
      QC, filtrering, normalisering, dispersion, negativ-binomial-modeller, kontraster, FDR og fortolkning.
  estimated_study_hours: 18
  difficulty: advanced

alignment:
  official_learning_outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo04, bmb831.lo05, bmb831.lo06]
  prerequisite_modules: [bmb831.m02, bmb831.m03, bmb831.m04, bmb831.m07]
  later_modules: [bmb831.m10, bmb831.m11, bmb831.m12]

