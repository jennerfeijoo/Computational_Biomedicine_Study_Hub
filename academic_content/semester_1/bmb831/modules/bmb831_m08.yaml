  - {id: bmb831.m08.p05, activity_type: annotation_audit, prompt: {"es": "Audita pérdida de genes tras mapear a símbolos.", "en": "Audit gene loss after mapping to symbols.", "da": "Auditér gentab efter mapping til symboler."}, expected_elements: [stable_keys, one_to_many, no_match, duplicates, enrichment_bias]}
  - {id: bmb831.m08.p06, activity_type: publication_appraisal, prompt: {"es": "Critica un estudio que usa TPM en t-test y no ajusta FDR.", "en": "Critique a study using TPM in t-tests without FDR adjustment.", "da": "Kritisk vurder et studie der bruger TPM i t-tests uden FDR-korrektion."}, expected_elements: [mean_variance, compositional_scale, design, multiplicity, corrected_workflow]}

objective_bank:
  - {id: bmb831.m08.q01, type: multiple_choice, prompt: {"es": "Unidad independiente en RNA-seq bulk humano.", "en": "Independent unit in human bulk RNA-seq.", "da": "Uafhængig enhed i human bulk RNA-seq."}, options: [{id: a, text: {"es": "Paciente/muestra biológica", "en": "Patient/biological sample", "da": "Patient/biologisk sample"}}, {id: b, text: {"es": "Lectura", "en": "Read", "da": "Read"}}], correct_option_ids: [a], explanation: {"es": "Las lecturas son submuestreo técnico.", "en": "Reads are technical subsampling.", "da": "Reads er teknisk subsampling."}}
  - {id: bmb831.m08.q02, type: true_false, prompt: {"es": "TPM sustituye conteos crudos en un modelo NB estándar.", "en": "TPM replaces raw counts in a standard NB model.", "da": "TPM erstatter rå counts i en standard NB-model."}, correct: false, explanation: {"es": "El modelo NB usa conteos y factores de escala.", "en": "NB modeling uses counts and scale factors.", "da": "NB-modellering bruger counts og skalafaktorer."}}
  - {id: bmb831.m08.q03, type: multiple_choice, prompt: {"es": "Buen filtro independiente.", "en": "Good independent filter.", "da": "Godt independent filter."}, options: [{id: a, text: {"es": "Conteo medio ciego a grupo", "en": "Group-blind mean count", "da": "Gruppeblind middel-count"}}, {id: b, text: {"es": "padj observado", "en": "Observed padj", "da": "Observeret padj"}}], correct_option_ids: [a], explanation: {"es": "No usa el contraste bajo la nula.", "en": "It does not use the contrast under the null.", "da": "Det bruger ikke kontrasten under nulhypotesen."}}
  - {id: bmb831.m08.q04, type: true_false, prompt: {"es": "Factores de tamaño corrigen automáticamente cualquier cambio global absoluto.", "en": "Size factors automatically correct any absolute global shift.", "da": "Size factors korrigerer automatisk ethvert absolut globalt skift."}, correct: false, explanation: {"es": "Producen escala relativa bajo supuestos de referencia.", "en": "They create a relative scale under reference assumptions.", "da": "De skaber relativ skala under referenceantagelser."}}
  - {id: bmb831.m08.q05, type: multiple_choice, prompt: {"es": "Rol de dispersión NB.", "en": "Role of NB dispersion.", "da": "Rolle af NB-dispersion."}, options: [{id: a, text: {"es": "Variabilidad extra-Poisson", "en": "Extra-Poisson variability", "da": "Ekstra-Poisson-variabilitet"}}, {id: b, text: {"es": "Tamaño de gen", "en": "Gene length", "da": "Genlængde"}}], correct_option_ids: [a], explanation: {"es": "Captura heterogeneidad biológica condicional.", "en": "It captures conditional biological heterogeneity.", "da": "Det fanger betinget biologisk heterogenitet."}}
  - {id: bmb831.m08.q06, type: true_false, prompt: {"es": "~patient+condition respeta un diseño pareado simple.", "en": "~patient+condition respects a simple paired design.", "da": "~patient+condition respekterer et simpelt parret design."}, correct: true, explanation: {"es": "Bloquea diferencias basales por paciente.", "en": "It blocks patient baseline differences.", "da": "Det blokerer baselineforskelle per patient."}}
  - {id: bmb831.m08.q07, type: multiple_choice, prompt: {"es": "Para comparar cambios temporales entre grupos se usa...", "en": "To compare temporal changes between groups use...", "da": "For at sammenligne tidsændringer mellem grupper bruges..."}, options: [{id: a, text: {"es": "Interacción grupo×tiempo", "en": "Group-by-time interaction", "da": "Gruppe-gange-tid-interaktion"}}, {id: b, text: {"es": "Dos p-values separados", "en": "Two separate p-values", "da": "To separate p-værdier"}}], correct_option_ids: [a], explanation: {"es": "Prueba directamente diferencia de cambios.", "en": "It directly tests difference in changes.", "da": "Det tester direkte forskel i ændringer."}}
  - {id: bmb831.m08.q08, type: true_false, prompt: {"es": "log2FC grande en baja abundancia es necesariamente estable.", "en": "Large log2FC at low abundance is necessarily stable.", "da": "Stor log2FC ved lav abundance er nødvendigvis stabil."}, correct: false, explanation: {"es": "Puede ser extremadamente ruidoso.", "en": "It may be extremely noisy.", "da": "Det kan være ekstremt støjende."}}
  - {id: bmb831.m08.q09, type: multiple_choice, prompt: {"es": "Shrinkage de log2FC es útil para...", "en": "log2FC shrinkage is useful for...", "da": "log2FC-shrinkage er nyttig til..."}, options: [{id: a, text: {"es": "Ranking y visualización estable", "en": "Stable ranking and visualization", "da": "Stabil ranking og visualisering"}}, {id: b, text: {"es": "Eliminar necesidad de FDR", "en": "Remove need for FDR", "da": "Fjerne behov for FDR"}}], correct_option_ids: [a], explanation: {"es": "Estabiliza magnitud, no reemplaza inferencia.", "en": "It stabilizes magnitude but does not replace inference.", "da": "Det stabiliserer størrelse men erstatter ikke inferens."}}
  - {id: bmb831.m08.q10, type: true_false, prompt: {"es": "Gen diferencial prueba mecanismo causal.", "en": "A differentially expressed gene proves a causal mechanism.", "da": "Et differentialt udtrykt gen beviser en kausal mekanisme."}, correct: false, explanation: {"es": "Es una asociación de abundancia condicionada al diseño.", "en": "It is a design-conditional abundance association.", "da": "Det er en designbetinget abundance-association."}}

