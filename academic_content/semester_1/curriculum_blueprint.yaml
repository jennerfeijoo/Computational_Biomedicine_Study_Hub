        outcome: independently analyze conceptually demanding datasets
      - id: bmb831.lo02
        outcome: work with large datasets and perform standard statistical analysis to identify relevant features
      - id: bmb831.lo03
        outcome: use standard multivariate algorithms
      - id: bmb831.lo04
        outcome: design R scripts for detailed visualization
      - id: bmb831.lo05
        outcome: know and apply advanced tools for biological interpretation
      - id: bmb831.lo06
        outcome: know and apply standard pipelines for omics processing
      - id: bmb831.lo07
        outcome: objectively discuss data-analysis methods in scientific publications
    module_sequence:
      - id: bmb831.m01
        title_en: Advanced R workflows, functional decomposition, project structure, and provenance
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo04]
        bridge_from: [bmb830.m02, bmb830.m03]
      - id: bmb831.m02
        title_en: High-dimensional data quality, normalization, missingness, and batch effects
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo06]
        bridge_from: [bmb830.m03, bmb830.m04]
      - id: bmb831.m03
        title_en: Multiple testing, false discovery rate, effect sizes, and prioritization
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo07]
        bridge_from: [bmb830.m07]
      - id: bmb831.m04
        title_en: Advanced statistical modeling for counts, proportions, and complex designs
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo07]
        bridge_from: [bmb830.m08]
      - id: bmb831.m05
        title_en: Dimension reduction, latent structure, and robust multivariate visualization
        outcomes: [bmb831.lo03, bmb831.lo04, bmb831.lo05]
        bridge_from: [bmb830.m09]
      - id: bmb831.m06
        title_en: Clustering, classification, resampling, and leakage-resistant validation
        outcomes: [bmb831.lo01, bmb831.lo03, bmb831.lo05, bmb831.lo07]
        bridge_from: [bmb830.m09]
      - id: bmb831.m07
        title_en: Bioconductor data containers, annotation, and reproducible omics infrastructure
        outcomes: [bmb831.lo02, bmb831.lo06]
        bridge_from: [bmb831.m01, bmb831.m02]
      - id: bmb831.m08
        title_en: Bulk transcriptomics workflow and differential expression
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo04, bmb831.lo05, bmb831.lo06]
        bridge_from: [bmb831.m02, bmb831.m03, bmb831.m04, bmb831.m07]
      - id: bmb831.m09
        title_en: Protein characterization and quantitative proteomics workflows
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo05, bmb831.lo06]
        bridge_from: [bmb831.m02, bmb831.m03, bmb831.m07]
      - id: bmb831.m10
        title_en: Functional enrichment, pathway analysis, and evidence-aware interpretation
        outcomes: [bmb831.lo04, bmb831.lo05, bmb831.lo07]
        bridge_from: [bmb831.m03, dm847.m13]
      - id: bmb831.m11
        title_en: Multi-omics integration, reproducibility, and critical workflow comparison
        outcomes: [bmb831.lo01, bmb831.lo03, bmb831.lo05, bmb831.lo06, bmb831.lo07]
        bridge_from: [bmb831.m05, bmb831.m06, bmb831.m08, bmb831.m09, bmb831.m10]
      - id: bmb831.m12
        title_en: Individual omics report project and scientific defense
        outcomes: [bmb831.lo01, bmb831.lo02, bmb831.lo03, bmb831.lo04, bmb831.lo05, bmb831.lo06, bmb831.lo07]
        bridge_from: [bmb831.m01, bmb831.m02, bmb831.m03, bmb831.m04, bmb831.m05, bmb831.m06, bmb831.m07, bmb831.m08, bmb831.m09, bmb831.m10, bmb831.m11]
    report_assessment:
      - explicit biological question and analysis plan
      - documented data provenance and quality control
      - justified preprocessing and statistical modeling
      - reproducible R or Quarto workflow
      - uncertainty, sensitivity, and limitations
      - biological interpretation separated from statistical evidence
      - report rubric aligned to all official learning outcomes

authoring_order:
  - establish shared glossary, source registry, and tutor policy
  - export and academically review DM857 modules 1 to 14
  - author DM857 modules 15 to 17 and cumulative project materials
  - author DM847 modules 1 to 15
  - author BMB830 modules 1 to 10
  - author BMB831 modules 1 to 12
  - run cross-course duplication and prerequisite audit
  - produce Qwen/Ollama retrieval corpus and hidden grading guides
  - freeze content version 1.0.0 for Codex integration
